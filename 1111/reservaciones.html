<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Once Once Glamstudio — Reservaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ONCE ONCE GLAMSTUDIO — Liaxa "todo en un enlace"
   ============================================================ */
:root{
  --rosa:#D9628B;        /* rosa del logo */
  --rosa-fuerte:#C14D75; /* botones / acción */
  --rosa-claro:#F7D8E0;  /* círculo del logo */
  --blush:#FDF4F7;       /* fondo */
  --crema:#FFFFFF;
  --tinta:#46242F;       /* texto principal */
  --tinta-suave:#8A6470;
  --linea:#F0DCE3;
  --exito:#5E8C61;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;background:var(--blush);color:var(--tinta);
  min-height:100vh;font-weight:400;
  background-image:radial-gradient(circle at 85% 8%, #FBE4EC 0%, transparent 42%),
                   radial-gradient(circle at 8% 95%, #FBEAF0 0%, transparent 40%);
  background-attachment:fixed;
}
.wrap{max-width:640px;margin:0 auto;padding:32px 20px 80px}

/* ---------- encabezado ---------- */
header{text-align:center;margin-bottom:34px}
.logo{
  width:120px;height:120px;border-radius:50%;object-fit:cover;
  box-shadow:0 10px 30px rgba(217,98,139,.25);margin-bottom:16px;
}
h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.9rem;letter-spacing:.5px}
.tagline{color:var(--tinta-suave);font-size:.95rem;letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}

/* ---------- pasos ---------- */
.step{margin-bottom:30px;opacity:.35;pointer-events:none;transition:opacity .35s}
.step.on{opacity:1;pointer-events:auto}
.step-label{
  font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:500;
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.step-label .spark{color:var(--rosa);font-size:1rem}

/* ---------- servicios ---------- */
.services{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.svc{
  background:var(--crema);border:1.5px solid var(--linea);border-radius:18px;
  padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.svc:hover{border-color:var(--rosa);transform:translateY(-2px)}
.svc.sel{border-color:var(--rosa);background:linear-gradient(135deg,#FFF 55%,var(--rosa-claro))}
.svc.sel::after{content:'✦';position:absolute;top:10px;right:12px;color:var(--rosa);font-size:1rem}
.svc h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700}
.svc .dur{color:var(--tinta-suave);font-size:.82rem;margin-top:3px}
.svc .precio{color:var(--rosa-fuerte);font-weight:600;font-size:.95rem;margin-top:8px}

/* ---------- días ---------- */
.days{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin}
.day{
  flex:0 0 auto;width:64px;padding:10px 0 12px;text-align:center;border-radius:16px;
  background:var(--crema);border:1.5px solid var(--linea);cursor:pointer;transition:all .2s;
}
.day:hover{border-color:var(--rosa)}
.day.sel{background:var(--rosa);border-color:var(--rosa);color:#fff}
.day.sel .dnum{color:#fff}
.day .dname{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--tinta-suave)}
.day.sel .dname{color:#FBDCE8}
.day .dnum{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-top:2px}
.day .dmes{font-size:.65rem;color:var(--tinta-suave)}
.day.sel .dmes{color:#FBDCE8}

/* ---------- horarios ---------- */
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:9px}
.slot{
  padding:11px 0;text-align:center;border-radius:13px;background:var(--crema);
  border:1.5px solid var(--linea);cursor:pointer;font-weight:500;font-size:.95rem;transition:all .15s;
}
.slot:hover{border-color:var(--rosa)}
.slot.sel{background:var(--rosa);border-color:var(--rosa);color:#fff;box-shadow:0 6px 16px rgba(217,98,139,.35)}
.slot.sel::before{content:'✦ '}
.empty-msg{color:var(--tinta-suave);font-size:.95rem;padding:16px;text-align:center;
  background:var(--crema);border-radius:14px;border:1.5px dashed var(--linea)}

/* ---------- confirmación ---------- */
.confirm{
  background:var(--crema);border-radius:22px;padding:24px;margin-top:6px;
  border:1.5px solid var(--linea);box-shadow:0 14px 40px rgba(70,36,47,.08);
  display:none;
}
.confirm.show{display:block;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.resumen{
  background:var(--blush);border-radius:14px;padding:14px 16px;margin-bottom:18px;
  font-size:.95rem;line-height:1.65;
}
.resumen b{font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--tinta-suave);margin-bottom:6px}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--linea);border-radius:13px;
  font-family:'Jost',sans-serif;font-size:1rem;color:var(--tinta);background:#FFFDFE;
}
.field input:focus{outline:none;border-color:var(--rosa)}
.btn{
  width:100%;padding:15px;border:none;border-radius:15px;cursor:pointer;
  background:var(--rosa-fuerte);color:#fff;font-family:'Jost',sans-serif;
  font-size:1.05rem;font-weight:600;letter-spacing:.5px;transition:all .2s;
}
.btn:hover{background:#A93F64;transform:translateY(-1px)}
.btn:disabled{opacity:.55;cursor:wait;transform:none}
.err{color:#B4304C;font-size:.9rem;margin-top:10px;text-align:center;display:none}

/* ---------- éxito ---------- */
.success{display:none;text-align:center;padding:40px 20px}
.success.show{display:block;animation:rise .4s ease}
.success .bigspark{font-size:3rem;color:var(--rosa);display:block;margin-bottom:12px}
.success h2{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:10px}
.success p{color:var(--tinta-suave);line-height:1.7}
.success .det{background:var(--crema);border:1.5px solid var(--linea);border-radius:16px;
  padding:18px;margin:22px auto 0;max-width:340px;text-align:left;line-height:1.8;font-size:.97rem}

footer{text-align:center;margin-top:50px;color:var(--tinta-suave);font-size:.8rem;letter-spacing:1px}
footer a{color:var(--rosa);text-decoration:none}
.loading{text-align:center;padding:60px 0;color:var(--tinta-suave)}
@media(max-width:420px){.services{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img class="logo" id="logoImg" alt="Once Once Glamstudio">
    <h1 id="bizName">Once Once Glamstudio</h1>
    <div class="tagline">Reserva tu cita</div>
  </header>

  <div id="loading" class="loading">Cargando disponibilidad…</div>

  <div id="booking" style="display:none">
    <!-- PASO 1: servicio -->
    <section class="step on" id="step1">
      <div class="step-label"><span class="spark">✦</span> Elige tu servicio</div>
      <div class="services" id="svcGrid"></div>
    </section>

    <!-- PASO 2: día -->
    <section class="step" id="step2">
      <div class="step-label"><span class="spark">✦</span> Elige el día</div>
      <div class="days" id="dayStrip"></div>
    </section>

    <!-- PASO 3: hora -->
    <section class="step" id="step3">
      <div class="step-label"><span class="spark">✦</span> Elige la hora</div>
      <div class="slots" id="slotGrid"></div>
    </section>

    <!-- CONFIRMAR -->
    <div class="confirm" id="confirmBox">
      <div class="resumen" id="resumen"></div>
      <div class="field">
        <label for="fName">Tu nombre</label>
        <input id="fName" type="text" placeholder="Nombre completo" autocomplete="name">
      </div>
      <div class="field">
        <label for="fPhone">Tu teléfono</label>
        <input id="fPhone" type="tel" placeholder="10 dígitos" autocomplete="tel" inputmode="numeric">
      </div>
      <button class="btn" id="btnConfirm">Confirmar reservación</button>
      <div class="err" id="errMsg"></div>
    </div>
  </div>

  <!-- ÉXITO -->
  <div class="success" id="successBox">
    <span class="bigspark">✦</span>
    <h2>¡Cita confirmada!</h2>
    <p>Te esperamos. Si necesitas cambiarla, llámanos con anticipación.</p>
    <div class="det" id="successDet"></div>
  </div>

  <footer>Powered by <a href="https://liaxa.mx">LIAXA</a> · todo en un enlace</footer>
</div>

FFFMAooooELmlFFFNAFKKKKYDqWiimhMcKKKKZJ//Z",

  services: [
    { id:"unas",       nombre:"Uñas",       duracion:60, precio:350 },
    { id:"cabello",    nombre:"Cabello",    duracion:90, precio:500 },
    { id:"facial",     nombre:"Facial",     duracion:45, precio:400 },
    { id:"maquillaje", nombre:"Maquillaje", duracion:60, precio:450 }
  ],

  /* Horario por día: 0=Dom … 6=Sáb. null = cerrado.
     open/close en minutos desde medianoche.        */
  hours: {
    0: null,                    // Domingo cerrado
    1: { open: 540, close: 1140 }, // Lun 9:00–19:00
    2: { open: 540, close: 1140 },
    3: { open: 540, close: 1140 },
    4: { open: 540, close: 1140 },
    5: { open: 540, close: 1140 }, // Vie
    6: { open: 540, close: 840 }   // Sáb 9:00–14:00
  },

  bookingWindowDays: 14,  // ventana de reservación
  slotStepMin: 30         // cada cuántos minutos inicia un turno
};
/* ================================================= */

const $ = id => document.getElementById(id);
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DIAS  = ["dom","lun","mar","mié","jue","vie","sáb"];

let DATA = { bookings: [], blocks: [] };
let sel = { service: null, date: null, time: null };

$("logoImg").src = CONFIG.logoBase64;

/* ---------- utilidades ---------- */
const toMin  = h => { const p = h.split(":"); return +p[0]*60 + +p[1]; };
const toHHMM = m => String(Math.floor(m/60)).padStart(2,"0") + ":" + String(m%60).padStart(2,"0");
const fmt12  = m => {
  let h = Math.floor(m/60), mm = String(m%60).padStart(2,"0");
  const ap = h >= 12 ? "pm" : "am"; h = h % 12 || 12;
  return h + ":" + mm + " " + ap;
};
const dateKey = d => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
const overlaps = (a1,a2,b1,b2) => a1 < b2 && b1 < a2;

/* ---------- cargar datos ---------- */
async function loadData(){
  try{
    const r = await fetch(CONFIG.scriptURL);
    const j = await r.json();
    DATA.bookings = (j.bookings||[]).filter(b => b.estado === "activa");
    DATA.blocks   = j.blocks || [];
  }catch(e){
    $("loading").textContent = "No pudimos cargar la disponibilidad. Revisa tu conexión e intenta de nuevo.";
    throw e;
  }
  $("loading").style.display = "none";
  $("booking").style.display = "block";
}

/* ---------- paso 1: servicios ---------- */
function renderServices(){
  $("svcGrid").innerHTML = CONFIG.services.map(s => `
    <div class="svc" data-id="${s.id}" tabindex="0" role="button" aria-label="${s.nombre}">
      <h3>${s.nombre}</h3>
      <div class="dur">${s.duracion} min</div>
      <div class="precio">$${s.precio} MXN</div>
    </div>`).join("");
  document.querySelectorAll(".svc").forEach(el=>{
    const pick = ()=>{
      document.querySelectorAll(".svc").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel");
      sel.service = CONFIG.services.find(s=>s.id===el.dataset.id);
      sel.date = null; sel.time = null;
      $("step2").classList.add("on");
      $("step3").classList.remove("on");
      hideConfirm();
      renderDays();
      $("step2").scrollIntoView({behavior:"smooth",block:"center"});
    };
    el.addEventListener("click",pick);
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();} });
  });
}

/* ---------- paso 2: días ---------- */
function renderDays(){
  const strip = $("dayStrip"); strip.innerHTML = "";
  const today = new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<CONFIG.bookingWindowDays;i++){
    const d = new Date(today); d.setDate(d.getDate()+i);
    if(!CONFIG.hours[d.getDay()]) continue; // cerrado
    const el = document.createElement("div");
    el.className = "day"; el.tabIndex = 0; el.setAttribute("role","button");
    el.innerHTML = `<div class="dname">${DIAS[d.getDay()]}</div>
                    <div class="dnum">${d.getDate()}</div>
                    <div class="dmes">${MESES[d.getMonth()]}</div>`;
    const pick = ()=>{
      strip.querySelectorAll(".day").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel");
      sel.date = dateKey(d); sel.time = null;
      $("step3").classList.add("on");
      hideConfirm();
      renderSlots(d);
      $("step3").scrollIntoView({behavior:"smooth",block:"center"});
    };
    el.addEventListener("click",pick);
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();} });
    strip.appendChild(el);
  }
}

/* ---------- paso 3: horarios ---------- */
function slotsForDay(d){
  const h = CONFIG.hours[d.getDay()];
  if(!h || !sel.service) return [];
  const key = dateKey(d);
  const dur = sel.service.duracion;
  const now = new Date();
  const isToday = dateKey(now) === key;
  const nowMin = now.getHours()*60 + now.getMinutes();

  const dayBookings = DATA.bookings.filter(b=>b.fecha===key);
  const dayBlocks   = DATA.blocks.filter(b=>b.fecha===key);

  const out = [];
  for(let t=h.open; t + dur <= h.close; t += CONFIG.slotStepMin){
    if(isToday && t <= nowMin) continue;
    const busy =
      dayBookings.some(b=>overlaps(t,t+dur,toMin(b.hora_inicio),toMin(b.hora_fin))) ||
      dayBlocks.some(b=>overlaps(t,t+dur,toMin(b.hora_inicio),toMin(b.hora_fin)));
    if(!busy) out.push(t);
  }
  return out;
}

function renderSlots(d){
  const grid = $("slotGrid");
  const slots = slotsForDay(d);
  if(!slots.length){
    grid.innerHTML = `<div class="empty-msg" style="grid-column:1/-1">No hay horarios disponibles este día para ${sel.service.nombre}. Prueba otro día ✦</div>`;
    return;
  }
  grid.innerHTML = slots.map(t=>`<div class="slot" data-t="${t}" tabindex="0" role="button">${fmt12(t)}</div>`).join("");
  grid.querySelectorAll(".slot").forEach(el=>{
    const pick = ()=>{
      grid.querySelectorAll(".slot").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel");
      sel.time = +el.dataset.t;
      showConfirm();
    };
    el.addEventListener("click",pick);
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();} });
  });
}

/* ---------- confirmación ---------- */
function showConfirm(){
  const [y,m,dd] = sel.date.split("-").map(Number);
  const d = new Date(y, m-1, dd);
  $("resumen").innerHTML =
    `✦ <b>${sel.service.nombre}</b> · ${sel.service.duracion} min · $${sel.service.precio} MXN<br>` +
    `✦ <b>${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}</b> a las <b>${fmt12(sel.time)}</b>`;
  $("confirmBox").classList.add("show");
  $("errMsg").style.display = "none";
  $("confirmBox").scrollIntoView({behavior:"smooth",block:"center"});
}
function hideConfirm(){ $("confirmBox").classList.remove("show"); }

$("btnConfirm").addEventListener("click", async ()=>{
  const nombre = $("fName").value.trim();
  const tel    = $("fPhone").value.replace(/\D/g,"");
  const err = $("errMsg");
  if(nombre.length < 2){ err.textContent = "Escribe tu nombre, por favor."; err.style.display="block"; return; }
  if(tel.length < 10){ err.textContent = "Escribe un teléfono de 10 dígitos."; err.style.display="block"; return; }

  const btn = $("btnConfirm");
  btn.disabled = true; btn.textContent = "Confirmando…";
  err.style.display = "none";

  try{
    const r = await fetch(CONFIG.scriptURL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" }, // evita preflight CORS
      body: JSON.stringify({
        action:"book",
        fecha: sel.date,
        hora_inicio: toHHMM(sel.time),
        duracion_min: sel.service.duracion,
        servicio: sel.service.nombre,
        nombre, telefono: tel
      })
    });
    const j = await r.json();
    if(j.ok){
      const [y,m,dd] = sel.date.split("-").map(Number);
      const d = new Date(y, m-1, dd);
      $("successDet").innerHTML =
        `<b>${nombre}</b><br>${sel.service.nombre} · ${fmt12(sel.time)}<br>` +
        `${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
      $("booking").style.display = "none";
      $("successBox").classList.add("show");
      window.scrollTo({top:0,behavior:"smooth"});
    }else if(j.error === "ocupado"){
      err.textContent = j.message || "Ese horario acaba de ocuparse. Elige otro.";
      err.style.display = "block";
      await loadData();                       // refresca disponibilidad
      const [y,m,dd] = sel.date.split("-").map(Number);
      renderSlots(new Date(y, m-1, dd));
      hideConfirm();
    }else{
      err.textContent = "Algo salió mal. Intenta de nuevo.";
      err.style.display = "block";
    }
  }catch(e){
    err.textContent = "No hay conexión. Intenta de nuevo.";
    err.style.display = "block";
  }
  btn.disabled = false; btn.textContent = "Confirmar reservación";
});

/* ---------- iniciar ---------- */
renderServices();
loadData();
</script>
</body>
</html>
