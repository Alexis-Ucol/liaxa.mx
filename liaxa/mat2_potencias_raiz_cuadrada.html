<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Potencias, Raíz Cuadrada y Notación Científica — Matemáticas · 2° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the SCHOOL CONFIG
   object at the top of <script> below. These :root values are only a
   fallback for the instant before applyBranding() runs.
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #1a3a6b;   /* PRIMARY      */
  --green-dark: #0f2244;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #e8edf5;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.55rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); text-align:left; }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); flex-wrap:wrap; }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.55rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; color:var(--text2); }
.callout p + p { margin-top:.5rem; }

/* ── INTERACTIVE CHIP CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); margin-bottom:.65rem; }
.rchips { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.55rem; }
.rchip { font-family:'IBM Plex Mono',monospace; font-size:.8rem; font-weight:600; padding:.4rem .6rem; border:1.5px solid var(--border); border-radius:6px; cursor:pointer; background:var(--surface2); color:var(--text2); transition:all .13s; user-select:none; text-align:center; min-width:54px; }
.rchip:hover { border-color:var(--green); }
.rchip.selected { border-color:var(--gold); background:var(--gold-bg); color:var(--text); }
.rchip.rt-strong-ok  { border-color:var(--ok);  background:var(--ok);  color:#fff; }
.rchip.rt-strong-bad { border-color:var(--bad); background:var(--bad); color:#fff; }
.rchip.rt-light-ok   { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.rchip.rt-light-bad  { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.rverify-btn { font-size:.72rem; font-weight:600; padding:.32rem .7rem; border-radius:6px; border:none; background:var(--green); color:#fff; cursor:pointer; }
.rverify-btn:hover { background:var(--green-dark); }
.rfb { font-size:.72rem; color:var(--text3); margin-top:.4rem; min-height:1rem; }

/* ── MATH FRACTIONS (stacked, never inline ÷) ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .2em; line-height:1.15; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .25em .12em; font-size:.92em; text-align:center; }
.mf-den   { padding:.12em .25em 0; font-size:.92em; text-align:center; }

/* ── EXPONENT BUILDER (fill-in-the-blank simplification practice) ── */
.expbuild { display:flex; align-items:flex-end; gap:.5rem; flex-wrap:wrap; font-family:'IBM Plex Mono',monospace; font-size:1.05rem; margin:.7rem 0; }
.expbox { width:46px; height:38px; text-align:center; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-family:inherit; font-size:1rem; }
.expbox:focus { outline:none; border-color:var(--green); }
.expbox.exp-ok  { border-color:var(--ok);  background:var(--ok-bg); }
.expbox.exp-bad { border-color:var(--bad); background:var(--bad-bg); }
.expop { font-weight:700; color:var(--text2); }
.expbase { font-weight:700; }
.expsup { display:inline-flex; align-items:center; position:relative; top:-11px; margin-left:.1rem; }
.expsup .expbox { width:36px; height:30px; font-size:.85rem; }
.expfb { font-size:.78rem; margin-top:.5rem; min-height:1.1rem; color:var(--text3); }
.expfb.ok  { color:var(--ok); font-weight:600; }
.expfb.bad { color:var(--bad); font-weight:600; }

/* ── INTERACTIVE WIDGET CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.iw-tag { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:.4rem; }
.iw-title { font-family:'Crimson Pro',serif; font-size:1.2rem; font-weight:700; margin-bottom:.5rem; }
.iw-desc { font-size:.85rem; color:var(--text2); margin-bottom:1rem; }

/* ── SCIENTIFIC NOTATION CONVERTER WIDGET ── */
.sci-row { display:flex; gap:.6rem; margin-bottom:1rem; flex-wrap:wrap; align-items:flex-end; }
.sci-row .finput { margin-bottom:0; flex:1; min-width:160px; }
.sci-btn { padding:.7rem 1.1rem; background:var(--green); color:#fff; border:none; border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sci-btn:hover { background:var(--green-dark); }
.sci-output { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; padding:.9rem 1rem; font-family:'IBM Plex Mono',monospace; font-size:.95rem; min-height:2.4rem; }
.sci-output .big { font-size:1.25rem; font-weight:700; color:var(--green-dark); }
.sci-hint { font-size:.76rem; color:var(--text3); margin-top:.6rem; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.3rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.25rem; }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .rules-grid { grid-template-columns: 1fr; }
  .rchip { font-size: .7rem; padding: .28rem .5rem; }
  .ladder-wrap { gap: .9rem; }
  .sieve-grid { grid-template-columns: repeat(5,1fr); gap: .3rem; max-width: 100%; }
  .sieve-cell { font-size: .68rem; border-radius: 4px; }
}
</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitle-el">Potencias, Raíz Cuadrada y Notación Científica</div>
    <div class="wcourse" id="wcourse-el">Matemáticas · 2° Secundaria</div>
    <label class="flabel" id="lbl-name-el" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 2A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Tienes una sesión guardada.</strong><br>
      <span id="restoreSub">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Continuar</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Nueva sesión</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lbt { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.1em; fill:var(--green); font-size:28px; }
          .lbl { stroke:var(--gold); stroke-width:2.5; }
          .lba { fill:var(--gold); }
        </style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Potencias, Raíz Cuadrada y N. Científica</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lht { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
          .lhl { stroke:var(--gold); stroke-width:2; }
          .lha { fill:var(--gold); }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var tt = s ^ (s >>> 16);
    tt = Math.imul(tt, 0x21f0aaad);
    tt ^= (tt >>> 15);
    tt = Math.imul(tt, 0x735a2d97);
    return ((tt ^ (tt >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ================================================

   ================================================ */
function isCanvasBlank(dc) {
  if (!dc || !dc.width) return true;
  var ref = document.createElement('canvas');
  ref.width = dc.width; ref.height = dc.height;
  var rctx = ref.getContext('2d');
  rctx.fillStyle = '#ffffff';
  rctx.fillRect(0, 0, ref.width, ref.height);
  return dc.toDataURL() === ref.toDataURL();
}
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — two-tap confirmation (Rule 8)
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.disabled = true;
  var origLbl = btn.innerHTML;
  btn.textContent = LANG === 'es' ? 'Generando PDF…' : 'Generating PDF…';

  try {
    var jspdf   = window.jspdf;
    var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
    var PW      = 215.9;
    var M       = 18;
    var TW      = PW - M * 2;
    var PH      = doc.internal.pageSize.height;
    var name    = studentData.name;
    var group   = studentData.group;
    var total   = problems.length;
    var pct     = Math.round(correctCount / total * 100);
    var dateStr = new Date().toLocaleString(LANG === 'es' ? 'es-MX' : 'en-US', { dateStyle:'long', timeStyle:'short' });

    var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
    var h = 0;
    for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
    var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

    var pBR = SCHOOL.pBR, pBG = SCHOOL.pBG, pBB = SCHOOL.pBB;
    var pAR = SCHOOL.pAR, pAG = SCHOOL.pAG, pAB = SCHOOL.pAB;

    function pdfText(html) {
      if (!html) return '';
      var SUP_MAP = {'\u2070':'0','\u00b9':'1','\u00b2':'2','\u00b3':'3','\u2074':'4','\u2075':'5','\u2076':'6','\u2077':'7','\u2078':'8','\u2079':'9','\u207b':'-'};
      var supRe = /[\u2070\u00b9\u00b2\u00b3\u2074-\u2079\u207b]+/g;
      var fracRe = /<span class="mf-outer"><span class="mf-num">([\s\S]*?)<\/span><span class="mf-den">([\s\S]*?)<\/span><\/span>/g;
      return html
        .replace(fracRe, function(_, num, den) {
          return '(' + num.replace(/<[^>]+>/g,'') + ')/(' + den.replace(/<[^>]+>/g,'') + ')';
        })
        .replace(supRe, function(run) {
          var digits = run.split('').map(function(ch){ return SUP_MAP[ch] || ''; }).join('');
          return '^' + digits;
        })
        .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
        .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
        .replace(/\u2192/g,'->').replace(/\u2212/g,'-')
        .replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
        .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
        .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
        .replace(/\s+/g,' ').trim();
    }

    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
    doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

    if (SCHOOL.logoLeftB64) {
      var fmtL = SCHOOL.logoLeftB64.indexOf('/9j/') > -1 ? 'JPEG' : 'PNG';
      try { doc.addImage(SCHOOL.logoLeftB64, fmtL, M, 4, 48, 22); } catch(e) {}
    }
    if (SCHOOL.logoRightB64) {
      var fmtR = SCHOOL.logoRightB64.indexOf('/9j/') > -1 ? 'JPEG' : 'PNG';
      try { doc.addImage(SCHOOL.logoRightB64, fmtR, 130, 4, 48, 22); } catch(e) {}
    }

    var lx = PW - M - 36;
    var ly = 10;
    doc.setDrawColor(pBR,pBG,pBB); doc.setLineWidth(0.7);
    doc.lines([[2.57-1.03,4.63-6.17],[4.11-2.57,5.14-4.63],[5.66-4.11,2.57-5.14]], lx+1.03, ly+6.17);
    doc.setFillColor(pAR,pAG,pAB); doc.circle(lx+5.66, ly+2.57, 0.9, 'F');
    doc.setDrawColor(pAR,pAG,pAB); doc.setLineWidth(0.7);
    doc.line(lx+8.23, ly+1.54, lx+8.23, ly+7.2);

/* ================================================
   SUPERSCRIPT HELPER (general — any integer, incl. negative)
   ================================================ */
var SUP_CHARS = { '0':'\u2070','1':'\u00b9','2':'\u00b2','3':'\u00b3','4':'\u2074','5':'\u2075','6':'\u2076','7':'\u2077','8':'\u2078','9':'\u2079','-':'\u207b' };
function toSuperscript(n) {
  return String(n).split('').map(function(ch) { return SUP_CHARS[ch] || ch; }).join('');
}
function formatWithCommas(numStr) {
  return numStr.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

/* ================================================
   INTERACTIVE CHIP CARDS — generic engine
   Used for: "equivalent expressions" (Concepto 1) and
   "perfect squares" (Concepto 2). Reuses the same
   strong/light verify pattern (selected = pink/gold;
   picks become strong green/red; the rest become a

   ================================================ */
function toggleRuleChip(el) {
  el.classList.toggle('selected');
  el.classList.remove('rt-strong-ok', 'rt-strong-bad', 'rt-light-ok', 'rt-light-bad');
}
function checkChipCard(containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  var chips = container.querySelectorAll('.rchip');
  var correctCount = 0;
  chips.forEach(function(chip) {
    var isTrue = chip.dataset.true === '1';
    var selected = chip.classList.contains('selected');
    var correct = (selected === isTrue);
    chip.classList.remove('rt-strong-ok', 'rt-strong-bad', 'rt-light-ok', 'rt-light-bad');
    if (selected) chip.classList.add(correct ? 'rt-strong-ok' : 'rt-strong-bad');
    else chip.classList.add(isTrue ? 'rt-light-ok' : 'rt-light-bad');

  if (fb) fb.textContent = correctCount + ' / ' + chips.length + (LANG === 'es' ? ' correctas' : ' correct');
}

/* ================================================
   EXPONENT BUILDER — interactive fill-in-the-blank
   simplification practice (Concepto 1)
   ================================================ */
var expBuilderData = {};
function genExpBuilderCase(rng, opType) {
  var base = pick([2, 3, 4, 5], rng);
  var m, n, result;
  if (opType === 'product') {
    m = 1 + Math.floor(rng() * 4);
    n = 1 + Math.floor(rng() * 4);
    result = m + n;
  } else if (opType === 'quotient') {
    n = 1 + Math.floor(rng() * 3);
    m = n + 1 + Math.floor(rng() * 3);
    result = m - n;
  } else {
    m = 1 + Math.floor(rng() * 3);
    n = 2 + Math.floor(rng() * 2);
    result = m * n;
  }
  return { base: base, opType: opType, m: m, n: n, result: result };
}
function checkExpBuilder(id, ordered) {
  var data = expBuilderData[id];
  if (!data) return;
  var b1 = document.getElementById(id + '_b1');
  var b2 = document.getElementById(id + '_b2');
  var b3 = document.getElementById(id + '_b3');
  var v1 = parseInt(b1.value, 10);
  var v2 = parseInt(b2.value, 10);
  var v3 = parseInt(b3.value, 10);
  [b1, b2, b3].forEach(function(b) { b.classList.remove('exp-ok', 'exp-bad'); });
  var pairOk;
  if (ordered) {
    var ok1 = v1 === data.m, ok2 = v2 === data.n;
    b1.classList.add(ok1 ? 'exp-ok' : 'exp-bad');
    b2.classList.add(ok2 ? 'exp-ok' : 'exp-bad');
    pairOk = ok1 && ok2;
  } else {
    pairOk = (v1 === data.m && v2 === data.n) || (v1 === data.n && v2 === data.m);
    b1.classList.add(pairOk ? 'exp-ok' : 'exp-bad');
    b2.classList.add(pairOk ? 'exp-ok' : 'exp-bad');
  }
  var resultOk = v3 === data.result;
  b3.classList.add(resultOk ? 'exp-ok' : 'exp-bad');
  var allOk = pairOk && resultOk;
  var fb = document.getElementById(id + '_fb');
  if (fb) {
    fb.textContent = allOk ? (LANG === 'es' ? '\u00a1Correcto!' : 'Correct!') : (LANG === 'es' ? 'Revisa tus respuestas.' : 'Check your answers.');
    fb.className = 'expfb ' + (allOk ? 'ok' : 'bad');
  }
}

/* ================================================
   POWER (EXPONENT) PROBLEM GENERATOR
   — tests the SIMPLIFIED EXPONENT FORM, not the
   final numeric value (e.g. answer is "2\u2077", not "128")
   ================================================ */
function genExponentProblem(rng) {
  var base = pick([2, 3, 4, 5], rng);
  var opType = pick(['product', 'quotient', 'power'], rng);
  var m, n, resultExp;
  if (opType === 'product') {
    m = 1 + Math.floor(rng() * 4);
    n = 1 + Math.floor(rng() * 4);
    resultExp = m + n;
  } else if (opType === 'quotient') {
    n = 1 + Math.floor(rng() * 3);
    m = n + 1 + Math.floor(rng() * 3);
    resultExp = m - n;
  } else {
    m = 1 + Math.floor(rng() * 3);
    n = 2 + Math.floor(rng() * 2);
    resultExp = m * n;
  }
  var wrongExps = (opType === 'product') ? [m * n, m, n] : (opType === 'quotient') ? [m + n, m, n] : [m + n, m, n];
  var wrongList = [];
  wrongExps.forEach(function(e) {
    if (e !== resultExp && e > 0 && wrongList.indexOf(e) === -1) wrongList.push(e);
  });
  var pad = 1;
  while (wrongList.length < 3) {
    var e2 = resultExp + pad;
    if (e2 !== resultExp && e2 > 0 && wrongList.indexOf(e2) === -1) wrongList.push(e2);
    pad++;
  }
  wrongList = wrongList.slice(0, 3);
  var correctStr = base + toSuperscript(resultExp);
  var wrongStrs = wrongList.map(function(e) { return base + toSuperscript(e); });
  var sh = shuffleOpts([correctStr].concat(wrongStrs), correctStr, rng);
  var exprText;
  if (opType === 'product') exprText = base + toSuperscript(m) + ' \u00d7 ' + base + toSuperscript(n);
  else if (opType === 'quotient') exprText = fracHtml(base + toSuperscript(m), base + toSuperscript(n));
  else exprText = '(' + base + toSuperscript(m) + ')' + toSuperscript(n);
  return { base: base, opType: opType, m: m, n: n, resultExp: resultExp, correctStr: correctStr, exprText: exprText, options: sh.opts, correctIdx: sh.correctIdx };
}

/* ================================================
   PERFECT SQUARES CHIP CARD (Concepto 2)
   ================================================ */
function genPerfectSquareChips(rng) {
  var squares = [4,9,16,25,36,49,64,81,100,121,144];
  var nonSquares = [12,18,20,28,30,40,45,50,60,70,90,110,130,150];
  var trueChips = shuffle(squares, rng).slice(0, 5).map(function(v){ return { text: String(v), val: v }; });
  var falseChips = shuffle(nonSquares, rng).slice(0, 5).map(function(v){ return { text: String(v), val: v }; });
  return shuffle(trueChips.concat(falseChips), rng);
}

/* ================================================
   SQUARE ROOT GENERATORS (Concepto 2)
   ================================================ */
function genSquareWordProblem(rng) {
  var side = 11 + Math.floor(rng() * 18); // 11-28
  var area = side * side;
  var wrongPool = shuffle([side - 2, side - 1, side + 1, side + 2, side + 3].filter(function(v){ return v > 0 && v !== side; }), rng);
  var wrongs = wrongPool.slice(0, 3);
  var sh = shuffleOpts([side].concat(wrongs).map(String), String(side), rng);
  return { side: side, area: area, options: sh.opts, correctIdx: sh.correctIdx };
}
function genSquareRootEstimate(rng) {
  var N, k;
  var guard = 0;
  do {
    N = 5 + Math.floor(rng() * 195);
    k = Math.floor(Math.sqrt(N));
    guard++;
  } while ((k * k === N || (k + 1) * (k + 1) === N) && guard < 50);
  return { N: N, k: k };
}

/* ================================================
   SCIENTIFIC NOTATION GENERATORS (Concepto 3 / 4)
   ================================================ */
function genMantissa(rng) {
  var mInt = 1 + Math.floor(rng() * 9);
  var mDec = Math.floor(rng() * 10);
  return { mInt: mInt, mDec: mDec, value: mInt + mDec / 10 };
}
function genSciLarge(rng) {
  var m = genMantissa(rng);
  var exp = 5 + Math.floor(rng() * 4); // 5..8
  var mantissaStr = m.mInt + '.' + m.mDec;
  var standardDigits = String(m.mInt) + String(m.mDec) + '0'.repeat(exp - 1);
  var standardStr = formatWithCommas(standardDigits);
  var correct = mantissaStr + ' \u00d7 10' + toSuperscript(exp);
  var wrongs = [
    mantissaStr + ' \u00d7 10' + toSuperscript(exp + 1),
    mantissaStr + ' \u00d7 10' + toSuperscript(exp - 1),
    String(Math.round(m.value * 10)) + ' \u00d7 10' + toSuperscript(exp - 1)
  ];
  var sh = shuffleOpts([correct].concat(wrongs), correct, rng);
  return { mantissaStr: mantissaStr, exp: exp, standardStr: standardStr, options: sh.opts, correctIdx: sh.correctIdx };
}
function genSciSmall(rng) {
  var m = genMantissa(rng);
  var expAbs = 3 + Math.floor(rng() * 4); // 3..6
  var mantissaStr = m.mInt + '.' + m.mDec;
  var standardStr = '0.' + '0'.repeat(expAbs - 1) + String(m.mInt) + String(m.mDec);
  var correct = mantissaStr + ' \u00d7 10' + toSuperscript(-expAbs);
  var wrongs = [
    mantissaStr + ' \u00d7 10' + toSuperscript(-(expAbs + 1)),
    mantissaStr + ' \u00d7 10' + toSuperscript(-(expAbs - 1)),
    String(Math.round(m.value * 10)) + ' \u00d7 10' + toSuperscript(-(expAbs - 1))
  ];
  var sh = shuffleOpts([correct].concat(wrongs), correct, rng);
  return { mantissaStr: mantissaStr, expAbs: expAbs, standardStr: standardStr, options: sh.opts, correctIdx: sh.correctIdx };
}

/* ================================================
   SCIENTIFIC NOTATION CONVERTER WIDGET (interactive)
   ================================================ */
function convertSci() {
  var input = document.getElementById('sciInput');
  var out = document.getElementById('sciOutput');
  var raw = input.value.trim();
  var n = parseFloat(raw);
  if (raw === '' || isNaN(n) || n === 0) {
    out.innerHTML = '<span class="sci-hint">' + (LANG === 'es' ? 'Escribe un número (grande o pequeño).' : 'Type a number (large or small).') + '</span>';
    return;
  }
  var neg = n < 0;
  var abs = Math.abs(n);
  var exp = Math.floor(Math.log10(abs));
  var mantissa = abs / Math.pow(10, exp);
  // guard rounding edge (e.g. 9.999999999 -> 10)
  if (mantissa >= 10) { mantissa = mantissa / 10; exp += 1; }
  if (mantissa < 1) { mantissa = mantissa * 10; exp -= 1; }
  var mantissaStr = mantissa.toFixed(2).replace(/0$/, '').replace(/\.$/, '.0');
  var result = (neg ? '-' : '') + mantissaStr + ' \u00d7 10' + toSuperscript(exp);
  out.innerHTML = (LANG === 'es' ? 'En notación científica: ' : 'In scientific notation: ') + '<span class="big">' + result + '</span>';
}

  var p1 = genExponentProblem(rng);

    '<p>' + (es

    '<div class="callout"><strong>' + (es?'Ejemplo guiado: convertir 45,000,000':'Guided example: converting 45,000,000') + '</strong>' +

      '<p>' + (es ? '<strong>Resultado: 45,000,000 = 4.5 × 10⁷</strong>' : '<strong>Result: 45,000,000 = 4.5 × 10⁷</strong>') + '</p>' +

  pushProblem({

      ? 'Para números muy pequeños (menores que 1), el exponente de 10 es <strong>negativo</strong>. El procedimiento es el mismo, pero el punto decimal se mueve hacia la <strong>derecha</strong>.'

    '</p>' +
    '<div class="callout"><strong>' + (es?'Ejemplo guiado: convertir 0.00032':'Guided example: converting 0.00032') + '</strong>' +

      '<p>' + (es ? '<strong>Paso 3:</strong> Ese número de lugares es el exponente de 10, pero negativo (porque el número es pequeño): 10⁻⁴.' : '<strong>Step 3:</strong> That number of places is the exponent of 10, but negative (because the number is small): 10⁻⁴.') + '</p>' +
      '<p>' + (es ? '<strong>Resultado: 0.00032 = 3.2 × 10⁻⁴</strong>' : '<strong>Result: 0.00032 = 3.2 × 10⁻⁴</strong>') + '</p>' +
    '</div>'
  );

  addRawWidget(
    '<div class="gcrd">' +
      '<div class="iw-tag">' + (es?'ELEMENTO INTERACTIVO':'INTERACTIVE ELEMENT') + ' · 3</div>' +
      '<div class="iw-title">' + (es?'🔄 Convertidor de Notación Científica':'🔄 Scientific Notation Converter') + '</div>' +
      '<div class="iw-desc">' + (es
        ? 'Escribe cualquier número (grande o pequeño, ej. 6800000 o 0.0045) y descubre al instante su notación científica.'
        : 'Type any number (large or small, e.g. 6800000 or 0.0045) and instantly discover its scientific notation.') +

      '<div class="sci-row">' +
        '<input class="finput" id="sciInput" type="number" step="any" placeholder="' + (es?'Escribe un número, ej. 0.0045':'Type a number, e.g. 0.0045') + '">' +

    options: [(se2.k-1)+(es?' y ':' and ')+se2.k, se2.k+(es?' y ':' and ')+(se2.k+1), (se2.k+1)+(es?' y ':' and ')+(se2.k+2), se2.k+(es?' y ':' and ')+(se2.k+2)],

    hint: es ? 'Busca los dos cuadrados perfectos consecutivos más cercanos a ' + se2.N + '.' : 'Find the two closest consecutive perfect squares around ' + se2.N + '.',
    explanation: es
      ? se2.k + '² = ' + (se2.k*se2.k) + ' y ' + (se2.k+1) + '² = ' + ((se2.k+1)*(se2.k+1)) + '. Como ' + (se2.k*se2.k) + ' < ' + se2.N + ' < ' + ((se2.k+1)*(se2.k+1)) + ', √' + se2.N + ' está entre ' + se2.k + ' y ' + (se2.k+1) + '.'
      : se2.k + '² = ' + (se2.k*se2.k) + ' and ' + (se2.k+1) + '² = ' + ((se2.k+1)*(se2.k+1)) + '. Since ' + (se2.k*se2.k) + ' < ' + se2.N + ' < ' + ((se2.k+1)*(se2.k+1)) + ', √' + se2.N + ' is between ' + se2.k + ' and ' + (se2.k+1) + '.'
  });

  var sl2 = genSciLarge(rng);
  pushProblem({
    title: es ? 'Repaso: Números Grandes' : 'Review: Large Numbers',
    questionText: es
      ? 'Un estadio puede albergar a <strong>' + sl2.standardStr + ' espectadores</strong> a lo largo de un año (sumando todos los eventos). ¿Cómo se escribe esta cifra en notación científica?'
      : 'A stadium hosts <strong>' + sl2.standardStr + ' spectators</strong> over the course of a year (across all events). How is this figure written in scientific notation?',
    options: sl2.options,
    correctIdx: sl2.correctIdx,
    hint: es ? 'Coloca el punto decimal después del primer dígito y cuenta los lugares que se movió a la izquierda.' : 'Place the decimal point after the first digit and count the places it moved to the left.',
    explanation: es
      ? sl2.standardStr + ' = ' + sl2.mantissaStr + ' × 10' + toSuperscript(sl2.exp) + '.'
      : sl2.standardStr + ' = ' + sl2.mantissaStr + ' × 10' + toSuperscript(sl2.exp) + '.'
  });

      ? ss2.standardStr + ' = ' + ss2.mantissaStr + ' × 10' + toSuperscript(-ss2.expAbs) + '.'
      : ss2.standardStr + ' = ' + ss2.mantissaStr + ' × 10' + toSuperscript(-ss2.expAbs) + '.'
  });
