<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguridad Digital — Cultura Digital I</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #E87722;
  --green-dark: #c45e0a;
  --green-bg:   #fef0e2;
  --gold:       #2B3B8C;
  --gold-bg:    #e8ecf7;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a;--surface:#242420;--surface2:#2e2e28;--border:#3a3830;
  --text:#e8e4da;--text2:#b0aa9e;--text3:#7a7468;--shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#f09040;--green-dark:#f5a860;--green-bg:#2a1a08;
  --gold:#5a6fbc;--gold-bg:#0e1228;
  --ok:#4a9a6f;--ok-bg:rgba(74,154,111,.12);--bad:#c05030;--bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}

/* WELCOME */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:80px;width:auto;object-fit:contain;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);}
#restoreBar strong{color:var(--gold);}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem;}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;}
.rbtn-yes{background:var(--green);color:#fff;}
.rbtn-yes:hover{background:var(--green-dark);}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

/* LESSON */
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos img{height:36px;width:auto;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}

/* CONTENT */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout.info{background:var(--gold-bg);border-color:var(--gold);}
.callout.info strong{color:var(--gold);}

/* THREAT CARDS */
.threat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem;margin:1rem 0;}
.threat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.threat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.tc-front,.tc-back{padding:1rem;}
.tc-icon{font-size:2rem;margin-bottom:.4rem;}
.tc-name{font-weight:700;font-size:.88rem;margin-bottom:.25rem;}
.tc-desc{font-size:.76rem;color:var(--text3);}
.tc-back{display:none;background:var(--bad-bg);border-top:2px solid var(--bad);}
.tc-danger{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--bad);font-weight:700;margin-bottom:.3rem;}
.tc-detail{font-size:.8rem;color:var(--text2);}
.threat-card.flipped .tc-front{display:none;}
.threat-card.flipped .tc-back{display:block;}

/* PASSWORD METER */
.pw-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0;}
.pw-input-row{display:flex;gap:.6rem;align-items:center;margin-bottom:.8rem;}
.pw-input-row input{flex:1;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:'IBM Plex Mono',monospace;}
.pw-input-row input:focus{outline:none;border-color:var(--green);}
.pw-toggle{padding:.5rem .8rem;background:none;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:.8rem;color:var(--text2);}
.pw-bar-wrap{height:8px;background:var(--surface2);border-radius:4px;margin-bottom:.6rem;overflow:hidden;}
.pw-bar{height:100%;width:0%;border-radius:4px;transition:width .3s,background .3s;}
.pw-label{font-size:.78rem;font-weight:700;margin-bottom:.6rem;}
.pw-checks{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem;font-size:.75rem;color:var(--text3);margin-bottom:.7rem;}
.pw-check.met{color:var(--ok);font-weight:600;}
.pw-time{background:var(--surface2);border-radius:8px;padding:.6rem .9rem;font-size:.82rem;}
.pw-time span{font-weight:700;font-family:'IBM Plex Mono',monospace;}

/* RULES GRID */
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green);}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem;}
.rnote{font-size:.76rem;color:var(--text3);}

/* DIGITAL FOOTPRINT CANVAS */
.fp-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;margin:1rem 0;text-align:center;}
.fp-canvas{display:block;width:100%;height:200px;border-radius:8px;background:#f8f6f1;border:1px solid var(--border);margin-bottom:.7rem;}
.fp-actions{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center;}
.fp-btn{padding:.38rem .85rem;border:none;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;color:#fff;}

/* PROBLEM CARDS */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}

@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;}
  .wlogos img{height:60px;}
  .wtitle{font-size:1.35rem;}
  .htitle{display:none;}
  .hlogos img{height:28px;}
  .lbody{padding:1.2rem .7rem 3rem;}
  .section h2{font-size:1.3rem;}
  .threat-grid{grid-template-columns:1fr 1fr;}
  .pw-checks{grid-template-columns:1fr;}
}
</style>
</head>

<script>
var studentData = {};
var problems = [];

/* SESSION */
function lsKey(){var n=(studentData.name||'').trim();var g=(studentData.group||'').trim();return 'segdig_anahuac__'+(n+'__'+g).replace(/\s+/g,'_');}
function saveSession(){
  if(!studentData.name)return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var blank=document.createElement('canvas');blank.width=dc.width;blank.height=dc.height;drawings.push(dc.toDataURL()===blank.toDataURL()?null:dc.toDataURL('image/png'));}else{drawings.push(null);}
    var ta=document.getElementById('ta'+i);texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}
function loadSession(n,g){var key='segdig_anahuac__'+(n+'__'+g).replace(/\s+/g,'_');try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}}
function restoreSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group);if(!saved)return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};answeredCount=0;correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  saved.choices.forEach(function(choice,idx){if(choice!==null&&choice!==undefined)confirmMC(idx,choice);});
  setTimeout(function(){
    if(saved.drawings)saved.drawings.forEach(function(d,i){if(!d)return;var dc=document.getElementById('dc'+i);if(!dc||!dc.width)return;var img=new Image();img.onload=function(){var dpr=window.devicePixelRatio||1;dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr);};img.src=d;});
    if(saved.texts)saved.texts.forEach(function(t,i){var ta=document.getElementById('ta'+i);if(ta&&t)ta.value=t;});
    if(saved.photos)saved.photos.forEach(function(d,i){if(!d)return;var pp=document.getElementById('pp'+i);if(!pp)return;pp.src=d;pp.style.display='block';var pz=document.getElementById('pz'+i);if(pz)pz.style.opacity='0.4';});
  },300);
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}
function checkForSavedSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var saved=loadSession(name,group);
  document.getElementById('restoreBar').style.display=(saved&&saved.choices&&saved.choices.some(function(c){return c!==null;}))?'block':'none';
}
var answeredCount=0,correctCount=0;

/* THEME */
var THEME_KEY='segdig_anahuac__theme';
function toggleTheme(){var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';try{localStorage.setItem(THEME_KEY,next);}catch(e){}}
(function(){document.documentElement.setAttribute('data-theme','light');try{var t=localStorage.getItem(THEME_KEY);if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('themeBtn');if(b)b.textContent='☀️';});}}catch(e){}})();

/* RNG */
function seededRng(seed){var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function ri(min,max,rng){return min+Math.floor(rng()*(max-min+1));}

/* START */
function startLesson(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!name||!group){err.textContent='Por favor llena ambos campos.';return;}
  err.textContent='';
  studentData={name:name,group:group};answeredCount=0;correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
}

/* CANVAS */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);ctx.strokeStyle='#E87722';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen'))ctx.lineWidth=2;
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});
      dot.classList.add('sel');ctx.strokeStyle=dot.dataset.color;
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}
function switchTab(idx,panel,btn){
  var prefix='wp_'+idx+'_';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){p.classList.remove('active');});
  document.getElementById(prefix+panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
function handlePhoto(idx,input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){var img=document.getElementById('pp'+idx);img.src=e.target.result;img.style.display='block';document.getElementById('pz'+idx).style.opacity='0.4';saveSession();};
  reader.readAsDataURL(input.files[0]);
}
function toggleHint(idx){document.getElementById('hint'+idx).classList.toggle('show');}
function showResults(){
  var rb=document.getElementById('s_results');if(!rb)return;
  rb.style.display='block';
  setTimeout(function(){rb.classList.add('vis');rb.scrollIntoView({behavior:'smooth',block:'center'});},50);
}

/* MC */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
  saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);
}

/* PASSWORD STRENGTH (based on zxcvbn methodology + NIST SP 800-63B) */
function calcPasswordStrength(pw) {
  var score = 0;
  var checks = {
    length8:  pw.length >= 8,
    length12: pw.length >= 12,
    upper:    /[A-Z]/.test(pw),
    lower:    /[a-z]/.test(pw),
    number:   /[0-9]/.test(pw),
    symbol:   /[^A-Za-z0-9]/.test(pw)
  };
  // Entropy-based scoring (NIST / zxcvbn inspired)
  // Charset size
  var cs = 0;
  if(checks.lower)  cs += 26;
  if(checks.upper)  cs += 26;
  if(checks.number) cs += 10;
  if(checks.symbol) cs += 32;
  if(cs === 0) cs = 26;
  var entropy = pw.length * Math.log2(cs);
  // Crack time at 10B guesses/sec (fast offline attack — GPU cluster, bcrypt excluded)
  // This is conservative: online rate is ~100/s, offline bcrypt ~10K/s, MD5 ~10B/s
  var guesses = Math.pow(2, entropy);
  var ratePerSec = 1e10; // 10 billion/s (fast hash offline)
  var seconds = guesses / ratePerSec;
  var timeStr;
  if(seconds < 1)             timeStr = 'menos de 1 segundo';
  else if(seconds < 60)       timeStr = Math.round(seconds) + ' segundos';
  else if(seconds < 3600)     timeStr = Math.round(seconds/60) + ' minutos';
  else if(seconds < 86400)    timeStr = Math.round(seconds/3600) + ' horas';
  else if(seconds < 2592000)  timeStr = Math.round(seconds/86400) + ' días';
  else if(seconds < 31536000) timeStr = Math.round(seconds/2592000) + ' meses';
  else if(seconds < 3.15e9)   timeStr = Math.round(seconds/31536000) + ' años';
  else if(seconds < 3.15e12)  timeStr = Math.round(seconds/3.15e9) + ' miles de años';
  else                        timeStr = 'más de un millón de años ✓';
  // Score 0-4
  score = 0;
  if(pw.length >= 8)  score++;
  if(pw.length >= 12) score++;
  if(checks.upper && checks.lower) score++;
  if(checks.number)  score++;
  if(checks.symbol)  score++;
  // Penalize common patterns
  if(/^[a-z]+$/.test(pw) || /^[0-9]+$/.test(pw)) score = Math.max(0, score-2);
  if(/(.)\1{2,}/.test(pw)) score = Math.max(0, score-1); // repeated chars
  score = Math.min(4, score);
  var labels = ['Muy débil','Débil','Regular','Fuerte','Muy fuerte'];
  var colors = ['#c0392b','#e67e22','#f1c40f','#2ecc71','#27ae60'];
  return { score:score, label:labels[score], color:colors[score], timeStr:timeStr, checks:checks, entropy:Math.round(entropy) };
}

function updatePasswordMeter(inputId) {
  var pw = document.getElementById(inputId).value;
  var r  = calcPasswordStrength(pw);
  var pct = pw.length === 0 ? 0 : Math.max(10, (r.score+1)*20);
  var bar = document.getElementById('pw-bar');
  var lbl = document.getElementById('pw-label');
  var timeEl = document.getElementById('pw-time-val');
  var entropyEl = document.getElementById('pw-entropy');
  if(bar) { bar.style.width = pct+'%'; bar.style.background = r.color; }
  if(lbl) { lbl.textContent = pw.length === 0 ? 'Escribe una contraseña...' : r.label; lbl.style.color = pw.length ? r.color : 'var(--text3)'; }
  if(timeEl) timeEl.textContent = r.timeStr;
  if(entropyEl) entropyEl.textContent = Math.round(r.entropy) + ' bits';
  var checkMap = { 'chk-len8': r.checks.length8, 'chk-len12': r.checks.length12, 'chk-upper': r.checks.upper, 'chk-number': r.checks.number, 'chk-symbol': r.checks.symbol };
  Object.keys(checkMap).forEach(function(id) {
    var el = document.getElementById(id); if(el) el.className = 'pw-check' + (checkMap[id] ? ' met' : '');
  });
}

function togglePwVis(inputId) {

}

/* FOOTPRINT ANIMATION */
function initFootprintCanvas() {
  var canvas = document.getElementById('fpCanvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  canvas.width  = canvas.offsetWidth;
  canvas.height = 200;
  var traces = [];
  var icons = ['🔍','❤️','📍','🛒','📱','💬','📧','🎵','🎮','📺'];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#f8f6f1';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#ddd8cc';ctx.font='11px IBM Plex Mono';
  ctx.fillText('Tu actividad digital aparece aquí → presiona los botones',20,canvas.height/2);

  window.addFootprint = function(type, label, color) {
    var x = 30 + Math.random()*(canvas.width-80);
    var y = 30 + Math.random()*(canvas.height-60);
    traces.push({x:x,y:y,type:type,label:label,color:color,alpha:1,r:type==='perm'?18:14});
    drawTraces();
  };

  function drawTraces() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#f8f6f1';ctx.fillRect(0,0,canvas.width,canvas.height);
    if(traces.length===0){ctx.fillStyle='#ddd8cc';ctx.font='11px IBM Plex Mono';ctx.fillText('Tu actividad digital aparece aquí → presiona los botones',20,canvas.height/2);return;}
    // Draw connections
    ctx.strokeStyle='rgba(139,37,0,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
    for(var i=1;i<traces.length;i++){ctx.beginPath();ctx.moveTo(traces[i-1].x,traces[i-1].y);ctx.lineTo(traces[i].x,traces[i].y);ctx.stroke();}
    ctx.setLineDash([]);
    traces.forEach(function(t){
      ctx.globalAlpha=t.alpha;
      ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,2*Math.PI);
      ctx.fillStyle=t.color;ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 10px IBM Plex Mono';ctx.textAlign='center';
      ctx.fillText(t.type==='perm'?'●':'○',t.x,t.y+4);
      ctx.fillStyle='#1a1a16';ctx.font='9px IBM Plex Mono';ctx.textAlign='left';
      ctx.fillText(t.label,t.x+t.r+3,t.y+4);
      ctx.globalAlpha=1;
    });
    ctx.textAlign='left';
    // Legend
    ctx.font='9px IBM Plex Mono';ctx.fillStyle='#8b2500';ctx.fillText('● Permanente',8,canvas.height-8);
    ctx.fillStyle='#2B3B8C';ctx.fillText('○ Temporal',100,canvas.height-8);
    ctx.fillStyle='#4a4640';ctx.fillText('Total registros: '+traces.length,canvas.width-110,canvas.height-8);
  }
}

  doc.setTextColor(20,24,32);doc.setFontSize(11);doc.setFont('helvetica','bold');

  doc.text(pct+'%',PW/2,124,{align:'center'});

  doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');

  for(var i=0;i<problems.length;i++){

    doc.setTextColor(26,106,74);doc.setFontSize(8);doc.setFont('helvetica','normal');coLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);});ay+=coLines.length*5+3;
    doc.setTextColor(90,85,80);doc.setFontSize(7.5);exLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);});wy+=ansBoxH+5;
    doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F');doc.text('TRABAJO DEL ALUMNO',M+4,wy+5.5);wy+=11;

    if(ta&&ta.value.trim()){if(wy>PH-30){doc.addPage();wy=20;}doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('courier','normal');var taLines=doc.splitTextToSize(ta.value,TW);taLines.slice(0,16).forEach(function(ln){if(wy>PH-15){doc.addPage();wy=20;}doc.text(ln,M,wy);wy+=5;});wy+=2;}

    if(pp&&pp.src&&pp.src.indexOf('data:')===0){if(wy>PH-55){doc.addPage();wy=20;}try{doc.addImage(pp.src,'JPEG',M,wy,TW,68);wy+=72;}catch(e){}}
  }
  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){
    doc.setPage(p);doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');

  }
  doc.save('seguridad_digital_anahuac_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='⬇ &nbsp;Descargar Resultados PDF';btn.disabled=false;
}
