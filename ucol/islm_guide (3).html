<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo IS-LM — Macroeconomía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
  --is-color:   #1d4e89;
  --lm-color:   #b84c1a;
  --eq-color:   #2d6a4f;
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28; --border:#3a3830;
  --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468; --shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#6aaa5f; --green-dark:#8ecf82; --green-bg:#1a281a;
  --gold:#d4b86a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }
#restoreBar { display:none; background:var(--green-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--is-color); }
.mnum.ps { color:var(--lm-color); }
.mnum.ts { color:var(--eq-color); }
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
/* ── IS-LM SPECIFIC ── */
/* Annotated equation display */
.eq-block { background:var(--surface2); border-radius:8px; padding:.75rem 1rem; margin-top:.9rem; font-size:.78rem; color:var(--text2); line-height:1; }
.eq-step { display:flex; flex-direction:column; gap:.18rem; margin-bottom:.65rem; }
.eq-step:last-child { margin-bottom:0; }
.eq-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); font-weight:600; }
.eq-formula { font-family:'IBM Plex Mono',monospace; font-size:.78rem; color:var(--text); padding:.28rem .5rem; background:var(--surface); border-radius:5px; border-left:3px solid var(--border); }
.eq-formula.is-line { border-left-color:var(--is-color); }
.eq-formula.lm-line { border-left-color:var(--lm-color); }
.eq-formula.eq-line { border-left-color:var(--eq-color); }
.eq-formula strong { color:var(--eq-color); }
.eq-sub { font-size:.7rem; color:var(--text3); margin-top:.1rem; font-style:italic; padding-left:.5rem; }
.eq-arrow { color:var(--text3); font-size:.7rem; padding:.1rem 0 .1rem .5rem; }
.eq-divider { border:none; border-top:1px dashed var(--border); margin:.5rem 0; }
.shock-bank { display:flex; flex-wrap:wrap; gap:.5rem; padding:.8rem; background:var(--surface2); border-radius:10px; margin-bottom:.9rem; min-height:52px; border:1.5px dashed var(--border); }
.shock-token { padding:.38rem .85rem; border-radius:20px; font-size:.8rem; font-weight:600; cursor:grab; user-select:none; border:1.5px solid var(--green); background:var(--green-bg); color:var(--green-dark); transition:all .15s; touch-action:none; }
.shock-token:active { cursor:grabbing; opacity:.7; }
.shock-token:hover { border-color:var(--green-dark); background:var(--green); color:#fff; }
.shock-token.tok-correct { border-color:var(--ok); background:var(--ok-bg); color:var(--ok); }
.shock-token.tok-incorrect { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.drop-zone { border:2px dashed var(--border); border-radius:10px; padding:.7rem; min-height:54px; display:flex; flex-wrap:wrap; gap:.45rem; align-items:center; transition:all .2s; }
.drop-zone.over { border-color:var(--gold); background:var(--gold-bg); }
.drop-zone.correct { border-color:var(--ok); background:var(--ok-bg); }
.drop-zone.incorrect { border-color:var(--bad); background:var(--bad-bg); }
.drop-zone-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); font-weight:600; margin-bottom:.35rem; }
.dz-placeholder { font-size:.78rem; color:var(--text3); font-style:italic; }
.drop-zones-grid { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-bottom:.9rem; }
@media(max-width:500px){ .drop-zones-grid { grid-template-columns:1fr; } }
.verify-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.3rem; font-size:.85rem; font-weight:600; cursor:pointer; margin-top:.5rem; }
.verify-btn:disabled { opacity:.5; cursor:default; }
.shock-fb { font-size:.82rem; padding:.6rem .85rem; border-radius:8px; margin-top:.6rem; display:none; }
.shock-fb.show { display:block; }
.shock-fb.ok { background:var(--ok-bg); color:var(--ok); }
.shock-fb.bad { background:var(--bad-bg); color:var(--bad); }
.policy-badge { display:inline-block; padding:.22rem .75rem; border-radius:20px; font-size:.75rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-bottom:.5rem; }
.policy-badge.fiscal { background:var(--green-bg); color:var(--green-dark); }
.policy-badge.monetary { background:#fff0e8; color:#8b3a10; }
.policy-badge.neutral { background:var(--surface2); color:var(--text3); }
/* ── MOBILE ── */
@media (max-width:600px) {
  .wcard { padding:1.6rem 1.1rem; border-radius:12px; }
  .wlogos img { height:38px; }
  .wtitle { font-size:1.35rem; }
  .htitle { display:none; }
  .hlogos img { height:20px; }
  .hchip { font-size:.63rem; padding:.15rem .45rem; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
  .lbody { padding:1.2rem .7rem 3rem; }
  .section h2 { font-size:1.3rem; }
  .rules-grid { grid-template-columns:1fr; }
  .metrics { grid-template-columns:repeat(2,1fr); }
  .pbody { padding:.75rem; }
  .pstmt { font-size:.84rem; }
  .mcopt { font-size:.83rem; padding:.58rem .7rem; }
  .dcanvas { height:220px; }
  .ctoolbar { gap:.25rem; }
  .callout { padding:.8rem .9rem; }
  .rcard { overflow-x:auto; }
  .drop-zones-grid { grid-template-columns:1fr; }
}
</style>
</head>

/* ── SEEDED RNG ── */
function seededRng(seed){
  var s=0;
  for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function shuffleOpts(opts,correct,rng){var arr=opts.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return{opts:arr,correctIdx:arr.indexOf(correct)};}

function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen')){ctx.lineWidth=2;}
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');
      ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});

/* ── MC HANDLER ── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;

  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');

}

/* ── IS-LM MODEL ENGINE ── */
var MODEL={c:0.8,b:200,k:0.5,h:100,T:100,I0:150,C0:50}; // overwritten per student
function isR(Y,G){return(MODEL.C0-MODEL.c*MODEL.T+MODEL.I0+G-(1-MODEL.c)*Y)/MODEL.b;}
function lmR(Y,M){return(MODEL.k*Y-M)/MODEL.h;}
function equilibrium(G,M){
  var A=MODEL.h*(MODEL.C0-MODEL.c*MODEL.T+MODEL.I0+G)+MODEL.b*M;
  var B=MODEL.b*MODEL.k+MODEL.h*(1-MODEL.c);
  var Ystar=A/B;
  var rstar=lmR(Ystar,M);
  return{Y:Math.round(Ystar),r:Math.round(rstar*10)/10};
}

/* ── CANVAS DRAWING ── */
function drawISLMcanvas(canvas,G,M,G0,M0){
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var W=canvas.width/dpr,H=canvas.height/dpr;
  ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.scale(dpr,dpr);
  var pad={l:52,r:22,t:18,b:40};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  // Dynamic axis: scale to current MODEL so curves always fit
  var eqRef=equilibrium(G0!==undefined?G0:G, M0!==undefined?M0:M);
  var eqCur=equilibrium(G,M);
  var refY=Math.max(eqRef.Y,eqCur.Y,200);
  var Ymax=Math.ceil(refY*2.2/100)*100; Ymax=Math.max(Ymax,400);
  var Ymin=0;
  var rMax=Math.max(Math.ceil(Math.max(eqRef.r,eqCur.r,0)*1.8+2),8);
  var rMin=Math.min(Math.floor(Math.min(eqCur.r,eqRef.r)*1.2-1),-1);
  var Ystep=Ymax<=800?100:Ymax<=1600?200:500;
  var rstep=rMax<=10?2:rMax<=20?4:5;
  function tx(Y){return pad.l+(Y-Ymin)/(Ymax-Ymin)*cW;}
  function ty(r){return pad.t+(1-(r-rMin)/(rMax-rMin))*cH;}
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=isDark?'#1e2128':'#ffffff';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';ctx.lineWidth=1;
  for(var rg=Math.floor(rMin/rstep)*rstep;rg<=rMax;rg+=rstep){ctx.beginPath();ctx.moveTo(pad.l,ty(rg));ctx.lineTo(pad.l+cW,ty(rg));ctx.stroke();}
  for(var yg=0;yg<=Ymax;yg+=Ystep){ctx.beginPath();ctx.moveTo(tx(yg),pad.t);ctx.lineTo(tx(yg),pad.t+cH);ctx.stroke();}
  ctx.strokeStyle=isDark?'#343c48':'#d0d8e4';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t-2);ctx.lineTo(pad.l,pad.t+cH+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.l-4,pad.t+cH);ctx.lineTo(pad.l+cW,pad.t+cH);ctx.stroke();
  ctx.fillStyle=isDark?'#6a7488':'#6a7488';ctx.font='10px IBM Plex Mono,monospace';
  ctx.textAlign='right';
  for(var ra=Math.ceil(rMin/rstep)*rstep;ra<=rMax;ra+=rstep)ctx.fillText(ra+'%',pad.l-5,ty(ra)+3);
  ctx.textAlign='center';
  for(var ya=Ystep;ya<=Ymax;ya+=Ystep)ctx.fillText(ya,tx(ya),pad.t+cH+14);
  ctx.textAlign='left';ctx.fillText('r',pad.l-14,pad.t+6);
  ctx.textAlign='right';ctx.fillText('Y',pad.l+cW+4,pad.t+cH+3);
  function drawCurve(fn,color,label,dashed,alpha){
    ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.globalAlpha=alpha||1;
    if(dashed)ctx.setLineDash([6,4]);
    ctx.beginPath();var first=true;
    for(var Y=Ymin;Y<=Ymax;Y+=6){
      var r=fn(Y);if(r<rMin-1||r>rMax+1){first=true;continue;}
      var x=tx(Y),y=ty(r);if(first){ctx.moveTo(x,y);first=false;}else{ctx.lineTo(x,y);}
    }
    ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    var lY=1080,lR=fn(lY);
    if(lR>=rMin&&lR<=rMax){ctx.fillStyle=color;ctx.font='bold 12px IBM Plex Mono,monospace';ctx.textAlign='left';ctx.fillText(label,tx(lY)+4,ty(lR)-4);}
    ctx.restore();
  }
  if(G0!==undefined&&G0!==G)drawCurve(function(Y){return isR(Y,G0);},'#1d4e89','IS\u2080',true,0.28);
  if(M0!==undefined&&M0!==M)drawCurve(function(Y){return lmR(Y,M0);},'#b84c1a','LM\u2080',true,0.28);
  drawCurve(function(Y){return isR(Y,G);},'#1d4e89','IS',false,1);
  drawCurve(function(Y){return lmR(Y,M);},'#b84c1a','LM',false,1);
  var eq=equilibrium(G,M);
  var ex=tx(eq.Y),ey=ty(eq.r);
  ctx.save();ctx.strokeStyle='#2d7a4f';ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(pad.l,ey);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex,pad.t+cH);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  ctx.beginPath();ctx.arc(ex,ey,6,0,2*Math.PI);ctx.fillStyle='#2d7a4f';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#2d7a4f';ctx.font='bold 11px IBM Plex Mono,monospace';ctx.textAlign='left';ctx.fillText('E',ex+8,ey-4);
  ctx.restore();
}

      '<div id="'+containerId+'_eqs"></div>'+

  var dpr=window.devicePixelRatio||1;
  function resizeCv(){var rect=cv.getBoundingClientRect();cv.width=rect.width*dpr;cv.height=rect.height*dpr;cv.getContext('2d').scale(dpr,dpr);}
  setTimeout(function(){

      document.getElementById(containerId+'_mpol').textContent=pol;
      // Live equation display
      var eqEl=document.getElementById(containerId+'_eqs');
      if(eqEl){
        var autoIS=Math.round(MODEL.C0-MODEL.c*MODEL.T+MODEL.I0+G);
        var A=MODEL.h*autoIS+MODEL.b*M;
        var B=MODEL.b*MODEL.k+MODEL.h*(1-MODEL.c);
        var Ystar=Math.round(A/B);
        var rstar=Math.round((MODEL.k*Ystar-M)/MODEL.h*10)/10;
        var Bdisp=Math.round(B*10)/10;
        var mc=Math.round((1-MODEL.c)*10)/10;
        eqEl.innerHTML=
          '<div class="eq-step">'+
            '<div class="eq-label">Curva IS &mdash; despejando r del mercado de bienes</div>'+
            '<div class="eq-formula is-line">r = (C\u2080 \u2212 cT + I\u2080 + G \u2212 (1\u2212c)\xb7Y) / b</div>'+
            '<div class="eq-sub">Con C\u2080='+MODEL.C0+', c='+MODEL.c+', T='+MODEL.T+', I\u2080='+MODEL.I0+', G='+G+', b='+MODEL.b+':</div>'+
            '<div class="eq-formula is-line">r = ('+MODEL.C0+' \u2212 '+MODEL.c+'\xd7'+MODEL.T+' + '+MODEL.I0+' + '+G+' \u2212 '+mc+'\xb7Y) / '+MODEL.b+' &nbsp;\u2192&nbsp; r = ('+autoIS+' \u2212 '+mc+'\xb7Y) / '+MODEL.b+'</div>'+
            '<div class="eq-sub">'+autoIS+' = '+MODEL.C0+' \u2212 ('+MODEL.c+'\xd7'+MODEL.T+') + '+MODEL.I0+' + '+G+' &nbsp;[gasto aut\xf3nomo]</div>'+
          '</div>'+
          '<div class="eq-step">'+
            '<div class="eq-label">Curva LM &mdash; despejando r del mercado de dinero</div>'+
            '<div class="eq-formula lm-line">r = (k\xb7Y \u2212 M) / h</div>'+
            '<div class="eq-sub">Con k='+MODEL.k+', M='+M+', h='+MODEL.h+':</div>'+
            '<div class="eq-formula lm-line">r = ('+MODEL.k+'\xb7Y \u2212 '+M+') / '+MODEL.h+'</div>'+
          '</div>'+
          '<div class="eq-step">'+
            '<div class="eq-label">Equilibrio IS = LM &mdash; igualando ambas r y despejando Y*</div>'+
            '<div class="eq-formula eq-line">Y* = [h\xd7(C\u2080\u2212cT+I\u2080+G) + b\xd7M] / [b\xb7k + h\xb7(1\u2212c)]</div>'+
            '<div class="eq-sub">Numerador: h\xd7(gasto aut\xf3nomo) + b\xd7M = '+MODEL.h+'\xd7'+autoIS+' + '+MODEL.b+'\xd7'+M+' = '+(MODEL.h*autoIS+MODEL.b*M)+'</div>'+
            '<div class="eq-sub">Denominador: b\xb7k + h\xb7(1\u2212c) = '+MODEL.b+'\xd7'+MODEL.k+' + '+MODEL.h+'\xd7'+mc+' = '+Bdisp+'</div>'+
            '<div class="eq-formula eq-line"><strong>Y* = '+(MODEL.h*autoIS+MODEL.b*M)+' / '+Bdisp+' = '+Ystar+'</strong></div>'+
          '</div>'+
          '<div class="eq-step">'+
            '<div class="eq-label">Tasa de inter\xe9s de equilibrio r* &mdash; sustituyendo Y* en LM</div>'+
            '<div class="eq-formula eq-line">r* = (k\xb7Y* \u2212 M) / h = ('+MODEL.k+'\xd7'+Ystar+' \u2212 '+M+') / '+MODEL.h+'</div>'+
            '<div class="eq-sub">= ('+Math.round(MODEL.k*Ystar)+' \u2212 '+M+') / '+MODEL.h+' = '+Math.round(MODEL.k*Ystar-M)+' / '+MODEL.h+'</div>'+
            '<div class="eq-formula eq-line"><strong>r* = '+rstar+'%</strong></div>'+
          '</div>';
      }
      var badge=document.getElementById(containerId+'_badge');
      if(gC&&!mC){badge.className='policy-badge fiscal';badge.textContent=G>baseG?'\ud83d\udcc8 Pol\xedtica fiscal expansiva':'\ud83d\udcc9 Pol\xedtica fiscal contractiva';}
      else if(!gC&&mC){badge.className='policy-badge monetary';badge.textContent=M>baseM?'\ud83d\udcb0 Pol\xedtica monetaria expansiva':'\ud83d\udd12 Pol\xedtica monetaria contractiva';}
      else if(gC&&mC){badge.className='policy-badge fiscal';badge.textContent='\u2699\ufe0f Pol\xedtica mixta';}
      else{badge.className='policy-badge neutral';badge.textContent='\u2696\ufe0f Sin cambio de pol\xedtica';}
    }
    document.getElementById(containerId+'_gslide').addEventListener('input',redraw);
    document.getElementById(containerId+'_mslide').addEventListener('input',redraw);
    redraw();
  },120);
}

var shockWidgetState={};
function buildShockWidget(containerId,tokens,zones,verifyId,feedbackId){
  shockWidgetState[containerId]={tokens:tokens,zones:zones,placements:{},feedbackId:feedbackId};
  var el=document.getElementById(containerId);if(!el)return;

  bankHtml+='<div class="shock-bank" id="'+containerId+'_bank">';
  tokens.forEach(function(tk){bankHtml+='<div class="shock-token '+tk.cls+'" id="stoken_'+tk.id+'" draggable="true" data-token="'+tk.id+'">'+tk.label+'</div>';});
  bankHtml+='</div>';
  var zonesHtml='<div class="drop-zones-grid">';
  zones.forEach(function(z){zonesHtml+='<div><div class="drop-zone-label">'+z.label+'</div><div class="drop-zone" id="dzone_'+z.id+'" data-zone="'+z.id+'"><span class="dz-placeholder" id="dz_ph_'+z.id+'">Suelta aqu\xed\u2026</span></div></div>';});
  zonesHtml+='</div>';
  el.innerHTML=bankHtml+zonesHtml+'<button class="verify-btn" id="'+verifyId+'" onclick="verifyShocks(\''+containerId+'\',\''+feedbackId+'\')">Verificar</button><div class="shock-fb" id="'+feedbackId+'"></div>';
  setTimeout(function(){
    tokens.forEach(function(tk){
      var tokenEl=document.getElementById('stoken_'+tk.id);if(!tokenEl)return;
      tokenEl.addEventListener('dragstart',function(e){e.dataTransfer.setData('text/plain',tk.id);});
      var touchOffX=0,touchOffY=0,ghost=null;
      tokenEl.addEventListener('touchstart',function(e){var t=e.touches[0];var r=tokenEl.getBoundingClientRect();touchOffX=t.clientX-r.left;touchOffY=t.clientY-r.top;ghost=tokenEl.cloneNode(true);ghost.style.cssText='position:fixed;opacity:.8;pointer-events:none;z-index:9999;left:'+(t.clientX-touchOffX)+'px;top:'+(t.clientY-touchOffY)+'px;';document.body.appendChild(ghost);e.preventDefault();},{passive:false});
      tokenEl.addEventListener('touchmove',function(e){var t=e.touches[0];if(ghost){ghost.style.left=(t.clientX-touchOffX)+'px';ghost.style.top=(t.clientY-touchOffY)+'px';}e.preventDefault();},{passive:false});
      tokenEl.addEventListener('touchend',function(e){if(ghost){document.body.removeChild(ghost);ghost=null;}var t=e.changedTouches[0];var dropTarget=document.elementFromPoint(t.clientX,t.clientY);var zone=dropTarget?dropTarget.closest('.drop-zone'):null;if(zone)dropTokenToZone(containerId,tk.id,zone.dataset.zone);e.preventDefault();},{passive:false});
    });
    zones.forEach(function(z){
      var zoneEl=document.getElementById('dzone_'+z.id);if(!zoneEl)return;
      zoneEl.addEventListener('dragover',function(e){e.preventDefault();zoneEl.classList.add('over');});
      zoneEl.addEventListener('dragleave',function(){zoneEl.classList.remove('over');});
      zoneEl.addEventListener('drop',function(e){e.preventDefault();zoneEl.classList.remove('over');var tokenId=e.dataTransfer.getData('text/plain');dropTokenToZone(containerId,tokenId,z.id);});
    });
  },60);
}
function dropTokenToZone(containerId,tokenId,zoneId){
  var state=shockWidgetState[containerId];if(!state)return;
  var prevZone=state.placements[tokenId];
  if(prevZone){var pze=document.getElementById('dzone_'+prevZone);var ot=pze?pze.querySelector('[data-token="'+tokenId+'"]'):null;if(ot)pze.removeChild(ot);delete state.placements[tokenId];}
  var bankEl=document.getElementById(containerId+'_bank');
  var bankToken=bankEl?bankEl.querySelector('[data-token="'+tokenId+'"]'):null;
  if(bankToken)bankEl.removeChild(bankToken);
  var zoneEl=document.getElementById('dzone_'+zoneId);if(!zoneEl)return;
  var ph=document.getElementById('dz_ph_'+zoneId);if(ph)ph.style.display='none';
  var tk=state.tokens.find(function(t){return t.id===tokenId;});if(!tk)return;
  var newToken=document.createElement('div');
  newToken.className='shock-token '+tk.cls;newToken.dataset.token=tokenId;newToken.draggable=true;newToken.textContent=tk.label;
  newToken.addEventListener('dragstart',function(e){e.dataTransfer.setData('text/plain',tokenId);});
  var tox=0,toy=0,gh=null;
  newToken.addEventListener('touchstart',function(e){var t=e.touches[0];var r=newToken.getBoundingClientRect();tox=t.clientX-r.left;toy=t.clientY-r.top;gh=newToken.cloneNode(true);gh.style.cssText='position:fixed;opacity:.8;pointer-events:none;z-index:9999;left:'+(t.clientX-tox)+'px;top:'+(t.clientY-toy)+'px;';document.body.appendChild(gh);e.preventDefault();},{passive:false});
  newToken.addEventListener('touchmove',function(e){var t=e.touches[0];if(gh){gh.style.left=(t.clientX-tox)+'px';gh.style.top=(t.clientY-toy)+'px';}e.preventDefault();},{passive:false});
  newToken.addEventListener('touchend',function(e){if(gh){document.body.removeChild(gh);gh=null;}var t=e.changedTouches[0];var dt=document.elementFromPoint(t.clientX,t.clientY);var zone=dt?dt.closest('.drop-zone'):null;if(zone)dropTokenToZone(containerId,tokenId,zone.dataset.zone);e.preventDefault();},{passive:false});
  newToken.classList.remove('tok-correct','tok-incorrect');zoneEl.appendChild(newToken);state.placements[tokenId]=zoneId;
  var fbId=shockWidgetState[containerId]?shockWidgetState[containerId].feedbackId:containerId+'_fb';var fbEl=document.getElementById(fbId);if(fbEl){fbEl.className='shock-fb';fbEl.textContent='';}
  state.zones.forEach(function(z){var ze=document.getElementById('dzone_'+z.id);if(ze)ze.classList.remove('correct','incorrect');});
}
function verifyShocks(containerId,feedbackId){
  var state=shockWidgetState[containerId];if(!state)return;
  var allCorrect=true;
  var totalPlaced=Object.keys(state.placements).length;
  if(totalPlaced<state.tokens.length){var fbEl=document.getElementById(feedbackId);if(fbEl){fbEl.className='shock-fb show bad';fbEl.textContent='Coloca todos los eventos antes de verificar.';}return;}
  // First pass: determine correctness per zone (a zone is correct only if ALL tokens in it belong there)
  var zoneHasError={};
  state.tokens.forEach(function(tk){
    var placed=state.placements[tk.id];
    if(placed!==tk.correct_zone){allCorrect=false;zoneHasError[placed]=true;}
  });
  // Second pass: color each zone AND each token
  state.tokens.forEach(function(tk){
    var placed=state.placements[tk.id];
    var isCorrect=placed===tk.correct_zone;
    var zoneEl=document.getElementById('dzone_'+placed);
    if(zoneEl){zoneEl.classList.remove('correct','incorrect');zoneEl.classList.add(zoneHasError[placed]?'incorrect':'correct');}
    // color this specific token
    var tokEl=zoneEl?zoneEl.querySelector('[data-token="'+tk.id+'"]'):null;
    if(tokEl){tokEl.classList.remove('tok-correct','tok-incorrect');tokEl.classList.add(isCorrect?'tok-correct':'tok-incorrect');}
  });
  var fbEl=document.getElementById(feedbackId);
  if(fbEl){
    if(allCorrect){fbEl.className='shock-fb show ok';fbEl.textContent='\u2713 \xa1Perfecto! Identificaste correctamente qu\xe9 eventos desplazan IS (mercado de bienes) y cu\xe1les desplazan LM (mercado de dinero).';}
    else{fbEl.className='shock-fb show bad';fbEl.textContent='\u2717 Algunas clasificaciones son incorrectas. Los eventos marcados en rojo est\xe1n en la curva equivocada. Int\xe9ntalo de nuevo.';}
  }
}

/* ── POLICY LAB SCENARIOS ── */
var _polBase={G:200,M:250}; // overwritten in buildLesson
function runScenario(type){
  var polCv=document.getElementById('pol_cv');if(!polCv)return;
  var G0=_polBase.G,M0=_polBase.M,G1=G0,M1=M0;
  if(type==='fiscal_exp'){G1=G0+150;}
  if(type==='fiscal_con'){G1=G0-100;}
  if(type==='monet_exp'){M1=M0+150;}
  if(type==='monet_con'){M1=M0-100;}
  if(type==='mixed'){G1=G0+120;M1=M0+120;}
  var steps=50,step=0;
  function frame(){
    var t=step/steps;var ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    var G=G0+(G1-G0)*ease,M=M0+(M1-M0)*ease;
    drawISLMcanvas(polCv,G,M,G0,M0);
    var eq=equilibrium(G,M);
    document.getElementById('pol_my').textContent=eq.Y;
    document.getElementById('pol_mr').textContent=eq.r+'%';
    if(step>=steps){
      var stepsEl=document.getElementById('pol_steps');
      var eq0=equilibrium(G0,M0),eq1=equilibrium(G1,M1);
      var dY=eq1.Y-eq0.Y,dr=Math.round((eq1.r-eq0.r)*10)/10;
      // Full equation breakdown for policy lab
      if(stepsEl){
        var auto0=Math.round(MODEL.C0-MODEL.c*MODEL.T+MODEL.I0+G0);
        var auto1=Math.round(MODEL.C0-MODEL.c*MODEL.T+MODEL.I0+G1);
        var B=MODEL.b*MODEL.k+MODEL.h*(1-MODEL.c);
        var A0=MODEL.h*auto0+MODEL.b*M0;
        var A1=MODEL.h*auto1+MODEL.b*M1;
        var isChange=G1!==G0,lmChange=M1!==M0;
        var shiftLine='';
        if(isChange)shiftLine+='<span style="color:var(--is-color);font-weight:700">IS:</span> G: '+G0+' \u2192 '+G1+' &nbsp;|&nbsp; Gasto aut\xf3nomo: '+auto0+' \u2192 '+auto1+'<br>';
        if(lmChange)shiftLine+='<span style="color:var(--lm-color);font-weight:700">LM:</span> M: '+M0+' \u2192 '+M1+'<br>';
        var Bpol=Math.round((MODEL.b*MODEL.k+MODEL.h*(1-MODEL.c))*10)/10;
        var mc2=Math.round((1-MODEL.c)*10)/10;
        var numA0=MODEL.h*auto0+MODEL.b*M0;
        var numA1=MODEL.h*auto1+MODEL.b*M1;
        var html='';
        // Step 1: what changed
        if(isChange){
          html+='<div class="eq-step">'+
            '<div class="eq-label" style="color:var(--is-color)">Paso 1 &mdash; Desplazamiento de IS (mercado de bienes)</div>'+
            '<div class="eq-formula is-line">G cambia de '+G0+' \u2192 '+G1+' &nbsp;(\u0394G = '+(G1>G0?'+':'\u2212')+Math.abs(G1-G0)+')</div>'+
            '<div class="eq-sub">Gasto aut\xf3nomo (C\u2080\u2212cT+I\u2080+G): '+auto0+' \u2192 <strong>'+auto1+'</strong> &nbsp;\u21d2 IS se desplaza a la '+(G1>G0?'derecha \u2192':'izquierda \u2190')+'</div>'+
          '</div>';
        }
        if(lmChange){
          html+='<div class="eq-step">'+
            '<div class="eq-label" style="color:var(--lm-color)">Paso '+(isChange?'2':'1')+' &mdash; Desplazamiento de LM (mercado de dinero)</div>'+
            '<div class="eq-formula lm-line">M cambia de '+M0+' \u2192 '+M1+' &nbsp;(\u0394M = '+(M1>M0?'+':'\u2212')+Math.abs(M1-M0)+')</div>'+
            '<div class="eq-sub">Con mayor M, la LM se desplaza a la '+(M1>M0?'derecha \u2192 baja r de equilibrio':'izquierda \u2190 sube r de equilibrio')+'</div>'+
          '</div>';
        }
        var paso2=(isChange&&lmChange)?3:(2);
        // Step 2: Y* calculation
        html+='<div class="eq-step">'+
          '<div class="eq-label" style="color:var(--eq-color)">Paso '+paso2+' &mdash; Nuevo Y* (producto de equilibrio)</div>'+
          '<div class="eq-formula eq-line">Y* = [h\xd7(C\u2080\u2212cT+I\u2080+G) + b\xd7M] / [b\xb7k + h\xb7(1\u2212c)]</div>'+
          '<div class="eq-sub">Numerador: '+MODEL.h+'\xd7'+auto1+' + '+MODEL.b+'\xd7'+M1+' = '+numA1+'</div>'+
          '<div class="eq-sub">Denominador: '+MODEL.b+'\xd7'+MODEL.k+' + '+MODEL.h+'\xd7'+mc2+' = '+Bpol+' &nbsp;[constante, no cambia]</div>'+
          '<div class="eq-formula eq-line"><strong>Y* = '+numA1+' / '+Bpol+' = '+eq1.Y+'</strong></div>'+
          '<div class="eq-sub">\u0394Y = '+eq1.Y+' \u2212 '+eq0.Y+' = <strong>'+(dY>=0?'+':'')+dY+'</strong> '+(dY>0?'(expansi\xf3n)':dY<0?'(contracci\xf3n)':'(sin cambio)')+'</div>'+
        '</div>';
        // Step 3: r* calculation
        html+='<div class="eq-step">'+
          '<div class="eq-label" style="color:var(--eq-color)">Paso '+(paso2+1)+' &mdash; Nueva r* (tasa de inter\xe9s de equilibrio)</div>'+
          '<div class="eq-formula eq-line">r* = (k\xb7Y* \u2212 M) / h = ('+MODEL.k+'\xd7'+eq1.Y+' \u2212 '+M1+') / '+MODEL.h+'</div>'+
          '<div class="eq-sub">= ('+Math.round(MODEL.k*eq1.Y)+' \u2212 '+M1+') / '+MODEL.h+' = '+Math.round(MODEL.k*eq1.Y-M1)+' / '+MODEL.h+'</div>'+
          '<div class="eq-formula eq-line"><strong>r* = '+eq1.r+'%</strong></div>'+
          '<div class="eq-sub">\u0394r = '+(dr>=0?'+':'')+dr+'% '+(dr>0?'(sube \u2014 crowding out parcial)':dr<0?'(baja \u2014 est\xedmulo a la inversi\xf3n)':'(sin cambio en r*)')+'</div>'+
        '</div>';
        stepsEl.innerHTML=html;
      }
      var badgeEl=document.getElementById('pol_badge');
      var curveEl=document.getElementById('pol_curve');
      var badgeInfo={
        'fiscal_exp':['policy-badge fiscal','\ud83d\udcc8 Pol\xedtica fiscal expansiva','IS \u2192'],
        'fiscal_con':['policy-badge fiscal','\ud83d\udcc9 Pol\xedtica fiscal contractiva','IS \u2190'],
        'monet_exp':['policy-badge monetary','\ud83d\udcb0 Pol\xedtica monetaria expansiva','LM \u2192'],
        'monet_con':['policy-badge monetary','\ud83d\udd12 Pol\xedtica monetaria contractiva','LM \u2190'],
        'mixed':['policy-badge fiscal','\u2699\ufe0f Pol\xedtica mixta','IS+LM \u2192']
      };
      if(badgeEl&&badgeInfo[type]){badgeEl.className=badgeInfo[type][0];badgeEl.textContent=badgeInfo[type][1];}
      if(curveEl&&badgeInfo[type])curveEl.textContent=badgeInfo[type][2];
      document.querySelectorAll('#policy_lab .mtab').forEach(function(b){b.classList.remove('active');});
      return;
    }
    step++;requestAnimationFrame(frame);
  }
  document.querySelectorAll('#policy_lab .mtab').forEach(function(b){b.classList.remove('active');});
  if(window.event&&window.event.target)window.event.target.classList.add('active');
  frame();
}

/* ── BUILD LESSON ── */
function buildLesson(rng){
  var lb=document.getElementById('lessonBody');

  /* ─── SECTION 1: Qué es IS-LM ─── */
  var s1=document.createElement('div');s1.className='section';s1.id='s1';
  s1.innerHTML=
    '<div class="stag">Concepto 1</div>'+
    '<h2>\xbfQu\xe9 es el modelo IS-LM?</h2>'+
    '<p>El modelo IS-LM es la herramienta central de la macroeconom\xeda para analizar c\xf3mo interact\xfaan el <strong>mercado de bienes</strong> y el <strong>mercado de dinero</strong> en la determinaci\xf3n simult\xe1nea del producto (Y) y la tasa de inter\xe9s (r).</p>'+
    '<p>Fue desarrollado por John Hicks en 1937 como interpretaci\xf3n formal de Keynes. Es el marco est\xe1ndar para evaluar el impacto de la <em>pol\xedtica fiscal y monetaria</em>.</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Curva IS</div><div class="rform">Mercado de bienes</div><div class="rnote">Todos los pares (Y, r) donde la inversi\xf3n iguala al ahorro. Pendiente negativa: \u2191r \u2192 \u2193I \u2192 \u2193Y.</div></div>'+
      '<div class="rcard" style="border-top-color:#b84c1a"><div class="rname">Curva LM</div><div class="rform">Mercado de dinero</div><div class="rnote">Todos los pares (Y, r) donde la demanda de dinero iguala a la oferta. Pendiente positiva: \u2191Y \u2192 \u2191demanda de dinero \u2192 \u2191r.</div></div>'+
      '<div class="rcard" style="border-top-color:#2d7a4f"><div class="rname">Equilibrio</div><div class="rform">Intersecci\xf3n IS \u2229 LM</div><div class="rnote">El \xfanico punto donde ambos mercados est\xe1n en equilibrio al mismo tiempo. Determina Y* y r*.</div></div>'+
    '</div>'+
    '<div class="callout"><p><strong>Idea clave:</strong> El equilibrio macroecon\xf3mico es la intersecci\xf3n de <em>dos equilibrios simult\xe1neos</em>. Mover la pol\xedtica fiscal desplaza IS; mover la pol\xedtica monetaria desplaza LM.</p></div>';
  lb.appendChild(s1);

  /* Problem 1 */
  var p1o=shuffleOpts(['Ambos mercados est\xe1n en equilibrio simult\xe1neamente','Solo el mercado de bienes est\xe1 en equilibrio','La tasa de inter\xe9s es igual al producto','El ahorro es igual al consumo'],'Ambos mercados est\xe1n en equilibrio simult\xe1neamente',rng);
  problems.push({title:'Significado del equilibrio IS-LM',questionText:'\xbfQu\xe9 representa el punto de intersecci\xf3n entre las curvas IS y LM?',fn:'',options:p1o.opts,correctIdx:p1o.correctIdx,hint:'Piensa en qu\xe9 representa cada curva por separado, y qu\xe9 ocurre cuando coinciden.',explanation:'La intersecci\xf3n IS-LM es el \xfanico punto donde el mercado de bienes Y el mercado de dinero est\xe1n en equilibrio al mismo tiempo. Fuera de ese punto, al menos un mercado est\xe1 desequilibrado.',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ─── SECTION 2: Curva IS ─── */
  var c2=Math.round((0.6+rng()*0.3)*10)/10;
  var b2=Math.round(150+rng()*150);
  var G2=Math.round(100+rng()*200);
  var T2=Math.round(80+rng()*80);
  var I02=Math.round(100+rng()*100);

/* ── LOGO LAYOUT INIT ── */
(function(){
  document.addEventListener('DOMContentLoaded',function(){
    var ll=document.getElementById('logo-left');var lr=document.getElementById('logo-right');var sep=document.getElementById('wlogsep');
    var hasL=ll&&ll.src&&ll.src!==window.location.href;var hasR=lr&&lr.src&&lr.src!==window.location.href;
    if(hasL){ll.style.display='inline-block';}if(hasR){lr.style.display='inline-block';}
    if(hasL&&hasR){sep.style.display='block';}
    if((hasL&&!hasR)||(!hasL&&hasR)){document.getElementById('wlogos').style.justifyContent='center';}
    var hl=document.getElementById('hlogo-left');var hr=document.getElementById('hlogo-right');
    if(hl&&hl.src&&hl.src!==window.location.href)hl.style.display='inline-block';
    if(hr&&hr.src&&hr.src!==window.location.href)hr.style.display='inline-block';
  });
})();

/* ── PDF ── */
async function generatePDF(){
  var btn=document.getElementById('dlBtn');btn.textContent='Generando PDF\u2026';btn.disabled=true;
  var jspdf=window.jspdf;
  var doc=new jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  var PW=215.9,M=18,TW=PW-M*2,PH=doc.internal.pageSize.height;
  var name=studentData.name,group=studentData.group,total=problems.length;
  var pct=Math.round(correctCount/total*100);
  var dateStr=new Date().toLocaleString('es-MX',{dateStyle:'long',timeStyle:'short'});
  var raw=name+'|'+group+'|'+correctCount+'|'+total+'|'+new Date().toDateString();
  var h=0;for(var ci=0;ci<raw.length;ci++)h=(Math.imul(31,h)+raw.charCodeAt(ci))|0;
  var code=Math.abs(h).toString(36).toUpperCase().slice(0,8);
  var pBR=74,pBG=124,pBB=63;
  var pAR=201,pAG=168,pAB=76;
  function pdfText(html){
    if(!html)return'';
    return html.replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'').replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2').replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/').replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=').replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...').replace(/\s+/g,' ').trim();
  }
  doc.setFillColor(pAR,pAG,pAB);doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255);doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB);doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB);doc.rect(0,30,PW,34,'F');
  // ── Institution logos on cover — left logo (Facultad), right logo (UdeC) ──
  var llEl=document.getElementById('logo-left');
  if(llEl&&llEl.src&&llEl.src.indexOf('data:')===0){
    try{
      var llType=llEl.src.indexOf('data:image/png')===0?'PNG':'JPEG';
      var llH=20, llW=llEl.naturalWidth?llH*(llEl.naturalWidth/(llEl.naturalHeight||llEl.naturalWidth)):20;
      doc.addImage(llEl.src,llType,M,4,llW,llH);
    }catch(e){}
  }
  var lrEl=document.getElementById('logo-right');
  if(lrEl&&lrEl.src&&lrEl.src.indexOf('data:')===0){
    try{
      var lrType=lrEl.src.indexOf('data:image/png')===0?'PNG':'JPEG';
      var lrH=18, lrW=lrEl.naturalWidth?lrH*(lrEl.naturalWidth/(lrEl.naturalHeight||lrEl.naturalWidth)):45;
      doc.addImage(lrEl.src,lrType,M+24,5,lrW,lrH);
    }catch(e){}
  }
  var lx=PW-M-36,ly=10;
  doc.setDrawColor(pBR,pBG,pBB);doc.setLineWidth(0.7);
  doc.lines([[2.57-1.03,4.63-6.17],[4.11-2.57,5.14-4.63],[5.66-4.11,2.57-5.14]],lx+1.03,ly+6.17);
  doc.setFillColor(pAR,pAG,pAB);doc.circle(lx+5.66,ly+2.57,0.9,'F');
  doc.setDrawColor(pAR,pAG,pAB);doc.setLineWidth(0.7);doc.line(lx+8.23,ly+1.54,lx+8.23,ly+7.2);
  doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('LIAXA',lx+10,ly+6.8);
  doc.setTextColor(232,238,247);doc.setFontSize(19);doc.setFont('helvetica','bold');doc.text('Modelo IS-LM',M,49);
  doc.setTextColor(150,165,200);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(dateStr,M,59);
  doc.setFillColor(237,240,245);doc.roundedRect(M,72,TW,20,3,3,'F');
  doc.setTextColor(130,140,160);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
  doc.text('ALUMNO',M+4,79);doc.text('GRUPO',130,79);
  doc.setTextColor(20,24,32);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text(name,M+4,87);doc.text(group,130,87);
  var sc=pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255);doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]);doc.setLineWidth(0.8);doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFontSize(40);doc.setFont('helvetica','bold');doc.text(pct+'%',PW/2,124,{align:'center'});
  doc.setTextColor(130,140,160);doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.text(correctCount+' correcta(s) de '+total+' preguntas',PW/2,131,{align:'center'});
  doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F');doc.text('RESUMEN DE PROBLEMAS',M+4,148);
  var sy=154;
  problems.forEach(function(prob,i){
    if(sy+12>PH-15){doc.addPage();sy=20;doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.rect(M,sy,TW,8,'F');doc.text('RESUMEN DE PROBLEMAS (continuaci\xf3n)',M+4,sy+6);sy+=12;}
    var ok=document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255,ok?240:232,ok?232:228);doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176,ok?106:48,ok?74:16);doc.circle(M+6,sy+5,2.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.text(ok?'\u2713':'\u2717',M+4.5,sy+6.5);
    doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Problema '+(i+1)+': '+pdfText(prob.title),M+12,sy+6.5);
    doc.setTextColor(ok?26:176,ok?106:48,ok?74:16);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text(ok?'Correcto':'Incorrecto',PW-M-24,sy+6.5);
    sy+=12;
  });
  for(var i=0;i<problems.length;i++){
    var prob=problems[i];doc.addPage();var wy=0;
    doc.setFillColor(pBR,pBG,pBB);doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB);doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text('Macroeconom\xeda  \xb7  Modelo IS-LM',M,10);
    doc.setTextColor(232,238,247);doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.text('Problema '+(i+1)+' de '+total+'  \u2014  '+pdfText(prob.title),M,17);
    wy=25;
    var qRaw=pdfText(prob.questionText);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
    var qLines=doc.splitTextToSize(qRaw,TW-10);var qBoxH=8+qLines.length*5+3;
    doc.setFillColor(237,240,245);doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.text('PREGUNTA',M+4,wy+6);
    doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
    var qy=wy+12;qLines.forEach(function(ln,li){doc.text(ln,M+4,qy+li*5);});
    wy+=qBoxH+4;
    var isOk=document.getElementById('pc'+i).classList.contains('ok');
    var chosen=prob.studentChoice!=null?pdfText(prob.options[prob.studentChoice]||'\u2014'):'\u2014';
    var corr=pdfText(prob.options[prob.correctIdx]||'');
    var expRaw=pdfText(prob.explanation||'');
    doc.setFontSize(8.5);var chLines=doc.splitTextToSize('Alumno: '+chosen,TW-18);
    doc.setFontSize(8);var coLines=doc.splitTextToSize('Correcto: '+corr,TW-18);
    doc.setFontSize(7.5);var exLines=doc.splitTextToSize('Soluci\xf3n: '+expRaw,TW-18).slice(0,4);
    var ansBoxH=8+chLines.length*5.5+coLines.length*5+exLines.length*5+6;
    doc.setFillColor(isOk?232:255,isOk?240:232,isOk?232:228);doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176,isOk?106:48,isOk?74:16);doc.circle(M+7,wy+8,3.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(isOk?'\u2713':'\u2717',M+5.2,wy+10.5);
    var ay=wy+7;
    doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5.5);});ay+=chLines.length*5.5+3;
    doc.setTextColor(26,106,74);doc.setFontSize(8);doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);});ay+=coLines.length*5+3;
    doc.setTextColor(90,85,80);doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);});
    wy+=ansBoxH+5;
    doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F');doc.text('TRABAJO DEL ALUMNO',M+4,wy+5.5);wy+=11;
    var dc=document.getElementById('dc'+i);
    if(dc){try{var imgD=dc.toDataURL('image/png');var ar=dc.height/dc.width;var iw=TW;var ih=Math.min(iw*ar,68);doc.addImage(imgD,'PNG',M,wy,iw,ih);wy+=ih+4;}catch(e){}}
    var ta=document.getElementById('ta'+i);
    if(ta&&ta.value.trim()){if(wy>PH-30){doc.addPage();wy=20;}doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('courier','normal');var taLines=doc.splitTextToSize(ta.value,TW);taLines.slice(0,16).forEach(function(ln){if(wy>PH-15){doc.addPage();wy=20;}doc.text(ln,M,wy);wy+=5;});wy+=2;}
    var pp=document.getElementById('pp'+i);
    if(pp&&pp.src&&pp.src.indexOf('data:')===0){if(wy>PH-55){doc.addPage();wy=20;}try{doc.addImage(pp.src,'JPEG',M,wy,TW,68);wy+=72;}catch(e){}}
  }
  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){
    doc.setPage(p);doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');
    doc.setTextColor(130,140,160);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
    doc.text(name+'  \xb7  '+group+'  \xb7  C\xf3digo: '+code+'  \xb7  P\xe1gina '+p+'/'+pages,PW/2,PH-5,{align:'center'});
  }
  doc.save('ISLM_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='\u2b07 &nbsp;Descargar Resultados PDF';btn.disabled=false;
}
</script>
</body>
</html>
