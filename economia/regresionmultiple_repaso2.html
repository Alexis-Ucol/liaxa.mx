<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumidor Racional: Utilidad Cobb-Douglas вҖ” MicroeconomГӯa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }

/* WELCOME */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* RESTORE BAR */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* LESSON */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; display:inline-block; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* CONTENT */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:.4rem; }
.callout p:last-child { margin-bottom:0; }

/* KEY FORMULA BOX */
.keybox { background:var(--surface); border:2.5px solid var(--gold); border-radius:12px; padding:1.1rem 1.4rem; margin:1.2rem 0; text-align:center; }
.keybox-lbl { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.5rem; }
.keybox-formula { font-family:'IBM Plex Mono',monospace; font-size:1rem; color:var(--text); font-weight:600; margin-bottom:.4rem; }
.keybox-sub { font-size:.8rem; color:var(--text3); }

/* RULE CARDS */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* STEP BOX */
.steps { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem 1.3rem; margin:.9rem 0; }
.steps-title { font-weight:600; margin-bottom:.8rem; font-size:.88rem; color:var(--text); }
.steps-sub { font-size:.82rem; color:var(--text3); margin-bottom:.9rem; }
.step  { display:flex; gap:.85rem; margin-bottom:.9rem; }
.step:last-child { margin-bottom:0; }
.stepn { background:var(--green); color:#fff; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; margin-top:.1rem; }
.stepc { font-size:.88rem; color:var(--text2); }
.stepc strong { color:var(--text); }
.stepc code { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--green-dark); background:var(--green-bg); padding:.1em .35em; border-radius:4px; }

/* ANIMATION WRAP */
.anim-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin:.9rem 0; }
.anim-canvas { display:block; width:100%; border-radius:8px; }
.anim-info { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.8rem; }
.ainfo { background:var(--surface2); border-radius:8px; padding:.6rem; text-align:center; }
.ainfo-lbl { font-size:.65rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.ainfo-val { font-family:'IBM Plex Mono',monospace; font-size:.9rem; font-weight:600; color:var(--green); }
.anim-ctrl { display:flex; gap:.5rem; justify-content:center; margin-top:.8rem; flex-wrap:wrap; }
.actrl { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.45rem 1.1rem; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .15s; }
.actrl:hover { background:var(--green-dark); }
.actrl.sec { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.actrl.sec:hover { background:var(--border); }

/* EXPLORER */
.explorer { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem 1.3rem; margin:.9rem 0; }
.explorer-title { font-weight:600; font-size:.9rem; margin-bottom:.9rem; color:var(--text); }
.exp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:.65rem; margin-bottom:.8rem; }
.exp-field label { display:block; font-size:.71rem; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.25rem; }
.exp-field input { width:100%; padding:.5rem .65rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface2); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.88rem; transition:border-color .15s; }
.exp-field input:focus { outline:none; border-color:var(--green); }
.exp-error { font-size:.82rem; color:var(--bad); background:var(--bad-bg); border-radius:7px; padding:.5rem .8rem; margin-bottom:.6rem; display:none; }
.exp-error.show { display:block; }
.exp-result { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; margin-top:.7rem; }
.exp-metric { background:var(--surface2); border-radius:8px; padding:.6rem; text-align:center; }
.exp-metric-lbl { font-size:.65rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.12rem; }
.exp-metric-val { font-family:'IBM Plex Mono',monospace; font-size:.9rem; font-weight:600; }
.exp-metric-val.ok  { color:var(--ok); }
.exp-metric-val.bad { color:var(--bad); }
.exp-metric-val.neutral { color:var(--text); }

/* PROBLEM CARDS */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* WORK AREA */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* MC */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* RESULT */
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

@media (max-width:600px) {
  .wcard { padding:1.6rem 1.1rem; }
  .wtitle { font-size:1.35rem; }
  .htitle { display:none; }
  .hlogos img { height:20px; }
  .hchip { font-size:.63rem; padding:.15rem .45rem; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
  .lbody { padding:1.2rem .7rem 3rem; }
  .section h2 { font-size:1.3rem; }
  .rules-grid { grid-template-columns:1fr; }
  .pbody { padding:.75rem; }
  .pstmt { font-size:.84rem; }
  .mcopt { font-size:.83rem; padding:.58rem .7rem; }
  .dcanvas { height:220px; }
  .ctoolbar { gap:.25rem; }
  .callout { padding:.8rem .9rem; }
  .exp-grid { grid-template-columns:1fr 1fr; }
  .exp-result { grid-template-columns:1fr 1fr; }
  .anim-info { grid-template-columns:1fr 1fr; }
  .ms-bundle-grid { grid-template-columns:1fr 1fr; }
}

/* MULTI-SELECT PROBLEM */
.ms-bundle-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.5rem; margin-bottom:.8rem; }
.ms-bundle { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.ms-bundle:hover:not(.ms-dis) { border-color:var(--green); background:var(--green-bg); }
.ms-bundle.ms-checked { border-color:var(--gold); background:var(--gold-bg); }
.ms-bundle.ms-dis { cursor:default; pointer-events:none; }
.ms-bundle.ms-correct-checked  { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.ms-bundle.ms-correct-missed   { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); opacity:.7; }
.ms-bundle.ms-wrong-checked    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.ms-bundle.ms-correct-skip     { border-color:var(--border); opacity:.5; }
.ms-chkbox { width:18px; height:18px; border-radius:4px; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.75rem; background:var(--surface); transition:all .13s; }
.ms-bundle.ms-checked .ms-chkbox { background:var(--gold); border-color:var(--gold); color:#fff; }
.ms-bundle.ms-correct-checked .ms-chkbox  { background:var(--ok);  border-color:var(--ok);  color:#fff; }
.ms-bundle.ms-correct-missed .ms-chkbox   { background:var(--ok);  border-color:var(--ok);  color:#fff; }
.ms-bundle.ms-wrong-checked .ms-chkbox    { background:var(--bad); border-color:var(--bad); color:#fff; }
.ms-submit { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.4rem; font-size:.88rem; font-weight:600; cursor:pointer; transition:background .15s; margin-top:.2rem; }
.ms-submit:hover { background:var(--green-dark); }
.ms-submit:disabled { opacity:.5; cursor:default; }
.ms-feedback { display:none; padding:.75rem 1rem; border-radius:8px; font-size:.84rem; margin-top:.6rem; }
.ms-feedback.show { display:block; }
.ms-feedback.fbok  { background:var(--ok-bg);  color:var(--ok); }
.ms-feedback.fbbad { background:var(--bad-bg); color:var(--bad); }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="/logos/Facultad_Economia.png" alt="Facultad de EconomГӯa" style="max-height:70px;max-width:140px;object-fit:contain">
      <div class="wlogsep" id="wlogsep"></div>
      <img id="logo-right" src="/logos/Universidad_Colima.png" alt="Universidad de Colima" style="max-height:70px;max-width:140px;object-fit:contain">
    </div>
    <div class="wtitle">Consumidor Racional</div>
    <div class="wcourse">MicroeconomГӯa В· Utilidad Cobb-Douglas</div>
    <label class="flabel" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" onclick="startLesson()">Comenzar вҶ’</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong>рҹ“Ӯ SesiГіn guardada encontrada</strong><br>
      ВҝDeseas continuar donde la dejaste?
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" onclick="restoreSession()">Retomar sesiГіn</button>
        <button class="rbtn rbtn-no"  onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:#4a7c3f;font-size:28px}.lbl{stroke:#c9a84c;stroke-width:2.5}.lba{fill:#c9a84c}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="#4a7c3f" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">

var studentData  = {};

function lsKey() {
  var n = (studentData.name||'').trim(), g = (studentData.group||'').trim();

}
function saveSession() {
  if (!studentData.name) return;
  var drawings=[], texts=[], photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){ var bl=document.createElement('canvas'); bl.width=dc.width; bl.height=dc.height;
      drawings.push(dc.toDataURL()===bl.toDataURL()?null:dc.toDataURL('image/png')); }

    var pp=document.getElementById('pp'+i); photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={ name:studentData.name, group:studentData.group,
    answeredCount:answeredCount, correctCount:correctCount,
    choices:problems.map(function(p){return p.studentChoice;}),
    drawings:drawings, texts:texts, photos:photos };
  try{ localStorage.setItem(lsKey(), JSON.stringify(state)); }catch(e){}
}
function loadSession(name,group){
  var key=LS_PREFIX+'__'+(name+'__'+group).replace(/\s+/g,'_');
  try{ var r=localStorage.getItem(key); return r?JSON.parse(r):null; }catch(e){ return null; }
}
function restoreSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group); if(!saved) return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};
  answeredCount=0; correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' В· '+group;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});
  },{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  saved.choices.forEach(function(choice,idx){
    if(choice===null||choice===undefined) return;
    var prob = problems[idx];
    if(prob && prob.type === 'multiselect') {
      prob.pendingChoice = choice.slice();
      choice.forEach(function(bi) {
        var el = document.getElementById('msb_'+idx+'_'+bi);

/* в”Җв”Җ RNG в”Җв”Җ */
function seededRng(seed){
  var s=0; for(var i=0;i<seed.length;i++) s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){
    s=(s+0x9e3779b9)|0; var t=s^(s>>>16); t=Math.imul(t,0x21f0aaad);
    t^=(t>>>15); t=Math.imul(t,0x735a2d97); return((t^(t>>>15))>>>0)/4294967296;
  };
}
function pick(arr,rng){ return arr[Math.floor(rng()*arr.length)]; }
function shuffle(arr,rng){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(rng()*(i+1)); var tmp=a[i]; a[i]=a[j]; a[j]=tmp; }
  return a;
}

/* в”Җв”Җ CANVAS (drawing) в”Җв”Җ */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2d5a27'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  var drawing=false, lx=0, ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){ var r=canvas.getBoundingClientRect(); var src=e.touches?e.touches[0]:e;
    return[src.clientX-r.left,src.clientY-r.top]; }
  function onDown(e){ e.preventDefault(); drawing=true; var p=getPos(e); lx=p[0]; ly=p[1]; }
  function onMove(e){ e.preventDefault(); if(!drawing) return; var p=getPos(e);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp(){ drawing=false; saveSession(); }
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp); canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen'))    { ctx.lineWidth=2; }
      if(btn.classList.contains('bmarker')) { ctx.lineWidth=10; ctx.globalAlpha=0.45; }
      if(btn.classList.contains('beraser')) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');}); dot.classList.add('sel');
      ctx.strokeStyle=dot.dataset.color; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){
    ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
  });
}

/* в”Җв”Җ MC HANDLER в”Җв”Җ */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx]; if(prob.studentChoice!==null) return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx; prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){
      if(i===prob.correctIdx) o.classList.add('rc');
      if(i===chosenIdx&&isOk)  o.classList.add('sc');
      if(i===chosenIdx&&!isOk) o.classList.add('sw');
    });
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>вң“ ВЎCorrecto!</strong> ':'<strong>вң— Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk) correctCount++; answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();
    if(answeredCount===problems.length) setTimeout(showResults,700);
    return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx]; if(prob.studentChoice!==null) return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx; prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){
    if(i===prob.correctIdx) o.classList.add('rc');
    if(i===chosenIdx&&isOk)  o.classList.add('sc');
    if(i===chosenIdx&&!isOk) o.classList.add('sw');
  });
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>вң“ ВЎCorrecto!</strong> ':'<strong>вң— Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk) correctCount++; answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';

}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ANIMATION вҖ” S2: Budget line + feasible region
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function drawBudgetAnim(canvasId, px, py, inc) {
  var canvas = document.getElementById(canvasId); if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  ctx.fillStyle = isDark ? '#2e2e28' : '#f0ede6';
  ctx.fillRect(0, 0, W, H);

  var pad = 52, gW = W - pad - 18, gH = H - pad - 18;
  var xMax = (inc / px) * 1.25;
  var yMax = (inc / py) * 1.25;
  function toX(x) { return pad + (x / xMax) * gW; }
  function toY(y) { return H - pad + (y / yMax) * (-gH); }   // H-pad is origin

  // Feasible region shading
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(0));
  ctx.lineTo(toX(inc/px), toY(0));
  ctx.lineTo(toX(0), toY(inc/py));
  ctx.closePath();
  ctx.fillStyle = isDark ? 'rgba(74,124,63,0.18)' : 'rgba(74,124,63,0.12)';
  ctx.fill();
  ctx.restore();

  // Budget line
  ctx.strokeStyle = '#4a7c3f';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(inc/py));
  ctx.lineTo(toX(inc/px), toY(0));
  ctx.stroke();

  // Axes
  ctx.strokeStyle = isDark ? '#7a7468' : '#b0aa9e';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(toX(0), toY(yMax*1.05)); ctx.lineTo(toX(0), toY(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(toX(0), toY(0)); ctx.lineTo(toX(xMax*1.02), toY(0)); ctx.stroke();

  // Axis labels
  ctx.fillStyle = isDark ? '#b0aa9e' : '#4a4640';
  ctx.font = '13px IBM Plex Sans, sans-serif';
  ctx.fillText('x', toX(xMax*1.02)-4, toY(0)+14);
  ctx.fillText('y', toX(0)-14, toY(yMax*1.05)+5);

  // Intercept dots and labels
  var xInt = inc / px, yInt = inc / py;

  ctx.fillStyle = '#8b2500';
  ctx.beginPath(); ctx.arc(toX(xInt), toY(0), 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = isDark ? '#e8e4da' : '#1a1a16';
  ctx.font = 'bold 11px IBM Plex Mono, monospace';
  ctx.fillText(xInt.toFixed(1), toX(xInt) - 10, toY(0) + 18);

  ctx.fillStyle = '#8b2500';
  ctx.beginPath(); ctx.arc(toX(0), toY(yInt), 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = isDark ? '#e8e4da' : '#1a1a16';
  ctx.font = 'bold 11px IBM Plex Mono, monospace';
  ctx.fillText(yInt.toFixed(1), toX(0) + 8, toY(yInt) + 4);

  // "RegiГіn factible" label inside shaded area
  ctx.fillStyle = isDark ? '#6aaa5f' : '#2d5a27';
  ctx.font = '11px IBM Plex Sans, sans-serif';
  ctx.fillText('RegiГіn factible', toX(xInt * 0.10) + 4, toY(yInt * 0.15));

  // Budget line label
  ctx.fillStyle = '#4a7c3f';
  ctx.font = '11px IBM Plex Mono, monospace';
  var midLabelX = xInt * 0.55, midLabelY = (inc - px * midLabelX) / py;
  ctx.save(); ctx.translate(toX(midLabelX), toY(midLabelY));
  var angle = -Math.atan2(toY(0)-toY(yInt), toX(xInt)-toX(0));
  ctx.rotate(angle);
  ctx.fillText(px+'x + '+py+'y = '+inc, -30, -8);
  ctx.restore();

  // Hover dot state
  return { xInt: xInt, yInt: yInt };
}

var budgetHover = { canvas: null, px: 0, py: 0, inc: 0, dot: null };

function initBudgetAnim(canvasId, px, py, inc) {
  var canvas = document.getElementById(canvasId); if (!canvas) return;
  var parent = canvas.parentElement;
  canvas.width  = parent.clientWidth || 560;
  canvas.height = 260;
  budgetHover = { canvas: canvas, px: px, py: py, inc: inc, dot: null };
  drawBudgetAnim(canvasId, px, py, inc);

  // Mouse/touch hover to show bundle info
  function showBundle(ex, ey) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    var cx = (ex - rect.left) * scaleX, cy = (ey - rect.top) * scaleY;
    var W = canvas.width, H = canvas.height;
    var pad = 52, gW = W - pad - 18, gH = H - pad - 18;
    var xMax = (inc / px) * 1.25, yMax = (inc / py) * 1.25;
    var x = ((cx - pad) / gW) * xMax;
    var y = ((H - pad - cy) / gH) * yMax;
    if (x < 0 || y < 0) return;
    drawBudgetAnim(canvasId, px, py, inc);
    var ctx = canvas.getContext('2d');
    var toX = function(xv) { return pad + (xv / xMax) * gW; };
    var toY = function(yv) { return H - pad - (yv / yMax) * gH; };
    var gasto = px * x + py * y;
    var feasible = gasto <= inc + 0.001;
    ctx.fillStyle = feasible ? '#4a7c3f' : '#8b2500';
    ctx.beginPath(); ctx.arc(toX(x), toY(y), 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = feasible ? '#4a7c3f' : '#8b2500';
    ctx.font = '10px IBM Plex Mono, monospace';
    var label = '(' + x.toFixed(1) + ', ' + y.toFixed(1) + ')  Gasto=' + gasto.toFixed(1) + (feasible ? '' : ' вң—');
    ctx.fillText(label, toX(x) + 8, toY(y) - 6);
  }
  canvas.addEventListener('mousemove', function(e) { showBundle(e.clientX, e.clientY); });
  canvas.addEventListener('touchmove', function(e) { e.preventDefault(); showBundle(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('mouseleave', function() { drawBudgetAnim(canvasId, px, py, inc); });
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ANIMATION вҖ” S3: Tangency (indifference curve rises)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
var tangAnim = { running: false, frame: null, t: 0, alpha: 0.5, beta: 0.5, px: 5, py: 10, inc: 200 };

function drawTangency(canvasId, t, alpha, beta, px, py, inc) {
  var canvas = document.getElementById(canvasId); if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  ctx.fillStyle = isDark ? '#2e2e28' : '#f0ede6';
  ctx.fillRect(0, 0, W, H);

  var pad = 44, gW = W - pad - 20, gH = H - pad - 20;
  var xMax = (inc / px) * 1.18, yMax = (inc / py) * 1.18;
  function toX(x) { return pad + (x / xMax) * gW; }
  function toY(y) { return H - 20 - (y / yMax) * gH; }

  var xStar = alpha * inc / px, yStar = beta * inc / py;
  var Ustar = Math.pow(xStar, alpha) * Math.pow(yStar, beta);
  var Ucurr = Ustar * (0.28 + 0.72 * t);

  // Budget line
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(toX(0), toY(inc/py)); ctx.lineTo(toX(inc/px), toY(0)); ctx.stroke();
  ctx.fillStyle = '#4a7c3f'; ctx.font = '10px IBM Plex Mono, monospace';
  ctx.fillText('RestricciГіn presupuestal', toX(inc/px * 0.38), toY(inc/py * 0.07));

  // Axes
  ctx.strokeStyle = isDark ? '#7a7468' : '#b0aa9e'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(pad, 14); ctx.lineTo(pad, H-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad, H-18); ctx.lineTo(W-10, H-18); ctx.stroke();
  ctx.fillStyle = isDark ? '#b0aa9e' : '#4a4640'; ctx.font = '12px IBM Plex Sans,sans-serif';
  ctx.fillText('x', W-16, H-12); ctx.fillText('y', pad-10, 26);

  // Indifference curve
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
  ctx.beginPath(); var started = false;
  for (var xi = 0.05; xi <= xMax * 0.99; xi += xMax / 220) {
    if (xi <= 0) continue;
    var yi = Math.pow(Ucurr / Math.pow(xi, alpha), 1 / beta);
    if (yi <= 0 || !isFinite(yi) || yi > yMax * 1.15) continue;
    var cx2 = toX(xi), cy2 = toY(yi);
    if (!started) { ctx.moveTo(cx2, cy2); started = true; } else ctx.lineTo(cx2, cy2);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // U label
  ctx.fillStyle = '#c9a84c'; ctx.font = '10px IBM Plex Mono,monospace';
  var lxi = xMax * 0.10;
  var lyi = Math.pow(Ucurr / Math.pow(lxi, alpha), 1 / beta);
  if (lyi > 0 && lyi < yMax * 1.1) ctx.fillText('U = ' + Ucurr.toFixed(2), toX(lxi)+4, toY(lyi)-6);

  // Optimal point when t > 0.92
  if (t > 0.92) {
    var fade = (t - 0.92) / 0.08;
    ctx.globalAlpha = fade;
    ctx.fillStyle = '#8b2500';
    ctx.beginPath(); ctx.arc(toX(xStar), toY(yStar), 5.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(toX(xStar), toY(yStar)); ctx.lineTo(toX(xStar), toY(0)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(toX(xStar), toY(yStar)); ctx.lineTo(toX(0), toY(yStar)); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = fade;
    ctx.fillStyle = '#8b2500'; ctx.font = 'bold 10px IBM Plex Mono,monospace';
    ctx.fillText('x*='+xStar.toFixed(1), toX(xStar)-12, toY(0)+16);
    ctx.fillText('y*='+yStar.toFixed(1), toX(0)+4, toY(yStar)-4);
    ctx.globalAlpha = 1;
  }
}

function runTangAnim(canvasId, infoIds) {
  if (tangAnim.running) return;
  tangAnim.running = true; tangAnim.t = 0;
  function step() {
    tangAnim.t = Math.min(tangAnim.t + 0.007, 1);
    drawTangency(canvasId, tangAnim.t, tangAnim.alpha, tangAnim.beta, tangAnim.px, tangAnim.py, tangAnim.inc);
    var xStar = tangAnim.alpha * tangAnim.inc / tangAnim.px;
    var yStar = tangAnim.beta  * tangAnim.inc / tangAnim.py;
    var Ustar = Math.pow(xStar, tangAnim.alpha) * Math.pow(yStar, tangAnim.beta);
    var Ucurr = Ustar * (0.28 + 0.72 * tangAnim.t);
    if (infoIds[0]) document.getElementById(infoIds[0]).textContent = Ucurr.toFixed(3);
    if (infoIds[1]) document.getElementById(infoIds[1]).textContent = Ustar.toFixed(3);
    if (tangAnim.t < 1) tangAnim.frame = requestAnimationFrame(step);
    else tangAnim.running = false;
  }
  tangAnim.frame = requestAnimationFrame(step);
}
function resetTangAnim(canvasId, infoIds) {
  if (tangAnim.frame) cancelAnimationFrame(tangAnim.frame);
  tangAnim.running = false; tangAnim.t = 0;
  drawTangency(canvasId, 0, tangAnim.alpha, tangAnim.beta, tangAnim.px, tangAnim.py, tangAnim.inc);
  if (infoIds[0]) document.getElementById(infoIds[0]).textContent = 'вҖ”';
  if (infoIds[1]) document.getElementById(infoIds[1]).textContent = 'вҖ”';
}
function initTangCanvas(canvasId) {
  var canvas = document.getElementById(canvasId); if (!canvas) return;
  canvas.width = canvas.parentElement.clientWidth || 560;
  canvas.height = 260;
  drawTangency(canvasId, 0, tangAnim.alpha, tangAnim.beta, tangAnim.px, tangAnim.py, tangAnim.inc);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   EXPLORER вҖ” S4: free-form bundle explorer
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
var explorerParams = { alpha: 0.5, beta: 0.5, px: 5, py: 10, inc: 200 };

function drawExplorer(canvasId, alpha, beta, px, py, inc, bundles) {
  // bundles: array of {x, y, label, color}
  var canvas = document.getElementById(canvasId); if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  ctx.fillStyle = isDark ? '#2e2e28' : '#f0ede6';
  ctx.fillRect(0, 0, W, H);

  var pad = 50, gW = W - pad - 18, gH = H - pad - 20;
  var xStar = alpha * inc / px, yStar = beta * inc / py;
  var xMax = Math.max(inc / px, xStar) * 1.35;
  var yMax = Math.max(inc / py, yStar) * 1.35;
  function toX(x) { return pad + (x / xMax) * gW; }
  function toY(y) { return H - pad - (y / yMax) * gH; }

  // Feasible shading
  ctx.save(); ctx.beginPath();
  ctx.moveTo(toX(0), toY(0)); ctx.lineTo(toX(inc/px), toY(0)); ctx.lineTo(toX(0), toY(inc/py));
  ctx.closePath();
  ctx.fillStyle = isDark ? 'rgba(74,124,63,0.15)' : 'rgba(74,124,63,0.10)'; ctx.fill(); ctx.restore();

  // Budget line
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(toX(0), toY(inc/py)); ctx.lineTo(toX(inc/px), toY(0)); ctx.stroke();

  // Axes
  ctx.strokeStyle = isDark ? '#7a7468' : '#b0aa9e'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(pad, 14); ctx.lineTo(pad, H-pad+2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad, H-pad); ctx.lineTo(W-10, H-pad); ctx.stroke();
  ctx.fillStyle = isDark ? '#b0aa9e' : '#4a4640'; ctx.font = '12px IBM Plex Sans,sans-serif';
  ctx.fillText('x', W-16, H-pad+14); ctx.fillText('y', pad-10, 22);

  // Compute Ustar for comparison (used only when bundles are plotted)
  var Ustar = Math.pow(xStar, alpha) * Math.pow(yStar, beta);

  // Entered bundles
  if (bundles) bundles.forEach(function(b) {
    if (b.x < 0 || b.y < 0) return;
    // Indifference curve through this bundle
    var Ub = Math.pow(b.x, alpha) * Math.pow(b.y, beta);
    if (Ub > 0 && isFinite(Ub)) {
      ctx.strokeStyle = b.feasible
        ? (isDark ? 'rgba(106,170,95,0.5)' : 'rgba(45,90,39,0.35)')
        : (isDark ? 'rgba(192,80,48,0.45)' : 'rgba(139,37,0,0.30)');
      ctx.lineWidth = 1.2; ctx.setLineDash([3, 4]);
      ctx.beginPath(); var started = false;
      for (var xi2 = 0.02; xi2 <= xMax * 0.99; xi2 += xMax / 180) {
        var yi2 = Math.pow(Ub / Math.pow(xi2, alpha), 1 / beta);
        if (yi2 <= 0 || !isFinite(yi2) || yi2 > yMax * 1.1) { started = false; continue; }
        if (!started) { ctx.moveTo(toX(xi2), toY(yi2)); started = true; }
        else ctx.lineTo(toX(xi2), toY(yi2));
      }
      ctx.stroke(); ctx.setLineDash([]);
    }
    // Bundle dot
    ctx.fillStyle = b.feasible ? '#4a7c3f' : '#8b2500';
    ctx.beginPath(); ctx.arc(toX(b.x), toY(b.y), 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = b.feasible ? (isDark ? '#8ecf82' : '#2d5a27') : '#8b2500';
    ctx.font = '10px IBM Plex Mono,monospace';
    ctx.fillText(b.label + ' U='+(Ub>0&&isFinite(Ub)?Ub.toFixed(2):'вҖ”'), toX(b.x)+8, toY(b.y)-5);
  });

  // Intercept labels
  ctx.fillStyle = isDark ? '#b0aa9e' : '#4a4640'; ctx.font = '10px IBM Plex Mono,monospace';
  ctx.fillText((inc/px).toFixed(1), toX(inc/px)-10, toY(0)+16);
  ctx.fillText((inc/py).toFixed(1), toX(0)+5, toY(inc/py)-5);
}

function runExplorer() {
  var p = explorerParams;
  var xv = parseFloat(document.getElementById('exp-x').value);
  var yv = parseFloat(document.getElementById('exp-y').value);
  var errEl = document.getElementById('exp-error');
  var uEl   = document.getElementById('exp-u');
  var uStEl = document.getElementById('exp-ustar');
  var diffEl= document.getElementById('exp-diff');

  errEl.classList.remove('show');

  if (isNaN(xv) || isNaN(yv) || xv <= 0 || yv <= 0) {
    errEl.textContent = 'вҡ  Ingresa valores positivos para x e y.';
    errEl.classList.add('show'); return;
  }
  var gasto = p.px * xv + p.py * yv;
  if (gasto > p.inc + 0.001) {
    errEl.textContent = 'вҡ  Canasta no factible: el gasto ' + p.px + 'Г—' + xv.toFixed(2) + ' + ' + p.py + 'Г—' + yv.toFixed(2) + ' = ' + gasto.toFixed(2) + ' supera el ingreso ' + p.inc + '.';
    errEl.classList.add('show');
    // Still draw it as infeasible
    var Ub2 = Math.pow(xv, p.alpha) * Math.pow(yv, p.beta);
    var Ustar2 = Math.pow(p.alpha*p.inc/p.px, p.alpha) * Math.pow(p.beta*p.inc/p.py, p.beta);
    drawExplorer('explorerCanvas', p.alpha, p.beta, p.px, p.py, p.inc,
      [{x:xv, y:yv, label:'Tu canasta', feasible:false}]);
    uEl.textContent = Ub2.toFixed(3); uEl.className = 'exp-metric-val bad';
    uStEl.textContent = Ustar2.toFixed(3); uStEl.className = 'exp-metric-val neutral';
    diffEl.textContent = (Ub2 - Ustar2).toFixed(3); diffEl.className = 'exp-metric-val bad';
    return;
  }
  var Ub = Math.pow(xv, p.alpha) * Math.pow(yv, p.beta);
  var Ustar = Math.pow(p.alpha*p.inc/p.px, p.alpha) * Math.pow(p.beta*p.inc/p.py, p.beta);
  var diff = Ub - Ustar;
  drawExplorer('explorerCanvas', p.alpha, p.beta, p.px, p.py, p.inc,
    [{x:xv, y:yv, label:'Tu canasta', feasible:true}]);
  uEl.textContent = Ub.toFixed(3); uEl.className = 'exp-metric-val ' + (diff >= -0.001 ? 'ok' : 'bad');
  uStEl.textContent = Ustar.toFixed(3); uStEl.className = 'exp-metric-val neutral';
  var diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(3);
  diffEl.textContent = diffStr; diffEl.className = 'exp-metric-val ' + (diff >= -0.001 ? 'ok' : 'bad');
}

function initExplorerCanvas(canvasId, alpha, beta, px, py, inc) {
  explorerParams = { alpha: alpha, beta: beta, px: px, py: py, inc: inc };
  var canvas = document.getElementById(canvasId); if (!canvas) return;
  canvas.width = canvas.parentElement.clientWidth || 560;
  canvas.height = 280;
  drawExplorer(canvasId, alpha, beta, px, py, inc, []);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MULTI-SELECT PROBLEM (SecciГіn 2 вҖ” canastas factibles)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function buildMultiSelectCard(prob, i) {
  var card = document.createElement('div');
  card.className = 'pcrd section';
  card.id = 'pc' + i;

  var bundleItems = prob.bundles.map(function(b, bi) {
    var label = 'x = ' + b.x + ', y = ' + b.y;
    return '<div class="ms-bundle" id="msb_' + i + '_' + bi + '" onclick="toggleMSBundle(' + i + ',' + bi + ')">' +
      '<span class="ms-chkbox" id="msc_' + i + '_' + bi + '"></span>' +
      '<span>' + label + '</span>' +
    '</div>';
  }).join('');

  card.innerHTML =
    '<div class="phdr"><div class="pnum">' + (i+1) + '</div><div class="ptitle">' + prob.title + '</div></div>' +
    '<div class="pbody">' +
      '<div class="pstmt">' + prob.questionText + '</div>' +
      '<div class="anim-wrap" style="margin-bottom:.9rem">'+
        '<canvas id="budgetCanvas" class="anim-canvas" style="cursor:crosshair"></canvas>'+
        '<div style="margin-top:.5rem;font-size:.78rem;color:var(--text3);text-align:center">'+
          'Mueve el cursor sobre la grГЎfica para ver el gasto de cualquier punto &nbsp;В·&nbsp; '+
          'рҹҹў factible &nbsp;В·&nbsp; рҹ”ҙ no factible'+
        '</div>'+
      '</div>'+
      '<div class="ms-bundle-grid" id="msbg_' + i + '">' + bundleItems + '</div>' +
      '<button class="ms-submit" id="mssub_' + i + '" onclick="submitMultiSelect(' + i + ')">вң” Verificar selecciГіn</button>' +
      '<div class="ms-feedback" id="msfb_' + i + '"></div>' +
    '</div>';

  document.getElementById('lessonBody').appendChild(card);
  setTimeout(function() { initBudgetAnim('budgetCanvas', prob.px, prob.py, prob.inc); }, 80);
}

function toggleMSBundle(probIdx, bundleIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;  // already submitted
  var el = document.getElementById('msb_' + probIdx + '_' + bundleIdx);
  var chk = document.getElementById('msc_' + probIdx + '_' + bundleIdx);
  var checked = el.classList.toggle('ms-checked');
  chk.textContent = checked ? 'вң“' : '';
  // Track in pendingChoice array
  if (!prob.pendingChoice) prob.pendingChoice = [];
  var idx = prob.pendingChoice.indexOf(bundleIdx);
  if (checked && idx === -1) prob.pendingChoice.push(bundleIdx);
  if (!checked && idx !== -1) prob.pendingChoice.splice(idx, 1);
}

function submitMultiSelect(probIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;

  var selected = prob.pendingChoice ? prob.pendingChoice.slice() : [];
  prob.studentChoice = selected;
  prob.pendingChoice = null;

  // Grade: correct iff selected set matches exactly the feasible set
  var correctSet = prob.bundles
    .map(function(b, bi) { return b.feasible ? bi : -1; })
    .filter(function(bi) { return bi !== -1; });
  var isOk = correctSet.length === selected.length &&
    correctSet.every(function(bi) { return selected.indexOf(bi) !== -1; });

  // Disable submit button
  var subBtn = document.getElementById('mssub_' + probIdx);
  subBtn.disabled = true;

  // Style each bundle
  prob.bundles.forEach(function(b, bi) {
    var el  = document.getElementById('msb_' + probIdx + '_' + bi);
    var chk = document.getElementById('msc_' + probIdx + '_' + bi);
    el.classList.add('ms-dis');
    el.classList.remove('ms-checked');
    var wasSelected = selected.indexOf(bi) !== -1;
    if (b.feasible && wasSelected)  { el.classList.add('ms-correct-checked'); chk.textContent = 'вң“'; }
    if (b.feasible && !wasSelected) { el.classList.add('ms-correct-missed');  chk.textContent = 'вң“'; }
    if (!b.feasible && wasSelected) { el.classList.add('ms-wrong-checked');   chk.textContent = 'вң—'; }
    if (!b.feasible && !wasSelected){ el.classList.add('ms-correct-skip');    chk.textContent = ''; }
  });

  // Feedback
  var fb = document.getElementById('msfb_' + probIdx);
  if (isOk) {
    fb.innerHTML = '<strong>вң“ ВЎCorrecto!</strong> ' + prob.explanation;
    fb.className = 'ms-feedback show fbok';
    document.getElementById('pc' + probIdx).classList.add('ok');
    correctCount++;
  } else {
    var missed = prob.bundles
      .filter(function(b, bi) { return b.feasible && selected.indexOf(bi) === -1; })
      .map(function(b) { return '(' + b.x + ', ' + b.y + ')'; });
    var wrong = prob.bundles
      .filter(function(b, bi) { return !b.feasible && selected.indexOf(bi) !== -1; })
      .map(function(b) { return '(' + b.x + ', ' + b.y + ')'; });
    var detail = '';
    if (wrong.length)  detail += ' Seleccionaste canastas no factibles: ' + wrong.join(', ') + '.';
    if (missed.length) detail += ' Te faltaron canastas factibles: ' + missed.join(', ') + '.';
    fb.innerHTML = '<strong>вң— Incorrecto.</strong>' + detail + ' ' + prob.explanation;
    fb.className = 'ms-feedback show fbbad';
    document.getElementById('pc' + probIdx).classList.add('bad');
  }

  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BUILD LESSON
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function buildLesson(rng) {
  var body = document.getElementById('lessonBody');

  /* в”Җв”Җ Seeded parameters в”Җв”Җ */
  var alphaOpts = [0.3, 0.4, 0.5, 0.6, 0.7];
  var alpha = pick(alphaOpts, rng);
  var beta  = parseFloat((1 - alpha).toFixed(1));
  var pxOpts = [4, 5, 6, 8];
  var pyOpts = [8, 10, 12, 15, 20];
  var Px = pick(pxOpts, rng);
  var Py = pick(pyOpts, rng);
  var I  = pick([160, 200, 240, 300, 360], rng);
  var xStar = parseFloat((alpha * I / Px).toFixed(2));
  var yStar = parseFloat((beta  * I / Py).toFixed(2));
  var Ustar = parseFloat((Math.pow(xStar, alpha) * Math.pow(yStar, beta)).toFixed(4));
  var MRS   = parseFloat(((alpha / beta) * (yStar / xStar)).toFixed(4));
  var pRatio = parseFloat((Px / Py).toFixed(4));

  // Pass params to animation modules
  tangAnim.alpha = alpha; tangAnim.beta = beta; tangAnim.px = Px; tangAnim.py = Py; tangAnim.inc = I;

  /* в”Җв”Җ Helpers в”Җв”Җ */
  function frac(num, den) {
    return '<span class="mf-outer"><span class="mf-num">'+num+'</span><span class="mf-den">'+den+'</span></span>';
  }
  function fmt(v) { return parseFloat(v.toFixed(4)); }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SECCIГ“N 1 вҖ” FunciГіn de Utilidad Cobb-Douglas
     3 problems: P1 compute U for one basket,
                 P2 compute U for another basket,
                 P3 identify which basket is preferred
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  var s1 = document.createElement('div');
  s1.className = 'section';
  s1.innerHTML =
    '<div class="stag">SecciГіn 1 В· Concepto</div>'+
    '<h2>La funciГіn de utilidad Cobb-Douglas</h2>'+
    '<p>En microeconomГӯa, la <strong>funciГіn de utilidad</strong> describe el nivel de satisfacciГіn que un consumidor obtiene al consumir una combinaciГіn de bienes. La forma Cobb-Douglas captura la preferencia natural por variedad: consumir algo de los dos bienes siempre es mejor que consumir solo uno.</p>'+
    '<div class="callout">'+
      '<p><strong>Forma general:</strong></p>'+
      '<p style="font-family:\'IBM Plex Mono\',monospace;font-size:1rem;margin:.3rem 0">U(x, y) = x<sup>Оұ</sup> В· y<sup>ОІ</sup></p>'+
      '<p>donde <strong>Оұ</strong> y <strong>ОІ</strong> son parГЎmetros positivos que indican cuГЎnto pondera el consumidor cada bien.</p>'+
    '</div>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Bien x</div><div class="rform">x<sup>Оұ</sup></div><div class="rnote">Оұ mide el peso del bien x en la satisfacciГіn</div></div>'+
      '<div class="rcard"><div class="rname">Bien y</div><div class="rform">y<sup>ОІ</sup></div><div class="rnote">ОІ mide el peso del bien y en la satisfacciГіn</div></div>'+
      '<div class="rcard"><div class="rname">MonotonГӯa</div><div class="rform">Оұ, ОІ &gt; 0</div><div class="rnote">MГЎs cantidad de cualquier bien siempre sube la utilidad</div></div>'+
    '</div>'+
    '<p>Para evaluar una canasta (x, y) simplemente se sustituyen las cantidades en la fГіrmula. <strong>Canasta con mayor U es preferida.</strong></p>'+
    '<div class="steps">'+
      '<div class="steps-title">Ejemplo resuelto</div>'+
      '<div class="steps-sub">Con U(x, y) = x<sup>0.5</sup> В· y<sup>0.5</sup>, calcula la utilidad de la canasta (25, 16).</div>'+
      '<div class="step"><div class="stepn">1</div><div class="stepc">Sustituye: U(25, 16) = 25<sup>0.5</sup> В· 16<sup>0.5</sup></div></div>'+
      '<div class="step"><div class="stepn">2</div><div class="stepc">Calcula cada potencia: 25<sup>0.5</sup> = вҲҡ25 = <code>5</code> &nbsp;&nbsp; 16<sup>0.5</sup> = вҲҡ16 = <code>4</code></div></div>'+
      '<div class="step"><div class="stepn">3</div><div class="stepc">Multiplica: U = 5 В· 4 = <code>20</code></div></div>'+
      '<div class="step"><div class="stepn">4</div><div class="stepc">InterpretaciГіn: la canasta (25, 16) genera una utilidad de <code>20</code> unidades.</div></div>'+
    '</div>';
  body.appendChild(s1);

  // Problem 1 вҖ” Compute U for a single basket (basket A only)
  var xa1 = pick([16,25,36,49,64,81,100], rng);
  var ya1 = pick([8,27,32,64,125], rng);
  var ua1 = fmt(Math.pow(xa1, alpha) * Math.pow(ya1, beta));
  var wrong1a = fmt(ua1 * 1.15 + 1);
  var wrong1b = fmt(alpha * xa1 + beta * ya1);  // classic error: weighted average
  var wrong1c = fmt(xa1 + ya1);                 // no-exponent error
  var correct1 = 'U = ' + ua1;
  var opts1 = shuffle([correct1, 'U = '+wrong1a.toFixed(4), 'U = '+wrong1b.toFixed(4), 'U = '+wrong1c.toFixed(4)], rng);
  problems.push({
    title: 'CГЎlculo de utilidad вҖ” Canasta A',
    questionText: 'Con U(x, y) = x<sup>'+alpha+'</sup> В· y<sup>'+beta+'</sup>, ВҝcuГЎl es la utilidad de la canasta A = ('+xa1+', '+ya1+')?',
    fn: 'U = x^Оұ В· y^ОІ',
    options: opts1,
    correctIdx: opts1.indexOf(correct1),
    explanation: 'Sustituye: U('+xa1+', '+ya1+') = '+xa1+'^'+alpha+' В· '+ya1+'^'+beta+' = '+Math.pow(xa1,alpha).toFixed(4)+' Г— '+Math.pow(ya1,beta).toFixed(4)+' = '+ua1+'. Eleva cada cantidad a su exponente correspondiente y luego multiplica.',
    hint: 'Eleva '+xa1+' a la potencia '+alpha+' y '+ya1+' a la potencia '+beta+'. Luego multiplica los dos resultados.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problem 2 вҖ” Compute U for basket B (different values)
  var xb2 = pick([9,16,25,36,64,81], rng);
  var yb2 = pick([8,27,32,64,100,125].filter(function(v){return v!==ya1;}), rng);
  var ub2 = fmt(Math.pow(xb2, alpha) * Math.pow(yb2, beta));
  var wrong2a = fmt(Math.pow(xb2, beta) * Math.pow(yb2, alpha)); // swapped exponents
  var wrong2b = fmt(xb2 * yb2);
  var wrong2c = fmt(Math.pow(xb2 + yb2, alpha + beta));
  var correct2 = 'U = ' + ub2;
  var opts2 = shuffle([correct2, 'U = '+wrong2a.toFixed(4), 'U = '+wrong2b.toFixed(4), 'U = '+wrong2c.toFixed(4)], rng);
  problems.push({
    title: 'CГЎlculo de utilidad вҖ” Canasta B',
    questionText: 'Con la misma funciГіn U(x, y) = x<sup>'+alpha+'</sup> В· y<sup>'+beta+'</sup>, ВҝcuГЎl es la utilidad de la canasta B = ('+xb2+', '+yb2+')?',
    fn: 'U = x^Оұ В· y^ОІ',
    options: opts2,
    correctIdx: opts2.indexOf(correct2),
    explanation: 'U('+xb2+', '+yb2+') = '+xb2+'^'+alpha+' В· '+yb2+'^'+beta+' = '+Math.pow(xb2,alpha).toFixed(4)+' Г— '+Math.pow(yb2,beta).toFixed(4)+' = '+ub2+'. Nota: los exponentes son de la funciГіn, no de los datos.',
    hint: 'Mismo procedimiento: '+xb2+'^'+alpha+' Г— '+yb2+'^'+beta+'. AsegГәrate de no invertir los exponentes.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problem 3 вҖ” Which basket is preferred?
  var aWins3 = ua1 > ub2;
  var correct3 = aWins3
    ? 'Canasta A вҖ” U(A) = '+ua1+' > U(B) = '+ub2
    : 'Canasta B вҖ” U(B) = '+ub2+' > U(A) = '+ua1;
  var wrong3a = aWins3
    ? 'Canasta B вҖ” U(B) = '+ub2+' > U(A) = '+ua1
    : 'Canasta A вҖ” U(A) = '+ua1+' > U(B) = '+ub2;
  var wrong3b = 'Son indiferentes вҖ” la diferencia es insignificante';
  var wrong3c = 'No se puede comparar sin conocer los precios';
  var opts3 = shuffle([correct3, wrong3a, wrong3b, wrong3c], rng);
  problems.push({
    title: 'ComparaciГіn de canastas',
    questionText: 'Con los resultados que calculaste en las dos preguntas anteriores (canasta A = ('+xa1+', '+ya1+') y canasta B = ('+xb2+', '+yb2+')), ВҝcuГЎl es la canasta preferida?',
    fn: '',
    options: opts3,
    correctIdx: opts3.indexOf(correct3),
    explanation: 'U(A) = '+ua1+', U(B) = '+ub2+'. '+(aWins3?'Como '+ua1+' > '+ub2+', la canasta A produce mayor satisfacciГіn.':'Como '+ub2+' > '+ua1+', la canasta B produce mayor satisfacciГіn.')+' Los precios no afectan la utilidad вҖ” solo la cantidad consumida.',
    hint: 'Compara directamente los valores de utilidad que calculaste. La que tenga el nГәmero mayor es la preferida.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SECCIГ“N 2 вҖ” RestricciГіn Presupuestal + animaciГіn
     2 problems
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  var xInt = parseFloat((I / Px).toFixed(2));
  var yInt = parseFloat((I / Py).toFixed(2));
  var slopeStr = 'вҲ’' + frac(Px, Py);

  var s2 = document.createElement('div');
  s2.className = 'section';
  s2.innerHTML =
    '<div class="stag">SecciГіn 2 В· Concepto + AnimaciГіn</div>'+
    '<h2>La restricciГіn presupuestal</h2>'+
    '<p>El consumidor no puede gastar mГЎs de su ingreso disponible I. La <strong>restricciГіn presupuestal</strong> define el conjunto de <em>todas</em> las combinaciones posibles de x e y que puede comprar: cualquier canasta cuyo costo total sea menor o igual a I.</p>'+
    '<div class="callout">'+
      '<p><strong>EcuaciГіn:</strong> &nbsp; P<sub>x</sub> В· x + P<sub>y</sub> В· y = I</p>'+
      '<p>La <strong>lГӯnea presupuestal</strong> conecta dos puntos clave:</p>'+
      '<p>вҖ” Si gasta todo en x: compra <strong>I/P<sub>x</sub></strong> unidades de x (intercepto horizontal).</p>'+
      '<p>вҖ” Si gasta todo en y: compra <strong>I/P<sub>y</sub></strong> unidades de y (intercepto vertical).</p>'+
      '<p>Todos los puntos <em>por debajo o sobre</em> la lГӯnea son accesibles (regiГіn factible). Los puntos <em>por encima</em> no lo son.</p>'+
    '</div>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Intercepto en x</div><div class="rform">I / P<sub>x</sub></div><div class="rnote">MГЎximo de x si se gasta todo en x</div></div>'+
      '<div class="rcard"><div class="rname">Intercepto en y</div><div class="rform">I / P<sub>y</sub></div><div class="rnote">MГЎximo de y si se gasta todo en y</div></div>'+
      '<div class="rcard"><div class="rname">Pendiente</div><div class="rform">вҲ’P<sub>x</sub>/P<sub>y</sub></div><div class="rnote">Costo de oportunidad de x en tГ©rminos de y</div></div>'+
    '</div>'+
    '<div class="steps">'+
      '<div class="steps-title">Ejemplo resuelto вҖ” tus valores: P<sub>x</sub> = '+Px+', P<sub>y</sub> = '+Py+', I = '+I+'</div>'+
      '<div class="step"><div class="stepn">1</div><div class="stepc"><strong>Escribe la ecuaciГіn:</strong> '+Px+'x + '+Py+'y = '+I+'</div></div>'+
      '<div class="step"><div class="stepn">2</div><div class="stepc"><strong>Intercepto en x</strong> (y = 0): x = '+frac(I, Px)+' = <code>'+xInt+'</code></div></div>'+
      '<div class="step"><div class="stepn">3</div><div class="stepc"><strong>Intercepto en y</strong> (x = 0): y = '+frac(I, Py)+' = <code>'+yInt+'</code></div></div>'+
      '<div class="step"><div class="stepn">4</div><div class="stepc"><strong>Pendiente:</strong> '+slopeStr+' = <code>'+(-Px/Py).toFixed(3)+'</code> вҖ” por cada unidad extra de x se sacrifican '+frac(Px,Py)+' unidades de y</div></div>'+
    '</div>';
  body.appendChild(s2);

  // Problem 4 вҖ” Identify the correct budget line equation
  var correct4 = Px+'x + '+Py+'y = '+I+' &nbsp;(interceptos: x = '+xInt+', y = '+yInt+')';
  var wrong4a  = Py+'x + '+Px+'y = '+I+' &nbsp;(interceptos: x = '+(I/Py).toFixed(2)+', y = '+(I/Px).toFixed(2)+')';
  var wrong4b  = Px+'x + '+Py+'y = '+(I+Px*2)+' &nbsp;(interceptos: x = '+((I+Px*2)/Px).toFixed(2)+', y = '+((I+Px*2)/Py).toFixed(2)+')';
  var wrong4c  = (Px+Py)+'(x + y) = '+I+' &nbsp;(intercepto: x = y = '+(I/(Px+Py)).toFixed(2)+')';
  var opts4 = shuffle([correct4, wrong4a, wrong4b, wrong4c], rng);
  problems.push({
    title: 'EcuaciГіn de la restricciГіn presupuestal',
    questionText: 'Con P<sub>x</sub> = '+Px+', P<sub>y</sub> = '+Py+' e I = '+I+', ВҝcuГЎl es la restricciГіn presupuestal correcta y sus interceptos?',
    fn: '',
    options: opts4,
    correctIdx: opts4.indexOf(correct4),
    explanation: 'La restricciГіn es '+Px+'x + '+Py+'y = '+I+'. Intercepto en x: '+I+'/'+Px+' = '+xInt+'. Intercepto en y: '+I+'/'+Py+' = '+yInt+'. Los precios multiplican a las cantidades, no estГЎn invertidos.',
    hint: 'Recuerda: P\u2093В·x + P\u1D67В·y = I. Sustituye y = 0 para obtener el intercepto en x, y x = 0 para el intercepto en y.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problem 5 вҖ” Feasibility of a specific bundle
  var testX5 = Math.round(xStar * (0.6 + rng() * 0.8));
  var testY5 = Math.round(yStar * (0.6 + rng() * 0.8));
  // Force one feasible and one infeasible by randomly picking
  var makeFeasible = rng() < 0.5;
  if (makeFeasible) {
    // Ensure it's feasible
    while (Px * testX5 + Py * testY5 > I) { testX5 = Math.max(1, testX5 - 1); }
  } else {
    // Ensure it's infeasible
    while (Px * testX5 + Py * testY5 <= I) { testX5 += 1; }
  }
  var gasto5 = Px * testX5 + Py * testY5;
  var feasible5 = gasto5 <= I;
  var correct5 = feasible5
    ? 'Factible. Gasto = '+gasto5+' вүӨ '+I
    : 'No factible. Gasto = '+gasto5+' > '+I;
  var wrong5a = feasible5
    ? 'No factible. Gasto = '+gasto5+' > '+I
    : 'Factible. Gasto = '+gasto5+' вүӨ '+I;
  var wrong5b = 'No se puede determinar sin calcular la utilidad primero';
  var wrong5c = feasible5
    ? 'Factible, pero solo porque x < '+xInt
    : 'No factible, pero solo porque y > '+yInt;
  var opts5 = shuffle([correct5, wrong5a, wrong5b, wrong5c], rng);
  problems.push({
    title: 'Factibilidad de una canasta',
    questionText: 'ВҝEs factible la canasta ('+testX5+', '+testY5+') con P<sub>x</sub> = '+Px+', P<sub>y</sub> = '+Py+' e I = '+I+'?',
    fn: 'Gasto = P\u2093\u00b7x + P\u1D67\u00b7y',
    options: opts5,
    correctIdx: opts5.indexOf(correct5),
    explanation: 'Gasto = '+Px+'Г—'+testX5+' + '+Py+'Г—'+testY5+' = '+Px*testX5+' + '+Py*testY5+' = '+gasto5+'. '+(feasible5?'Como '+gasto5+' вүӨ '+I+', la canasta es factible.':'Como '+gasto5+' > '+I+', el consumidor no puede costear esta canasta con su ingreso actual.'),
    hint: 'Calcula el gasto total: P\u2093В·x + P\u1D67В·y. Si el resultado es вүӨ I, la canasta es factible.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problem 6 вҖ” Multi-select: identify ALL feasible bundles from a list
  // Generate 6 bundles: mix of feasible and infeasible, using seeded rng
  // Bundles are deliberately spread around the budget line so the animation is useful
  var msBundles = [];
  // 3 clearly feasible (on or inside budget line)
  var feasibleCandidates = [
    { x: Math.round(xInt * 0.25), y: Math.round(yInt * 0.55) },
    { x: Math.round(xInt * 0.50), y: Math.round(yInt * 0.25) },
    { x: Math.round(xInt * 0.15), y: Math.round(yInt * 0.70) }
  ];
  // 3 clearly infeasible (outside budget line by meaningful margin)
  var infeasibleCandidates = [

  ], rng);

    hint: 'x* = ОұВ·I/Px depende de Px. Вҝy* = ОІВ·I/Py depende de Px?',

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     EVALUACIГ“N FINAL вҖ” 3 problems, no preceding text
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  // Problem 10 вҖ” Full optimization
  var alpha10 = pick([0.3, 0.4, 0.5, 0.6, 0.7], rng);

  var Px10    = pick([3, 4, 5, 6, 8, 10], rng);

  // Problem 11 вҖ” Identify which of three bundles maximizes utility given a budget

    'Ambos gastan lo mismo porque tienen el mismo I y enfrentan el mismo P<sub>x</sub>',
    'No se puede determinar sin conocer los valores de ОІ de cada consumidor'

  problems.push({
    title: 'ComparaciГіn entre consumidores',

    fn: 'Gasto en x = ОұВ·I &nbsp;&nbsp; x* = ОұВ·I/P\u2093',

    hint: 'Gasto en x = ОұВ·I (no depende del precio). Luego x* = gasto/Px.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

} // end buildLesson

      var iw=TW, ih=Math.min(iw*ar,68); doc.addImage(imgD,'PNG',M,wy,iw,ih); wy+=ih+4; }catch(e){} }
    var ta=document.getElementById('ta'+i);
    if(ta&&ta.value.trim()){ if(wy>PH-30){doc.addPage();wy=20;}
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines=doc.splitTextToSize(ta.value,TW);
      taLines.slice(0,16).forEach(function(ln){ if(wy>PH-15){doc.addPage();wy=20;} doc.text(ln,M,wy); wy+=5; }); wy+=2; }
    var pp=document.getElementById('pp'+i);
    if(pp&&pp.src&&pp.src.indexOf('data:')===0){
      if(wy>PH-55){doc.addPage();wy=20;}
      try{doc.addImage(pp.src,'JPEG',M,wy,TW,68);wy+=72;}catch(e){} }
  }
  // Footer
  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,PH-3,PW,3,'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+' В· '+group+' В· CГіdigo: '+code+' В· PГЎgina '+p+'/'+pages, PW/2,PH-5,{align:'center'});
  }
  doc.save('consumidor_cd_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='в¬Ү &nbsp;Descargar Resultados PDF'; btn.disabled=false;
}

  });
})();
