<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propiedad de Densidad de los Números — Matemáticas 1° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the 5 lines below.
   Derive from 2 institution colors:
     PRIMARY  = main dark color  (nav, buttons, progress bar, PDF band)
     ACCENT   = highlight color  (tags, hints, PDF stripe, wcard top line)
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #1a3a6b;   /* PRIMARY      */
  --green-dark: #0f2244;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #e8edf5;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}
/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <!-- LOGO: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitle-el">Propiedad de Densidad de los Números</div>
    <div class="wcourse" id="wcourse-el">Matemáticas 1° Secundaria</div>
    <label class="flabel" id="lbl-name-el" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Tienes una sesión guardada.</strong><br>
      <span id="restoreSub">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Continuar</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Nueva sesión</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <!-- ── LIAXA FOOTER SVG ──────────────────────────────────────────────────
           When branding for an institution, replace the two hex color values
           below with the institution's PRIMARY and ACCENT colors respectively.
           PRIMARY  → stroke/fill on the chart line and LIAXA text
           ACCENT   → fill on the dot and stroke on the vertical bar
           ──────────────────────────────────────────────────────────────────── -->
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lbt { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.1em; fill:var(--green); font-size:28px; }
          .lbl { stroke:var(--gold); stroke-width:2.5; }
          .lba { fill:var(--gold); }
        </style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <!-- LOGO_LEFT: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <!-- LOGO_RIGHT: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Propiedad de Densidad de los Números</div>
    <div class="hsep"></div>
    <div class="halexis">
      <!-- ── LIAXA HEADER SVG — same color tokens as footer ── -->
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lht { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
          .lhl { stroke:var(--gold); stroke-width:2; }
          .lha { fill:var(--gold); }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>

  <!-- RESULTS SECTION (always in DOM, revealed by showResults) -->
  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;<span id="pdfBtnLbl">Descargar Resultados PDF</span></button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   SCHOOL CONFIG — edit ONLY this block to rebrand for a different school
   ════════════════════════════════════════════════════════════════════════ */
var SCHOOL = {
  primary:      '#0c246c',
  primaryDark:  '#07184c',
  primaryBg:    '#e6eaf7',
  accent:       '#8484b4',
  accentBg:     '#e9e9f1',
  pBR: 12,  pBG: 36,  pBB: 108,
  pAR: 132, pAG: 132, pAB: 180,
  darkPrimary:     '#385ed1',
  darkPrimaryDark: '#6a8bf0',
  darkPrimaryBg:   '#08153e',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

  }
}

      document.getElementById('s_results').style.display = 'block';
      setTimeout(function() { document.getElementById('s_results').classList.add('vis'); }, 50);

var studentData   = {};

   SESSION PERSISTENCE  (localStorage)

function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'mat1_t02_g03__' + (n + '__' + g).replace(/\s+/g, '_');
}

function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'mat1_t02_g03__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  var att = currentAttempt(name, group);
  buildLesson(seededRng(name + group + att));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {

/* ================================================
   ATTEMPT COUNTER  (new attempt = new numbers)
   ================================================ */
function attKey(n, g) {
  return SCHOOL.ls + '__att__' + (n + '__' + g).replace(/\s+/g, '_');
}
function nextAttempt(n, g) {
  var k = attKey(n, g), v = 0;
  try { v = parseInt(localStorage.getItem(k) || '0', 10) || 0; } catch(e) {}
  v++;
  try { localStorage.setItem(k, String(v)); } catch(e) {}
  return v;
}
function currentAttempt(n, g) {
  var k = attKey(n, g);
  try { return parseInt(localStorage.getItem(k) || '1', 10) || 1; } catch(e) { return 1; }
}

function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — doble toque para confirmar (Regla 8)
   Primer toque: resalta en dorado (pendiente).
   Segundo toque en la misma opción: confirma.
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Segundo toque en la misma opción → confirmar
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // Primer toque → resaltar como pendiente, limpiar pendiente anterior
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Confirmación directa — usada por restoreSession para omitir el doble toque
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });

    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}

    var ta = document.getElementById('ta'+i);

  // ── Pie de página en todas las páginas ──

/* ================================================
   buildLesson — mat1_t02_g03
   ================================================ */

function buildLesson(rng) {
  var body = document.getElementById('lessonBody');
  var L = LANG;
  function ri(a,b){ return a+Math.floor(rng()*(b-a+1)); }
  function shuf(opts,cor){var a=opts.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return{opts:a,ci:a.indexOf(cor)};}
  function midStr(a,b){ var m=(a+b)/2; return m%1===0?String(m):m.toFixed(1); }
  function niceNum(n,dec){ return n%1===0?String(n):n.toFixed(dec||1); }

  /* ══════════════════════════════════════════════════════
     SECTION 1 — Concepto: La Propiedad de Densidad
  ══════════════════════════════════════════════════════ */
  var s1=document.createElement('div'); s1.className='section';
  s1.innerHTML=
    '<div class="stag">'+(L==='es'?'Concepto 1':'Concept 1')+'</div>' +
    '<h2>🔍 '+(L==='es'?'La Propiedad de Densidad':'The Density Property')+'</h2>' +
    '<p>'+(L==='es'?'La <strong>propiedad de densidad</strong> dice: entre cualquier par de números siempre existe otro número.':'The <strong>density property</strong> states: between any pair of numbers there always exists another number.')+'</p>' +
    '<div class="callout"><strong>'+(L==='es'?'Definición formal:':'Formal definition:')+'</strong> '+(L==='es'?'Un conjunto de números es <em>denso</em> si entre cualesquiera dos números de ese conjunto siempre hay un tercer número del mismo conjunto.':'A set of numbers is <em>dense</em> if between any two numbers in that set there is always a third number from the same set.')+'</div>' +
    '<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin:.9rem 0;">' +
    '<div style="font-size:.71rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:.45rem">'+(L==='es'?'Estrategia: el punto medio':'Strategy: the midpoint')+'</div>' +
    '<p style="margin:0">'+(L==='es'?'Para encontrar un número entre <strong>a</strong> y <strong>b</strong>: calcula <strong>(a + b) ÷ 2</strong>':'To find a number between <strong>a</strong> and <strong>b</strong>: calculate <strong>(a + b) ÷ 2</strong>')+'</p>' +
    '</div>';
  body.appendChild(s1);

  /* ══════════════════════════════════════════════════════
     SECTION 2 — ¿Cuándo SÍ se cumple?
  ══════════════════════════════════════════════════════ */
  var ra=-(ri(5,20)/10), rb=-(ri(1,4)/10);
  var rmid=midStr(ra,rb);
  var s2=document.createElement('div'); s2.className='section';
  s2.innerHTML=
    '<div class="stag">'+(L==='es'?'Concepto 2':'Concept 2')+'</div>' +
    '<h2>✅ '+(L==='es'?'¿Cuándo SÍ se Cumple la Densidad?':'When DOES Density Hold?')+'</h2>' +
    '<p>'+(L==='es'?'La propiedad de densidad <strong>sí se cumple</strong> en los <em>números racionales</em> y los <em>números decimales</em>.':'The density property <strong>does hold</strong> for <em>rational numbers</em> and <em>decimal numbers</em>.')+'</p>' +
    '<div class="callout"><strong>'+(L==='es'?'Racionales y decimales son densos:':'Rationals and decimals are dense:')+'</strong> '+(L==='es'?'Entre cualquier par de decimales siempre puedo encontrar otro. Hay <em>infinitos</em> números entre cualquier par.':'Between any pair of decimals I can always find another. There are <em>infinitely many</em> numbers between any pair.')+'</div>' +
    '<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin:.9rem 0;">' +
    '<div style="font-size:.71rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:.45rem">'+(L==='es'?'Ejemplo con decimales negativos':'Example with negative decimals')+'</div>' +
    '<p style="margin:.3rem 0">'+(L==='es'?'Entre <strong>'+ra.toFixed(1)+'</strong> y <strong>'+rb.toFixed(1)+'</strong>:':'Between <strong>'+ra.toFixed(1)+'</strong> and <strong>'+rb.toFixed(1)+'</strong>:')+'</p>' +
    '<p style="margin:.3rem 0">('+ra.toFixed(1)+' + '+rb.toFixed(1)+') ÷ 2 = '+(ra+rb).toFixed(1)+' ÷ 2 = <strong>'+rmid+'</strong></p>' +
    '<p style="margin:0">✓ '+rmid+' '+(L==='es'?'está entre '+ra.toFixed(1)+' y '+rb.toFixed(1):'is between '+ra.toFixed(1)+' and '+rb.toFixed(1))+'</p>' +
    '</div>';
  body.appendChild(s2);

  /* ══════════════════════════════════════════════════════
     INTERACTIVO 1 — Zoom: 0 → zb, siempre acercando
     Left side always 0; each click replaces right with midpoint
  ══════════════════════════════════════════════════════ */
  var zb0 = ri(1,5);
  window._zb0    = zb0;  // original full range
  window._zRight = zb0;  // current right boundary value (label on right tick)
  window._zMid   = null; // current middle value (null = show ?)
  window._zLevel = 0;

  var zsec=document.createElement('div'); zsec.className='section'; zsec.id='zsec';
  zsec.innerHTML=
    '<div class="stag">'+(L==='es'?'Interactivo':'Interactive')+'</div>' +
    '<h2 style="font-size:1.2rem;margin-bottom:.5rem">🔬 '+(L==='es'?'Entre 0 y '+zb0+': ¡Siempre hay un Número!':'Between 0 and '+zb0+': There Is Always a Number!')+'</h2>' +
    '<p>'+(L==='es'?'Empieza con 0 y '+zb0+'. Cada vez que hagas clic, el número de la derecha se reemplaza por el punto medio — ¡y siempre cabrá uno más!':'Start with 0 and '+zb0+'. Each click replaces the right number with the midpoint — there will always be room for one more!')+'</p>' +
    '<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:1.1rem;margin:.9rem 0;">' +
      '<div id="zwrap"></div>' +
      '<div style="display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap">' +
        '<button style="padding:.42rem 1rem;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit" onclick="zoomIn()">🔍 '+(L==='es'?'Acercar zoom':'Zoom in')+'</button>' +
        '<button style="padding:.42rem 1rem;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);border-radius:8px;font-size:.85rem;cursor:pointer;font-family:inherit" onclick="zoomReset()">↺ '+(L==='es'?'Reiniciar':'Reset')+'</button>' +
      '</div>' +
      '<div id="zfb" style="font-size:.83rem;margin-top:.6rem;color:var(--text2);line-height:1.6"></div>' +
    '</div>';
  body.appendChild(zsec);
  setTimeout(function(){ zoomRender(); }, 100);

  /* ── Problem 1 ── */
  var p1a=-(ri(10,30)/10), p1b=-(ri(1,9)/10);
  var p1mid=midStr(p1a,p1b);
  var p1w1=(p1a-0.5).toFixed(1), p1w2=(p1b+0.5).toFixed(1), p1w3=p1b.toFixed(1);
  var p1sh=shuf([p1mid,p1w1,p1w2,p1w3], p1mid);
  problems.push({
    title: L==='es'?'Encuentra un número entre dos decimales':'Find a number between two decimals',
    questionText: L==='es'?'¿Cuál número está entre <strong>'+p1a.toFixed(1)+'</strong> y <strong>'+p1b.toFixed(1)+'</strong>?':'Which number is between <strong>'+p1a.toFixed(1)+'</strong> and <strong>'+p1b.toFixed(1)+'</strong>?',
    options:p1sh.opts, correctIdx:p1sh.ci,
    hint: L==='es'?'Usa el punto medio: ('+p1a.toFixed(1)+' + '+p1b.toFixed(1)+') ÷ 2':'Use the midpoint: ('+p1a.toFixed(1)+' + '+p1b.toFixed(1)+') ÷ 2',
    explanation: '('+p1a.toFixed(1)+' + '+p1b.toFixed(1)+') ÷ 2 = '+(p1a+p1b).toFixed(1)+' ÷ 2 = <strong>'+p1mid+'</strong>. '+(L==='es'?'Este número está entre los dos.':'This number is between the two.'),
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════════
     SECTION 3 — ¿Cuándo NO se cumple? (enteros)
  ══════════════════════════════════════════════════════ */
  var ia=ri(-5,-2), ib=ia+1;
  var s3=document.createElement('div'); s3.className='section';
  s3.innerHTML=
    '<div class="stag">'+(L==='es'?'Concepto 3':'Concept 3')+'</div>' +
    '<h2>❌ '+(L==='es'?'¿Cuándo NO se Cumple la Densidad?':'When Does Density NOT Hold?')+'</h2>' +
    '<p>'+(L==='es'?'La propiedad de densidad <strong>NO se cumple</strong> en los <em>números enteros</em>.':'The density property <strong>does NOT hold</strong> for <em>integers</em>.')+'</p>' +
    '<div class="callout" style="background:var(--bad-bg);border-color:var(--bad);"><strong style="color:var(--bad)">'+(L==='es'?'Enteros NO son densos:':'Integers are NOT dense:')+'</strong> '+(L==='es'?'Entre '+ia+' y '+ib+' no existe ningún número entero. Son consecutivos, no hay entero entre ellos.':'Between '+ia+' and '+ib+' there is no integer. They are consecutive, there is no integer between them.')+'</div>' +
    '<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin:.9rem 0;">' +
    '<div style="font-size:.71rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:.45rem">'+(L==='es'?'Comparación clave':'Key comparison')+'</div>' +
    '<p>✅ '+(L==='es'?'Entre −3.5 y −3.0 hay infinitos decimales (ej. −3.2, −3.14, −3.001…)':'Between −3.5 and −3.0 there are infinitely many decimals (e.g. −3.2, −3.14, −3.001…)')+'</p>' +
    '<p style="margin:0">❌ '+(L==='es'?'Entre −4 y −3 no hay ningún <em>entero</em> (sí hay decimales, pero no enteros)':'Between −4 and −3 there is no <em>integer</em> (there are decimals, but no integers)')+'</p>' +
    '</div>';
  body.appendChild(s3);

  /* ── Problem 2 ── */
  var p2cases=[
    {q:{es:'Entre los números −0.5 y −0.4',en:'Between the numbers −0.5 and −0.4'}, a:{es:'Sí se cumple — existen números decimales entre ellos (ej. −0.45)',en:'Yes it holds — there are decimal numbers between them (e.g. −0.45)'}, hold:true},
    {q:{es:'Entre los números enteros −3 y −2',en:'Between the integers −3 and −2'}, a:{es:'No se cumple — no existe ningún entero entre −3 y −2',en:'No it does not — there is no integer between −3 and −2'}, hold:false},
    {q:{es:'Entre las fracciones −½ y −¼',en:'Between the fractions −½ and −¼'}, a:{es:'Sí se cumple — existe −⅜ entre ellas',en:'Yes it holds — −⅜ exists between them'}, hold:true},
    {q:{es:'Entre los enteros 7 y 8',en:'Between the integers 7 and 8'}, a:{es:'No se cumple — no existe ningún entero entre 7 y 8',en:'No it does not — there is no integer between 7 and 8'}, hold:false}
  ];
  var p2ci=Math.floor(rng()*p2cases.length);
  var p2c=p2cases[p2ci];
  var p2opts=p2c.hold
    ?(L==='es'?['Sí se cumple, hay infinitos números entre ellos','No se cumple, son números consecutivos en ℤ','Solo se cumple para números positivos','Depende del valor absoluto']:['Yes it holds, there are infinitely many numbers between them','No it does not, they are consecutive numbers in ℤ','It only holds for positive numbers','It depends on the absolute value'])
    :(L==='es'?['No se cumple, son números consecutivos en ℤ','Sí se cumple, hay infinitos números entre ellos','Solo se cumple para números positivos','Depende del valor absoluto']:['No it does not, they are consecutive numbers in ℤ','Yes it holds, there are infinitely many numbers between them','It only holds for positive numbers','It depends on the absolute value']);
  var p2sh=shuf(p2opts,p2opts[0]);
  problems.push({
    title: L==='es'?'¿Se cumple la propiedad de densidad?':'Does the density property hold?',
    questionText: (L==='es'?p2c.q.es:p2c.q.en)+(L==='es'?'. ¿La propiedad de densidad se cumple en este caso?':'. Does the density property hold in this case?'),
    options:p2sh.opts, correctIdx:p2sh.ci,
    hint: p2c.hold?(L==='es'?'¿Puedes encontrar un número decimal o fraccionario entre los dos?':'Can you find a decimal or fractional number between the two?'):(L==='es'?'¿Existe algún número del mismo tipo (entero) entre estos dos?':'Is there any number of the same type (integer) between these two?'),
    explanation: '<strong>'+(p2c.hold?(L==='es'?'Sí se cumple':'Yes it holds'):(L==='es'?'No se cumple':'No it does not'))+'.</strong> '+(L==='es'?p2c.a.es:p2c.a.en),
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════════
     SECTION 4 — Estrategia del punto medio
  ══════════════════════════════════════════════════════ */
  var ma=ri(-6,-3), mb=ri(3,6), mmid=midStr(ma,mb);
  var s4=document.createElement('div'); s4.className='section';
  s4.innerHTML=
    '<div class="stag">'+(L==='es'?'Concepto 4':'Concept 4')+'</div>' +
    '<h2>🎯 '+(L==='es'?'Encontrar Números Entre Dos Dados':'Finding Numbers Between Two Given Numbers')+'</h2>' +
    '<p>'+(L==='es'?'La <strong>estrategia del punto medio</strong> siempre funciona para encontrar un número entre dos:':'The <strong>midpoint strategy</strong> always works to find a number between two:')+'</p>' +
    '<div class="callout"><strong>'+(L==='es'?'Fórmula del punto medio:':'Midpoint formula:')+'</strong> '+(L==='es'?'Número entre a y b = (a + b) ÷ 2':'Number between a and b = (a + b) ÷ 2')+'</div>' +

    '<div style="font-size:.71rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:.45rem">'+(L==='es'?'Ejemplo con negativos':'Example with negatives')+'</div>' +
    '<p style="margin:.3rem 0">'+(L==='es'?'Entre '+ma+' y '+mb+':':'Between '+ma+' and '+mb+':')+'</p>' +
    '<p style="margin:.3rem 0">'+(L==='es'?'Punto medio':'Midpoint')+' = ('+ma+' + '+mb+') ÷ 2 = '+(ma+mb)+' ÷ 2 = <strong>'+mmid+'</strong></p>' +
    '<p style="margin:0">'+(L==='es'?'Verificación':'Check')+': '+ma+' &lt; '+mmid+' &lt; '+mb+' ✓</p>' +
    '</div>';
  body.appendChild(s4);

  /* ── Problem 3 ── */
  var p3a=ri(-8,-3), p3b=ri(-2,-1); while(p3a===p3b) p3b=ri(-2,-1);
  var p3mid=midStr(p3a,p3b);
  var p3sh=shuf([p3mid,((p3a+p3b)/2-0.5).toFixed(1),((p3a+p3b)/2+1).toFixed(1),String(Math.abs(p3a))], p3mid);
  problems.push({
    title: L==='es'?'Punto medio entre dos negativos':'Midpoint between two negatives',
    questionText: L==='es'?'Usando la fórmula del punto medio, encuentra un número que esté entre <strong>'+p3a+'</strong> y <strong>'+p3b+'</strong>.':'Using the midpoint formula, find a number that is between <strong>'+p3a+'</strong> and <strong>'+p3b+'</strong>.',
    options:p3sh.opts, correctIdx:p3sh.ci,
    hint: L==='es'?'Punto medio = ('+p3a+' + '+p3b+') ÷ 2. ¿Cuánto es '+p3a+' + '+p3b+'?':'Midpoint = ('+p3a+' + '+p3b+') ÷ 2. What is '+p3a+' + '+p3b+'?',
    explanation: '('+p3a+' + '+p3b+') ÷ 2 = '+(p3a+p3b)+' ÷ 2 = <strong>'+p3mid+'</strong>. '+(L==='es'?'Verificación':'Check')+': '+p3a+' &lt; '+p3mid+' &lt; '+p3b+' ✓',
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── Problem 4 ── */
  var p4a=ri(-5,-1), p4b=ri(1,5), p4mid=midStr(p4a,p4b);
  var p4sh=shuf([p4mid,String(p4a-1),String(p4b+1),'0.0'], p4mid);
  problems.push({
    title: L==='es'?'Entre un negativo y un positivo':'Between a negative and a positive',
    questionText: L==='es'?'¿Cuál número está exactamente en el punto medio entre <strong>'+p4a+'</strong> y <strong>'+p4b+'</strong>?':'Which number is exactly at the midpoint between <strong>'+p4a+'</strong> and <strong>'+p4b+'</strong>?',
    options:p4sh.opts, correctIdx:p4sh.ci,
    hint: L==='es'?'Punto medio = ('+p4a+' + '+p4b+') ÷ 2':'Midpoint = ('+p4a+' + '+p4b+') ÷ 2',
    explanation: '('+p4a+' + '+p4b+') ÷ 2 = '+(p4a+p4b)+' ÷ 2 = <strong>'+p4mid+'</strong>.',
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════════
     INTERACTIVO 2 — Las Dos Cubetas
     Show three numbers: two boundaries and one candidate.
     Student drags/drops into correct bucket.
  ══════════════════════════════════════════════════════ */

  /* Generate 6 triples: {a, b, x, between}
     3 where x IS between a and b, 3 where it is NOT.
     Mix of integers, negatives, and decimals for variety. */
  var binTriples = (function() {
    var triples = [];
    var used = {};

    function addTriple(a, b, x, between) {
      var key = a+'_'+b+'_'+x;
      if (used[key]) return false;
      used[key] = true;
      triples.push({ a:a, b:b, x:x, between:between });
      return true;
    }

    function rf1(lo, hi) {
      // random decimal with 1 decimal place
      return Math.round((lo + rng()*(hi-lo))*10)/10;
    }

    // 3 YES (x IS between a and b)
    while (triples.filter(function(t){return t.between;}).length < 3) {
      var a = ri(-5,2), gap = ri(2,6), b = a+gap;
      // x somewhere strictly inside
      var x;
      var type = Math.floor(rng()*3);
      if (type===0) {
        // integer inside
        x = a + ri(1, gap-1);
      } else if (type===1) {
        // decimal inside — midpoint
        x = Math.round((a+b)/2*10)/10;
        if (x===a || x===b) x = a + Math.round(gap/2*10)/10;
      } else {
        // negative decimal range
        var na = -(ri(1,5)+ri(1,5)/10), nb = na + ri(1,3) + ri(1,9)/10;
        na = Math.round(na*10)/10; nb = Math.round(nb*10)/10;
        x  = Math.round((na+nb)/2*10)/10;
        if (x!==na && x!==nb) { addTriple(na,nb,x,true); continue; }
      }
      addTriple(a,b,x,true);
    }

    // 3 NO (x is NOT between a and b)
    while (triples.filter(function(t){return !t.between;}).length < 3) {
      var a2 = ri(-4,2), gap2 = ri(2,5), b2 = a2+gap2;
      var x2;
      var type2 = Math.floor(rng()*3);
      if (type2===0) {
        // x below a
        x2 = a2 - ri(1,3);
      } else if (type2===1) {
        // x above b
        x2 = b2 + ri(1,3);
      } else {
        // x equals a boundary
        x2 = rng()<0.5 ? a2 : b2;
      }
      addTriple(a2,b2,x2,false);
    }

    // Shuffle
    for (var i=triples.length-1;i>0;i--) {
      var j=Math.floor(rng()*(i+1));
      var tmp=triples[i]; triples[i]=triples[j]; triples[j]=tmp;
    }
    return triples;
  })();

  window._bins = {
    triples: binTriples,

    // Rim
    svg+='<rect x="'+topX+'" y="'+rimY+'" width="'+topW+'" height="'+rimH+'" rx="3" fill="'+rimColor+'"/>';
    // Base

    // Shine
    svg+='<polygon points="'+(topX+8)+','+(bodyTop+6)+' '+(topX+18)+','+(bodyTop+6)+' '+(botX+14)+','+(bodyBot-10)+' '+(botX+4)+','+(bodyBot-10)+'" fill="white" opacity="0.18"/>';
    // Label inside bucket
    svg+='<text x="'+W/2+'" y="'+(bodyTop+bodyH/2+5)+'" text-anchor="middle" font-size="11" font-weight="700" fill="white" opacity="0.9">'+emoji+'</text>';

    '<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:1.1rem;margin:.9rem 0;">'+

            (L==='es'?'SÍ está<br>entre ellos':'YES, it is<br>between them')+

  body.appendChild(binSec);

  /* ══════════════════════════════════════════════════════

  var sf=document.createElement('div'); sf.className='section';
  sf.innerHTML='<div class="stag" style="color:var(--gold)">'+(L==='es'?'Evaluación Final':'Final Assessment')+'</div>' +

  body.appendChild(sf);

  /* ── Problem 5 ── */
  var p5a=ri(-4,-2), p5b=p5a+1;
  var p5opts=L==='es'
    ?['No, porque '+p5a+' y '+p5b+' son enteros consecutivos y no hay entero entre ellos','Sí, porque '+midStr(p5a,p5b)+' está entre los dos','No, porque los negativos no tienen densidad','Sí, porque la densidad siempre se cumple']
    :['No, because '+p5a+' and '+p5b+' are consecutive integers and there is no integer between them','Yes, because '+midStr(p5a,p5b)+' is between the two','No, because negatives do not have density','Yes, because density always holds'];
  var p5sh=shuf(p5opts,p5opts[0]);
  problems.push({
    title: L==='es'?'Densidad en enteros consecutivos':'Density in consecutive integers',
    questionText: L==='es'?'¿Se cumple la propiedad de densidad entre los enteros <strong>'+p5a+'</strong> y <strong>'+p5b+'</strong>?':'Does the density property hold between the integers <strong>'+p5a+'</strong> and <strong>'+p5b+'</strong>?',
    options:p5sh.opts, correctIdx:p5sh.ci, hint:'',
    explanation: L==='es'?'<strong>No se cumple.</strong> '+p5a+' y '+p5b+' son enteros consecutivos. No existe ningún entero entre ellos. La densidad no aplica al conjunto de enteros.':'<strong>No it does not.</strong> '+p5a+' and '+p5b+' are consecutive integers. There is no integer between them. Density does not apply to the set of integers.',
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── Problem 6 ── */
  var p6a=-(ri(20,50)/10), p6b=-(ri(1,19)/10);
  var p6mid=midStr(p6a,p6b);
  var p6opts=[p6mid,String(p6a-0.5),String(p6b+0.5),L==='es'?'No existe tal número':'No such number exists'];

  });

  });

  var p8a=-(ri(5,15)/10), p8b=-(ri(1,4)/10);

  var p8opts=L==='es'
    ?['Infinitos (hay siempre un decimal entre ellos)','Solo uno (el punto medio)','Ninguno (son números muy cercanos)','Exactamente dos']
    :['Infinitely many (there is always a decimal between them)','Only one (the midpoint)','None (they are very close numbers)','Exactly two'];
  var p8sh=shuf(p8opts,p8opts[0]);
  problems.push({

    options:p8sh.opts, correctIdx:p8sh.ci, hint:'',
    explanation: L==='es'?'Hay <strong>infinitos</strong> números entre ellos. La densidad implica que siempre puedes encontrar otro más, sin importar cuán cercanos estén.':'There are <strong>infinitely many</strong> numbers between them. Density means you can always find another, no matter how close they are.',
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── Problem 9 ── */
  var p9a=ri(-10,-6), p9b=ri(-5,-1), p9mid=midStr(p9a,p9b);
  var p9sh=shuf([p9mid,((p9a+p9b)/2-1).toFixed(1),((p9a+p9b)/2+1).toFixed(1),String(p9b)], p9mid);
  problems.push({
    title: L==='es'?'Calcula el punto medio':'Calculate the midpoint',

    options:p9sh.opts, correctIdx:p9sh.ci, hint:'',
    explanation: '('+p9a+' + '+p9b+') ÷ 2 = '+(p9a+p9b)+' ÷ 2 = <strong>'+p9mid+'</strong>.',

  });

  var p10a=-(ri(4,8)/10), p10b=-(ri(1,3)/10);

  var p10mid=midStr(p10a,p10b);
  var p10opts=L==='es'
    ?['Sí, porque entre dos decimales siempre hay infinitos racionales','No, porque son números negativos','Depende, solo si son decimales con un decimal','No, porque la densidad solo aplica a positivos']
    :['Yes, because between two decimals there are always infinitely many rationals','No, because they are negative numbers','It depends, only if they are one-decimal numbers','No, because density only applies to positives'];

  });
  buildOneCard(problems[problems.length-1], problems.length-1);

/* ══════════════════════════════════════════════════════
   ZOOM WIDGET — 0 on left, midpoint replaces right each click
══════════════════════════════════════════════════════ */
function zoomRender() {
  var L    = LANG;
  var zb0  = window._zb0  || 4;
  var zR   = window._zRight;          // label shown on right tick
  var zM   = window._zMid;            // label shown in middle (null = ?)
  var lv   = window._zLevel;
  var wrap = document.getElementById('zwrap');
  if (!wrap) return;

  var W    = Math.max(280, wrap.offsetWidth || 360);
  var H    = 66;
  var PAD  = 22;
  var xL   = PAD;          // left tick — fixed pixel position
  var xR   = W - PAD;      // right tick — fixed pixel position, NEVER moves
  var xM   = (xL + xR) / 2; // middle dot — fixed pixel position, NEVER moves

  var zRStr = niceNum(zR, 6);
  var zMStr = (zM !== null) ? niceNum(zM, 6) : null;

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" '
          + 'xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">';

  /* axis line */
  svg += '<line x1="' + xL + '" y1="32" x2="' + xR + '" y2="32" '
       + 'stroke="var(--border)" stroke-width="2"/>';

  /* LEFT tick + label — always 0, always at xL */
  svg += '<line x1="' + xL + '" y1="24" x2="' + xL + '" y2="40" '
       + 'stroke="var(--green)" stroke-width="2.5"/>';
  svg += '<text x="' + xL + '" y="56" text-anchor="middle" '
       + 'font-size="11" fill="var(--green-dark)" font-weight="700">0</text>';

  /* RIGHT tick + label — always at xR, label is zR (changes each promotion) */
  svg += '<line x1="' + xR + '" y1="24" x2="' + xR + '" y2="40" '
       + 'stroke="var(--green)" stroke-width="2.5"/>';
  svg += '<text x="' + xR + '" y="56" text-anchor="middle" '
       + 'font-size="11" fill="var(--green-dark)" font-weight="700">' + zRStr + '</text>';

  /* MIDDLE dot + label — always at xM, label is zM or ? */
  if (zM === null) {
    svg += '<circle cx="' + xM + '" cy="32" r="6" fill="var(--border)"/>';
    svg += '<text x="' + xM + '" y="18" text-anchor="middle" '
         + 'font-size="12" fill="var(--text3)" font-weight="700">?</text>';
  } else {
    svg += '<line x1="' + xM + '" y1="24" x2="' + xM + '" y2="40" '
         + 'stroke="var(--gold)" stroke-width="2"/>';
    svg += '<circle cx="' + xM + '" cy="32" r="7" fill="var(--gold)"/>';
    svg += '<text x="' + xM + '" y="18" text-anchor="middle" '
         + 'font-size="11" fill="var(--gold)" font-weight="700">' + zMStr + '</text>';
    svg += '<text x="' + xM + '" y="56" text-anchor="middle" '
         + 'font-size="10" fill="var(--gold)" font-weight="600">' + zMStr + '</text>';
  }

  svg += '</svg>';
  wrap.innerHTML = svg;

  /* feedback */
  var fb = document.getElementById('zfb');
  if (!fb) return;
  if (lv === 0) {
    fb.innerHTML = L === 'es'
      ? 'Entre <strong>0</strong> y <strong>' + zRStr + '</strong> siempre existe un número. '
        + 'Presiona "Acercar zoom" para revelarlo.'
      : 'Between <strong>0</strong> and <strong>' + zRStr + '</strong> there is always a number. '
        + 'Press "Zoom in" to reveal it.';
  } else if (zM !== null) {
    fb.innerHTML = L === 'es'
      ? '✓ El punto medio entre <strong>0</strong> y <strong>' + zRStr + '</strong> '
        + 'es <strong style="color:var(--gold)">' + zMStr + '</strong>. '
        + 'Presiona de nuevo: <strong>' + zMStr + '</strong> pasa a la derecha '
        + 'y aparece un nuevo punto medio.'
      : '✓ The midpoint between <strong>0</strong> and <strong>' + zRStr + '</strong> '
        + 'is <strong style="color:var(--gold)">' + zMStr + '</strong>. '
        + 'Press again: <strong>' + zMStr + '</strong> moves to the right '
        + 'and a new midpoint appears.';
  } else {
    fb.innerHTML = L === 'es'
      ? 'Ahora el intervalo es <strong>[0, ' + zRStr + ']</strong>. '
        + '¿Puedes predecir cuál será el siguiente punto medio? Presiona para verlo.'
        + (lv >= 10 ? ' ¡' + lv + ' pasos — nunca termina!' : '')
      : 'The interval is now <strong>[0, ' + zRStr + ']</strong>. '
        + 'Can you predict the next midpoint? Press to see it.'
        + (lv >= 10 ? ' ' + lv + ' steps — it never ends!' : '');
  }
}

function niceNum(n, dec) {
  if (n === 0 || n % 1 === 0) return String(n);
  return parseFloat(n.toFixed(dec || 1)).toString();
}
function zoomIn() {
  window._zLevel++;
  if (window._zMid === null) {
    /* Step A: reveal midpoint — just update the label in the middle */
    window._zMid = window._zRight / 2;
  } else {
    /* Step B: promote — right label becomes the found middle, find new middle */
    window._zRight = window._zMid;
    window._zMid   = window._zRight / 2;
  }
  zoomRender();
}
function zoomReset() {
  window._zRight = window._zb0;
  window._zMid   = null;
  window._zLevel = 0;
  zoomRender();
}

   LAS DOS CUBETAS — logic functions

function binShowCard() {
  var bins = window._bins;
  if (bins.done || bins.current >= bins.triples.length) { binFinish(); return; }
  var t = bins.triples[bins.current];
  var L = LANG;

  // Format numbers cleanly
  function fmt(n) { return n % 1 === 0 ? String(n) : n.toFixed(1); }

  var rangeEl = document.getElementById('bin-card-range');
  var xEl     = document.getElementById('bin-card-x');
  var cardEl  = document.getElementById('bin-card');

  if (rangeEl) rangeEl.textContent = (L==='es'?'Entre ':'Between ') + fmt(t.a) + ' y ' + fmt(t.b);
  if (xEl)     xEl.textContent = fmt(t.x);

  if (cardEl) {
    cardEl.style.opacity     = '1';
    cardEl.style.transform   = 'scale(1)';
    cardEl.style.borderColor = 'var(--green)';
    cardEl.style.background  = 'var(--surface)';
  }

  // Reset bin highlights
  ['bin-yes','bin-no'].forEach(function(id) {
    var b = document.getElementById(id);
    if (b) { b.style.transform=''; b.style.boxShadow=''; }
  });

  var prog = document.getElementById('bin-progress');
  if (prog) prog.textContent = (L==='es'?'Par ':'Card ') + (bins.current+1) + ' / ' + bins.triples.length;

  var fb = document.getElementById('bin-fb');
  if (fb) fb.innerHTML = '';
}

function binDrop(isYes) {
  var bins = window._bins;
  if (bins.done || bins.current >= bins.triples.length) return;
  var t   = bins.triples[bins.current];
  var L   = LANG;

  function fmt(n) { return n % 1 === 0 ? String(n) : n.toFixed(1); }

  // Determine correctness: x is between a and b means min(a,b) < x < max(a,b)
  var lo = Math.min(t.a, t.b), hi = Math.max(t.a, t.b);
  var actually = (t.x > lo && t.x < hi);
  var correct  = (isYes === actually);

  var cardEl = document.getElementById('bin-card');
  var fb     = document.getElementById('bin-fb');

  if (cardEl) {
    cardEl.style.borderColor = correct ? '#2d6a4f' : 'var(--bad)';
    cardEl.style.background  = correct ? 'var(--green-bg)' : 'var(--bad-bg)';
  }

  if (correct) {
    bins.score.correct++;
    var msg = actually
      ? (L==='es'
          ? '✓ Correcto. <strong>'+fmt(t.x)+'</strong> sí está entre <strong>'+fmt(t.a)+'</strong> y <strong>'+fmt(t.b)+'</strong> ('+fmt(lo)+' &lt; '+fmt(t.x)+' &lt; '+fmt(hi)+').'
          : '✓ Correct. <strong>'+fmt(t.x)+'</strong> IS between <strong>'+fmt(t.a)+'</strong> and <strong>'+fmt(t.b)+'</strong> ('+fmt(lo)+' &lt; '+fmt(t.x)+' &lt; '+fmt(hi)+').')
      : (L==='es'
          ? '✓ Correcto. <strong>'+fmt(t.x)+'</strong> no está entre <strong>'+fmt(t.a)+'</strong> y <strong>'+fmt(t.b)+'</strong>.'
          : '✓ Correct. <strong>'+fmt(t.x)+'</strong> is NOT between <strong>'+fmt(t.a)+'</strong> and <strong>'+fmt(t.b)+'</strong>.');
    if (fb) fb.innerHTML = '<span style="color:var(--green-dark);font-weight:600">'+msg+'</span>';
  } else {
    bins.score.wrong++;
    var msg2 = actually
      ? (L==='es'
          ? '✗ Casi. <strong>'+fmt(t.x)+'</strong> sí está entre '+fmt(t.a)+' y '+fmt(t.b)+' — va en la cubeta verde.'
          : '✗ Almost. <strong>'+fmt(t.x)+'</strong> IS between '+fmt(t.a)+' and '+fmt(t.b)+' — it goes in the green bucket.')
      : (L==='es'
          ? '✗ Casi. <strong>'+fmt(t.x)+'</strong> no está entre '+fmt(t.a)+' y '+fmt(t.b)+' — va en la cubeta roja.'
          : '✗ Almost. <strong>'+fmt(t.x)+'</strong> is NOT between '+fmt(t.a)+' and '+fmt(t.b)+' — it goes in the red bucket.');
    if (fb) fb.innerHTML = '<span style="color:var(--bad);font-weight:600">'+msg2+'</span>';
  }

  bins.current++;
  setTimeout(function() {
    if (bins.current >= bins.triples.length) binFinish();
    else binShowCard();
  }, 1900);
}

function binFinish() {
  window._bins.done = true;
  var bins = window._bins;
  var L    = LANG;
  var right = bins.score.correct;
  var total = bins.triples.length;
  var cardWrap = document.getElementById('bin-card-wrap');
  if (cardWrap) cardWrap.style.display = 'none';
  var prog = document.getElementById('bin-progress');
  if (prog) prog.textContent = '';
  var emoji = right===total?'🏆':right>=total*0.66?'⭐':'💪';
  var fb    = document.getElementById('bin-fb');
  if (fb) fb.innerHTML =
    '<div style="text-align:center;padding:.4rem 0">'+
      '<div style="font-size:2rem;margin-bottom:.3rem">'+emoji+'</div>'+
      '<div style="font-size:1.1rem;font-weight:700;color:var(--green-dark)">'+right+' / '+total+'</div>'+
      '<div style="font-size:.83rem;color:var(--text2);margin-top:.25rem">'+(L==='es'?'correctas':'correct')+'</div>'+
      (right<total
        ? '<div style="font-size:.8rem;color:var(--text3);margin-top:.4rem">'+(L==='es'?'Recuerda: un número está entre a y b si es mayor que el menor y menor que el mayor.':'Remember: a number is between a and b if it is greater than the smaller and less than the larger.')+'</div>'
        : '')+
    '</div>';
}

function binSetupDrag() {
  var card   = document.getElementById('bin-card');
  var binYes = document.getElementById('bin-yes');
  var binNo  = document.getElementById('bin-no');
  if (!card || !binYes || !binNo) return;

  /* ── Desktop HTML5 drag ── */
  card.addEventListener('dragstart', function(e) {
    e.dataTransfer.effectAllowed = 'move';
    card.style.opacity = '0.55';
    card.style.cursor  = 'grabbing';
  });
  card.addEventListener('dragend', function() {
    card.style.opacity = '1';
    card.style.cursor  = 'grab';
  });
  [binYes, binNo].forEach(function(bin) {
    bin.addEventListener('dragover', function(e) {
      e.preventDefault();
      bin.style.transform  = 'scale(1.05)';
      bin.style.boxShadow  = '0 0 0 3px var(--gold)';
    });
    bin.addEventListener('dragleave', function() {
      bin.style.transform = '';
      bin.style.boxShadow = '';
    });
    bin.addEventListener('drop', function(e) {
      e.preventDefault();
      bin.style.transform = '';
      bin.style.boxShadow = '';
      binDrop(bin.id === 'bin-yes');
    });
  });

  /* ── Mobile touch — floating clone ── */
  var clone = null, startX = 0, startY = 0, cardRect = null;

  card.addEventListener('touchstart', function(e) {
    if (window._bins.done) return;
    e.preventDefault();
    var t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    cardRect = card.getBoundingClientRect();
    clone = card.cloneNode(true);
    clone.removeAttribute('id');
    clone.style.cssText =
      'position:fixed;left:'+cardRect.left+'px;top:'+cardRect.top+'px;'+
      'width:'+cardRect.width+'px;z-index:9999;opacity:.88;'+
      'pointer-events:none;transition:none;cursor:grabbing;'+
      'box-shadow:0 8px 24px rgba(0,0,0,.22);';
    document.body.appendChild(clone);
    card.style.opacity = '0.25';
  }, { passive: false });

  card.addEventListener('touchmove', function(e) {
    if (!clone) return;
    e.preventDefault();
    var t = e.touches[0];
    clone.style.left = (cardRect.left + t.clientX - startX) + 'px';
    clone.style.top  = (cardRect.top  + t.clientY - startY) + 'px';
    [binYes, binNo].forEach(function(bin) {
      var r = bin.getBoundingClientRect();
      var over = t.clientX>=r.left && t.clientX<=r.right &&
                 t.clientY>=r.top  && t.clientY<=r.bottom;
      bin.style.transform = over ? 'scale(1.05)' : '';
      bin.style.boxShadow = over ? '0 0 0 3px var(--gold)' : '';
    });
  }, { passive: false });

  card.addEventListener('touchend', function(e) {
    if (!clone) return;
    var t = e.changedTouches[0];
    document.body.removeChild(clone); clone = null;
    card.style.opacity = '1';
    [binYes, binNo].forEach(function(bin) {
      bin.style.transform = '';
      bin.style.boxShadow = '';
    });
    var ry = binYes.getBoundingClientRect();
    var rn = binNo.getBoundingClientRect();
    if (t.clientX>=ry.left&&t.clientX<=ry.right&&t.clientY>=ry.top&&t.clientY<=ry.bottom)
      binDrop(true);
    else if (t.clientX>=rn.left&&t.clientX<=rn.right&&t.clientY>=rn.top&&t.clientY<=rn.bottom)
      binDrop(false);
    // else no-drop: card returns to place
  }, { passive: false });

  /* ── Tap fallback on bins ── */
  binYes.addEventListener('click', function() { if (!window._bins.done) binDrop(true); });
  binNo.addEventListener('click',  function() { if (!window._bins.done) binDrop(false); });
}

</script>
