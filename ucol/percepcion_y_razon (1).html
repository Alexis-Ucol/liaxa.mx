<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percepción y Razón — Filosofía y Humanidades</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Colegio Anáhuac Colima ── */
:root {
  --green:      #681838;
  --green-dark: #481127;
  --green-bg:   #ebe1e5;
  --gold:       #b88848;
  --gold-bg:    #f6f0e7;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #a62659;
  --green-dark: #d4457e;
  --green-bg:   #1d0c13;
  --gold:       #c9a574;
  --gold-bg:    #1c1812;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:72px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:36px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── QUOTE BLOCK ── */
.qblock { background:var(--gold-bg); border-left:4px solid var(--gold); border-radius:0 10px 10px 0; padding:1.1rem 1.4rem; margin:1.2rem 0; }
.qblock blockquote { font-family:'Crimson Pro',serif; font-size:1.2rem; color:var(--text); font-style:italic; margin-bottom:.5rem; }
.qblock cite { font-size:.75rem; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-size:.9rem; color:var(--green-dark); font-weight:600; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { font-size:.9rem; color:var(--text); margin-bottom:.9rem; line-height:1.6; }
.pfn { display:block; font-size:.75rem; color:var(--text3); margin-top:.35rem; font-style:italic; }
.mcopts { display:flex; flex-direction:column; gap:.5rem; margin:.5rem 0; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.62rem .85rem; border:1.5px solid var(--border); border-radius:9px; cursor:pointer; font-size:.87rem; transition:all .15s; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopt.dis { cursor:default; pointer-events:none; }
.mcopt.sc  { background:var(--ok-bg); border-color:var(--ok); color:var(--ok); }
.mcopt.sw  { background:var(--bad-bg); border-color:var(--bad); color:var(--bad); }
.mcopt.rc  { background:var(--ok-bg); border-color:var(--ok); }
.mcfb { display:none; padding:.7rem .9rem; border-radius:8px; font-size:.84rem; margin-top:.65rem; line-height:1.5; }
.mcfb.show { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok);  }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); margin-bottom:.7rem; }
.hintbox.show { display:block; }

/* ── WORK AREA ── */
.wtabs { display:flex; gap:.4rem; margin-bottom:.5rem; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.dcanvas { width:100%; height:130px; display:block; cursor:crosshair; touch-action:none; background:#fff; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.4rem .5rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:.22rem .55rem; cursor:pointer; font-size:.75rem; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:none; font-size:.75rem; color:var(--bad); cursor:pointer; margin-left:auto; }
.wtextarea { width:100%; min-height:100px; padding:.6rem .8rem; border:1px solid var(--border); border-radius:8px; font-family:'IBM Plex Mono',monospace; font-size:.83rem; background:var(--surface2); color:var(--text); resize:vertical; }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.2rem; text-align:center; cursor:pointer; position:relative; }
.pzone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.8rem; }
.pztxt { font-size:.78rem; color:var(--text3); margin-top:.3rem; }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; }

/* ── ILLUSION WIDGET ── */
.illusion-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.3rem; margin:1.2rem 0; text-align:center; }
.illusion-title { font-size:.72rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:.8rem; }
.illusion-canvas { border:1px solid var(--border); border-radius:10px; background:#fff; margin:0 auto .8rem; display:block; cursor:pointer; }
.illusion-label { font-size:.82rem; color:var(--text2); margin-bottom:.5rem; }
.illusion-reveal { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.4rem; cursor:pointer; font-size:.85rem; font-weight:600; }
.illusion-reveal:hover { background:var(--green-dark); }
.illusion-answer { display:none; margin-top:.8rem; padding:.7rem 1rem; background:var(--gold-bg); border-radius:8px; font-size:.86rem; color:var(--text); border:1px solid var(--gold); }
.illusion-answer.show { display:block; }
.il-tabs { display:flex; gap:.5rem; justify-content:center; margin-bottom:.9rem; flex-wrap:wrap; }
.il-tab { padding:.35rem 1rem; border:1.5px solid var(--border); border-radius:20px; font-size:.8rem; cursor:pointer; color:var(--text2); background:var(--surface2); transition:all .15s; }
.il-tab.active { background:var(--gold); color:#fff; border-color:var(--gold); }

/* ── DOWNLOAD BUTTON ── */
.dlbtn { background:var(--gold); color:#fff; border:none; border-radius:10px; padding:.9rem 2.2rem; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:#1e2e7a; }
.hl-btn { background:var(--text3); color:#fff; border:none; border-radius:7px; padding:.4rem 1rem; font-size:.82rem; font-weight:600; cursor:pointer; }

/* ── SCENARIO CARDS (Auditoría) ── */
.scenario-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.3rem 1.3rem 1rem; margin:1.2rem 0; }
.scenario-card.reflection-card { border-color:var(--gold); border-width:2px; }
.scenario-header { display:flex; align-items:flex-start; gap:.85rem; margin-bottom:.85rem; }
.scenario-num { background:var(--green); color:#fff; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:700; flex-shrink:0; margin-top:.1rem; }
.scenario-tag { font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--green-dark); font-weight:600; margin-bottom:.2rem; }
.scenario-title { font-family:'Crimson Pro',serif; font-size:1.15rem; font-weight:700; }
.scenario-desc { font-size:.88rem; color:var(--text2); margin-bottom:1rem; line-height:1.6; border-left:3px solid var(--border); padding-left:.85rem; }
.scenario-fields { display:flex; flex-direction:column; gap:.75rem; margin-bottom:.85rem; }
.sfield-group { display:flex; flex-direction:column; gap:.3rem; }
.sfield-label { font-size:.78rem; font-weight:600; color:var(--text); }
.sfield-sub { font-weight:400; color:var(--text3); font-size:.72rem; }
.sfield-input { width:100%; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.87rem; font-family:inherit; resize:vertical; min-height:60px; line-height:1.55; transition:border-color .18s; }
.sfield-input.tall { min-height:90px; }
.sfield-input:focus { outline:none; border-color:var(--green); }
.scenario-hint { display:flex; align-items:flex-start; gap:.5rem; background:var(--green-bg); border-radius:8px; padding:.6rem .85rem; font-size:.78rem; color:var(--text2); }
.sh-icon { flex-shrink:0; }
.audit-complete { display:flex; align-items:center; gap:.75rem; background:var(--ok-bg); border:1px solid var(--ok); border-radius:10px; padding:.9rem 1.1rem; margin-top:1rem; }
.audit-check { background:var(--ok); color:#fff; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }
.audit-msg { font-size:.86rem; color:var(--ok); font-weight:600; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding:1.6rem 1.1rem; border-radius:12px; }
  .wlogos img { height:48px; }
  .wtitle { font-size:1.35rem; }
  .htitle { display:none; }
  .hlogos img { height:22px; }
  .lbody { padding:1.2rem .7rem 3rem; }
  .section h2 { font-size:1.3rem; }
  .rules-grid { grid-template-columns:1fr; }
  .pbody { padding:.75rem; }
  .pstmt { font-size:.84rem; }
  .mcopt { font-size:.83rem; padding:.58rem .7rem; }
  .dcanvas { height:180px; }
  .illusion-canvas { max-width:100% !important; }
  .scenario-card { padding:1rem .85rem; }
  .sfield-input { font-size:.83rem; }
}
</style>
</head>

<script>
/* ── STATE ── */
var studentData = {};
var problems    = [];

/* ── SESSION ── */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'percepcion_razon__' + (n + '__' + g).replace(/\s+/g,'_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings=[], texts=[], photos=[];
  problems.forEach(function(p,i) {
    var dc=document.getElementById('dc'+i);
    if (dc && dc.width) {
      var blank=document.createElement('canvas'); blank.width=dc.width; blank.height=dc.height;
      drawings.push(dc.toDataURL()===blank.toDataURL()?null:dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta=document.getElementById('ta'+i); texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);
    photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={ name:studentData.name, group:studentData.group,
    answeredCount:answeredCount, correctCount:correctCount,
    choices:problems.map(function(p){return p.studentChoice;}),
    drawings:drawings, texts:texts, photos:photos };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name,group) {
  var key='percepcion_razon__'+(name+'__'+group).replace(/\s+/g,'_');
  try { var r=localStorage.getItem(key); return r?JSON.parse(r):null; } catch(e){ return null; }
}
function restoreSession() {
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group); if (!saved) return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};
  answeredCount=0; correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});
  },{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  saved.choices.forEach(function(choice,idx){ if(choice!==null&&choice!==undefined) confirmMC(idx,choice); });
  setTimeout(function(){
    if(saved.drawings){saved.drawings.forEach(function(dataUrl,i){
      if(!dataUrl)return;
      var dc=document.getElementById('dc'+i); if(!dc||!dc.width)return;
      var img=new Image(); img.onload=function(){var dpr=window.devicePixelRatio||1;dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr);};img.src=dataUrl;
    });}
    if(saved.texts){saved.texts.forEach(function(text,i){if(!text)return;var ta=document.getElementById('ta'+i);if(ta)ta.value=text;});}
    if(saved.photos){saved.photos.forEach(function(dataUrl,i){if(!dataUrl)return;var pp=document.getElementById('pp'+i);if(!pp)return;pp.src=dataUrl;pp.style.display='block';var pz=document.getElementById('pz'+i);if(pz)pz.style.opacity='0.4';});}
    restoreAudit();
  },300);
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}
function checkForSavedSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var saved=loadSession(name,group);
  var bar=document.getElementById('restoreBar');
  bar.style.display=(saved&&saved.choices&&saved.choices.some(function(c){return c!==null;}))?'block':'none';
}

var answeredCount=0, correctCount=0;

/* ── THEME ── */
var THEME_KEY='percepcion_razon__theme';
function toggleTheme(){
  var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';
  try{localStorage.setItem(THEME_KEY,next);}catch(e){}
}
(function(){
  document.documentElement.setAttribute('data-theme','light');
  try{var t=localStorage.getItem(THEME_KEY);if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('themeBtn');if(b)b.textContent='☀️';});}}catch(e){}
})();

/* ── SEEDED RNG ── */
function seededRng(seed){
  var s=0; for(var i=0;i<seed.length;i++) s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

/* ── START ── */
function startLesson(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!name||!group){err.textContent='Por favor llena ambos campos.';return;}
  err.textContent='';
  studentData={name:name,group:group};
  answeredCount=0; correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});
  },{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
}

/* ── CANVAS ── */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr); ctx.strokeStyle='#2d5a27'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  var drawing=false, lx=0, ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen')){ctx.lineWidth=2;}
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});
      dot.classList.add('sel');
      ctx.strokeStyle=dot.dataset.color;
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

/* ── TABS ── */
function switchTab(idx,panel,btn){
  var prefix='wp_'+idx+'_';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){p.classList.remove('active');});
  document.getElementById(prefix+panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

/* ── PHOTO ── */
function handlePhoto(idx,input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();

/* ── HANDLE MC ── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx]; if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx; prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){
      if(i===prob.correctIdx)o.classList.add('rc');
      if(i===chosenIdx&&isOk)o.classList.add('sc');
      if(i===chosenIdx&&!isOk)o.classList.add('sw');
    });
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();
    if(answeredCount===problems.length)setTimeout(showResults,700);
    return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx]; if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');

/* ────────────────────────────────────────────────────
   ILLUSION WIDGET FUNCTIONS
   ──────────────────────────────────────────────────── */
var illusionRevealed = {};

function revealIllusion(id) {
  illusionRevealed[id] = true;
  var ans = document.getElementById('il-ans-' + id);
  if (ans) { ans.classList.add('show'); }
  var btn = document.getElementById('il-btn-' + id);
  if (btn) { btn.style.opacity = '0.5'; btn.disabled = true; }
}

function switchIllusion(id, tabIdx) {
  var tabs = document.querySelectorAll('#il-tabs-' + id + ' .il-tab');
  tabs.forEach(function(t,i){ t.classList.toggle('active', i===tabIdx); });
  drawIllusion(id, tabIdx);
  illusionRevealed[id] = false;
  var ans = document.getElementById('il-ans-' + id);
  if (ans) ans.classList.remove('show');
  var btn = document.getElementById('il-btn-' + id);
  if (btn) { btn.style.opacity = '1'; btn.disabled = false; }
}

function drawIllusion(id, idx) {
  if (id === 'rubin') { rubinDraw(); return; }  // Rubin never resizes

  var canvas = document.getElementById('il-' + id);
  if (!canvas) return;

  // Resize canvas buffer to actual display size (only for muller + ebbinghaus)
  var dpr = window.devicePixelRatio || 1;
  var displayW = canvas.offsetWidth  || canvas.width;
  var displayH = canvas.offsetHeight || canvas.height;
  if (canvas.width !== Math.round(displayW * dpr) || canvas.height !== Math.round(displayH * dpr)) {
    canvas.width  = Math.round(displayW * dpr);
    canvas.height = Math.round(displayH * dpr);
  }
  var ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var W = displayW;
  var H = displayH;
  ctx.clearRect(0, 0, W, H);

  if (id === 'muller') {
    ctx.fillStyle = '#f8f6f1';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#1a1a16';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    // Line length: 42% of canvas width — comfortable, not filling edge-to-edge
    var L   = Math.round(W * 0.42);
    var aw  = 16, ah = 10;   // arrow arm size

    // Line A: left-aligned, upper row. Arrows flare OUTWARD → looks longer
    var aXs = Math.round(W * 0.08);
    var aXe = aXs + L;
    var y1  = Math.round(H * 0.30);

    ctx.beginPath(); ctx.moveTo(aXs, y1); ctx.lineTo(aXe, y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(aXs, y1); ctx.lineTo(aXs - aw, y1 - ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(aXs, y1); ctx.lineTo(aXs - aw, y1 + ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(aXe, y1); ctx.lineTo(aXe + aw, y1 - ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(aXe, y1); ctx.lineTo(aXe + aw, y1 + ah); ctx.stroke();

    // Line B: shifted RIGHT, lower row. Arrows pinch INWARD → looks shorter
    var bXs = Math.round(W * 0.50 - L / 2);  // centred-right
    var bXe = bXs + L;
    var y2  = Math.round(H * 0.70);

    ctx.beginPath(); ctx.moveTo(bXs, y2); ctx.lineTo(bXe, y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bXs, y2); ctx.lineTo(bXs + aw, y2 - ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bXs, y2); ctx.lineTo(bXs + aw, y2 + ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bXe, y2); ctx.lineTo(bXe - aw, y2 - ah); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bXe, y2); ctx.lineTo(bXe - aw, y2 + ah); ctx.stroke();

    // Labels
    ctx.fillStyle = '#7a7468';
    ctx.font = '12px IBM Plex Sans, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('Línea A', aXs, y1 - 6);
    ctx.fillText('Línea B', bXs, y2 - 6);
    ctx.textBaseline = 'alphabetic';

    if (illusionRevealed['muller']) {
      // Orange vertical ticks at the true endpoints
      ctx.strokeStyle = '#681838'; ctx.lineWidth = 2; ctx.setLineDash([]);
      var tk = 8;
      [[aXs,y1],[aXe,y1],[bXs,y2],[bXe,y2]].forEach(function(p){
        ctx.beginPath(); ctx.moveTo(p[0], p[1]-tk); ctx.lineTo(p[0], p[1]+tk); ctx.stroke();
      });
      ctx.setLineDash([5,3]);
      ctx.beginPath(); ctx.moveTo(aXs, y1+14); ctx.lineTo(aXe, y1+14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bXs, y2+14); ctx.lineTo(bXe, y2+14); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#681838';
      ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('¡Las dos líneas miden exactamente lo mismo!', W/2, H - 5);
    }
  }

  if (id === 'ebbinghaus') {
    ctx.fillStyle = '#f8f6f1'; ctx.fillRect(0, 0, W, H);
    var cx1 = W * 0.28, cx2 = W * 0.72, cy = H / 2;
    var cr = 22;
    var surroundR_big = 26, surroundR_small = 12;  // was 38 — now has clear gaps
    var orbitR = 66, orbitSmall = 42;
    var angles = [0, Math.PI/3, 2*Math.PI/3, Math.PI, 4*Math.PI/3, 5*Math.PI/3];
    ctx.fillStyle = '#aaa49a';
    angles.forEach(function(a) {
      ctx.beginPath(); ctx.arc(cx1 + Math.cos(a)*orbitR, cy + Math.sin(a)*orbitR, surroundR_big, 0, Math.PI*2); ctx.fill();
    });
    ctx.fillStyle = '#b88848';
    ctx.beginPath(); ctx.arc(cx1, cy, cr, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aaa49a';
    angles.forEach(function(a) {
      ctx.beginPath(); ctx.arc(cx2 + Math.cos(a)*orbitSmall, cy + Math.sin(a)*orbitSmall, surroundR_small, 0, Math.PI*2); ctx.fill();
    });
    ctx.fillStyle = '#b88848';
    ctx.beginPath(); ctx.arc(cx2, cy, cr, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a7468'; ctx.font = '12px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Círculo A', cx1, cy + orbitR + surroundR_big + 14);
    ctx.fillText('Círculo B', cx2, cy + orbitSmall + surroundR_small + 14);
    if (illusionRevealed['ebbinghaus']) {
      ctx.strokeStyle = '#681838'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx1, cy, cr, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx2, cy, cr, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#681838'; ctx.font = 'bold 12px IBM Plex Sans, sans-serif';
      ctx.fillText('¡Los círculos azules son del mismo tamaño!', W/2, H - 10);
    }
  }
}

/* ── RUBIN DRAW — completely standalone, never touches canvas.width/height ── */
window._rubinInverted = false;
function toggleRubin() {
  window._rubinInverted = !window._rubinInverted;
  rubinDraw();
}
function rubinDraw() {
  var canvas = document.getElementById('il-rubin');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width;
  var H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  var inv = window._rubinInverted || false;
  // Normal = white background, black faces (matches reference image)
  var bg   = inv ? '#000000' : '#ffffff';
  var face = inv ? '#ffffff' : '#000000';
  var lbl  = inv ? '#ffffff' : '#000000';

  // White background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Draw both faces as ONE connected black shape ──
  // Pixel data from reference: face_L = inner right edge of left face (= left vase wall)
  // face_R = inner left edge of right face (= right vase wall), as fraction of W.
  //
  // Profile (y → face_L, face_R):
  //  0.02 → 0.188, 0.804    0.05 → 0.253, 0.742
  //  0.08 → 0.302, 0.690    0.12 → 0.342, 0.649
  //  0.16 → 0.367, 0.625    0.20 → 0.386, 0.606
  //  0.25 → 0.399, 0.592    0.30 → 0.410, 0.582
  //  0.35 → 0.413, 0.579    0.40 → 0.405, 0.590
  //  0.45 → 0.418, 0.573    0.50 → 0.438, 0.554
  //  0.55 → 0.459, 0.535    0.60 → 0.457, 0.535
  //  0.65 → 0.421, 0.571    0.70 → 0.421, 0.571
  //  0.75 → 0.418, 0.573    0.80 → 0.402, 0.590
  //  0.85 → 0.405, 0.590    0.90 → 0.389, 0.603
  //  0.95 → 0.269, 0.723    0.98 → 0.258, 0.734

  ctx.fillStyle = face;
  ctx.beginPath();

  // Trace LEFT face inner profile top → bottom (right edge of left face)
  // Start top-left corner, across top to face_L at y=0
  ctx.moveTo(0, 0);
  ctx.lineTo(W*0.188, 0);          // top: face starts at 0.188

  // Right profile of left face going DOWN
  ctx.bezierCurveTo(W*0.22, H*.02,  W*0.25, H*.04,  W*0.302, H*.08);
  ctx.bezierCurveTo(W*0.33, H*.10,  W*0.35, H*.12,  W*0.367, H*.16);
  ctx.bezierCurveTo(W*0.38, H*.18,  W*0.39, H*.20,  W*0.399, H*.25);
  ctx.bezierCurveTo(W*0.41, H*.28,  W*0.41, H*.30,  W*0.413, H*.35);
  ctx.bezierCurveTo(W*0.41, H*.37,  W*0.41, H*.38,  W*0.405, H*.40);
  ctx.bezierCurveTo(W*0.41, H*.42,  W*0.42, H*.44,  W*0.418, H*.45);
  ctx.bezierCurveTo(W*0.43, H*.47,  W*0.44, H*.49,  W*0.438, H*.50);
  ctx.bezierCurveTo(W*0.45, H*.52,  W*0.46, H*.54,  W*0.459, H*.55);
  ctx.bezierCurveTo(W*0.46, H*.57,  W*0.46, H*.59,  W*0.457, H*.60);
  ctx.bezierCurveTo(W*0.44, H*.62,  W*0.43, H*.63,  W*0.421, H*.65);
  ctx.bezierCurveTo(W*0.42, H*.67,  W*0.42, H*.69,  W*0.421, H*.70);
  ctx.bezierCurveTo(W*0.42, H*.72,  W*0.42, H*.74,  W*0.418, H*.75);
  ctx.bezierCurveTo(W*0.41, H*.77,  W*0.40, H*.79,  W*0.402, H*.80);
  ctx.bezierCurveTo(W*0.40, H*.82,  W*0.41, H*.84,  W*0.405, H*.85);
  ctx.bezierCurveTo(W*0.40, H*.87,  W*0.38, H*.89,  W*0.389, H*.90);
  ctx.bezierCurveTo(W*0.34, H*.92,  W*0.28, H*.94,  W*0.269, H*.95);
  ctx.bezierCurveTo(W*0.26, H*.97,  W*0.258, H*.98, W*0.258, H*1.0);

  // Bottom-left corner and back up right side
  ctx.lineTo(0, H*1.0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  // RIGHT face: mirror
  ctx.moveTo(W, 0);
  ctx.lineTo(W*0.804, 0);

  ctx.bezierCurveTo(W*0.78, H*.02,  W*0.75, H*.04,  W*0.690, H*.08);
  ctx.bezierCurveTo(W*0.67, H*.10,  W*0.65, H*.12,  W*0.625, H*.16);
  ctx.bezierCurveTo(W*0.62, H*.18,  W*0.61, H*.20,  W*0.592, H*.25);
  ctx.bezierCurveTo(W*0.59, H*.28,  W*0.59, H*.30,  W*0.579, H*.35);
  ctx.bezierCurveTo(W*0.59, H*.37,  W*0.59, H*.38,  W*0.590, H*.40);
  ctx.bezierCurveTo(W*0.58, H*.42,  W*0.58, H*.44,  W*0.573, H*.45);
  ctx.bezierCurveTo(W*0.57, H*.47,  W*0.56, H*.49,  W*0.554, H*.50);
  ctx.bezierCurveTo(W*0.55, H*.52,  W*0.54, H*.54,  W*0.535, H*.55);
  ctx.bezierCurveTo(W*0.54, H*.57,  W*0.54, H*.59,  W*0.535, H*.60);
  ctx.bezierCurveTo(W*0.56, H*.62,  W*0.57, H*.63,  W*0.571, H*.65);
  ctx.bezierCurveTo(W*0.58, H*.67,  W*0.58, H*.69,  W*0.571, H*.70);
  ctx.bezierCurveTo(W*0.58, H*.72,  W*0.58, H*.74,  W*0.573, H*.75);
  ctx.bezierCurveTo(W*0.59, H*.77,  W*0.60, H*.79,  W*0.590, H*.80);
  ctx.bezierCurveTo(W*0.60, H*.82,  W*0.59, H*.84,  W*0.590, H*.85);
  ctx.bezierCurveTo(W*0.60, H*.87,  W*0.62, H*.89,  W*0.603, H*.90);
  ctx.bezierCurveTo(W*0.66, H*.92,  W*0.72, H*.94,  W*0.723, H*.95);
  ctx.bezierCurveTo(W*0.74, H*.97,  W*0.734, H*.98, W*0.734, H*1.0);

  ctx.lineTo(W, H*1.0);
  ctx.closePath();
  ctx.fill();

  // Label
  ctx.fillStyle = lbl;
  ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('¿Florero o dos caras?', W/2, H - 5);
}

/* ── PDF ── */
async function generatePDF() {
  var btn=document.getElementById('dlBtn'); btn.textContent='Generando PDF…'; btn.disabled=true;
  var jspdf=window.jspdf;
  var doc=new jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  var PW=215.9, M=18, TW=PW-M*2, PH=doc.internal.pageSize.height;
  var name=studentData.name, group=studentData.group, total=problems.length;
  var pct=Math.round(correctCount/total*100);
  var dateStr=new Date().toLocaleString('es-MX',{dateStyle:'long',timeStyle:'short'});
  var raw=name+'|'+group+'|'+correctCount+'|'+total+'|'+new Date().toDateString();
  var h=0; for(var ci=0;ci<raw.length;ci++) h=(Math.imul(31,h)+raw.charCodeAt(ci))|0;
  var code=Math.abs(h).toString(36).toUpperCase().slice(0,8);

    { label:'Escenario 3 — El que siempre publica fiestas', percId:'s3_perc', realId:'s3_real' },
    { label:'Escenario 4 — El vecino hosco', percId:'s4_perc', realId:'s4_real' },

    doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(pBR,pBG,pBB);

    doc.text('Posibles realidades:',M+2,ay2+5);
    doc.setFont('helvetica','normal'); doc.setTextColor(20,24,32);
    var rLines=doc.splitTextToSize(realTxt,TW-4);
    rLines.slice(0,4).forEach(function(ln,li){ doc.text(ln,M+2,ay2+10+li*4.5); });

    doc.rect(M,ay2,TW,7,'F'); doc.text('Compromiso personal: lo que cambiare en mi forma de juzgar',M+3,ay2+5); ay2+=10;
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(20,24,32);
    var cLines=doc.splitTextToSize(reflCambio.value.trim(),TW-4);
    cLines.slice(0,4).forEach(function(ln,li){ doc.text(ln,M+2,ay2+li*5); });
  }

  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,PH-3,PW,3,'F');
    doc.setTextColor(184,136,72); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Codigo: '+code+'  ·  Pagina '+p+'/'+pages,PW/2,PH-5,{align:'center'});
  }

  doc.save('percepcion_razon_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled=false;
}

/* ════════════════════════════════════════════════════
   BUILD LESSON — Percepción y Razón
   ════════════════════════════════════════════════════ */
function buildLesson(rng) {
  var body = document.getElementById('lessonBody');

  /* ── SECCIÓN 0: Introducción ── */
  var s0 = document.createElement('div');
  s0.className = 'section';
  s0.innerHTML = `
    <div class="stag">Filosofía y Humanidades</div>
    <h2>¿Podemos confiar en lo que vemos?</h2>
    <p>Antes de responder esa pregunta, haz un experimento. Observa la siguiente imagen durante 10 segundos. No la analices: sólo mírala.</p>
    <div class="illusion-card">
      <div class="illusion-title">Ilusión de Müller-Lyer (1889)</div>
      <canvas id="il-muller" class="illusion-canvas" width="380" height="160"></canvas>
      <p class="illusion-label">¿Cuál línea te parece más larga, la A o la B?</p>
      <button class="illusion-reveal" id="il-btn-muller" onclick="revealIllusion('muller')">Revelar la realidad</button>
      <div class="illusion-answer" id="il-ans-muller">
        <strong>Las dos líneas son exactamente del mismo largo.</strong> Tu cerebro interpretó las flechas como pistas de profundidad y ajustó la percepción de longitud. Lo que <em>viste</em> no coincidía con lo que <em>es</em>.
      </div>
    </div>
    <div class="callout">
      <strong>Pregunta central de la guía:</strong>
      <p>Si nuestros sentidos pueden engañarnos, ¿cómo podemos distinguir la <em>apariencia</em> de la <em>realidad</em>? ¿Qué papel juega la razón?</p>
    </div>`;
  body.appendChild(s0);

  /* ── SECCIÓN 1: Los dos poderes del conocimiento ── */
  var s1 = document.createElement('div');
  s1.className = 'section';
  s1.innerHTML = `
    <div class="stag">Concepto clave</div>
    <h2>Percepción vs. Razón</h2>
    <p>La filosofía ha debatido desde la Antigüedad si el conocimiento verdadero viene de los sentidos o del intelecto.</p>
    <div class="rules-grid">
      <div class="rcard">
        <div class="rname">Percepción</div>
        <div class="rform">Conocimiento sensible</div>
        <div class="rnote">Lo que captamos mediante la vista, el oído, el tacto, el olfato y el gusto. Inmediato pero falible.</div>
      </div>
      <div class="rcard">
        <div class="rname">Razón</div>
        <div class="rform">Conocimiento intelectual</div>
        <div class="rnote">La capacidad de analizar, inferir y juzgar más allá de lo aparente. Más lenta pero más fiable.</div>
      </div>
      <div class="rcard">
        <div class="rname">Apariencia</div>
        <div class="rform">Fenómeno (lo que parece)</div>
        <div class="rnote">La representación mental de algo, que puede diferir de cómo ese algo realmente es.</div>
      </div>
      <div class="rcard">
        <div class="rname">Realidad</div>
        <div class="rform">Noúmeno (lo que es)</div>
        <div class="rnote">La cosa tal como existe independientemente de quien la observa. Difícil o imposible de alcanzar solo con los sentidos.</div>
      </div>
    </div>
    <div class="qblock">
      <blockquote>"Los ojos y los oídos son malos testigos para los hombres que tienen almas bárbaras."</blockquote>
      <cite>— Heráclito de Éfeso, s. VI a.C.</cite>
    </div>
    <p>Para Heráclito, percibir sin razonar es insuficiente: necesitamos el logos —la razón— para interpretar correctamente lo que nos muestran los sentidos.</p>`;
  body.appendChild(s1);

  /* ── SECCIÓN 2: Segunda ilusión — Ebbinghaus ── */
  var s2 = document.createElement('div');
  s2.className = 'section';
  s2.innerHTML = `
    <div class="stag">Experimento visual</div>
    <h2>El contexto distorsiona la percepción</h2>
    <p>Observa los dos círculos azules. ¿Cuál te parece más grande?</p>
    <div class="illusion-card">
      <div class="illusion-title">Ilusión de Ebbinghaus (1902)</div>
      <canvas id="il-ebbinghaus" class="illusion-canvas" width="380" height="200"></canvas>
      <p class="illusion-label">El contexto —lo que rodea a algo— cambia cómo lo percibimos.</p>
      <button class="illusion-reveal" id="il-btn-ebbinghaus" onclick="revealIllusion('ebbinghaus')">Revelar la realidad</button>
      <div class="illusion-answer" id="il-ans-ebbinghaus">
        <strong>Ambos círculos azules tienen exactamente el mismo radio.</strong> El círculo A parece más pequeño porque lo rodean figuras grandes; el B parece más grande porque lo rodean figuras pequeñas. El contexto altera nuestra percepción sin alterar la realidad.
      </div>
    </div>
    <p>Esto tiene implicaciones filosóficas profundas: nuestro juicio sobre algo nunca es neutro. Siempre está influido por el contexto, las experiencias previas y las expectativas.</p>
    <div class="callout">
      <strong>Platón y la Caverna:</strong>
      <p>En la <em>Alegoría de la Caverna</em> (República, Libro VII), Platón describe prisioneros que sólo pueden ver sombras proyectadas en una pared. Creen que las sombras son la realidad, pues nunca han visto el mundo exterior. La filosofía, para Platón, es el proceso de salir de esa cueva: usar la razón para alcanzar el conocimiento verdadero más allá de las apariencias sensibles.</p>
    </div>`;
  body.appendChild(s2);

  /* ── SECCIÓN 3: Figura-Fondo — Descartes ── */
  var s3 = document.createElement('div');
  s3.className = 'section';
  s3.innerHTML = `
    <div class="stag">Figura y fondo</div>
    <h2>¿Qué es figura y qué es fondo?</h2>
    <p>La Gestalt descubrió que el cerebro organiza activamente lo que percibe: lo mismo puede verse de dos maneras completamente distintas según qué decidamos que es la "figura" y qué el "fondo".</p>
    <div class="illusion-card">
      <div class="illusion-title">Florero de Rubin — Edgar Rubin (1915)</div>
      <canvas id="il-rubin" class="illusion-canvas" width="300" height="320"></canvas>
      <p class="illusion-label">Mira fijamente. ¿Ves un florero blanco, o dos caras negras mirándose?</p>
      <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:.4rem">
        <button type="button" class="hl-btn" id="rubin-toggle" onclick="toggleRubin()">🔄 Invertir colores</button>
      </div>
    </div>
    <div class="qblock">
      <blockquote>"Pienso, luego existo. Esta proposición es necesariamente verdadera siempre que la pronuncio o la concibo en mi mente."</blockquote>
      <cite>— René Descartes, <em>Meditaciones Metafísicas</em>, 1641</cite>
    </div>
    <p>Descartes, al dudar de todo lo que podía ser engaño de los sentidos, encontró que la única certeza indudable era el acto mismo de pensar. Así privilegió la razón sobre la percepción como fuente de conocimiento seguro.</p>`;
  body.appendChild(s3);

  /* ── SECCIÓN 4: Los empiristas responden ── */
  var s4 = document.createElement('div');
  s4.className = 'section';
  s4.innerHTML = `
    <div class="stag">La otra postura</div>
    <h2>El Empirismo: los sentidos sí cuentan</h2>
    <p>Frente al racionalismo de Descartes y Platón, los filósofos empiristas argumentaron que todo conocimiento comienza con la experiencia sensible.</p>
    <div class="rules-grid">
      <div class="rcard">
        <div class="rname">John Locke (1632–1704)</div>
        <div class="rform">Tabula rasa</div>
        <div class="rnote">La mente es una "pizarra en blanco" al nacer. Todo conocimiento proviene de la experiencia: primero los sentidos, luego la reflexión.</div>
      </div>
      <div class="rcard">
        <div class="rname">David Hume (1711–1776)</div>
        <div class="rform">Impresiones e ideas</div>
        <div class="rnote">Las "impresiones" son percepciones vívidas y directas; las "ideas" son copias más débiles de esas impresiones. Sin impresiones, ninguna idea es válida.</div>
      </div>
    </div>
    <p>Para los empiristas, las ilusiones ópticas no refutan a los sentidos: simplemente muestran que debemos <em>interpretar</em> la percepción con cuidado y corroborarla con más observaciones.</p>
    <div class="callout">
      <strong>Síntesis de Kant:</strong>
      <p>Immanuel Kant (1724–1804) propuso que <em>sin percepción, los conceptos son vacíos; sin conceptos, las percepciones son ciegas</em>. Necesitamos ambas: los sentidos aportan el material y la razón le da forma y significado.</p>
    </div>`;
  body.appendChild(s4);

  /* ── SECCIÓN 5: Aplicaciones contemporáneas ── */
  var s5 = document.createElement('div');
  s5.className = 'section';
  s5.innerHTML = `
    <div class="stag">Relevancia actual</div>
    <h2>Percepción y razón en el siglo XXI</h2>
    <p>El debate no es sólo académico. Hoy enfrentamos desafíos concretos donde confundir apariencia con realidad tiene consecuencias serias:</p>
    <div class="rules-grid">
      <div class="rcard">
        <div class="rname">Fake News</div>
        <div class="rform">Desinformación visual</div>
        <div class="rnote">Imágenes alteradas o descontextualizadas activan nuestra percepción antes de que la razón las analice.</div>
      </div>
      <div class="rcard">
        <div class="rname">Deepfakes</div>
        <div class="rform">Video y audio falsificados</div>
        <div class="rnote">La tecnología puede hacer que veamos y escuchemos cosas que nunca ocurrieron. La percepción ya no es garantía.</div>
      </div>
      <div class="rcard">
        <div class="rname">Sesgos cognitivos</div>
        <div class="rform">Atajos mentales</div>
        <div class="rnote">El cerebro usa heurísticas rápidas (percepción) en lugar de análisis lentos (razón). A veces funciona; a veces, nos engaña.</div>
      </div>
    </div>
    <p>La filosofía no resuelve estos problemas directamente, pero nos da las herramientas conceptuales para identificarlos y enfrentarlos con más lucidez.</p>`;
  body.appendChild(s5);

  /* ── SECCIÓN 6: Percepción vs. Realidad en la vida moral ── */
  var s6 = document.createElement('div');
  s6.className = 'section';
  s6.innerHTML = `
    <div class="stag">Dimensión moral</div>
    <h2>Cuando la percepción y la realidad chocan en la vida ética</h2>
    <p>El conflicto entre apariencia y realidad no sólo ocurre en la vista o el oído: también ocurre en la forma en que juzgamos a las personas y sus acciones. Considera el siguiente caso:</p>
    <div class="callout" style="margin-bottom:1rem">
      <strong>El caso del pan robado:</strong>
      <p>Un hombre es visto tomando pan de una tienda sin pagar. La primera percepción es inmediata: <em>un ladrón</em>. Pero la razón, al conocer el contexto, revela otra realidad: el hombre lleva tres días sin trabajo, su hija pequeña no ha comido en 24 horas. Toma el pan para que ella sobreviva.</p>
    </div>
    <div class="rules-grid">
      <div class="rcard">
        <div class="rname">Percepción inmediata</div>
        <div class="rform">Apariencia del acto</div>
        <div class="rnote">Robo. Transgresión de la ley. Algo socialmente condenado y visualmente identificable como delito.</div>
      </div>
      <div class="rcard">
        <div class="rname">Realidad compleja</div>
        <div class="rform">Contexto y motivación</div>
        <div class="rnote">Supervivencia. Desesperación. Una elección entre dos males en una situación de extrema necesidad.</div>
      </div>
    </div>
    <p>Este dilema aparece en la literatura universal: es la historia de <strong>Jean Valjean</strong> en <em>Los Miserables</em> de Victor Hugo (1862). Durante décadas, Valjean fue perseguido por la ley por un acto cuya <em>apariencia</em> era criminal pero cuya <em>realidad</em> era humana y desesperada.</p>
    <div class="qblock">
      <blockquote>"Hay algo más desesperante que el infierno: la percepción de la injusticia."</blockquote>
      <cite>— Victor Hugo, <em>Los Miserables</em>, 1862</cite>
    </div>
    <p>Esto conecta con la filosofía moral: Aristóteles distinguía entre el acto visto desde afuera (<em>acción</em>) y el acto comprendido desde adentro (<em>praxis</em>, con su intención y contexto). Juzgar sólo por la apariencia, sin aplicar la razón para entender el contexto, produce injusticia.</p>
    <div class="callout">
      <strong>Otros ejemplos cotidianos:</strong>
      <p>Una persona que llora en público puede percibirse como débil o desequilibrada (apariencia), cuando la realidad es que acaba de perder a un ser querido. Un alumno que no entrega tarea puede percibirse como irresponsable (apariencia), cuando la realidad es que en casa no hay luz ni internet. La razón nos obliga a ir más allá de lo que simplemente vemos.</p>
    </div>`;
  body.appendChild(s6);

  /* ══════════════════════════════════════════════════
     PROBLEMAS DE EVALUACIÓN
     ══════════════════════════════════════════════════ */

  // Problema 1
  var opts1 = shuffle([
    { text: 'Que la percepción siempre es más confiable que la razón', correct: false },
    { text: 'Que la apariencia de algo puede diferir de su realidad', correct: true },

    { text: 'Que las ilusiones ópticas no tienen explicación científica', correct: false }

  problems.push({

    options: opts1.map(function(o){return o.text;}),
    correctIdx: ci1,
    explanation: 'Las ilusiones ópticas demuestran que la apariencia —lo que percibimos— puede no coincidir con la realidad —lo que es—. Este es el punto de partida del debate filosófico entre percepción y razón.',
    hint: 'Piensa en la diferencia entre "parece" y "es". ¿Coinciden siempre?',
    studentChoice: null, pendingChoice: null

  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problema 2
  var opts2 = shuffle([

    { text: 'Sólo los filósofos pueden conocer la verdad', correct: false }
  ], rng);
  var ci2 = opts2.findIndex(function(o){return o.correct;});
  problems.push({
    title: 'Heráclito y los malos testigos',

    options: opts2.map(function(o){return o.text;}),
    correctIdx: ci2,
    explanation: 'Heráclito no rechaza los sentidos, sino que señala que sin la guía de la razón (el logos), los datos sensoriales no producen conocimiento verdadero. Los "bárbaros" son quienes no reflexionan sobre lo que perciben.',
    hint: 'El "alma bárbara" es la que no razona. ¿Qué le falta para conocer bien?',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problema 3
  var opts3 = shuffle([
    { text: 'Que hay dos verdades distintas dependiendo del observador', correct: false },
    { text: 'Que la realidad es subjetiva y no existe independientemente', correct: false },
    { text: 'Que el contexto altera la percepción sin cambiar la realidad objetiva', correct: true },
    { text: 'Que los círculos de la derecha siempre son más grandes', correct: false }
  ], rng);
  var ci3 = opts3.findIndex(function(o){return o.correct;});
  problems.push({
    title: 'La ilusión de Ebbinghaus',
    questionText: 'En la ilusión de Ebbinghaus, el mismo círculo azul parece de diferente tamaño según qué lo rodea. ¿Cuál es la conclusión filosófica más precisa de este fenómeno?',
    options: opts3.map(function(o){return o.text;}),
    correctIdx: ci3,
    explanation: 'Los círculos no cambian de tamaño; sólo cambia nuestra percepción de ellos según el contexto. Esto muestra que la percepción es relativa al entorno, pero la realidad (el tamaño real) permanece objetiva. La razón, al medir, puede corregir la ilusión.',
    hint: '¿El círculo realmente cambió de tamaño, o sólo tu percepción de él?',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problema 4
  var opts4 = shuffle([
    { text: 'Que el conocimiento innato es suficiente sin necesidad de experiencia', correct: false },

  ], rng);
  var ci4 = opts4.findIndex(function(o){return o.correct;});
  problems.push({
    title: 'Locke y la tabula rasa',

  buildOneCard(problems[problems.length-1], problems.length-1);

  var opts5 = shuffle([

    options: opts5.map(function(o){return o.text;}),
    correctIdx: ci5,
    explanation: 'Kant intenta superar la oposición entre racionalismo y empirismo: ambas facultades son necesarias y complementarias. La percepción aporta el material bruto de la experiencia; la razón le da estructura y significado. Separadas, ninguna produce conocimiento completo.',
    hint: 'Kant no elige un bando: intenta reconciliarlos. ¿Cómo depende cada facultad de la otra?',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problema 6
  var opts6 = shuffle([
    { text: 'Que debemos creer todo lo que vemos en redes sociales', correct: false },
    { text: 'Que la tecnología ha eliminado el problema de las ilusiones', correct: false },
    { text: 'Que la razón crítica es más necesaria que nunca para evaluar la información', correct: true },
    { text: 'Que los sentidos son completamente inútiles en la era digital', correct: false }
  ], rng);
  var ci6 = opts6.findIndex(function(o){return o.correct;});
  problems.push({
    title: 'Percepción y razón hoy: Fake News y Deepfakes',
    questionText: 'En la era de las noticias falsas y los deepfakes, videos y fotografías que parecen reales pero han sido alterados digitalmente, ¿qué conclusión filosófica podemos extraer del debate entre percepción y razón?',
    options: opts6.map(function(o){return o.text;}),
    correctIdx: ci6,
    explanation: 'Los deepfakes y las noticias falsas son, en cierto modo, ilusiones ópticas modernas creadas tecnológicamente. Así como la razón nos permitía corregir ilusiones como la de Müller-Lyer midiendo las líneas, hoy necesitamos pensamiento crítico para verificar fuentes, contrastar información y no aceptar lo que "parece" ser verdad sin análisis racional.',
    hint: 'Piensa en la analogía con las ilusiones ópticas: ¿qué función cumple la razón en ambos casos?',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // Problema 7 — percepción vs. realidad moral
  var opts7 = shuffle([
    { text: 'Juzgar únicamente por la apariencia del acto, sin considerar el contexto ni la intención', correct: false },
    { text: 'Aplicar la razón para comprender el contexto completo antes de emitir un juicio moral', correct: true },
    { text: 'Ignorar la ley siempre que la intención sea buena', correct: false },
    { text: 'Confiar exclusivamente en los sentidos para juzgar las acciones de otros', correct: false }
  ], rng);
  var ci7 = opts7.findIndex(function(o){return o.correct;});
  problems.push({
    title: 'El pan robado: apariencia y realidad moral',
    questionText: 'Un hombre toma pan de una tienda sin pagar. Su hija no ha comido en 24 horas y él lleva días sin trabajo. La percepción inmediata es: "ladrón". La realidad completa revela: desesperación y supervivencia. Según el debate filosófico entre percepción y razón, ¿qué nos exige el pensamiento racional al juzgar situaciones morales como ésta?',
    options: opts7.map(function(o){return o.text;}),
    correctIdx: ci7,
    explanation: 'Aristóteles distinguía entre la apariencia externa de un acto y su realidad completa, que incluye la intención (praxis) y el contexto. Juzgar sólo por lo que "se ve" es quedarse en la caverna de Platón. La razón nos obliga a ir más allá de la apariencia para hacer justicia a la complejidad de la realidad humana. Este es exactamente el drama de Jean Valjean en Los Miserables: condenado por una apariencia que encubría una realidad de necesidad extrema.',
    hint: 'Recuerda la diferencia entre "apariencia" y "realidad". ¿Cuál de las dos opciones aplica la razón para ir más allá de lo inmediatamente visible?',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── SECCIÓN 7: Auditoría de Percepción — cierre vivencial ── */
  var s7 = document.createElement('div');
  s7.className = 'section';
  s7.innerHTML = `
    <div class="stag">Ejercicio de cierre</div>
    <h2>Auditoría de Percepción: ¿qué tan bien juzgas?</h2>
    <p>Ahora que entiendes la diferencia entre apariencia y realidad, ponla a prueba en situaciones de tu vida diaria. Para cada escenario: primero anota la <strong>percepción inmediata</strong> —lo que pensarías en el primer instante—, luego escribe <strong>al menos dos realidades posibles</strong> detrás de esa apariencia.</p>
    <div class="callout">
      <strong>Recuerda:</strong>
      <p>No hay respuestas incorrectas aquí. El objetivo es <em>entrenarte</em> en el hábito de pausar antes de juzgar, exactamente como la razón nos pide frente a las ilusiones ópticas.</p>
    </div>

    <!-- ESCENARIO 1 -->
    <div class="scenario-card">
      <div class="scenario-header">
        <div class="scenario-num">1</div>
        <div>
          <div class="scenario-tag">En el salón de clases</div>
          <div class="scenario-title">El estudiante que duerme</div>
        </div>
      </div>
      <div class="scenario-desc">
        Durante la clase, un compañero tiene la cabeza apoyada sobre el escritorio y los ojos cerrados. El maestro lo nota. Tú lo notas.
      </div>
      <div class="scenario-fields">
        <div class="sfield-group">
          <label class="sfield-label">👁 Percepción inmediata <span class="sfield-sub">(¿qué piensas al verlo?)</span></label>
          <textarea class="sfield-input" id="s1_perc" placeholder="Escribe la primera reacción que tendrías al ver esta situación..." oninput="saveAudit()"></textarea>
        </div>
        <div class="sfield-group">
          <label class="sfield-label">🧠 Posibles realidades <span class="sfield-sub">(escribe al menos dos)</span></label>
          <textarea class="sfield-input tall" id="s1_real" placeholder="Realidad 1: puede ser que...&#10;Realidad 2: también es posible que...&#10;Realidad 3: o quizás..." oninput="saveAudit()"></textarea>
        </div>
      </div>
    </div>

    <!-- ESCENARIO 2 -->
    <div class="scenario-card">
      <div class="scenario-header">
        <div class="scenario-num">2</div>
        <div>
          <div class="scenario-tag">En el recreo o la cafetería</div>
          <div class="scenario-title">El compañero que no saluda</div>
        </div>
      </div>
      <div class="scenario-desc">
        Pasas frente a un compañero de clase en el pasillo. Lo miras, él te mira, pero no dice nada y sigue caminando sin saludarte.
      </div>
      <div class="scenario-fields">
        <div class="sfield-group">
          <label class="sfield-label">👁 Percepción inmediata</label>
          <textarea class="sfield-input" id="s2_perc" placeholder="¿Qué pensarías en ese momento?" oninput="saveAudit()"></textarea>
        </div>
        <div class="sfield-group">
          <label class="sfield-label">🧠 Posibles realidades</label>
          <textarea class="sfield-input tall" id="s2_real" placeholder="Realidad 1: puede ser que...&#10;Realidad 2: también es posible que..." oninput="saveAudit()"></textarea>
        </div>
      </div>
    </div>

    <!-- ESCENARIO 3 -->
    <div class="scenario-card">
      <div class="scenario-header">
        <div class="scenario-num">3</div>
        <div>
          <div class="scenario-tag">En redes sociales</div>
          <div class="scenario-title">El que siempre publica fiestas</div>
        </div>
      </div>
      <div class="scenario-desc">
        Un conocido publica fotos en fiestas casi todos los fines de semana, siempre sonriendo, siempre rodeado de gente. Sus calificaciones son bajas.
      </div>
      <div class="scenario-fields">
        <div class="sfield-group">
          <label class="sfield-label">👁 Percepción inmediata</label>
          <textarea class="sfield-input" id="s3_perc" placeholder="¿Qué juicio formarías sobre esta persona?" oninput="saveAudit()"></textarea>
        </div>
        <div class="sfield-group">
          <label class="sfield-label">🧠 Posibles realidades</label>
          <textarea class="sfield-input tall" id="s3_real" placeholder="Realidad 1: puede ser que...&#10;Realidad 2: también es posible que..." oninput="saveAudit()"></textarea>
        </div>
      </div>
    </div>

    <!-- ESCENARIO 4 -->
    <div class="scenario-card">
      <div class="scenario-header">
        <div class="scenario-num">4</div>
        <div>
          <div class="scenario-tag">En tu colonia o vecindario</div>
          <div class="scenario-title">El vecino hosco</div>
        </div>
      </div>
      <div class="scenario-desc">
        Hay una persona en tu colonia que nunca sonríe, rara vez sale, y cuando sale no habla con nadie. Los demás vecinos dicen que es "raro" o "antipático".
      </div>
      <div class="scenario-fields">
        <div class="sfield-group">
          <label class="sfield-label">👁 Percepción inmediata</label>
          <textarea class="sfield-input" id="s4_perc" placeholder="¿Qué pensarías de esta persona?" oninput="saveAudit()"></textarea>
        </div>
        <div class="sfield-group">
          <label class="sfield-label">🧠 Posibles realidades</label>
          <textarea class="sfield-input tall" id="s4_real" placeholder="Realidad 1: puede ser que...&#10;Realidad 2: también es posible que..." oninput="saveAudit()"></textarea>
        </div>
      </div>
    </div>

    <!-- REFLEXIÓN PERSONAL -->
    <div class="scenario-card reflection-card">
      <div class="scenario-header">
        <div class="scenario-num" style="background:var(--gold)">✍</div>
        <div>
          <div class="scenario-tag" style="color:var(--gold)">Reflexión personal</div>
          <div class="scenario-title">Tu propio caso</div>
        </div>
      </div>
      <div class="scenario-desc">
        Piensa en una situación <strong>real</strong> de tu propia vida —reciente o pasada— en la que juzgaste a alguien por su apariencia y después descubriste que la realidad era diferente. No tiene que ser algo grande: puede ser algo pequeño del día a día.
      </div>
      <div class="scenario-fields">
        <div class="sfield-group">
          <label class="sfield-label">📖 Describe brevemente la situación</label>
          <textarea class="sfield-input" id="refl_sit" placeholder="¿Qué pasó? ¿A quién juzgaste y cómo?" oninput="saveAudit()"></textarea>
        </div>
        <div class="sfield-group">
          <label class="sfield-label">🔍 ¿Cuál era la realidad detrás?</label>
          <textarea class="sfield-input" id="refl_real" placeholder="¿Qué descubriste después? ¿Cómo cambiaron las cosas cuando supiste la verdad?" oninput="saveAudit()"></textarea>
        </div>
        <div class="sfield-group">
          <label class="sfield-label">💬 ¿Qué cambiarías en tu forma de juzgar a partir de hoy?</label>
          <textarea class="sfield-input" id="refl_cambio" placeholder="Escribe una o dos oraciones: ¿qué hábito de pensamiento quieres desarrollar?" oninput="saveAudit()"></textarea>
        </div>
      </div>
    </div>

    <div class="audit-complete" id="auditComplete" style="display:none">
      <div class="audit-check">✓</div>
      <div class="audit-msg">Ejercicio completado. Tu reflexión quedará guardada en tu PDF de resultados.</div>
    </div>
    <button class="sbtn" style="max-width:300px;margin:1rem auto;display:block" onclick="finishAudit()">Guardar reflexión →</button>
  `;
  body.appendChild(s7);

  setTimeout(function() {
    drawIllusion('muller', 0);
    drawIllusion('ebbinghaus', 0);
    rubinDraw();
  }, 150);
}
</script>
</body>
