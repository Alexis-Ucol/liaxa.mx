<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIMA por Dentro — Series de Tiempo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* ── TABLE STYLES ── */
.dtable { width:100%; border-collapse:collapse; margin:1rem 0; font-size:.85rem; overflow-x:auto; display:block; }
.dtable th { background:var(--green); color:#fff; padding:.5rem .7rem; text-align:center; font-weight:600; font-size:.78rem; letter-spacing:.04em; }
.dtable td { padding:.45rem .7rem; border-bottom:1px solid var(--border); text-align:center; font-family:'IBM Plex Mono',monospace; font-size:.82rem; }
.dtable tr:nth-child(even) td { background:var(--surface2); }
.dtable td.highlight { background:var(--gold-bg); color:var(--gold); font-weight:600; border:1.5px solid var(--gold); }
.dtable td.computed { background:var(--green-bg); color:var(--green-dark); font-weight:600; }

/* ── STEP BOX ── */
.stepbox { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.2rem; margin:.8rem 0; }
.stepbox .steplbl { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:.3rem; }
.stepbox .stepmath { font-family:'IBM Plex Mono',monospace; font-size:.9rem; color:var(--green-dark); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── INTERACTIVE FILL-IN STEPS ── */
.fstep { transition: background .2s, border-color .2s; }
.fstep.fsok  { background:var(--ok-bg);  border-left-color:var(--ok); }
.fstep.fsbad { background:var(--bad-bg); border-left-color:var(--bad); }
.frow { display:flex; flex-wrap:wrap; align-items:center; gap:.25rem; line-height:1.8; }
.finbox {
  border:1.5px solid var(--border); border-radius:5px;
  background:var(--surface); color:var(--text);
  font-family:'IBM Plex Mono',monospace; font-size:.88rem;
  padding:.2rem .4rem; text-align:center;
  transition: border-color .15s, background .15s;
}
.finbox:focus { outline:none; border-color:var(--green); }
.finbox:disabled { opacity:.8; cursor:default; }
.fbtn {
  background:var(--green); color:#fff; border:none; border-radius:6px;
  padding:.3rem .85rem; font-size:.78rem; font-weight:600; cursor:pointer;
  transition:background .15s;
}
.fbtn:hover:not(:disabled) { background:var(--green-dark); }
.fbtn:disabled { opacity:.6; cursor:default; }
.fserr { font-size:.78rem; font-weight:500; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .dtable td, .dtable th { padding: .35rem .45rem; font-size: .75rem; }
}
</style>
</head>

}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — doble toque
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;

  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   INTERACTIVE FILL-IN STEPS
   ================================================ */
var fillStepCounter = 0;

/* ── Parts registry: avoids JSON.stringify inside onclick attributes ── */
var _fsRegistry = {};

/* makeStep(label, parts)
   parts = array of { type:'text'|'input', value, accept, width }
   Stores parts in registry keyed by step id; onclick only passes the id.
*/
function makeStep(label, parts) {
  var id = 'fs' + (fillStepCounter++);
  _fsRegistry[id] = parts;
  var html = '<div class="stepbox fstep" id="' + id + '">' +
    '<div class="steplbl">' + label + '</div>' +
    '<div class="stepmath frow">';
  parts.forEach(function(p, pi) {
    if (p.type === 'text') {
      html += '<span>' + p.value + '</span>';
    } else {
      html += '<input class="finbox" id="' + id + '_' + pi + '" type="text" ' +
        'style="width:' + (p.width||48) + 'px" autocomplete="off" ' +
        'oninput="clearFsErr(\'' + id + '\')">';
    }
  });
  html += '</div>' +
    '<div style="margin-top:.5rem;display:flex;align-items:center;gap:.6rem">' +
      '<button class="fbtn" onclick="checkFillStep(\'' + id + '\')">Verificar ✓</button>' +
      '<span class="fserr" id="' + id + '_err"></span>' +
    '</div>' +
  '</div>';
  return html;
}

function clearFsErr(id) {
  var el = document.getElementById(id + '_err');
  if (el) el.textContent = '';
  var box = document.getElementById(id);
  if (box) box.classList.remove('fsok','fsbad');
}

function checkFillStep(id) {
  var parts = _fsRegistry[id];
  if (!parts) return;
  var box = document.getElementById(id);
  var err = document.getElementById(id + '_err');
  var allOk = true;
  parts.forEach(function(p, pi) {
    if (p.type !== 'input') return;
    var inp = document.getElementById(id + '_' + pi);
    if (!inp) return;
    var val = inp.value.trim().replace(',','.');
    var accepted = p.accept.split('|');
    var ok = accepted.some(function(a) {
      return Math.abs(parseFloat(val) - parseFloat(a)) < 0.015;
    });
    inp.style.borderColor = ok ? 'var(--ok)' : 'var(--bad)';
    inp.style.background  = ok ? 'var(--ok-bg)' : 'var(--bad-bg)';
    if (!ok) allOk = false;
  });
  if (allOk) {
    box.classList.add('fsok');
    box.classList.remove('fsbad');
    err.textContent = '¡Correcto!';
    err.style.color = 'var(--ok)';
    box.querySelectorAll('.finbox').forEach(function(inp) { inp.disabled = true; });
    box.querySelector('.fbtn').disabled = true;
  } else {
    box.classList.add('fsbad');
    box.classList.remove('fsok');
    err.textContent = 'Revisa los campos marcados en rojo.';
    err.style.color = 'var(--bad)';
  }
}

/* ================================================
   BUILD LESSON
   ================================================ */
function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');

  // ─────────────────────────────────────────────────────────────────
  // SECCIÓN 1 — La ecuación ARIMA: ¿qué usa cada parte?
  // ─────────────────────────────────────────────────────────────────
  var s1 = document.createElement('div');
  s1.className = 'section';
  s1.innerHTML =
    '<div class="stag">Sección 1</div>' +
    '<h2>La ecuación ARIMA: ¿qué usa cada parte?</h2>' +
    '<p>Cuando el software estima un modelo ARIMA, produce coeficientes y pronósticos automáticamente. Hoy vas a abrir la caja negra y ver exactamente qué está calculando — paso por paso — para producir esos pronósticos.</p>' +
    '<p>Recuerda que el modelo ARIMA tiene tres ingredientes. El orden (<em>p, d, q</em>) indica cuántos de cada uno se usan:</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">AR(p) — Autorregresivo</div><div class="rform">φ₁Δy<sub>t−1</sub> + … + φₚΔy<sub>t−p</sub></div><div class="rnote">Usa los <strong>valores pasados</strong> de la serie diferenciada. Son directamente observables.</div></div>' +
      '<div class="rcard"><div class="rname">I(d) — Integrado</div><div class="rform">Δyₜ = yₜ − y<sub>t−1</sub></div><div class="rnote">Diferencia la serie <em>d</em> veces para hacerla estacionaria antes de estimar.</div></div>' +
      '<div class="rcard"><div class="rname">MA(q) — Medias Móviles</div><div class="rform">θ₁ε<sub>t−1</sub> + … + θ<sub>q</sub>ε<sub>t−q</sub></div><div class="rnote">Usa los <strong>errores de pronóstico pasados</strong>. No son observables directamente — deben estimarse.</div></div>' +
    '</div>' +
    '<div class="callout"><p><strong>La pregunta clave de esta guía:</strong> los valores Δyₜ los puedes buscar en tus datos. Pero los errores εₜ… ¿de dónde salen? Eso es lo que vas a descubrir.</p></div>' +
    '<p>En esta guía trabajaremos con la serie <strong>diferenciada</strong> directamente (es decir, ya asumimos d = 1 y trabajamos con Δyₜ). Así nos concentramos en el mecanismo AR y MA sin el paso adicional de diferenciar.</p>';
  lb.appendChild(s1);

  // ── Ejemplo resuelto 1: AR puro (con fill-in) ──────────────────
  var ex1 = document.createElement('div');
  ex1.className = 'section';
  ex1.innerHTML =
    '<div class="stag">Ejemplo Resuelto</div>' +
    '<h2>Calentamiento: pronóstico con un modelo AR(1)</h2>' +
    '<p>Antes de introducir los errores, practiquemos con el caso más sencillo: un modelo que solo usa valores pasados.</p>' +
    '<p>El modelo ajustado es:</p>' +
    '<div class="stepbox"><div class="steplbl">Modelo AR(1)</div><div class="stepmath">Δŷₜ = 2 + 0.6 · Δy<sub>t−1</sub></div></div>' +
    '<p>Tenemos los últimos tres valores de la serie diferenciada:</p>' +
    '<table class="dtable"><thead><tr><th>t</th><th>Δy</th></tr></thead><tbody>' +
      '<tr><td>t−2</td><td>5.0</td></tr>' +
      '<tr><td>t−1</td><td>8.0</td></tr>' +
      '<tr><td>t</td><td>7.0</td></tr>' +
    '</tbody></table>' +
    '<p>Para pronosticar el período <strong>t+1</strong>, sustituye el último valor conocido en la ecuación. Completa cada campo:</p>' +
    makeStep('Paso 1 — Pronóstico para t+1', [
      {type:'text', value:'Δŷ<sub>t+1</sub> = 2 + 0.6 · Δyₜ = 2 + 0.6 · ('},
      {type:'input', accept:'7|7.0', width:46},
      {type:'text', value:') = 2 +'},
      {type:'input', accept:'4.2', width:46},
      {type:'text', value:'='},
      {type:'input', accept:'6.2', width:52},
    ]) +
    makeStep('Paso 2 — Pronóstico para t+2 (usa el pronóstico anterior)', [
      {type:'text', value:'Δŷ<sub>t+2</sub> = 2 + 0.6 · Δŷ<sub>t+1</sub> = 2 + 0.6 · ('},
      {type:'input', accept:'6.2', width:46},
      {type:'text', value:') = 2 +'},
      {type:'input', accept:'3.72', width:52},
      {type:'text', value:'='},
      {type:'input', accept:'5.72', width:52},
    ]) +
    '<div class="callout"><p><strong>Observación:</strong> Con un modelo AR puro, el pronóstico a varios pasos es inmediato — cada paso usa el pronóstico anterior. No hay complicación adicional.</p></div>';
  lb.appendChild(ex1);

  // ── PROBLEMA 1 ────────────────────────────────────────────────
  // Randomize: base AR coefficient and last observed value
  var phi_p1 = pick([0.5, 0.6, 0.7], rng);
  var c_p1   = pick([1.5, 2.0, 2.5], rng);
  var dy_last_p1 = pick([6.0, 7.0, 8.0, 9.0], rng);
  var pred_p1 = Math.round((c_p1 + phi_p1 * dy_last_p1) * 100) / 100;
  var wrong1_p1 = Math.round((pred_p1 + pick([1.0, 1.5, 2.0], rng)) * 100) / 100;
  var wrong2_p1 = Math.round((pred_p1 - pick([0.5, 1.0, 1.5], rng)) * 100) / 100;
  var wrong3_p1 = Math.round((c_p1 + phi_p1 * (dy_last_p1 + 1)) * 100) / 100;
  var correct_p1 = String(pred_p1);
  var sh1 = shuffleOpts([correct_p1, String(wrong1_p1), String(wrong2_p1), String(wrong3_p1)], correct_p1, rng);
  problems.push({
    title: 'Pronóstico AR(1) de un paso',
    questionText: 'El modelo AR(1) ajustado es: <strong>Δŷₜ = ' + c_p1 + ' + ' + phi_p1 + ' · Δy<sub>t−1</sub></strong>. El último valor observado de la serie diferenciada es <strong>Δyₜ = ' + dy_last_p1 + '</strong>. ¿Cuál es el pronóstico para el siguiente período?',
    fn: 'Δŷ<sub>t+1</sub> = ' + c_p1 + ' + ' + phi_p1 + ' × ' + dy_last_p1,
    options: sh1.opts,
    correctIdx: sh1.correctIdx,
    hint: 'Sustituye directamente: multiplica el coeficiente φ por el último valor observado y suma la constante.',
    explanation: 'Δŷ<sub>t+1</sub> = ' + c_p1 + ' + ' + phi_p1 + ' × ' + dy_last_p1 + ' = ' + pred_p1 + '. Con un modelo AR puro, el pronóstico es simplemente una combinación lineal de los valores pasados observables.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // ─────────────────────────────────────────────────────────────────
  // SECCIÓN 2 — El problema circular: ¿de dónde vienen los errores?
  // ─────────────────────────────────────────────────────────────────
  var s2 = document.createElement('div');
  s2.className = 'section';
  s2.innerHTML =
    '<div class="stag">Sección 2</div>' +
    '<h2>El problema circular: los errores que no puedes observar</h2>' +
    '<p>En un modelo ARMA, la ecuación incluye términos MA como <strong>θ₁ε<sub>t−1</sub></strong>. El problema es que εₜ no es un dato que puedas buscar en una tabla — es el error que cometió el modelo en el período anterior.</p>' +
    '<p>Esto crea un círculo aparente:</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Para pronosticar necesitas…</div><div class="rform">los errores ε pasados</div><div class="rnote">Que son: valor real − pronóstico anterior.</div></div>' +
      '<div class="rcard"><div class="rname">Para tener los errores necesitas…</div><div class="rform">pronósticos anteriores</div><div class="rnote">Que a su vez dependen de errores aún más anteriores.</div></div>' +
    '</div>' +
    '<p>La solución es simple y elegante: <strong>el proceso es recursivo</strong>. Empezamos con una suposición inicial para el primer error y construimos hacia adelante.</p>' +
    '<div class="callout"><p><strong>Supuesto de inicialización:</strong> Para el primer período (t = 1) donde no tenemos historial previo, se asume ε₁ = 0. Esta es la convención estándar en la mayoría del software. A medida que avanzamos, los errores se van estimando a partir de los datos reales.</p></div>' +
    '<p>La definición fundamental del error de pronóstico es:</p>' +
    '<div class="stepbox"><div class="steplbl">Definición de εₜ</div><div class="stepmath">εₜ = Δyₜ − Δŷₜ &nbsp;&nbsp;(valor real menos pronóstico)</div></div>';
  lb.appendChild(s2);

  // ── Ejemplo resuelto 2: ARMA(1,1) con fill-in ─────────────────
  var ex2 = document.createElement('div');
  ex2.className = 'section';
  ex2.innerHTML =
    '<div class="stag">Ejemplo Resuelto</div>' +
    '<h2>El proceso recursivo completo: ARMA(1,1)</h2>' +
    '<p>Vamos a trazar cada paso del algoritmo que el software ejecuta internamente. El modelo ajustado es:</p>' +
    '<div class="stepbox"><div class="steplbl">Modelo ARMA(1,1) sobre la serie diferenciada</div><div class="stepmath">Δŷₜ = 2 + 0.5 · Δy<sub>t−1</sub> + 0.4 · ε<sub>t−1</sub></div></div>' +
    '<p>Los datos observados son:</p>' +
    '<table class="dtable"><thead><tr><th>t</th><th>Δy</th></tr></thead><tbody>' +
      '<tr><td>1</td><td>4.0</td></tr>' +
      '<tr><td>2</td><td>6.0</td></tr>' +
      '<tr><td>3</td><td>4.8</td></tr>' +
      '<tr><td>4</td><td>5.0</td></tr>' +
      '<tr><td>5</td><td>3.9</td></tr>' +
      '<tr><td>6</td><td>5.5</td></tr>' +
    '</tbody></table>' +
    '<p>Ahora construimos la tabla fila por fila. Completa cada campo antes de avanzar.</p>' +
    '<div class="stepbox"><div class="steplbl">t = 1 — Inicialización</div>' +
    '<div class="stepmath">No hay período anterior → ε₁ = 0 (supuesto inicial). No se produce pronóstico.</div></div>' +

    makeStep('t = 2 — Primer pronóstico (ε₁ = 0, Δy₁ = 4.0)', [
      {type:'text', value:'Δŷ₂ = 2 + 0.5 · Δy₁ + 0.4 · ε₁ = 2 + 0.5·('},
      {type:'input', accept:'4|4.0', width:46},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'0|0.0', width:40},
      {type:'text', value:') ='},
      {type:'input', accept:'4|4.0', width:46},
    ]) +
    makeStep('t = 2 — Error ε₂', [
      {type:'text', value:'ε₂ = Δy₂ − Δŷ₂ = 6.0 −'},
      {type:'input', accept:'4|4.0', width:46},
      {type:'text', value:'='},
      {type:'input', accept:'2|2.0', width:46},
    ]) +

    makeStep('t = 3 — El término MA entra en juego (ε₂ = +2.0, Δy₂ = 6.0)', [
      {type:'text', value:'Δŷ₃ = 2 + 0.5·('},
      {type:'input', accept:'6|6.0', width:46},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'2|2.0', width:46},
      {type:'text', value:') ='},
      {type:'input', accept:'5.8', width:52},
    ]) +
    makeStep('t = 3 — Error ε₃', [
      {type:'text', value:'ε₃ = 4.8 −'},
      {type:'input', accept:'5.8', width:52},
      {type:'text', value:'='},
      {type:'input', accept:'-1|-1.0', width:52},
    ]) +

    makeStep('t = 4 — (ε₃ = −1.0, Δy₃ = 4.8)', [
      {type:'text', value:'Δŷ₄ = 2 + 0.5·('},
      {type:'input', accept:'4.8', width:46},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'-1|-1.0', width:52},
      {type:'text', value:') ='},
      {type:'input', accept:'4|4.0', width:46},
    ]) +
    makeStep('t = 4 — Error ε₄', [
      {type:'text', value:'ε₄ = 5.0 −'},
      {type:'input', accept:'4|4.0', width:46},
      {type:'text', value:'='},
      {type:'input', accept:'1|1.0', width:46},
    ]) +

    makeStep('t = 5 — (ε₄ = +1.0, Δy₄ = 5.0)', [
      {type:'text', value:'Δŷ₅ = 2 + 0.5·('},
      {type:'input', accept:'5|5.0', width:46},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'1|1.0', width:46},
      {type:'text', value:') ='},
      {type:'input', accept:'4.9', width:52},
    ]) +
    makeStep('t = 5 — Error ε₅', [
      {type:'text', value:'ε₅ = 3.9 −'},
      {type:'input', accept:'4.9', width:52},
      {type:'text', value:'='},
      {type:'input', accept:'-1|-1.0', width:52},
    ]) +

    makeStep('t = 6 — (ε₅ = −1.0, Δy₅ = 3.9)', [
      {type:'text', value:'Δŷ₆ = 2 + 0.5·('},
      {type:'input', accept:'3.9', width:52},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'-1|-1.0', width:52},
      {type:'text', value:') ='},
      {type:'input', accept:'3.55', width:52},
    ]) +
    makeStep('t = 6 — Error ε₆', [
      {type:'text', value:'ε₆ = 5.5 −'},
      {type:'input', accept:'3.55', width:52},
      {type:'text', value:'='},
      {type:'input', accept:'1.95', width:52},
    ]) +

    '<p style="margin-top:1rem">La tabla completa queda así:</p>' +
    '<table class="dtable"><thead><tr><th>t</th><th>Δy</th><th>Δŷ</th><th>ε</th></tr></thead><tbody>' +
      '<tr><td>1</td><td>4.0</td><td>—</td><td class="highlight">0.0 (supuesto)</td></tr>' +
      '<tr><td>2</td><td>6.0</td><td class="computed">4.0</td><td class="computed">+2.0</td></tr>' +
      '<tr><td>3</td><td>4.8</td><td class="computed">5.8</td><td class="computed">−1.0</td></tr>' +
      '<tr><td>4</td><td>5.0</td><td class="computed">4.0</td><td class="computed">+1.0</td></tr>' +
      '<tr><td>5</td><td>3.9</td><td class="computed">4.9</td><td class="computed">−1.0</td></tr>' +
      '<tr><td>6</td><td>5.5</td><td class="computed">3.55</td><td class="computed">+1.95</td></tr>' +
    '</tbody></table>' +
    '<div class="callout"><p><strong>Nota sobre t = 6:</strong> el error aquí fue +1.95 (no un número entero) porque se acumulan los decimales de los pasos anteriores. El software maneja esta aritmética automáticamente con precisión completa.</p></div>';
  lb.appendChild(ex2);

  // ── PROBLEMA 2: calcular un pronóstico ARMA(1,1) ─────────────
  // Fixed core dataset, randomize a specific step they must compute
  // They compute the prediction for t=4 using the established table
  // dy=[4,6,4.8,5.0,3.9,5.5], eps=[0,2,-1,1,-1,1.95]
  // We give them a slightly varied model to compute t=5
  var theta_p2 = pick([0.3, 0.4, 0.5], rng);
  // With theta variant, compute pred at t=5: 2 + 0.5*(5.0) + theta*(1.0)
  var pred_p2 = Math.round((2 + 0.5 * 5.0 + theta_p2 * 1.0) * 100) / 100;
  var w1_p2 = Math.round((pred_p2 + 0.5) * 100) / 100;
  var w2_p2 = Math.round((2 + 0.5 * 5.0) * 100) / 100;  // forgot MA term
  var w3_p2 = Math.round((pred_p2 - 0.8) * 100) / 100;
  var correct_p2 = String(pred_p2);
  var sh2 = shuffleOpts([correct_p2, String(w1_p2), String(w2_p2), String(w3_p2)], correct_p2, rng);
  problems.push({
    title: 'Pronóstico ARMA(1,1): un paso manual',
    questionText: 'Usando el mismo conjunto de datos del ejemplo (Δy₁…Δy₆ = 4.0, 6.0, 4.8, 5.0, 3.9, 5.5), ahora el modelo tiene el coeficiente MA ajustado a <strong>θ = ' + theta_p2 + '</strong>: ' +
      '<br><br><strong>Δŷₜ = 2 + 0.5 · Δy<sub>t−1</sub> + ' + theta_p2 + ' · ε<sub>t−1</sub></strong>' +
      '<br><br>Para el período t = 5: Δy₄ = 5.0 y ε₄ = +1.0 (calculado en el ejemplo). ¿Cuál es el pronóstico Δŷ₅?',
    fn: 'Δŷ₅ = 2 + 0.5 × 5.0 + ' + theta_p2 + ' × 1.0',
    options: sh2.opts,
    correctIdx: sh2.correctIdx,
    hint: 'Sustituye directamente: Δy<sub>t−1</sub> = Δy₄ = 5.0, y ε<sub>t−1</sub> = ε₄ = +1.0. La diferencia con el ejemplo está solo en el valor de θ.',
    explanation: 'Δŷ₅ = 2 + 0.5 × 5.0 + ' + theta_p2 + ' × 1.0 = 2 + 2.5 + ' + theta_p2 + ' = ' + pred_p2 + '. El término MA suma θ × ε₄ al pronóstico base AR.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // ─────────────────────────────────────────────────────────────────
  // SECCIÓN 3 — Pronóstico a varios pasos: los errores se desvanecen
  // ─────────────────────────────────────────────────────────────────
  var s3 = document.createElement('div');
  s3.className = 'section';
  s3.innerHTML =
    '<div class="stag">Sección 3</div>' +
    '<h2>Pronóstico a varios pasos: el efecto MA desaparece</h2>' +
    '<p>Hasta ahora hemos pronosticado un período hacia adelante — donde aún conocemos el último error ε. Pero, ¿qué pasa cuando queremos pronosticar dos, tres o más períodos al futuro?</p>' +
    '<p>La respuesta es clara: <strong>los errores futuros son desconocidos</strong>. Y la convención estadística es tratarlos como cero en esperanza:</p>' +
    '<div class="stepbox"><div class="steplbl">Para cualquier horizonte h ≥ 2</div><div class="stepmath">E[εₜ₊ₕ] = 0 &nbsp;&nbsp;(el error esperado de un buen modelo es cero)</div></div>' +
    '<p>Esto tiene una consecuencia importante para el modelo ARMA: el componente MA <strong>deja de contribuir</strong> a partir del segundo paso hacia adelante.</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Pronóstico 1 paso (t+1)</div><div class="rform">usa ε<sub>t</sub> conocido</div><div class="rnote">El término MA contribuye plenamente al pronóstico.</div></div>' +
      '<div class="rcard"><div class="rname">Pronóstico 2+ pasos</div><div class="rform">ε<sub>t+1</sub>, ε<sub>t+2</sub>,… → 0</div><div class="rnote">Los términos MA se anulan. Solo persiste el efecto AR.</div></div>' +
    '</div>' +
    '<div class="callout"><p><strong>Implicación práctica:</strong> Los modelos ARIMA son especialmente útiles para pronósticos de corto plazo. En el largo plazo, los pronósticos convergen hacia la media de la serie, y el efecto MA ya no diferencia al modelo de uno puramente AR.</p></div>';
  lb.appendChild(s3);

  // ── Ejemplo resuelto 3: pronóstico multistep con fill-in ──────
  var ex3 = document.createElement('div');
  ex3.className = 'section';
  ex3.innerHTML =
    '<div class="stag">Ejemplo Resuelto</div>' +
    '<h2>Pronóstico a 2 pasos con el mismo modelo</h2>' +
    '<p>Continuamos con el modelo anterior: <strong>Δŷₜ = 2 + 0.5 · Δy<sub>t−1</sub> + 0.4 · ε<sub>t−1</sub></strong>.</p>' +
    '<p>El último período observado es t = 6, con Δy₆ = 5.5 y ε₆ = +1.95.</p>' +

    makeStep('1 paso adelante — t+1 = 7 (ε₆ = 1.95 es conocido)', [
      {type:'text', value:'Δŷ₇ = 2 + 0.5·('},
      {type:'input', accept:'5.5', width:46},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'1.95', width:52},
      {type:'text', value:') = 2 +'},
      {type:'input', accept:'2.75', width:52},
      {type:'text', value:'+'},
      {type:'input', accept:'0.78', width:52},
      {type:'text', value:'='},
      {type:'input', accept:'5.53', width:52},
    ]) +

    makeStep('2 pasos adelante — t+2 = 8 (ε₇ es desconocido → E[ε₇] = 0)', [
      {type:'text', value:'Δŷ₈ = 2 + 0.5·('},
      {type:'input', accept:'5.53', width:52},
      {type:'text', value:') + 0.4·('},
      {type:'input', accept:'0|0.0', width:40},
      {type:'text', value:') = 2 +'},
      {type:'input', accept:'2.765|2.77', width:56},
      {type:'text', value:'+'},
      {type:'input', accept:'0|0.0', width:40},
      {type:'text', value:'='},
      {type:'input', accept:'4.77|4.765', width:56},
    ]) +

    '<table class="dtable"><thead><tr><th>Horizonte</th><th>Pronóstico Δŷ</th><th>Término MA</th><th>Contribución</th></tr></thead><tbody>' +
      '<tr><td>t+1 = 7</td><td class="computed">5.53</td><td>0.4 × ε₆ = 0.4 × 1.95</td><td class="computed">+0.78</td></tr>' +
      '<tr><td>t+2 = 8</td><td class="computed">4.77</td><td>0.4 × E[ε₇] = 0.4 × 0</td><td class="highlight">0.00</td></tr>' +
    '</tbody></table>';
  lb.appendChild(ex3);

  // ── PROBLEMA 3 ────────────────────────────────────────────────
  // Given the 1-step forecast, compute the 2-step where MA vanishes
  var c_p3   = pick([1.5, 2.0, 2.5], rng);
  var phi_p3 = pick([0.4, 0.5, 0.6], rng);
  var theta_p3 = pick([0.3, 0.4], rng);
  var dy_t_p3  = pick([5.0, 6.0, 7.0], rng);
  var eps_t_p3 = pick([1.5, 2.0, -1.0], rng);
  // 1-step (given to student)
  var pred1_p3 = Math.round((c_p3 + phi_p3 * dy_t_p3 + theta_p3 * eps_t_p3) * 100) / 100;
  // 2-step (what they compute: MA term = 0)
  var pred2_p3 = Math.round((c_p3 + phi_p3 * pred1_p3) * 100) / 100;
  // Distractors
  var w1_p3 = Math.round((c_p3 + phi_p3 * pred1_p3 + theta_p3 * eps_t_p3) * 100) / 100; // forgot to zero the MA
  var w2_p3 = Math.round((pred2_p3 + 0.5) * 100) / 100;
  var w3_p3 = Math.round((c_p3 + phi_p3 * dy_t_p3) * 100) / 100; // used original dy instead of pred1
  var correct_p3 = String(pred2_p3);
  var sh3 = shuffleOpts([correct_p3, String(w1_p3), String(w2_p3), String(w3_p3)], correct_p3, rng);
  problems.push({
    title: 'Pronóstico 2 pasos: el término MA se anula',
    questionText: 'Modelo: <strong>Δŷₜ = ' + c_p3 + ' + ' + phi_p3 + ' · Δy<sub>t−1</sub> + ' + theta_p3 + ' · ε<sub>t−1</sub></strong>.' +
      '<br><br>Último período observado: Δyₜ = ' + dy_t_p3 + ' y εₜ = ' + eps_t_p3 + '.' +
      '<br>Ya calculaste el pronóstico de 1 paso: <strong>Δŷ<sub>t+1</sub> = ' + pred1_p3 + '</strong>.' +
      '<br><br>¿Cuál es el pronóstico de <strong>2 pasos</strong> adelante (Δŷ<sub>t+2</sub>)?',
    fn: 'Δŷ<sub>t+2</sub> = ' + c_p3 + ' + ' + phi_p3 + ' × Δŷ<sub>t+1</sub> + ' + theta_p3 + ' × E[ε<sub>t+1</sub>]',
    options: sh3.opts,
    correctIdx: sh3.correctIdx,
    hint: 'Para 2 pasos adelante, el error futuro ε<sub>t+1</sub> es desconocido. Por convención, E[ε<sub>t+1</sub>] = 0, así que el término MA desaparece. Solo se usa el pronóstico de 1 paso como entrada del AR.',
    explanation: 'E[ε<sub>t+1</sub>] = 0 → el término MA se cancela. Δŷ<sub>t+2</sub> = ' + c_p3 + ' + ' + phi_p3 + ' × ' + pred1_p3 + ' + 0 = ' + pred2_p3 + '. La opción ' + w1_p3 + ' es incorrecta porque usa εₜ en lugar de cero.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // ─────────────────────────────────────────────────────────────────
  // SECCIÓN FINAL: Evaluación sin explicación previa
  // ─────────────────────────────────────────────────────────────────
  var sf = document.createElement('div');
  sf.className = 'section';
  sf.innerHTML =
    '<div class="stag">Evaluación Final</div>' +
    '<h2>Pon a prueba lo aprendido</h2>' +
    '<p>Los siguientes problemas no tienen explicación previa. Aplica directamente el proceso recursivo que practicaste.</p>';
  lb.appendChild(sf);

  // ── PROBLEMA 4: Error recursivo — calcular ε en un paso ─────
  // Give a table with predictions already computed, ask for a specific error
  var c_p4    = pick([1.0, 1.5, 2.0], rng);
  var phi_p4  = pick([0.4, 0.5, 0.6], rng);
  var theta_p4 = pick([0.3, 0.4, 0.5], rng);
  // dy series (clean)
  var dy_p4 = [
    Math.round((3 + rng()*2)*10)/10,
    Math.round((4 + rng()*3)*10)/10,
    Math.round((3 + rng()*3)*10)/10,
  ];
  // Compute pred for t=2 (eps1=0) and eps2, then ask for pred at t=3
  var pred2_p4 = Math.round((c_p4 + phi_p4 * dy_p4[0]) * 100) / 100;
  var eps2_p4  = Math.round((dy_p4[1] - pred2_p4) * 100) / 100;
  var pred3_p4 = Math.round((c_p4 + phi_p4 * dy_p4[1] + theta_p4 * eps2_p4) * 100) / 100;
  var eps3_p4  = Math.round((dy_p4[2] - pred3_p4) * 100) / 100;
  // Ask for eps3
  var correct_p4 = String(eps3_p4);
  var w1_p4 = String(Math.round((eps3_p4 + 1.0) * 100)/100);
  var w2_p4 = String(Math.round((dy_p4[2] - pred2_p4) * 100)/100); // used wrong pred
  var w3_p4 = String(Math.round((eps3_p4 - 0.5) * 100)/100);
  var sh4 = shuffleOpts([correct_p4, w1_p4, w2_p4, w3_p4], correct_p4, rng);
  problems.push({
    title: 'Calcular un error de pronóstico',
    questionText: 'Modelo: <strong>Δŷₜ = ' + c_p4 + ' + ' + phi_p4 + ' · Δy<sub>t−1</sub> + ' + theta_p4 + ' · ε<sub>t−1</sub></strong>.' +
      '<br><br>Serie observada:' +
      '<br>Δy₁ = ' + dy_p4[0] + ', &nbsp;Δy₂ = ' + dy_p4[1] + ', &nbsp;Δy₃ = ' + dy_p4[2] +
      '<br><br>Ya se calculó: ε₁ = 0, &nbsp;Δŷ₂ = ' + pred2_p4 + ', &nbsp;ε₂ = ' + eps2_p4 + ', &nbsp;Δŷ₃ = ' + pred3_p4 + '.' +
      '<br><br>¿Cuál es el error de pronóstico <strong>ε₃</strong>?',
    fn: 'ε₃ = Δy₃ − Δŷ₃',
    options: sh4.opts,
    correctIdx: sh4.correctIdx,
    hint: 'El error se calcula siempre como: ε = valor real − pronóstico. Aquí: ε₃ = Δy₃ − Δŷ₃.',
    explanation: 'ε₃ = Δy₃ − Δŷ₃ = ' + dy_p4[2] + ' − ' + pred3_p4 + ' = ' + eps3_p4 + '. El error mide qué tan lejos estuvo el pronóstico del valor real observado.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // ── PROBLEMA 5: Pronóstico completo desde cero ──────────────
  // Give 3 observations, ask for pred at t=3 (requires first computing eps1=0, pred2, eps2)
  var c_p5    = 2.0;
  var phi_p5  = pick([0.4, 0.5, 0.6], rng);
  var theta_p5 = pick([0.3, 0.4], rng);
  var dy1_p5  = Math.round((4 + rng()*2) * 10) / 10;
  // Define target errors to keep arithmetic clean
  var eps2_p5 = pick([1.5, 2.0, -1.0, 1.0], rng);
  var dy2_p5  = Math.round((c_p5 + phi_p5 * dy1_p5 + eps2_p5) * 10) / 10;
  var eps3_p5 = pick([-1.0, 0.5, -0.5, 1.0], rng);
  var dy3_p5  = Math.round((c_p5 + phi_p5 * dy2_p5 + eps3_p5 + theta_p5 * eps2_p5) * 10) / 10;
  // What student must compute: pred at t=4
  // pred2 = c + phi*dy1 (eps1=0)
  var pred2_p5 = Math.round((c_p5 + phi_p5 * dy1_p5) * 100) / 100;
  var eps2_check = Math.round((dy2_p5 - pred2_p5) * 100) / 100;
  var pred3_p5 = Math.round((c_p5 + phi_p5 * dy2_p5 + theta_p5 * eps2_check) * 100) / 100;
  var eps3_check = Math.round((dy3_p5 - pred3_p5) * 100) / 100;
  var pred4_p5 = Math.round((c_p5 + phi_p5 * dy3_p5 + theta_p5 * eps3_check) * 100) / 100;
  var correct_p5 = String(pred4_p5);
  var w1_p5 = String(Math.round((c_p5 + phi_p5 * dy3_p5) * 100) / 100); // forgot MA
  var w2_p5 = String(Math.round((pred4_p5 + 0.5) * 100) / 100);
  var w3_p5 = String(Math.round((c_p5 + phi_p5 * dy3_p5 + theta_p5 * eps2_check) * 100) / 100); // used eps2 instead of eps3
  var sh5 = shuffleOpts([correct_p5, w1_p5, w2_p5, w3_p5], correct_p5, rng);
  problems.push({
    title: 'Pronóstico completo desde los datos',
    questionText: 'Modelo: <strong>Δŷₜ = 2 + ' + phi_p5 + ' · Δy<sub>t−1</sub> + ' + theta_p5 + ' · ε<sub>t−1</sub></strong>.' +
      '<br><br>Serie observada: Δy₁ = ' + dy1_p5 + ', &nbsp;Δy₂ = ' + dy2_p5 + ', &nbsp;Δy₃ = ' + dy3_p5 +
      '<br><br>Partiendo de ε₁ = 0, aplica el proceso recursivo completo para obtener el <strong>pronóstico Δŷ₄</strong>.',
    fn: 'Primero calcula: Δŷ₂, ε₂, Δŷ₃, ε₃ → luego Δŷ₄',
    options: sh5.opts,
    correctIdx: sh5.correctIdx,
    hint: 'Paso 1: Δŷ₂ = 2 + ' + phi_p5 + '×' + dy1_p5 + ' + ' + theta_p5 + '×0 = ' + pred2_p5 + '. Paso 2: ε₂ = ' + dy2_p5 + ' − ' + pred2_p5 + ' = ' + eps2_check + '. Continúa con el mismo patrón hasta llegar a Δŷ₄.',
    explanation: 'Proceso: ε₁=0 → Δŷ₂=' + pred2_p5 + ' → ε₂=' + eps2_check + ' → Δŷ₃=' + pred3_p5 + ' → ε₃=' + eps3_check + ' → Δŷ₄ = 2 + ' + phi_p5 + '×' + dy3_p5 + ' + ' + theta_p5 + '×' + eps3_check + ' = ' + pred4_p5 + '.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // ── PROBLEMA 6: Identificar qué parte es AR vs MA ───────────
  // Conceptual: given an equation, identify what contributes to a prediction
  var options_p6_correct = 'El error ε<sub>t</sub> es desconocido en el momento del pronóstico y se asume igual a cero.';
  var options_p6_w1 = 'El error ε<sub>t</sub> siempre es positivo, por lo que suma al pronóstico.';
  var options_p6_w2 = 'El error ε<sub>t</sub> se puede leer directamente de la tabla de datos originales.';
  var options_p6_w3 = 'El error ε<sub>t</sub> se ignora por completo en todos los pronósticos ARIMA.';
  var sh6 = shuffleOpts(
    [options_p6_correct, options_p6_w1, options_p6_w2, options_p6_w3],
    options_p6_correct, rng
  );
  problems.push({
    title: '¿Por qué el término MA desaparece en pronósticos lejanos?',
    questionText: 'Un modelo ARMA(1,1) usa el término <strong>θ · ε<sub>t</sub></strong> para el pronóstico de 1 paso adelante. ¿Por qué este término <strong>no aparece</strong> en pronósticos de 2 o más pasos hacia el futuro?',
    fn: '',
    options: sh6.opts,
    correctIdx: sh6.correctIdx,
    hint: 'Piensa en qué información está disponible en el momento de hacer el pronóstico. ¿Puedes conocer el error que cometerás en el futuro?',
    explanation: 'Cuando pronosticamos h ≥ 2 pasos adelante, los errores futuros ε<sub>t+1</sub>, ε<sub>t+2</sub>,… aún no han ocurrido y son desconocidos. La convención estadística es usar su valor esperado: E[ε] = 0. Por eso el término MA desaparece y solo persiste el efecto AR en el largo plazo.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);
}
</script>
</body>
</html>
