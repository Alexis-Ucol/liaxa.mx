<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regiones Bioculturales de México y el Mundo — Geografía · 1° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the 5 lines below.
   Derive from 2 institution colors:
     PRIMARY  = main dark color  (nav, buttons, progress bar, PDF band)
     ACCENT   = highlight color  (tags, hints, PDF stripe, wcard top line)
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #1a3a6b;   /* PRIMARY      */
  --green-dark: #0f2244;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #e8edf5;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:#1a5c38; background:#b7e4cc; color:#0e3a22; font-weight:700; }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:#1a5c38; background:#d4f0e2; color:#0e3a22; font-weight:600; }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }


/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

/* ── MATCHING WIDGET ── */
.matchwrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem; margin:1rem 0; }
.match-instr { font-size:.85rem; color:var(--text2); margin-bottom:.9rem; }
.match-cols { display:grid; grid-template-columns:1fr 1fr; gap:.9rem; }
.match-col-label { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:.4rem; }
.match-item { padding:.6rem .75rem; border:2px solid var(--border); border-radius:8px; background:var(--surface2); cursor:pointer; font-size:.8rem; margin-bottom:.5rem; transition:all .15s; user-select:none; }
.match-item:hover:not(.done):not(.sel) { border-color:var(--green); background:var(--green-bg); }
.match-item.done { cursor:default; opacity:.9; font-weight:600; }
.match-item.wrong { animation:matchShake .38s ease; }
.match-progress { font-size:.72rem; color:var(--text3); text-align:right; margin-top:.4rem; }
/* Per-pair colors for matched items */
.match-pair-0 { border-color:#c0392b !important; background:#fde8e7 !important; color:#7b1a13 !important; }
.match-pair-1 { border-color:#e67e22 !important; background:#fef0e1 !important; color:#8a4a0d !important; }
.match-pair-2 { border-color:#f1c40f !important; background:#fefbe6 !important; color:#7a6200 !important; }
.match-pair-3 { border-color:#27ae60 !important; background:#e3f7ec !important; color:#145c35 !important; }
.match-pair-4 { border-color:#2980b9 !important; background:#e3f1fb !important; color:#12507a !important; }
.match-pair-5 { border-color:#8e44ad !important; background:#f3e8fb !important; color:#53216b !important; }
/* "Try again" toast */
#matchToast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(2rem); background:#8b2500; color:#fff; padding:.6rem 1.4rem; border-radius:20px; font-size:.82rem; font-weight:600; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:9999; }
#matchToast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@keyframes matchShake {
  0%,100%{ transform:translateX(0); }
  20%    { transform:translateX(-5px); }
  40%    { transform:translateX(5px); }
  60%    { transform:translateX(-4px); }
  80%    { transform:translateX(4px); }
}

/* ── CLASSIFICATION WIDGET ── */
.clswrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem; margin:1rem 0; }
.cls-instr { font-size:.85rem; color:var(--text2); margin-bottom:.9rem; }
.cls-item { border:1.5px solid var(--border); border-radius:10px; padding:.75rem .85rem; margin-bottom:.65rem; background:var(--surface2); }
.cls-stmt { font-size:.85rem; margin-bottom:.55rem; }
.cls-choices { display:flex; gap:.55rem; flex-wrap:wrap; }
.cls-btn { flex:1; min-width:120px; padding:.5rem .7rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface); color:var(--text2); font-size:.8rem; font-weight:600; cursor:pointer; transition:all .13s; }
.cls-btn:hover:not(:disabled) { border-color:var(--green); background:var(--green-bg); }
.cls-btn:disabled { cursor:default; }
.cls-btn.sc { border-color:#1a5c38; background:#b7e4cc; color:#0e3a22; font-weight:700; }
.cls-btn.sw { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.cls-fb { font-size:.76rem; margin-top:.5rem; display:none; color:var(--text2); }
.cls-fb.show { display:block; }
.cls-progress { font-size:.72rem; color:var(--text3); text-align:right; margin-top:.3rem; }

/* ── DRAWING ACTIVITY ── */
.drawact { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem; margin:1rem 0; border-top:3px solid var(--gold); }
.drawact-instr { font-size:.85rem; color:var(--text2); margin-bottom:.9rem; }
.drawact-label { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.4rem; }
.drawact-tabs { display:flex; gap:.35rem; margin-bottom:.6rem; flex-wrap:wrap; }
.drawact-tab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.drawact-tab.active, .drawact-tab:hover { background:var(--gold); color:#fff; border-color:var(--gold); }
.drawact-panel { display:none; }
.drawact-panel.active { display:block; }
.drawact-submit { margin-top:.7rem; background:var(--gold); color:#fff; border:none; border-radius:8px; padding:.5rem 1.2rem; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .15s; }
.drawact-submit:hover { background:var(--green-dark); }
.drawact-done { display:none; font-size:.82rem; color:var(--ok); font-weight:600; margin-top:.6rem; text-align:center; }
.drawact-done.show { display:block; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .cls-choices { flex-direction: column; }
  .cls-btn { min-width: 0; }
  .clswrap { padding: .85rem; }
  .match-cols { grid-template-columns: 1fr; }
  .matchwrap { padding: .85rem; }
}
</style>
</head>
<body>

<!-- Toast for match widget -->
<div id="matchToast"></div>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <!-- LOGO: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitleEl">Regiones Bioculturales de México y el Mundo</div>
    <div class="wcourse" id="wcourseEl">Geografía · 1° de Secundaria</div>
    <label class="flabel" id="lblNameEl" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lblGroupEl" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
/* Permutation-based shuffle so ES and EN option arrays stay in sync
   (canonical index 0 is always the correct option before shuffling). */
function shufflePerm(n, rng) {
  var idx = []; for (var k = 0; k < n; k++) idx.push(k);
  return shuffle(idx, rng);
}
function buildBilingualOptions(rawEs, rawEn, rng) {
  var perm = shufflePerm(rawEs.length, rng);
  return {
    es: perm.map(function(k){ return rawEs[k]; }),
    en: perm.map(function(k){ return rawEn[k]; }),
    correctIdx: perm.indexOf(0)
  };
}

/* ================================================
   ANSWER HANDLER — doble toque para confirmar (Regla 8)
   Primer toque: resalta en dorado (pendiente).
   Segundo toque en la misma opción: confirma.
   Problema 2 (index 1): requiere doble clic para confirmar (no toque único).
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Para el problema 2 (index 1), usar doble clic
  if (probIdx === 1) {
    // Primer toque: marcar pendiente
    if (prob.pendingChoice !== chosenIdx) {
      prob.pendingChoice = chosenIdx;
      opts.forEach(function(o) { o.classList.remove('pending'); });
      opts[chosenIdx].classList.add('pending');
      return;
    }
    // Segundo toque en la misma → confirmar (comportamiento normal de abajo)
  }

  // Segundo toque en la misma opción → confirmar
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + prob.explanation[LANG];
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // Primer toque → resaltar como pendiente, limpiar pendiente anterior
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Confirmación directa — usada por restoreSession para omitir el doble toque
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + prob.explanation[LANG];
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = t('pdf-generating');
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString(LANG === 'es' ? 'es-MX' : 'en-US', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  // ── PDF COLORS — read from SCHOOL (Rule 14.3) ────────────────────────────
  var pBR = SCHOOL.pBR, pBG = SCHOOL.pBG, pBB = SCHOOL.pBB;
  var pAR = SCHOOL.pAR, pAG = SCHOOL.pAG, pAB = SCHOOL.pAB;

  function pdfText(html) {
    if (!html) return '';
    return html
      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\s+/g,' ').trim();
  }

  // ── PORTADA: línea acento / franja blanca logos / línea acento / banda color ──
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');

/* ================================================
   RENDER HELPERS
   ================================================ */
function appendSection(html) {
  var div = document.createElement('div');
  div.className = 'section';
  div.innerHTML = html;
  document.getElementById('lessonBody').appendChild(div);
}

function renderConceptSection(sec) {
  appendSection(
    '<div class="stag">' + sec.tag[LANG] + '</div>' +
    '<h2>' + sec.title[LANG] + '</h2>' +
    sec.body[LANG] +
    '<div class="callout">' + sec.callout[LANG] + '</div>' +
    '<div class="callout" style="border-left-color:var(--gold);background:var(--gold-bg)">' + sec.example[LANG] + '</div>'
  );
}

function makeProblem(def, rng) {
  var built = buildBilingualOptions(def.opts.es, def.opts.en, rng);
  return {
    title: def.title,
    questionText: { es: def.stmt.es, en: def.stmt.en },
    options: { es: built.es, en: built.en },
    correctIdx: built.correctIdx,
    hint: def.hint,
    explanation: def.explanation,
    studentChoice: null,
    pendingChoice: null
  };
}

function addProblem(def, rng) {
  var prob = makeProblem(def, rng);
  problems.push(prob);
  buildOneCard(prob, problems.length - 1);
}

/* ── MATCHING WIDGET ── */
var MATCH = { leftSel: null, rightSel: null, matched: 0, total: 0 };
function renderMatchingWidget(rng) {
  var leftOrder  = shufflePerm(MATCH_PAIRS.length, rng);
  var rightOrder = shufflePerm(MATCH_PAIRS.length, rng);
  MATCH.matched = 0; MATCH.total = MATCH_PAIRS.length; MATCH.leftSel = null; MATCH.rightSel = null;
  var leftHtml = leftOrder.map(function(ci) {
    return '<div class="match-item" data-side="left" data-idx="' + ci + '" onclick="matchClick(this)">' + MATCH_PAIRS[ci][LANG].name + '</div>';
  }).join('');
  var rightHtml = rightOrder.map(function(ci) {
    return '<div class="match-item" data-side="right" data-idx="' + ci + '" onclick="matchClick(this)">' + MATCH_PAIRS[ci][LANG].desc + '</div>';
  }).join('');
  var wrap = document.createElement('div');
  wrap.className = 'matchwrap section';
  wrap.id = 'matchWidget';
  wrap.innerHTML =
    '<div class="match-instr"><strong>' + (LANG === 'es' ? 'Relaciona cada región biocultural con su descripción' : 'Match each biocultural region with its description') + '</strong><br>' +
    (LANG === 'es' ? 'Toca una región y luego la descripción que le corresponde.' : 'Tap a region, then tap the description that matches it.') + '</div>' +
    '<div class="match-cols">' +
      '<div><div class="match-col-label">' + (LANG === 'es' ? 'Región' : 'Region') + '</div><div id="matchLeft">' + leftHtml + '</div></div>' +
      '<div><div class="match-col-label">' + (LANG === 'es' ? 'Descripción' : 'Description') + '</div><div id="matchRight">' + rightHtml + '</div></div>' +
    '</div>' +
    '<div class="match-progress" id="matchProgress"></div>';
  document.getElementById('lessonBody').appendChild(wrap);
  updateMatchProgress();
}
function matchClick(el) {
  if (el.classList.contains('done')) return;
  var side = el.dataset.side;
  var PAIR_COLORS = ['match-pair-0','match-pair-1','match-pair-2','match-pair-3','match-pair-4','match-pair-5'];

  if (side === 'left') {
    // Deselect previous left selection (remove color class if not matched)
    if (MATCH.leftSel) {
      MATCH.leftSel.classList.remove('sel');
      PAIR_COLORS.forEach(function(c){ MATCH.leftSel.classList.remove(c); });
    }
    // Assign a color to this left item based on its index
    var colorClass = PAIR_COLORS[parseInt(el.dataset.idx, 10) % PAIR_COLORS.length];
    MATCH.leftSel = el;
    el.classList.add('sel');
    el.classList.add(colorClass);
    el.dataset.colorClass = colorClass;
  } else {
    if (MATCH.rightSel) {
      MATCH.rightSel.classList.remove('sel');
      PAIR_COLORS.forEach(function(c){ MATCH.rightSel.classList.remove(c); });
    }
    MATCH.rightSel = el; el.classList.add('sel');
  }

  if (MATCH.leftSel && MATCH.rightSel) {
    var li = parseInt(MATCH.leftSel.dataset.idx, 10);
    var ri = parseInt(MATCH.rightSel.dataset.idx, 10);
    if (li === ri) {
      // Correct match — apply color to both and lock them
      var matchColor = MATCH.leftSel.dataset.colorClass || PAIR_COLORS[li % PAIR_COLORS.length];
      var lEl = MATCH.leftSel, rEl = MATCH.rightSel;
      lEl.classList.remove('sel'); rEl.classList.remove('sel');
      PAIR_COLORS.forEach(function(c){ lEl.classList.remove(c); rEl.classList.remove(c); });
      lEl.classList.add('done'); rEl.classList.add('done');
      lEl.classList.add(matchColor); rEl.classList.add(matchColor);
      MATCH.leftSel = null; MATCH.rightSel = null;
      MATCH.matched++;
      updateMatchProgress();
    } else {
      // Wrong — shake and show toast
      var l = MATCH.leftSel, r = MATCH.rightSel;
      l.classList.add('wrong'); r.classList.add('wrong');
      showMatchToast(LANG === 'es' ? '¡Intenta de nuevo!' : 'Try again!');
      setTimeout(function() {
        l.classList.remove('sel', 'wrong');
        r.classList.remove('sel', 'wrong');
        PAIR_COLORS.forEach(function(c){ l.classList.remove(c); });
      }, 550);
      MATCH.leftSel = null; MATCH.rightSel = null;
    }
  }
}

var _matchToastTimer = null;
function showMatchToast(msg) {
  var t = document.getElementById('matchToast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  if (_matchToastTimer) clearTimeout(_matchToastTimer);
  _matchToastTimer = setTimeout(function() { t.classList.remove('show'); }, 1600);
}

function updateMatchProgress() {
  var p = document.getElementById('matchProgress');
  if (!p) return;
  if (MATCH.matched === MATCH.total) {
    p.innerHTML = '<span style="color:var(--ok);font-weight:700;font-size:.85rem;">🎉 ' +
      (LANG === 'es' ? '¡Bien hecho! Relacionaste todas las regiones correctamente.' : 'Well done! You matched all the regions correctly.') +
      '</span>';
  } else {
    p.textContent = MATCH.matched + ' / ' + MATCH.total;
  }
}

/* ── CLASSIFICATION WIDGET: alta vs. baja probabilidad de riqueza biocultural ── */
var CLS_ANSWERED = 0, CLS_TOTAL = 0;
function renderClassificationWidget(rng) {
  var order = shufflePerm(SRC_STATEMENTS.length, rng);
  CLS_ANSWERED = 0; CLS_TOTAL = order.length;
  var itemsHtml = order.map(function(ci, pos) {
    var st = SRC_STATEMENTS[ci];
    return '<div class="cls-item" id="clsItem' + pos + '" data-correct="' + st.correct + '">' +
      '<div class="cls-stmt">' + st[LANG].text + '</div>' +
      '<div class="cls-choices">' +
        '<button class="cls-btn" onclick="clsAnswer(' + pos + ',\'rel\',this)">' + (LANG === 'es' ? 'Alta probabilidad' : 'High likelihood') + '</button>' +
        '<button class="cls-btn" onclick="clsAnswer(' + pos + ',\'unrel\',this)">' + (LANG === 'es' ? 'Baja probabilidad' : 'Low likelihood') + '</button>' +
      '</div>' +
      '<div class="cls-fb" id="clsFb' + pos + '"></div>' +
    '</div>';
  }).join('');
  var wrap = document.createElement('div');
  wrap.className = 'clswrap section';
  wrap.innerHTML =
    '<div class="cls-instr"><strong>' + (LANG === 'es' ? '¿Región biocultural probable o poco probable?' : 'Likely or unlikely biocultural region?') + '</strong><br>' +
    (LANG === 'es' ? 'Clasifica cada descripción según qué tan probable es que sea una región biocultural rica.' : 'Classify each description according to how likely it is to be a rich biocultural region.') + '</div>' +
    itemsHtml +
    '<div class="cls-progress" id="clsProgress"></div>';
  document.getElementById('lessonBody').appendChild(wrap);
  updateClsProgress();
}
function clsAnswer(pos, choice, btn) {
  var item = document.getElementById('clsItem' + pos);
  if (item.classList.contains('done')) return;
  item.classList.add('done');
  var correct = item.dataset.correct;
  var buttons = item.querySelectorAll('.cls-btn');
  buttons.forEach(function(b) { b.disabled = true; });
  var isOk = (choice === correct);
  buttons.forEach(function(b, bi) {
    var bChoice = bi === 0 ? 'rel' : 'unrel';
    if (bChoice === correct) b.classList.add('sc');
    else if (bChoice === choice && !isOk) b.classList.add('sw');
  });
  var fb = document.getElementById('clsFb' + pos);
  fb.className = 'cls-fb show';
  fb.textContent = isOk
    ? (LANG === 'es' ? '✓ Correcto.' : '✓ Correct.')
    : (LANG === 'es' ? '✗ No es correcto — revisa la respuesta marcada en verde.' : '✗ Not correct — check the answer marked in green.');
  CLS_ANSWERED++;
  updateClsProgress();
}
function updateClsProgress() {
  var p = document.getElementById('clsProgress');
  if (p) p.textContent = CLS_ANSWERED + ' / ' + CLS_TOTAL;
}

/* ── DRAWING ACTIVITY (ungraded — Concepto 2) ── */
var DRAW_CANVAS = null;
var DRAW_CTX = null;
var DRAW_STATE = { painting: false, color: '#1a3a6b', size: 4, mode: 'draw' };
var DRAW_SNAPSHOT = null;   // captured data URL — set on every stroke end and on submit

function renderDrawingActivity() {
  var wrap = document.createElement('div');
  wrap.className = 'drawact section';
  wrap.id = 'drawActivity';
  var instr = LANG === 'es'
    ? '<strong>🎨 Actividad: Imagina una región biocultural de México</strong><br>Acabas de conocer tres regiones bioculturales mexicanas: la Península de Yucatán, la Sierra Tarahumara y la Sierra Norte de Oaxaca. Elige la que más te llame la atención y dibuja cómo imaginas ese paisaje —el terreno, la vegetación, las personas y su cultura. Puedes añadir una descripción de lo que dibujaste.'
    : '<strong>🎨 Activity: Imagine a biocultural region of Mexico</strong><br>You just learned about three Mexican biocultural regions: the Yucatán Peninsula, the Sierra Tarahumara, and the Sierra Norte de Oaxaca. Choose the one that catches your attention most and draw how you imagine that landscape — the terrain, vegetation, people, and their culture. You can also add a written description of what you drew.';
  wrap.innerHTML =
    '<div class="drawact-label">' + (LANG === 'es' ? '✏️ Actividad libre · No cuenta para tu calificación' : '✏️ Free activity · Does not count toward your grade') + '</div>' +
    '<div class="drawact-instr">' + instr + '</div>' +
    '<div class="drawact-tabs">' +
      '<div class="drawact-tab active" onclick="switchDrawTab(\'draw\',this)">✏️ ' + (LANG === 'es' ? 'Dibujar' : 'Draw') + '</div>' +
      '<div class="drawact-tab" onclick="switchDrawTab(\'text\',this)">📝 ' + (LANG === 'es' ? 'Escribir' : 'Write') + '</div>' +
    '</div>' +
    '<div class="drawact-panel active" id="drawPanel">' +
      '<div class="cvwrap">' +
        '<canvas id="drawCanvas" class="dcanvas"></canvas>' +
        '<div class="ctoolbar">' +
          '<button class="tbtn2 on" id="drawModeBtn" onclick="setDrawMode(\'draw\')">' + (LANG === 'es' ? 'Dibujar' : 'Draw') + '</button>' +
          '<button class="tbtn2" id="eraseModeBtn" onclick="setDrawMode(\'erase\')">' + (LANG === 'es' ? 'Borrar' : 'Erase') + '</button>' +
          '<div class="cdot sel" style="background:#1a3a6b" onclick="setDrawColor(\'#1a3a6b\',this)"></div>' +
          '<div class="cdot" style="background:#c9a84c" onclick="setDrawColor(\'#c9a84c\',this)"></div>' +
          '<div class="cdot" style="background:#2d6a4f" onclick="setDrawColor(\'#2d6a4f\',this)"></div>' +
          '<div class="cdot" style="background:#8b2500" onclick="setDrawColor(\'#8b2500\',this)"></div>' +
          '<div class="cdot" style="background:#1a1a16" onclick="setDrawColor(\'#1a1a16\',this)"></div>' +
          '<button class="clrbtn" onclick="clearDrawCanvas()">' + (LANG === 'es' ? '🗑 Limpiar' : '🗑 Clear') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="drawact-panel" id="textPanel">' +
      '<textarea class="wtextarea" id="drawText" placeholder="' + (LANG === 'es' ? 'Describe el paisaje que imaginaste: terreno, vegetación, cultura...' : 'Describe the landscape you imagined: terrain, vegetation, culture...') + '" style="min-height:140px"></textarea>' +
    '</div>' +
    '<button class="drawact-submit" onclick="submitDrawActivity()">' + (LANG === 'es' ? '✓ Registrar mi observación' : '✓ Save my observation') + '</button>' +
    '<div class="drawact-done" id="drawDone">' + (LANG === 'es' ? '✅ ¡Observación guardada! Continúa con la siguiente sección.' : '✅ Observation saved! Continue to the next section.') + '</div>';
  document.getElementById('lessonBody').appendChild(wrap);
  // Init canvas — keep retrying with rAF until the element has layout (width > 0)
  (function tryInit(attempts) {
    var canvas = document.getElementById('drawCanvas');
    if (!canvas) return;
    var w = canvas.parentElement.offsetWidth || canvas.parentElement.clientWidth || 0;
    if (w > 0) {
      initDrawCanvas();
    } else if (attempts < 40) {
      requestAnimationFrame(function() { tryInit(attempts + 1); });
    }
  })(0);
}

function initDrawCanvas() {
  var canvas = document.getElementById('drawCanvas');
  if (!canvas) return;
  DRAW_CANVAS = canvas;
  var dpr = window.devicePixelRatio || 1;
  // Robust width: try multiple sources until we get something > 0
  var w = canvas.parentElement.offsetWidth
       || canvas.parentElement.clientWidth
       || canvas.closest('.drawact').offsetWidth
       || Math.round(window.innerWidth * 0.85)
       || 640;
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(220 * dpr);
  canvas.style.width  = w + 'px';
  canvas.style.height = '220px';
  DRAW_CTX = canvas.getContext('2d');
  DRAW_CTX.fillStyle = '#ffffff';
  DRAW_CTX.fillRect(0, 0, canvas.width, canvas.height);
  DRAW_CTX.scale(dpr, dpr);
  DRAW_CTX.lineCap = 'round';
  DRAW_CTX.lineJoin = 'round';

  function captureSnapshot() {
    try { DRAW_SNAPSHOT = canvas.toDataURL('image/png'); } catch(e) {}
  }

  // Mouse
  canvas.addEventListener('mousedown', function(e){ DRAW_STATE.painting=true; ensureCanvasReady(); drawPoint(e); });
  canvas.addEventListener('mousemove', function(e){ if(DRAW_STATE.painting) drawPoint(e); });
  canvas.addEventListener('mouseup',   function(){ DRAW_STATE.painting=false; DRAW_CTX.beginPath(); captureSnapshot(); });
  canvas.addEventListener('mouseleave',function(){ if(DRAW_STATE.painting){ DRAW_STATE.painting=false; DRAW_CTX.beginPath(); captureSnapshot(); } });
  // Touch
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); DRAW_STATE.painting=true; ensureCanvasReady(); drawPointTouch(e); }, { passive:false });
  canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); if(DRAW_STATE.painting) drawPointTouch(e); }, { passive:false });
  canvas.addEventListener('touchend',   function(){ DRAW_STATE.painting=false; DRAW_CTX.beginPath(); captureSnapshot(); });
}

// If the canvas was initialised before layout (width=0), reinitialise it in place,
// restoring any snapshot already captured.
function ensureCanvasReady() {
  if (!DRAW_CANVAS || DRAW_CANVAS.width > 0) return;
  var dpr = window.devicePixelRatio || 1;
  var w = DRAW_CANVAS.parentElement.offsetWidth
       || DRAW_CANVAS.parentElement.clientWidth
       || Math.round(window.innerWidth * 0.85)
       || 640;
  DRAW_CANVAS.width  = Math.round(w * dpr);
  DRAW_CANVAS.height = Math.round(220 * dpr);
  DRAW_CANVAS.style.width  = w + 'px';
  DRAW_CANVAS.style.height = '220px';
  DRAW_CTX = DRAW_CANVAS.getContext('2d');
  DRAW_CTX.fillStyle = '#ffffff';
  DRAW_CTX.fillRect(0, 0, DRAW_CANVAS.width, DRAW_CANVAS.height);
  DRAW_CTX.scale(dpr, dpr);
  DRAW_CTX.lineCap = 'round';
  DRAW_CTX.lineJoin = 'round';
}

function getPos(e, canvas) {
  var r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function drawPoint(e) {
  if (!DRAW_CTX) return;
  var pos = getPos(e, DRAW_CANVAS);
  if (DRAW_STATE.mode === 'erase') {
    DRAW_CTX.globalCompositeOperation = 'destination-out';
    DRAW_CTX.lineWidth = 18;
  } else {
    DRAW_CTX.globalCompositeOperation = 'source-over';
    DRAW_CTX.strokeStyle = DRAW_STATE.color;
    DRAW_CTX.lineWidth = DRAW_STATE.size;
  }
  DRAW_CTX.lineTo(pos.x, pos.y);
  DRAW_CTX.stroke();
  DRAW_CTX.beginPath();
  DRAW_CTX.moveTo(pos.x, pos.y);
}
function drawPointTouch(e) {
  if (!DRAW_CTX) return;
  var touch = e.touches[0];
  var r = DRAW_CANVAS.getBoundingClientRect();
  var pos = { x: touch.clientX - r.left, y: touch.clientY - r.top };
  if (DRAW_STATE.mode === 'erase') {
    DRAW_CTX.globalCompositeOperation = 'destination-out';
    DRAW_CTX.lineWidth = 18;
  } else {
    DRAW_CTX.globalCompositeOperation = 'source-over';
    DRAW_CTX.strokeStyle = DRAW_STATE.color;
    DRAW_CTX.lineWidth = DRAW_STATE.size;
  }
  DRAW_CTX.lineTo(pos.x, pos.y);
  DRAW_CTX.stroke();
  DRAW_CTX.beginPath();
  DRAW_CTX.moveTo(pos.x, pos.y);
}
function setDrawColor(hex, dotEl) {
  DRAW_STATE.color = hex; DRAW_STATE.mode = 'draw';
  document.querySelectorAll('#drawActivity .cdot').forEach(function(d){ d.classList.remove('sel'); });
  if (dotEl) dotEl.classList.add('sel');
  document.getElementById('drawModeBtn').classList.add('on');
  document.getElementById('eraseModeBtn').classList.remove('on');
  if (DRAW_CTX) DRAW_CTX.globalCompositeOperation = 'source-over';
}
function setDrawMode(m) {
  DRAW_STATE.mode = m;
  document.getElementById('drawModeBtn').classList.toggle('on', m==='draw');
  document.getElementById('eraseModeBtn').classList.toggle('on', m==='erase');
}
function clearDrawCanvas() {
  if (!DRAW_CTX || !DRAW_CANVAS) return;
  DRAW_CTX.globalCompositeOperation = 'source-over';
  DRAW_CTX.fillStyle = '#ffffff';
  DRAW_CTX.fillRect(0, 0, DRAW_CANVAS.width, DRAW_CANVAS.height);
}
function switchDrawTab(which, tabEl) {
  document.querySelectorAll('#drawActivity .drawact-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('#drawActivity .drawact-panel').forEach(function(p){ p.classList.remove('active'); });
  tabEl.classList.add('active');
  document.getElementById(which === 'draw' ? 'drawPanel' : 'textPanel').classList.add('active');
}
function submitDrawActivity() {
  // Capture the canvas image at the moment of submission
  if (DRAW_CANVAS && DRAW_CANVAS.width > 0) {
    try { DRAW_SNAPSHOT = DRAW_CANVAS.toDataURL('image/png'); } catch(e) {}
  }
  var done = document.getElementById('drawDone');
  if (done) { done.classList.add('show'); }
  var btn = document.querySelector('#drawActivity .drawact-submit');
  if (btn) { btn.style.display = 'none'; }
}

/* ================================================
   buildLesson — interleaved structure (Rule 1)
   ================================================ */
function buildLesson(rng) {
  document.getElementById('lessonBody').innerHTML = '';
  problems = [];
  answeredCount = 0; correctCount = 0;

  // Concept 1 → guided example → Problem 1
  renderConceptSection(SECTIONS.s1);
  addProblem(PROB_DEFS[0], rng);

  // Concept 2 → guided example → Drawing activity → Problem 2
  renderConceptSection(SECTIONS.s2);
  renderDrawingActivity();
  addProblem(PROB_DEFS[1], rng);

  // Concept 3 → guided example → matching widget → Problem 3
  renderConceptSection(SECTIONS.s3);
  renderMatchingWidget(rng);
  addProblem(PROB_DEFS[2], rng);

  // Concept 4 → guided example → classification widget → Problem 4
  renderConceptSection(SECTIONS.s4);
  renderClassificationWidget(rng);
  addProblem(PROB_DEFS[3], rng);

  // Final assessment — no preceding explanation, 6 problems
  appendSection(
    '<div class="stag">' + FINAL_TAG[LANG] + '</div>' +
    '<h2>' + FINAL_TITLE[LANG] + '</h2>' +
    FINAL_BODY[LANG]
  );
  addProblem(PROB_DEFS[4], rng);
  addProblem(PROB_DEFS[5], rng);
  addProblem(PROB_DEFS[6], rng);
  addProblem(PROB_DEFS[7], rng);
  addProblem(PROB_DEFS[8], rng);
  addProblem(PROB_DEFS[9], rng);

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}
