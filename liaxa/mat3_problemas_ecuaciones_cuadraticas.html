<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problemas con Ecuaciones Cuadráticas — Matemáticas 3°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #1a3a6b;
  --green-dark: #0f2244;
  --green-bg:   #e8edf5;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border)}
.wlogos img{height:50px;width:auto;object-fit:contain}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text)}
#restoreBar strong{color:var(--gold)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}
.lang-toggle{display:inline-flex;align-items:stretch;flex-shrink:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface,transparent)}
.lang-btn{background:none;border:none;border-radius:0;padding:.22rem .55rem;font-size:.72rem;cursor:pointer;color:var(--text3);font-weight:600;transition:all .14s;line-height:1.4}
.lang-btn+.lang-btn{border-left:1px solid var(--border)}
.lang-btn.active{background:var(--green);color:#fff}
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}
.math-line{font-family:'IBM Plex Mono',monospace;background:var(--surface2);border-radius:8px;padding:.7rem 1rem;margin:.5rem 0;font-size:.95rem;color:var(--green-dark);display:block}
.steps-list{list-style:none;counter-reset:step;margin:1rem 0}
.steps-list li{counter-increment:step;display:flex;gap:.9rem;margin-bottom:.9rem;align-items:flex-start}
.steps-list li::before{content:counter(step);flex-shrink:0;width:26px;height:26px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;margin-top:.15rem}
/* Model builder widget */
.widget-box{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.3rem;margin:1rem 0}
.widget-title{font-size:.8rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.9rem}
.model-row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin:.7rem 0;font-family:'IBM Plex Mono',monospace;font-size:.9rem}
.model-blank{border:none;border-bottom:2px solid var(--green);background:transparent;width:3rem;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--text);padding:.1rem .2rem}
.model-blank:focus{outline:none;border-bottom-color:var(--gold)}
.model-blank.ok{border-bottom-color:var(--ok);color:var(--ok)}
.model-blank.bad{border-bottom-color:var(--bad);color:var(--bad)}
.check-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.55rem 1.3rem;font-size:.88rem;font-weight:600;cursor:pointer;margin-top:.7rem}
.check-btn:hover{background:var(--green-dark)}
.wfeedback{font-size:.88rem;padding:.55rem .9rem;border-radius:8px;margin-top:.6rem;display:none}
.wfeedback.ok{background:var(--ok-bg);color:var(--ok);display:block}
.wfeedback.bad{background:var(--bad-bg);color:var(--bad);display:block}
/* Problem step card */
.step-card{background:var(--green-bg);border-radius:10px;padding:.9rem 1rem;margin:.6rem 0;border-left:3px solid var(--green)}
.step-card .step-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green-dark);margin-bottom:.3rem}
/* Problem cards */
.pcard{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:1.5rem 1.4rem;margin-bottom:1.6rem}
.pcard-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.pnum{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0}
.ptitle{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600}
.ptext{color:var(--text2);margin-bottom:1rem;font-size:.95rem}
.mcopt{display:block;width:100%;text-align:left;padding:.7rem 1rem;margin:.35rem 0;border:1.5px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--text);cursor:pointer;font-size:.9rem;font-family:inherit;transition:border-color .14s,background .14s}
.mcopt:hover{border-color:var(--green)}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);color:var(--text)}
.mcopt.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);font-weight:600}
.mcopt.wrong{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.pfeedback{padding:.6rem .9rem;border-radius:8px;font-size:.85rem;margin-top:.6rem;display:none}
.pfeedback.show{display:block}
.pfeedback.ok{background:var(--ok-bg);color:var(--ok)}
.pfeedback.bad{background:var(--bad-bg);color:var(--bad)}
.hint-btn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:7px;padding:.28rem .7rem;font-size:.78rem;cursor:pointer;margin-top:.6rem;transition:background .14s}
.hint-btn:hover{background:var(--gold-bg)}
.hint-text{display:none;font-size:.82rem;color:var(--text3);background:var(--gold-bg);border-radius:8px;padding:.6rem .9rem;margin-top:.5rem}
.hint-text.show{display:block}
.work-tabs{display:flex;gap:.4rem;margin-top:.9rem}
.wtab{background:none;border:1px solid var(--border);border-radius:6px 6px 0 0;padding:.28rem .7rem;font-size:.78rem;cursor:pointer;color:var(--text3);transition:all .14s}
.wtab.active{background:var(--surface2);border-bottom-color:var(--surface2);color:var(--text);font-weight:600}
.warea{border:1px solid var(--border);border-radius:0 8px 8px 8px;background:var(--surface2);padding:.7rem;min-height:80px}
canvas.dc{width:100%;height:120px;display:block;cursor:crosshair;border-radius:6px;touch-action:none}
.cvwrap{position:relative;background:var(--surface)}
.cv-toolbar{display:flex;gap:.4rem;padding:.3rem;border-bottom:1px solid var(--border);background:var(--surface);border-radius:6px 6px 0 0}
.cv-clr{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.cv-clr.sel{border-color:var(--green);transform:scale(1.25)}
.cv-clear{margin-left:auto;font-size:.7rem;padding:.15rem .45rem;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;color:var(--text3)}
textarea.ta{width:100%;min-height:80px;border:none;background:transparent;resize:vertical;font-family:inherit;font-size:.9rem;color:var(--text)}
textarea.ta:focus{outline:none}
.photo-area{display:flex;align-items:center;justify-content:center;padding:1rem}
.photo-btn{border:2px dashed var(--border);border-radius:10px;padding:1rem 1.5rem;background:none;cursor:pointer;color:var(--text3);font-size:.85rem}
img.pp{max-width:100%;border-radius:6px;margin-top:.4rem;display:none}
#resultScreen{display:none;max-width:600px;margin:0 auto;padding:2rem 1.2rem}
.res-card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2rem;text-align:center}
.res-score{font-family:'Crimson Pro',serif;font-size:3.5rem;font-weight:700;color:var(--green)}
.res-label{font-size:.85rem;color:var(--text3);margin-bottom:1.2rem}
.res-msg{font-size:1rem;color:var(--text2);margin-bottom:1.5rem}
.dl-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.85rem 2rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%}
.dl-btn:hover{background:var(--green-dark)}
@media(max-width:600px){
  .stickybar{flex-wrap:wrap;gap:.4rem;padding:.45rem .8rem}
  .htitle{font-size:.85rem}
  .lbody{padding:1.2rem .8rem 3rem}
  .model-row{font-size:.82rem}
}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wTitle">Problemas con Ecuaciones Cuadráticas</div>
    <div class="wcourse" id="wCourse">Matemáticas · 3° Secundaria</div>
    <label class="flabel" for="sName" id="lblName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" for="sGroup" id="lblGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" onclick="startLesson()" id="startBtn">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Sesión guardada encontrada</strong><br>
      <span id="restoreMsg">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" onclick="restoreSession()" id="btnRetomar">Retomar sesión</button>
        <button class="rbtn rbtn-no"  onclick="dismissRestore()" id="btnNuevo">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px}.lbl{stroke:var(--gold);stroke-width:2.5}.lba{fill:var(--gold)}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos"><img id="hlogo-left" src="" alt="" style="display:none"></div>
    <span class="htitle" id="hTitle">Problemas con Ec. Cuadráticas</span>
    <div class="halexis"></div>
    <span class="hchip" id="hChip">Mat 3°</span>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnES" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
</div>

<!-- RESULT -->
<div id="resultScreen">
  <div class="res-card">
    <div class="res-score" id="resScore">—</div>
    <div class="res-label" id="resLabel">de 10 preguntas correctas</div>
    <div class="res-msg" id="resMsg"></div>
    <button class="dl-btn" onclick="generatePDF()" id="dlBtn">⬇ Descargar PDF</button>
  </div>
</div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

/* ── RNG ── */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function strToSeed(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; }
  return h;
}
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

  var key = SCHOOL.filePrefix+'__sess__'+n+'__'+g;
  document.getElementById('restoreBar').style.display = localStorage.getItem(key) ? 'block' : 'none';
}
function restoreSession() {
  var n = (document.getElementById('sName').value||'').trim();
  var g = (document.getElementById('sGroup').value||'').trim();
  SESSION_KEY = SCHOOL.filePrefix+'__sess__'+n+'__'+g;
  var saved = JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  startLesson(true);
  if (saved && saved.problems) {
    saved.problems.forEach(function(sp,i){ if(problems[i]){ problems[i].studentChoice=sp.studentChoice; problems[i].locked=sp.locked; } });
    rebuildLesson(); updateProgress();
  }
}
function dismissRestore() {
  var n=(document.getElementById('sName').value||'').trim();
  var g=(document.getElementById('sGroup').value||'').trim();
  localStorage.removeItem(SCHOOL.filePrefix+'__sess__'+n+'__'+g);
  document.getElementById('restoreBar').style.display='none';
}

var problems = [];
var RNG;
var studentName='', studentGroup='';

/* ── Start ── */
function startLesson(isRestore) {
  studentName  = (document.getElementById('sName').value||'').trim();
  studentGroup = (document.getElementById('sGroup').value||'').trim();
  if (!studentName || !studentGroup) {
    document.getElementById('startErr').textContent = TX[LANG].name+' y '+TX[LANG].group+' son requeridos.';
    return;
  }
  if (!isRestore) {
    nextAttempt();
    SESSION_KEY = SCHOOL.filePrefix+'__sess__'+studentName+'__'+studentGroup;
  }
  var seed = strToSeed(studentName + studentGroup + currentAttempt());
  RNG = mulberry32(seed);
  buildProblems();
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  rebuildLesson();
  updateProgress();
  setTimeout(revealSections, 80);
}

/* ══════════════════════════════════════════════════════
   PROBLEMS — seeded, real quadratic applications
   ══════════════════════════════════════════════════════ */
function buildProblems() {
  problems = [];
  var r = RNG;

  /* Helper: pick variant */
  function pick(arr) { return arr[Math.floor(r() * arr.length)]; }

  /*
   * PROBLEM 1 — Identify the quadratic model
   * Three scenarios; student identifies which equation models the situation.
   */
  var p1v = pick([
    { q_es: 'El área de un rectángulo es 24 m². Su largo es 2 m más que su ancho. Si el ancho es x, ¿qué ecuación modela este problema?',
      q_en: 'A rectangle has an area of 24 m². Its length is 2 m more than its width. If the width is x, which equation models this problem?',
      opts_es: ['x(x + 2) = 24', 'x + (x+2) = 24', '2x + 2(x+2) = 24', 'x² = 24'],
      opts_en: ['x(x + 2) = 24', 'x + (x+2) = 24', '2x + 2(x+2) = 24', 'x² = 24'],
      correct: 'x(x + 2) = 24',
      fb_es: 'Correcto. Área = largo × ancho = (x+2)(x) = 24. Al expandir: x² + 2x − 24 = 0.',
      fb_en: 'Correct. Area = length × width = (x+2)(x) = 24. Expanding: x² + 2x − 24 = 0.',
      hint_es: 'Área de rectángulo = largo × ancho. Expresa largo en función de x.',

/* ── MC ── */
function handleMC(idx, choice) {
  var p = problems[idx];
  if (p.locked) return;
  var L = LANG;
  var d = p.data;
  var correctOpt = d['correct_'+L] || d['correct_es'] || d['correct'];
  if (p.studentChoice === choice) {
    p.studentChoice = choice;
    p.locked = true;
    var isCorrect = (choice === correctOpt);
    document.querySelectorAll('#pcard'+idx+' .mcopt').forEach(function(b){
      b.disabled = true;
      b.classList.remove('pending');
      if (b.textContent.trim() === correctOpt) b.classList.add('correct');
      if (b.textContent.trim() === choice && !isCorrect) b.classList.add('wrong');
    });
    var fb = document.getElementById('pfb'+idx);
    fb.className = 'pfeedback show '+(isCorrect?'ok':'bad');
    fb.textContent = (isCorrect?TX[L].correct+' ':TX[L].incorrect+' ') + (d['fb_'+L]||d['fb_es']||'');
    saveSession();
    updateProgress();
  } else {
    p.studentChoice = choice;
    document.querySelectorAll('#pcard'+idx+' .mcopt').forEach(function(b){
      b.classList.remove('pending');
      if (b.textContent.trim() === choice) b.classList.add('pending');
    });
  }
}

function restoreCardVisual(idx) {
  var p = problems[idx]; var d = p.data; var L = LANG;
  var correctOpt = d['correct_'+L]||d['correct_es']||d['correct'];
  if (!p.locked) return;
  document.querySelectorAll('#pcard'+idx+' .mcopt').forEach(function(b){
    b.disabled = true;
    b.classList.remove('pending');
    if (b.textContent.trim() === correctOpt) b.classList.add('correct');
    if (b.textContent.trim() === p.studentChoice && p.studentChoice !== correctOpt) b.classList.add('wrong');
  });
  var fb = document.getElementById('pfb'+idx);
  if(fb){ fb.className='pfeedback show '+(p.studentChoice===correctOpt?'ok':'bad');
    fb.textContent=(p.studentChoice===correctOpt?TX[L].correct+' ':TX[L].incorrect+' ')+(d['fb_'+L]||d['fb_es']||''); }
}

var _canvases = {};
function initCanvas(idx) {
  if(_canvases[idx]) return;
  var c=document.getElementById('canvas'+idx); if(!c) return;
  var dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr; c.height=c.offsetHeight*dpr;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,c.width,c.height); ctx.scale(dpr,dpr);
  var state={drawing:false,color:'#1a3a6b',lw:2};
  function pos(e){ var r=c.getBoundingClientRect(),sc=c.offsetWidth/r.width;
    if(e.touches) return {x:(e.touches[0].clientX-r.left)*sc,y:(e.touches[0].clientY-r.top)*sc};
    return {x:(e.clientX-r.left)*sc,y:(e.clientY-r.top)*sc}; }
  c.addEventListener('mousedown',  function(e){ state.drawing=true; ctx.beginPath(); var p=pos(e); ctx.moveTo(p.x,p.y); });
  c.addEventListener('mousemove',  function(e){ if(!state.drawing)return; var p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle=state.color; ctx.lineWidth=state.lw; ctx.lineCap='round'; ctx.stroke(); });
  c.addEventListener('mouseup',    function(){ state.drawing=false; });
  c.addEventListener('mouseleave', function(){ state.drawing=false; });
  c.addEventListener('touchstart', function(e){ e.preventDefault(); state.drawing=true; ctx.beginPath(); var p=pos(e); ctx.moveTo(p.x,p.y); },{passive:false});
  c.addEventListener('touchmove',  function(e){ e.preventDefault(); if(!state.drawing)return; var p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle=state.color; ctx.lineWidth=state.lw; ctx.lineCap='round'; ctx.stroke(); },{passive:false});
  c.addEventListener('touchend',   function(){ state.drawing=false; });
  _canvases[idx]={ctx:ctx,state:state};
}
function setColor(idx,c){ if(_canvases[idx]) _canvases[idx].state.color=c; var card=document.getElementById('pcard'+idx); if(card) card.querySelectorAll('.cv-clr').forEach(function(el){ el.classList.toggle('sel',el.style.background===c); }); }
function clearCanvas(idx){ var cv=_canvases[idx]; if(!cv) return; var c=document.getElementById('canvas'+idx); cv.ctx.fillStyle='#ffffff'; cv.ctx.fillRect(0,0,c.width,c.height); }
function showPhoto(idx,input){ if(!input.files||!input.files[0]) return; var img=document.getElementById('photo'+idx); if(img){ img.src=URL.createObjectURL(input.files[0]); img.style.display='block'; } }

function mkSection(tagClass,tagText,titleText){
  var s=document.createElement('div'); s.className='section';
  s.innerHTML='<div class="'+tagClass+'">'+tagText+'</div><h2>'+titleText+'</h2>'; return s;

function observeSections(){
  var obs=new IntersectionObserver(function(entries){ entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('vis'); }); },{threshold:0.1});
  document.querySelectorAll('.section').forEach(function(s){ obs.observe(s); });
}
function revealSections(){ document.querySelectorAll('.section').forEach(function(s,i){ setTimeout(function(){ s.classList.add('vis'); },i*60); }); }

  var msgs={
    es:['¡Sobresaliente! Dominas el modelado con ecuaciones cuadráticas.','¡Muy bien! Tienes una sólida comprensión de estos problemas.','Buen esfuerzo. Practica los pasos de modelado y la interpretación de raíces.','Revisa los pasos para plantear y resolver ecuaciones cuadráticas en contexto.'],
    en:['Outstanding! You master modeling with quadratic equations.','Very good! You have a solid understanding of these problems.','Good effort. Practice the modeling steps and interpretation of roots.','Review the steps for setting up and solving quadratic equations in context.']
  };
  var m=msgs[LANG]; var msg=score>=9?m[0]:score>=7?m[1]:score>=5?m[2]:m[3];
  document.getElementById('resMsg').textContent=msg;
}

/* ── PDF ── */
function generatePDF(){
  var btn=document.getElementById('dlBtn'); btn.disabled=true; btn.textContent=LANG==='es'?'Generando…':'Generating…';
  try{
    var doc=new window.jspdf.jsPDF({unit:'mm',format:'a4'});
    var pBR=SCHOOL.pBR,pBG=SCHOOL.pBG,pBB=SCHOOL.pBB,pAR=SCHOOL.pAR,pAG=SCHOOL.pAG,pAB=SCHOOL.pAB;
    var PW=210,M=14;
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,8,'F');
    doc.setFillColor(255,255,255);  doc.rect(0,8,PW,14,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,22,PW,4,'F');
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,26,PW,271,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.text(SCHOOL.guideTitle,M,35);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text(SCHOOL.courseName,M,42);
    doc.text((LANG==='es'?'Estudiante: ':'Student: ')+studentName+'   '+(LANG==='es'?'Grupo: ':'Group: ')+studentGroup,M,49);
    var score=problems.filter(function(p){ var d=p.data,L=LANG; return p.locked&&p.studentChoice===(d['correct_'+L]||d['correct_es']||d['correct']); }).length;
    doc.text((LANG==='es'?'Resultado: ':'Result: ')+score+'/10',M,56);
    var y=68; doc.setFontSize(9); doc.setTextColor(220,220,210);
    problems.forEach(function(p,i){
      if(y>270){ doc.addPage(); y=20; doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,297,'F'); doc.setTextColor(220,220,210); doc.setFontSize(9); }
      var d=p.data,L=LANG;
      var status=!p.locked?'○':(p.studentChoice===(d['correct_'+L]||d['correct_es']||d['correct']))?'✓':'✗';
      doc.text((i+1)+'. '+status+' '+(d['q_'+L]||d['q_es']).substring(0,80),M,y,{maxWidth:PW-2*M}); y+=10;
    });
    doc.save(SCHOOL.filePrefix+'_'+studentName.replace(/\s+/g,'_')+'.pdf');
  }catch(e){ console.error(e); alert(LANG==='es'?'Error al generar PDF.':'Error generating PDF.'); }
  btn.disabled=false; btn.textContent=TX[LANG].download;
}
