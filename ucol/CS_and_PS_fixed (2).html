<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excedente del Consumidor y Productor — Facultad de Economía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
</style>
</head>

/* ================================================

   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o) { o.classList.add('dis'); });
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   buildLesson — Excedentes del Consumidor y Productor
   ================================================ */
function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');

  /* ── helpers ── */
  function r2(lo, hi) { return Math.round((lo + rng() * (hi - lo)) * 100) / 100; }
  function ri(lo, hi) { return Math.floor(rng() * (hi - lo + 1)) + lo; }
  function fmt(n) { return n % 1 === 0 ? n.toString() : n.toFixed(2); }
  function fmtMX(n) { return '$' + (n % 1 === 0 ? n.toString() : n.toFixed(2)); }

  function shuffleOpts(opts, correct, rng) {
    // Deduplicate: replace duplicate distractors with offset values
    var seen = {};
    var arr = opts.slice();
    for (var i = 0; i < arr.length; i++) {
      var v = arr[i];
      if (seen[v]) {
        // parse numeric value and nudge it
        var num = parseFloat(v.replace(/[^0-9.-]/g,''));
        var nudge = Math.round((num * 0.15 + 1.5) * 100) / 100;
        var newV = v.replace(/[0-9]+\.?[0-9]*/,
          function(m){ return (parseFloat(m) + nudge).toFixed(2); });
        arr[i] = newV;
      }
      seen[arr[i]] = true;
    }
    // Fisher-Yates shuffle
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return { opts: arr, correctIdx: arr.indexOf(correct) };
  }

    questionText: `En un mercado competitivo, el Excedente del Consumidor es $${jEC} y el Excedente del Productor es $${jEP}. ¿Cuál es el Bienestar Total (Excedente Total) del mercado?`,
    fn: 'BT = EC + EP',
    options: s9r.opts,
    correctIdx: s9r.correctIdx,
    hint: `El Bienestar Total o Excedente Total es simplemente la suma del EC y el EP.`,
    explanation: `BT = EC + EP = $${jEC} + $${jEP} = <strong>$${jBT}</strong>. En un mercado perfectamente competitivo, este es el máximo bienestar posible.`,
    studentChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════════
     INIT VISUALIZADORES
     ════════════════════════════════════════════════ */
  // ── Store globals used by all 5 drawing functions ──

  _int_b_val = int_b; _int_a_val = int_a; _int_pm_val = int_pm;
  _ints_a_val = ints_a; _ints_b_val = ints_b; _ints_pm_val = ints_pm;
  // Vis 2: fixed reference price, demand intercept, slope
  _ec2_pfix   = ec2_p0;

  _ec2_slope  = ec2_a;                        // inverse demand slope
  // Vis 4: fixed reference price, supply slope

  setTimeout(function() {

/* ════════════════════════════════════════════════
   DRAWING FUNCTIONS  (all 5 visualizers)
   ════════════════════════════════════════════════ */

/* ── shared helpers ── */
function _prepCanvas(id, W, H) {
  var cv = document.getElementById(id); if (!cv) return null;
  var dpr = window.devicePixelRatio || 1;
  cv.width = W * dpr; cv.height = H * dpr;
  var ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  return ctx;
}
function _axes(ctx, pad, W, H) {
  var dw = W-pad.l-pad.r, dh = H-pad.t-pad.b;
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+dh); ctx.lineTo(pad.l+dw,pad.t+dh);
  ctx.stroke();
  ctx.fillStyle='#777'; ctx.font='11px IBM Plex Sans,sans-serif';
  ctx.textAlign='center'; ctx.fillText('Q',pad.l+dw+12,pad.t+dh+4);
  ctx.textAlign='right';  ctx.fillText('P',pad.l-5,pad.t+8);
}

/* ══════════════════════════════════════════════
   VIS 1 — EC estático
   Demand: P = Pmáx − (Pmáx/20)·Q  (fixed scale Q∈[0,20])
   Q* = 20·(Pmáx−P*)/Pmáx  (derived, no slider)
   ═════════════════════════════════════════════= */
function drawEC1(pmax, pmkt) {
  var W=620, H=260, pad={l:66,r:24,t:28,b:44};
  var ctx=_prepCanvas('cv_ec1',W,H); if(!ctx) return;
  var dw=W-pad.l-pad.r, dh=H-pad.t-pad.b;
  if(pmkt>=pmax) pmkt=pmax-1;

  var QMAX=20; // fixed domain
  var qstar = QMAX*(pmax-pmkt)/pmax;
  var maxP=pmax*1.18, maxQ=QMAX*1.15;

  function px(q){return pad.l+(q/maxQ)*dw;}
  function py(p){return pad.t+dh-(p/maxP)*dh;}

  _axes(ctx,pad,W,H);

  /* EC triangle — vertices ON the demand line */
  ctx.beginPath();
  ctx.moveTo(px(0),py(pmax));
  ctx.lineTo(px(qstar),py(pmkt));
  ctx.lineTo(px(0),py(pmkt));
  ctx.closePath();
  ctx.fillStyle='rgba(74,124,63,0.28)'; ctx.fill();
  ctx.strokeStyle='rgba(74,124,63,0.55)'; ctx.lineWidth=1; ctx.stroke();

  /* demand line: (0,pmax) → (QMAX,0) */
  ctx.strokeStyle='#1d4e89'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(px(0),py(pmax)); ctx.lineTo(px(QMAX),py(0)); ctx.stroke();

  /* dashed lines */
  ctx.setLineDash([4,3]);
  ctx.strokeStyle='#8b2500'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px(0),py(pmkt)); ctx.lineTo(px(qstar),py(pmkt)); ctx.stroke();
  ctx.strokeStyle='#666'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(px(qstar),py(pmkt)); ctx.lineTo(px(qstar),py(0)); ctx.stroke();
  ctx.setLineDash([]);

  /* labels */
  ctx.font='bold 11px IBM Plex Sans,sans-serif';
  ctx.fillStyle='#444'; ctx.textAlign='right'; ctx.fillText('Pmáx=$'+pmax,px(0)-5,py(pmax)+4);
  ctx.fillStyle='#8b2500'; ctx.textAlign='right'; ctx.fillText('P*=$'+pmkt,px(0)-5,py(pmkt)-5);
  ctx.fillStyle='#1d4e89'; ctx.textAlign='left'; ctx.fillText('Demanda',px(QMAX*0.5)+4,py(pmax*0.5)+14);
  ctx.fillStyle='#2d5a27'; ctx.font='bold 13px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText('EC',px(qstar*0.2),py(pmkt+(pmax-pmkt)*0.45));
  ctx.fillStyle='#666'; ctx.font='10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText('Q*='+qstar.toFixed(1),px(qstar),py(0)+16);

  /* metrics */
  var ec=Math.round(0.5*(pmax-pmkt)*qstar*100)/100;
  document.getElementById('m_pmax').textContent='$'+pmax;
  document.getElementById('m_pmkt').textContent='$'+pmkt;
  document.getElementById('m_q').textContent=qstar.toFixed(1);
  document.getElementById('m_ec').textContent='$'+ec;
}

function updateEC1(){
  var pm=+document.getElementById('sl_pmax').value;
  var pk=+document.getElementById('sl_pmkt').value;
  if(pk>=pm) pk=pm-1;
  document.getElementById('cv_pmax').textContent=pm;
  document.getElementById('cv_pmkt').textContent=pk;
  drawEC1(pm,pk);
}

/* ══════════════════════════════════════════════
   VIS 2 — EC con cambio de precio
   Demand: P = Pmax_d − slope_d·Q  (fixed, from seed)
   _ec2_pfix = fixed reference price
   _ec2_pmax_d, _ec2_slope stored at init
   Student moves ONE price slider → gain/loss shading
   ═════════════════════════════════════════════= */
function drawEC2(pmove) {
  var W=620, H=260, pad={l:66,r:24,t:28,b:44};
  var ctx=_prepCanvas('cv_ec2',W,H); if(!ctx) return;
  var dw=W-pad.l-pad.r, dh=H-pad.t-pad.b;

  var pfix=_ec2_pfix, Pd=_ec2_pmax_d, sl=_ec2_slope;
  function qOf(p){return Math.max(0,(Pd-p)/sl);}
  var qfix=qOf(pfix), qmov=qOf(pmove);
  var maxP=Pd*1.14, maxQ=qOf(0)*1.15;

  function px(q){return pad.l+(q/maxQ)*dw;}
  function py(p){return pad.t+dh-(p/maxP)*dh;}

  _axes(ctx,pad,W,H);

  var up=(pmove>pfix);
  if(up){
    /* original EC faded */
    ctx.beginPath(); ctx.moveTo(px(0),py(Pd)); ctx.lineTo(px(qfix),py(pfix)); ctx.lineTo(px(0),py(pfix)); ctx.closePath();
    ctx.fillStyle='rgba(74,124,63,0.10)'; ctx.fill();
    /* remaining EC */
    ctx.beginPath(); ctx.moveTo(px(0),py(Pd)); ctx.lineTo(px(qmov),py(pmove)); ctx.lineTo(px(0),py(pmove)); ctx.closePath();
    ctx.fillStyle='rgba(74,124,63,0.36)'; ctx.fill();
    ctx.strokeStyle='rgba(74,124,63,0.65)'; ctx.lineWidth=1; ctx.stroke();
    /* lost area */
    ctx.beginPath();
    ctx.moveTo(px(0),py(pfix)); ctx.lineTo(px(qfix),py(pfix));
    ctx.lineTo(px(qmov),py(pmove)); ctx.lineTo(px(0),py(pmove)); ctx.closePath();
    ctx.fillStyle='rgba(139,37,0,0.22)'; ctx.fill();
    ctx.strokeStyle='rgba(139,37,0,0.5)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(139,37,0,0.85)'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('▼ Pérdida EC',px((qfix+qmov)*0.22),py((pfix+pmove)/2)+4);
  } else {
    /* original EC */
    ctx.beginPath(); ctx.moveTo(px(0),py(Pd)); ctx.lineTo(px(qfix),py(pfix)); ctx.lineTo(px(0),py(pfix)); ctx.closePath();
    ctx.fillStyle='rgba(74,124,63,0.35)'; ctx.fill();
    ctx.strokeStyle='rgba(74,124,63,0.65)'; ctx.lineWidth=1; ctx.stroke();
    /* gained area */
    ctx.beginPath();
    ctx.moveTo(px(0),py(pfix)); ctx.lineTo(px(qfix),py(pfix));
    ctx.lineTo(px(qmov),py(pmove)); ctx.lineTo(px(0),py(pmove)); ctx.closePath();
    ctx.fillStyle='rgba(29,78,137,0.22)'; ctx.fill();
    ctx.strokeStyle='rgba(29,78,137,0.5)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(29,78,137,0.9)'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('▲ Ganancia EC',px((qfix+qmov)*0.22),py((pfix+pmove)/2)+4);
  }

  /* demand line */
  ctx.strokeStyle='#1d4e89'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(px(0),py(Pd)); ctx.lineTo(px(qOf(0)),py(0)); ctx.stroke();

  /* P_ref dashed */
  ctx.setLineDash([4,3]); ctx.strokeStyle='#777'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(px(0),py(pfix)); ctx.lineTo(px(qfix),py(pfix)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(qfix),py(pfix)); ctx.lineTo(px(qfix),py(0)); ctx.stroke();
  ctx.setLineDash([]);

  /* P_move solid */
  ctx.strokeStyle=up?'#8b2500':'#1d4e89'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px(0),py(pmove)); ctx.lineTo(px(qmov),py(pmove)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(qmov),py(pmove)); ctx.lineTo(px(qmov),py(0)); ctx.stroke();

  ctx.font='bold 10px IBM Plex Sans,sans-serif';
  ctx.fillStyle='#555'; ctx.textAlign='right'; ctx.fillText('P₀=$'+pfix,px(0)-5,py(pfix)-5);
  ctx.fillStyle=up?'#8b2500':'#1d4e89'; ctx.textAlign='right'; ctx.fillText('P=$'+pmove,px(0)-5,py(pmove)+13);
  ctx.fillStyle='#555'; ctx.font='10px IBM Plex Sans,sans-serif';
  ctx.textAlign='center'; ctx.fillText('Q₀='+qfix.toFixed(1),px(qfix),py(0)+16);
  if(Math.abs(qmov-qfix)>0.4) ctx.fillText('Q='+qmov.toFixed(1),px(qmov),py(0)+28);
  ctx.fillStyle='#2d5a27'; ctx.font='bold 11px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText('EC',px(qmov*0.15),py(pmove+(Pd-pmove)*0.45));

  var ec0=Math.round(0.5*qfix*(Pd-pfix)*100)/100;
  var ec1=Math.round(0.5*qmov*(Pd-pmove)*100)/100;
  var dec=Math.round((ec0-ec1)*100)/100;
  document.getElementById('m2_ec0').textContent='$'+ec0;
  document.getElementById('m2_ec1').textContent='$'+ec1;
  document.getElementById('m2_dec').textContent='$'+Math.abs(dec);
  document.getElementById('m2_dir').textContent=dec>0?'▼ Pérdida':'▲ Ganancia';
  document.getElementById('cv2_p1').textContent=pmove;
}

function updateEC2(){
  var p=+document.getElementById('sl2_p1').value;
  document.getElementById('cv2_p1').textContent=p;
  drawEC2(p);
}

/* ══════════════════════════════════════════════
   VIS 3 — EP estático
   Supply: P = Pmin + slope·Q  (slope = (35-Pmin)/20)
   Q* derived from Pmín and P*
   ═════════════════════════════════════════════= */
function drawEP1(pmin, pmkt) {
  var W=620, H=260, pad={l:66,r:24,t:28,b:44};
  var ctx=_prepCanvas('cv_ep1',W,H); if(!ctx) return;
  var dw=W-pad.l-pad.r, dh=H-pad.t-pad.b;
  if(pmkt<=pmin) pmkt=pmin+1;

  var QMAX=20;
  var slope=(35-pmin)/QMAX; // supply slope — consistent scale
  var qstar=(pmkt-pmin)/slope;
  var maxP=35*1.12, maxQ=QMAX*1.15;

  function px(q){return pad.l+(q/maxQ)*dw;}
  function py(p){return pad.t+dh-(p/maxP)*dh;}

  _axes(ctx,pad,W,H);

  /* EP triangle — vertices ON the supply line */
  ctx.beginPath();
  ctx.moveTo(px(0),py(pmin));
  ctx.lineTo(px(qstar),py(pmkt));
  ctx.lineTo(px(0),py(pmkt));
  ctx.closePath();
  ctx.fillStyle='rgba(201,168,76,0.30)'; ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.65)'; ctx.lineWidth=1; ctx.stroke();

  /* supply line from (0,pmin) to (QMAX, pmin+slope*QMAX) */
  ctx.strokeStyle='#8b2500'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(px(0),py(pmin)); ctx.lineTo(px(QMAX),py(pmin+slope*QMAX)); ctx.stroke();

  /* dashed lines */
  ctx.setLineDash([4,3]);
  ctx.strokeStyle='#1d4e89'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px(0),py(pmkt)); ctx.lineTo(px(qstar),py(pmkt)); ctx.stroke();
  ctx.strokeStyle='#666'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(px(qstar),py(pmkt)); ctx.lineTo(px(qstar),py(0)); ctx.stroke();
  ctx.setLineDash([]);

  ctx.font='bold 11px IBM Plex Sans,sans-serif';
  ctx.fillStyle='#444'; ctx.textAlign='right'; ctx.fillText('Pmín=$'+pmin,px(0)-5,py(pmin)+4);
  ctx.fillStyle='#1d4e89'; ctx.textAlign='right'; ctx.fillText('P*=$'+pmkt,px(0)-5,py(pmkt)-5);
  ctx.fillStyle='#8b2500'; ctx.textAlign='left'; ctx.fillText('Oferta',px(QMAX*0.5)+4,py(pmin+slope*QMAX*0.5)-6);
  ctx.fillStyle='#c9a84c'; ctx.font='bold 13px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText('EP',px(qstar*0.2),py(pmin+(pmkt-pmin)*0.5));
  ctx.fillStyle='#666'; ctx.font='10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText('Q*='+qstar.toFixed(1),px(qstar),py(0)+16);

  var ep=Math.round(0.5*(pmkt-pmin)*qstar*100)/100;
  document.getElementById('m3_pmin').textContent='$'+pmin;
  document.getElementById('m3_pmkt').textContent='$'+pmkt;
  document.getElementById('m3_q').textContent=qstar.toFixed(1);
  document.getElementById('m3_ep').textContent='$'+ep;
}

function updateEP1(){
  var pm=+document.getElementById('sl3_pmin').value;
  var pk=+document.getElementById('sl3_pmkt').value;
  if(pk<=pm) pk=pm+1;
  document.getElementById('cv3_pmin').textContent=pm;
  document.getElementById('cv3_pmkt').textContent=pk;
  drawEP1(pm,pk);
}

/* ══════════════════════════════════════════════
   VIS 4 — EP con cambio de precio
   Supply: P = slope·Q  (through origin, slope = _ep2_slope)
   _ep2_pfix = fixed reference price
   ═════════════════════════════════════════════= */
function drawEP2(pmove) {
  var W=620, H=260, pad={l:66,r:24,t:28,b:44};
  var ctx=_prepCanvas('cv_ep2',W,H); if(!ctx) return;
  var dw=W-pad.l-pad.r, dh=H-pad.t-pad.b;

  var pfix=_ep2_pfix, sl=_ep2_slope;
  function qOf(p){return p/sl;}
  var qfix=qOf(pfix), qmov=qOf(pmove);
  var maxP=Math.max(pfix,pmove)*1.4, maxQ=qOf(maxP)*1.12;

  function px(q){return pad.l+(q/maxQ)*dw;}
  function py(p){return pad.t+dh-(p/maxP)*dh;}

  _axes(ctx,pad,W,H);

  var up=(pmove>pfix);
  if(up){
    /* original EP faded */
    ctx.beginPath(); ctx.moveTo(px(0),py(0)); ctx.lineTo(px(qfix),py(pfix)); ctx.lineTo(px(0),py(pfix)); ctx.closePath();
    ctx.fillStyle='rgba(201,168,76,0.14)'; ctx.fill();
    /* new larger EP */
    ctx.beginPath(); ctx.moveTo(px(0),py(0)); ctx.lineTo(px(qmov),py(pmove)); ctx.lineTo(px(0),py(pmove)); ctx.closePath();
    ctx.fillStyle='rgba(201,168,76,0.34)'; ctx.fill();
    ctx.strokeStyle='rgba(201,168,76,0.7)'; ctx.lineWidth=1; ctx.stroke();
    /* gained area */
    ctx.beginPath();
    ctx.moveTo(px(0),py(pfix)); ctx.lineTo(px(qfix),py(pfix));
    ctx.lineTo(px(qmov),py(pmove)); ctx.lineTo(px(0),py(pmove)); ctx.closePath();
    ctx.fillStyle='rgba(45,106,79,0.28)'; ctx.fill();
    ctx.strokeStyle='rgba(45,106,79,0.6)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(45,106,79,0.9)'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('▲ Ganancia EP',px((qfix+qmov)*0.22),py((pfix+pmove)/2)+4);
  } else {
    /* original EP faded */
    ctx.beginPath(); ctx.moveTo(px(0),py(0)); ctx.lineTo(px(qfix),py(pfix)); ctx.lineTo(px(0),py(pfix)); ctx.closePath();
    ctx.fillStyle='rgba(201,168,76,0.12)'; ctx.fill();
    /* new smaller EP */
    ctx.beginPath(); ctx.moveTo(px(0),py(0)); ctx.lineTo(px(qmov),py(pmove)); ctx.lineTo(px(0),py(pmove)); ctx.closePath();
    ctx.fillStyle='rgba(201,168,76,0.36)'; ctx.fill();
    ctx.strokeStyle='rgba(201,168,76,0.7)'; ctx.lineWidth=1; ctx.stroke();
    /* lost area */
    ctx.beginPath();
    ctx.moveTo(px(0),py(pmove)); ctx.lineTo(px(qmov),py(pmove));
    ctx.lineTo(px(qfix),py(pfix)); ctx.lineTo(px(0),py(pfix)); ctx.closePath();
    ctx.fillStyle='rgba(139,37,0,0.22)'; ctx.fill();
    ctx.strokeStyle='rgba(139,37,0,0.5)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(139,37,0,0.85)'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('▼ Pérdida EP',px((qfix+qmov)*0.22),py((pfix+pmove)/2)+4);
  }

  /* supply line */
  ctx.strokeStyle='#8b2500'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(px(0),py(0)); ctx.lineTo(px(maxQ),py(sl*maxQ)); ctx.stroke();

  /* P_ref dashed */
  ctx.setLineDash([4,3]); ctx.strokeStyle='#777'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(px(0),py(pfix)); ctx.lineTo(px(qfix),py(pfix)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(qfix),py(pfix)); ctx.lineTo(px(qfix),py(0)); ctx.stroke();
  ctx.setLineDash([]);

  /* P_move solid */
  ctx.strokeStyle=up?'#2d6a4f':'#8b2500'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px(0),py(pmove)); ctx.lineTo(px(qmov),py(pmove)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(qmov),py(pmove)); ctx.lineTo(px(qmov),py(0)); ctx.stroke();

  ctx.font='bold 10px IBM Plex Sans,sans-serif';
  ctx.fillStyle='#555'; ctx.textAlign='right'; ctx.fillText('P₀=$'+pfix,px(0)-5,py(pfix)-5);
  ctx.fillStyle=up?'#2d6a4f':'#8b2500'; ctx.textAlign='right'; ctx.fillText('P=$'+pmove,px(0)-5,py(pmove)+13);
  ctx.fillStyle='#555'; ctx.font='10px IBM Plex Sans,sans-serif';
  ctx.textAlign='center'; ctx.fillText('Q₀='+qfix.toFixed(1),px(qfix),py(0)+16);
  if(Math.abs(qmov-qfix)>0.4) ctx.fillText('Q='+qmov.toFixed(1),px(qmov),py(0)+28);
  ctx.fillStyle='#c9a84c'; ctx.font='bold 11px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText('EP',px(qmov*0.15),py(pmove*0.42));

  var ep0=Math.round(0.5*qfix*pfix*100)/100;
  var ep1=Math.round(0.5*qmov*pmove*100)/100;
  var dep=Math.round((ep1-ep0)*100)/100;
  document.getElementById('m4_ep0').textContent='$'+ep0;
  document.getElementById('m4_ep1').textContent='$'+ep1;
  document.getElementById('m4_dep').textContent='$'+Math.abs(dep);
  document.getElementById('m4_dir').textContent=dep>=0?'▲ Ganancia':'▼ Pérdida';
  document.getElementById('cv4_p1').textContent=pmove;
}

function updateEP2(){
  var p=+document.getElementById('sl4_p1').value;
  document.getElementById('cv4_p1').textContent=p;
  drawEP2(p);
}

/* ══════════════════════════════════════════════
   VIS 5 — Integral con curvas CUADRÁTICAS
   Demand: P = b - a·Q², Q* = √((b-P*)/a)
   Supply: P = b + a·Q², Q* = √((P*-b)/a)
   Price slider moves P* -> area and limits update live
   ═════════════════════════════════════════════= */
var _intMode = 'demand';
/* globals set in buildLesson init: _int_b_val, _int_a_val, _int_pm_val, _ints_a_val, _ints_pm_val, _ints_b_val */
var _int_b_val=0, _int_a_val=0, _int_pm_val=0, _ints_a_val=0, _ints_b_val=0, _ints_pm_val=0;
var _ec2_pfix=0, _ec2_pmax_d=0, _ec2_slope=1, _ep2_pfix=0, _ep2_slope=1;

function setIntMode(mode, btn){
  _intMode=mode;
  document.querySelectorAll('.mtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var curP=+document.getElementById('sl5_pm').value;
  drawInt(mode, curP);
}

function updateInt(){
  var p=+document.getElementById('sl5_pm').value;
  document.getElementById('cv5_pm').textContent=p;
  drawInt(_intMode, p);
}

function drawInt(mode, pmVal){
  var W=620, H=290, pad={l:66,r:24,t:28,b:50};
  var ctx=_prepCanvas('cv_int',W,H); if(!ctx) return;
  var dw=W-pad.l-pad.r, dh=H-pad.t-pad.b;
  var intEl=document.getElementById('int_formula');

  _axes(ctx,pad,W,H);

  if(mode==='demand'){
    var b=_int_b_val||36, a=_int_a_val||2;
    var pm=(pmVal!==undefined)?pmVal:(_int_pm_val||12);
    if(pm>=b) pm=b-1; if(pm<1) pm=1;
    /* Q* = √((b-pm)/a) */
    var qstar=Math.sqrt((b-pm)/a);
    var qmax=Math.sqrt(b/a); // where P=0
    var maxP=b*1.12, maxQ=qmax*1.18;

    function px(q){return pad.l+(q/maxQ)*dw;}
    function py(p){return pad.t+dh-(p/maxP)*dh;}

    /* shaded area under demand curve down to P* (the integral EC) */
    ctx.beginPath();
    ctx.moveTo(px(0),py(b));
    for(var i=0;i<=100;i++){
      var q=qstar*i/100;
      ctx.lineTo(px(q),py(b-a*q*q));
    }
    ctx.lineTo(px(qstar),py(pm));
    ctx.lineTo(px(0),py(pm));
    ctx.closePath();
    ctx.fillStyle='rgba(74,124,63,0.28)'; ctx.fill();
    ctx.strokeStyle='rgba(74,124,63,0.5)'; ctx.lineWidth=1; ctx.stroke();

    /* full quadratic demand curve */
    ctx.strokeStyle='#1d4e89'; ctx.lineWidth=2.5;
    ctx.beginPath();
    for(var i=0;i<=120;i++){
      var q=qmax*i/120; var p=b-a*q*q;
      if(i===0) ctx.moveTo(px(q),py(p)); else ctx.lineTo(px(q),py(p));
    }
    ctx.stroke();

    /* P* horizontal line (solid, moves with slider) */
    ctx.strokeStyle='#8b2500'; ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(px(0),py(pm)); ctx.lineTo(px(qstar),py(pm)); ctx.stroke();

    /* Q* vertical dashed */
    ctx.strokeStyle='#666'; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(px(qstar),py(pm)); ctx.lineTo(px(qstar),py(0)); ctx.stroke();
    ctx.setLineDash([]);

    /* integration bracket on x-axis: shows limits 0 to Q* */
    var bY=py(0)+18;
    ctx.strokeStyle='#2d5a27'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px(0),bY-6); ctx.lineTo(px(0),bY+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(qstar),bY-6); ctx.lineTo(px(qstar),bY+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(0),bY); ctx.lineTo(px(qstar),bY); ctx.stroke();
    /* arrowhead at right */
    ctx.beginPath(); ctx.moveTo(px(qstar),bY); ctx.lineTo(px(qstar)-6,bY-4); ctx.moveTo(px(qstar),bY); ctx.lineTo(px(qstar)-6,bY+4); ctx.stroke();

    /* labels */
    ctx.font='bold 11px IBM Plex Sans,sans-serif';
    ctx.fillStyle='#444'; ctx.textAlign='right'; ctx.fillText('b='+b,px(0)-5,py(b)+4);
    ctx.fillStyle='#8b2500'; ctx.textAlign='right'; ctx.fillText('P*=$'+pm,px(0)-5,py(pm)-5);
    ctx.fillStyle='#666'; ctx.font='10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('0',px(0),py(0)+14); ctx.fillText('Q*='+qstar.toFixed(2),px(qstar),py(0)+14);
    ctx.fillStyle='#2d5a27'; ctx.font='10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('límites de integración',px(qstar/2),bY+12);
    ctx.fillStyle='#1d4e89'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='left';
    ctx.fillText('P='+b+'−'+a+'Q²',px(qmax*0.48)+4,py(b-a*(qmax*0.48)*(qmax*0.48))-8);
    ctx.fillStyle='#2d5a27'; ctx.font='bold 11px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('EC',px(qstar*0.35),py(pm+(b-pm)*0.42));

    /* CORRECTED: EC = ∫₀^Q* (b - a·q² - pm) dq = (b-pm)·Q* - (a/3)·Q*³ */
    var ec=Math.round(((b-pm)*qstar - (a/3)*Math.pow(qstar,3))*100)/100;
    document.getElementById('m5_pm').textContent='$'+pm;
    document.getElementById('m5_qm').textContent=qstar.toFixed(2);
    document.getElementById('m5_surp').textContent='$'+ec;
    document.getElementById('cv5_pm').textContent=pm;
    if(intEl) intEl.innerHTML=
      'EC = ∫₀<sup>'+qstar.toFixed(2)+'</sup> ('+b+' − '+a+'q² − '+pm+') dq = ['+
      '('+b+'−'+pm+')q − ('+a+'/3)q³]₀<sup>'+qstar.toFixed(2)+'</sup> = '+
      '('+b+'−'+pm+')×'+qstar.toFixed(2)+' − ('+a+'/3)×'+qstar.toFixed(2)+'³ = <strong>$'+ec+'</strong>';

  } else {
    // SUPPLY mode: P = bs + as·Q²  (with intercept)  Q* = √((P*-bs)/as)
    var as=_ints_a_val||2;
    var bs=_ints_b_val||3;
    var pm_s=(pmVal!==undefined)?pmVal:(_ints_pm_val||18);
    if(pm_s<=bs) pm_s=bs+1;
    var qs=Math.sqrt((pm_s-bs)/as);
    var qmax_s=Math.sqrt((35-bs)/as)*1.12;
    var maxP_s=pm_s*1.45, maxQ_s=qmax_s*1.15;

    function px(q){return pad.l+(q/maxQ_s)*dw;}
    function py(p){return pad.t+dh-(p/maxP_s)*dh;}

    /* EP area = ∫₀^Q* (P* − (bs+as·q²)) dq  shaded between P* and supply curve */
    ctx.beginPath();
    ctx.moveTo(px(0),py(pm_s));
    for(var i=0;i<=100;i++){
      var q=qs*i/100;
      ctx.lineTo(px(q),py(pm_s));
    }
    for(var i=100;i>=0;i--){
      var q=qs*i/100;
      ctx.lineTo(px(q),py(bs+as*q*q));
    }
    ctx.closePath();
    ctx.fillStyle='rgba(201,168,76,0.28)'; ctx.fill();
    ctx.strokeStyle='rgba(201,168,76,0.55)'; ctx.lineWidth=1; ctx.stroke();

    /* full quadratic supply curve */
    ctx.strokeStyle='#8b2500'; ctx.lineWidth=2.5;
    ctx.beginPath();
    for(var i=0;i<=120;i++){
      var q=qmax_s*i/120; var p=bs+as*q*q;
      if(i===0) ctx.moveTo(px(q),py(p)); else ctx.lineTo(px(q),py(p));
    }
    ctx.stroke();

    /* P* solid */
    ctx.strokeStyle='#1d4e89'; ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(px(0),py(pm_s)); ctx.lineTo(px(qs),py(pm_s)); ctx.stroke();
    ctx.strokeStyle='#666'; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(px(qs),py(pm_s)); ctx.lineTo(px(qs),py(0)); ctx.stroke();
    ctx.setLineDash([]);

    /* bracket */
    var bY=py(0)+18;
    ctx.strokeStyle='#c9a84c'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px(0),bY-6); ctx.lineTo(px(0),bY+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(qs),bY-6); ctx.lineTo(px(qs),bY+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(0),bY); ctx.lineTo(px(qs),bY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(qs),bY); ctx.lineTo(px(qs)-6,bY-4); ctx.moveTo(px(qs),bY); ctx.lineTo(px(qs)-6,bY+4); ctx.stroke();

    ctx.fillStyle='#1d4e89'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='right';
    ctx.fillText('P*=$'+pm_s,px(0)-5,py(pm_s)-5);
    ctx.fillStyle='#666'; ctx.font='10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('0',px(0),py(0)+14); ctx.fillText('Q*='+qs.toFixed(2),px(qs),py(0)+14);
    ctx.fillStyle='#c9a84c'; ctx.font='10px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('límites de integración',px(qs/2),bY+12);
    ctx.fillStyle='#8b2500'; ctx.font='bold 10px IBM Plex Sans,sans-serif'; ctx.textAlign='left';
    ctx.fillText('P='+bs+'+'+as+'Q²',px(qs*0.55)+4,py(bs+as*(qs*0.55)*(qs*0.55))-8);
    ctx.fillStyle='#c9a84c'; ctx.font='bold 11px IBM Plex Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('EP',px(qs*0.3),py((pm_s+bs)/2));

    /* CORRECTED: EP = ∫₀^Q* (pm_s - (bs+as·q²)) dq = (pm_s-bs)·Q* - (as/3)·Q*³ */
    var ep=Math.round(((pm_s-bs)*qs - (as/3)*Math.pow(qs,3))*100)/100;
    document.getElementById('m5_pm').textContent='$'+pm_s;
    document.getElementById('m5_qm').textContent=qs.toFixed(2);
    document.getElementById('m5_surp').textContent='$'+ep;
    document.getElementById('cv5_pm').textContent=pm_s;
    if(intEl) intEl.innerHTML=
      'EP = ∫₀<sup>'+qs.toFixed(2)+'</sup> ($'+pm_s+' − ('+bs+'+'+as+'q²)) dq = ['+
      '('+(pm_s-bs)+')q − ('+as+'/3)q³]₀<sup>'+qs.toFixed(2)+'</sup> = '+
      '('+(pm_s-bs)+')×'+qs.toFixed(2)+' − ('+as+'/3)×'+qs.toFixed(2)+'³ = <strong>$'+ep+'</strong>';
  }
}

</script>
</body>
