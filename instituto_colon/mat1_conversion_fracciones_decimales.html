<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fracciones a Decimales — Matemáticas 1°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #1a4a8a;
  --green-dark: #0f2d5c;
  --green-bg:   #eaf0f8;
  --gold:       #e87722;
  --gold-bg:    #fef3ea;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #7592b8;
  --green-dark: #97adca;
  --green-bg:   #030b14;
  --gold:       #f0a66f;
  --gold-bg:    #221105;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--green-bg); border:1.5px solid var(--green); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--green-dark); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}
</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left"  src="" alt="Institución" style="display:none">
      <div class="wlogsep" id="wlogsep" style="display:none"></div>
      <img id="logo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wt-title">Fracciones a Decimales</div>
    <div class="wcourse" id="wt-course">Matemáticas · 1° Secundaria</div>
    <label class="flabel" for="sName" id="lbl-name-el">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" for="sGroup" id="lbl-group-el">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Sesión guardada encontrada</strong><br>
      <span id="restoreBody">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Retomar sesión</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lbt { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.1em; fill:var(--green); font-size:28px; }
          .lbl { stroke:var(--gold); stroke-width:2.5; }
          .lba { fill:var(--gold); }
        </style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="#1a4a8a" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle" id="ht-title">Fracciones a Decimales</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lht { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
          .lhl { stroke:var(--gold); stroke-width:2; }
          .lha { fill:var(--gold); }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="#1a4a8a" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;Descargar Resultados PDF</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   SCHOOL CONFIG — edit ONLY this block to rebrand for a different school
   ════════════════════════════════════════════════════════════════════════ */
var SCHOOL = {
  primary:         '#0c246c',
  primaryDark:     '#07184c',
  primaryBg:       '#e6eaf7',
  accent:          '#8484b4',
  accentBg:        '#e9e9f1',
  pBR: 12,  pBG: 36,  pBB: 108,
  pAR: 132,  pAG: 132,  pAB: 180,
  darkPrimary:     '#385ed1',
  darkPrimaryDark: '#6a8bf0',
  darkPrimaryBg:   '#08153e',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

function t(k) { return (TX[LANG] && TX[LANG][k]) || (TX.es[k] || k); }
function setLang(l) {
  LANG = l;
  try { localStorage.setItem(LANG_KEY, l); } catch(e) {}
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.documentElement.setAttribute('lang', l);
  applyUIStrings();
  // Rebuild lesson in new language if already running (answers preserved via confirmMC)
  if (studentData.name && document.getElementById('lessonScreen').style.display !== 'none') {
    var prevChoices = problems.map(function(p) { return p.studentChoice; });
    problems = [];
    document.getElementById('lessonBody').innerHTML = '';
    document.getElementById('s_results').style.display = 'none';
    document.getElementById('s_results').classList.remove('vis');
    var att = currentAttempt(studentData.name, studentData.group);
    var rng = seededRng(studentData.name + studentData.group + att);
    answeredCount = 0; correctCount = 0;
    buildLesson(rng);
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
    }, { threshold: 0.05 });
    document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
    prevChoices.forEach(function(choice, idx) {
      if (choice !== null && choice !== undefined) confirmMC(idx, choice);
    });
    if (answeredCount === problems.length && problems.length > 0) {
      document.getElementById('s_results').style.display = 'block';
      setTimeout(function() { document.getElementById('s_results').classList.add('vis'); }, 50);
    }
  }
}

var studentData   = {};
var problems      = [];
var answeredCount = 0;
var correctCount  = 0;

/* ── SESSION PERSISTENCE ── */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'mat1_fracdec_01__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = 'mat1_fracdec_01__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  if (!name || !group) { document.getElementById('restoreBar').style.display = 'none'; return; }
  var saved = loadSession(name, group);
  var bar = document.getElementById('restoreBar');
  bar.style.display = (saved && saved.choices && saved.choices.some(function(c){ return c !== null; })) ? 'block' : 'none';
}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }

/* ── ATTEMPT COUNTER (Rule 3) ── */
function getAttemptKey(name, group) {
  return 'mat1_fracdec_01__att__' + (name + '__' + group).replace(/\s+/g, '_');
}
function nextAttempt(name, group) {
  var k = getAttemptKey(name, group);
  var n = 0;
  try { n = parseInt(localStorage.getItem(k) || '0', 10) || 0; } catch(e) {}
  n++;
  try { localStorage.setItem(k, String(n)); } catch(e) {}
  return n;
}
function currentAttempt(name, group) {
  var k = getAttemptKey(name, group);
  try { return parseInt(localStorage.getItem(k) || '1', 10) || 1; } catch(e) { return 1; }
}

/* ── SEEDED RNG ── */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}
function term(coef, varName) {
  if (coef === 0) return '';
  var sign = coef > 0 ? ' + ' : ' \u2212 ';
  var abs  = Math.abs(coef);
  return sign + (abs === 1 && varName ? '' : abs) + (varName || '');
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = SCHOOL.primaryDark;
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── ANSWER HANDLER (Rule 8: two-tap) ── */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>' + t('fb-correct') + '</strong> ' : '<strong>' + t('fb-wrong') + '</strong> ') + (prob.explanation || '');
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx; prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>' + t('fb-correct') + '</strong> ' : '<strong>' + t('fb-wrong') + '</strong> ') + (prob.explanation || '');
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ── LONG DIVISION SVG — step-by-step, parametric n ÷ d ── */
/*
  Supported fractions (2-step long division, clean result):
  1/4=0.25, 3/4=0.75, 1/8=0.125(*3 steps), 3/8=0.375(*3 steps)
  1/5=0.2,  2/5=0.4,  3/5=0.6,  4/5=0.8  (1 step)
  Best for this layout: 2-step fractions → 1/4, 3/4, 3/8 (use 3/4 as default)
  We'll handle 1-step (denom 5) and 2-step (denom 4,8) automatically.
*/
function buildLongDivSVG(n, d, lang) {
  var isEn  = lang === 'en';
  var s1lbl = isEn ? 'Step 1' : 'Paso 1';
  var s2lbl = isEn ? 'Step 2' : 'Paso 2';
  var s3lbl = isEn ? 'Step 3' : 'Paso 3';
  var resLbl = isEn ? 'Result' : 'Resultado';

  // Pre-compute division steps for common clean fractions
  // result = n/d as a decimal string, computed via long division steps
  var result = (n / d);
  var resultStr = result % 1 === 0 ? result.toString() : result.toPrecision(6).replace(/\.?0+$/, '');

  // Build step data: each step = {dividend, divisor(always d), quotientDigit, product, remainder}
  var steps = [];
  var remainder = n;
  var quotientParts = []; // digits of quotient after "0."
  // Long division: keep dividing until remainder=0 (max 4 steps)
  var integer_part = Math.floor(n / d);
  remainder = n - integer_part * d;
  var maxSteps = 4;
  var iter = 0;
  while (remainder !== 0 && iter < maxSteps) {
    var newDividend = remainder * 10;
    var q = Math.floor(newDividend / d);
    var prod = q * d;
    var newRem = newDividend - prod;
    steps.push({ divd: newDividend, q: q, prod: prod, rem: newRem });
    remainder = newRem;
    iter++;
  }
  // Build decimal string: integer_part + "." + quotient digits
  var decStr = integer_part + '.' + steps.map(function(s){ return s.q; }).join('');

  // Panel layout: each panel is 162px wide, total viewBox width depends on step count
  var numSteps = Math.min(steps.length, 3);
  var panW = 162;
  var panGap = 8;
  var svgW = numSteps * panW + (numSteps - 1) * panGap + 16;
  var svgH = 210;

  // Step description texts
  function stepDesc(i) {
    var s = steps[i];
    var prev = (i === 0) ? n : steps[i-1].rem;
    var newDiv = prev + (i===0 ? '.0…' : '↓0') ;
    if (isEn) {
      return s.divd + ' ÷ ' + d + ' = ' + s.q + ', rem ' + s.rem;
    } else {
      return s.divd + ' ÷ ' + d + ' = ' + s.q + ', res ' + s.rem;
    }
  }

  function panel(panelIdx) {
    var step = steps[panelIdx];
    if (!step) return '';
    var px = 8 + panelIdx * (panW + panGap);
    var out = [];
    var bgColors = ['#fff8ee','#fff0f0','#eef6ff','#edfff0'];
    var bgStrokes = ['#e8c070','#f0b0a0','#90b8e0','#70c090'];
    var quotColors = ['#c0392b','#1a4a8a','#2d6a4f','#8b2500'];

    // ── Panel box ──
    out.push('<rect x="' + px + '" y="8" width="' + panW + '" height="' + (svgH-16) + '" rx="8" fill="' + bgColors[panelIdx] + '" stroke="' + bgStrokes[panelIdx] + '" stroke-width="1.3"/>');

    // ── Step label as a header strip at the top of the panel ──
    out.push('<rect x="' + px + '" y="8" width="' + panW + '" height="22" rx="8" fill="' + bgStrokes[panelIdx] + '" opacity=".18"/>');
    var stepLabels = [s1lbl, s2lbl, s3lbl];
    out.push('<text x="' + (px + panW/2) + '" y="23" text-anchor="middle" font-size="11" font-weight="700" fill="#333" font-family="IBM Plex Sans,sans-serif">' + stepLabels[panelIdx] + '</text>');

    // ── Division bracket — starts below the header strip ──
    var bx = px + 44;  // left edge of bracket vertical line
    var dy = 60;        // y of dividend baseline

    // Divisor
    out.push('<text x="' + (bx - 22) + '" y="' + dy + '" font-size="18" fill="#e87722" font-weight="700">' + d + '</text>');
    // Bracket lines
    out.push('<line x1="' + bx + '" y1="' + (dy-16) + '" x2="' + bx + '" y2="' + (dy+4) + '" stroke="#555" stroke-width="2"/>');
    out.push('<line x1="' + bx + '" y1="' + (dy-16) + '" x2="' + (bx+100) + '" y2="' + (dy-16) + '" stroke="#555" stroke-width="2"/>');

    // Dividend (n with .00…)
    out.push('<text x="' + (bx+8) + '" y="' + dy + '" font-size="18" fill="#1a1a16" font-weight="700">' + n + '</text>');
    out.push('<text x="' + (bx + (n >= 10 ? 24 : 18)) + '" y="' + dy + '" font-size="18" fill="#999">' + (n >= 10 ? '.' : '.') + '0'.repeat(numSteps) + '</text>');

    // Quotient: integer_part + "." + digits revealed so far
    var qStr = integer_part + '.';
    for (var k = 0; k <= panelIdx; k++) {
      qStr += steps[k] ? steps[k].q : '';
    }
    // colour the new digit in the current step
    var qBase = integer_part + '.';
    for (var k = 0; k < panelIdx; k++) qBase += steps[k] ? steps[k].q : '';
    var newDigit = step.q;
    out.push('<text x="' + (bx+8) + '" y="' + (dy-19) + '" font-size="15" fill="#2d6a4f" font-weight="700">' + qBase + '</text>');
    // x offset: approximate width of each char ~9px
    var qBaseW = qBase.length * 9;
    out.push('<text x="' + (bx + 8 + qBaseW) + '" y="' + (dy-19) + '" font-size="15" fill="' + quotColors[panelIdx] + '" font-weight="700">' + newDigit + '</text>');

    // ── Subtraction rows ──
    var r1y = dy + 20;  // "× d = prod" line
    var r2y = dy + 36;  // underline
    var r3y = dy + 52;  // remainder
    var r4y = dy + 68;  // "↓0" + new dividend (if more steps)

    // The current dividend
    out.push('<text x="' + (bx+8) + '" y="' + r1y + '" font-size="14" fill="#555">' + step.divd + '</text>');
    out.push('<text x="' + (bx+8) + '" y="' + (r1y+16) + '" font-size="14" fill="' + quotColors[panelIdx] + '">−' + step.prod + '</text>');
    out.push('<line x1="' + (bx+6) + '" y1="' + (r1y+20) + '" x2="' + (bx+62) + '" y2="' + (r1y+20) + '" stroke="' + quotColors[panelIdx] + '" stroke-width="1.5"/>');
    // Remainder
    var remColor = step.rem === 0 ? '#2d6a4f' : '#c0392b';
    out.push('<text x="' + (bx+8) + '" y="' + r3y + '" font-size="14" font-weight="700" fill="' + remColor + '">' + step.rem + (step.rem===0 ? ' ✓' : '') + '</text>');
    // If not last step, show bring-down arrow
    if (step.rem !== 0 && panelIdx < numSteps - 1) {
      out.push('<text x="' + (bx + 28) + '" y="' + (r3y - 2) + '" font-size="11" fill="#e87722">↓0</text>');
    }

    // ── Step description at bottom ──
    out.push('<text x="' + (px + panW/2) + '" y="' + (svgH - 20) + '" text-anchor="middle" font-size="9" fill="#555" font-family="IBM Plex Sans,sans-serif">' + stepDesc(panelIdx) + '</text>');

    return out.join('');
  }

  var parts = [
    '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:' + svgW + 'px;display:block;margin:.5rem auto;font-family:IBM Plex Mono,monospace">'
  ];
  for (var i = 0; i < numSteps; i++) parts.push(panel(i));
  // Result banner
  parts.push('<text x="' + (svgW/2) + '" y="' + (svgH - 4) + '" text-anchor="middle" font-size="10" font-weight="700" fill="#2d6a4f" font-family="IBM Plex Sans,sans-serif">→ ' + resLbl + ': ' + n + ' ÷ ' + d + ' = ' + decStr + '</text>');
  parts.push('</svg>');
  return parts.join('');
}

/* Touch ghost */
var _awG = null;

function awDragStart(e) {
  e.dataTransfer.setData('text/plain', 'arrow');
  e.dataTransfer.effectAllowed = 'move';
}

function awTouchStart(e) {
  e.preventDefault();
  var el = document.getElementById('aw-arrow');
  if (!el) return;
  var rect = el.getBoundingClientRect();
  _awG = el.cloneNode(true);
  _awG.removeAttribute('id');
  _awG.style.cssText = 'position:fixed;pointer-events:none;opacity:.8;z-index:9999;' +
    'left:' + rect.left + 'px;top:' + rect.top + 'px;' +
    'width:' + rect.width + 'px;height:' + rect.height + 'px;color:var(--gold);';
  document.body.appendChild(_awG);
  document.addEventListener('touchmove', _awTM, { passive: false });
  document.addEventListener('touchend',  _awTE);
}
function _awTM(e) {
  e.preventDefault();
  if (!_awG) return;
  var t = e.touches[0];
  _awG.style.left = (t.clientX - 36) + 'px';
  _awG.style.top  = (t.clientY - 15) + 'px';
}
function _awTE(e) {
  document.removeEventListener('touchmove', _awTM);
  document.removeEventListener('touchend', _awTE);
  if (_awG && _awG.parentNode) _awG.parentNode.removeChild(_awG);
  _awG = null;
  var t = e.changedTouches[0];
  function hits(id) {
    var el = document.getElementById(id); if (!el) return false;
    var r = el.getBoundingClientRect();
    return t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom;
  }
  if (hits('aw-zone-top'))      awPlace('top');
  else if (hits('aw-zone-bot')) awPlace('bot');
}

function awDrop(e, zone) { e.preventDefault(); awPlace(zone); }

function awPlace(zone) {
  if (AW.done) return;
  var arrow = document.getElementById('aw-arrow');
  var zT = document.getElementById('aw-zone-top');
  var zB = document.getElementById('aw-zone-bot');
  var home = document.getElementById('aw-home');
  if (!arrow) return;
  // Clear previous zone
  if (AW.placed) {
    var prev = document.getElementById('aw-zone-' + AW.placed);
    if (prev) { prev.innerHTML = ''; prev.style.borderColor = ''; prev.style.background = 'var(--surface2)'; }
  }
  // Place into target zone
  var dest = zone === 'top' ? zT : zB;
  arrow.style.color  = 'var(--gold)';
  arrow.style.cursor = 'grab';
  dest.appendChild(arrow);
  dest.style.borderColor = 'var(--gold)';
  dest.style.background  = 'var(--gold-bg)';
  // Hide hint
  var hint = document.getElementById('aw-hint');
  if (hint) hint.style.opacity = '0';
  AW.placed = zone;
}

function awInit(rng) {
  AW.round = 0; AW.placed = null; AW.score = 0; AW.done = false;
  // Pick 3 rounds from pool using seeded rng so each student/attempt gets different fractions
  var pool = [
    { num: '3',  den: '4',  target: 'top' },
    { num: '7',  den: '10', target: 'bot' },
    { num: '5',  den: '8',  target: 'top' },
    { num: '2',  den: '9',  target: 'bot' },
    { num: '11', den: '3',  target: 'top' },
    { num: '4',  den: '7',  target: 'bot' },
    { num: '1',  den: '6',  target: 'top' },
    { num: '9',  den: '5',  target: 'bot' },
    { num: '6',  den: '11', target: 'top' },
    { num: '8',  den: '3',  target: 'bot' }
  ];
  // Fisher-Yates shuffle first 3 picks
  var chosen = pool.slice();
  for (var i = chosen.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = chosen[i]; chosen[i] = chosen[j]; chosen[j] = tmp;
  }
  AW.rounds = chosen.slice(0, 3);
  awRenderRound();
}

function awRenderRound() {
  var lang = document.documentElement.getAttribute('lang') || 'es';
  var isEn = lang === 'en';
  var r = AW.rounds[AW.round];
  var arrow = document.getElementById('aw-arrow');
  var zT  = document.getElementById('aw-zone-top');
  var zB  = document.getElementById('aw-zone-bot');
  var home = document.getElementById('aw-home');
  var fb  = document.getElementById('aw-fb');
  var lbl = document.getElementById('aw-round-label');
  var qEl = document.getElementById('aw-question');
  if (!lbl) return;
  // Reset zones
  if (zT) { zT.innerHTML = ''; zT.style.borderColor = ''; zT.style.background = 'var(--surface2)'; }
  if (zB) { zB.innerHTML = ''; zB.style.borderColor = ''; zB.style.background = 'var(--surface2)'; }
  // Return arrow home
  if (arrow && home) {
    arrow.style.color  = 'var(--green)';
    arrow.style.cursor = 'grab';
    home.insertBefore(arrow, home.firstChild);
  }
  var hint = document.getElementById('aw-hint');
  if (hint) hint.style.opacity = '1';
  if (fb) fb.style.display = 'none';
  AW.placed = null;
  lbl.textContent = (isEn ? 'Round' : 'Ronda') + ' ' + (AW.round + 1) + ' / 3';
  var tName = r.target === 'top'
    ? (isEn ? '<strong>numerator</strong>'   : '<strong>numerador</strong>')
    : (isEn ? '<strong>denominator</strong>' : '<strong>denominador</strong>');
  qEl.innerHTML = isEn
    ? 'Drag the arrow next to the ' + tName + ':'
    : 'Arrastra la flecha junto al ' + tName + ':';
  var numEl = document.getElementById('aw-num');
  var denEl = document.getElementById('aw-den');
  if (numEl) numEl.textContent = r.num;
  if (denEl) denEl.textContent = r.den;
}

function awVerify() {
  if (AW.done || !AW.placed) return;
  var lang = document.documentElement.getAttribute('lang') || 'es';
  var isEn = lang === 'en';
  var r    = AW.rounds[AW.round];
  var fb   = document.getElementById('aw-fb');
  var arrow = document.getElementById('aw-arrow');
  var isOk = (AW.placed === r.target);
  if (isOk) AW.score++;
  // Colour arrow + zone
  var activeZone  = document.getElementById('aw-zone-' + AW.placed);
  var correctZone = document.getElementById('aw-zone-' + r.target);
  if (arrow) arrow.style.color = isOk ? 'var(--ok)' : 'var(--bad)';
  if (activeZone) { activeZone.style.borderColor = isOk ? 'var(--ok)' : 'var(--bad)'; activeZone.style.background = isOk ? 'var(--ok-bg)' : 'var(--bad-bg)'; }
  if (!isOk && correctZone) { correctZone.style.borderColor = 'var(--ok)'; correctZone.style.background = 'var(--ok-bg)'; }
  // Dot
  var dot = document.getElementById('aw-dot-' + AW.round);
  if (dot) dot.style.background = isOk ? 'var(--ok)' : 'var(--bad)';
  // Feedback
  var numName = isEn ? 'numerator'   : 'numerador';
  var denName = isEn ? 'denominator' : 'denominador';
  var correctName = r.target === 'top' ? numName : denName;
  var placedName  = AW.placed  === 'top' ? numName : denName;
  fb.innerHTML = isOk
    ? '✓ ' + (isEn
        ? 'Correct! <strong>' + r.num + '</strong> is the numerator (top) and <strong>' + r.den + '</strong> is the denominator (bottom).'
        : '¡Correcto! <strong>' + r.num + '</strong> es el numerador (arriba) y <strong>' + r.den + '</strong> es el denominador (abajo).')
    : '✗ ' + (isEn
        ? 'Not quite. You placed the arrow next to the <strong>' + placedName + '</strong>, but the question asked for the <strong>' + correctName + '</strong>.'
        : 'No del todo. Colocaste la flecha junto al <strong>' + placedName + '</strong>, pero se pedía el <strong>' + correctName + '</strong>.');
  fb.style.background = isOk ? 'var(--ok-bg)' : 'var(--bad-bg)';
  fb.style.color      = isOk ? 'var(--ok)'    : 'var(--bad)';
  fb.style.display    = 'block';
  setTimeout(function() {
    AW.round++;
    if (AW.round < 3) { awRenderRound(); }
    else               { awFinish(isEn); }
  }, 1500);
}

function awFinish(isEn) {
  AW.done = true;
  var area   = document.getElementById('aw-area');
  var verify = document.getElementById('aw-verify');
  var lbl    = document.getElementById('aw-round-label');
  var qEl    = document.getElementById('aw-question');
  var fb     = document.getElementById('aw-fb');
  if (area)   area.style.display   = 'none';
  if (verify) verify.style.display = 'none';
  if (lbl)    lbl.textContent      = '';
  if (qEl)    qEl.textContent      = '';
  var emoji = AW.score === 3 ? '🎉' : AW.score === 2 ? '👍' : '💡';
  fb.innerHTML = emoji + ' ' + (isEn
    ? '<strong>' + AW.score + ' / 3 correct.</strong> You can identify the numerator and denominator — great start!'
    : '<strong>' + AW.score + ' / 3 correctas.</strong> ¡Puedes identificar el numerador y el denominador — excelente comienzo!');
  fb.style.background = AW.score >= 2 ? 'var(--ok-bg)'  : 'var(--gold-bg)';
  fb.style.color      = AW.score >= 2 ? 'var(--ok)'     : 'var(--gold)';
  fb.style.display    = 'block';
}

        '⚠️ <strong>Importante — agregar ceros:</strong> Si el numerador tiene <em>menos dígitos</em> que los ceros del denominador, debes agregar ceros a la izquierda del numerador. Por ejemplo: ' + fs(6,100) + ' — el denominador tiene 2 ceros, así que necesitamos 2 cifras decimales, pero 6 es solo 1 dígito, entonces escribimos <strong>0.06</strong> (no 0.6).<br><br>' +

  /* ── Problem 4: power-of-10 denominator (100), includes padding cases ── */
  (function() {
    var lang = LANG;
    // Mix of padding and non-padding cases
    var p4pool = [
      {n:6,  d:100, r:'0.06',  pads:true,  padNote:'6 is only 1 digit → pad: 0.06'},
      {n:3,  d:100, r:'0.03',  pads:true,  padNote:'3 is only 1 digit → pad: 0.03'},
      {n:8,  d:100, r:'0.08',  pads:true,  padNote:'8 is only 1 digit → pad: 0.08'},
      {n:15, d:100, r:'0.15',  pads:false, padNote:''},
      {n:27, d:100, r:'0.27',  pads:false, padNote:''},
      {n:43, d:100, r:'0.43',  pads:false, padNote:''},
      {n:72, d:100, r:'0.72',  pads:false, padNote:''},
      {n:90, d:100, r:'0.90',  pads:false, padNote:''}

    var p4 = p4pool[Math.floor(rng() * p4pool.length)];
    var corr = p4.r.replace(/0+$/, '') || p4.r; // strip trailing zeros except keep at least 1 decimal

    var w2 = (p4.n / 1000).toFixed(3);
    var w3 = p4.n + '.0';

    var sh = shuffleOpts(all4.slice(0,4), corr, rng);

    var padHintEn = p4.pads ? ' Since ' + p4.n + ' is only 1 digit and we need 2 decimal places, add a zero: <strong>' + corr + '</strong>.' : '';
    var padHintEs = p4.pads ? ' Como ' + p4.n + ' tiene solo 1 dígito y necesitamos 2 cifras decimales, agrega un cero: <strong>' + corr + '</strong>.' : '';
    problems.push({
      title:        lang === 'en' ? 'Power-of-10 denominator' : 'Denominador potencia de 10',

        : 'El denominador 100 tiene 2 ceros → el decimal debe tener exactamente 2 cifras decimales. Escribe ' + p4.n + ' y cuenta los dígitos.' + (p4.pads ? ' Pista: ' + p4.n + ' tiene solo 1 dígito, así que necesitarás agregar un cero a la izquierda.' : ''),
      explanation: lang === 'en'
        ? frac + ' = <strong>' + corr + '</strong>. Denominator 100 → 2 decimal places.' + padHintEn
        : frac + ' = <strong>' + corr + '</strong>. Denominador 100 → 2 cifras decimales.' + padHintEs,
      options: sh.opts, correctIdx: sh.correctIdx, studentChoice: null, pendingChoice: null
    });

  /* ── Problem 5: improper fraction > 1 ── */
  (function() {

  /* ── Problem 7: real-world context (food) ── */

  /* ── Problem 8: thousandths — mix of padding and non-padding ── */
  (function() {

    var p8pool = [
      {n:5,   pads:2}, {n:7,   pads:2}, {n:3,   pads:2},  // 3 zeros needed, only 1 digit → pad 2
      {n:12,  pads:1}, {n:45,  pads:1}, {n:80,  pads:1},  // 3 zeros needed, 2 digits → pad 1
      {n:125, pads:0}, {n:375, pads:0}, {n:750, pads:0}   // 3 zeros, 3 digits → no padding
    ];
    var p8 = p8pool[Math.floor(rng() * p8pool.length)];

      ? ' ' + num8 + ' has only ' + String(num8).length + ' digit' + (String(num8).length>1?'s':'') + ' but we need 3 → add ' + p8.pads + ' leading zero' + (p8.pads>1?'s':'') + ': <strong>' + corr + '</strong>.'
      : ' ' + num8 + ' already has 3 digits — no padding needed.';
    var padHintEs = p8.pads > 0
      ? ' ' + num8 + ' tiene solo ' + String(num8).length + ' dígito' + (String(num8).length>1?'s':'') + ' pero necesitamos 3 → agrega ' + p8.pads + ' cero' + (p8.pads>1?'s':'') + ' a la izquierda: <strong>' + corr + '</strong>.'

      options: sh.opts, correctIdx: sh.correctIdx, studentChoice: null, pendingChoice: null
    });
    buildOneCard(problems[problems.length - 1], problems.length - 1);
  })();
