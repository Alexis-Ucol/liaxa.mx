<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oligopolio — Microeconomía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── OLIGOPOLY INTERACTIVE EXTRAS ── */
.sim-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem; margin:1rem 0; }
.sim-box canvas { display:block; max-width:100%; border-radius:8px; background:var(--surface2); }
.sim-controls { display:flex; flex-wrap:wrap; gap:.6rem; margin-bottom:.9rem; align-items:center; }
.sim-controls label { font-size:.76rem; color:var(--text3); display:flex; align-items:center; gap:.4rem; flex-shrink:0; }
.sim-controls input[type=range] { width:110px; accent-color:var(--green); }
.sim-badge { display:inline-flex; align-items:center; justify-content:center; background:var(--green); color:#fff; border-radius:20px; padding:.22rem .75rem; font-size:.78rem; font-weight:600; margin:.2rem .2rem; cursor:pointer; transition:background .14s; }
.sim-badge:hover { background:var(--green-dark); }
.sim-badge.off { background:var(--surface2); color:var(--text3); border:1px solid var(--border); }
.eq-table { width:100%; border-collapse:collapse; margin:.9rem 0; font-size:.84rem; }
.eq-table th { background:var(--green); color:#fff; padding:.5rem .7rem; text-align:left; font-weight:600; }
.eq-table td { padding:.45rem .7rem; border-bottom:1px solid var(--border); color:var(--text2); }
.eq-table tr:last-child td { border:none; }
.eq-table tr:hover td { background:var(--green-bg); }
.payoff-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin:1rem 0; }
.payoff-cell { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; padding:.8rem; text-align:center; cursor:pointer; transition:all .15s; font-size:.84rem; }
.payoff-cell:hover { border-color:var(--green); background:var(--green-bg); }
.payoff-cell.chosen { border-color:var(--ok); background:var(--ok-bg); }
.payoff-cell.nash { border-color:var(--gold); background:var(--gold-bg); }
.payoff-label { font-size:.7rem; color:var(--text3); margin-bottom:.25rem; }
.payoff-val { font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:1.1rem; color:var(--green); }
.payoff-val2 { font-size:.8rem; color:var(--text3); }
.nt { color:var(--text); }
.strategy-pill { display:inline-block; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.2rem .6rem; font-size:.78rem; margin:.2rem; cursor:pointer; transition:all .13s; }
.strategy-pill.active { background:var(--green); color:#fff; border-color:var(--green); }

@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}
</style>
</head>

var problems    = [];
var answeredCount = 0;
var correctCount  = 0;

function lsKey() {
  var n = (studentData.name||'').trim();
  var g = (studentData.group||'').trim();
  return 'oligopolio_ucol__' + (n+'__'+g).replace(/\s+/g,'_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var bl=document.createElement('canvas');bl.width=dc.width;bl.height=dc.height;drawings.push(dc.toDataURL()===bl.toDataURL()?null:dc.toDataURL('image/png'));}else{drawings.push(null);}
    var ta=document.getElementById('ta'+i);texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}
function loadSession(n,g){var key='oligopolio_ucol__'+(n+'__'+g).replace(/\s+/g,'_');try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}}
function checkForSavedSession(){var n=document.getElementById('sName').value.trim();var g=document.getElementById('sGroup').value.trim();if(!n||!g){document.getElementById('restoreBar').style.display='none';return;}var s=loadSession(n,g);document.getElementById('restoreBar').style.display=(s&&s.choices&&s.choices.some(function(c){return c!==null;}))?'block':'none';}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}
function restoreSession(){
  var n=document.getElementById('sName').value.trim();var g=document.getElementById('sGroup').value.trim();
  var saved=loadSession(n,g);if(!saved)return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:n,group:g};answeredCount=0;correctCount=0;
  buildLesson(seededRng(n+g));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=n+' · '+g;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  requestAnimationFrame(function() {
    initCournotSim();
    initStackelbergSim();
  });
  saved.choices.forEach(function(ch,idx){if(ch!==null&&ch!==undefined)confirmMC(idx,ch);});
  setTimeout(function(){
    if(saved.drawings){saved.drawings.forEach(function(d,i){if(!d)return;var dc=document.getElementById('dc'+i);if(!dc||!dc.width)return;var img=new Image();img.onload=function(){var dpr=window.devicePixelRatio||1;dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr);};img.src=d;});}
    if(saved.texts){saved.texts.forEach(function(t,i){if(!t)return;var ta=document.getElementById('ta'+i);if(ta)ta.value=t;});}
    if(saved.photos){saved.photos.forEach(function(d,i){if(!d)return;var pp=document.getElementById('pp'+i);if(!pp)return;pp.src=d;pp.style.display='block';var pz=document.getElementById('pz'+i);if(pz)pz.style.opacity='0.4';});}
  },300);
}

var THEME_KEY='oligopolio_ucol__theme';
function toggleTheme(){var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';try{localStorage.setItem(THEME_KEY,next);}catch(e){}}
(function(){document.documentElement.setAttribute('data-theme','light');try{var t=localStorage.getItem(THEME_KEY);if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('themeBtn');if(b)b.textContent='☀️';});}}catch(e){}})();

function seededRng(seed){var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

function startLesson(){
  var n=document.getElementById('sName').value.trim();
  var g=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!n||!g){err.textContent='Por favor completa ambos campos.';return;}
  err.textContent='';
  studentData={name:n,group:g};answeredCount=0;correctCount=0;
  buildLesson(seededRng(n+g));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=n+' · '+g;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  requestAnimationFrame(function() {
    initCournotSim();
    initStackelbergSim();
  });
}

function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){btn.addEventListener('click',function(){tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';if(btn.classList.contains('bpen')){ctx.lineWidth=2;}if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}});});
  tb.querySelectorAll('.cdot').forEach(function(dot){dot.addEventListener('click',function(){tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');});});
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

function switchTab(idx,panel,btn){var prefix='wp_'+idx+'_';document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){p.classList.remove('active');});document.getElementById(prefix+panel).classList.add('active');btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
function handlePhoto(idx,input){if(!input.files||!input.files[0])return;var reader=new FileReader();reader.onload=function(e){var img=document.getElementById('pp'+idx);img.src=e.target.result;img.style.display='block';document.getElementById('pz'+idx).style.opacity='0.4';saveSession();};reader.readAsDataURL(input.files[0]);}
function toggleHint(idx){document.getElementById('hint'+idx).classList.toggle('show');}
function showResults(){var rb=document.getElementById('s_results');if(!rb)return;rb.style.display='block';var pct=Math.round(correctCount/problems.length*100);document.getElementById('resultPct').textContent=pct+'%';document.getElementById('resultEmoji').textContent=pct>=80?'🏆':pct>=60?'🎯':'📚';document.getElementById('resultSub').textContent=correctCount+' correcta(s) de '+problems.length+' preguntas';setTimeout(function(){rb.classList.add('vis');rb.scrollIntoView({behavior:'smooth',block:'center'});},50);}

function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);return;
  }
  prob.pendingChoice=chosenIdx;opts.forEach(function(o){o.classList.remove('pending');});opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
  saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);
}

function buildOneCard(prob, i) {
  var opts = prob.options.map(function(opt, oi) {
    return '<div class="mcopt" onclick="handleMC('+i+','+oi+')">' + opt + '</div>';
  }).join('');
  var card = document.createElement('div');
  card.className = 'pcrd section';
  card.id = 'pc' + i;

  var workArea = '';
  if (prob.noCanvas) {
    workArea =
      '<div style="margin-bottom:.85rem">' +
        '<div class="wtabs">' +
          '<button class="wtab active" onclick="switchTab('+i+',\'type\',this)">⌨️ Escribe tu razonamiento</button>' +
        '</div>' +
        '<div class="wpanel active" id="wp_'+i+'_type">' +
          '<textarea class="wtextarea" id="ta'+i+'" placeholder="Explica tu razonamiento aquí..." oninput="saveSession()"></textarea>' +
        '</div>' +
      '</div>';
  } else {
    workArea =
      '<div style="margin-bottom:.85rem">' +
        '<div class="wtabs">' +
          '<button class="wtab active" onclick="switchTab('+i+',\'draw\',this)">✏️ Dibujar</button>' +
          '<button class="wtab"        onclick="switchTab('+i+',\'type\',this)">⌨️ Escribir</button>' +
          '<button class="wtab"        onclick="switchTab('+i+',\'photo\',this)">📷 Foto</button>' +
        '</div>' +
        '<div class="wpanel active" id="wp_'+i+'_draw">' +
          '<div class="cvwrap">' +
            '<canvas class="dcanvas" id="dc'+i+'"></canvas>' +
            '<div class="ctoolbar">' +
              '<button class="tbtn2 bpen on">🖊 Lápiz</button>' +
              '<button class="tbtn2 bmarker">🖌 Marcador</button>' +
              '<button class="tbtn2 beraser">⬜ Borrar</button>' +
              '<div class="cdot sel" data-color="#2d5a27" style="background:#2d5a27"></div>' +
              '<div class="cdot"     data-color="#1a1a16" style="background:#1a1a16"></div>' +
              '<div class="cdot"     data-color="#8b2500" style="background:#8b2500"></div>' +
              '<div class="cdot"     data-color="#1d4e89" style="background:#1d4e89"></div>' +
              '<button class="clrbtn">🗑 Limpiar</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="wpanel" id="wp_'+i+'_type">' +
          '<textarea class="wtextarea" id="ta'+i+'" placeholder="Muestra tu procedimiento aquí..." oninput="saveSession()"></textarea>' +
        '</div>' +
        '<div class="wpanel" id="wp_'+i+'_photo">' +
          '<div class="pzone" id="pz'+i+'">' +
            '<input type="file" accept="image/*" onchange="handlePhoto('+i+',this)">' +
            '<div class="pzicon">📸</div>' +
            '<div class="pztxt">Toca para <strong>elegir imagen</strong> o tomar foto</div>' +
          '</div>' +
          '<img class="ppreview" id="pp'+i+'" alt="trabajo del alumno">' +
        '</div>' +
      '</div>';
  }

  card.innerHTML =
    '<div class="phdr"><div class="pnum">'+(i+1)+'</div><div class="ptitle">'+prob.title+'</div></div>' +
    '<div class="pbody">' +
      '<div class="pstmt">'+prob.questionText+'<span class="pfn">'+(prob.fn||'')+'</span></div>' +
      workArea +
      '<button class="hintbtn" onclick="toggleHint('+i+')">💡 Mostrar pista</button>' +
      '<div class="hintbox" id="hint'+i+'">'+(prob.hint||'')+'</div>' +
      '<div style="margin-top:.7rem">' +
        '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:.5rem">Selecciona tu respuesta:</div>' +
        '<div class="mcopts">' + opts + '</div>' +
        '<div class="mcfb" id="fb'+i+'"></div>' +
      '</div>' +
    '</div>';
  document.getElementById('lessonBody').appendChild(card);
  if (!prob.noCanvas) {
    setTimeout(function() {
      var c = document.getElementById('dc' + i);
      if (c) initCanvas(c);
    }, 80);
  }
}

/* ══════════════════════════════════════════════════════
   COURNOT SIMULATOR
══════════════════════════════════════════════════════ */
function initCournotSim() {
  var canvas = document.getElementById('cn-canvas');
  if (!canvas) return;

  // Fixed internal canvas resolution — CSS width:100% scales it visually
  var CW = 680, CH = 220;

  function draw() {
    var a_el = document.getElementById('cn-a');
    var c_el = document.getElementById('cn-c');
    var aN   = document.getElementById('cn-a-v');
    var cN   = document.getElementById('cn-c-v');
    var q1N  = document.getElementById('cn-q1');
    var pN   = document.getElementById('cn-p');
    var piN  = document.getElementById('cn-pi');
    if (!a_el || !c_el || !aN || !cN || !q1N || !pN || !piN) return;

    var A = parseFloat(a_el.value);
    var C = parseFloat(c_el.value);
    aN.textContent = A;
    cN.textContent = C;
    var q_star  = (A - C) / 3;
    var P_star  = A - 2 * q_star;
    var pi_each = (P_star - C) * q_star;
    q1N.textContent = q_star.toFixed(1);
    pN.textContent  = P_star.toFixed(1);
    piN.textContent = pi_each.toFixed(1);

    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, CW, CH);

    // FIXED axis range 0..200 regardless of A,C
    // This means the lines genuinely move on screen when A or C changes
    var padL = 48, padR = 12, padT = 18, padB = 32;
    var RANGE = 200;
    var scaleX = (CW - padL - padR) / RANGE;
    var scaleY = (CH - padT - padB) / RANGE;
    var intercept = A - C;

    function toX(q) { return padL + q * scaleX; }
    function toY(q) { return CH - padB - q * scaleY; }

    // Axes
    ctx.strokeStyle = '#bbbbbb'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, CH - padB); ctx.lineTo(CW - padR, CH - padB);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = '#7a7468'; ctx.font = '12px IBM Plex Sans';
    ctx.textAlign = 'center';
    ctx.fillText('q₁', padL + (CW - padL - padR) / 2, CH - 2);
    ctx.save(); ctx.translate(14, padT + (CH - padT - padB) / 2);
    ctx.rotate(-Math.PI / 2); ctx.fillText('q₂', 0, 0); ctx.restore();

    // Tick marks at intercept values
    ctx.fillStyle = '#9a9690'; ctx.font = '10px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText((intercept/2).toFixed(0), toX(intercept/2), CH - padB + 12);
    ctx.fillText(intercept.toFixed(0),     toX(intercept),   CH - padB + 12);
    ctx.textAlign = 'right';
    ctx.fillText((intercept/2).toFixed(0), padL - 3, toY(intercept/2) + 4);
    ctx.fillText(intercept.toFixed(0),     padL - 3, toY(intercept)   + 4);

    // RF1: q1* = (A-c-q2)/2  → from (q1=(A-c)/2, q2=0) to (q1=0, q2=A-c)
    ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(toX(intercept / 2), toY(0));
    ctx.lineTo(toX(0), toY(intercept));
    ctx.stroke();
    ctx.fillStyle = '#4a7c3f'; ctx.font = 'bold 11px IBM Plex Sans';
    ctx.textAlign = 'left';
    ctx.fillText('RF₁', toX(intercept / 2) + 4, toY(0) - 6);

    // RF2: symmetric → from (q1=0, q2=(A-c)/2) to (q1=A-c, q2=0)
    ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(intercept / 2));
    ctx.lineTo(toX(intercept), toY(0));
    ctx.stroke();
    ctx.fillStyle = '#c9a84c'; ctx.font = 'bold 11px IBM Plex Sans';
    ctx.textAlign = 'right';
    ctx.fillText('RF₂', toX(intercept) - 4, toY(0) - 6);

    // Dashed guides to Nash point
    ctx.setLineDash([4, 4]); ctx.strokeStyle = '#8b250055'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(toX(q_star), toY(q_star)); ctx.lineTo(toX(q_star), CH - padB); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(toX(q_star), toY(q_star)); ctx.lineTo(padL, toY(q_star)); ctx.stroke();
    ctx.setLineDash([]);

    // Nash equilibrium point
    ctx.fillStyle = '#8b2500';
    ctx.beginPath();
    ctx.arc(toX(q_star), toY(q_star), 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8b2500'; ctx.font = 'bold 11px IBM Plex Sans';
    ctx.textAlign = 'left';
    ctx.fillText('EN (' + q_star.toFixed(0) + ',' + q_star.toFixed(0) + ')', toX(q_star) + 9, toY(q_star) - 4);

    // Nash ticks on axes
    ctx.fillStyle = '#8b2500'; ctx.font = '10px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText(q_star.toFixed(0), toX(q_star), CH - padB + 12);
    ctx.textAlign = 'right';
    ctx.fillText(q_star.toFixed(0), padL - 3, toY(q_star) + 4);
  }

  var a_el2 = document.getElementById('cn-a');
  var c_el2 = document.getElementById('cn-c');
  if (a_el2) a_el2.addEventListener('input', draw);
  if (c_el2) c_el2.addEventListener('input', draw);

  // Draw as soon as the canvas is visible (IntersectionObserver fires after layout)
  draw();
}

/* ══════════════════════════════════════════════════════
   PRISONER'S DILEMMA SIMULATOR
══════════════════════════════════════════════════════ */
function initPrisonerSim(rng) {
  var baseHigh = Math.floor(rng() * 20 + 80);
  var baseMed  = Math.floor(rng() * 10 + 55);
  var baseLow  = Math.floor(rng() * 10 + 20);
  var baseVLow = Math.floor(rng() * 10 + 5);

  var matrix = [
    [baseMed, baseMed],   // CC
    [baseVLow, baseHigh], // CD
    [baseHigh, baseVLow], // DC
    [baseLow, baseLow]    // DD
  ];

  var ids = ['pc-cc','pc-cd','pc-dc','pc-dd'];
  var valIds  = ['pv-cc','pv-cd','pv-dc','pv-dd'];
  var val2Ids = ['pv-cc2','pv-cd2','pv-dc2','pv-dd2'];

  // Guard: all cells must exist
  for (var k = 0; k < ids.length; k++) {
    if (!document.getElementById(ids[k])) return;
  }

  for (var j = 0; j < 4; j++) {
    document.getElementById(valIds[j]).textContent  = matrix[j][0];
    document.getElementById(val2Ids[j]).textContent = '/ ' + matrix[j][1];
  }


  ids.forEach(function(id, idx) {
    var cell = document.getElementById(id);
    cell.addEventListener('click', function() {
      ids.forEach(function(oid) {
        var oc = document.getElementById(oid);
        if (oc) oc.classList.remove('chosen');
      });
      cell.classList.add('chosen');
      var fb = document.getElementById('prisoner-fb');
      if (!fb) return;
      if (idx === 3) {
        fb.innerHTML = '✓ <strong>¡Correcto! Este es el Equilibrio de Nash.</strong> Aunque ambas firmas ganarían más cooperando (' + matrix[0][0] + ' cada una), la estrategia dominante de desviarse lleva a este resultado inferior. Esto es la <em>trampa del prisionero</em>.';
        fb.style.background = 'var(--ok-bg)'; fb.style.color = 'var(--ok)'; fb.style.display = 'block';
      } else if (idx === 0) {
        fb.innerHTML = '📌 El resultado cooperativo da ganancias más altas (' + matrix[0][0] + '), pero <strong>no es un equilibrio</strong>: si tu rival coopera, te conviene desviarte y ganar ' + matrix[2][0] + '. Por eso ninguna firma no puede sostenerlo sola.';
        fb.style.background = 'var(--gold-bg)'; fb.style.color = 'var(--text2)'; fb.style.display = 'block';
      } else {

/* ══════════════════════════════════════════════════════
   STACKELBERG SIMULATOR
══════════════════════════════════════════════════════ */
function initStackelbergSim() {
  var canvas = document.getElementById('sk-canvas');
  if (!canvas) return;

  var CW = 680, CH = 180;

  function draw() {
    var a_el  = document.getElementById('sk-a');
    var c_el  = document.getElementById('sk-c');
    var aN    = document.getElementById('sk-a-v');
    var cN    = document.getElementById('sk-c-v');
    var el_q1 = document.getElementById('sk-q1');
    var el_q2 = document.getElementById('sk-q2');
    var el_p  = document.getElementById('sk-p');
    var el_pi1= document.getElementById('sk-pi1');
    var el_pi2= document.getElementById('sk-pi2');
    var el_qc = document.getElementById('sk-qc');
    var el_pc = document.getElementById('sk-pc');
    var el_pic= document.getElementById('sk-pic');
    if (!a_el || !c_el || !aN || !cN || !el_q1 || !el_q2 || !el_p ||
        !el_pi1 || !el_pi2 || !el_qc || !el_pc || !el_pic) return;

    var A = parseFloat(a_el.value);
    var C = parseFloat(c_el.value);
    aN.textContent = A; cN.textContent = C;

    var q1_s  = (A - C) / 2;
    var q2_s  = (A - C) / 4;
    var P_s   = A - q1_s - q2_s;
    var pi1_s = (P_s - C) * q1_s;
    var pi2_s = (P_s - C) * q2_s;
    var q_c   = (A - C) / 3;
    var P_c   = A - 2 * q_c;
    var pi_c  = (P_c - C) * q_c;

    el_q1.textContent  = q1_s.toFixed(1);
    el_q2.textContent  = q2_s.toFixed(1);
    el_p.textContent   = P_s.toFixed(1);
    el_pi1.textContent = pi1_s.toFixed(1);
    el_pi2.textContent = pi2_s.toFixed(1);
    el_qc.textContent  = q_c.toFixed(1);
    el_pc.textContent  = P_c.toFixed(1);
    el_pic.textContent = pi_c.toFixed(1);

    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, CW, CH);

    var groups = [
      { label: 'q Cournot',   val: q_c,   max: q1_s * 1.1, color: '#c9a84c' },
      { label: 'q₁ Líder',   val: q1_s,  max: q1_s * 1.1, color: '#4a7c3f' },
      { label: 'q₂ Seguidor',val: q2_s,  max: q1_s * 1.1, color: '#8ecf82' },
      { label: 'π Cournot',  val: pi_c,  max: pi1_s * 1.1, color: '#c9a84c' },
      { label: 'π₁ Líder',  val: pi1_s, max: pi1_s * 1.1, color: '#4a7c3f' },
      { label: 'π₂ Seguidor',val: pi2_s, max: pi1_s * 1.1, color: '#8ecf82' },
    ];

    var pad   = 20;
    var bpad  = 30;
    var avail = CW - pad * 2;
    var bw    = avail / groups.length - 6;
    ctx.textAlign = 'center';
    groups.forEach(function(g, i) {
      var x    = pad + i * (avail / groups.length) + 3;
      var barH = (CH - bpad - 24) * (g.val / g.max);
      ctx.fillStyle = g.color;
      ctx.fillRect(x, CH - bpad - barH, bw, barH);
      ctx.fillStyle = '#4a4640'; ctx.font = '9px IBM Plex Sans';
      ctx.fillText(g.label, x + bw / 2, CH - bpad + 12);
      ctx.fillStyle = '#1a1a16'; ctx.font = 'bold 9px IBM Plex Mono';
      ctx.fillText(g.val.toFixed(0), x + bw / 2, CH - bpad - barH - 3);
    });
  }

  var a_el2 = document.getElementById('sk-a');
  var c_el2 = document.getElementById('sk-c');
  if (a_el2) a_el2.addEventListener('input', draw);
  if (c_el2) c_el2.addEventListener('input', draw);

  draw();
}

  problems.push({

    questionText: 'En un duopolio de Stackelberg, la demanda es P = ' + A4 + ' − Q y c = ' + C4 + '. Firma 1 es el líder; Firma 2 es el seguidor. ¿Cuáles son las cantidades de equilibrio?',
    fn: 'Líder: q₁* = (A − c) / 2 | Seguidor: q₂* = (A − c) / 4',
    options: p4s,
    correctIdx: p4ci,
    hint: 'El líder de Stackelberg produce el doble que el seguidor en equilibrio.',
    explanation: 'Líder: q₁* = (' + A4 + ' − ' + C4 + ') / 2 = ' + q1_s4.toFixed(1) + '. Seguidor: q₂* = (' + A4 + ' − ' + C4 + ') / 4 = ' + q2_s4.toFixed(1) + '. El líder aprovecha su compromiso previo para producir más y obtener mayores ganancias que en Cournot.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // ── SECTION 5: Comparativa de estructuras ────────────────────
  var s5 = document.createElement('div');
  s5.className = 'section';
  s5.innerHTML = '<div class="stag">Análisis Comparativo</div>' +
    '<h2>¿Cómo Compara el Oligopolio con Otras Estructuras?</h2>' +
    '<p>Para entender el bienestar social que genera el oligopolio, es útil compararlo con el monopolio (peor) y la competencia perfecta (mejor). El oligopolio se ubica entre ambos extremos:</p>' +
    '<table class="eq-table">' +
      '<tr><th>Estructura</th><th>Cantidad Q</th><th>Precio P</th><th>Ganancia π</th><th>Bienestar social</th></tr>' +
      '<tr><td>Competencia perfecta</td><td>Q = A − c</td><td>P = c</td><td>π = 0</td><td>Máximo ✓</td></tr>' +
      '<tr><td>Cournot (2 firmas)</td><td>Q = 2(A−c)/3</td><td>P = (A+2c)/3</td><td>π = (A−c)²/9</td><td>Intermedio</td></tr>' +
      '<tr><td>Monopolio</td><td>Q = (A−c)/2</td><td>P = (A+c)/2</td><td>π = (A−c)²/4</td><td>Mínimo ✗</td></tr>' +
    '</table>' +
    '<div class="callout"><p><strong>Ley general:</strong> Conforme aumenta el número de firmas en un oligopolio de Cournot, el precio se acerca al costo marginal y el bienestar se acerca al máximo competitivo. Con n firmas: Q = n(A−c)/(n+1).</p></div>' +
    '<p>Los oligopolistas también pueden diferenciarse a través de publicidad, marca, calidad y servicio — estrategias que no existen en la competencia perfecta pero que son centrales en el oligopolio real.</p>';
  lb.appendChild(s5);

  // ── SECCIÓN DE EVALUACIÓN ─────────────────────────────────────
  var evalHdr = document.createElement('div');
  evalHdr.className = 'section';
  evalHdr.innerHTML = '<div class="stag">Evaluación Final</div><h2>Pon a prueba tu comprensión</h2>' +
    '<p>Resuelve los siguientes problemas aplicando todo lo aprendido. Tus valores son únicos — generados a partir de tu nombre.</p>';
  lb.appendChild(evalHdr);

  // PROBLEMA 5
  var nFirms = [2, 3, 4][Math.floor(rng() * 3)];
  var A5 = Math.floor(rng() * 6) * 10 + 80;
  var C5 = Math.floor(rng() * 4) * 5 + 10;
  var q5_each = (A5 - C5) / (nFirms + 1);
  var Q5 = nFirms * q5_each;
  var P5 = A5 - Q5;
  var wrongP5a = A5 - C5;
  var wrongP5b = (A5 + C5) / 2;
  var p5opts_raw = [
    '$' + P5.toFixed(1),
    '$' + wrongP5a.toFixed(1),
    '$' + wrongP5b.toFixed(1),
    '$' + (P5 + 15).toFixed(1)
  ];
  var p5correct = '$' + P5.toFixed(1);
  var p5s = shuffle(p5opts_raw, rng);
  var p5ci = p5s.indexOf(p5correct);
  problems.push({
    title: 'Precio de Equilibrio con ' + nFirms + ' Firmas',
    questionText: 'Un oligopolio de Cournot tiene ' + nFirms + ' firmas simétricas. La demanda es P = ' + A5 + ' − Q y el costo marginal es c = ' + C5 + '. ¿Cuál es el precio de equilibrio?',
    fn: 'Con n firmas: Q* = n(A−c)/(n+1), luego P* = A − Q*',
    options: p5s,
    correctIdx: p5ci,
    hint: 'Primero calcula la cantidad total Q* = n(A−c)/(n+1), después P* = A − Q*.',
    explanation: 'Q* = ' + nFirms + '×(' + A5 + '−' + C5 + ')/(' + nFirms + '+1) = ' + Q5.toFixed(1) + '. P* = ' + A5 + ' − ' + Q5.toFixed(1) + ' = $' + P5.toFixed(1) + '. Con más firmas, el precio se acerca más al costo marginal de $' + C5 + '.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // PROBLEMA 6
  var A6 = Math.floor(rng() * 5) * 10 + 100;
  var C6 = Math.floor(rng() * 3) * 10 + 20;
  var q6_cournot = (A6 - C6) / 3;
  var q6_monopoly = (A6 - C6) / 2;
  var q6_comp = A6 - C6;
  var pi6_cournot = Math.pow((A6 - C6), 2) / 9;
  var pi6_monopoly = Math.pow((A6 - C6), 2) / 4;
  var p6opts_raw = [
    'π_monopolio = ' + pi6_monopoly.toFixed(0) + ' > π_Cournot = ' + pi6_cournot.toFixed(0),
    'π_Cournot = ' + pi6_cournot.toFixed(0) + ' > π_monopolio = ' + pi6_monopoly.toFixed(0),
    'π_monopolio = π_Cournot (son iguales)',
    'No se puede comparar sin saber el número de firmas'
  ];
  var p6correct = 'π_monopolio = ' + pi6_monopoly.toFixed(0) + ' > π_Cournot = ' + pi6_cournot.toFixed(0);
  var p6s = shuffle(p6opts_raw, rng);
  var p6ci = p6s.indexOf(p6correct);
  problems.push({
    title: 'Comparación: Monopolio vs Cournot',
    questionText: 'Con demanda P = ' + A6 + ' − Q y c = ' + C6 + ', compara las ganancias totales de la industria en monopolio vs duopolio de Cournot. ¿Cuál relación es correcta?',
    fn: 'π_monopolio = (A−c)²/4 | π_Cournot cada firma = (A−c)²/9',
    options: p6s,
    correctIdx: p6ci,
    hint: 'Calcula las ganancias de cada estructura y compáralas. En Cournot son 2 firmas; en monopolio es 1.',
    explanation: 'Monopolio: π = (' + (A6-C6) + ')²/4 = ' + pi6_monopoly.toFixed(0) + '. Cournot (2 firmas, ganancia total): 2×(' + (A6-C6) + ')²/9 = ' + (2*pi6_cournot).toFixed(0) + '. El monopolio obtiene ganancias totales mayores porque restringe la producción más agresivamente. Esto motiva a las firmas de oligopolio a intentar coludirse.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // PROBLEMA 7
  var A7 = Math.floor(rng() * 6) * 10 + 80;
  var C7 = Math.floor(rng() * 4) * 5 + 10;
  var q7_leader = (A7 - C7) / 2;
  var q7_follower = (A7 - C7) / 4;
  var Q7 = q7_leader + q7_follower;
  var P7 = A7 - Q7;
  var pi7_leader = (P7 - C7) * q7_leader;
  var pi7_follower = (P7 - C7) * q7_follower;
  var p7opts_raw = [
    'El líder gana más que en Cournot, el seguidor gana menos',
    'El seguidor gana más que en Cournot, el líder gana menos',
    'Ambos ganan igual que en Cournot',
    'El líder gana menos que el seguidor en Stackelberg'
  ];
  var p7correct = 'El líder gana más que en Cournot, el seguidor gana menos';
  var p7s = shuffle(p7opts_raw, rng);
  var p7ci = p7s.indexOf(p7correct);
  problems.push({
    title: 'Ventaja del Líder de Stackelberg',
    questionText: 'Con P = ' + A7 + ' − Q y c = ' + C7 + ', en Stackelberg el líder produce q₁* = ' + q7_leader.toFixed(1) + ' y el seguidor q₂* = ' + q7_follower.toFixed(1) + '. En Cournot cada firma produce ' + ((A7-C7)/3).toFixed(1) + '. ¿Cuál afirmación describe correctamente el efecto del liderazgo?',
    fn: '',
    options: p7s,
    correctIdx: p7ci,
    hint: 'Compara las ganancias: π₁_Stackelberg vs π_Cournot, y π₂_Stackelberg vs π_Cournot.',
    noCanvas: true,
    explanation: 'El líder de Stackelberg explota su ventaja de primer movimiento produciendo más que en Cournot, obteniendo π₁ = ' + pi7_leader.toFixed(1) + ' vs ' + Math.pow((A7-C7),2).toFixed(0)/9 + ' en Cournot. El seguidor, forzado a producir menos, obtiene π₂ = ' + pi7_follower.toFixed(1) + ', menor que en Cournot. Esta es la "primera ventaja del movimiento" (first-mover advantage).',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  // PROBLEMA 8 — Bienestar social / número de firmas
  var n8 = [2, 3, 5, 10][Math.floor(rng() * 4)];
  var A8 = 100, C8 = 10;
  var Q8_cournot = n8 * (A8 - C8) / (n8 + 1);
  var P8_cournot = A8 - Q8_cournot;
  var Q8_comp = A8 - C8;
  var p8opts_raw = [
    'Aumenta el número de firmas → precio baja → bienestar social sube',
    'Aumenta el número de firmas → precio sube → bienestar social baja',
    'El número de firmas no afecta el precio en Cournot',
    'Más firmas siempre reduce las ganancias totales a cero'
  ];
  var p8correct = 'Aumenta el número de firmas → precio baja → bienestar social sube';
  var p8s = shuffle(p8opts_raw, rng);
  var p8ci = p8s.indexOf(p8correct);
  problems.push({
    title: 'Bienestar Social y Número de Firmas',
    questionText: 'Con P = 100 − Q y c = 10, el precio de Cournot con ' + n8 + ' firmas es P* = ' + P8_cournot.toFixed(1) + ', mientras que con competencia perfecta P = 10. ¿Cuál es la relación general entre el número de firmas y el bienestar social en un oligopolio de Cournot?',
    fn: 'P*(n) = (A + n·c) / (n+1)',
    options: p8s,
    correctIdx: p8ci,
    hint: 'Observa la fórmula del precio en función de n. ¿Qué pasa cuando n → ∞?',
    noCanvas: true,
    explanation: 'A medida que aumenta el número de firmas (n), el precio de Cournot se acerca al costo marginal c, maximizando el bienestar social. Con ' + n8 + ' firmas P* = ' + P8_cournot.toFixed(1) + ' vs P_competencia = 10. Cuando n → ∞, el oligopolio converge a la competencia perfecta.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  document.getElementById('s_results').style.display = 'none';
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}
