<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funciones Logarítmicas — Cálculo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #E87722;
  --green-dark: #c45e0a;
  --green-bg:   #fef0e2;
  --gold:       #1a3a6b;
  --gold-bg:    #e8eef8;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #f0a060;
  --green-dark: #f5bc8a;
  --green-bg:   #2a1a08;
  --gold:       #6a9ad4;
  --gold-bg:    #0e1828;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}

#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:56px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;}

#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);}
#restoreBar strong{color:var(--gold);}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem;}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;}
.rbtn-yes{background:var(--green);color:#fff;}
.rbtn-yes:hover{background:var(--green-dark);}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}

.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}

.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green);overflow-x:auto;}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem;}
.rnote{font-size:.76rem;color:var(--text3);}

.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}

.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}

.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15em;line-height:1.1;}
.mf-num{border-bottom:1.5px solid var(--text);padding:0 .2em .1em;font-size:.92em;text-align:center;}
.mf-den{padding:.1em .2em 0;font-size:.92em;text-align:center;}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}

/* ── GRAPH ── */
.log-graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:.9rem 0;}
.graph-title{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:700;color:var(--green);text-align:center;margin-bottom:.75rem;letter-spacing:.02em;}
.graph-controls{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.75rem;justify-content:center;}
.graph-controls label{font-size:.78rem;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.graph-controls input[type=range]{width:130px;accent-color:var(--green);}
#logCanvas{border-radius:8px;display:block;width:100%;max-width:100%;}

@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;border-radius:12px;}
  .wlogos img{height:38px;}
  .wtitle{font-size:1.35rem;}
  .htitle{display:none;}
  .hlogos img{height:20px;}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:110px;overflow:hidden;text-overflow:ellipsis;}
  .lbody{padding:1.2rem .7rem 3rem;}
  .section h2{font-size:1.3rem;}
  .rules-grid{grid-template-columns:1fr;}
  .pbody{padding:.75rem;}
  .pstmt{font-size:.84rem;}
  .mcopt{font-size:.83rem;padding:.58rem .7rem;}
  .dcanvas{height:220px;}
  .ctoolbar{gap:.25rem;}
  .callout{padding:.8rem .9rem;}
  .graph-controls{flex-direction:column;align-items:center;}
}
</style>
</head>

<script>
var studentData={};
var problems=[];

/* SESSION */
function lsKey(){var n=(studentData.name||'').trim();var g=(studentData.group||'').trim();return 'log_anahuac5__'+(n+'__'+g).replace(/\s+/g,'_');}
function saveSession(){
  if(!studentData.name)return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var bl=document.createElement('canvas');bl.width=dc.width;bl.height=dc.height;drawings.push(dc.toDataURL()===bl.toDataURL()?null:dc.toDataURL('image/png'));}
    else drawings.push(null);
    var ta=document.getElementById('ta'+i);texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,
    choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}
function loadSession(name,group){
  var key='log_anahuac5__'+(name+'__'+group).replace(/\s+/g,'_');
  try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}
}
function restoreSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group);if(!saved)return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};answeredCount=0;correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  saved.choices.forEach(function(choice,idx){if(choice!==null&&choice!==undefined)confirmMC(idx,choice);});
  setTimeout(function(){
    if(saved.drawings)saved.drawings.forEach(function(dataUrl,i){
      if(!dataUrl)return;var dc=document.getElementById('dc'+i);if(!dc||!dc.width)return;
      var img=new Image();img.onload=function(){var dpr=window.devicePixelRatio||1;dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr);};img.src=dataUrl;
    });
    if(saved.texts)saved.texts.forEach(function(text,i){if(!text)return;var ta=document.getElementById('ta'+i);if(ta)ta.value=text;});
    if(saved.photos)saved.photos.forEach(function(dataUrl,i){
      if(!dataUrl)return;var pp=document.getElementById('pp'+i);if(!pp)return;
      pp.src=dataUrl;pp.style.display='block';var pz=document.getElementById('pz'+i);if(pz)pz.style.opacity='0.4';
    });
  },300);
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}
function checkForSavedSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var saved=loadSession(name,group);
  var bar=document.getElementById('restoreBar');
  bar.style.display=(saved&&saved.choices&&saved.choices.some(function(c){return c!==null;}))?'block':'none';
}
var answeredCount=0,correctCount=0;

/* THEME */
var THEME_KEY='log_anahuac5__theme';
function toggleTheme(){
  var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';
  try{localStorage.setItem(THEME_KEY,next);}catch(e){}
  drawLogGraph();
}
(function(){
  document.documentElement.setAttribute('data-theme','light');
  try{var t=localStorage.getItem(THEME_KEY);if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('themeBtn');if(b)b.textContent='☀️';});}}catch(e){}
})();

/* SEEDED RNG */
function seededRng(seed){
  var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){
    s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);
    return((t^(t>>>15))>>>0)/4294967296;
  };
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}

/* START */
function startLesson(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!name||!group){err.textContent='Por favor llena ambos campos.';return;}
  err.textContent='';
  studentData={name:name,group:group};answeredCount=0;correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
}

/* CANVAS */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen')){ctx.lineWidth=2;}
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');
      ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}
function switchTab(idx,panel,btn){
  var prefix='wp_'+idx+'_';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){p.classList.remove('active');});
  document.getElementById(prefix+panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
function handlePhoto(idx,input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){var img=document.getElementById('pp'+idx);img.src=e.target.result;img.style.display='block';document.getElementById('pz'+idx).style.opacity='0.4';saveSession();};
  reader.readAsDataURL(input.files[0]);
}
function toggleHint(idx){document.getElementById('hint'+idx).classList.toggle('show');}
function showResults(){
  var rb=document.getElementById('s_results');if(!rb)return;
  rb.style.display='block';
  setTimeout(function(){rb.classList.add('vis');rb.scrollIntoView({behavior:'smooth',block:'center'});},50);
}

/* HANDLE MC */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){
      if(i===prob.correctIdx)o.classList.add('rc');
      if(i===chosenIdx&&isOk)o.classList.add('sc');
      if(i===chosenIdx&&!isOk)o.classList.add('sw');
    });
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){
    if(i===prob.correctIdx)o.classList.add('rc');
    if(i===chosenIdx&&isOk)o.classList.add('sc');
    if(i===chosenIdx&&!isOk)o.classList.add('sw');
  });
  var fb=document.getElementById('fb'+probIdx);

  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';

}

/* LOG GRAPH — single clean curve, no reference line */
var currentBase=2;
function drawLogGraph(){
  var canvas=document.getElementById('logCanvas');if(!canvas)return;
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  var dpr=window.devicePixelRatio||1;
  /* resize only when canvas CSS width has changed */
  var cssW=canvas.parentElement.clientWidth-24; /* account for card padding */
  if(Math.abs(canvas.width/dpr-cssW)>2){
    canvas.width=cssW*dpr;canvas.height=Math.round(cssW*0.42)*dpr;
    canvas.style.width=cssW+'px';canvas.style.height=Math.round(cssW*0.42)+'px';
  }
  var W=canvas.width/dpr, H=canvas.height/dpr;
  var ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  /* coordinate system: x in (0.05, 10], y in [-3, 3.5] */
  var xMin=0.05,xMax=10,yMin=-3,yMax=3.5;
  function cx(x){return (x-xMin)/(xMax-xMin)*W;}
  function cy(y){return H-(y-yMin)/(yMax-yMin)*H;}

  /* background */
  ctx.fillStyle=isDark?'#242420':'#ffffff';ctx.fillRect(0,0,W,H);

  /* grid */
  ctx.strokeStyle=isDark?'#3a3830':'#ede9e0';ctx.lineWidth=1;
  for(var gx=1;gx<=10;gx++){ctx.beginPath();ctx.moveTo(cx(gx),0);ctx.lineTo(cx(gx),H);ctx.stroke();}
  for(var gy=-3;gy<=3;gy++){ctx.beginPath();ctx.moveTo(0,cy(gy));ctx.lineTo(W,cy(gy));ctx.stroke();}

  /* axes */
  ctx.strokeStyle=isDark?'#b0aa9e':'#5a5550';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,cy(0));ctx.lineTo(W,cy(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx(1),0);ctx.lineTo(cx(1),H);ctx.stroke();

  /* axis labels */
  ctx.fillStyle=isDark?'#7a7468':'#7a7468';
  ctx.font='11px IBM Plex Mono,monospace';ctx.textAlign='center';
  for(var ax=2;ax<=10;ax+=2){if(cx(ax)>20&&cx(ax)<W-10)ctx.fillText(ax,cx(ax),cy(0)+14);}
  ctx.textAlign='right';
  for(var ay=-2;ay<=3;ay++){if(ay!==0&&cy(ay)>10&&cy(ay)<H-5)ctx.fillText(ay,cx(1)-5,cy(ay)+4);}
  ctx.fillStyle=isDark?'#b0aa9e':'#5a5550';ctx.textAlign='center';
  ctx.font='11px IBM Plex Sans,sans-serif';
  ctx.fillText('x',W-8,cy(0)-6);
  ctx.textAlign='left';ctx.fillText('y',cx(1)+5,10);

  /* single log curve */
  ctx.strokeStyle='#E87722';ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();var first=true;
  var step=1;/* pixel step */
  for(var px=0;px<=W;px+=step){
    var xVal=xMin+(px/W)*(xMax-xMin);
    if(xVal<=0){first=true;continue;}
    var yVal=Math.log(xVal)/Math.log(currentBase);
    if(!isFinite(yVal)||yVal<yMin-0.1||yVal>yMax+0.1){first=true;continue;}
    var canY=cy(yVal);
    if(first){ctx.moveTo(px,canY);first=false;}else ctx.lineTo(px,canY);
  }
  ctx.stroke();

  /* special points: (1,0) and (b,1) */
  [[1,0],[currentBase,1]].forEach(function(pt){
    if(pt[0]<xMin||pt[0]>xMax)return;
    ctx.beginPath();ctx.arc(cx(pt[0]),cy(pt[1]),5,0,Math.PI*2);
    ctx.fillStyle='#E87722';ctx.fill();
    ctx.strokeStyle=isDark?'#242420':'#ffffff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=isDark?'#e8e4da':'#1a1a16';
    ctx.font='bold 10px IBM Plex Sans,sans-serif';ctx.textAlign='left';
    var lx=cx(pt[0])+9, ly=cy(pt[1])-4;
    if(lx>W-55)lx=cx(pt[0])-60;
    ctx.fillText('('+pt[0]+',\u2009'+pt[1]+')',lx,ly);
  });
}

function updateBase(val){
  currentBase=parseFloat(val);
  /* update HTML title with subscript */
  var titleEl=document.getElementById('graphTitle');
  if(titleEl)titleEl.innerHTML='y\u2009=\u2009log<sub>'+currentBase+'</sub>(x)';
  drawLogGraph();
}

/* SHUFFLE */
function shuffleOpts(opts,correct,rng){
  var arr=opts.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
  return{opts:arr,correctIdx:arr.indexOf(correct)};
}

/* helper: section div */
function sec(html){var d=document.createElement('div');d.className='section';d.innerHTML=html;return d;}

/* ================================================================
   BUILD LESSON  —  pedagogical order:
   1. Definición + P1 evaluación directa
   2. Gráfica + P2 lectura de gráfica
   3. Propiedad producto: explicación → P3 expandir → P4 comprimir
   4. Propiedad cociente: explicación → P5 expandir → P6 comprimir
   5. Propiedad potencia: explicación → P7 expandir → P8 comprimir
   6. Cambio de base + ln: explicación → P9
   7. Evaluación final sin explicación → P10, P11, P12
   ================================================================ */
function buildLesson(rng){
  var lb=document.getElementById('lessonBody');

  /* ────────────────────────────────────────────────
     SECCIÓN 1 — Definición
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Concepto fundamental</div>'+
    '<h2>¿Qué es un logaritmo?</h2>'+
    '<p>Ya conoces las potencias: 2<sup>3</sup> = 8. El logaritmo hace la pregunta exactamente inversa: <em>¿a qué potencia hay que elevar la base para obtener ese número?</em></p>'+
    '<div class="callout">'+
      '<p><strong>Definición formal:</strong></p>'+
      '<p style="margin-top:.4rem;font-size:1rem">log<sub>b</sub>(x) = y &nbsp;&nbsp;⟺&nbsp;&nbsp; b<sup>y</sup> = x</p>'+
      '<p style="margin-top:.5rem;font-size:.84rem">Se lee: "logaritmo en base <em>b</em> de <em>x</em> es igual a <em>y</em>".<br>Condición: b &gt; 0, b ≠ 1, x &gt; 0.</p>'+
    '</div>'+
    '<p><strong>Ejemplo resuelto:</strong> log<sub>2</sub>(8) = ?</p>'+
    '<div class="rcard" style="margin:.6rem 0">'+
      '<div class="rname">Razonamiento</div>'+
      '<div class="rform">¿2 a qué potencia da 8?</div>'+
      '<div class="rnote">2¹=2 &nbsp;·&nbsp; 2²=4 &nbsp;·&nbsp; <strong>2³=8</strong> &nbsp;→&nbsp; log<sub>2</sub>(8) = 3</div>'+
    '</div>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Siempre se cumple</div><div class="rform">log<sub>b</sub>(1) = 0</div><div class="rnote">porque b⁰ = 1 para cualquier base</div></div>'+
      '<div class="rcard"><div class="rname">Siempre se cumple</div><div class="rform">log<sub>b</sub>(b) = 1</div><div class="rnote">porque b¹ = b para cualquier base</div></div>'+
    '</div>'
  ));

  /* P1 — evaluación directa */
  var bP1=[2,3,5,10];
  var b1=bP1[Math.floor(rng()*4)], e1=2+Math.floor(rng()*4), x1=Math.pow(b1,e1);
  var w1a=e1+1, w1b=e1+2, w1c=b1===x1?e1+3:b1;
  var r1=shuffleOpts([String(e1),String(w1a),String(w1b),String(w1c)],String(e1),rng);
  problems.push({title:'Evaluación directa',
    questionText:'Calcula: log<sub>'+b1+'</sub>('+x1+')',
    fn:'Pregunta: ¿'+b1+' elevado a qué potencia da '+x1+'?',
    hint:'Lista potencias de '+b1+' en orden hasta llegar a '+x1+': '+b1+'¹='+b1+', '+b1+'²='+b1*b1+'…',
    options:r1.opts,correctIdx:r1.correctIdx,
    explanation:b1+'<sup>'+e1+'</sup> = '+x1+', por lo tanto log<sub>'+b1+'</sub>('+x1+') = '+e1+'.',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ────────────────────────────────────────────────
     SECCIÓN 2 — Gráfica interactiva
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Visualización</div>'+
    '<h2>La gráfica de y = log<sub>b</sub>(x)</h2>'+
    '<p>Ahora que sabes evaluar logaritmos, observa cómo luce la función. Mueve el control para cambiar la base y ver cómo se deforma la curva.</p>'+
    '<div class="log-graph-wrap">'+
      '<div class="graph-title" id="graphTitle">y&thinsp;=&thinsp;log<sub>2</sub>(x)</div>'+
      '<div class="graph-controls">'+
        '<label>Base:</label>'+
        '<input type="range" id="baseSlider" min="1.2" max="9" step="0.1" value="2" oninput="updateBase(this.value)">'+
        '<span style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;color:var(--green);min-width:1.8rem" id="baseDisplay">2</span>'+
      '</div>'+
      '<canvas id="logCanvas"></canvas>'+
    '</div>'+
    '<p style="font-size:.82rem;color:var(--text3)">La curva siempre pasa por los puntos marcados: <strong>(1, 0)</strong> — porque log(1)=0 para cualquier base — y <strong>(b, 1)</strong>. Nunca toca el eje y (dominio: x &gt; 0).</p>'+
    '<div class="callout"><p><strong>Efecto de la base:</strong> base mayor → curva más "aplastada". Base entre 0 y 1 → curva decreciente. Base e ≈ 2.718 produce el logaritmo natural ln(x).</p></div>'
  ));
  setTimeout(function(){
    var canvas=document.getElementById('logCanvas');
    if(!canvas)return;
    var wrap=canvas.parentElement;
    var cssW=wrap.clientWidth-24;
    canvas.width=cssW*(window.devicePixelRatio||1);
    canvas.height=Math.round(cssW*0.42)*(window.devicePixelRatio||1);
    canvas.style.width=cssW+'px';
    canvas.style.height=Math.round(cssW*0.42)+'px';
    drawLogGraph();
  },200);

  /* P2 — lectura de gráfica */
  var bP2=[2,3,10];
  var b2g=bP2[Math.floor(rng()*3)];
  var gScenarios=[
    {q:'La gráfica de y = log<sub>'+b2g+'</sub>(x) pasa por el punto ('+b2g+',&thinsp;__). ¿Qué valor completa el punto?',
     ans:'1',w:['0',String(b2g),'indefinido'],
     exp:'log<sub>'+b2g+'</sub>('+b2g+') = 1 porque '+b2g+'¹ = '+b2g+'. Toda gráfica logarítmica pasa por (b, 1).'},
    {q:'¿En qué valor de x cruza el eje horizontal (y = 0) la gráfica de y = log<sub>'+b2g+'</sub>(x)?',
     ans:'x = 1',w:['x = 0','x = '+b2g,'x = −1'],
     exp:'log<sub>'+b2g+'</sub>(x) = 0 cuando x = 1, porque '+b2g+'⁰ = 1. Esto se cumple para cualquier base válida.'}
  ];
  var gs=gScenarios[Math.floor(rng()*2)];
  var r2g=shuffleOpts([gs.ans].concat(gs.w),gs.ans,rng);
  problems.push({title:'Lectura de gráfica',
    questionText:gs.q,fn:'Recuerda los dos puntos clave: (1, 0) y (b, 1).',
    hint:'Busca en la gráfica interactiva de arriba los puntos marcados en naranja.',
    options:r2g.opts,correctIdx:r2g.correctIdx,
    explanation:gs.exp,
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ────────────────────────────────────────────────
     SECCIÓN 3 — Propiedad del producto
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Primera propiedad</div>'+
    '<h2>Propiedad del producto</h2>'+
    '<div class="callout"><p><strong>log<sub>b</sub>(A · B) = log<sub>b</sub>(A) + log<sub>b</sub>(B)</strong></p></div>'+
    '<p>Esta propiedad se aplica en dos sentidos:</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Expandir →</div><div class="rform">log<sub>2</sub>(4·8) = log<sub>2</sub>(4) + log<sub>2</sub>(8) = 2 + 3 = 5</div></div>'+
      '<div class="rcard"><div class="rname">← Comprimir</div><div class="rform">log<sub>2</sub>(4) + log<sub>2</sub>(8) = log<sub>2</sub>(32) = 5</div></div>'+
    '</div>'
  ));

  /* P3 expandir producto */
  var b3=2, e3a=2+Math.floor(rng()*3), e3b=1+Math.floor(rng()*3);
  var x3a=Math.pow(b3,e3a), x3b=Math.pow(b3,e3b), ans3=e3a+e3b;
  var w3a=e3a*e3b, w3b=Math.abs(e3a-e3b)||ans3+2, w3c=ans3+1;
  var r3=shuffleOpts([String(ans3),String(w3a),String(w3b),String(w3c)],String(ans3),rng);
  problems.push({title:'Expandir — producto',
    questionText:'Expande y evalúa: log<sub>2</sub>('+x3a+' · '+x3b+')',
    fn:'log(A·B) = log(A) + log(B)',
    hint:'Separa: log<sub>2</sub>('+x3a+') + log<sub>2</sub>('+x3b+'). Evalúa cada parte: ¿2 a qué potencia da cada número?',
    options:r3.opts,correctIdx:r3.correctIdx,
    explanation:'log<sub>2</sub>('+x3a+') + log<sub>2</sub>('+x3b+') = '+e3a+' + '+e3b+' = '+ans3+'.  (2<sup>'+e3a+'</sup>='+x3a+', 2<sup>'+e3b+'</sup>='+x3b+')',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* P4 comprimir producto */
  var b4=2, e4a=1+Math.floor(rng()*3), e4b=1+Math.floor(rng()*3);
  var x4a=Math.pow(b4,e4a), x4b=Math.pow(b4,e4b), ans4=e4a+e4b;
  var x4prod=Math.pow(b4,ans4);
  var w4a=e4a*e4b, w4b=ans4+1, w4c=Math.abs(e4a-e4b)||ans4+2;
  var r4=shuffleOpts([String(ans4),String(w4a),String(w4b),String(w4c)],String(ans4),rng);
  problems.push({title:'Comprimir — producto',
    questionText:'Comprime en un solo logaritmo y evalúa: log<sub>2</sub>('+x4a+') + log<sub>2</sub>('+x4b+')',
    fn:'log(A) + log(B) = log(A·B)',
    hint:'Suma de logs → log de un producto: log<sub>2</sub>('+x4a+'·'+x4b+') = log<sub>2</sub>('+x4a*x4b+'). Ahora evalúa.',
    options:r4.opts,correctIdx:r4.correctIdx,
    explanation:'log<sub>2</sub>('+x4a+'·'+x4b+') = log<sub>2</sub>('+x4prod+') = '+ans4+'.  (2<sup>'+ans4+'</sup> = '+x4prod+')',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ────────────────────────────────────────────────
     SECCIÓN 4 — Propiedad del cociente
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Segunda propiedad</div>'+
    '<h2>Propiedad del cociente</h2>'+
    '<div class="callout"><p><strong>log<sub>b</sub>(A / B) = log<sub>b</sub>(A) − log<sub>b</sub>(B)</strong></p></div>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Expandir →</div><div class="rform">log<sub>2</sub>(32/4) = log<sub>2</sub>(32) − log<sub>2</sub>(4) = 5 − 2 = 3</div></div>'+
      '<div class="rcard"><div class="rname">← Comprimir</div><div class="rform">log<sub>2</sub>(32) − log<sub>2</sub>(4) = log<sub>2</sub>(8) = 3</div></div>'+
    '</div>'
  ));

  /* P5 expandir cociente */
  var b5=2, e5a=4+Math.floor(rng()*3), e5b=1+Math.floor(rng()*3);
  var x5a=Math.pow(b5,e5a), x5b=Math.pow(b5,e5b), ans5=e5a-e5b;
  var w5a=e5a+e5b, w5b=e5a*e5b, w5c=ans5+1;
  var r5=shuffleOpts([String(ans5),String(w5a),String(w5b),String(w5c)],String(ans5),rng);
  problems.push({title:'Expandir — cociente',
    questionText:'Expande y evalúa: log<sub>2</sub>(<span class="mf-outer"><span class="mf-num">'+x5a+'</span><span class="mf-den">'+x5b+'</span></span>)',
    fn:'log(A/B) = log(A) − log(B)',
    hint:'Separa: log<sub>2</sub>('+x5a+') − log<sub>2</sub>('+x5b+'). Evalúa cada parte por separado.',
    options:r5.opts,correctIdx:r5.correctIdx,
    explanation:'log<sub>2</sub>('+x5a+') − log<sub>2</sub>('+x5b+') = '+e5a+' − '+e5b+' = '+ans5+'. Verifica: '+x5a+'/'+x5b+' = '+Math.pow(b5,ans5)+' y log<sub>2</sub>('+Math.pow(b5,ans5)+') = '+ans5+' ✓',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* P6 comprimir cociente */
  var b6=2, e6a=4+Math.floor(rng()*3), e6b=1+Math.floor(rng()*2);
  var x6a=Math.pow(b6,e6a), x6b=Math.pow(b6,e6b), ans6=e6a-e6b;
  var w6a=e6a+e6b, w6b=e6a*e6b, w6c=ans6+2;
  var r6=shuffleOpts([String(ans6),String(w6a),String(w6b),String(w6c)],String(ans6),rng);
  problems.push({title:'Comprimir — cociente',
    questionText:'Comprime en un solo logaritmo y evalúa: log<sub>2</sub>('+x6a+') − log<sub>2</sub>('+x6b+')',
    fn:'log(A) − log(B) = log(A/B)',
    hint:'Resta de logs → log de un cociente: log<sub>2</sub>('+x6a+'/'+x6b+'). Simplifica la fracción y evalúa.',
    options:r6.opts,correctIdx:r6.correctIdx,
    explanation:'log<sub>2</sub>('+x6a+'/'+x6b+') = log<sub>2</sub>('+Math.pow(b6,ans6)+') = '+ans6+'. (2<sup>'+ans6+'</sup> = '+Math.pow(b6,ans6)+')',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ────────────────────────────────────────────────
     SECCIÓN 5 — Propiedad de la potencia
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Tercera propiedad</div>'+
    '<h2>Propiedad de la potencia</h2>'+
    '<div class="callout"><p><strong>log<sub>b</sub>(A<sup>n</sup>) = n · log<sub>b</sub>(A)</strong></p></div>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Expandir →</div><div class="rform">log<sub>2</sub>(8³) = 3·log<sub>2</sub>(8) = 3·3 = 9</div></div>'+
      '<div class="rcard"><div class="rname">← Comprimir</div><div class="rform">3·log<sub>2</sub>(8) = log<sub>2</sub>(8³) = log<sub>2</sub>(512) = 9</div></div>'+
    '</div>'
  ));

  /* P7 expandir potencia */
  var bP7=[2,3], b7=bP7[Math.floor(rng()*2)];
  var e7=2+Math.floor(rng()*2), n7=2+Math.floor(rng()*3);
  var x7=Math.pow(b7,e7), ans7=n7*e7;
  var w7a=n7+e7, w7b=e7, w7c=ans7+n7;
  var r7=shuffleOpts([String(ans7),String(w7a),String(w7b),String(w7c)],String(ans7),rng);
  problems.push({title:'Expandir — potencia',
    questionText:'Expande y evalúa: log<sub>'+b7+'</sub>('+x7+'<sup>'+n7+'</sup>)',
    fn:'log(Aⁿ) = n · log(A)',
    hint:'El exponente '+n7+' baja como factor: '+n7+' · log<sub>'+b7+'</sub>('+x7+'). Ahora evalúa log<sub>'+b7+'</sub>('+x7+').',
    options:r7.opts,correctIdx:r7.correctIdx,
    explanation:n7+' · log<sub>'+b7+'</sub>('+x7+') = '+n7+' · '+e7+' = '+ans7+'. ('+b7+'<sup>'+e7+'</sup> = '+x7+')',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* P8 comprimir potencia */
  var bP8=[2,3], b8=bP8[Math.floor(rng()*2)];
  var e8=2+Math.floor(rng()*2), n8=2+Math.floor(rng()*3);
  var x8=Math.pow(b8,e8), ans8=n8*e8;
  var w8a=n8+e8, w8b=e8, w8c=ans8+2;
  var r8=shuffleOpts([String(ans8),String(w8a),String(w8b),String(w8c)],String(ans8),rng);
  problems.push({title:'Comprimir — potencia',
    questionText:'Comprime en un solo logaritmo y evalúa: '+n8+' · log<sub>'+b8+'</sub>('+x8+')',
    fn:'n · log(A) = log(Aⁿ)',
    hint:'El factor '+n8+' sube como exponente: log<sub>'+b8+'</sub>('+x8+'<sup>'+n8+'</sup>) = log<sub>'+b8+'</sub>('+Math.pow(x8,n8)+'). Evalúa.',
    options:r8.opts,correctIdx:r8.correctIdx,
    explanation:'log<sub>'+b8+'</sub>('+x8+'<sup>'+n8+'</sup>) = log<sub>'+b8+'</sub>('+Math.pow(b8,ans8)+') = '+ans8+'. ('+b8+'<sup>'+ans8+'</sup> = '+Math.pow(b8,ans8)+')',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ────────────────────────────────────────────────
     SECCIÓN 6 — Cambio de base + ln
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Cambio de base · Logaritmo natural</div>'+
    '<h2>Cambio de base y el número e</h2>'+
    '<p>Las calculadoras solo tienen log₁₀ y ln(x). Para cualquier otra base usamos:</p>'+
    '<div class="callout"><p><strong>Cambio de base:</strong> &nbsp;log<sub>b</sub>(x) = <span class="mf-outer"><span class="mf-num">ln(x)</span><span class="mf-den">ln(b)</span></span> = <span class="mf-outer"><span class="mf-num">log(x)</span><span class="mf-den">log(b)</span></span></p></div>'+
    '<p><strong>e ≈ 2.71828…</strong> es la base del logaritmo natural ln(x). Se cumple siempre que ln(e<sup>n</sup>) = n y e<sup>ln(x)</sup> = x — se cancelan mutuamente.</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Identidad</div><div class="rform">ln(e) = 1</div><div class="rnote">porque e¹ = e</div></div>'+
      '<div class="rcard"><div class="rname">Identidad</div><div class="rform">ln(eⁿ) = n</div><div class="rnote">ln y e son funciones inversas</div></div>'+
    '</div>'+
    '<p><strong>Ejemplo resuelto:</strong> log<sub>3</sub>(81) = ln(81)/ln(3) = 4.394/1.099 = <strong>4</strong>. &nbsp;(Verifica: 3⁴ = 81 ✓)</p>'
  ));

  /* P9 cambio de base */
  var bP9=[3,4,5], b9=bP9[Math.floor(rng()*3)];
  var e9=2+Math.floor(rng()*3), x9=Math.pow(b9,e9);
  var lnX9=Math.log(x9).toFixed(3), lnB9=Math.log(b9).toFixed(3);
  var w9a=e9+1, w9b=e9-1>0?e9-1:e9+2, w9c=b9;
  var r9=shuffleOpts([String(e9),String(w9a),String(w9b),String(w9c)],String(e9),rng);
  problems.push({title:'Cambio de base',
    questionText:'Calcula log<sub>'+b9+'</sub>('+x9+') usando la fórmula de cambio de base.<br><span style="font-size:.82rem;color:var(--text3)">Datos: ln('+x9+') ≈ '+lnX9+' &nbsp;·&nbsp; ln('+b9+') ≈ '+lnB9+'</span>',
    fn:'log_b(x) = ln(x) / ln(b)',
    hint:'Divide '+lnX9+' ÷ '+lnB9+'. El resultado debe ser un entero exacto.',
    options:r9.opts,correctIdx:r9.correctIdx,
    explanation:'ln('+x9+')/ln('+b9+') = '+lnX9+'/'+lnB9+' = '+e9+'. Verifica: '+b9+'<sup>'+e9+'</sup> = '+x9+' ✓',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ────────────────────────────────────────────────
     EVALUACIÓN FINAL — sin explicación, 3 problemas
     ──────────────────────────────────────────────── */
  lb.appendChild(sec(
    '<div class="stag">Evaluación final</div>'+
    '<h2>Pon a prueba lo que aprendiste</h2>'+
    '<p>Los siguientes tres problemas combinan varias propiedades. No hay explicación adicional — usa tus notas y lo que practicaste.</p>'
  ));

  /* P10 combinación cociente + potencia — expandir */
  var b10=2, eA=2+Math.floor(rng()*2), eB=1+Math.floor(rng()*2), n10=2+Math.floor(rng()*2);
  var xA=Math.pow(b10,eA), xB=Math.pow(b10,eB);
  var ans10=n10*eA-eB;
  var w10a=n10*eA+eB, w10b=n10*(eA-eB)||ans10+3, w10c=ans10+2;
  var r10=shuffleOpts([String(ans10),String(w10a),String(w10b),String(w10c)],String(ans10),rng);
  problems.push({title:'Combinación: expandir potencia y cociente',
    questionText:'Expande y evalúa: log<sub>2</sub>(<span class="mf-outer"><span class="mf-num">'+xA+'<sup>'+n10+'</sup></span><span class="mf-den">'+xB+'</span></span>)',
    fn:'Aplica primero cociente, luego potencia.',
    hint:'Paso 1: log<sub>2</sub>('+xA+'<sup>'+n10+'</sup>) − log<sub>2</sub>('+xB+'). &nbsp;Paso 2: baja el exponente '+n10+'. &nbsp;Paso 3: evalúa cada log.',
    options:r10.opts,correctIdx:r10.correctIdx,
    explanation:n10+'·log<sub>2</sub>('+xA+') − log<sub>2</sub>('+xB+') = '+n10+'·'+eA+' − '+eB+' = '+n10*eA+' − '+eB+' = '+ans10+'.',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* P11 comprimir tres términos */
  var b11=2, eP=2+Math.floor(rng()*2), eQ=1+Math.floor(rng()*2), eR=1+Math.floor(rng()*2);
  var xP=Math.pow(b11,eP), xQ=Math.pow(b11,eQ), xR=Math.pow(b11,eR);
  var n11=2+Math.floor(rng()*2);
  var ans11=n11*eP+eQ-eR;
  if(ans11<=0){eR=1;ans11=n11*eP+eQ-1;xR=Math.pow(b11,eR=1);}
  var w11a=n11*eP+eQ+eR, w11b=n11*(eP+eQ)-eR, w11c=ans11+2;
  var r11=shuffleOpts([String(ans11),String(w11a),String(w11b),String(w11c)],String(ans11),rng);
  problems.push({title:'Comprimir: tres términos',
    questionText:'Comprime en un solo logaritmo y evalúa: '+n11+'·log<sub>2</sub>('+xP+') + log<sub>2</sub>('+xQ+') − log<sub>2</sub>('+xR+')',
    fn:'n·log(A) + log(B) − log(C) = log(Aⁿ·B/C)',
    hint:'Paso 1: sube el '+n11+' como exponente → log<sub>2</sub>('+Math.pow(xP,n11)+'). &nbsp;Paso 2: une el positivo → log<sub>2</sub>('+Math.pow(xP,n11)*xQ+'). &nbsp;Paso 3: resta el negativo y evalúa.',
    options:r11.opts,correctIdx:r11.correctIdx,
    explanation:'log<sub>2</sub>('+Math.pow(xP,n11)+'·'+xQ+'/'+xR+') = log<sub>2</sub>('+Math.pow(b11,ans11)+') = '+ans11+'. (2<sup>'+ans11+'</sup> = '+Math.pow(b11,ans11)+')',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* P12 identidad ln */
  var n12=2+Math.floor(rng()*7);
  var r12=shuffleOpts([String(n12),String(n12+1),String(n12-1>0?n12-1:n12+2),'e<sup>'+n12+'</sup>'],String(n12),rng);
  problems.push({title:'Identidad del logaritmo natural',
    questionText:'¿Cuánto vale ln(e<sup>'+n12+'</sup>)?',
    fn:'ln(eⁿ) = n  — ln y e son funciones inversas.',
    hint:'ln y e^x se cancelan mutuamente, igual que raíz cuadrada y cuadrado.',
    options:r12.opts,correctIdx:r12.correctIdx,
    explanation:'ln(e<sup>n</sup>) = n siempre. Por lo tanto ln(e<sup>'+n12+'</sup>) = '+n12+'.',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);
}
</script>
</body>
</html>
