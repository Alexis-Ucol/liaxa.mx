<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Circunferencia — Matemáticas 4° Semestre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Prepa Anáhuac Colima ── */
:root {
  --green:      #3A6E2A;   /* PRIMARY  — verde Universidad de Colima  */
  --green-dark: #285020;   /* PRIMARY dark (~15% más oscuro) */
  --green-bg:   #eaf3e6;   /* PRIMARY tint (~85% más claro) */
  --gold:       #C9A84C;   /* ACCENT   — dorado UdeC */
  --gold-bg:    #faf3e0;   /* ACCENT tint */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #5aa040;
  --green-dark: #7abb60;
  --green-bg:   #0e1f0a;
  --gold:       #d9b86c;
  --gold-bg:    #221a08;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:80px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:36px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── EXPLORER ── */
.explorer-wrap { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.2rem; margin:1rem 0; }
.explorer-canvas { display:block; width:100%; height:320px; border-radius:8px; border:1px solid var(--border); background:#fafafa; }
.explorer-controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.8rem; margin-top:.9rem; }
@media(max-width:500px){ .explorer-controls { grid-template-columns:1fr; } }
.ctrl-group { display:flex; flex-direction:column; gap:.3rem; }
.ctrl-group label { font-size:.72rem; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; }
.ctrl-group input[type=range] { width:100%; accent-color:var(--green); }
.ctrl-val { font-family:'IBM Plex Mono',monospace; font-size:.88rem; font-weight:600; color:var(--green); }
.eq-display { margin-top:.9rem; background:var(--green-bg); border-radius:8px; padding:.7rem 1rem; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:.95rem; color:var(--green-dark); font-weight:600; letter-spacing:.02em; }

/* ── POINT CHECKER ── */
.pt-checker { background:var(--surface2); border-radius:10px; padding:1rem; margin:1rem 0; display:flex; flex-wrap:wrap; gap:.6rem; align-items:flex-end; }
.pt-checker label { font-size:.74rem; color:var(--text3); display:block; margin-bottom:.2rem; }
.pt-checker input[type=number] { width:70px; padding:.45rem .55rem; border:1.5px solid var(--border); border-radius:6px; font-size:.9rem; font-family:'IBM Plex Mono',monospace; background:var(--surface); color:var(--text); }
.pt-checker button { padding:.5rem 1rem; background:var(--gold); color:#fff; border:none; border-radius:7px; font-size:.82rem; font-weight:600; cursor:pointer; }
.pt-checker button:hover { opacity:.88; }
.pt-result { width:100%; font-size:.84rem; font-weight:600; padding:.45rem .7rem; border-radius:6px; display:none; }
.pt-result.inside { background:var(--ok-bg); color:var(--ok); display:block; }
.pt-result.on     { background:var(--green-bg); color:var(--green-dark); display:block; }
.pt-result.outside{ background:var(--gold-bg); color:var(--gold); display:block; }

/* ── STEP TABLE ── */
.step-table { width:100%; border-collapse:collapse; font-size:.84rem; margin:1rem 0; }
.step-table th { background:var(--green); color:#fff; padding:.55rem .8rem; text-align:left; font-weight:600; font-size:.76rem; }
.step-table td { padding:.55rem .8rem; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:top; }
.step-table tr:nth-child(even) td { background:var(--surface2); }
.step-num { background:var(--gold); color:#fff; border-radius:50%; width:20px; height:20px; display:inline-flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 42px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .explorer-canvas { height: 250px; }
}

/* ── DRAG-AND-DROP STEP TILES ── */
.tile-bank { display:flex; flex-wrap:wrap; gap:.45rem; padding:.75rem; background:var(--surface2); border-radius:8px; border:1px solid var(--border); margin-bottom:.7rem; min-height:44px; }
.tile { display:inline-flex; align-items:center; justify-content:center; padding:.3rem .7rem; background:var(--gold); color:#fff; border-radius:6px; font-family:'IBM Plex Mono',monospace; font-size:.78rem; font-weight:600; cursor:grab; user-select:none; transition:opacity .15s, transform .12s; white-space:nowrap; }
.tile:active { cursor:grabbing; opacity:.7; transform:scale(.96); }
.tile.used { opacity:.3; cursor:default; pointer-events:none; }
.drop-row { display:flex; align-items:center; gap:.5rem; margin:.35rem 0; flex-wrap:wrap; }
.drop-label { font-size:.76rem; color:var(--text3); min-width:38px; flex-shrink:0; }
.drop-zone { min-width:180px; min-height:36px; padding:.3rem .6rem; border:2px dashed var(--border); border-radius:6px; background:var(--surface); display:flex; align-items:center; flex-wrap:wrap; gap:.3rem; transition:border-color .15s, background .15s; font-family:'IBM Plex Mono',monospace; font-size:.78rem; }
.drop-zone.drag-over { border-color:var(--green); background:var(--green-bg); }
.drop-zone.correct { border-color:var(--ok); background:var(--ok-bg); border-style:solid; }
.drop-zone.wrong   { border-color:var(--bad); background:var(--bad-bg); border-style:solid; }
.drop-zone .tile { background:var(--gold); color:#fff; cursor:pointer; }
.drop-zone .tile:hover { opacity:.75; }
.step-verify-btn { padding:.38rem .85rem; background:var(--green); color:#fff; border:none; border-radius:7px; font-size:.78rem; font-weight:600; cursor:pointer; margin-top:.5rem; }
.step-verify-btn:hover { background:var(--green-dark); }
.step-fb { display:none; font-size:.8rem; margin-top:.4rem; padding:.4rem .7rem; border-radius:6px; }
.step-fb.ok  { display:block; background:var(--ok-bg);  color:var(--ok); }
.step-fb.bad { display:block; background:var(--bad-bg); color:var(--bad); }
</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">

<script>
/* ================================================
   STATE
   ================================================ */
var studentData   = {};
var problems      = [];

/* ================================================
   SESSION PERSISTENCE
   ================================================ */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'circ_udec__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = 'circ_udec__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() { var dpr = window.devicePixelRatio||1; dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr); };
        img.src = dataUrl;
      });
    }
    if (saved.texts) saved.texts.forEach(function(text,i){ var ta=document.getElementById('ta'+i); if(ta&&text) ta.value=text; });
    if (saved.photos) saved.photos.forEach(function(dataUrl,i){ if(!dataUrl) return; var pp=document.getElementById('pp'+i); if(!pp) return; pp.src=dataUrl; pp.style.display='block'; var pz=document.getElementById('pz'+i); if(pz) pz.style.opacity='0.4'; });
  }, 300);
}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  if (!name || !group) { document.getElementById('restoreBar').style.display = 'none'; return; }
  var saved = loadSession(name, group);
  var bar = document.getElementById('restoreBar');
  bar.style.display = (saved && saved.choices && saved.choices.some(function(c){ return c !== null; })) ? 'block' : 'none';
}
var answeredCount = 0;
var correctCount  = 0;

/* ================================================
   THEME
   ================================================ */
var THEME_KEY = 'circ_udec__theme';
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
}
(function() {
  document.documentElement.setAttribute('data-theme', 'light');
  try {
    var t = localStorage.getItem(THEME_KEY);
    if (t === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.addEventListener('DOMContentLoaded', function() {
        var b = document.getElementById('themeBtn'); if (b) b.textContent = '☀️';
      });
    }
  } catch(e) {}
})();

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var tmp = a[i]; a[i] = a[j]; a[j] = tmp; }
  return a;
}
function ri(min, max, rng) { return min + Math.floor(rng() * (max - min + 1)); }
function rSign(rng) { return rng() < 0.5 ? 1 : -1; }

/* ================================================
   START
   ================================================ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor llena ambos campos.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#3A6E2A';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) { var r = canvas.getBoundingClientRect(); var src = e.touches ? e.touches[0] : e; return [src.clientX - r.left, src.clientY - r.top]; }
  function onDown(e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e) { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()    { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {

/* ================================================
   MC HANDLERS
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   EXPLORER (Sección 2)
   ================================================ */
function initExplorer() {
  var canvas = document.getElementById('explorerCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth;
  var H = canvas.offsetHeight;
  canvas.width  = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

  function drawCircle() {
    var h = parseFloat(document.getElementById('slH').value);
    var k = parseFloat(document.getElementById('slK').value);
    var r = parseFloat(document.getElementById('slR').value);
    document.getElementById('valH').textContent = h;
    document.getElementById('valK').textContent = k;
    document.getElementById('valR').textContent = r;

    var sign_h = h < 0 ? '+' + Math.abs(h) : h > 0 ? '−' + h : '';
    var sign_k = k < 0 ? '+' + Math.abs(k) : k > 0 ? '−' + k : '';
    var eq = '(x ' + sign_h + ')² + (y ' + sign_k + ')² = ' + r + '²';
    if (h === 0 && k === 0) eq = 'x² + y² = ' + r + '²';
    else if (h === 0)       eq = 'x² + (y ' + sign_k + ')² = ' + r + '²';
    else if (k === 0)       eq = '(x ' + sign_h + ')² + y² = ' + r + '²';
    document.getElementById('eqDisplay').textContent = eq;

    ctx.clearRect(0, 0, W, H);

    // Grid
    var scale = Math.min(W, H) / 22;
    var cx = W / 2; var cy = H / 2;
    ctx.strokeStyle = '#ddd8cc'; ctx.lineWidth = 0.5;
    for (var gx = -11; gx <= 11; gx++) {
      ctx.beginPath(); ctx.moveTo(cx + gx * scale, 0); ctx.lineTo(cx + gx * scale, H); ctx.stroke();
    }
    for (var gy = -11; gy <= 11; gy++) {
      ctx.beginPath(); ctx.moveTo(0, cy + gy * scale); ctx.lineTo(W, cy + gy * scale); ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = '#4a4640'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
    ctx.fillStyle = '#4a4640'; ctx.font = '10px IBM Plex Mono';
    ctx.fillText('x', W - 12, cy - 6);
    ctx.fillText('y', cx + 6, 14);

    // Axis labels
    ctx.fillStyle = '#7a7468'; ctx.font = '9px IBM Plex Mono';
    for (var n = -10; n <= 10; n += 2) {
      if (n === 0) continue;
      ctx.fillText(n, cx + n * scale - 4, cy + 12);
      ctx.fillText(n, cx + 4, cy - n * scale + 3);
    }

    // Center point
    var pcx = cx + h * scale;
    var pcy = cy - k * scale;
    ctx.fillStyle = '#C9A84C';
    ctx.beginPath(); ctx.arc(pcx, pcy, 5, 0, 2*Math.PI); ctx.fill();
    ctx.fillStyle = '#C9A84C'; ctx.font = 'bold 11px IBM Plex Mono';
    ctx.fillText('C(' + h + ',' + k + ')', pcx + 7, pcy - 6);

    // Radius line
    ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 1.2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(pcx, pcy); ctx.lineTo(pcx + r * scale, pcy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#C9A84C'; ctx.font = '10px IBM Plex Mono';
    ctx.fillText('r=' + r, pcx + r * scale / 2 - 8, pcy - 5);

    // Circle
    ctx.strokeStyle = '#3A6E2A'; ctx.lineWidth = 2.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(pcx, pcy, r * scale, 0, 2 * Math.PI); ctx.stroke();
  }

  ['slH','slK','slR'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', drawCircle);
  });
  drawCircle();
}

/* ================================================
   POINT CHECKER (Sección 5)
   ================================================ */
function checkPoint() {
  var h = window._circH || 0;
  var k = window._circK || 0;
  var r = window._circR || 4;
  var px = parseFloat(document.getElementById('ptX').value);
  var py = parseFloat(document.getElementById('ptY').value);
  if (isNaN(px) || isNaN(py)) { document.getElementById('ptResult').className='pt-result'; return; }
  var d2 = (px-h)*(px-h) + (py-k)*(py-k);
  var r2 = r * r;
  var res = document.getElementById('ptResult');
  if (Math.abs(d2 - r2) < 0.01) {
    res.textContent = '📍 El punto (' + px + ', ' + py + ') está SOBRE la circunferencia.';
    res.className = 'pt-result on';
  } else if (d2 < r2) {
    res.textContent = '✅ El punto (' + px + ', ' + py + ') está DENTRO de la circunferencia.';
    res.className = 'pt-result inside';
  } else {
    res.textContent = '🔵 El punto (' + px + ', ' + py + ') está FUERA de la circunferencia.';
    res.className = 'pt-result outside';
  }
}

        doc.addImage(imgD,'PNG',M,wy,iw,ih); wy += ih+4;
      } catch(e) {}
    }
    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) { if (wy > PH-15) { doc.addPage(); wy=20; } doc.text(ln,M,wy); wy+=5; });
      wy += 2;
    }
    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy=20; }
      try { doc.addImage(pp.src,'JPEG',M,wy,TW,68); wy+=72; } catch(e) {}
    }
  }

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages, PW/2, PH-5, {align:'center'});
  }
  doc.save('circunferencia_anahuac_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;
}

/* ================================================
   DRAG-AND-DROP TILE ENGINE
   ================================================ */
function initTileDrag(bankId, dropZoneIds) {
  var bank = document.getElementById(bankId);
  if (!bank) return;
  var dragging = null;

  function addTileListeners(tile) {
    tile.addEventListener('dragstart', function(e) {
      dragging = tile;
      setTimeout(function() { tile.style.opacity = '0.4'; }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    tile.addEventListener('dragend', function() {
      tile.style.opacity = '';
      dragging = null;
    });
    // Touch support
    tile.addEventListener('touchstart', function(e) {
      dragging = tile;
      tile.style.opacity = '0.5';
      e.preventDefault();
    }, { passive: false });
    tile.addEventListener('touchend', function(e) {
      tile.style.opacity = '';
      var touch = e.changedTouches[0];
      var target = document.elementFromPoint(touch.clientX, touch.clientY);
      var dz = target ? target.closest('.drop-zone') : null;
      if (dz && dropZoneIds.indexOf(dz.id) !== -1) {
        dz.appendChild(tile);
      } else {
        bank.appendChild(tile);
      }
      dragging = null;
    }, { passive: false });
    // Click on tile in drop zone → return to bank
    tile.addEventListener('click', function() {
      if (tile.parentElement && tile.parentElement.classList.contains('drop-zone')) {
        bank.appendChild(tile);
      }
    });
  }

  // Setup tiles in bank
  bank.querySelectorAll('.tile').forEach(function(tile) {
    addTileListeners(tile);
  });

  // Setup drop zones
  dropZoneIds.forEach(function(id) {
    var dz = document.getElementById(id);
    if (!dz) return;
    dz.addEventListener('dragover', function(e) {
      e.preventDefault();
      dz.classList.add('drag-over');
      e.dataTransfer.dropEffect = 'move';
    });
    dz.addEventListener('dragleave', function() {
      dz.classList.remove('drag-over');
    });
    dz.addEventListener('drop', function(e) {
      e.preventDefault();
      dz.classList.remove('drag-over');
      if (dragging) {
        dz.appendChild(dragging);
        dragging = null;
      }
    });
  });

  // Bank also accepts drop (return tiles)
  bank.addEventListener('dragover', function(e) { e.preventDefault(); });
  bank.addEventListener('drop', function(e) {
    e.preventDefault();
    if (dragging) { bank.appendChild(dragging); dragging = null; }
  });
}

/* ================================================
   BUILD LESSON
   ================================================ */
function buildLesson(rng) {
  var body = document.getElementById('lessonBody');

  /* ─────────────────────────────────────
     SECCIÓN 1 — ¿Qué es una circunferencia?
  ───────────────────────────────────── */
  var s1 = document.createElement('div');
  s1.className = 'section';
  s1.innerHTML =
    '<div class="stag">Sección 1 — Concepto</div>' +
    '<h2>¿Qué es una circunferencia?</h2>' +
    '<p>Una <strong>circunferencia</strong> es el conjunto de todos los puntos del plano que se encuentran a una misma distancia — llamada <strong>radio</strong> — de un punto fijo llamado <strong>centro</strong>.</p>' +
    '<p>Nota importante: la <em>circunferencia</em> es solo la curva (el borde). El <em>círculo</em> incluye también el interior. En esta guía trabajamos con la circunferencia.</p>' +
    '<div class="callout">' +
      '<strong>Elementos esenciales</strong>' +
      '<ul style="margin-top:.5rem;padding-left:1.3rem;color:var(--text2);line-height:2">' +
        '<li><strong>Centro C(h, k)</strong> — el punto fijo interior de la circunferencia. <em>h</em> es la coordenada en el eje x, y <em>k</em> es la coordenada en el eje y; es decir, C(h, k) = C(x del centro, y del centro)</li>' +
        '<li><strong>Radio r</strong> — distancia del centro a cualquier punto de la curva</li>' +
        '<li><strong>Diámetro d = 2r</strong> — la cuerda que pasa por el centro (la más larga posible)</li>' +
      '</ul>' +
    '</div>' +
    '<p>La animación siguiente traza la circunferencia punto a punto, mostrando que cada punto está exactamente a distancia <em>r</em> del centro:</p>' +
    '<div class="gcrd">' +
      '<canvas id="animCanvas" width="320" height="320" style="display:block;max-width:100%;margin:0 auto;border-radius:8px;border:1px solid var(--border);background:#fff"></canvas>' +
      '<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:.8rem;justify-content:center">' +
        '<div style="display:flex;flex-direction:column;align-items:flex-start;gap:.25rem">' +
          '<label style="font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Radio r</label>' +
          '<input type="range" id="animR" min="40" max="115" value="110" step="5" style="width:160px;accent-color:var(--green)" oninput="document.getElementById(\'animRVal\').textContent=Math.round(this.value/11)">' +
          '<span style="font-size:.8rem;color:var(--green);font-family:IBM Plex Mono,monospace">r = <span id="animRVal">10</span> u</span>' +
        '</div>' +
        '<button onclick="restartAnim()" style="padding:.38rem .9rem;background:var(--green);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:600">▶ Activar</button>' +
      '</div>' +
    '</div>' +
    '<div class="callout" style="margin-top:.8rem">' +
      '<strong>Propiedad clave:</strong><p>Sin importar qué punto P escojas sobre la circunferencia, la distancia del centro C a ese punto P — que escribimos como <strong>CP</strong> — siempre es exactamente igual a r. Esta igualdad es la definición misma de circunferencia.</p>' +
    '</div>';
  body.appendChild(s1);

  // Animation
  setTimeout(function() {
    var c = document.getElementById('animCanvas');
    if (!c) return;
    var ctx = c.getContext('2d');
    var cx = 160, cy = 160, step = 0, total = 360, anim;
    function getAnimR() {
      var sl = document.getElementById('animR');
      return sl ? parseInt(sl.value) : 110;
    }
    function drawFrame() {
      var R = getAnimR();
      ctx.clearRect(0,0,320,320);
      // Grid
      ctx.strokeStyle='#f0ede6'; ctx.lineWidth=0.8;
      for(var g=-5;g<=5;g++){ctx.beginPath();ctx.moveTo(cx+g*22,0);ctx.lineTo(cx+g*22,320);ctx.stroke();ctx.beginPath();ctx.moveTo(0,cy+g*22);ctx.lineTo(320,cy+g*22);ctx.stroke();}
      // Axes
      ctx.strokeStyle='#b0aa9e'; ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(320,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,320);ctx.stroke();
      // Axis end labels
      ctx.fillStyle='#4a4640'; ctx.font='10px IBM Plex Mono';
      ctx.fillText('x', 308, cy-6); ctx.fillText('y', cx+6, 12);
      // Tick labels every 2 units
      ctx.fillStyle='#7a7468'; ctx.font='9px IBM Plex Mono';
      for(var tn=-5;tn<=5;tn++){
        if(tn===0) continue;
        ctx.fillText(tn*2, cx+tn*22-4, cy+12);
        ctx.fillText(-(tn*2), cx+4, cy+tn*22+3);
      }
      // Label r value on canvas
      var rVal = Math.round(R/11);
      ctx.fillStyle='#7a7468'; ctx.font='10px IBM Plex Mono';
      ctx.fillText('r = '+rVal+' u', 8, 18);
      // Partial arc
      ctx.beginPath();
      ctx.arc(cx,cy,R,(-90)*Math.PI/180,(-90+step)*Math.PI/180);
      ctx.strokeStyle='#3A6E2A'; ctx.lineWidth=2.5; ctx.stroke();
      // Moving point
      var angle = (-90+step)*Math.PI/180;
      var px = cx + R*Math.cos(angle), py = cy + R*Math.sin(angle);
      // Radius line
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,py);
      ctx.strokeStyle='#C9A84C'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.stroke();
      ctx.setLineDash([]);
      // Dot on curve
      ctx.beginPath(); ctx.arc(px,py,5,0,2*Math.PI); ctx.fillStyle='#3A6E2A'; ctx.fill();
      // Center
      ctx.beginPath(); ctx.arc(cx,cy,5,0,2*Math.PI); ctx.fillStyle='#C9A84C'; ctx.fill();
      ctx.fillStyle='#C9A84C'; ctx.font='bold 12px IBM Plex Mono'; ctx.fillText('C',cx+7,cy-7);
      // Radius label midpoint
      var mx=(cx+px)/2, my=(cy+py)/2;
      ctx.fillStyle='#C9A84C'; ctx.font='11px IBM Plex Mono'; ctx.fillText('r',mx+4,my-4);
      // P label on moving dot
      ctx.fillStyle='#c45e0a'; ctx.font='bold 11px IBM Plex Mono';
      ctx.fillText('P',px+6,py-5);
    }
    function animate() {
      if (step >= total) { step = total; drawFrame(); return; }
      step += 2;
      drawFrame();
      anim = requestAnimationFrame(animate);
    }
    function drawStaticGrid() {
      var R = getAnimR();
      ctx.clearRect(0,0,320,320);
      // Grid
      ctx.strokeStyle='#f0ede6'; ctx.lineWidth=0.8;
      for(var g=-5;g<=5;g++){ctx.beginPath();ctx.moveTo(cx+g*22,0);ctx.lineTo(cx+g*22,320);ctx.stroke();ctx.beginPath();ctx.moveTo(0,cy+g*22);ctx.lineTo(320,cy+g*22);ctx.stroke();}
      // Axes
      ctx.strokeStyle='#b0aa9e'; ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(320,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,320);ctx.stroke();
      // Axis labels
      ctx.fillStyle='#4a4640'; ctx.font='10px IBM Plex Mono';
      ctx.fillText('x', 308, cy-6); ctx.fillText('y', cx+6, 12);
      // Tick labels every 2 units
      ctx.fillStyle='#7a7468'; ctx.font='9px IBM Plex Mono';
      for(var n=-5;n<=5;n++){
        if(n===0) continue;
        var tx=cx+n*22, ty=cy+n*22;
        ctx.fillText(n*2, tx-4, cy+12);
        ctx.fillText(-(n*2), cx+4, ty+3);
      }
      // r value label
      var rVal = Math.round(R/11);
      ctx.fillStyle='#7a7468'; ctx.font='10px IBM Plex Mono';
      ctx.fillText('r = '+rVal+' u', 8, 18);
      // Center dot
      ctx.beginPath();ctx.arc(cx,cy,4,0,2*Math.PI);ctx.fillStyle='#C9A84C';ctx.fill();
      ctx.fillStyle='#C9A84C';ctx.font='bold 12px IBM Plex Mono';ctx.fillText('C',cx+7,cy-7);
      // Instruction
      ctx.fillStyle='#b0aa9e'; ctx.font='11px IBM Plex Mono';
      ctx.fillText('Presiona ▶ Activar', cx-70, cy+30);
    }
    drawStaticGrid();

    window.restartAnim = function() { step=0; if(anim) cancelAnimationFrame(anim); animate(); };
    // Do NOT auto-start — wait for button click
  }, 200);

  /* ─── Problema 1 ─── */
  // RNG values for P1
  var p1choices = [
    { q:'¿Cuál de los siguientes enunciados define correctamente a la circunferencia?', opts:['Conjunto de puntos a igual distancia de un punto fijo','El área encerrada por una curva cerrada','Cualquier curva cerrada en el plano','La recta que toca una curva en un punto'], ans:0, exp:'La circunferencia es por definición el lugar geométrico de todos los puntos del plano equidistantes de un punto fijo (el centro). Las demás opciones describen otras figuras.', hint:'Recuerda la palabra clave: equidistante.' },
    { q:'Si el diámetro de una circunferencia mide 14 cm, ¿cuánto mide su radio?', opts:['7 cm','14 cm','28 cm','3.5 cm'], ans:0, exp:'El radio es la mitad del diámetro: r = d/2 = 14/2 = 7 cm.', hint:'d = 2r, por lo tanto r = d/2.' },
    { q:'¿Qué distingue a la circunferencia del círculo?', opts:['La circunferencia es solo la curva; el círculo incluye el interior','El círculo es solo la curva; la circunferencia incluye el interior','Son exactamente lo mismo','El radio no pertenece a la circunferencia'], ans:0, exp:'La circunferencia es únicamente la curva (el borde). El círculo es la región plana delimitada por esa curva, que incluye el interior.', hint:'Piensa en el aro de un balón de básquetbol vs. el balón completo.' }
  ];
  var p1data = p1choices[Math.floor(rng() * p1choices.length)];
  var p1opts = p1data.opts.slice();
  var p1correct = p1data.ans;
  var p1shuffled = shuffle(p1opts.map(function(o,i){return {t:o,idx:i};}), rng);
  var p1newCorrect = p1shuffled.findIndex(function(x){return x.idx===p1correct;});
  problems.push({ title:'Identificación de conceptos', questionText:p1data.q, fn:'', options:p1shuffled.map(function(x){return x.t;}), correctIdx:p1newCorrect, explanation:p1data.exp, hint:p1data.hint, studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─────────────────────────────────────
     SECCIÓN 2 — Centro en el origen
  ───────────────────────────────────── */
  var s2 = document.createElement('div');
  s2.className = 'section';
  s2.innerHTML =
    '<div class="stag">Sección 2 — Ecuación Ordinaria: Caso del Origen</div>' +
    '<h2>Circunferencia con centro en el origen</h2>' +
    '<p>El caso más sencillo ocurre cuando el centro está exactamente en el origen del plano, es decir, C(0, 0). En ese caso <em>h = 0</em> y <em>k = 0</em>.</p>' +
    '<p>La distancia del origen a cualquier punto P(x, y) de la curva es siempre igual al radio:</p>' +
    '<div class="callout">' +
      '<strong>Derivación:</strong>' +
      '<p style="font-family:\'IBM Plex Mono\',monospace;margin-top:.4rem">distancia(O, P) = r</p>' +
      '<p style="font-family:\'IBM Plex Mono\',monospace">√(x² + y²) = r</p>' +
      '<p style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:1.1rem;margin-top:.4rem;color:var(--green-dark)">x² + y² = r²</p>' +
    '</div>' +
    '<p><strong>Ejemplo:</strong> una circunferencia con centro en el origen y radio r = 5 tiene la ecuación:</p>' +
    '<div class="callout" style="text-align:center">' +
      '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:1.1rem;font-weight:700">x² + y² = 25</span>' +
      '<p style="margin-top:.4rem">Porque r² = 5² = 25. Cualquier punto que satisfaga esta ecuación está sobre la circunferencia.</p>' +
    '</div>' +
    '<p>Verifica: ¿pertenece P(3, 4) a la circunferencia? 3² + 4² = 9 + 16 = 25 ✓</p>';
  body.appendChild(s2);

  /* ─── Problema 2 ─── */
  var p2r = ri(2,9,rng);
  var p2r2 = p2r * p2r;
  // generate a point ON the circle using a pythagorean triple or simple axis point
  var p2ptOpts = [{x:p2r,y:0},{x:0,y:p2r},{x:-p2r,y:0},{x:0,y:-p2r}];
  var p2pt = p2ptOpts[Math.floor(rng()*p2ptOpts.length)];
  var p2correct_str = 'x² + y² = ' + p2r2;
  var p2wrong1 = 'x² + y² = ' + p2r;
  var p2wrong2 = 'x + y = ' + p2r2;
  var p2wrong3 = 'x² + y² = ' + (p2r2 * 2);
  var p2optsRaw = [p2correct_str, p2wrong1, p2wrong2, p2wrong3];
  var p2shuffled = shuffle(p2optsRaw.map(function(o,i){return {t:o,idx:i};}), rng);
  var p2correctIdx = p2shuffled.findIndex(function(x){return x.idx===0;});
  var p2q = 'Una circunferencia tiene su centro en el origen C(0, 0) y radio r = ' + p2r + '. ¿Cuál es su ecuación ordinaria?';
  problems.push({ title:'Ecuación: centro en el origen', questionText:p2q, fn:'x²+y²=r²', options:p2shuffled.map(function(x){return x.t;}), correctIdx:p2correctIdx, explanation:'Con centro en el origen la ecuación es x²+y²=r². Sustituimos r='+p2r+': x²+y²='+p2r2+'. Siempre se escribe r² ('+p2r2+'), no r ('+p2r+').', hint:'La ecuación del origen es simplemente x²+y²=r². Recuerda elevar el radio al cuadrado.', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─────────────────────────────────────
     SECCIÓN 2B — Centro en cualquier punto + explorador
  ───────────────────────────────────── */
  var s2b = document.createElement('div');
  s2b.className = 'section';
  s2b.innerHTML =
    '<div class="stag">Sección 2b — Ecuación Ordinaria: Centro en Cualquier Punto</div>' +
    '<h2>Circunferencia con centro en C(h, k)</h2>' +
    '<p>Cuando el centro NO está en el origen sino en un punto genérico C(h, k), usamos la <strong>fórmula de la distancia</strong> entre el centro y un punto P(x, y) de la curva:</p>' +
    '<div class="callout">' +
      '<strong>Derivación:</strong>' +
      '<p style="font-family:\'IBM Plex Mono\',monospace;margin-top:.4rem">distancia(C, P) = r</p>' +
      '<p style="font-family:\'IBM Plex Mono\',monospace">√[(x − h)² + (y − k)²] = r</p>' +
      '<p style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:1.1rem;margin-top:.4rem;color:var(--green-dark)">(x − h)² + (y − k)² = r²</p>' +
    '</div>' +
    '<p>Observa los signos cuidadosamente: si el centro es C(<strong>3</strong>, <strong>−2</strong>), la ecuación tiene <code>(x − 3)² + (y + 2)²</code> porque y − (−2) = y + 2.</p>' +
    '<p><strong>Ejemplo construido paso a paso:</strong> C(4, −1), r = 3</p>' +
    '<table class="step-table">' +
      '<tr><th>Paso</th><th>Qué hacemos</th><th>Resultado</th></tr>' +
      '<tr><td><span class="step-num">1</span></td><td>Identificar h, k, r</td><td>h = 4, k = −1, r = 3</td></tr>' +
      '<tr><td><span class="step-num">2</span></td><td>Sustituir en (x−h)²+(y−k)²=r²</td><td>(x−4)²+(y−(−1))²=3²</td></tr>' +
      '<tr><td><span class="step-num">3</span></td><td>Simplificar signos</td><td>(x−4)²+(y+1)²=9</td></tr>' +
    '</table>' +
    '<p><strong>Explorador interactivo:</strong> mueve los controles y observa cómo la gráfica y la ecuación cambian en tiempo real:</p>' +
    '<div class="explorer-wrap">' +
      '<canvas id="explorerCanvas" class="explorer-canvas"></canvas>' +
      '<div class="explorer-controls">' +
        '<div class="ctrl-group"><label>Centro h (eje x)</label><input type="range" id="slH" min="-5" max="5" value="2" step="1"><span>h = <span class="ctrl-val" id="valH">2</span></span></div>' +
        '<div class="ctrl-group"><label>Centro k (eje y)</label><input type="range" id="slK" min="-5" max="5" value="1" step="1"><span>k = <span class="ctrl-val" id="valK">1</span></span></div>' +
        '<div class="ctrl-group"><label>Radio r</label><input type="range" id="slR" min="1" max="8" value="3" step="1"><span>r = <span class="ctrl-val" id="valR">3</span></span></div>' +
      '</div>' +
      '<div class="eq-display" id="eqDisplay">(x − 2)² + (y − 1)² = 3²</div>' +
    '</div>';
  body.appendChild(s2b);
  setTimeout(initExplorer, 150);

  /* ─── Problema 2b ─── */
  var p2bh = ri(1,5,rng) * rSign(rng);
  var p2bk = ri(1,5,rng) * rSign(rng);
  var p2br = ri(2,7,rng);
  var p2br2 = p2br * p2br;
  function fmtTerm(val) { return val > 0 ? '− ' + val : '+ ' + Math.abs(val); }
  var p2bc = '(x ' + fmtTerm(p2bh) + ')² + (y ' + fmtTerm(p2bk) + ')² = ' + p2br2;
  var p2bw1 = '(x + ' + Math.abs(p2bh) + ')² + (y + ' + Math.abs(p2bk) + ')² = ' + p2br2;
  var p2bw2 = '(x ' + fmtTerm(p2bh) + ')² + (y ' + fmtTerm(p2bk) + ')² = ' + p2br;
  var p2bw3 = '(x − ' + Math.abs(p2bh) + ')² + (y − ' + Math.abs(p2bk) + ')² = ' + p2br2;
  var p2bRaw = [p2bc, p2bw1, p2bw2, p2bw3];
  var p2bShuf = shuffle(p2bRaw.map(function(o,i){return{t:o,idx:i};}), rng);
  var p2bCI = p2bShuf.findIndex(function(x){return x.idx===0;});
  problems.push({ title:'Ecuación ordinaria: centro en C(h,k)', questionText:'Escribe la ecuación ordinaria de la circunferencia con centro C(' + p2bh + ', ' + p2bk + ') y radio r = ' + p2br + '.', fn:'(x−h)²+(y−k)²=r²', options:p2bShuf.map(function(x){return x.t;}), correctIdx:p2bCI, explanation:'Sustituimos h='+p2bh+', k='+p2bk+', r='+p2br+' en (x−h)²+(y−k)²=r²: '+p2bc+'. Cuidado con los signos: (x−h) cambia de signo según el valor de h.', hint:'Sustituye directamente. Si h es positivo, escribes (x − h). Si h es negativo, escribes (x − (negativo)) = (x + positivo).', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─────────────────────────────────────

  var p5correctIdx = p5shuffled.findIndex(function(x){return x.idx===0;});
  var p5q = 'Una circunferencia tiene centro C(' + p5cx + ', ' + p5cy + ') y pasa por el punto P(' + p5px + ', ' + p5py + '). ¿Cuál es su ecuación ordinaria?';
  problems.push({ title:'Ecuación dado un punto en la curva', questionText:p5q, fn:'Primero: r² = (px−h)²+(py−k)²', options:p5shuffled.map(function(x){return x.t;}), correctIdx:p5correctIdx, explanation:'r² = ('+p5px+'−'+p5cx+')²+('+p5py+'−'+p5cy+')² = '+p5r2+'. Ecuación: '+p5correct, hint:'Primero calcula r² usando la distancia entre C y P. Luego sustituye en (x−h)²+(y−k)²=r².', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─── Problema 6: Identificar C y r de forma general ─── */
  var p6h = ri(1,5,rng) * rSign(rng);
  var p6k = ri(1,5,rng) * rSign(rng);
  var p6r = ri(2,7,rng);
  var p6A = -2*p6h, p6B = -2*p6k, p6C = p6h*p6h+p6k*p6k-p6r*p6r;
  function coef6(v) { return v >= 0 ? '+'+v : ''+v; }
  var p6eq = 'x² + y² ' + coef6(p6A) + 'x ' + coef6(p6B) + 'y ' + coef6(p6C) + ' = 0';
  var p6correct = 'C(' + p6h + ', ' + p6k + '), r = ' + p6r;
  var p6w1 = 'C(' + (-p6h) + ', ' + (-p6k) + '), r = ' + p6r;
  var p6w2 = 'C(' + p6h + ', ' + p6k + '), r = ' + (p6r*p6r);
  var p6w3 = 'C(' + (p6A/2) + ', ' + (p6B/2) + '), r = ' + p6r;
  var p6rawOpts = [p6correct, p6w1, p6w2, p6w3];
  var p6shuffled = shuffle(p6rawOpts.map(function(o,i){return{t:o,idx:i};}), rng);
  var p6correctIdx = p6shuffled.findIndex(function(x){return x.idx===0;});
  problems.push({ title:'Centro y radio desde forma general', questionText:'Para la circunferencia: ' + p6eq + '<br>Identifica el centro y el radio.', fn:'h=−A/2, k=−B/2, r²=h²+k²−C', options:p6shuffled.map(function(x){return x.t;}), correctIdx:p6correctIdx, explanation:'A='+p6A+', B='+p6B+', C='+p6C+'. h='+p6h+', k='+p6k+', r²='+p6r*p6r+', r='+p6r+'. '+p6correct, hint:'Aplica directamente: h=−A/2, k=−B/2, r²=h²+k²−C.', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─── Problema 7: Diámetro y área ─── */
  var p7r = ri(3,9,rng);
  var p7area = (Math.PI * p7r * p7r).toFixed(2);
  var p7d = 2 * p7r;
  var p7opts = [
    'Diámetro = '+p7d+', Área ≈ '+p7area+' u²',
    'Diámetro = '+p7r+', Área ≈ '+p7area+' u²',
    'Diámetro = '+p7d+', Área ≈ '+(Math.PI*p7r).toFixed(2)+' u²',
    'Diámetro = '+p7d+', Área ≈ '+(2*Math.PI*p7r).toFixed(2)+' u²'
  ];
  var p7shuffled = shuffle(p7opts.map(function(o,i){return{t:o,idx:i};}), rng);
  var p7correctIdx = p7shuffled.findIndex(function(x){return x.idx===0;});
  problems.push({ title:'Diámetro y área del círculo', questionText:'Una circunferencia tiene radio r = '+p7r+' unidades. Calcula el <strong>diámetro</strong> y el <strong>área del círculo</strong> que delimita. (Usa π ≈ 3.14159)', fn:'d = 2r   |   A = πr²', options:p7shuffled.map(function(x){return x.t;}), correctIdx:p7correctIdx, explanation:'d = 2 × '+p7r+' = '+p7d+'. Área = π × '+p7r+'² = '+p7r*p7r+'π ≈ '+p7area+' u².', hint:'d = 2r y A = πr². Sustituye r = '+p7r+'.', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);
}
