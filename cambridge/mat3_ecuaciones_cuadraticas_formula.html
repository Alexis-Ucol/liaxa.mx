<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecuaciones Cuadráticas: Fórmula General — Matemáticas 3°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #1a3a6b;
  --green-dark: #0f2244;
  --green-bg:   #e8edf5;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border)}
.wlogos img{height:50px;width:auto;object-fit:contain}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3)}

#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text)}
#restoreBar strong{color:var(--gold)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}

.lang-toggle{display:inline-flex;align-items:stretch;flex-shrink:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface,transparent)}
.lang-btn{background:none;border:none;border-radius:0;padding:.22rem .55rem;font-size:.72rem;cursor:pointer;color:var(--text3);font-weight:600;transition:all .14s;line-height:1.4}
.lang-btn+.lang-btn{border-left:1px solid var(--border)}
.lang-btn.active{background:var(--green);color:#fff}

.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}

.steps-list{list-style:none;counter-reset:step;margin:1rem 0}
.steps-list li{counter-increment:step;display:flex;gap:.9rem;margin-bottom:.9rem;align-items:flex-start}
.steps-list li::before{content:counter(step);flex-shrink:0;width:26px;height:26px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;margin-top:.15rem}

.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .1em;line-height:1.1}
.mf-num{border-bottom:1.5px solid currentColor;padding:0 .2em;font-size:.9em}
.mf-den{padding:0 .2em;font-size:.9em}
.math-line{font-family:'IBM Plex Mono',monospace;background:var(--surface2);border-radius:8px;padding:.7rem 1rem;margin:.6rem 0;font-size:.95rem;color:var(--green-dark);display:block}
.math-big{font-family:'IBM Plex Mono',monospace;font-size:1.15rem;font-weight:700;color:var(--green-dark);text-align:center;padding:1rem;background:var(--green-bg);border-radius:10px;margin:1rem 0;line-height:1.7}

/* Step solver widget */
.widget-box{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.3rem;margin:1rem 0}
.widget-title{font-size:.8rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.9rem}
.solver-step{display:flex;gap:.8rem;align-items:center;margin-bottom:.7rem;padding:.65rem .9rem;border-radius:8px;background:var(--surface2);border:1px solid var(--border);transition:border-color .2s}
.solver-step.active{border-color:var(--gold)}
.solver-step.done{border-color:var(--ok);background:var(--ok-bg)}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.step-content{flex:1;font-size:.88rem;color:var(--text)}
.step-input{font-family:'IBM Plex Mono',monospace;font-size:.9rem;padding:.25rem .5rem;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);width:5rem;text-align:center}
.step-input:focus{outline:none;border-color:var(--green)}
.step-badge{font-size:.72rem;padding:.15rem .45rem;border-radius:5px;margin-left:.4rem}
.step-badge.ok{background:var(--ok-bg);color:var(--ok)}
.step-badge.bad{background:var(--bad-bg);color:var(--bad)}
.check-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.55rem 1.3rem;font-size:.88rem;font-weight:600;cursor:pointer;margin-top:.7rem;transition:background .14s}
.check-btn:hover{background:var(--green-dark)}
.wfeedback{font-size:.88rem;padding:.55rem .9rem;border-radius:8px;margin-top:.6rem;display:none}
.wfeedback.ok{background:var(--ok-bg);color:var(--ok);display:block}
.wfeedback.bad{background:var(--bad-bg);color:var(--bad);display:block}

/* Live formula calculator */
.calc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.8rem}
.calc-field label{font-size:.72rem;color:var(--text3);display:block;margin-bottom:.25rem}
.calc-field input{width:100%;padding:.4rem .6rem;border:1.5px solid var(--border);border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:1rem;background:var(--surface2);color:var(--text);text-align:center;transition:border-color .18s}
.calc-field input:focus{outline:none;border-color:var(--green)}
.calc-display{background:var(--green-bg);border-radius:10px;padding:.9rem 1.2rem;font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--green-dark);margin:.6rem 0;min-height:3rem;line-height:1.8}
.calc-roots{display:flex;gap:.6rem;margin-top:.5rem}
.calc-root{flex:1;text-align:center;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.55rem;font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:700;color:var(--green-dark)}

/* Problem cards */
.pcard{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:1.5rem 1.4rem;margin-bottom:1.6rem}
.pcard-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.pnum{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0}
.ptitle{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600}
.ptext{color:var(--text2);margin-bottom:1rem;font-size:.95rem}
.mcopt{display:block;width:100%;text-align:left;padding:.7rem 1rem;margin:.35rem 0;border:1.5px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--text);cursor:pointer;font-size:.9rem;font-family:inherit;transition:border-color .14s,background .14s}
.mcopt:hover{border-color:var(--green)}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);color:var(--text)}
.mcopt.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);font-weight:600}
.mcopt.wrong{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.pfeedback{padding:.6rem .9rem;border-radius:8px;font-size:.85rem;margin-top:.6rem;display:none}
.pfeedback.show{display:block}
.pfeedback.ok{background:var(--ok-bg);color:var(--ok)}
.pfeedback.bad{background:var(--bad-bg);color:var(--bad)}
.hint-btn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:7px;padding:.28rem .7rem;font-size:.78rem;cursor:pointer;margin-top:.6rem;transition:background .14s}
.hint-btn:hover{background:var(--gold-bg)}
.hint-text{display:none;font-size:.82rem;color:var(--text3);background:var(--gold-bg);border-radius:8px;padding:.6rem .9rem;margin-top:.5rem}
.hint-text.show{display:block}

.work-tabs{display:flex;gap:.4rem;margin-top:.9rem}
.wtab{background:none;border:1px solid var(--border);border-radius:6px 6px 0 0;padding:.28rem .7rem;font-size:.78rem;cursor:pointer;color:var(--text3);transition:all .14s}
.wtab.active{background:var(--surface2);border-bottom-color:var(--surface2);color:var(--text);font-weight:600}
.warea{border:1px solid var(--border);border-radius:0 8px 8px 8px;background:var(--surface2);padding:.7rem;min-height:80px}
canvas.dc{width:100%;height:120px;display:block;cursor:crosshair;border-radius:6px;touch-action:none}
.cvwrap{position:relative;background:var(--surface)}
.cv-toolbar{display:flex;gap:.4rem;padding:.3rem;border-bottom:1px solid var(--border);background:var(--surface);border-radius:6px 6px 0 0}
.cv-clr{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.cv-clr.sel{border-color:var(--green);transform:scale(1.25)}
.cv-clear{margin-left:auto;font-size:.7rem;padding:.15rem .45rem;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;color:var(--text3)}
textarea.ta{width:100%;min-height:80px;border:none;background:transparent;resize:vertical;font-family:inherit;font-size:.9rem;color:var(--text)}
textarea.ta:focus{outline:none}
.photo-area{display:flex;align-items:center;justify-content:center;padding:1rem}
.photo-btn{border:2px dashed var(--border);border-radius:10px;padding:1rem 1.5rem;background:none;cursor:pointer;color:var(--text3);font-size:.85rem}
img.pp{max-width:100%;border-radius:6px;margin-top:.4rem;display:none}

#resultScreen{display:none;max-width:600px;margin:0 auto;padding:2rem 1.2rem}
.res-card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2rem;text-align:center}
.res-score{font-family:'Crimson Pro',serif;font-size:3.5rem;font-weight:700;color:var(--green)}
.res-label{font-size:.85rem;color:var(--text3);margin-bottom:1.2rem}
.res-msg{font-size:1rem;color:var(--text2);margin-bottom:1.5rem}
.dl-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.85rem 2rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%}
.dl-btn:hover{background:var(--green-dark)}

@media(max-width:600px){
  .stickybar{flex-wrap:wrap;gap:.4rem;padding:.45rem .8rem}
  .htitle{font-size:.85rem}
  .lbody{padding:1.2rem .8rem 3rem}
  .calc-grid{grid-template-columns:1fr 1fr}
  .calc-roots{flex-direction:column}
}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
      <span id="wlogsep" style="display:none;width:1px;height:40px;background:var(--border)"></span>
      <img id="logo-right" src="" alt="" style="display:none">
    </div>
    <div class="wtitle" id="wtitle">Fórmula General</div>
    <div class="wcourse" id="wcourse">Ecuaciones Cuadráticas · Matemáticas 3°</div>
    <label class="flabel" for="nameInput" id="lbl-name">Nombre completo</label>
    <input class="finput" id="nameInput" placeholder="Tu nombre" autocomplete="off" oninput="checkForSavedSession()">
    <label class="flabel" for="groupInput" id="lbl-group">Grupo</label>
    <input class="finput" id="groupInput" placeholder="Ej. 3°A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" onclick="startLesson()" id="btn-start">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="rb-title">📂 Sesión guardada encontrada</strong><br>
      <span id="rb-msg">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" onclick="restoreSession()" id="rb-yes">Retomar sesión</button>
        <button class="rbtn rbtn-no" onclick="dismissRestore()" id="rb-no">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px}.lbl{stroke:var(--gold);stroke-width:2.5}.lba{fill:var(--gold)}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left" src="" alt="" style="display:none">
    </div>
    <span class="htitle" id="h-title">Fórmula General</span>
    <div class="halexis"></div>
    <span class="hchip" id="h-chip">Mate 3°</span>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" title="Tema">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
</div>

<!-- RESULTS -->
<div id="resultScreen">
  <div class="res-card">
    <div class="res-score" id="resScore">0/10</div>
    <div class="res-label" id="res-label">Problemas correctos</div>
    <div class="res-msg" id="resMsg"></div>
    <button class="dl-btn" onclick="generatePDF()" id="dlBtn">⬇ Descargar Resultados PDF</button>
  </div>
</div>

<script>
/* ═══ SCHOOL CONFIG ═══ */
var SCHOOL = {
  primary:      '#c0202a',
  primaryDark:  '#490a0e',
  primaryBg:    '#f6e7e8',
  accent:       '#f5c800',
  accentBg:     '#fff8db',
  pBR:192, pBG:32, pBB:42,
  pAR:245, pAG:200, pAB:0,
  darkPrimary:     '#c94049',
  darkPrimaryDark: '#e97179',
  darkPrimaryBg:   '#3b0a0e',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

/* ═══ THEME ═══ */
function toggleTheme(){
  var d=document.documentElement,dark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',dark?'light':'dark');
  var r=d.style;
  if(!dark){
    r.setProperty('--green',SCHOOL.darkPrimary);
    r.setProperty('--green-dark',SCHOOL.darkPrimaryDark);
    r.setProperty('--green-bg',SCHOOL.darkPrimaryBg);
    r.setProperty('--gold',SCHOOL.darkAccent);
    r.setProperty('--gold-bg',SCHOOL.darkAccentBg);
  } else {
    r.setProperty('--green',SCHOOL.primary);
    r.setProperty('--green-dark',SCHOOL.primaryDark);
    r.setProperty('--green-bg',SCHOOL.primaryBg);
    r.setProperty('--gold',SCHOOL.accent);
    r.setProperty('--gold-bg',SCHOOL.accentBg);
  }
  problems.forEach(function(p,i){if(p.canvasReady)redrawCanvas(i+1);});
}

/* ═══ SEEDED RNG ═══ */
function mulberry32(seed){
  return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296};
}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h>>>0;}

  localStorage.setItem(key,n);return n;
}

}

/* ═══ SESSION PERSISTENCE ═══ */
function sessionKey(){return SCHOOL.filePrefix+'__sess__'+name+'__'+group;}
function saveSession(){
  if(!name)return;
  var data={name:name,group:group,attempt:attempt,answers:problems.map(function(p){return{sc:p.studentChoice,done:p.done};})};
  data.drawings=[];data.texts=[];data.photos=[];
  problems.forEach(function(_,i){
    var dc=document.getElementById('dc'+(i+1));
    data.drawings.push(dc?dc.toDataURL('image/png'):'');
    var ta=document.getElementById('ta'+(i+1));
    data.texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+(i+1));
    data.photos.push(pp&&pp.src.indexOf('data:')===0?pp.src:'');
  });
  localStorage.setItem(sessionKey(),JSON.stringify(data));
}
function checkForSavedSession(){
  name=document.getElementById('nameInput').value.trim();
  group=document.getElementById('groupInput').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var d=localStorage.getItem(sessionKey());
  document.getElementById('restoreBar').style.display=d?'block':'none';
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';startLesson();}
function restoreSession(){
  var d=JSON.parse(localStorage.getItem(sessionKey()));
  attempt=d.attempt||1;
  rng=mulberry32(hashStr(name+group+attempt));
  buildLessonContent();
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  setTimeout(function(){
    d.answers.forEach(function(a,i){
      problems[i].studentChoice=a.sc;
      problems[i].done=a.done;
      if(a.done&&a.sc!==null){
        var opts=document.querySelectorAll('.mcopt[data-idx="'+(i+1)+'"]');
        opts.forEach(function(o){
          if(parseInt(o.dataset.choice)===a.sc){o.classList.add(a.sc===problems[i].correct?'correct':'wrong');}
          else if(a.sc===problems[i].correct&&parseInt(o.dataset.choice)===problems[i].correct){o.classList.add('correct');}
          o.disabled=a.done;
        });
        var fb=document.getElementById('fb'+(i+1));
        if(fb){fb.className='pfeedback show '+(a.sc===problems[i].correct?'ok':'bad');fb.innerHTML=a.sc===problems[i].correct?problems[i].feedbackOk[LANG]:problems[i].feedbackBad[LANG];}
      }
    });
    d.drawings.forEach(function(src,i){
      var dc=document.getElementById('dc'+(i+1));
      if(dc&&src){var img=new Image();img.onload=function(){var ctx=dc.getContext('2d');ctx.drawImage(img,0,0);}; img.src=src;}
    });
    d.texts.forEach(function(t,i){var ta=document.getElementById('ta'+(i+1));if(ta)ta.value=t;});
    d.photos.forEach(function(s,i){var pp=document.getElementById('pp'+(i+1));if(pp&&s){pp.src=s;pp.style.display='block';}});
    updateProgress();
  },200);
}

  group=document.getElementById('groupInput').value.trim();

function handleMC(idx,choice){
  var p=problems[idx-1];
  if(p.done)return;
  var opts=document.querySelectorAll('.mcopt[data-idx="'+idx+'"]');
  if(pendingChoice[idx]===choice){
    p.done=true;p.studentChoice=choice;
    var correct=(choice===p.correct);
    opts.forEach(function(o){
      o.disabled=true;o.classList.remove('pending');
      if(parseInt(o.dataset.choice)===p.correct)o.classList.add('correct');
      else if(parseInt(o.dataset.choice)===choice&&!correct)o.classList.add('wrong');
    });
    var fb=document.getElementById('fb'+idx);
    fb.className='pfeedback show '+(correct?'ok':'bad');
    fb.innerHTML=correct?p.feedbackOk[LANG]:p.feedbackBad[LANG];
    delete pendingChoice[idx];
    updateProgress();saveSession();
  } else {
    pendingChoice[idx]=choice;
    opts.forEach(function(o){o.classList.remove('pending');});
    opts[choice].classList.add('pending');
  }
}
function toggleHint(idx){var h=document.getElementById('hint'+idx);h.classList.toggle('show');}
function switchTab(idx,tab){
  activeTab[idx]=tab;
  ['d','t','p'].forEach(function(t){
    document.getElementById('wt'+idx+'_'+t).classList.toggle('active',t===tab);
    var el=t==='d'?document.getElementById('wdraw'+idx):t==='t'?document.getElementById('wtype'+idx):document.getElementById('wphoto'+idx);
    if(el)el.style.display=t===tab?'block':'none';
  });
  if(tab==='d'&&!problems[idx-1].canvasReady)initCanvas(idx);
}

/* Canvas */
var canvasState={};
function initCanvas(idx){
  var dc=document.getElementById('dc'+idx);
  if(!dc)return;
  var dpr=window.devicePixelRatio||1;
  var w=dc.parentElement.clientWidth||600;
  dc.width=w*dpr;dc.height=120*dpr;
  dc.style.width=w+'px';dc.style.height='120px';
  var ctx=dc.getContext('2d');
  ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#242420':'#ffffff';
  ctx.fillRect(0,0,dc.width,dc.height);
  ctx.scale(dpr,dpr);
  canvasState[idx]={drawing:false,color:'#1a3a6b',lx:0,ly:0,dpr:dpr};
  problems[idx-1].canvasReady=true;
  dc.addEventListener('mousedown',function(e){var s=canvasState[idx];s.drawing=true;var r=dc.getBoundingClientRect();s.lx=(e.clientX-r.left);s.ly=(e.clientY-r.top);});
  dc.addEventListener('mousemove',function(e){var s=canvasState[idx];if(!s.drawing)return;var r=dc.getBoundingClientRect();var x=(e.clientX-r.left),y=(e.clientY-r.top);var ctx=dc.getContext('2d');ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.lx,s.ly);ctx.lineTo(x,y);ctx.stroke();s.lx=x;s.ly=y;});
  dc.addEventListener('mouseup',function(){canvasState[idx].drawing=false;saveSession();});
  dc.addEventListener('mouseleave',function(){canvasState[idx].drawing=false;});
  dc.addEventListener('touchstart',function(e){e.preventDefault();var s=canvasState[idx];s.drawing=true;var r=dc.getBoundingClientRect();var t=e.touches[0];s.lx=t.clientX-r.left;s.ly=t.clientY-r.top;},{passive:false});
  dc.addEventListener('touchmove',function(e){e.preventDefault();var s=canvasState[idx];if(!s.drawing)return;var r=dc.getBoundingClientRect();var t=e.touches[0];var x=t.clientX-r.left,y=t.clientY-r.top;var ctx=dc.getContext('2d');ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.lx,s.ly);ctx.lineTo(x,y);ctx.stroke();s.lx=x;s.ly=y;},{passive:false});
  dc.addEventListener('touchend',function(){canvasState[idx].drawing=false;saveSession();});
}
function setColor(idx,c,el){canvasState[idx].color=c;el.closest('.cv-toolbar').querySelectorAll('.cv-clr').forEach(function(d){d.classList.remove('sel');});el.classList.add('sel');}
function clearCanvas(idx){var dc=document.getElementById('dc'+idx);if(!dc)return;var ctx=dc.getContext('2d');ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#242420':'#ffffff';ctx.fillRect(0,0,dc.width,dc.height);saveSession();}
function redrawCanvas(idx){var dc=document.getElementById('dc'+idx);if(!dc)return;var ctx=dc.getContext('2d');ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#242420':'#ffffff';ctx.fillRect(0,0,dc.width,dc.height);}
function loadPhoto(idx,input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){var pp=document.getElementById('pp'+idx);pp.src=e.target.result;pp.style.display='block';saveSession();};r.readAsDataURL(f);}

/* ═══ LIVE FORMULA CALCULATOR ═══ */
function updateFormulaCalc(){
  var aEl=document.getElementById('calc-a');
  var bEl=document.getElementById('calc-b');
  var cEl=document.getElementById('calc-c');
  if(!aEl||!bEl||!cEl)return;
  var a=parseFloat(aEl.value)||0;
  var b=parseFloat(bEl.value)||0;
  var c=parseFloat(cEl.value)||0;
  var display=document.getElementById('calc-display');
  var r1el=document.getElementById('calc-r1');
  var r2el=document.getElementById('calc-r2');
  if(!display||!r1el||!r2el)return;
  if(a===0){display.innerHTML=LANG==='es'?'a no puede ser 0.':'a cannot be 0.';r1el.textContent='—';r2el.textContent='—';return;}
  var D=b*b-4*a*c;
  var bStr=b>=0?'('+b+')':'('+b+')';
  var step1='Δ = b² − 4ac = '+bStr+'² − 4('+a+')('+c+') = '+(b*b)+' − '+(4*a*c)+' = '+D;
  display.innerHTML=step1+'<br>';
  if(D<0){
    display.innerHTML+=LANG==='es'?'Δ < 0 → Sin raíces reales.':'Δ < 0 → No real roots.';
    r1el.textContent='—';r2el.textContent='—';
    return;
  }
  var sqrtD=Math.sqrt(D);
  var x1=(-b+sqrtD)/(2*a), x2=(-b-sqrtD)/(2*a);
  var sqrtStr=Number.isInteger(sqrtD)?('√'+D+' = '+sqrtD):'√'+D+' ≈ '+sqrtD.toFixed(3);
  display.innerHTML+=sqrtStr+'<br>';
  display.innerHTML+='x = (−'+b+' ± '+sqrtStr.split(' = ')[0]+') / '+(2*a);
  r1el.textContent='x₁ = '+x1.toFixed(Number.isInteger(x1)?0:3);
  r2el.textContent='x₂ = '+x2.toFixed(Number.isInteger(x2)?0:3);
}

/* ═══ STEP SOLVER WIDGET ═══ */
// Solved example: 2x² − 5x + 2 = 0   roots: 2 and 0.5
// a=2, b=-5, c=2, D=25-16=9, sqrt(9)=3
// x1=(5+3)/4=2, x2=(5-3)/4=0.5
var SOLVER_A=2, SOLVER_B=-5, SOLVER_C=2;
var SOLVER_D=9, SOLVER_SQRT=3;
var SOLVER_X1=2, SOLVER_X2='1/2';

function checkSolverStep(step){
  var vals={
    1: {id:'sv-d', expected:'9', hint_es:'b² − 4ac = (−5)² − 4(2)(2) = 25 − 16 = 9'},
    2: {id:'sv-sqrt', expected:'3', hint_es:'√9 = 3'},
    3: {id:'sv-x1', expected:'2', hint_es:'x₁ = (−(−5) + 3) / (2·2) = (5+3)/4 = 8/4 = 2'},
    4: {id:'sv-x2', expected:'0.5', alt:'1/2', hint_es:'x₂ = (−(−5) − 3) / (2·2) = (5−3)/4 = 2/4 = 1/2'}
  };
  var v=vals[step];
  var el=document.getElementById(v.id);
  if(!el)return;
  var val=el.value.trim().replace(',','.');
  var ok=(val===v.expected||(v.alt&&val===v.alt));
  var badge=document.getElementById('sv-badge-'+step);
  if(badge){badge.className='step-badge '+(ok?'ok':'bad');badge.textContent=ok?'✓':'✗';}
  var stepEl=el.closest('.solver-step');
  if(stepEl)stepEl.className='solver-step '+(ok?'done':'active');
}

    {es:'¡Correcto! x² + x + 1 = 0 tiene Δ = 1 − 4 = −3 < 0, así que no tiene raíces reales.', en:'Correct! x² + x + 1 = 0 has Δ = 1 − 4 = −3 < 0, so it has no real roots.'},
    {es:'Busca la opción donde el discriminante indicado sea negativo.', en:'Look for the option where the shown discriminant is negative.'},
    false
  );
}

/* ═══ RESULTS ═══ */
function showResults(){
  var done=problems.filter(function(p){return p.done;}).length;
  if(done<10){
    var conf=confirm(LANG==='es'?'Aún tienes '+(10-done)+' preguntas sin responder. ¿Terminar de todas formas?':'You still have '+(10-done)+' unanswered questions. Finish anyway?');
    if(!conf)return;
  }
  document.getElementById('lessonScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  var correct=problems.filter(function(p){return p.done&&p.studentChoice===p.correct;}).length;
  document.getElementById('resScore').textContent=correct+'/10';
  var msg='';
  if(correct===10)msg=LANG==='es'?'¡Perfecto! Dominas la fórmula general.':'Perfect! You have mastered the quadratic formula.';
  else if(correct>=8)msg=LANG==='es'?'¡Muy bien! Casi lo tienes.':'Very well! Almost there.';
  else if(correct>=6)msg=LANG==='es'?'Buen trabajo. Repasa los pasos de la fórmula.':'Good work. Review the formula steps.';
  else msg=LANG==='es'?'Sigue practicando. ¡La fórmula se aprende con repetición!':'Keep practicing. The formula is learned through repetition!';
  document.getElementById('resMsg').textContent=msg;
}

/* ═══ PDF ═══ */
function generatePDF(){
  var btn=document.getElementById('dlBtn');
  btn.innerHTML=LANG==='es'?'Generando...':'Generating...';btn.disabled=true;
  try{
    var pBR=SCHOOL.pBR,pBG=SCHOOL.pBG,pBB=SCHOOL.pBB;
    var pAR=SCHOOL.pAR,pAG=SCHOOL.pAG,pAB=SCHOOL.pAB;
    var doc=new jspdf.jsPDF({unit:'mm',format:'letter'});
    var PW=215.9,PH=279.4,M=14,TW=PW-2*M;
    var code='MAT3-'+name.substring(0,3).toUpperCase()+group.replace(/\s/g,'');

    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,32,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,32,PW,3,'F');
    doc.setFillColor(255,255,255); doc.rect(0,35,PW,5,'F');
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,40,PW,8,'F');
    doc.setDrawColor(255,255,255);doc.setLineWidth(.5);
    doc.setFillColor(pAR,pAG,pAB);doc.circle(36/5,14/5+4,1.5,'F');
    doc.setDrawColor(pAR,pAG,pAB);doc.setLineWidth(.4);doc.line(52/5,6/5+2,52/5,46/5+2);
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text('LIAXA',14,10);
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(SCHOOL.guideTitle,14,16);
    doc.text(SCHOOL.courseName,14,21);
    if(SCHOOL.logoLeftB64){
      var fmt=SCHOOL.logoLeftB64.indexOf('/9j/')>-1?'JPEG':'PNG';
      try{doc.addImage(SCHOOL.logoLeftB64,fmt,M,4,40,22);}catch(e){}
    }
    if(SCHOOL.logoRightB64){
      var fmt2=SCHOOL.logoRightB64.indexOf('/9j/')>-1?'JPEG':'PNG';
      try{doc.addImage(SCHOOL.logoRightB64,fmt2,PW/2-20,4,40,22);}catch(e){}
    }
    doc.setFillColor(255,255,255);doc.setTextColor(255,255,255);
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    doc.text(LANG==='es'?'RESULTADOS DEL ALUMNO':'STUDENT RESULTS',M,45);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);
    var correct=problems.filter(function(p){return p.done&&p.studentChoice===p.correct;}).length;
    doc.text('Nombre: '+name+'  ·  Grupo: '+group+'  ·  Intento #'+attempt+'  ·  Calificación: '+correct+'/10',M,50);

    var wy=60;
    for(var i=0;i<problems.length;i++){
      var p=problems[i];
      if(wy>PH-50){doc.addPage();wy=20;}
      var chText='Problema '+(i+1)+': '+(['a)','b)','c)','d)'][p.studentChoice!=null?p.studentChoice:0]||'—');
      var exText=p.studentChoice===p.correct?p.feedbackOk[LANG]:p.feedbackBad[LANG];
      var ansBoxH=22+doc.splitTextToSize(exText,TW-16).length*4.5;
      doc.setFillColor(p.studentChoice===p.correct?45:139,p.studentChoice===p.correct?106:37,p.studentChoice===p.correct?79:0);
      doc.circle(M+3.5,wy+4.5,3,'F');
      doc.setTextColor(p.studentChoice===p.correct?45:139,p.studentChoice===p.correct?106:37,p.studentChoice===p.correct?79:0);
      doc.setFontSize(7);doc.text(p.studentChoice===p.correct?'✓':'✗',M+2.2,wy+5.5);
      doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
      doc.text(chText,M+10,wy+5.5);
      doc.setTextColor(90,85,80);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
      var exLines=doc.splitTextToSize(exText,TW-16);
      exLines.forEach(function(ln,li){doc.text(ln,M+10,wy+12+li*4.5);});
      wy+=ansBoxH+4;
    }
    var pages=doc.internal.getNumberOfPages();
    for(var pg=1;pg<=pages;pg++){
      doc.setPage(pg);
      doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');
      doc.setTextColor(130,140,160);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
      doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+pg+'/'+pages,PW/2,PH-5,{align:'center'});
    }
    doc.save(SCHOOL.filePrefix+'_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  }catch(e){alert('Error al generar PDF: '+e.message);}
  btn.innerHTML=TX.dlBtn[LANG];btn.disabled=false;
}
