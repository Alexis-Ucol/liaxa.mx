<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday English — Present Simple — Total English School</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#d93400;--green-dark:#a82800;--green-bg:#fdeee9;
  --gold:#1a2a5e;--gold-bg:#e8ebf7;
  --bg:#f8f6f1;--surface:#ffffff;--surface2:#f0ede6;--border:#ddd8cc;
  --text:#1a1a16;--text2:#4a4640;--text3:#7a7468;
  --ok:#2d6a4f;--ok-bg:rgba(45,106,79,.10);--bad:#8b2500;--bad-bg:rgba(139,37,0,.08);
  --shadow:0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"]{
  --bg:#18181a;--surface:#242420;--surface2:#2e2e28;--border:#3a3830;
  --text:#e8e4da;--text2:#b0aa9e;--text3:#7a7468;--shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#ff6640;--green-dark:#ff8866;--green-bg:#2a1410;
  --gold:#6a7fd4;--gold-bg:#0e1228;
  --ok:#4a9a6f;--ok-bg:rgba(74,154,111,.12);--bad:#c05030;--bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;}
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green);overflow-x:auto;}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem;}
.rnote{font-size:.76rem;color:var(--text3);}
.dialogue{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin:1rem 0;}
.dialogue .dline{display:flex;gap:.7rem;margin-bottom:.6rem;align-items:flex-start;}
.dialogue .dline:last-child{margin-bottom:0;}
.dialogue .dspk{font-weight:700;color:var(--green);min-width:56px;flex-shrink:0;font-size:.84rem;padding-top:.1rem;}
.dialogue .dtxt{color:var(--text2);font-size:.88rem;line-height:1.5;}
.dialogue .dtxt em{color:var(--green);font-style:normal;font-weight:600;}
.etable{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.86rem;overflow-x:auto;display:block;}
.etable th{background:var(--green);color:#fff;padding:.55rem .8rem;text-align:left;font-weight:600;}
.etable td{padding:.5rem .8rem;border-bottom:1px solid var(--border);color:var(--text2);}
.etable tr:nth-child(even) td{background:var(--surface2);}
.etable .hi{color:var(--green);font-weight:600;}
/* Problem cards */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;display:block;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);margin-bottom:.5rem;}
.hintbox.show{display:block;}
/* feedback */
.exfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.5rem;}
.exfb.show{display:block;}
.exfb.fbok{background:var(--ok-bg);color:var(--ok);}
.exfb.fbbad{background:var(--bad-bg);color:var(--bad);}
/* check button */
.chkbtn{margin-top:.7rem;padding:.55rem 1.2rem;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;transition:background .15s;}
.chkbtn:hover{background:var(--green-dark);}
.chkbtn:disabled{opacity:.5;cursor:default;}
.resetbtn{margin-top:.7rem;margin-left:.4rem;padding:.55rem 1.1rem;background:none;border:1px solid var(--border);border-radius:8px;font-size:.84rem;cursor:pointer;color:var(--text2);}

/* ── TAP CORRECT ── */
.tc-sentence{font-size:1rem;line-height:2.6;padding:.3rem 0;}
.tc-word{display:inline-flex;align-items:center;padding:.22rem .65rem;border:1.5px solid var(--border);border-radius:20px;margin:.1rem .15rem;cursor:pointer;font-size:.88rem;transition:all .13s;background:var(--surface);}
.tc-word:hover:not(.locked){border-color:var(--green);background:var(--green-bg);}
.tc-word.pending{border-color:var(--gold);background:var(--gold-bg);font-weight:600;}
.tc-word.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);font-weight:700;}
.tc-word.wrong{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.tc-word.reveal{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.tc-word.locked{pointer-events:none;}

/* ── WORD BANK ── */
.wb-bank{display:flex;flex-wrap:wrap;gap:.4rem;padding:.65rem;background:var(--surface2);border-radius:8px;margin-bottom:.65rem;min-height:46px;}
.wb-token{display:inline-flex;align-items:center;padding:.3rem .75rem;background:var(--gold);color:#fff;border-radius:20px;font-size:.84rem;font-weight:600;cursor:grab;user-select:none;transition:transform .12s,opacity .15s;touch-action:none;}
.wb-token:active{transform:scale(1.07);cursor:grabbing;}
.wb-token.used{opacity:.3;pointer-events:none;}
.wb-token.touch-selected{outline:3px solid var(--green);outline-offset:2px;}
.wb-sentence{display:flex;flex-wrap:wrap;align-items:center;gap:.35rem;font-size:.92rem;line-height:2.4;padding:.3rem 0;}
.wb-slot{display:inline-flex;align-items:center;justify-content:center;min-width:80px;height:32px;border-bottom:2.5px solid var(--green);padding:0 .5rem;cursor:pointer;transition:background .14s;border-radius:4px 4px 0 0;color:var(--green);font-weight:600;font-size:.88rem;}
.wb-slot:hover{background:var(--green-bg);}
.wb-slot.over{background:var(--green-bg);}
.wb-slot.filled{border-bottom-color:var(--ok);color:var(--ok);}
.wb-slot.wrong-slot{border-bottom-color:var(--bad);color:var(--bad);}
.wb-slot.locked{pointer-events:none;}

/* ── SENTENCE SORT ── */
.sort-bank{display:flex;flex-wrap:wrap;gap:.4rem;padding:.65rem;background:var(--surface2);border-radius:8px;min-height:48px;}
.sort-tile{display:inline-flex;align-items:center;padding:.35rem .8rem;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:500;cursor:grab;user-select:none;transition:box-shadow .12s,transform .1s;touch-action:none;}
.sort-tile:active{cursor:grabbing;box-shadow:0 4px 14px rgba(0,0,0,.15);transform:scale(1.05);}
.sort-tile.dragging{opacity:.4;}
.sort-tile.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.sort-tile.wrong{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.sort-drop{min-height:52px;padding:.4rem;border:2px dashed var(--border);border-radius:8px;display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;transition:border-color .14s;}
.sort-drop.over{border-color:var(--green);background:var(--green-bg);}
.sort-ph{color:var(--text3);font-size:.82rem;font-style:italic;padding:.2rem .3rem;}

/* ── MATCH ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.65rem;}
.match-col{display:flex;flex-direction:column;gap:.4rem;}
.match-item{padding:.55rem .8rem;border-radius:8px;border:1.5px solid var(--border);font-size:.86rem;background:var(--surface);cursor:pointer;transition:all .14s;line-height:1.35;min-height:44px;display:flex;align-items:center;}
.match-item:hover:not(.locked){border-color:var(--green);background:var(--green-bg);}
.match-item.locked{pointer-events:none;}
.match-item.correct{font-weight:600;}
.match-item.wrong{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}

/* Result */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center;}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}

@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;}
  .wlogos img{height:38px;}
  .wtitle{font-size:1.35rem;}
  .htitle{display:none;}
  .hlogos img{height:20px;}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:110px;overflow:hidden;text-overflow:ellipsis;}
  .lbody{padding:1.2rem .7rem 3rem;}
  .section h2{font-size:1.3rem;}
  .rules-grid{grid-template-columns:1fr;}
  .pbody{padding:.75rem;}
  .pstmt{font-size:.84rem;}
  .callout{padding:.8rem .9rem;}
  .match-grid{grid-template-columns:1fr;}
  .wb-token{font-size:.8rem;}
  .sort-tile{font-size:.8rem;}
}
</style>
</head>
<body>

<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Total English School" style="display:none;height:64px;">
      <div id="wlogsep" style="display:none;width:1px;height:40px;background:var(--border);flex-shrink:0;"></div>
      <img id="logo-right" src="" alt="" style="display:none">
    </div>
    <div class="wtitle">Everyday English</div>
    <div class="wcourse">Module 1 · Present Simple — Daily Routines</div>
    <label class="flabel" for="sName">Full name</label>
    <input class="finput" id="sName" type="text" placeholder="Your full name" autocomplete="name" oninput="checkSaved()">
    <label class="flabel" for="sGroup">Group</label>
    <input class="finput" id="sGroup" type="text" placeholder="e.g. Beginners A" autocomplete="off" oninput="checkSaved()">
    <button class="sbtn" onclick="startLesson()">Start →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar" style="display:none;margin-top:.8rem;background:var(--green-bg);border:1px solid var(--green);border-radius:8px;padding:.6rem .9rem;font-size:.84rem;color:var(--green-dark);">
      📂 Saved session found.
      <button onclick="doRestore()" style="margin-left:.5rem;background:var(--green);color:#fff;border:none;border-radius:5px;padding:.22rem .65rem;cursor:pointer;font-size:.82rem;">Restore</button>
      <button onclick="document.getElementById('restoreBar').style.display='none'" style="margin-left:.3rem;background:none;border:1px solid var(--green);border-radius:5px;padding:.22rem .65rem;cursor:pointer;font-size:.82rem;color:var(--green);">Dismiss</button>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;padding-top:.5rem;">
      <svg width="196" height="48" viewBox="0 0 140 34" xmlns="http://www.w3.org/2000/svg" class="lx">
        <style>.lx .a{stroke:var(--green);stroke-width:2;fill:none;}.lx .b{fill:var(--gold);}.lx .c{stroke:var(--gold);stroke-width:2;}.lx .d{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px;}</style>
        <polyline points="4,24 10,18 16,20 22,10" class="a"/><circle cx="22" cy="10" r="2.5" class="b"/>
        <line x1="32" y1="6" x2="32" y2="28" class="c"/><text x="42" y="22" class="d">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left" src="" alt="" style="display:none">
      <img id="hlogo-right" src="" alt="" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Everyday English · Present Simple</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg" class="lh">
        <style>.lh .a{stroke:var(--green);stroke-width:2;fill:none;}.lh .b{fill:var(--gold);}.lh .c{stroke:var(--gold);stroke-width:2;}.lh .d{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px;}</style>
        <polyline points="4,24 10,18 16,20 22,10" class="a"/><circle cx="22" cy="10" r="2.5" class="b"/>
        <line x1="32" y1="6" x2="32" y2="28" class="c"/><text x="42" y="22" class="d">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">&#8659; &nbsp;Download Result PDF</button>
    </div>
  </div>
</div>

<script>
/* ════════ STATE ════════ */
var SD={}, answered=0, correct=0, total=0;
var EX={};   /* EX[id] = exercise state object — ALL data lives here, never in onclick */
var RESULTS={};

/* ════════ SESSION ════════ */
var LS='te_ps3';
function lsKey(){return LS+'__'+(SD.name||'').trim()+'__'+(SD.group||'').trim();}
function saveSession(){
  if(!SD.name)return;
  var s={name:SD.name,group:SD.group,answered:answered,correct:correct,results:RESULTS};
  try{localStorage.setItem(lsKey(),JSON.stringify(s));}catch(e){}
}
function loadSession(n,g){
  try{var r=localStorage.getItem(LS+'__'+n.trim()+'__'+g.trim());return r?JSON.parse(r):null;}catch(e){return null;}
}
function checkSaved(){
  var n=document.getElementById('sName').value.trim();
  var g=document.getElementById('sGroup').value.trim();
  if(!n||!g){document.getElementById('restoreBar').style.display='none';return;}
  var s=loadSession(n,g);
  document.getElementById('restoreBar').style.display=(s&&Object.keys(s.results||{}).length)?'block':'none';
}
function doRestore(){
  var n=document.getElementById('sName').value.trim();
  var g=document.getElementById('sGroup').value.trim();
  var s=loadSession(n,g);if(!s)return;
  SD={name:n,group:g};
  answered=s.answered||0;correct=s.correct||0;RESULTS=s.results||{};
  document.getElementById('restoreBar').style.display='none';
  buildLesson();launch();
  // Re-apply results visually
  Object.keys(RESULTS).forEach(function(id){
    var r=RESULTS[id];
    var fb=document.getElementById('fb_'+id);
    if(fb){fb.className='exfb show '+(r.ok?'fbok':'fbbad');fb.innerHTML=(r.ok?'<strong>✓ Correct!</strong>':'<strong>✗ Not quite.</strong>')+' '+r.exp;}
  });
  document.getElementById('progFill').style.width=(answered/total*100)+'%';
  if(answered>=total)setTimeout(showResults,400);
}

/* ════════ THEME ════════ */
function toggleTheme(){
  var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  document.getElementById('themeBtn').textContent=n==='dark'?'☀️':'🌙';
  try{localStorage.setItem(LS+'__theme',n);}catch(e){}
}
(function(){
  document.documentElement.setAttribute('data-theme','light');
  try{var t=localStorage.getItem(LS+'__theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('themeBtn');if(b)b.textContent='☀️';});}}catch(e){}
})();

/* ════════ RNG ════════ */
var rng;
function mkRng(seed){
  var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function pick(arr){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* ════════ START / LAUNCH ════════ */
function startLesson(){
  var n=document.getElementById('sName').value.trim();
  var g=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!n||!g){err.textContent='Please fill in both fields.';return;}
  err.textContent='';SD={name:n,group:g};answered=0;correct=0;RESULTS={};
  buildLesson();launch();
}
function launch(){
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=SD.name+' · '+SD.group;
  var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
}
function toggleHint(id){document.getElementById('hb_'+id).classList.toggle('show');}
function showResults(){
  var r=document.getElementById('s_results');
  r.style.display='block';
  setTimeout(function(){r.classList.add('vis');r.scrollIntoView({behavior:'smooth',block:'center'});},50);
}

/* ════════ RECORD ════════ */
function record(id,ok,exp){
  if(RESULTS[id]){
    // Already recorded — allow upgrading from wrong to correct
    if(ok&&!RESULTS[id].ok){RESULTS[id].ok=true;RESULTS[id].exp=exp;correct++;saveSession();}
    return;
  }
  RESULTS[id]={ok:ok,exp:exp};
  if(ok)correct++;
  answered++;
  document.getElementById('progFill').style.width=(answered/total*100)+'%';
  saveSession();
  if(answered>=total)setTimeout(showResults,900);
}

/* ════════════════════════════════════════
   ① TAP CORRECT WORD
   words: [{text, correct:bool}]
   Two-tap confirmation
════════════════════════════════════════ */
function buildTap(id,instruction,words,hint,exp){
  total++;
  var st={pending:null,done:false,words:words,exp:exp};
  EX[id]=st;
  var html='<div class="tc-sentence">';
  words.forEach(function(w,i){
    html+='<span class="tc-word" id="tcw_'+id+'_'+i+'" onclick="tapWord(\''+id+'\','+i+')">'+w.text+'</span> ';
  });
  html+='</div>';
  appendCard(id,'Tap the correct word',
    '<div class="pstmt">'+instruction+'<br><small style="color:var(--text3)">Tap once to select · tap again to confirm.</small></div>'+
    html, hint);
}
function tapWord(id,idx){
  var st=EX[id];if(!st||st.done)return;
  var els=document.querySelectorAll('[id^="tcw_'+id+'_"]');
  if(st.pending===idx){
    // Confirm
    st.done=true;
    var ok=st.words[idx].correct;
    els.forEach(function(e){e.classList.add('locked');e.classList.remove('pending');});
    els[idx].classList.add(ok?'correct':'wrong');
    if(!ok) els.forEach(function(e,i){if(st.words[i]&&st.words[i].correct)e.classList.add('reveal');});
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show '+(ok?'fbok':'fbbad');
    fb.innerHTML=(ok?'<strong>✓ Correct!</strong>':'<strong>✗ Not quite.</strong>')+' '+st.exp;
    record(id,ok,st.exp);
    return;
  }
  els.forEach(function(e){e.classList.remove('pending');});
  st.pending=idx;
  els[idx].classList.add('pending');
}

/* ════════════════════════════════════════
   ② WORD BANK FILL-IN-THE-BLANK
   parts: [{text,slot:false}|{slot:true,idx:N}]
   correct: array of correct words per slot (indexed by idx)
   extra: extra decoy words
════════════════════════════════════════ */
function buildWordBank(id,instruction,parts,correct,extra,hint,exp){
  total++;
  var allWords=shuffle(correct.concat(extra));
  var slotState={};
  correct.forEach(function(_,i){slotState[i]=null;});
  EX[id]={slotState:slotState,correct:correct,exp:exp,touchSel:null,done:false};

  var bankHtml='<div class="wb-bank" id="wbb_'+id+'">';
  allWords.forEach(function(w,i){
    bankHtml+='<div class="wb-token" id="wbt_'+id+'_'+i+'" draggable="true" '+
      'data-word="'+encodeURIComponent(w)+'" data-idx="'+i+'" '+
      'ondragstart="wbDragStart(event,\''+id+'\','+i+')" '+
      'onclick="wbTokenClick(\''+id+'\','+i+')">'+w+'</div>';
  });
  bankHtml+='</div>';

  var sentHtml='<div class="wb-sentence" id="wbs_'+id+'">';
  parts.forEach(function(p){
    if(!p.slot) sentHtml+='<span>'+p.text+'</span>';
    else sentHtml+='<span class="wb-slot" id="wbsl_'+id+'_'+p.idx+'" '+
      'data-slot="'+p.idx+'" '+
      'ondragover="event.preventDefault();this.classList.add(\'over\')" '+
      'ondragleave="this.classList.remove(\'over\')" '+
      'ondrop="wbDrop(event,\''+id+'\','+p.idx+')" '+
      'onclick="wbSlotClick(\''+id+'\','+p.idx+')">_____</span>';
  });
  sentHtml+='</div>';

  appendCard(id,'Fill in the blanks',
    '<div class="pstmt">'+instruction+'<br><small style="color:var(--text3)">Drag or tap words &middot; tap a filled blank to remove it.</small></div>'+
    bankHtml+sentHtml+
    '<button class="chkbtn" id="wbchk_'+id+'" onclick="wbCheck(\''+id+'\')" disabled>Check ✓</button>',
    hint);
}
var _wbDrag={id:null,idx:null};
function wbDragStart(e,id,i){_wbDrag={id:id,idx:i};}
function wbDrop(e,id,slot){
  e.preventDefault();
  document.getElementById('wbsl_'+id+'_'+slot).classList.remove('over');
  if(_wbDrag.id!==id)return;
  wbPlace(id,_wbDrag.idx,slot);
  _wbDrag={id:null,idx:null};
}
function wbTokenClick(id,i){
  // Touch/click: select token, then click slot
  var st=EX[id];if(!st||st.done)return;
  var token=document.getElementById('wbt_'+id+'_'+i);
  if(token.classList.contains('used'))return;
  // Deselect previous
  if(st.touchSel!==null){
    var prev=document.getElementById('wbt_'+id+'_'+st.touchSel);
    if(prev)prev.classList.remove('touch-selected');
  }
  if(st.touchSel===i){st.touchSel=null;return;}
  st.touchSel=i;
  token.classList.add('touch-selected');
}
function wbSlotClick(id,slot){
  var st=EX[id];if(!st||st.done)return;
  if(st.touchSel!==null){
    // Place selected token into slot
    wbPlace(id,st.touchSel,slot);
    var prev=document.getElementById('wbt_'+id+'_'+st.touchSel);
    if(prev)prev.classList.remove('touch-selected');
    st.touchSel=null;
    return;
  }
  // Remove word from slot
  if(st.slotState[slot]!==null){wbRemove(id,slot);}
}
function wbPlace(id,tokenIdx,slot){
  var st=EX[id];if(!st)return;
  var token=document.getElementById('wbt_'+id+'_'+tokenIdx);
  var word=decodeURIComponent(token.dataset.word);
  if(st.slotState[slot]!==null)wbRemove(id,slot);
  st.slotState[slot]={word:word,tokenIdx:tokenIdx};
  token.classList.add('used');
  var el=document.getElementById('wbsl_'+id+'_'+slot);
  el.textContent=word;el.classList.add('filled');
  wbUpdateCheck(id);
}
function wbRemove(id,slot){
  var st=EX[id];if(!st||st.slotState[slot]===null)return;
  var ti=st.slotState[slot].tokenIdx;
  var token=document.getElementById('wbt_'+id+'_'+ti);
  if(token)token.classList.remove('used');
  st.slotState[slot]=null;
  var el=document.getElementById('wbsl_'+id+'_'+slot);
  el.textContent='_____';el.classList.remove('filled','wrong-slot');
  wbUpdateCheck(id);
}
function wbUpdateCheck(id){
  var st=EX[id];if(!st)return;
  var full=Object.keys(st.slotState).every(function(k){return st.slotState[k]!==null;});
  var btn=document.getElementById('wbchk_'+id);if(btn)btn.disabled=!full;
}
function wbCheck(id){
  var st=EX[id];if(!st||st.done)return;
  var allOk=true;
  Object.keys(st.slotState).forEach(function(k){
    var placed=st.slotState[k]?st.slotState[k].word:null;
    if(placed!==st.correct[k]){allOk=false;}
  });
  if(allOk){
    // Correct — lock permanently and record
    st.done=true;
    Object.keys(st.slotState).forEach(function(k){
      document.getElementById('wbsl_'+id+'_'+k).classList.add('locked');
    });
    document.querySelectorAll('#wbb_'+id+' .wb-token').forEach(function(t){t.style.pointerEvents='none';});
    document.getElementById('wbchk_'+id).disabled=true;
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show fbok';
    fb.innerHTML='<strong>✓ Perfect!</strong> '+st.exp;
    record(id,true,st.exp);
  } else {
    // Wrong — fully reset: return all words to bank, clear all slots
    Object.keys(st.slotState).forEach(function(k){
      if(st.slotState[k]!==null){
        var ti=st.slotState[k].tokenIdx;
        var token=document.getElementById('wbt_'+id+'_'+ti);
        if(token)token.classList.remove('used');
        st.slotState[k]=null;
      }
      var el=document.getElementById('wbsl_'+id+'_'+k);
      el.textContent='_____';
      el.classList.remove('filled','wrong-slot');
    });
    // Clear any touch selection
    st.touchSel=null;
    document.querySelectorAll('#wbb_'+id+' .wb-token').forEach(function(t){
      t.classList.remove('touch-selected');
    });
    // Disable check button again since slots are empty
    document.getElementById('wbchk_'+id).disabled=true;
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show fbbad';
    fb.innerHTML='<strong>✗ Not quite.</strong> Try again!';
    record(id,false,st.exp);
  }
}

/* ════════════════════════════════════════
   ③ SENTENCE SORT
   correct: ordered array of words
════════════════════════════════════════ */
function buildSort(id,correct,hint,exp){
  total++;
  EX[id]={correct:correct,order:[],locked:false,exp:exp};
  var shuffled=shuffle(correct.slice());

  var bankHtml='<div class="sort-bank" id="sb_'+id+'">';
  shuffled.forEach(function(w,i){
    bankHtml+='<div class="sort-tile" id="st_'+id+'_'+i+'" draggable="true" data-word="'+encodeURIComponent(w)+'" '+
      'ondragstart="sortDS(event,\''+id+'\','+i+')" onclick="sortTileClick(\''+id+'\','+i+')">'+w+'</div>';
  });
  bankHtml+='</div>';

  var dropHtml='<div class="sort-drop" id="sd_'+id+'" '+
    'ondragover="event.preventDefault();this.classList.add(\'over\')" '+
    'ondragleave="this.classList.remove(\'over\')" '+
    'ondrop="sortDrop(event,\''+id+'\')">' +
    '<span class="sort-ph" id="sdph_'+id+'">Drop words here…</span></div>';

  appendCard(id,'Build the sentence',
    '<div class="pstmt">Arrange these words to form a correct English sentence.<br><small style="color:var(--text3)">Drag (desktop) or tap (mobile) · Click a placed word to remove it.</small></div>'+
    '<p style="font-size:.74rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem">Words:</p>'+
    bankHtml+
    '<p style="font-size:.74rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:.55rem 0 .3rem">Your sentence:</p>'+
    dropHtml+
    '<button class="chkbtn" onclick="sortCheck(\''+id+'\')">Check ✓</button>'+
    '<button class="resetbtn" onclick="sortReset(\''+id+'\')">↺ Reset</button>',
    hint);
}
var _sortDrag={id:null,idx:null};
function sortDS(e,id,idx){_sortDrag={id:id,idx:idx};}
function sortDrop(e,id){
  e.preventDefault();
  var drop=document.getElementById('sd_'+id);drop.classList.remove('over');
  if(_sortDrag.id!==id)return;
  sortAddTile(id,_sortDrag.idx);_sortDrag={id:null,idx:null};
}
function sortTileClick(id,idx){
  var st=EX[id];if(!st||st.locked)return;
  var tile=document.getElementById('st_'+id+'_'+idx);
  if(tile.style.visibility==='hidden')return;
  sortAddTile(id,idx);
}
function sortAddTile(id,idx){
  var st=EX[id];if(!st||st.locked)return;
  var tile=document.getElementById('st_'+id+'_'+idx);
  if(!tile||tile.style.visibility==='hidden')return;
  var word=decodeURIComponent(tile.dataset.word);
  var drop=document.getElementById('sd_'+id);
  var ph=document.getElementById('sdph_'+id);
  var newTile=document.createElement('div');
  newTile.className='sort-tile';newTile.textContent=word;
  newTile.onclick=function(){sortRemove(id,newTile,idx);};
  newTile.title='Click to remove';newTile.style.cursor='pointer';
  drop.appendChild(newTile);
  if(ph)ph.style.display='none';
  tile.style.visibility='hidden';
  st.order.push({word:word,bankIdx:idx,dropEl:newTile});
}
function sortRemove(id,dropEl,bankIdx){
  var st=EX[id];if(!st||st.locked)return;
  for(var i=0;i<st.order.length;i++){
    if(st.order[i].dropEl===dropEl){st.order.splice(i,1);break;}
  }
  var tile=document.getElementById('st_'+id+'_'+bankIdx);
  if(tile)tile.style.visibility='visible';
  dropEl.parentNode.removeChild(dropEl);
  var drop=document.getElementById('sd_'+id);
  if(!drop.querySelector('.sort-tile')){var ph=document.getElementById('sdph_'+id);if(ph)ph.style.display='';}
}
function sortCheck(id){
  var st=EX[id];if(!st)return;
  if(!st.order.length){
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show fbbad';fb.innerHTML='<strong>Nothing placed yet.</strong> Tap words to build the sentence.';return;
  }
  var placed=st.order.map(function(o){return o.word;});
  var ok=(placed.join(' ')===st.correct.join(' '));
  st.locked=true;
  st.order.forEach(function(o){o.dropEl.classList.add(ok?'correct':'wrong');o.dropEl.style.cursor='default';});
  document.querySelectorAll('#sb_'+id+' .sort-tile').forEach(function(t){t.style.pointerEvents='none';});
  var fb=document.getElementById('fb_'+id);
  fb.className='exfb show '+(ok?'fbok':'fbbad');
  fb.innerHTML=(ok?'<strong>✓ Excellent!</strong>':'<strong>✗ Not quite.</strong> Correct: <em>'+st.correct.join(' ')+'</em>')+' '+st.exp;
  record(id,ok,st.exp);
}
function sortReset(id){
  var st=EX[id];if(!st)return;
  st.locked=false;
  document.querySelectorAll('#sb_'+id+' .sort-tile').forEach(function(t){
    t.style.visibility='visible';t.style.pointerEvents='';
    t.classList.remove('correct','wrong');
  });
  var drop=document.getElementById('sd_'+id);
  drop.querySelectorAll('.sort-tile').forEach(function(t){t.parentNode.removeChild(t);});
  st.order=[];
  var ph=document.getElementById('sdph_'+id);if(ph)ph.style.display='';
  var fb=document.getElementById('fb_'+id);fb.className='exfb';fb.innerHTML='';
}

/* ════════════════════════════════════════
   ④ MATCH COLUMNS  — color-coded pairs
   pairs: [{left, right}]  (shown: left col = left, right col = right shuffled)
   Each pair gets a unique color. Tap left → tap right to link.
   Wrong pair: remove color, allow retry.
════════════════════════════════════════ */
var PAIR_COLORS=['#e05c00','#0057b8','#2d7a4f','#8b0060','#c89600','#006e8c'];
function buildMatch(id,pairs,hint,exp){
  total++;
  var rightShuffled=shuffle(pairs.map(function(p){return p.right;}));
  EX[id]={pairs:pairs,assignments:{},pendingLeft:null,pendingRight:null,done:false,exp:exp,
          leftIds:pairs.map(function(p){return p.left;}),
          rightIds:rightShuffled,
          correctMap:{}};
  pairs.forEach(function(p){EX[id].correctMap[p.left]=p.right;});

  var leftHtml='';
  pairs.forEach(function(p,i){
    leftHtml+='<div class="match-item" id="ml_'+id+'_'+i+'" onclick="matchLeft(\''+id+'\','+i+')">'+p.left+'</div>';
  });
  var rightHtml='';
  rightShuffled.forEach(function(r,i){
    rightHtml+='<div class="match-item" id="mr_'+id+'_'+i+'" onclick="matchRight(\''+id+'\','+i+')">'+r+'</div>';
  });

  appendCard(id,'Match the columns',
    '<div class="pstmt">Tap an item on the <strong>left</strong>, then tap its match on the <strong>right</strong>. Each pair gets its own color.</div>'+
    '<div class="match-grid">'+
      '<div class="match-col">'+leftHtml+'</div>'+
      '<div class="match-col">'+rightHtml+'</div>'+
    '</div>'+
    '<button class="chkbtn" onclick="matchCheck(\''+id+'\')">Check ✓</button>',
    hint);
}
function matchLeft(id,li){
  var st=EX[id];if(!st||st.done)return;
  var leftEl=document.getElementById('ml_'+id+'_'+li);
  if(leftEl.classList.contains('locked'))return;
  var color=PAIR_COLORS[li%PAIR_COLORS.length];

  // Clicking the already-selected left → deselect and uncolor its right if pending
  if(st.pendingLeft===li){
    leftEl.style.cssText='';
    if(st.pendingRight!==null){
      var rEl=document.getElementById('mr_'+id+'_'+st.pendingRight);
      if(rEl&&!rEl.classList.contains('locked'))rEl.style.cssText='';
    }
    st.pendingLeft=null;st.pendingRight=null;
    return;
  }

  // Clicking a left that already has an assignment → remove that assignment and reopen it
  if(st.assignments.hasOwnProperty(li)){
    var oldRi=st.assignments[li];
    var oldREl=document.getElementById('mr_'+id+'_'+oldRi);
    if(oldREl&&!oldREl.classList.contains('locked'))oldREl.style.cssText='';
    leftEl.style.cssText='';
    delete st.assignments[li];
    st.pendingLeft=null;st.pendingRight=null;
    return;
  }

  // Deselect previous pending left (without touching its assignment)
  if(st.pendingLeft!==null){
    var pLEl=document.getElementById('ml_'+id+'_'+st.pendingLeft);
    // Only clear if it doesn't have an assignment yet (pendingRight was never confirmed)
    if(!st.assignments.hasOwnProperty(st.pendingLeft)){
      if(pLEl&&!pLEl.classList.contains('locked'))pLEl.style.cssText='';
      if(st.pendingRight!==null){
        var pREl=document.getElementById('mr_'+id+'_'+st.pendingRight);
        if(pREl&&!pREl.classList.contains('locked'))pREl.style.cssText='';
      }
    }
  }

  st.pendingLeft=li;st.pendingRight=null;
  leftEl.style.borderColor=color;leftEl.style.background=color+'22';leftEl.style.fontWeight='600';
}

function matchRight(id,ri){
  var st=EX[id];if(!st||st.done)return;
  var rightEl=document.getElementById('mr_'+id+'_'+ri);
  if(rightEl.classList.contains('locked'))return;
  if(st.pendingLeft===null)return;

  var li=st.pendingLeft;
  var color=PAIR_COLORS[li%PAIR_COLORS.length];

  // Clicking the already-pending right → deselect it
  if(st.pendingRight===ri){
    rightEl.style.cssText='';
    st.pendingRight=null;
    return;
  }

  // If this right is already assigned to another left → remove that assignment
  var existingLi=null;
  Object.keys(st.assignments).forEach(function(k){if(st.assignments[k]===ri)existingLi=parseInt(k);});
  if(existingLi!==null){
    var exLEl=document.getElementById('ml_'+id+'_'+existingLi);
    if(exLEl&&!exLEl.classList.contains('locked'))exLEl.style.cssText='';
    rightEl.style.cssText='';
    delete st.assignments[existingLi];
  }

  // Clear previous pending right for this left
  if(st.pendingRight!==null){
    var pREl=document.getElementById('mr_'+id+'_'+st.pendingRight);
    if(pREl&&!pREl.classList.contains('locked'))pREl.style.cssText='';
  }

  // Assign: both get the pair color, saved into assignments
  st.assignments[li]=ri;
  st.pendingRight=ri;
  var leftEl=document.getElementById('ml_'+id+'_'+li);
  leftEl.style.borderColor=color;leftEl.style.background=color+'22';leftEl.style.fontWeight='600';
  rightEl.style.borderColor=color;rightEl.style.background=color+'22';rightEl.style.fontWeight='600';

  // Move to next unassigned left automatically (clear pending so student can pick next left)
  st.pendingLeft=null;st.pendingRight=null;
}

function matchCheck(id){
  var st=EX[id];if(!st||st.done)return;

  // Also handle any still-pending pair (pendingLeft + pendingRight set but not yet committed)
  if(st.pendingLeft!==null&&st.pendingRight!==null){
    st.assignments[st.pendingLeft]=st.pendingRight;
    st.pendingLeft=null;st.pendingRight=null;
  }

  if(Object.keys(st.assignments).length===0){
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show fbbad';
    fb.innerHTML='<strong>No pairs yet.</strong> Tap a word on the left, then its match on the right.';
    return;
  }

  var allCorrect=true;
  var toDelete=[];
  Object.keys(st.assignments).forEach(function(li){
    li=parseInt(li);
    var ri=st.assignments[li];
    var leftItem=st.leftIds[li];
    var rightItem=st.rightIds[ri];
    var correct=(st.correctMap[leftItem]===rightItem);
    var lEl=document.getElementById('ml_'+id+'_'+li);
    var rEl=document.getElementById('mr_'+id+'_'+ri);
    if(correct){
      if(lEl){lEl.classList.add('locked','correct');}
      if(rEl){rEl.classList.add('locked','correct');}
    } else {
      allCorrect=false;
      if(lEl&&!lEl.classList.contains('locked'))lEl.style.cssText='';
      if(rEl&&!rEl.classList.contains('locked'))rEl.style.cssText='';
      toDelete.push(li);
    }
  });
  toDelete.forEach(function(li){delete st.assignments[li];});

  var confirmedCount=Object.keys(st.assignments).length;
  var totalPairs=st.pairs.length;

  if(confirmedCount===totalPairs){
    st.done=true;
    document.querySelectorAll('#exc_'+id+' .match-item').forEach(function(e){e.classList.add('locked');});
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show fbok';
    fb.innerHTML='<strong>✓ Perfect match!</strong> '+st.exp;
    record(id,true,st.exp);
  } else {
    var fb=document.getElementById('fb_'+id);
    fb.className='exfb show fbbad';
    fb.innerHTML='<strong>✗ Some pairs are wrong</strong> — they have been cleared. Correct pairs stay colored. Keep trying!';
    record(id,false,st.exp);
  }
}

  var s1=pick(['My sister','My teacher','Carlos','Elena','My neighbor']);
  var v1=pick([
    {base:'study',s:'studies',ctx:'English every day'},
    {base:'go',s:'goes',ctx:'to school by bus'},
    {base:'watch',s:'watches',ctx:'TV at night'},
    {base:'work',s:'works',ctx:'on Saturdays'},
  ]);
  buildTap('tc1',
    'Which word correctly completes this sentence?<br><strong>'+s1+' _____ '+v1.ctx+'.</strong>',
    shuffle([{text:v1.s,correct:true},{text:v1.base,correct:false},{text:'is '+v1.base,correct:false},{text:v1.base+'ing',correct:false}]),
    'Is "'+s1+'" he/she/it — or I/you/we/they?',
    '"'+s1+'" is he/she/it, so add -s or -es. Correct: <strong>'+v1.s+'</strong>. "Is +verb" is Present Continuous, not Present Simple.'
  );

  /* ── Section 2: Rules ── */
  sec(body,
    '📐 Part 2 — The Rules','Positive, Negative, and Question',
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Positive</div><div class="rform">I eat / She eats</div><div class="rnote">Base verb; add -s/-es for he/she/it</div></div>'+
      '<div class="rcard"><div class="rname">Negative</div><div class="rform">I don\'t / He doesn\'t</div><div class="rnote">don\'t for I/you/we/they; doesn\'t for he/she/it</div></div>'+
      '<div class="rcard"><div class="rname">Question</div><div class="rform">Do you…? / Does she…?</div><div class="rnote">Do for I/you/we/they; Does for he/she/it</div></div>'+
      '<div class="rcard"><div class="rname">Remember!</div><div class="rform">doesn\'t eat (no -s)</div><div class="rnote">After doesn\'t/does: BASE verb only</div></div>'+
    '</div>'+
    '<table class="etable">'+
      '<tr><th>Subject</th><th>✅ Positive</th><th>❌ Negative</th><th>❓ Question</th></tr>'+
      '<tr><td>I / You</td><td class="hi">I <em>eat</em>.</td><td>I <em>don\'t eat</em>.</td><td><em>Do</em> you eat?</td></tr>'+
      '<tr><td>He / She</td><td class="hi">She <em>eats</em>.</td><td>She <em>doesn\'t eat</em>.</td><td><em>Does</em> she eat?</td></tr>'+
    '</table>');

  /* Ex 2: Word bank — negative sentence */
  var s2=pick(['Pedro','My mom','The teacher','My brother']);
  var v2=pick([
    {base:'drink',rest:'coffee',full:'drink coffee'},
    {base:'eat',rest:'meat',full:'eat meat'},
    {base:'watch',rest:'TV',full:'watch TV'},
    {base:'study',rest:'on weekends',full:'study on weekends'},
  ]);
  buildWordBank('wb1',
    'Complete the sentence to make it <strong>negative</strong>:',
    [{text:s2+' ',slot:false},{slot:true,idx:0},{text:' ',slot:false},{slot:true,idx:1},{text:' '+v2.rest+'.',slot:false}],
    ["doesn't",v2.base],
    ["don't","isn't",v2.base+"s","never"],
    'Which two words make '+s2+' NOT do this action? Pick the correct helper verb, then the base verb.',
    '"'+s2+'" is he/she/it → use <strong>doesn\'t</strong>. The verb after doesn\'t is always the base form: <strong>'+v2.base+'</strong> (no -s).'
  );

  /* ── Section 3: Questions ── */
  sec(body,
    '❓ Part 3 — Asking Questions','Do you…? / Does she…?',
    '<p>To form a yes/no question put <strong>Do</strong> or <strong>Does</strong> first, then subject + base verb.</p>'+
    '<div class="callout"><strong>Formula:</strong><p><em>Do / Does</em> + subject + base verb + ?</p></div>'+
    '<p style="color:var(--text2)">Examples:<br>• <strong>Do</strong> you live in this city?<br>• <strong>Does</strong> your teacher speak fast?<br>• <strong>Do</strong> they study at night?</p>');

  /* Ex 3: Sort — build a question */
  var qn=pick(['your brother','Ana','the student','your teacher']);
  var qa=pick(['speak English','live near here','eat breakfast','study at night']);
  var q3parts=qa.split(' ');
  buildSort('sort1',['Does',qn].concat(q3parts).concat(['?']),
    'Question formula: Does + subject + base verb (no -s) + ?',
    'Start with <strong>Does</strong> for he/she/it, then the subject, then the verb in base form. No -s on the verb after Does.');

  /* ── Section 4: Frequency ── */
  sec(body,
    '🔄 Part 4 — How often?','Frequency adverbs',
    '<p>These words say <em>how often</em> something happens. Place them <strong>before the main verb</strong>.</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">100%</div><div class="rform">always</div><div class="rnote">I always eat breakfast.</div></div>'+
      '<div class="rcard"><div class="rname">~75%</div><div class="rform">usually</div><div class="rnote">She usually walks to school.</div></div>'+
      '<div class="rcard"><div class="rname">~50%</div><div class="rform">sometimes</div><div class="rnote">We sometimes cook at home.</div></div>'+
      '<div class="rcard"><div class="rname">0%</div><div class="rform">never</div><div class="rnote">He never drinks coffee.</div></div>'+
    '</div>');

  /* Ex 4: Sort — place adverb */
  var freq4=pick(['always','usually','sometimes','never']);
  var sub4=pick(['I','She','He','They','We']);
  var vb4map={'walk to school':{s:'walks to school'},
    'eat breakfast':{s:'eats breakfast'},'drink coffee':{s:'drinks coffee'},
    'cook dinner':{s:'cooks dinner'},'study English':{s:'studies English'}};
  var vb4key=pick(Object.keys(vb4map));
  var isThird=(sub4==='She'||sub4==='He');
  var vb4=(isThird?vb4map[vb4key].s:vb4key).split(' ');
  buildSort('sort2',[sub4,freq4].concat(vb4),
    'Subject + frequency adverb + verb. What goes first, second, third?',
    'Correct order: <strong>Subject + frequency adverb + verb</strong>. Adverb goes right before the verb.');

  /* ── Section 5: Vocabulary ── */
  sec(body,
    '📖 Part 5 — Vocabulary','Daily routine verbs',
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Morning</div><div class="rform">wake up · get up · shower<br>get dressed · eat breakfast</div></div>'+
      '<div class="rcard"><div class="rname">Day</div><div class="rform">go to school · study · work<br>have lunch · talk to friends</div></div>'+
      '<div class="rcard"><div class="rname">Evening</div><div class="rform">come home · cook · watch TV<br>read · go to bed</div></div>'+
    '</div>');

  /* Ex 5: Match — English ↔ Spanish */
  var vocabAll=[
    {left:'wake up',right:'despertarse'},
    {left:'get dressed',right:'vestirse'},
    {left:'go to bed',right:'acostarse'},
    {left:'have lunch',right:'almorzar'},
    {left:'come home',right:'llegar a casa'},
    {left:'cook',right:'cocinar'},
  ];
  var vocab5=shuffle(vocabAll).slice(0,4);
  buildMatch('match1',vocab5,
    'Think about the actions you do every day — morning, afternoon, evening.',
    'Vocabulary: wake up=despertarse, get dressed=vestirse, go to bed=acostarse, have lunch=almorzar.');

  /* ── Section 6: Assessment ── */
  sec(body,
    '🏆 Final Assessment','Put it all together',
    '<p style="color:var(--text2)">These exercises combine everything you have learned. Take your time!</p>');

  /* Ex 6: Word bank — full sentence with frequency + 3rd person + negative */
  var as6n=pick(['Ana','Sofia','Marco','Luis']);
  var vb6=pick([
    {base:'walk',s:'walks',obj:'to work'},
    {base:'study',s:'studies',obj:'English'},
    {base:'cook',s:'cooks',obj:'dinner'},
    {base:'exercise',s:'exercises',obj:'in the morning'},
  ]);
  buildWordBank('wb2',
    'Fill in the blanks to complete the sentence correctly:',
    [{text:as6n+' ',slot:false},{slot:true,idx:0},{text:' ',slot:false},{slot:true,idx:1},{text:' '+vb6.obj+' every day, but '+as6n+' ',slot:false},{slot:true,idx:2},{text:' on Sundays.',slot:false}],
    ['usually',vb6.s,"doesn't "+vb6.base],
    ['always',vb6.base,"don't "+vb6.base,vb6.s+'s'],
    'Slot 1: frequency adverb. Slot 2: 3rd-person verb form. Slot 3: negative (doesn\'t + base verb).',
    'Pattern: name + <strong>usually</strong> + <strong>'+vb6.s+'</strong> + object, but name + <strong>doesn\'t '+vb6.base+'</strong>.'
  );
  /* Ex 7: Sort — Does + frequency + verb */
  var sn7=pick(['your sister','Marco','the new student','Ana']);
  var fr7=pick(['always','usually','sometimes','never']);
  var vb7=pick([
    {base:'cook',s:'cooks'},{base:'read',s:'reads'},
    {base:'exercise',s:'exercises'},{base:'sleep late',s:'sleeps late'},
  ]);
  buildSort('sort3',['Does',sn7,fr7,vb7.s+'?'],
    'Question + frequency adverb. Formula: Does + subject + adverb + verb (3rd person) + ?',
    'The correct question is: Does '+sn7+' '+fr7+' '+vb7.s+'? — Does opens it, then subject, then adverb, then verb with -s.');

  /* Ex 8: Match — sentence starters to completions */
  var sent8=shuffle([
    {left:'She _____ coffee every morning.',right:'drinks'},
    {left:'They _____ study on Sundays.',right:"don't"},
    {left:'_____ he live near school?',right:'Does'},
    {left:'I _____ wake up at 6 am.',right:'never'},
  ]);
  buildMatch('match2',sent8,
    'Read each sentence. What is missing — a verb form, a helper word, or a frequency adverb?',
    'drinks (3rd person -s), don\'t (negative for they), Does (question for he), never (frequency adverb before verb).'
  );
}

function sec(body,tag,title,content){
  var el=document.createElement('div');el.className='section';
  el.innerHTML='<div class="stag">'+tag+'</div><h2>'+title+'</h2>'+content;
  body.appendChild(el);
}
