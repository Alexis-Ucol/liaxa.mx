<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitos Fundacionales y Fuentes Históricas — Historia · 1° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #1a3a6b;
  --green-dark: #0f2244;
  --green-bg:   #e8edf5;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}

/* ── WELCOME ── */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.55rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}

/* ── RESTORE BAR ── */
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);}
#restoreBar strong{color:var(--gold);}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem;}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;}
.rbtn-yes{background:var(--green);color:#fff;}
.rbtn-yes:hover{background:var(--green-dark);}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

/* ── LESSON ── */
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);flex-wrap:wrap;}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}

/* ── LANGUAGE TOGGLE ── */
.lang-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;}
.lang-btn{padding:.28rem .7rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;transition:all .15s;}
.lang-btn.active{background:var(--green);color:#fff;}
[data-theme="dark"] .lang-btn.active{background:var(--green-dark);}

/* ── CONTENT ── */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}

/* ── MYTH SCROLL — the dramatic hook ── */
.myth-scroll{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:1.2rem 0;}
.myth-scroll-header{background:var(--green);padding:.7rem 1.2rem;display:flex;align-items:center;gap:.6rem;}
.myth-scroll-label{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:600;}
.myth-scroll-title{font-size:.9rem;font-weight:700;color:#fff;font-family:'Crimson Pro',serif;}
.myth-scroll-body{padding:1.2rem 1.4rem;}
.myth-scroll-body p{font-family:'Crimson Pro',serif;font-size:1.05rem;line-height:1.75;color:var(--text);font-style:italic;margin-bottom:.7rem;}
.myth-scroll-body p:last-child{margin-bottom:0;}
.myth-prompt{margin-top:1rem;padding:.75rem 1rem;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;font-size:.83rem;color:var(--text2);}
.myth-prompt strong{color:var(--text);}

/* ── CALLOUT ── */
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;color:var(--text2);}
.callout p+p{margin-top:.5rem;}

/* ── FIGURE ── */
.fig{margin:1.2rem 0;text-align:center;}
.fig svg{max-width:100%;height:auto;border-radius:10px;}
.fig-cap{font-size:.72rem;color:var(--text3);margin-top:.55rem;font-style:italic;}

/* ── MYTH DETECTIVE WIDGET ── */
.detective-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:1rem 0;}
.detective-title{font-size:.8rem;font-weight:700;color:var(--green-dark);margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem;}
.detective-instr{font-size:.82rem;color:var(--text2);margin-bottom:.9rem;}
.det-item{border:1.5px solid var(--border);border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem;background:var(--surface2);cursor:pointer;transition:all .15s;user-select:none;}
.det-item:hover:not(.det-done){border-color:var(--green);background:var(--green-bg);}
.det-item.det-done{cursor:default;}
.det-stmt{font-size:.87rem;color:var(--text);margin-bottom:.55rem;}
.det-choices{display:flex;gap:.5rem;flex-wrap:wrap;}
.det-btn{flex:1;min-width:110px;padding:.48rem .7rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .13s;font-family:inherit;}
.det-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-bg);}
.det-btn:disabled{cursor:default;}
.det-btn.det-pending{border-color:var(--gold);background:var(--gold-bg);color:var(--text);}
.det-btn.det-sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.det-btn.det-sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.det-fb{font-size:.76rem;margin-top:.5rem;display:none;color:var(--text2);}
.det-fb.show{display:block;}
.det-score{font-size:.72rem;color:var(--text3);text-align:right;margin-top:.5rem;}

/* ── SOURCE SORT WIDGET ── */
.sort-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:1rem 0;}
.sort-title{font-size:.8rem;font-weight:700;color:var(--green-dark);margin-bottom:.4rem;}
.sort-instr{font-size:.82rem;color:var(--text2);margin-bottom:.9rem;}
.sort-piles{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.8rem;}
.sort-pile{border:1.5px dashed var(--border);border-radius:10px;padding:.6rem;min-height:80px;}
.sort-pile-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:.4rem;}
.sort-pile-items{display:flex;flex-direction:column;gap:.3rem;}
.sort-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.45rem .6rem;font-size:.78rem;color:var(--text);cursor:grab;transition:all .13s;user-select:none;}
.sort-card:active{cursor:grabbing;}
.sort-pile.drag-over{border-color:var(--green);background:var(--green-bg);}
.sort-reset-btn{font-size:.75rem;font-weight:600;padding:.35rem .8rem;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;margin-top:.5rem;}
.sort-reset-btn:hover{border-color:var(--green);color:var(--green-dark);}
.sort-card:hover:not(.sort-placed){border-color:var(--green);}
.sort-card.sort-placed{cursor:default;}
.sort-card.sort-ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.sort-card.sort-bad{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.sort-hand{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.6rem;}
.sort-hand-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:.35rem;}
.sort-fb{font-size:.8rem;color:var(--text3);min-height:1.1rem;}

/* ── VENN INTERACTION WIDGET ── */
.venn-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:1rem 0;}
.venn-title{font-size:.8rem;font-weight:700;color:var(--green-dark);margin-bottom:.4rem;}
.venn-instr{font-size:.82rem;color:var(--text2);margin-bottom:.7rem;}
.venn-zones{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.7rem;}
.venn-zone{border:2px dashed var(--border);border-radius:10px;padding:.5rem;min-height:90px;}
.venn-zone-label{font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;font-weight:700;margin-bottom:.4rem;}
.venn-zone.vz-a .venn-zone-label{color:var(--green-dark);}
.venn-zone.vz-mid .venn-zone-label{color:var(--gold);}
.venn-zone.vz-b .venn-zone-label{color:#8b2500;}
.venn-chips{display:flex;flex-wrap:wrap;gap:.3rem;}
.venn-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.28rem .65rem;font-size:.76rem;cursor:pointer;transition:all .13s;user-select:none;color:var(--text2);}
.venn-chip:hover:not(.vchip-placed){border-color:var(--green);}
.venn-chip.vchip-placed{cursor:default;}
.venn-chip.vchip-ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.venn-chip.vchip-bad{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.venn-hand{margin-bottom:.65rem;}
.venn-hand-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:.35rem;}
.venn-hand-chips{display:flex;flex-wrap:wrap;gap:.35rem;}
.venn-fb{font-size:.8rem;color:var(--text3);min-height:1.1rem;}
.venn-check-btn{font-size:.78rem;font-weight:600;padding:.4rem .9rem;border-radius:7px;border:none;background:var(--green);color:#fff;cursor:pointer;margin-top:.5rem;}
.venn-check-btn:hover{background:var(--green-dark);}

/* ── PROBLEM CARDS ── */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;color:var(--text);}

/* ── WORK TABS ── */
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}

/* ── CANVAS ── */
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}

/* ── TEXTAREA ── */
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}

/* ── PHOTO ── */
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}

/* ── HINT ── */
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}

/* ── MC ── */
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:#ffe8e8;color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}

/* ── RESULT ── */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center;}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}

/* ── MATH FRACTIONS ── */
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15em;line-height:1.1;}
.mf-num{border-bottom:1.5px solid var(--text);padding:0 .2em .1em;font-size:.92em;text-align:center;}
.mf-den{padding:.1em .2em 0;font-size:.92em;text-align:center;}

/* ── BIAS HIGHLIGHT WIDGET ── */
.bias-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:1rem 0;}
.bias-title{font-size:.8rem;font-weight:700;color:var(--green-dark);margin-bottom:.4rem;}
.bias-instr{font-size:.82rem;color:var(--text2);margin-bottom:.8rem;}
.bias-text{font-family:'Crimson Pro',serif;font-size:.97rem;line-height:1.8;color:var(--text);background:var(--surface2);border-radius:8px;padding:.9rem 1rem;margin-bottom:.8rem;cursor:pointer;user-select:none;}
.bias-phrase{border-radius:4px;padding:0 2px;transition:all .13s;cursor:pointer;}
.bias-phrase:hover{background:var(--gold-bg);outline:1px solid var(--gold);}
.bias-phrase.bias-marked{background:#ffe8e8;color:var(--bad);outline:1px solid var(--bad);}
.bias-phrase.bias-correct{background:var(--ok-bg);color:var(--ok);outline:1px solid var(--ok);}
.bias-phrase.bias-missed{background:#d4edda;color:#1a6b3a;outline:1.5px solid var(--ok);}
.bias-actions{display:flex;gap:.6rem;margin-bottom:.6rem;flex-wrap:wrap;}
.bias-check-btn{font-size:.78rem;font-weight:600;padding:.4rem .9rem;border-radius:7px;border:none;background:var(--green);color:#fff;cursor:pointer;}
.bias-check-btn:hover{background:var(--green-dark);}
.bias-reset-btn{font-size:.78rem;font-weight:600;padding:.4rem .9rem;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;}
.bias-score{font-size:.8rem;color:var(--text3);min-height:1.2rem;}

/* ── MYTH BUILDER WIDGET ── */
.builder-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0;}
.builder-title{font-size:.8rem;font-weight:700;color:var(--green-dark);margin-bottom:.35rem;display:flex;align-items:center;gap:.4rem;}
.builder-instr{font-size:.82rem;color:var(--text2);margin-bottom:.9rem;}
.builder-story{font-family:'Crimson Pro',serif;font-size:1rem;line-height:1.9;color:var(--text);background:var(--gold-bg);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.8rem;border:1px solid var(--border);}
.builder-blank{display:inline-block;border-bottom:2px solid var(--green);min-width:90px;padding:0 .2rem;cursor:pointer;color:var(--green-dark);font-weight:600;font-style:normal;transition:all .13s;border-radius:3px 3px 0 0;}
.builder-blank:hover,.builder-blank:focus{background:var(--green-bg);outline:none;}
.builder-blank.filled{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
.builder-fields{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.7rem;}
@media(max-width:500px){.builder-fields{grid-template-columns:1fr;}}
.builder-field{display:flex;flex-direction:column;gap:.25rem;}
.builder-field label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:600;}
.builder-field input{padding:.5rem .7rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);font-size:.87rem;font-family:inherit;transition:border-color .15s;}
.builder-field input:focus{outline:none;border-color:var(--green);}
.builder-field input.bf-filled{border-color:var(--ok);background:var(--ok-bg);}
.builder-btn{font-size:.78rem;font-weight:600;padding:.45rem 1rem;border-radius:7px;border:none;background:var(--green);color:#fff;cursor:pointer;margin-top:.3rem;}
.builder-btn:hover{background:var(--green-dark);}
.builder-reveal{display:none;background:var(--green-bg);border-radius:10px;padding:1rem 1.2rem;margin-top:.7rem;border:1px solid var(--green);}
.builder-reveal.show{display:block;}
.builder-reveal-story{font-family:'Crimson Pro',serif;font-size:1rem;line-height:1.9;color:var(--text);font-style:italic;margin-bottom:.6rem;}
.builder-reveal-question{font-size:.82rem;color:var(--text2);background:var(--surface);border-radius:8px;padding:.65rem .85rem;}

.myth-reply-ta{width:100%;min-height:72px;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem;resize:vertical;line-height:1.5;display:block;margin-top:.5rem;}
.myth-reply-ta:focus{outline:none;border-color:var(--green);}

/* ── MOBILE ── */
@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;border-radius:12px;}
  .wlogos img{height:38px;}
  .wtitle{font-size:1.3rem;}
  .htitle{display:none;}
  .hlogos img{height:20px;}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
  .lbody{padding:1.2rem .7rem 3rem;}
  .section h2{font-size:1.3rem;}
  .pbody{padding:.75rem;}
  .pstmt{font-size:.84rem;}
  .mcopt{font-size:.83rem;padding:.58rem .7rem;}
  .dcanvas{height:220px;}
  .ctoolbar{gap:.25rem;}
  .myth-scroll-body p{font-size:.95rem;}
  .sort-piles{grid-template-columns:1fr;}
  .venn-zones{grid-template-columns:1fr;}
  .det-choices{flex-direction:column;}
  .det-btn{min-width:0;}
}
</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitle-el">Mitos Fundacionales y Fuentes Históricas</div>
    <div class="wcourse" id="wcourse-el">Historia · 1° Secundaria</div>
    <label class="flabel" id="lbl-name-el" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 1A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Tienes una sesión guardada.</strong><br>
      <span id="restoreSub">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Continuar</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Nueva sesión</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem;">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px;}.lbl{stroke:var(--gold);stroke-width:2.5;}.lba{fill:var(--gold);}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Mitos Fundacionales y Fuentes Históricas</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>.lht{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px;}.lhl{stroke:var(--gold);stroke-width:2;}.lha{fill:var(--gold);}</style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;<span id="pdfBtnLbl">Descargar Resultados PDF</span></button>
    </div>
  </div>
</div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

function getAttemptKey(n,g){return 'liaxa_his1t01g01__att__'+(n+'__'+g).replace(/\s+/g,'_');}
function nextAttempt(n,g){var k=getAttemptKey(n,g);var v=0;try{v=parseInt(localStorage.getItem(k)||'0',10)||0;}catch(e){}v++;try{localStorage.setItem(k,String(v));}catch(e){}return v;}
function currentAttempt(n,g){var k=getAttemptKey(n,g);try{return parseInt(localStorage.getItem(k)||'1',10)||1;}catch(e){return 1;}}

var studentData={}, problems=[], answeredCount=0, correctCount=0;

/* ── SESSION ── */
function lsKey(){var n=(studentData.name||'').trim();var g=(studentData.group||'').trim();return 'liaxa_his1t01g01__'+(n+'__'+g).replace(/\s+/g,'_');}
function saveSession(){
  if(!studentData.name)return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var blank=document.createElement('canvas');blank.width=dc.width;blank.height=dc.height;drawings.push(dc.toDataURL()===blank.toDataURL()?null:dc.toDataURL('image/png'));}
    else drawings.push(null);
    var ta=document.getElementById('ta'+i);texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,
    choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}
function loadSession(name,group){
  var key='liaxa_his1t01g01__'+(name+'__'+group).replace(/\s+/g,'_');
  try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}
}
function restoreSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group); if(!saved)return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};answeredCount=0;correctCount=0;
  var att=currentAttempt(name,group);
  buildLesson(seededRng(name+group+att));
  document.getElementById('welcomeScreen').style.display='none';

/* ── SEEDED RNG ── */
function seededRng(seed){
  var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function shuffleOpts(opts,correct,rng){var arr=opts.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return{opts:arr,correctIdx:arr.indexOf(correct)};}

/* ── CANVAS ── */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen'))ctx.lineWidth=2;
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');
      ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

/* ── MC HANDLER ── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){
      if(i===prob.correctIdx)o.classList.add('rc');
      if(i===chosenIdx&&isOk)o.classList.add('sc');
      if(i===chosenIdx&&!isOk)o.classList.add('sw');
    });
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML='<strong>'+(isOk?t('fb-correct'):t('fb-wrong'))+'</strong> '+prob.explanation[LANG];
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();
    if(answeredCount===problems.length)setTimeout(showResults,700);
    return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});

    if(i===chosenIdx&&isOk)o.classList.add('sc');
    if(i===chosenIdx&&!isOk)o.classList.add('sw');
  });
  var fb=document.getElementById('fb'+probIdx);

  fb.className='mcfb show '+(isOk?'fbok':'fbbad');

}

/* ── DETECTIVE WIDGET (classify each statement) ── */
var DET_WIDGETS={};
var DET_PENDING={};  /* tracks pending (first-tap) choice per item: key = id+'_'+pos */
function buildDetectiveWidget(id,titleEs,titleEn,instrEs,instrEn,items,rng){
  var order=shuffle(items.map(function(_,i){return i;}),rng);
  var answered=0;
  DET_WIDGETS[id]={answered:0,total:items.length};
  var itemsHtml=order.map(function(ci,pos){
    var item=items[ci];
    var btnHtml=item.choices.map(function(choice,bi){
      return '<button class="det-btn" data-val="'+choice.val+'" data-correct="'+item.correct+'" onclick="detTap(\''+id+'\','+pos+',this)">'+
        (LANG==='es'?choice.es:choice.en)+'</button>';
    }).join('');
    return '<div class="det-item" id="'+id+'_item'+pos+'">'+
      '<div class="det-stmt">'+(LANG==='es'?item.stmtEs:item.stmtEn)+'</div>'+
      '<div class="det-choices">'+btnHtml+'</div>'+
      '<div class="det-fb" id="'+id+'_fb'+pos+'"></div>'+
    '</div>';
  }).join('');
  var div=document.createElement('div');div.className='section';
  div.innerHTML=
    '<div class="detective-wrap">'+
      '<div class="detective-title">🔍 '+(LANG==='es'?titleEs:titleEn)+'</div>'+
      '<div class="detective-instr">'+(LANG==='es'?instrEs:instrEn)+
        ' <span style="font-size:.76rem;color:var(--text3)">'+(LANG==='es'?'(toca dos veces para confirmar)':'(tap twice to confirm)')+'</span></div>'+
      itemsHtml+
      '<div class="det-score" id="'+id+'_score"></div>'+
    '</div>';
  document.getElementById('lessonBody').appendChild(div);
  updateDetScore(id);
}
function detTap(id,pos,btn){
  var item=document.getElementById(id+'_item'+pos);
  if(item.classList.contains('det-done'))return;
  var pendKey=id+'_'+pos;
  /* First tap: highlight as pending */
  if(DET_PENDING[pendKey]!==btn){
    /* Clear any previous pending on this item */
    item.querySelectorAll('.det-btn').forEach(function(b){b.classList.remove('det-pending');});
    DET_PENDING[pendKey]=btn;
    btn.classList.add('det-pending');
    return;
  }
  /* Second tap on same button: confirm */
  delete DET_PENDING[pendKey];
  item.classList.add('det-done');
  var val=btn.dataset.val;
  var correct=btn.dataset.correct;
  var btns=item.querySelectorAll('.det-btn');
  btns.forEach(function(b){b.disabled=true;b.classList.remove('det-pending');});
  var isOk=(val===correct);
  btns.forEach(function(b){
    if(b.dataset.val===correct){
      b.classList.add('det-sc');
    } else if(b===btn&&!isOk){
      b.classList.add('det-sw');
    }
  });
  var fb=document.getElementById(id+'_fb'+pos);fb.className='det-fb show';
  fb.textContent=isOk?(LANG==='es'?'✓ Correcto.':'✓ Correct.'):(LANG==='es'?'✗ Incorrecto — la respuesta correcta está en verde.':'✗ Incorrect — the correct answer is shown in green.');
  DET_WIDGETS[id].answered++;
  updateDetScore(id);
}
/* Drag support for sort widget */
var SORT_DRAG_ID=null,SORT_DRAG_CI=null;
function sortDragStart(id,ci,ev){
  var el=document.getElementById(id+'_card'+ci);
  if(!el||el.classList.contains('sort-placed'))return;
  SORT_DRAG_ID=id;SORT_DRAG_CI=ci;
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',id+'::'+ci);
  setTimeout(function(){if(el)el.style.opacity='0.4';},0);
}
function sortDragOver(ev){
  ev.preventDefault();ev.dataTransfer.dropEffect='move';
  var pile=ev.currentTarget;pile.classList.add('drag-over');
}
function sortDragLeave(ev){ev.currentTarget.classList.remove('drag-over');}
function sortDropDrag(id,cat,ev){
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  if(SORT_DRAG_ID!==id)return;
  var ci=SORT_DRAG_CI;
  var el=document.getElementById(id+'_card'+ci);
  if(el)el.style.opacity='';
  SORT_DRAG_ID=null;SORT_DRAG_CI=null;
  // Reuse click logic
  var state=SORT_STATE[id];state.selected=ci;
  sortDrop(id,cat);
}
function sortReset(id){
  var state=SORT_STATE[id];if(!state)return;
  /* restore all cards to hand */
  state.cards.forEach(function(c,ci){
    var el=document.getElementById(id+'_card'+ci);
    if(el){
      el.classList.remove('sort-placed','sort-ok','sort-bad');
      el.style.display='';el.style.opacity='';
      el.setAttribute('draggable','true');
    }
  });
  /* clear pile items */
  var cats=[];state.cards.forEach(function(c){if(cats.indexOf(c.cat)<0)cats.push(c.cat);});
  cats.forEach(function(cat){
    var pile=document.getElementById(id+'_pileitems_'+cat);
    if(pile)pile.innerHTML='';
  });
  state.selected=null;state.placed=0;
  var fb=document.getElementById(id+'_fb');
  if(fb)fb.textContent='';
}
/* Drag support for sort widget */
var SORT_DRAG_ID=null,SORT_DRAG_CI=null;
function sortDragStart(id,ci,ev){
  var el=document.getElementById(id+'_card'+ci);
  if(!el||el.classList.contains('sort-placed'))return;
  SORT_DRAG_ID=id;SORT_DRAG_CI=ci;
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',id+'::'+ci);
  setTimeout(function(){if(el)el.style.opacity='0.4';},0);
}
function sortDragOver(ev){
  ev.preventDefault();ev.dataTransfer.dropEffect='move';
  ev.currentTarget.classList.add('drag-over');
}
function sortDragLeave(ev){ev.currentTarget.classList.remove('drag-over');}
function sortDropDrag(id,cat,ev){
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  if(SORT_DRAG_ID!==id)return;
  var ci=SORT_DRAG_CI;
  var el=document.getElementById(id+'_card'+ci);
  if(el)el.style.opacity='';
  SORT_DRAG_ID=null;SORT_DRAG_CI=null;
  var state=SORT_STATE[id];state.selected=ci;
  sortDrop(id,cat);
}
function sortReset(id){
  var state=SORT_STATE[id];if(!state)return;
  state.cards.forEach(function(c,ci){
    var el=document.getElementById(id+'_card'+ci);
    if(el){el.classList.remove('sort-placed','sort-ok','sort-bad');el.style.display='';el.style.opacity='';el.setAttribute('draggable','true');}
  });
  var cats=[];state.cards.forEach(function(c){if(cats.indexOf(c.cat)<0)cats.push(c.cat);});
  cats.forEach(function(cat){var pile=document.getElementById(id+'_pileitems_'+cat);if(pile)pile.innerHTML='';});
  state.selected=null;state.placed=0;
  var fb=document.getElementById(id+'_fb');if(fb)fb.textContent='';
}
function updateDetScore(id){
  var w=DET_WIDGETS[id];if(!w)return;
  var el=document.getElementById(id+'_score');
  if(el)el.textContent=w.answered+' / '+w.total;
}

/* ── SOURCE SORT WIDGET ── */
var SORT_STATE={};
function buildSortWidget(id,titleEs,titleEn,instrEs,instrEn,cards,rng){
  var order=shuffle(cards.map(function(_,i){return i;}),rng);
  SORT_STATE[id]={selected:null,placed:0,total:cards.length,cards:cards};
  var handHtml=order.map(function(ci){
    var c=cards[ci];
    return '<div class="sort-card" id="'+id+'_card'+ci+'" data-idx="'+ci+'" draggable="true" onclick="sortPick(\''+id+'\','+ci+',this)" ondragstart="sortDragStart(\''+id+'\','+ci+',event)">'+
      (LANG==='es'?c.textEs:c.textEn)+'</div>';
  }).join('');
  var cats=[];cards.forEach(function(c){if(cats.indexOf(c.cat)<0)cats.push(c.cat);});
  var pilesHtml=cats.map(function(cat){
    var catDef=cards.filter(function(c){return c.cat===cat;})[0];
    return '<div class="sort-pile" id="'+id+'_pile_'+cat+'" data-cat="'+cat+'" onclick="sortDrop(\''+id+'\',\''+cat+'\')" ondragover="sortDragOver(event)" ondragleave="sortDragLeave(event)" ondrop="sortDropDrag(\''+id+'\',\''+cat+'\',event)">'+
      '<div class="sort-pile-label">'+(LANG==='es'?catDef.catLabelEs:catDef.catLabelEn)+'</div>'+
      '<div class="sort-pile-items" id="'+id+'_pileitems_'+cat+'"></div>'+
    '</div>';
  }).join('');
  var div=document.createElement('div');div.className='section';
  div.innerHTML=
    '<div class="sort-wrap">'+
      '<div class="sort-title">🗂 '+(LANG==='es'?titleEs:titleEn)+'</div>'+
      '<div class="sort-instr">'+(LANG==='es'?instrEs:instrEn)+'</div>'+
      '<div class="sort-hand-label">'+(LANG==='es'?'Fuentes a clasificar:':'Sources to classify:')+'</div>'+
      '<div class="sort-hand" id="'+id+'_hand">'+handHtml+'</div>'+
      '<div class="sort-piles">'+pilesHtml+'</div>'+
      '<div class="sort-fb" id="'+id+'_fb"></div>'+
      '<button class="sort-reset-btn" onclick="sortReset(\''+id+'\')">'+(LANG==='es'?'↺ Intentar de nuevo':'↺ Try again')+'</button>'+
    '</div>';
  document.getElementById('lessonBody').appendChild(div);
}
function sortPick(id,ci,el){
  if(el.classList.contains('sort-placed'))return;
  var state=SORT_STATE[id];
  // deselect previous
  if(state.selected!==null){var prev=document.getElementById(id+'_card'+state.selected);if(prev)prev.style.outline='';}
  state.selected=ci;
  el.style.outline='2px solid var(--green)';
  var fb=document.getElementById(id+'_fb');
  if(fb)fb.textContent=LANG==='es'?'Ahora toca la pila donde crees que corresponde.':'Now tap the pile where you think it belongs.';
}
function sortDrop(id,cat){
  var state=SORT_STATE[id];if(state.selected===null)return;
  var ci=state.selected;var card=state.cards[ci];
  var el=document.getElementById(id+'_card'+ci);
  if(!el||el.classList.contains('sort-placed'))return;
  state.selected=null;el.style.outline='';
  el.classList.add('sort-placed');
  var isOk=(card.cat===cat);
  el.classList.add(isOk?'sort-ok':'sort-bad');
  var pile=document.getElementById(id+'_pileitems_'+cat);
  if(pile){var clone=el.cloneNode(true);clone.onclick=null;pile.appendChild(clone);}
  el.style.display='none';
  var fb=document.getElementById(id+'_fb');
  if(fb)fb.textContent=isOk?(LANG==='es'?'✓ Correcto.':'✓ Correct.'):(LANG==='es'?'✗ Incorrecto — esa fuente no pertenece ahí.':'✗ Incorrect — that source doesn\'t belong there.');
  state.placed++;
}

var BIAS_MARKED={};
/* phrases: array of {textEs, textEn, isBias:bool} */
function buildBiasWidget(id,titleEs,titleEn,instrEs,instrEn,phraseGroups){
  /* phraseGroups: array of groups, each group is array of phrase objects {es,en,bias:bool} */
  /* Rendered as a chronicle text, biased phrases are clickable */
  BIAS_MARKED[id]={};
  var total_bias=0;
  var textHtml='';
  phraseGroups.forEach(function(group,gi){
    group.forEach(function(ph,pi){
      var pid=id+'_p'+gi+'_'+pi;
      if(ph.bias)total_bias++;
      textHtml+='<span class="bias-phrase" id="'+pid+'" data-bias="'+(ph.bias?'1':'0')+'" onclick="biasClick(\''+id+'\',\''+pid+'\')">'+(LANG==='es'?ph.es:ph.en)+'</span>';
    });
    if(gi<phraseGroups.length-1)textHtml+=' ';
  });
  BIAS_MARKED[id].total=total_bias;BIAS_MARKED[id].marked=[];
  var div=document.createElement('div');div.className='section';
  div.innerHTML=
    '<div class="bias-wrap">'+
      '<div class="bias-title">🔎 '+(LANG==='es'?titleEs:titleEn)+'</div>'+
      '<div class="bias-instr">'+(LANG==='es'?instrEs:instrEn)+'</div>'+
      '<div class="bias-text" id="'+id+'_text">'+textHtml+'</div>'+
      '<div class="bias-actions">'+
        '<button class="bias-check-btn" onclick="biasCheck(\''+id+'\')">'+(LANG==='es'?'Verificar mis marcas':'Check my marks')+'</button>'+
        '<button class="bias-reset-btn" onclick="biasReset(\''+id+'\')">'+(LANG==='es'?'Borrar todo':'Clear all')+'</button>'+
      '</div>'+
      '<div class="bias-score" id="'+id+'_score">'+(LANG==='es'?'Toca las frases que revelan el punto de vista del autor.':'Tap the phrases that reveal the author\'s point of view.')+'</div>'+
    '</div>';
  document.getElementById('lessonBody').appendChild(div);
}
function biasClick(id,pid){
  var el=document.getElementById(pid);if(!el||el.classList.contains('bias-correct')||el.classList.contains('bias-missed'))return;
  var state=BIAS_MARKED[id];
  var idx=state.marked.indexOf(pid);
  if(idx>-1){el.classList.remove('bias-marked');state.marked.splice(idx,1);}
  else{el.classList.add('bias-marked');state.marked.push(pid);}
}
function biasCheck(id){
  var state=BIAS_MARKED[id];
  var el=document.getElementById(id+'_text');if(!el)return;
  var phrases=el.querySelectorAll('.bias-phrase');
  var hits=0,false_pos=0;
  phrases.forEach(function(ph){
    ph.classList.remove('bias-marked','bias-correct','bias-missed');
    var isBias=ph.dataset.bias==='1';
    var wasMarked=state.marked.indexOf(ph.id)>-1;
    if(isBias&&wasMarked){ph.classList.add('bias-correct');hits++;}
    else if(!isBias&&wasMarked){ph.classList.add('bias-marked');false_pos++;}
    else if(isBias&&!wasMarked){ph.classList.add('bias-missed');}
  });
  var score=document.getElementById(id+'_score');
  if(score){
    var msg=LANG==='es'
      ?'✓ '+hits+' de '+state.total+' sesgos encontrados. '+(false_pos>0?'('+false_pos+' marca(s) incorrecta(s))':'')+(hits===state.total&&false_pos===0?' 🎉 ¡Perfecto!':'')
      :'✓ '+hits+' of '+state.total+' biases found. '+(false_pos>0?'('+false_pos+' incorrect mark(s))':'')+(hits===state.total&&false_pos===0?' 🎉 Perfect!':'');
    score.textContent=msg;
    score.style.color=hits===state.total&&false_pos===0?'var(--ok)':'var(--text2)';
  }
}
function biasReset(id){
  var state=BIAS_MARKED[id];state.marked=[];
  var el=document.getElementById(id+'_text');if(!el)return;
  el.querySelectorAll('.bias-phrase').forEach(function(ph){ph.className='bias-phrase';});
  var score=document.getElementById(id+'_score');
  if(score){score.textContent=LANG==='es'?'Toca las frases que revelan el punto de vista del autor.':'Tap the phrases that reveal the author\'s point of view.';score.style.color='';}
}

function builderGenerate(id){

  var story=es
    ?'Desde tiempos inmemoriales, '+civ+' erraron por tierras desconocidas, buscando el lugar que '+dios+' les había prometido. "Sabrán que han llegado," decía la antigua profecía, "cuando vean '+senial+'." Generación tras generación, siguieron adelante. Entonces, un amanecer, lo vieron: '+senial+'. Los ancianos gritaron de alegría. Ese era el lugar. Fundaron su ciudad '+lugar+', y la llamaron hogar para siempre. Y para que nunca olvidaran de dónde venían, '+dios+' creó a su pueblo de '+material+' — para que llevaran en su propio cuerpo la memoria de sus orígenes.'
    :'Since time immemorial, '+civ+' wandered through unknown lands, searching for the place that '+dios+' had promised them. "You will know you have arrived," the ancient prophecy said, "when you see '+senial+'." Generation after generation, they pressed on. Then, one dawn, they saw it: '+senial+'. The elders cried out with joy. That was the place. They founded their city '+lugar+', and called it home forever. And so they would never forget where they came from, '+dios+' created their people from '+material+' — so they would carry in their very bodies the memory of their origins.';
  var storyEl=document.getElementById(id+'_story');
  var revealEl=document.getElementById(id+'_reveal');
  if(storyEl)storyEl.textContent=story;
  if(revealEl)revealEl.classList.add('show');
}

function addProblem(bankIdx,rng){
  var bank=BANKS[bankIdx];
  var variant=pick(bank.variants,rng);
  var es=LANG==='es';
  var correct=variant.opts.es[0]; // always index 0 is correct in source
  var correctEn=variant.opts.en[0];
  var shu=shuffleOpts(variant.opts[LANG],variant.opts[LANG][0],rng);
  var shuEn=shuffleOpts(variant.opts.en,variant.opts.en[0],rng);
  // build bilingual options in same shuffled order
  var perm=[];
  shu.opts.forEach(function(opt){perm.push(variant.opts[LANG].indexOf(opt));});
  var prob={
    title:{es:variant.title.es,en:variant.title.en},
    questionText:{es:variant.stmt.es,en:variant.stmt.en},
    options:{es:shu.opts,en:perm.map(function(i){return variant.opts.en[i];})},
    correctIdx:shu.correctIdx,
    hint:{es:variant.hint.es,en:variant.hint.en},
    explanation:{es:variant.expl.es,en:variant.expl.en},
    showWork: variant.showWork !== undefined ? variant.showWork : false,
    studentChoice:null,pendingChoice:null
  };
  problems.push(prob);
  buildOneCard(prob,problems.length-1);
}

    '<p>Durante generaciones, el pueblo mexica había caminado sin descanso buscando el lugar que su dios Huitzilopochtli les había prometido. "Cuando vean un águila parada sobre un nopal, con una serpiente en el pico — ahí fundarán su ciudad."</p><p>Un día, en medio de un lago lleno de islotes, lo vieron. El ave era enorme. La serpiente se retorcía en su pico. El nopal crecía sobre una roca en el agua. Los mexicas supieron en ese instante que habían llegado. Llamaron al lugar Tenochtitlan — "lugar del nopal sobre la roca". Año 1325.</p>',
    '<p>For generations, the Mexica people had walked without rest, searching for the place their god Huitzilopochtli had promised them. "When you see an eagle perched on a cactus, with a serpent in its beak — there you will found your city."</p><p>One day, in the middle of a lake full of small islands, they saw it. The bird was enormous. The serpent writhed in its beak. The cactus grew from a rock in the water. The Mexica knew in that instant they had arrived. They called the place Tenochtitlan — "place of the cactus on the rock." Year 1325.</p>',
    es?'¿Crees que un águila con una serpiente le habría "dicho" realmente a alguien dónde fundar una ciudad? ¿Entonces por qué este relato fue tan importante para el pueblo mexica?':

  addSection(
    '<div class="stag">'+(es?'Concepto 1':'Concept 1')+'</div>'+
    '<h2>'+(es?'¿Qué es un mito fundacional?':'What is a founding myth?')+'</h2>'+
    '<p>'+(es
      ?'Un <strong>mito fundacional</strong> es un relato que un pueblo transmite para explicar su propio origen: cómo surgió su ciudad, su nación o su identidad como grupo. No pretende ser un registro histórico exacto con fechas verificables, sino una forma <em>simbólica</em> de dar sentido a quiénes son y de dónde vienen.'
      :'A <strong>founding myth</strong> is a story that a people passes down to explain their own origin: how their city, nation, or group identity arose. It doesn\'t claim to be an exact historical record with verifiable dates, but rather a <em>symbolic</em> way of making sense of who they are and where they come from.')+

    '<p>'+(es
      ?'El mito mexica del águila y la serpiente no describe un hecho geográfico random: describe <strong>por qué Tenochtitlan tenía que estar exactamente donde estaba</strong>, y lo hace con imágenes que conectan al pueblo con sus dioses. Ese es el poder de un mito fundacional.'
      :'The Mexica myth of the eagle and serpent doesn\'t describe a random geographical fact: it describes <strong>why Tenochtitlan had to be exactly where it was</strong>, and it does so with images that connect the people with their gods. That is the power of a founding myth.')+

    '<div class="callout"><strong>'+(es?'Idea clave:':'Key idea:')+'</strong><p>'+(es
      ?'Un mito fundacional no necesita ser literalmente verificable para ser históricamente importante. Su importancia está en lo que revela sobre cómo un pueblo se entendía a sí mismo.'
      :'A founding myth does not need to be literally verifiable to be historically important. Its importance lies in what it reveals about how a people understood itself.')+

  addProblem(0,rng);

  /* ──────────────────────────────────────────

  addMythScroll(

    es?'La loba y los gemelos':'The wolf and the twins',
    '<p>Marte, dios de la guerra, tuvo dos hijos gemelos: Rómulo y Remo. Su tío abuelo, que los temía, ordenó arrojarlos al río Tíber para que murieran. Pero la corriente los llevó hasta la orilla, donde una loba los encontró. En lugar de devorarlos, los amamantó como si fueran sus propias crías.</p><p>Años después, los gemelos regresaron, derrocaron al tirano y buscaron el lugar para fundar su propia ciudad. Eligieron las siete colinas. Pero los hermanos discutieron sobre cuál colina sería el centro. En la pelea, Rómulo mató a Remo — y fundó Roma solo. Según la tradición, en el año 753 a.C.</p>',
    '<p>Mars, god of war, had twin sons: Romulus and Remus. Their great-uncle, who feared them, ordered them thrown into the Tiber River to die. But the current carried them to the bank, where a she-wolf found them. Instead of devouring them, she nursed them as if they were her own cubs.</p><p>Years later, the twins returned, overthrew the tyrant, and sought a place to found their own city. They chose the seven hills. But the brothers argued about which hill would be the center. In the fight, Romulus killed Remus — and founded Rome alone. According to tradition, in the year 753 BCE.</p>',

      :'Cultures that never met each other ended up telling stories with strikingly similar structures. In the Mexica myth and the Roman one, an <strong>extraordinary sign</strong> shows where to found the city. In the Maya Popol Vuh and certain Egyptian myths, human beings emerge from a specific material or the world rises from an initial chaotic state.')+

    '<p>Según el Popol Vuh — el texto sagrado del pueblo maya k\'iche\' — los dioses intentaron crear seres humanos varias veces y fallaron. Primero usaron barro: las figuras se deshicieron con la lluvia. Luego tallaron figuras de madera: caminaban y hablaban, pero no tenían alma ni memoria, no reconocían a sus creadores.</p><p>Al final, los dioses encontraron el material correcto: maíz blanco y maíz amarillo. Con esa masa modelaron cuatro hombres. Estos sí podían ver, pensar, agradecer. Tan perfectos eran que los dioses tuvieron que empañar un poco su visión — para que no vieran todo lo que solo los dioses deben ver.</p>',
    '<p>According to the Popol Vuh — the sacred text of the K\'iche\' Maya people — the gods tried to create human beings several times and failed. First they used mud: the figures dissolved in the rain. Then they carved wooden figures: they walked and talked, but had no soul or memory, and did not recognize their creators.</p><p>Finally, the gods found the right material: white maize and yellow maize. From that dough they shaped four men. These could see, think, give thanks. They were so perfect that the gods had to blur their vision a little — so they wouldn\'t see everything only the gods are meant to see.</p>',

      '<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;">'+
        '<div style="font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);font-weight:700;margin-bottom:.35rem">'+
          (es?'🪨 Evidencia material':'🪨 Material evidence')+'</div>'+
        '<div style="font-size:.82rem;color:var(--text2);line-height:1.55">'+
          (es?'Objetos y restos físicos que los arqueólogos pueden examinar directamente. No dependen de la perspectiva de ningún autor — hablan por sí solos.'
             :'Objects and physical remains that archaeologists can examine directly. They do not depend on any author\'s perspective — they speak for themselves.')+
        '</div>'+
      '</div>'+
    '</div>'
  );

  /* Sort widget: classify source types — BEFORE bias widget */
  buildSortWidget('sort1',
    es?'Clasifica las fuentes':'Classify the sources',
    es?'Clasifica las fuentes':'Classify the sources',
    es?'Arrastra o toca cada fuente y colócala en la categoría correcta. Puedes intentarlo cuantas veces necesites.':'Drag or tap each source and place it in the correct category. You can try as many times as needed.',
    es?'Arrastra o toca cada fuente y colócala en la categoría correcta. Puedes intentarlo cuantas veces necesites.':'Drag or tap each source and place it in the correct category. You can try as many times as needed.',
    SORT_CARDS_SOURCES(),rng);

  /* Bridge into bias: now that students know the source types, introduce bias */
  addSection(
    '<div style="margin-top:.5rem">'+
    '<div class="callout" style="border-left-color:var(--bad);background:var(--bad-bg)">'+
      '<strong style="color:var(--bad)">'+(es?'Ahora bien: ninguna fuente es neutral.':'Now: no source is neutral.')+'</strong>'+
      '<p style="margin-top:.4rem">'+(es
        ?'Las crónicas escritas son especialmente útiles — pero también especialmente peligrosas. Quien las escribió tenía sus propios valores, prejuicios y creencias. A veces eso se cuela en el texto de formas sutiles. <strong>Saber identificar esas marcas de sesgo</strong> es una habilidad clave del historiador.'
        :'Written chronicles are especially useful — but also especially tricky. Whoever wrote them had their own values, prejudices, and beliefs. Sometimes that seeps into the text in subtle ways. <strong>Knowing how to identify those marks of bias</strong> is a key historian\'s skill.')+
      '</p>'+
    '</div>'+
    '</div>'
  );

  /* Bias highlight widget — AFTER sort, preceded by the bias bridge */
  var BIAS_CHRONICLE=[
    [{es:'Los sacerdotes mexicas vivían encerrados en oscuros templos, ',en:'The Mexica priests lived locked away in dark temples, '},
     {es:'entregados a extraños rituales que ningún hombre civilizado podría entender.',en:'given over to strange rituals that no civilized man could understand.',bias:true}],
    [{es:' El gran sacerdote, vestido con ropas de plumas que parecían las de un salvaje,',en:' The high priest, dressed in feathered robes that looked like those of a savage,',bias:true}],
    [{es:' nos condujo al centro del templo.',en:' led us to the center of the temple.'}],
    [{es:' Ante nuestros ojos, realizaron',en:' Before our eyes, they performed'}],
    [{es:' sus abominables ceremonias,',en:' their abominable ceremonies,',bias:true}],
    [{es:' evidencia clara de que este pueblo necesitaba urgentemente la luz de nuestra fe.',en:' clear evidence that this people urgently needed the light of our faith.',bias:true}],
    [{es:' Sin embargo, debo reconocer que el orden con que conducían sus ritos era admirable.',en:' However, I must acknowledge that the order with which they conducted their rites was admirable.'}],
    [{es:' Sus construcciones eran de una grandeza que pocas ciudades de Europa igualaban.',en:' Their buildings were of a grandeur that few cities in Europe could match.'}]
  ];
  buildBiasWidget('bias1',
    es?'Detecta el sesgo del cronista':'Spot the chronicler bias',
    es?'Detecta el sesgo del cronista':'Spot the chronicler bias',
    es?'Esta es una crónica de un fraile español del siglo XVI describiendo lo que vio en Tenochtitlan. Algunas frases muestran su punto de vista y prejuicios — otras son más neutrales. <strong>Toca las frases que crees que revelan el sesgo del autor</strong>, luego presiona "Verificar".':
       'This is a chronicle from a 16th-century Spanish friar describing what he saw in Tenochtitlan. Some phrases show his viewpoint and biases — others are more neutral. <strong>Tap the phrases you think reveal the author bias</strong>, then press "Check".',
    es?'Esta es una crónica de un fraile español del siglo XVI describiendo lo que vio en Tenochtitlan. Algunas frases muestran su punto de vista y prejuicios — otras son más neutrales. <strong>Toca las frases que crees que revelan el sesgo del autor</strong>, luego presiona "Verificar".':
       'This is a chronicle from a 16th-century Spanish friar describing what he saw in Tenochtitlan. Some phrases show his viewpoint and biases — others are more neutral. <strong>Tap the phrases you think reveal the author bias</strong>, then press "Check".',
    BIAS_CHRONICLE);

  addProblem(2,rng);
  addProblem(3,rng);

  /* ──────────────────────────────────────────
     CONCEPTO 4: Mito e identidad hoy
     ────────────────────────────────────────── */
  addMythScroll(
    'Mito 4','Myth 4',
    es?'El mundo desde un huevo cósmico y el océano primordial':'The world from a cosmic egg and the primordial ocean',
    es?'El mundo desde un huevo cósmico y el océano primordial':'The world from a cosmic egg and the primordial ocean',
    '<p>En ciertas tradiciones antiguas de China, antes de que existiera cualquier cosa, todo era un huevo oscuro y sin forma. Dentro de él flotaban juntos el cielo y la tierra, el yin y el yang, mezclados en el caos. Un día el huevo se rompió: lo pesado y oscuro cayó y formó la tierra; lo ligero y claro subió y formó el cielo.</p><p>En el antiguo Egipto, el relato era diferente en los detalles pero similar en la estructura: al principio solo existía Nun, el océano primordial de aguas oscuras e inmóviles. De esas aguas emergió una colina, la primera tierra. Sobre ella apareció el primer dios, Atum, y con él comenzó el orden del mundo.</p>',
    '<p>In certain ancient traditions from China, before anything existed, everything was a dark, shapeless egg. Inside it floated sky and earth together, yin and yang, mixed in chaos. One day the egg cracked: what was heavy and dark fell and formed the earth; what was light and clear rose and formed the sky.</p><p>In ancient Egypt, the account was different in details but similar in structure: in the beginning only Nun existed, the primordial ocean of dark, still waters. From those waters a hill emerged, the first land. Upon it appeared the first god, Atum, and with him the world\'s order began.</p>',
    es?'¿Qué tienen en común estos dos mitos de culturas que nunca se conocieron? ¿Y en qué son diferentes?':
       'What do these two myths from cultures that never met have in common? And how are they different?'
  );

  addSection(
    '<div class="stag">'+(es?'Concepto 4':'Concept 4')+'</div>'+
    '<h2>'+(es?'Los mitos siguen vivos — y siguen importando':'Myths are still alive — and still matter')+'</h2>'+
    '<p>'+(es
      ?'El mito del águila y la serpiente no quedó en el año 1325. Hoy aparece en la <strong>bandera de México</strong>. El mito de Rómulo y Remo está en museos, en películas, en los nombres de calles de Roma. El Popol Vuh se estudia en universidades de todo el mundo. Los mitos fundacionales no son reliquias muertas: son parte viva de la identidad de los pueblos.'
      :'The myth of the eagle and the serpent did not stay in the year 1325. Today it appears on the <strong>flag of Mexico</strong>. The myth of Romulus and Remus is in museums, in films, in street names in Rome. The Popol Vuh is studied in universities worldwide. Founding myths are not dead relics: they are a living part of peoples\' identities.')+
    '</p>'+
    '<p>'+(es
      ?'Al mismo tiempo, estudiar mitos críticamente — comparando fuentes, detectando perspectivas, reconociendo sus límites — no los destruye: los enriquece. Entender <em>por qué</em> un pueblo contó esa historia, en ese momento, con esos símbolos, nos acerca más a ese pueblo que simplemente memorizarla.'
      :'At the same time, studying myths critically — comparing sources, detecting perspectives, recognizing their limits — does not destroy them: it enriches them. Understanding <em>why</em> a people told that story, at that moment, with those symbols, brings us closer to that people than simply memorizing it.')+
    '</p>'+
    '<div class="callout"><strong>'+(es?'Idea clave:':'Key idea:')+'</strong><p>'+(es
      ?'Mito e historia crítica no se oponen: se complementan. Uno nos dice quiénes somos; la otra nos ayuda a entender cómo llegamos a pensarlo.'
      :'Myth and critical history don\'t oppose each other: they complement each other. One tells us who we are; the other helps us understand how we came to think it.')+
    '</p></div>'
  );

  addProblem(4,rng);
  addProblem(5,rng);

  /* ── MYTH BUILDER — before final assessment ── */
  buildMythBuilder('builder1',rng);

  /* ──────────────────────────────────────────
     EVALUACIÓN FINAL
     ────────────────────────────────────────── */
  addSection(
    '<div class="stag">'+(es?'Evaluación final':'Final assessment')+'</div>'+
    '<h2>'+(es?'Lo que aprendiste, aplicado':'What you learned, applied')+'</h2>'+
    '<p>'+(es
      ?'Las siguientes preguntas combinan las cuatro ideas de esta guía. No hay explicación previa — usa lo que ya sabes sobre mitos fundacionales, fuentes históricas y análisis crítico.'
      :'The following questions combine the four ideas from this guide. There\'s no explanation beforehand — use what you already know about founding myths, historical sources, and critical analysis.')+
    '</p>'
  );

  addProblem(6,rng);
  addProblem(7,rng);
  addProblem(8,rng);
  addProblem(9,rng);
}
</script>
</body>
</html>
