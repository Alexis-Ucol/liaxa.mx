<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fracciones Equivalentes — UNIVA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">(function() {
  try {
    var t = localStorage.getItem('udec_theme');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
      document.addEventListener('DOMContentLoaded', function() {
        var b = document.getElementById('themeBtn');
        if (b) b.textContent = t === 'dark' ? '☀️' : '🌙';
      });
    }
  } catch(e) {}
})();

</script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — UNIVA palette ── */
:root {
  --green:#003478; --green-dark:#001f4d; --green-bg:#e6edf7;
  --gold:#c8a951;  --gold-bg:#faf6e8;
  --bg:#f5f7fa;    --surface:#ffffff;    --surface2:#edf0f5;
  --border:#d4d9e3; --text:#141820;      --text2:#3a4050; --text3:#6a7080;
  --ok:#1a6a4a;    --ok-bg:rgba(26,106,74,.10);
  --bad:#b03010;   --bad-bg:rgba(176,48,16,.08);
  --shadow:0 4px 24px rgba(26,74,138,.13);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green:#5a88d4; --green-dark:#80a8e8;
  --green-bg:#0d1e38; --gold:#d4b86a; --gold-bg:#1e1808;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
  --shadow:0 4px 24px rgba(0,0,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

/* ── WELCOME ── */ 
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:1.4rem 1.6rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.wlogos img{height:110px;width:auto;object-fit:contain;max-width:100%}
.wlogsep{display:none}
.wfoot-liaxa{display:flex;justify-content:center;align-items:center;padding-top:1.2rem;margin-top:1rem}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:1.4rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3)}

/* ── LESSON ── */
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}

/* ── CONTENT ── */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}

/* ── PROBLEM CARDS ── */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)}
.pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem}

/* ── WORK AREA ── */
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green)}
.wpanel{display:none}
.wpanel.active{display:block}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:160px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.wtextarea{width:100%;min-height:110px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical}
.wtextarea:focus{outline:none;border-color:var(--green)}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.2rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s}
.pzone:hover{border-color:var(--green)}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pzicon{font-size:1.7rem;margin-bottom:.35rem}
.pztxt{font-size:.8rem;color:var(--text3)}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:260px;object-fit:contain}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}

/* ── MC ── */
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg)}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg)}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok)}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}

/* ── RESULT ── */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}

/* ── FRACTION BARS ── */
.frac-lab{ font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:700; text-align:center; margin-bottom:.35rem }
.frac-row{ display:flex; height:40px; border-radius:6px; overflow:hidden; border:2px solid var(--border); margin-bottom:.5rem }
.frac-fill{ background:var(--green); /* blue via token */ transition:width .4s; display:flex; align-items:center; justify-content:center; color:#fff; font-size:.72rem; font-weight:700 }
.frac-empty{ background:var(--surface2); flex:1 }
.frac-tick-row{ display:flex; height:10px; margin-bottom:1rem }
.frac-tick{ flex:1; border-right:1px solid var(--border); }
.frac-tick:last-child{ border-right:none }
.frac-grid{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin:1rem 0 }
@media(max-width:480px){ .frac-grid{ grid-template-columns:1fr } }
.frac-slider-row{ margin:.6rem 0 }
.frac-slider-row label{ font-size:.75rem; color:var(--text3); display:block; margin-bottom:.25rem }
.frac-slider-row input[type=range]{ width:100%; accent-color:var(--green) }
.frac-display{ font-family:'Crimson Pro',serif; font-size:2.2rem; font-weight:700; text-align:center; color:var(--green-dark); margin:.5rem 0 }
.frac-note{ font-size:.78rem; text-align:center; color:var(--text3); min-height:1.2rem }

/* ── BALANCE SCALE ── */
.scale-wrap{ display:flex; flex-direction:column; align-items:center; padding:1rem 0 }
.scale-beam-wrap{ position:relative; width:320px; height:110px }
.scale-beam{ position:absolute; top:30px; left:0; right:0; height:10px; background:var(--green-dark); border-radius:5px; transform-origin:center top; transition:transform .5s }
.scale-pivot{ position:absolute; top:20px; left:50%; transform:translateX(-50%); width:14px; height:14px; background:var(--gold); border-radius:50%; z-index:2 }
.scale-pan{ position:absolute; top:42px; width:80px; height:40px; background:var(--surface2); border:2px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Crimson Pro',serif; font-size:1.25rem; font-weight:700; color:var(--green-dark); transition:top .5s }
.scale-pan.left{ left:10px }
.scale-pan.right{ right:10px }
.scale-stand{ width:4px; height:60px; background:var(--green-dark); margin:0 auto; border-radius:2px }
.scale-base{ width:120px; height:12px; background:var(--green-dark); border-radius:6px; margin:0 auto }
.scale-label{ font-size:.8rem; color:var(--text3); text-align:center; margin-top:.5rem; min-height:1.5rem }
.scale-input-row{ display:flex; gap:1rem; justify-content:center; align-items:center; margin-top:.8rem; flex-wrap:wrap }
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield;appearance:textfield}
.scale-input{ width:90px; padding:.5rem .7rem; border:2px solid var(--border); border-radius:8px; font-size:.95rem; text-align:center; font-family:'IBM Plex Mono',monospace; background:var(--surface2); color:var(--text) }
.scale-input:focus{ outline:none; border-color:var(--green) }
.scale-check-btn{ background:var(--green); /* blue via token */ color:#fff; border:none; border-radius:8px; padding:.5rem 1.2rem; font-size:.88rem; cursor:pointer }
.scale-check-btn:hover{ background:var(--green-dark) }
.scale-fb{ text-align:center; min-height:1.5rem; font-size:.85rem; margin-top:.5rem; font-weight:600 }

/* ── NUMBER LINE ── */
.nline-wrap{ position:relative; height:80px; margin:1.2rem 0 }
.nline-track{ position:absolute; top:50%; left:30px; right:30px; height:4px; background:var(--border); border-radius:2px; transform:translateY(-50%) }
.nline-fill{ position:absolute; left:0; top:0; height:100%; background:var(--green); border-radius:2px; transition:width .2s }
.nline-tick{ position:absolute; top:50%; transform:translate(-50%,-50%); width:2px; height:16px; background:var(--border) }
.nline-tick-lbl{ position:absolute; top:calc(50% + 14px); transform:translateX(-50%); font-size:.68rem; color:var(--text3); font-family:'IBM Plex Mono',monospace }
.nline-handle{ position:absolute; top:50%; width:22px; height:22px; background:var(--green); border:3px solid #fff; border-radius:50%; transform:translate(-50%,-50%); cursor:grab; box-shadow:0 2px 8px rgba(0,0,0,.3); transition:background .2s; touch-action:none; z-index:5 }
.nline-handle:active{ cursor:grabbing; background:var(--green-dark) }
.nline-val{ text-align:center; font-family:'Crimson Pro',serif; font-size:1.6rem; font-weight:700; color:var(--green-dark) }
.nline-target{ position:absolute; top:50%; width:14px; height:14px; background:var(--gold); border-radius:50%; transform:translate(-50%,-50%); z-index:3; box-shadow:0 1px 4px rgba(0,0,0,.25) }
.nline-target-lbl{ position:absolute; top:calc(50% - 28px); transform:translateX(-50%); font-size:.7rem; color:var(--gold); font-weight:700; white-space:nowrap }
.nline-fb{ text-align:center; min-height:1.4rem; font-size:.85rem; font-weight:600; margin-top:.4rem }

/* ── STEP REVEAL ── */
.steps-box{ border:1px solid var(--border); border-radius:10px; overflow:hidden; margin:1rem 0 }
.step-row{ display:flex; align-items:baseline; gap:.8rem; padding:.7rem 1rem; border-bottom:1px solid var(--border); background:var(--surface); opacity:0; transform:translateY(6px); transition:opacity .35s,transform .35s }
.step-row:last-child{ border-bottom:none }
.step-row.shown{ opacity:1; transform:none }
.step-num{ font-size:.65rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); flex-shrink:0; width:42px }
.step-math{ font-family:'IBM Plex Mono',monospace; font-size:.9rem; color:var(--green-dark); font-weight:600 }
.step-why{ font-size:.78rem; color:var(--text2); margin-left:.5rem }
.step-next-btn{ display:block; width:100%; padding:.6rem; background:var(--green-bg); border:none; border-top:1px solid var(--border); font-size:.82rem; color:var(--green-dark); cursor:pointer; font-weight:600; transition:background .15s }
.step-next-btn:hover{ background:var(--green-bg) }
.step-next-btn:disabled{ opacity:.4; cursor:default }

/* ── MIXED NUMBER CARD ── */
.mixed-demo{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin:1rem 0 }
@media(max-width:480px){ .mixed-demo{ grid-template-columns:1fr } }
.mcard{ background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:1rem; text-align:center }
.mcard .big{ font-family:'Crimson Pro',serif; font-size:2.4rem; font-weight:700; color:var(--green-dark); line-height:1.1; margin:.3rem 0 }
.mcard .label{ font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text3) }
.arrow-mid{ display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:var(--gold) }
.mixed-interact{ background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-top:.8rem }
.mixed-interact .row{ display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin-bottom:.6rem }
.mlab{ font-size:.78rem; color:var(--text3); min-width:70px }
.minput{ width:56px; padding:.4rem .5rem; border:1.5px solid var(--border); border-radius:6px; font-size:1rem; text-align:center; font-family:'IBM Plex Mono',monospace; background:var(--surface2); color:var(--text) }
.minput:focus{ outline:none; border-color:var(--green) }
.convert-btn{ background:var(--green); color:#fff; border:none; border-radius:8px; padding:.45rem 1rem; font-size:.85rem; cursor:pointer; font-weight:600 }
.convert-btn:hover{ background:var(--green-dark) }
.convert-result{ font-family:'Crimson Pro',serif; font-size:2rem; font-weight:700; color:var(--green-dark); text-align:center; min-height:2.5rem; margin-top:.5rem }
.convert-fb{ font-size:.82rem; text-align:center; min-height:1.2rem; margin-top:.3rem }

/* ── FRACTIONS INLINE ── */
.frac-inline{ display:inline-flex; flex-direction:column; align-items:center; line-height:1; vertical-align:middle; margin:0 .15rem }
.frac-inline span:first-child{ border-bottom:2px solid currentColor; padding:0 .1em .05em }
.frac-inline span:last-child{ padding:.05em .1em 0 }
.mixed-inline{ display:inline-flex; align-items:baseline; gap:.15rem; vertical-align:middle }
.mixed-inline .whole{ font-size:inherit }

/* ── RESTORE BAR ── */
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1rem;font-size:.88rem;color:var(--text)}
#restoreBar strong{color:var(--gold)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">

<script>
/* ════════ STATE ════════ */
var studentData = {};
var problems    = [];
var answeredCount = 0;
var correctCount  = 0;

/* ════════ SESSION PERSISTENCE (localStorage) ════════ */
var LS_PREFIX = 'univa_fracciones';
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return LS_PREFIX + '__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = LS_PREFIX + '__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  var _rb=document.getElementById('restoreBar'); if(_rb) _rb.style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  buildLesson(seededRng(name + group));
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}
function dismissRestore() {
  var _rb=document.getElementById('restoreBar'); if(_rb) _rb.style.display = 'none';
}
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  if (!name || !group) { var _rb=document.getElementById('restoreBar'); if(_rb) _rb.style.display = 'none'; return; }
  var saved = loadSession(name, group);
  var bar = document.getElementById('restoreBar');
  if (bar) bar.style.display = (saved && saved.choices && saved.choices.some(function(c){ return c !== null; })) ? 'block' : 'none';
}
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (!prob || prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx; prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o){ o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i){ if(i===prob.correctIdx) o.classList.add('rc'); if(i===chosenIdx && isOk) o.classList.add('sc'); if(i===chosenIdx && !isOk) o.classList.add('sw'); });
  var fb = document.getElementById('fb'+probIdx);
  if (fb) {
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  }
  var card = document.getElementById('pc'+probIdx);
  if (card) card.classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}


/* ════════ RNG ════════ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31,s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function ri(rng, lo, hi) { return lo + Math.floor(rng() * (hi - lo + 1)); }
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length-1; i > 0; i--) { var j = Math.floor(rng()*(i+1)); var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp; }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ════════ THEME ════════ */
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('udec_theme', next); } catch(e) {}
}

/* ════════ START ════════ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor llena ambos campos.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ════════ MC TWO-TAP ════════ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx; prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o){ o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i){ if(i===prob.correctIdx) o.classList.add('rc'); if(i===chosenIdx && isOk) o.classList.add('sc'); if(i===chosenIdx && !isOk) o.classList.add('sw'); });
    var fb = document.getElementById('fb'+probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    saveSession();
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o){ o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

/* ════════ CANVAS ════════ */
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#003478'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) { var r=canvas.getBoundingClientRect(); var s=e.touches?e.touches[0]:e; return [s.clientX-r.left, s.clientY-r.top]; }
  function onDown(e) { e.preventDefault(); drawing=true; var p=getPos(e); lx=p[0]; ly=p[1]; }
  function onMove(e) { e.preventDefault(); if(!drawing) return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()    { drawing=false; saveSession(); }
  canvas.addEventListener('mousedown', onDown, {passive:false});
  canvas.addEventListener('mousemove', onMove, {passive:false});
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on'); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth=2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth=10; ctx.globalAlpha=0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d){ d.classList.remove('sel'); });
      dot.classList.add('sel'); ctx.strokeStyle=dot.dataset.color; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){ b.classList.remove('on'); }); tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function(){ ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr); });
}

function checkScale(id, lNum, lDen, rDen) {

/* ════════ NUMBER LINE ════════ */
function buildNumberLine(containerId, targetNum, targetDen, minV, maxV) {
  var wrap = document.getElementById(containerId);
  var target = targetNum / targetDen;
  var steps = targetDen * 2; // tick granularity
  wrap.innerHTML =
    '<div class="nline-val" id="'+containerId+'_val">Arrastra el punto</div>' +
    '<div class="nline-wrap" id="'+containerId+'_wrap">' +
      '<div class="nline-track">' +
        '<div class="nline-fill" id="'+containerId+'_fill" style="width:0%"></div>' +
        // Ticks
        (function() {
          var ticks = '';
          for (var t = minV; t <= maxV; t += 0.5) {
            var pct = (t - minV)/(maxV - minV)*100;
            ticks += '<div class="nline-tick" style="left:'+pct+'%"></div>';
            ticks += '<div class="nline-tick-lbl" style="left:'+pct+'%">';
            if (t === Math.round(t)) ticks += t; else ticks += '';
            ticks += '</div>';
          }
          return ticks;
        })() +
        '<div class="nline-target" id="'+containerId+'_target" style="left:'+((target-minV)/(maxV-minV)*100)+'%"><div class="nline-target-lbl">&#9733; Meta</div></div>' +
        '<div class="nline-handle" id="'+containerId+'_handle" style="left:0%"></div>' +
      '</div>' +
    '</div>' +
    '<div class="nline-fb" id="'+containerId+'_fb"></div>';

  // Drag logic
  setTimeout(function() {
    var handle = document.getElementById(containerId+'_handle');
    var trackEl = document.querySelector('#'+containerId+'_wrap .nline-track');
    var fillEl = document.getElementById(containerId+'_fill');
    var valEl  = document.getElementById(containerId+'_val');
    var fbEl   = document.getElementById(containerId+'_fb');
    var dragging = false;
    var curPct = 0;

    function toFrac(pct) {
      var raw = minV + pct*(maxV-minV);
      var rounded = Math.round(raw * targetDen) / targetDen;
      return Math.max(minV, Math.min(maxV, rounded));
    }
    function displayFrac(val) {
      var num = Math.round(val * targetDen);
      var den = targetDen;
      if (num === 0) return '0';
      var whole = Math.floor(num/den);
      var rem = num % den;
      if (rem === 0) return whole+'';
      if (whole === 0) return '<span class="frac-inline"><span>'+rem+'</span><span>'+den+'</span></span>';
      return whole+' <span class="frac-inline"><span>'+rem+'</span><span>'+den+'</span></span>';
    }
    function setPct(p) {
      p = Math.max(0, Math.min(1, p));
      curPct = p;
      handle.style.left = (p*100)+'%';
      fillEl.style.width = (p*100)+'%';
      var v = toFrac(p);
      valEl.innerHTML = displayFrac(v);
      var diff = Math.abs(v - target);
      if (diff < 0.01) {
        fbEl.textContent = '✓ ¡Exacto! Encontraste '+targetNum+'/'+targetDen;
        fbEl.style.color = 'var(--ok)';
        handle.style.background = 'var(--ok)';
      } else if (diff < 1/targetDen + 0.01) {
        fbEl.textContent = '¡Muy cerca! Ajusta un poco.';
        fbEl.style.color = 'var(--gold)';
        handle.style.background = 'var(--gold)';
      } else {
        fbEl.textContent = v < target ? '→ Mueve a la derecha' : '← Mueve a la izquierda';
        fbEl.style.color = 'var(--text3)';
        handle.style.background = 'var(--green)';
      }
    }
    function getP(e) {
      var r = trackEl.getBoundingClientRect();
      var src = e.touches ? e.touches[0] : e;
      return (src.clientX - r.left) / r.width;
    }
    handle.addEventListener('mousedown',  function(e){ e.preventDefault(); dragging=true; }, {passive:false});
    handle.addEventListener('touchstart', function(e){ e.preventDefault(); dragging=true; }, {passive:false});
    document.addEventListener('mousemove', function(e){ if(dragging) setPct(getP(e)); });
    document.addEventListener('touchmove', function(e){ if(dragging) setPct(getP(e.touches[0])); },{passive:true});
    document.addEventListener('mouseup',  function(){ dragging=false; });
    document.addEventListener('touchend', function(){ dragging=false; });
    trackEl.addEventListener('click', function(e){ setPct(getP(e)); });
  }, 100);
}

/* ════════ PIE EXPLORER ════════ */
function buildPieExplorer(containerId, totalSlices) {
  var wrap = document.getElementById(containerId);
  // Build two pies side by side — left fixed at 1/2, right draggable
  var leftNum = 1, leftDen = 2;
  var rightDen = totalSlices;
  var rightNum = Math.round(rightDen / 2); // start balanced

  wrap.innerHTML =
    '<div style="font-size:.82rem;color:var(--text2);margin-bottom:.8rem">Arrastra las piezas del pastel derecho para formar una fracción equivalente a <strong>1/2</strong>. Cuando son iguales, la balanza se equilibra.</div>' +
    '<div style="display:flex;gap:1.5rem;align-items:center;justify-content:center;flex-wrap:wrap">' +
      '<div style="text-align:center">' +
        '<canvas id="'+containerId+'_pieL" width="120" height="120" style="cursor:default"></canvas>' +
        '<div style="font-family:\'Crimson Pro\',serif;font-size:1.3rem;font-weight:700;color:var(--green-dark);margin-top:.3rem">1/2</div>' +
        '<div style="font-size:.7rem;color:var(--text3)">fijo</div>' +
      '</div>' +
      '<div style="font-size:2rem;color:var(--border)">=?</div>' +
      '<div style="text-align:center">' +
        '<canvas id="'+containerId+'_pieR" width="120" height="120" style="cursor:pointer"></canvas>' +
        '<div style="font-family:\'Crimson Pro\',serif;font-size:1.3rem;font-weight:700;color:var(--green-dark);margin-top:.3rem" id="'+containerId+'_rfrac">'+rightNum+'/'+rightDen+'</div>' +
        '<div style="font-size:.7rem;color:var(--text3)">toca para cambiar</div>' +
      '</div>' +
    '</div>' +
    '<div style="text-align:center;margin-top:.8rem;font-size:.85rem;font-weight:600;min-height:1.4rem" id="'+containerId+'_pfb"></div>' +
    '<div style="text-align:center;margin-top:.4rem">' +
      '<button style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.3rem .8rem;font-size:.78rem;cursor:pointer;color:var(--text2)" onclick="cyclePieSlice(\''+containerId+'\','+rightDen+')">← / → Cambiar pieza</button>' +
    '</div>';

  setTimeout(function() {
    drawPie(containerId+'_pieL', 1, 2, true);
    drawPie(containerId+'_pieR', rightNum, rightDen, false);
    updatePieFb(containerId, rightNum, rightDen);
    // Click on right pie to toggle slices
    var cvs = document.getElementById(containerId+'_pieR');
    cvs.addEventListener('click', function(e) {
      var rect = cvs.getBoundingClientRect();
      var cx = rect.width/2, cy = rect.height/2;
      var x = e.clientX - rect.left - cx;
      var y = e.clientY - rect.top - cy;
      var angle = Math.atan2(y, x) + Math.PI/2;
      if (angle < 0) angle += Math.PI*2;
      var slice = Math.floor(angle / (Math.PI*2/rightDen));
      window['_pie_'+containerId+'_num'] = (slice < (window['_pie_'+containerId+'_num']||rightNum)) ?
        (window['_pie_'+containerId+'_num']||rightNum) - 1 :
        (window['_pie_'+containerId+'_num']||rightNum) + 1;
      var n = Math.max(1, Math.min(rightDen-1, window['_pie_'+containerId+'_num']||rightNum));
      window['_pie_'+containerId+'_num'] = n;
      drawPie(containerId+'_pieR', n, rightDen, false);
      document.getElementById(containerId+'_rfrac').textContent = n+'/'+rightDen;
      updatePieFb(containerId, n, rightDen);
    });
  }, 100);
}
window._pie_state = {};
function cyclePieSlice(id, den) {
  var key = '_pie_'+id+'_num';
  var cur = window[key] || Math.round(den/2);
  cur = (cur % (den-1)) + 1;
  window[key] = cur;
  drawPie(id+'_pieR', cur, den, false);
  document.getElementById(id+'_rfrac').textContent = cur+'/'+den;
  updatePieFb(id, cur, den);
}
function updatePieFb(id, n, den) {
  var fb = document.getElementById(id+'_pfb');
  if (!fb) return;
  var isEq = Math.abs(n/den - 0.5) < 0.001;
  fb.textContent = isEq ? '✓ ¡Correcto! '+n+'/'+den+' = 1/2 — son fracciones equivalentes.' : (n/den < 0.5 ? 'Faltan piezas — agrega más.' : 'Demasiadas piezas — quita algunas.');
  fb.style.color = isEq ? 'var(--ok)' : 'var(--bad)';
}
function drawPie(canvasId, num, den, isFixed) {
  var cvs = document.getElementById(canvasId);
  if (!cvs) return;
  var ctx = cvs.getContext('2d');
  var W = cvs.width, H = cvs.height;
  var cx = W/2, cy = H/2, r = W/2 - 6;
  ctx.clearRect(0, 0, W, H);
  var sliceAngle = (Math.PI*2) / den;
  var startAngle = -Math.PI/2;
  for (var i = 0; i < den; i++) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle + i*sliceAngle, startAngle + (i+1)*sliceAngle);
    ctx.closePath();
    ctx.fillStyle = i < num ? (isFixed ? '#003478' : '#c8a951') : '#edf0f5';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  // outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#d4d9e3';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

/* ════════ SCALE MULTI (3 rounds) — canvas-based ════════ */
var _scaleState = {};
function buildScaleMulti(id, pairs, nums) {
  _scaleState[id] = { round:0, pairs:pairs, nums:nums, solved:[false,false,false], tiltDeg:-20 };
  renderScaleRound(id);
}
function renderScaleRound(id) {
  var st = _scaleState[id];
  var r  = st.round;
  var lN = st.nums[r], lD = st.pairs[r][0], rD = st.pairs[r][1];
  var target = lN * rD / lD;
  st.tiltDeg = -20; // start tilted left (left heavier, right unknown)
  st.lN = lN; st.lD = lD; st.rD = rD; st.target = target;
  st.rightVal = null; // student hasn't answered yet
  if (!st.solvedVals) st.solvedVals = {};

  var dots = [0,1,2].map(function(i){
    return '<div style="width:10px;height:10px;border-radius:50%;background:'+(i===r?'var(--green)':st.solved[i]?'var(--ok)':'var(--border)')+'"></div>';
  }).join('');

  var wrap = document.getElementById(id);
  wrap.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">' +
      '<div style="font-size:.78rem;font-weight:600;color:var(--text2)">Ronda '+(r+1)+' de 3</div>' +
      '<div style="display:flex;gap:6px;align-items:center">'+dots+'</div>' +
    '</div>' +
    '<div id="'+id+'_wrap" style="position:relative;width:300px;margin:0 auto;max-width:100%">' +
      '<canvas id="'+id+'_cvs" width="300" height="130" style="display:block;width:100%"></canvas>' +
      '<input id="'+id+'_inp" type="number" inputmode="numeric" min="1" max="'+rD+'" placeholder="?" ' +
        'style="position:absolute;border:2px solid var(--gold);border-radius:6px;background:rgba(255,255,255,.95);' +
        'font-family:\'IBM Plex Mono\',monospace;font-size:1rem;font-weight:700;text-align:center;' +
        'color:var(--text);padding:0;box-shadow:0 0 0 3px rgba(224,123,26,.25);outline:none;cursor:text;" ' +
        'oninput="onScaleInput(\''+id+'\')" onkeydown="if(event.key===\'Enter\')checkScaleMulti(\''+id+'\')">' +
    '</div>' +
    '<div style="text-align:center;margin-top:.7rem">' +
      '<button class="scale-check-btn" onclick="checkScaleMulti(\''+id+'\')">' + 'Verificar ⚖️</button>' +
    '</div>' +
    '<div class="scale-fb" id="'+id+'_fb" style="text-align:center;min-height:1.4rem;margin-top:.5rem;font-size:.85rem;font-weight:600"></div>';

  setTimeout(function(){ drawScaleCanvas(id); positionScaleInput(id); }, 40);
}

function drawScaleCanvas(id) {
  var st  = _scaleState[id];
  var cvs = document.getElementById(id+'_cvs');
  if (!cvs) return;
  var ctx = cvs.getContext('2d');
  var W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);

  var CX = W/2;           // pivot x
  var PY = 28;            // pivot y
  var ARM = 110;          // half-beam length
  var BEAM_H = 8;
  var PAN_W = 64, PAN_H = 34;
  var tilt = st.tiltDeg * Math.PI / 180;

  // ── Beam endpoints ──
  var lx = CX - ARM * Math.cos(tilt), ly = PY + ARM * Math.sin(-tilt) + BEAM_H/2;
  var rx = CX + ARM * Math.cos(tilt), ry = PY - ARM * Math.sin(-tilt) + BEAM_H/2;

  // ── Stand & base ──
  ctx.fillStyle = '#0f2d5e';
  ctx.fillRect(CX-3, PY+2, 6, 68);          // stand
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(CX-55, PY+68, 110, 10, 5) : ctx.rect(CX-55, PY+68, 110, 10);
  ctx.fill();

  // ── Pivot dot ──
  ctx.beginPath(); ctx.arc(CX, PY+4, 7, 0, Math.PI*2);
  ctx.fillStyle = '#c8a951'; ctx.fill();

  // ── Beam ──
  ctx.save();
  ctx.translate(CX, PY);
  ctx.rotate(tilt);
  ctx.fillStyle = '#0f2d5e';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(-ARM, 0, ARM*2, BEAM_H, 4) : ctx.rect(-ARM, 0, ARM*2, BEAM_H);
  ctx.fill();
  ctx.restore();

  // ── Pan hangers (vertical lines from beam ends to pans) ──
  var lPanY = ly + 14;  // pan top y = beam-end y + hanger
  var rPanY = ry + 14;
  ctx.strokeStyle = '#0f2d5e'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, lPanY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx, rPanY); ctx.stroke();

  // ── LEFT pan ──
  var lPanX = lx - PAN_W/2;
  ctx.fillStyle = '#edf0f5'; ctx.strokeStyle = '#d4d9e3'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(lPanX, lPanY, PAN_W, PAN_H, 6) : ctx.rect(lPanX, lPanY, PAN_W, PAN_H);
  ctx.fill(); ctx.stroke();
  // Left fraction text
  ctx.fillStyle = '#0f2d5e'; ctx.font = 'bold 14px "Crimson Pro", serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var lLabel = st.lN + '/' + st.lD;
  ctx.fillText(lLabel, lx, lPanY + PAN_H/2);

  // ── RIGHT pan — draw background box only; input floats on top ──
  var rPanX = rx - PAN_W/2;
  // Store pan geometry so positionScaleInput can place the overlay
  st._rPanX = rPanX; st._rPanY = rPanY; st._PAN_W = PAN_W; st._PAN_H = PAN_H;
  st._canvasW = W;
  ctx.fillStyle = '#fff8ee'; ctx.strokeStyle = '#c8a951'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(rPanX, rPanY, PAN_W, PAN_H, 6) : ctx.rect(rPanX, rPanY, PAN_W, PAN_H);
  ctx.fill(); ctx.stroke();
  // Draw denominator below a dividing line inside the pan
  ctx.fillStyle = '#0f2d5e'; ctx.font = '600 12px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Horizontal rule in pan
  ctx.strokeStyle = '#0f2d5e'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(rPanX+8, rPanY+PAN_H/2); ctx.lineTo(rPanX+PAN_W-8, rPanY+PAN_H/2); ctx.stroke();
  // Denominator in lower half
  ctx.fillText(st.rD, rx, rPanY + PAN_H*0.75);
  // If answered, show numerator from stored solved value
  var _sv = st.solvedVals && st.solvedVals[st.round];
  if (_sv) {
    ctx.font = 'bold 14px "Crimson Pro", serif';
    ctx.fillText(_sv, rx, rPanY + PAN_H*0.28);
  } else if (st.rightVal !== null) {
    ctx.font = 'bold 14px "Crimson Pro", serif';
    ctx.fillText(st.rightVal, rx, rPanY + PAN_H*0.28);
  }
  positionScaleInput(id);
}

function positionScaleInput(id) {
  var st  = _scaleState[id];
  var cvs = document.getElementById(id+'_cvs');
  var inp = document.getElementById(id+'_inp');
  if (!cvs || !inp || st._rPanX === undefined) return;
  // Canvas may be scaled by CSS (max-width:100%), compute scale factor
  var scale = cvs.getBoundingClientRect().width / (st._canvasW || 300);
  var x = st._rPanX * scale;
  var y = st._rPanY * scale;
  var w = st._PAN_W * scale;
  var h = (st._PAN_H / 2) * scale;  // upper half of pan only (above the fraction bar)
  inp.style.left   = x + 'px';
  inp.style.top    = y + 'px';
  inp.style.width  = w + 'px';
  inp.style.height = h + 'px';
  inp.style.lineHeight = h + 'px';
  inp.style.fontSize = Math.max(11, Math.round(13 * scale)) + 'px';
}

window.addEventListener('resize', function() {
  // Reposition any active scale inputs when window resizes
  Object.keys(_scaleState).forEach(function(id) {
    positionScaleInput(id);
  });
});

function onScaleInput(id) {
  var inp = document.getElementById(id+'_inp');
  var val = parseInt(inp.value);
  _scaleState[id].rightVal = (!isNaN(val) && val > 0) ? val : null;
  drawScaleCanvas(id);
}

function _scaleNext(id) {
  var st = _scaleState[id];
  if (st && st.round < 2) { st.round++; renderScaleRound(id); }
}
function _pieNext(id) {
  var st = _pieMulti[id];
  if (st && st.round < 2) { st.round++; renderPieRound(id); }
}
function checkScaleMulti(id) {
  var st  = _scaleState[id];
  var inp = document.getElementById(id+'_inp');
  var fb  = document.getElementById(id+'_fb');
  var val = parseInt(inp.value);
  if (!val || val < 1) { fb.textContent = 'Escribe un número en la bandeja derecha.'; fb.style.color='var(--bad)'; return; }
  st.rightVal = val;
  var isOk = (val === st.target);
  if (isOk) {
    st.tiltDeg = 0;
    inp.disabled = true;
    inp.style.display = 'none';   // hide input; canvas draws the answer
    drawScaleCanvas(id);
    st.solved[st.round] = true;
    if (!st.solvedVals) st.solvedVals = {};
    st.solvedVals[st.round] = val;
    if (st.round < 2) {
      fb.innerHTML = '✓ ¡Equilibrada! ' + st.lN + '/' + st.lD + ' = ' + val + '/' + st.rD
        + ' &nbsp;<button onclick="_scaleNext(\''+id+'\')" style="background:var(--green);color:#fff;border:none;border-radius:6px;padding:.3rem .9rem;font-size:.82rem;cursor:pointer;margin-left:.5rem">Siguiente →</button>';
      fb.style.color = 'var(--ok)';
    } else {
      fb.textContent = '✓ ¡Equilibrada! ' + st.lN + '/' + st.lD + ' = ' + val + '/' + st.rD + '  🎉 ¡Completaste las 3 rondas!';
      fb.style.color = 'var(--ok)';
    }
  } else {
    var heavier = val / st.rD < st.lN / st.lD ? 'left' : 'right';
    st.tiltDeg = heavier === 'left' ? -18 : 18;
    drawScaleCanvas(id);
    fb.textContent = heavier === 'left'
      ? '⬇ El lado izquierdo baja — el numerador es muy pequeño. Intenta uno mayor.'
      : '⬆ El lado derecho baja — el numerador es muy grande. Intenta uno menor.';
    fb.style.color = 'var(--bad)';
  }
}

/* ════════ PIE MULTI (3 rounds) with draggable slices ════════ */
var _pieMulti = {};
function buildPieMulti(id, dens, targets) {

}
function renderPieRound(id) {

  }).join('');

  var wrap = document.getElementById(id);
  wrap.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">' +
      '<div style="font-size:.78rem;font-weight:600;color:var(--text2)">Ronda '+(r+1)+' de 3</div>' +
      '<div style="display:flex;gap:6px;align-items:center">'+dots+'</div>' +
    '</div>' +
    '<div style="font-size:.82rem;color:var(--text2);margin-bottom:.9rem">Colorea el pastel derecho para que represente <strong>'+targetN+'/'+targetD+'</strong>. Toca cada pieza para colorearla o apagarla.</div>' +
    '<div style="display:flex;gap:1.4rem;align-items:center;justify-content:center;flex-wrap:wrap">' +
      // Left pie — fixed target
      '<div style="text-align:center">' +
        '<canvas id="'+id+'_pieL" width="130" height="130"></canvas>' +
        '<div style="font-family:\'Crimson Pro\',serif;font-size:1.4rem;font-weight:700;color:var(--green-dark);margin-top:.3rem">'+targetN+'/'+targetD+'</div>' +
        '<div style="font-size:.7rem;color:var(--text3)">fracción a igualar</div>' +
      '</div>' +
      '<div style="font-size:2.2rem;color:var(--border);font-weight:300">=?</div>' +
      // Right pie — student fills
      '<div style="text-align:center">' +
        '<canvas id="'+id+'_pieR" width="130" height="130" style="cursor:pointer;touch-action:none"></canvas>' +
        '<div style="font-family:\'Crimson Pro\',serif;font-size:1.4rem;font-weight:700;color:var(--green-dark);margin-top:.3rem" id="'+id+'_rfrac">0/'+rightDen+'</div>' +
        '<div style="font-size:.7rem;color:var(--text3)">toca una pieza para colorearla</div>' +

    '</div>' +
    '<div style="text-align:center;margin-top:.9rem">' +
      '<button class="scale-check-btn" onclick="checkPieMulti(\''+id+'\','+targetN+','+targetD+','+rightDen+','+rightEquivN+')">Verificar ✓</button>' +
    '</div>' +
    '<div class="scale-fb" id="'+id+'_pfb" style="text-align:center;min-height:1.4rem;margin-top:.5rem;font-size:.85rem;font-weight:600"></div>';

  setTimeout(function(){

    var cvs = document.getElementById(id+'_pieR');

    // initialise per-slice boolean array
    _pieMulti[id].slices = [];
    for (var k = 0; k < rightDen; k++) _pieMulti[id].slices.push(false);

    function getSliceIdx(e) {
      var rect = cvs.getBoundingClientRect();
      var src = e.touches ? e.touches[0] : e;
      var x = src.clientX - rect.left - rect.width/2;
      var y = src.clientY - rect.top  - rect.height/2;
      // only respond if click is within the circle
      if (Math.sqrt(x*x + y*y) > rect.width/2) return -1;
      var angle = Math.atan2(y, x) + Math.PI/2;
      if (angle < 0) angle += Math.PI*2;
      return Math.floor(angle / (Math.PI*2/rightDen));
    }
    function handlePieTap(e) {
      var st2 = _pieMulti[id];
      if (st2.solved[st2.round]) return;
      var slice = getSliceIdx(e);
      if (slice < 0 || slice >= rightDen) return;
      st2.slices[slice] = !st2.slices[slice];
      // update count for checking
      st2.rightN = st2.slices.filter(Boolean).length;
      document.getElementById(id+'_rfrac').textContent = st2.rightN+'/'+rightDen;
      drawPieWithState(id, rightDen);
      document.getElementById(id+'_pfb').textContent = '';
    }
    cvs.addEventListener('click', handlePieTap);
    cvs.addEventListener('touchend', function(e) {
      e.preventDefault();
      handlePieTap(e.changedTouches[0]);
    }, {passive:false});
  }, 80);
}
function drawPieWithState(id, den) {
  var st = _pieMulti[id];
  var slices = st.slices; // boolean array
  var cvs = document.getElementById(id+'_pieR');
  if (!cvs) return;
  var ctx = cvs.getContext('2d');
  var W = cvs.width, H = cvs.height, cx = W/2, cy = H/2, r = W/2 - 8;
  ctx.clearRect(0,0,W,H);
  var sa = -Math.PI/2, da = Math.PI*2/den;
  for (var i = 0; i < den; i++) {
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,sa+i*da,sa+(i+1)*da); ctx.closePath();
    var filled = slices ? slices[i] : false;
    ctx.fillStyle = filled ? '#c8a951' : '#edf0f5';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = '#d4d9e3'; ctx.lineWidth = 1.5; ctx.stroke();
}
function checkPieMulti(id, tN, tD, rDen, correct) {
  var st = _pieMulti[id];
  var n  = st.rightN;
  var fb = document.getElementById(id+'_pfb');
  var isOk = (n === correct);
  if (isOk) {
    st.solved[st.round] = true;
    if (st.round < 2) {
      fb.innerHTML = '✓ ¡Correcto! '+n+'/'+rDen+' = '+tN+'/'+tD+' — son equivalentes.'
        +' &nbsp;<button onclick="_pieNext(\''+id+'\')" style="background:var(--green);color:#fff;border:none;border-radius:6px;padding:.3rem .9rem;font-size:.82rem;cursor:pointer;margin-left:.5rem">Siguiente →</button>';
      fb.style.color = 'var(--ok)';
    } else {
      fb.textContent = '🎉 ¡Completaste las 3 rondas!';
      fb.style.color = 'var(--ok)';
    }
  } else {
    var actual = (tN/tD*100).toFixed(0);
    var student = (n/rDen*100).toFixed(0);
    fb.textContent = n < correct
      ? '⬇ Tienes '+n+'/'+rDen+' ('+student+'%) — necesitas más piezas para llegar al '+actual+'%.'
      : '⬆ Tienes '+n+'/'+rDen+' ('+student+'%) — tienes demasiadas piezas.';
    fb.style.color = 'var(--bad)';
  }
}

/* ════════ BUILD LESSON ════════ */
function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');
  lb.innerHTML = '';
  problems = [];

  // ── Generate 3 scale rounds and 3 pie rounds from rng ──
  var denPairs = [[3,6],[3,9],[3,12],[4,8],[4,12],[5,10],[5,15],[6,12],[4,16],[5,20]];
  function pickPair(used) {
    var p; do { p = denPairs[ri(rng,0,denPairs.length-1)]; } while (used.indexOf(p[0]+'/'+p[1]) >= 0);
    used.push(p[0]+'/'+p[1]); return p;
  }
  var usedPairs = [];
  var scalePairs = [pickPair(usedPairs), pickPair(usedPairs), pickPair(usedPairs)];
  var scaleNums  = scalePairs.map(function(p){ return ri(rng, 1, p[0]-1); });

  // Randomized pie targets: pick 3 distinct base fractions from a pool
  var piePool = [[1,2],[1,3],[2,3],[1,4],[3,4],[1,5],[2,5],[3,5]];
  var usedPie = [];
  function pickPieFrac() {
    var f; do { f = piePool[ri(rng,0,piePool.length-1)]; } while (usedPie.indexOf(f[0]+'/'+f[1])>=0);
    usedPie.push(f[0]+'/'+f[1]); return f;
  }
  var pf1=pickPieFrac(), pf2=pickPieFrac(), pf3=pickPieFrac();
  var pieDens  = [pf1[1]*ri(rng,2,3), pf2[1]*ri(rng,2,3), pf3[1]*ri(rng,2,3)];
  var pieTargets = [pf1, pf2, pf3];

  // ── Problem denominators (separate from interactive widgets) ──
  var pPair = pickPair(usedPairs);
  var pNum  = ri(rng, 1, pPair[0]-1);
  var pEquiv = pNum * (pPair[1]/pPair[0]);

  var den2A = [2,3,4,5][ri(rng,0,3)];
  var num2A = ri(rng, 1, den2A-1);
  var mult2 = [2,3,4][ri(rng,0,2)];

  function gcd(a,b){ while(b){ var t=b; b=a%b; a=t; } return a; }
  var m3 = [2,3,4,5,6][ri(rng,0,4)];
  var den3base = [2,3,4,5][ri(rng,0,3)];
  var num3base = ri(rng,1,den3base-1);
  var num3 = num3base*m3, den3 = den3base*m3, g3 = gcd(num3,den3);

  /* ══════════════════════════════════════════
     INTRO
  ═══════════════════════════════════════════ */
  var intro = document.createElement('div');
  intro.className = 'section vis';
  intro.innerHTML =
    '<div class="stag">Fracciones Equivalentes</div>' +
    '<h2>¿Qué son las fracciones equivalentes?</h2>' +
    '<p>Dos fracciones son <strong>equivalentes</strong> cuando representan exactamente la misma cantidad, aunque sus números sean distintos.</p>' +
    '<div class="callout"><strong>Regla:</strong> Para obtener una fracción equivalente, multiplica (o divide) el numerador <em>y</em> el denominador por el mismo número.</div>';
  lb.appendChild(intro);

  /* ══════════════════════════════════════════
     SECCIÓN 1 — Balanza (3 rondas)
  ═══════════════════════════════════════════ */
  var s1 = document.createElement('div');
  s1.className = 'section';
  s1.innerHTML =
    '<div class="stag">Sección 1</div>' +
    '<h2>La balanza de fracciones</h2>' +
    '<p>Si dos fracciones son equivalentes, la balanza está en equilibrio. Escribe el numerador que falta y presiona <strong>Verificar</strong>.</p>' +
    '<div id="scaleWidget" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1rem;margin:1rem 0"></div>';
  lb.appendChild(s1);
  setTimeout(function(){
    buildScaleMulti('scaleWidget', scalePairs, scaleNums);
  }, 120);

  // Problem 1
  var ans1 = pEquiv+'/'+pPair[1];
  var w1a = (pEquiv+1)+'/'+pPair[1], w1b = (pEquiv-1>0?pEquiv-1:pEquiv+2)+'/'+pPair[1], w1c = pNum+'/'+pPair[1];
  var opts1 = shuffleOpts([ans1,w1a,w1b,w1c], ans1, rng);
  problems.push({ title:'Fracción equivalente', questionText:'¿Cuál es la fracción equivalente a <strong>'+pNum+'/'+pPair[0]+'</strong> con denominador '+pPair[1]+'?', options:opts1.opts, correctIdx:opts1.correctIdx, explanation:pNum+'/'+pPair[0]+' × ('+(pPair[1]/pPair[0])+'/'+(pPair[1]/pPair[0])+') = '+pEquiv+'/'+pPair[1]+'.', hint:'¿Por cuánto multiplico '+pPair[0]+' para llegar a '+pPair[1]+'? Multiplica el numerador por lo mismo.', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[0], 0);

  /* ══════════════════════════════════════════
     SECCIÓN 2 — Pastel interactivo (3 rondas)
  ═══════════════════════════════════════════ */
  var s2 = document.createElement('div');
  s2.className = 'section';
  s2.innerHTML =
    '<div class="stag">Sección 2</div>' +
    '<h2>Pastel de fracciones</h2>' +
    '<p>Colorea las piezas del pastel derecho para que represente la misma cantidad que el pastel izquierdo. Toca una pieza para colorearla o descolorearla. Cuando sean iguales, presiona <strong>Verificar</strong>.</p>' +
    '<div id="pieWidget" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1rem;margin:1rem 0"></div>';
  lb.appendChild(s2);
  setTimeout(function(){
    buildPieMulti('pieWidget', pieDens, pieTargets);
  }, 120);

  // Problem 2
  var ans2 = (num2A*mult2)+'/'+(den2A*mult2);
  var opts2 = shuffleOpts([ans2,(num2A*mult2+1)+'/'+(den2A*mult2),(num2A+1)+'/'+den2A,num2A+'/'+(den2A+1)], ans2, rng);
  problems.push({ title:'Identifica la equivalente', questionText:'¿Cuál de las siguientes fracciones es equivalente a <strong>'+num2A+'/'+den2A+'</strong>?', options:opts2.opts, correctIdx:opts2.correctIdx, explanation:num2A+'/'+den2A+' × ('+mult2+'/'+mult2+') = '+(num2A*mult2)+'/'+(den2A*mult2)+'.', hint:'Multiplica numerador y denominador por el mismo número (2, 3 o 4).', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[1], 1);

  /* ══════════════════════════════════════════
     SECCIÓN 3 — Explorador de equivalencias
  ═══════════════════════════════════════════ */
  var s3 = document.createElement('div');
  s3.className = 'section';
  s3.innerHTML =
    '<div class="stag">Sección 3</div>' +
    '<h2>Explorador de equivalencias</h2>' +
    '<p>Mueve el deslizador para multiplicar la fracción. Los cuadros siempre ocupan la misma proporción — aunque cambien los números.</p>' +
    '<div id="equivExplorer" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1rem;margin:1rem 0"></div>' +
    '';
  lb.appendChild(s3);
  setTimeout(function(){ buildEquivExplorer('equivExplorer', num2A, den2A); }, 120);

  // Problem 3 — linked to the explorador: find the equivalent with multiplier chosen by rng
  var expMult = ri(rng, 2, 6);
  var expNum3 = num2A * expMult, expDen3 = den2A * expMult;
  var ans3 = expNum3+'/'+expDen3;
  var w3a = (expNum3+1)+'/'+expDen3, w3b = expNum3+'/'+(expDen3+1), w3c = (num2A+1)+'/'+(den2A+1);
  var opts3 = shuffleOpts([ans3, w3a, w3b, w3c], ans3, rng);
  problems.push({ title:'Fracción equivalente (explorador)', questionText:'Usando el explorador, ¿cuál fracción es equivalente a <strong>'+num2A+'/'+den2A+'</strong> multiplicando numerador y denominador por <strong>'+expMult+'</strong>?', options:opts3.opts, correctIdx:opts3.correctIdx, explanation:num2A+'/'+den2A+' × ('+expMult+'/'+expMult+') = '+expNum3+'/'+expDen3+'.', hint:'Multiplica numerador y denominador por '+expMult+'.', studentChoice:null, pendingChoice:null });
  buildOneCard(problems[2], 2);

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

    doc.setFillColor(200,169,81); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('FraccionesEquivalentes_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;
}
</script>
