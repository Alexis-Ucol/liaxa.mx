<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__NOMBRE_NEGOCIO__ — Reservaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LIAXA — Plantilla de Reservaciones v3 · "todo en un enlace"
   Empleados y servicios viven en la hoja de Google; aquí solo
   queda la marca del negocio y la conexión.
   ============================================================ */
:root{
  --c-prim:#E8A020; --c-prim-f:#C8841A; --c-suave:#FDF0D8;
  --c-fondo:#F8F6F1; --c-texto:#1B2B52; --c-texto-s:#5A6B8A;
  --c-linea:#E2D9C4; --c-crema:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;background:var(--c-fondo);color:var(--c-texto);
  min-height:100vh;font-weight:400;
}
.wrap{max-width:640px;margin:0 auto;padding:32px 20px 80px}

header{text-align:center;margin-bottom:34px}
.logo{
  width:auto;height:44px;border-radius:0;object-fit:contain;
  margin-bottom:12px;
}
h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.9rem;letter-spacing:.5px}
.tagline{color:var(--c-texto-s);font-size:.95rem;letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}

.step{margin-bottom:30px;display:none}
.step.on{display:block;animation:rise .3s ease}
.step-label{
  font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:500;
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.step-label .spark{color:var(--c-prim);font-size:1rem}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  background:var(--c-crema);border:1.5px solid var(--c-linea);border-radius:18px;
  padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.card:hover{border-color:var(--c-prim);transform:translateY(-2px)}
.card.sel{border-color:var(--c-prim);background:linear-gradient(135deg,var(--c-crema) 55%,var(--c-suave))}
.card.sel::after{content:'✦';position:absolute;top:10px;right:12px;color:var(--c-prim);font-size:1rem}
.card h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700}
.card .sub{color:var(--c-texto-s);font-size:.82rem;margin-top:3px}
.card .precio{color:var(--c-prim-f);font-weight:600;font-size:.95rem;margin-top:8px}

.days{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin}
.day{
  flex:0 0 auto;width:64px;padding:10px 0 12px;text-align:center;border-radius:16px;
  background:var(--c-crema);border:1.5px solid var(--c-linea);cursor:pointer;transition:all .2s;
}
.day:hover{border-color:var(--c-prim)}
.day.sel{background:var(--c-prim);border-color:var(--c-prim);color:#fff}
.day .dname{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--c-texto-s)}
.day .dnum{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-top:2px}
.day .dmes{font-size:.65rem;color:var(--c-texto-s)}
.day.sel .dname,.day.sel .dmes{color:color-mix(in srgb,#fff 75%,var(--c-prim))}
.day.sel .dnum{color:#fff}

.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:9px}
.slot{
  padding:11px 0;text-align:center;border-radius:13px;background:var(--c-crema);
  border:1.5px solid var(--c-linea);cursor:pointer;font-weight:500;font-size:.95rem;transition:all .15s;
}
.slot:hover{border-color:var(--c-prim)}
.slot.sel{background:var(--c-prim);border-color:var(--c-prim);color:#fff;
  box-shadow:0 6px 16px color-mix(in srgb, var(--c-prim) 35%, transparent)}
.slot.sel::before{content:'✦ '}
.empty-msg{color:var(--c-texto-s);font-size:.95rem;padding:16px;text-align:center;
  background:var(--c-crema);border-radius:14px;border:1.5px dashed var(--c-linea)}

.confirm{
  background:var(--c-crema);border-radius:22px;padding:24px;margin-top:6px;
  border:1.5px solid var(--c-linea);box-shadow:0 14px 40px rgba(0,0,0,.07);
  display:none;
}
.confirm.show{display:block;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.resumen{
  background:var(--c-fondo);border-radius:14px;padding:14px 16px;margin-bottom:18px;
  font-size:.95rem;line-height:1.65;
}
.resumen b{font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--c-texto-s);margin-bottom:6px}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--c-linea);border-radius:13px;
  font-family:'Jost',sans-serif;font-size:1rem;color:var(--c-texto);background:var(--c-crema);
}
.field input:focus{outline:none;border-color:var(--c-prim)}
.btn{
  width:100%;padding:15px;border:none;border-radius:15px;cursor:pointer;
  background:var(--c-prim-f);color:#fff;font-family:'Jost',sans-serif;
  font-size:1.05rem;font-weight:600;letter-spacing:.5px;transition:all .2s;
}
.btn:hover{filter:brightness(.92);transform:translateY(-1px)}
.btn:disabled{opacity:.55;cursor:wait;transform:none}
.err{color:#B4304C;font-size:.9rem;margin-top:10px;text-align:center;display:none}

.success{display:none;text-align:center;padding:40px 20px}
.success.show{display:block;animation:rise .4s ease}
.success .bigspark{font-size:3rem;color:var(--c-prim);display:block;margin-bottom:12px}
.success h2{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:10px}
.success p{color:var(--c-texto-s);line-height:1.7}
.success .det{background:var(--c-crema);border:1.5px solid var(--c-linea);border-radius:16px;
  padding:18px;margin:22px auto 0;max-width:340px;text-align:left;line-height:1.8;font-size:.97rem}

footer{text-align:center;margin-top:50px;color:var(--c-texto-s);font-size:.8rem;letter-spacing:1px}
footer a{color:var(--c-prim);text-decoration:none}
.loading{text-align:center;padding:60px 0;color:var(--c-texto-s)}

/* Fullscreen loader */
#loadScreen{position:fixed;inset:0;background:#1B2B52;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#loadScreen.hide{opacity:0;transition:opacity .4s ease;pointer-events:none}
.spin-logo{display:none}
.liaxa-flip{
  font-family:'Georgia',serif;font-size:2.2rem;font-weight:700;
  color:#E8A020;letter-spacing:3px;
  display:inline-block;
  transform-style:preserve-3d;
  animation:flipY 1.6s ease-in-out infinite;
  transform-origin:50% 50%;
}
@keyframes flipY{
  0%{transform:perspective(400px) rotateY(0deg)}
  100%{transform:perspective(400px) rotateY(360deg)}
}
.load-label{font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,0.5)}
@media(max-width:420px){.cards{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="loadScreen">
  <span class="liaxa-flip">LIAXA</span>
  <div class="load-label">Cargando…</div>
</div>

<div class="wrap">

  <header style="display:none" id="mainHeader">
    <img class="logo" id="logoImg" alt="">
    <h1 id="bizName"></h1>
    <div class="tagline" id="bizTagline"></div>
  </header>


  <div id="booking" style="display:none">
    <section class="step on" id="stepSvc">
      <div class="step-label"><span class="spark">✦</span> Elige tu servicio</div>
      <div class="cards" id="svcGrid"></div>
    </section>

    <section class="step" id="stepSub">
      <div class="step-label"><span class="spark">✦</span> <span id="subTitle">Elige el tipo</span></div>
      <div class="cards" id="subGrid"></div>
    </section>

    <section class="step" id="stepEmp">
      <div class="step-label"><span class="spark">✦</span> ¿Con quién?</div>
      <div class="cards" id="empGrid"></div>
    </section>

    <section class="step" id="stepDay">
      <div class="step-label"><span class="spark">✦</span> Elige el día</div>
      <div class="days" id="dayStrip"></div>
    </section>

    <section class="step" id="stepTime">
      <div class="step-label"><span class="spark">✦</span> Elige la hora</div>
      <div class="slots" id="slotGrid"></div>
    </section>

    <div class="confirm" id="confirmBox">
      <div class="resumen" id="resumen"></div>
      <div class="field">
        <label for="fName">Tu nombre</label>
        <input id="fName" type="text" placeholder="Nombre completo" autocomplete="name">
      </div>
      <div class="field">
        <label for="fPhone">Tu teléfono</label>
        <input id="fPhone" type="tel" placeholder="10 dígitos" autocomplete="tel" inputmode="numeric">
      </div>
      <button class="btn" id="btnConfirm">Confirmar reservación</button>
      <div class="err" id="errMsg"></div>
    </div>
  </div>

  <div class="success" id="successBox">
    <span class="bigspark">✦</span>
    <h2>¡Cita confirmada!</h2>
    <p>Te esperamos. Si necesitas cambiarla, llámanos con anticipación.</p>
    <div class="det" id="successDet"></div>
  </div>

  <footer>Powered by <a href="https://liaxa.mx">LIAXA</a> · todo en un enlace</footer>
</div>

<script>
/* ╔══════════════════════════════════════════════════════════╗
   ║  CONFIGURACIÓN — solo conexión y marca.                   ║
   ║  Empleados y servicios se administran desde el panel      ║
   ║  de administrador (viven en la hoja de Google).           ║
   ╚══════════════════════════════════════════════════════════╝ */
const CONFIG = {

  /* ── 1. CONEXIÓN ──────────────────────────────────────── */
  scriptURL: "__SCRIPT_URL__",

  /* ── 2. NEGOCIO ───────────────────────────────────────── */
  negocio: {
    nombre:  "__NOMBRE_NEGOCIO__",
    tagline: "__TAGLINE__"
  },

  /* ── 3. COLORES Y LOGO ────────────────────────────────── */
  theme: {
    primario:      "__COLOR_PRIM__",
    primarioFuerte:"__COLOR_PRIM_F__",
    suave:         "__COLOR_SUAVE__",
    fondo:         "__COLOR_FONDO__",
    texto:         "__COLOR_TEXTO__",
    textoSuave:    "__COLOR_TEXTO_S__",
    linea:         "__COLOR_LINEA__"
  },
  logoBase64: "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjIwIiBoZWlnaHQ9IjUyIiB2aWV3Qm94PSIwIDAgMjIwIDUyIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgogIDxwb2x5bGluZSBwb2ludHM9IjAsNDAgMTYsMjQgMzAsMzIgNDgsOCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMUIyQjUyIiBzdHJva2Utd2lkdGg9IjMiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPgogIDxjaXJjbGUgY3g9IjQ4IiBjeT0iOCIgcj0iNiIgZmlsbD0iI0U4QTAyMCIvPgogIDxsaW5lIHgxPSI2NiIgeTE9IjAiIHgyPSI2NiIgeTI9IjUyIiBzdHJva2U9IiNFOEEwMjAiIHN0cm9rZS13aWR0aD0iMi41IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KICA8dGV4dCB4PSI4MCIgeT0iMzgiIGZvbnQtZmFtaWx5PSJHZW9yZ2lhLCBzZXJpZiIgZm9udC1zaXplPSIzNCIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iIzFCMkI1MiIgbGV0dGVyLXNwYWNpbmc9IjIiPkxJQVhBPC90ZXh0Pgo8L3N2Zz4=",

  /* ── 4. RESERVACIÓN ───────────────────────────────────── */
  bookingWindowDays: 14,
  slotStepMin: 30
};
/* ╚══════════════ FIN DE LA CONFIGURACIÓN ══════════════════╝ */


const $ = id => document.getElementById(id);
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DIAS  = ["dom","lun","mar","mié","jue","vie","sáb"];
const DIA_KEY = ["dom","lun","mar","mie","jue","vie","sab"];

let DATA = { bookings: [], blocks: [] };
let EMPLEADOS = [];   // [{id, nombre, servicios:[catId,...], horario:{lun:"9:00-19:00",...}}]
let CATEGORIAS = [];  // [{id, nombre, items:[{id, nombre, duracion, precio}]}]
let sel = { cat:null, item:null, emp:null, date:null, time:null, candidates:[] };

(function applyTheme(){
  const t = CONFIG.theme, r = document.documentElement.style;
  r.setProperty('--c-prim', t.primario);
  r.setProperty('--c-prim-f', t.primarioFuerte);
  r.setProperty('--c-suave', t.suave);
  r.setProperty('--c-fondo', t.fondo);
  r.setProperty('--c-texto', t.texto);
  r.setProperty('--c-texto-s', t.textoSuave);
  r.setProperty('--c-linea', t.linea);
  document.title = CONFIG.negocio.nombre + " — Reservaciones";
  $("logoImg").src = CONFIG.logoBase64;
  $("logoImg").alt = CONFIG.negocio.nombre;
  $("bizName").textContent = CONFIG.negocio.nombre;
  $("bizTagline").textContent = CONFIG.negocio.tagline;
})();

/* ---------- utilidades ---------- */
const toMin  = h => { const p = String(h).split(":"); return +p[0]*60 + +p[1]; };
const toHHMM = m => String(Math.floor(m/60)).padStart(2,"0") + ":" + String(m%60).padStart(2,"0");
const fmt12  = m => {
  let h = Math.floor(m/60), mm = String(m%60).padStart(2,"0");
  const ap = h >= 12 ? "pm" : "am"; h = h % 12 || 12;
  return h + ":" + mm + " " + ap;
};
const dateKey = d => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
const overlaps = (a1,a2,b1,b2) => a1 < b2 && b1 < a2;

function empWindows(emp, weekday){
  const h = emp.horario[DIA_KEY[weekday]];
  if(!h) return [];
  return String(h).split(",").map(r=>{
    const [a,b] = r.split("-");
    return { open: toMin(a.trim()), close: toMin(b.trim()) };
  });
}
const empById = id => EMPLEADOS.find(e=>e.id===id);
const qualified = () => EMPLEADOS.filter(e=>e.servicios.includes(sel.cat.id));

/* ---------- cargar y transformar datos de la hoja ---------- */
function parseEmpleados(rows){
  return (rows||[])
    .filter(r => String(r.activo).toUpperCase() === "SI")
    .map(r => ({
      id: r.id,
      nombre: r.nombre,
      servicios: String(r.servicios||"").split(",").map(s=>s.trim()).filter(Boolean),
      horario: { lun:r.lun||null, mar:r.mar||null, mie:r.mie||null,
                 jue:r.jue||null, vie:r.vie||null, sab:r.sab||null, dom:r.dom||null }
    }));
}

function parseServicios(rows){
  const cats = {};
  (rows||[])
    .filter(r => String(r.activo).toUpperCase() === "SI")
    .forEach(r => {
      if(!cats[r.categoria_id]) cats[r.categoria_id] = { id:r.categoria_id, nombre:r.categoria, items:[] };
      cats[r.categoria_id].items.push({
        id: r.id,
        nombre: r.nombre || "",
        duracion: Number(r.duracion_min),
        precio: Number(r.precio)
      });
    });
  return Object.values(cats);
}

async function loadData(){
  try{
    const r = await fetch(CONFIG.scriptURL);
    const j = await r.json();
    DATA.bookings = (j.bookings||[]).filter(b => b.estado === "activa");
    DATA.blocks   = j.blocks || [];
    EMPLEADOS  = parseEmpleados(j.empleados);
    CATEGORIAS = parseServicios(j.servicios);
  }catch(e){
    $("loadScreen").querySelector(".load-label").textContent = "Sin conexión. Intenta de nuevo.";
    throw e;
  }
  if(!CATEGORIAS.length || !EMPLEADOS.length){
    $("loadScreen").querySelector(".load-label").textContent = "Este negocio aún no ha configurado sus servicios. Vuelve pronto ✦";
    return;
  }
  $("mainHeader").style.display = "block";
  $("booking").style.display = "block";
  $("loadScreen").classList.add("hide");
  setTimeout(()=>{ $("loadScreen").style.display="none"; }, 420);
  renderServices();
}

/* ---------- navegación ---------- */
function resetFrom(step){
  const order = ["stepSub","stepEmp","stepDay","stepTime"];
  order.slice(order.indexOf(step)).forEach(s=>$(s).classList.remove("on"));
  hideConfirm();
}

/* ---------- paso 1: categorías ---------- */
function renderServices(){
  $("svcGrid").innerHTML = CATEGORIAS.map(c=>{
    const single = c.items.length === 1;
    const sub = single
      ? `<div class="sub">${c.items[0].duracion} min</div><div class="precio">$${c.items[0].precio} MXN</div>`
      : `<div class="sub">${c.items.length} opciones</div>`;
    return `<div class="card" data-id="${c.id}" tabindex="0" role="button">
      <h3>${c.nombre}</h3>${sub}</div>`;
  }).join("");
  bindCards("#svcGrid .card", el=>{
    sel.cat = CATEGORIAS.find(c=>c.id===el.dataset.id);
    resetFrom("stepSub");
    if(sel.cat.items.length === 1){
      const it = sel.cat.items[0];
      sel.item = { nombre: itemLabel(sel.cat, it), duracion: it.duracion, precio: it.precio };
      renderEmployees();
      $("stepEmp").classList.add("on");
      go("stepEmp");
    }else{
      sel.item = null;
      renderSubservices();
      $("stepSub").classList.add("on");
      go("stepSub");
    }
  });
}

function itemLabel(cat, it){
  return it.nombre ? cat.nombre + " · " + it.nombre : cat.nombre;
}

/* ---------- paso 2 (condicional): tipos ---------- */
function renderSubservices(){
  $("subTitle").textContent = "Tipo de " + sel.cat.nombre.toLowerCase();
  $("subGrid").innerHTML = sel.cat.items.map(s=>`
    <div class="card" data-id="${s.id}" tabindex="0" role="button">
      <h3>${s.nombre || sel.cat.nombre}</h3>
      <div class="sub">${s.duracion} min</div>
      <div class="precio">$${s.precio} MXN</div>
    </div>`).join("");
  bindCards("#subGrid .card", el=>{
    const s = sel.cat.items.find(x=>x.id===el.dataset.id);
    sel.item = { nombre: itemLabel(sel.cat, s), duracion: s.duracion, precio: s.precio };
    resetFrom("stepEmp");
    renderEmployees();
    $("stepEmp").classList.add("on");
    go("stepEmp");
  });
}

/* ---------- paso 3: empleado ---------- */
function renderEmployees(){
  const q = qualified();
  if(!q.length){
    $("empGrid").innerHTML = `<div class="empty-msg" style="grid-column:1/-1">Por el momento nadie ofrece este servicio. Elige otro ✦</div>`;
    return;
  }
  let html = "";
  if(q.length > 1){
    html += `<div class="card" data-id="any" tabindex="0" role="button">
      <h3>Cualquiera disponible</h3><div class="sub">Te asignamos a quien esté libre</div></div>`;
  }
  html += q.map(e=>{
    const nombres = e.servicios.map(id=>{
      const c = CATEGORIAS.find(x=>x.id===id); return c ? c.nombre : null;
    }).filter(Boolean).join(" · ");
    return `<div class="card" data-id="${e.id}" tabindex="0" role="button">
      <h3>${e.nombre}</h3><div class="sub">${nombres}</div></div>`;
  }).join("");
  $("empGrid").innerHTML = html;
  bindCards("#empGrid .card", el=>{
    sel.emp = el.dataset.id;
    resetFrom("stepDay");
    renderDays();
    $("stepDay").classList.add("on");
    go("stepDay");
  });
}

/* ---------- paso 4: días ---------- */
function empsForSlotSearch(){
  return sel.emp === "any" ? qualified() : [empById(sel.emp)];
}

function renderDays(){
  const strip = $("dayStrip"); strip.innerHTML = "";
  const today = new Date(); today.setHours(0,0,0,0);
  const emps = empsForSlotSearch();
  for(let i=0;i<CONFIG.bookingWindowDays;i++){
    const d = new Date(today); d.setDate(d.getDate()+i);
    if(!emps.some(e=>empWindows(e, d.getDay()).length)) continue;
    const el = document.createElement("div");
    el.className = "day"; el.tabIndex = 0; el.setAttribute("role","button");
    el.innerHTML = `<div class="dname">${DIAS[d.getDay()]}</div>
                    <div class="dnum">${d.getDate()}</div>
                    <div class="dmes">${MESES[d.getMonth()]}</div>`;
    el.addEventListener("click",()=>pickDay(el,d));
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();pickDay(el,d);} });
    strip.appendChild(el);
  }
  if(!strip.children.length){
    strip.innerHTML = `<div class="empty-msg" style="flex:1">Sin días disponibles próximamente ✦</div>`;
  }
}
function pickDay(el,d){
  $("dayStrip").querySelectorAll(".day").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel");
  sel.date = dateKey(d); sel.time = null;
  resetFrom("stepTime");
  renderSlots(d);
  $("stepTime").classList.add("on");
  go("stepTime");
}

/* ---------- paso 5: horarios ---------- */
function freeEmployeesAt(d, t, dur){
  const key = dateKey(d);
  const dayB = DATA.bookings.filter(b=>b.fecha===key);
  const dayX = DATA.blocks.filter(b=>b.fecha===key);
  const negocioBlocked = dayX.some(b=>
    (b.empleado==="negocio" || b.empleado==="") &&
    overlaps(t,t+dur,toMin(b.hora_inicio),toMin(b.hora_fin)));
  if(negocioBlocked) return [];

  return empsForSlotSearch().filter(e=>{
    const fits = empWindows(e, d.getDay()).some(w => t >= w.open && t + dur <= w.close);
    if(!fits) return false;
    const busy =
      dayB.some(b=>b.empleado===e.id && overlaps(t,t+dur,toMin(b.hora_inicio),toMin(b.hora_fin))) ||
      dayX.some(b=>b.empleado===e.id && overlaps(t,t+dur,toMin(b.hora_inicio),toMin(b.hora_fin)));
    return !busy;
  }).map(e=>e.id);
}

function renderSlots(d){
  const grid = $("slotGrid");
  const dur = sel.item.duracion;
  const now = new Date();
  const isToday = dateKey(now) === dateKey(d);
  const nowMin = now.getHours()*60 + now.getMinutes();

  let open = 24*60, close = 0;
  empsForSlotSearch().forEach(e=>{
    empWindows(e, d.getDay()).forEach(w=>{
      open = Math.min(open, w.open); close = Math.max(close, w.close);
    });
  });

  const slots = [];
  for(let t=open; t + dur <= close; t += CONFIG.slotStepMin){
    if(isToday && t <= nowMin) continue;
    const free = freeEmployeesAt(d, t, dur);
    if(free.length) slots.push({ t, free });
  }

  if(!slots.length){
    grid.innerHTML = `<div class="empty-msg" style="grid-column:1/-1">No hay horarios disponibles este día. Prueba otro ✦</div>`;
    return;
  }
  grid.innerHTML = slots.map(s=>`<div class="slot" data-t="${s.t}" tabindex="0" role="button">${fmt12(s.t)}</div>`).join("");
  grid.querySelectorAll(".slot").forEach(el=>{
    const pick = ()=>{
      grid.querySelectorAll(".slot").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel");
      sel.time = +el.dataset.t;
      sel.candidates = slots.find(s=>s.t===sel.time).free;
      showConfirm();
    };
    el.addEventListener("click",pick);
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();} });
  });
}

/* ---------- confirmación ---------- */
function showConfirm(){
  const [y,m,dd] = sel.date.split("-").map(Number);
  const d = new Date(y, m-1, dd);
  const primera = sel.candidates.length ? empById(sel.candidates[0]) : null;
  const empLine = sel.emp === "any"
    ? (primera ? "Te atendería <b>" + primera.nombre + "</b> (según disponibilidad)" : "Con quien esté disponible")
    : "Con " + empById(sel.emp).nombre;
  $("resumen").innerHTML =
    `✦ <b>${sel.item.nombre}</b> · ${sel.item.duracion} min · $${sel.item.precio} MXN<br>` +
    `✦ ${empLine}<br>` +
    `✦ <b>${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}</b> a las <b>${fmt12(sel.time)}</b>`;
  $("confirmBox").classList.add("show");
  $("errMsg").style.display = "none";
  go("confirmBox");
}
function hideConfirm(){ $("confirmBox").classList.remove("show"); }
function go(id){ $(id).scrollIntoView({behavior:"smooth",block:"center"}); }

function bindCards(selector, onPick){
  document.querySelectorAll(selector).forEach(el=>{
    const pick = ()=>{
      el.parentElement.querySelectorAll(".card").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel");
      onPick(el);
    };
    el.addEventListener("click",pick);
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();} });
  });
}

$("btnConfirm").addEventListener("click", async ()=>{
  const nombre = $("fName").value.trim();
  const tel    = $("fPhone").value.replace(/\D/g,"");
  const err = $("errMsg");
  if(nombre.length < 2){ err.textContent = "Escribe tu nombre, por favor."; err.style.display="block"; return; }
  if(tel.length < 10){ err.textContent = "Escribe un teléfono de 10 dígitos."; err.style.display="block"; return; }

  const btn = $("btnConfirm");
  btn.disabled = true; btn.textContent = "Confirmando…";
  err.style.display = "none";

  try{
    const r = await fetch(CONFIG.scriptURL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({
        action:"book",
        fecha: sel.date,
        hora_inicio: toHHMM(sel.time),
        duracion_min: sel.item.duracion,
        servicio: sel.item.nombre,
        candidatos: sel.candidates,
        nombre, telefono: tel
      })
    });
    const j = await r.json();
    if(j.ok){
      const [y,m,dd] = sel.date.split("-").map(Number);
      const d = new Date(y, m-1, dd);
      const asignada = empById(j.empleado);
      $("successDet").innerHTML =
        `<b>${nombre}</b><br>${sel.item.nombre} · ${fmt12(sel.time)}<br>` +
        (asignada ? `Con ${asignada.nombre}<br>` : "") +
        `${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
      $("booking").style.display = "none";
      $("successBox").classList.add("show");
      window.scrollTo({top:0,behavior:"smooth"});
    }else if(j.error === "ocupado"){
      err.textContent = j.message || "Ese horario acaba de ocuparse. Elige otro.";
      err.style.display = "block";
      await loadData();
      const [y,m,dd] = sel.date.split("-").map(Number);
      renderSlots(new Date(y, m-1, dd));
      hideConfirm();
    }else{
      err.textContent = "Algo salió mal. Intenta de nuevo.";
      err.style.display = "block";
    }
  }catch(e){
    err.textContent = "No hay conexión. Intenta de nuevo.";
    err.style.display = "block";
  }
  btn.disabled = false; btn.textContent = "Confirmar reservación";
});

/* ---------- iniciar ---------- */
loadData();
</script>
