<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poblamiento de América y Pueblos Originarios — Historia 1°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #1a3a6b;
  --green-dark: #0f2244;
  --green-bg:   #e8edf5;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }

#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }
#restoreBar { display:none; background:var(--green-bg); border:1.5px solid var(--green); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--green-dark); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active,.wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

/* ── INTERACTIVE ELEMENTS ── */
.map-container { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin:1rem 0; }
.map-container svg { width:100%; height:auto; }
.map-btn { cursor:pointer; transition:opacity .2s; }
.map-btn:hover .map-circle { opacity:0.8; }
.map-tooltip { background:var(--green); color:#fff; border-radius:8px; padding:.5rem .8rem; font-size:.78rem; margin-top:.5rem; display:none; }
.map-tooltip.show { display:block; }
.route-line { stroke:var(--gold); stroke-width:3; stroke-dasharray:8,4; fill:none; }
.route-arrow { fill:var(--gold); }

.evidence-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.75rem; margin:1rem 0; }
.evidence-card { background:var(--surface2); border:2px solid var(--border); border-radius:10px; padding:.85rem; cursor:pointer; transition:all .2s; text-align:center; }
.evidence-card:hover { border-color:var(--gold); transform:translateY(-2px); }
.evidence-card.selected { border-color:var(--green); background:var(--green-bg); }
.evidence-icon { font-size:2rem; margin-bottom:.4rem; }
.evidence-label { font-size:.78rem; font-weight:600; color:var(--text2); }

.region-map { position:relative; margin:1rem 0; }
.region-badge { display:inline-block; padding:.3rem .7rem; border-radius:20px; font-size:.75rem; font-weight:600; margin:.2rem; cursor:pointer; transition:all .2s; border:2px solid transparent; }
.region-badge:hover { transform:translateY(-1px); }
.region-meso { background:#e8f4e8; color:#2d6a4f; border-color:#2d6a4f; }
.region-arid { background:#fdf3e3; color:#8b5e15; border-color:#d4900a; }
.region-oasi { background:#e8eef7; color:#1a3a6b; border-color:#2563b0; }
.region-meso:hover { background:#2d6a4f; color:#fff; }
.region-arid:hover { background:#8b5e15; color:#fff; }
.region-oasi:hover { background:#1a3a6b; color:#fff; }
[data-theme="dark"] .region-meso { background:#1a2e1a; color:#6aaa8e; }
[data-theme="dark"] .region-arid { background:#2e1f05; color:#d4a862; }
[data-theme="dark"] .region-oasi { background:#0e1e38; color:#7aaae0; }

.region-popup { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; margin:.5rem 0; display:none; box-shadow:var(--shadow); }
.region-popup.show { display:block; }
.region-popup h4 { font-family:'Crimson Pro',serif; font-size:1.1rem; margin-bottom:.4rem; }
.region-popup .rpop-badge { display:inline-block; font-size:.7rem; padding:.15rem .5rem; border-radius:10px; margin-bottom:.5rem; }

.tepexpan-box { background:var(--gold-bg); border:2px solid var(--gold); border-radius:12px; padding:1.1rem 1.3rem; margin:1rem 0; }
.tepexpan-box h4 { color:var(--green-dark); font-family:'Crimson Pro',serif; font-size:1.15rem; margin-bottom:.4rem; }

.timeline-track { margin:1rem 0; }
.tl-item { display:flex; gap:1rem; align-items:flex-start; margin-bottom:1.2rem; }
.tl-dot-col { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
.tl-dot { width:16px; height:16px; border-radius:50%; background:var(--green); border:3px solid var(--surface); box-shadow:0 0 0 2px var(--green); flex-shrink:0; margin-top:.15rem; }
.tl-line { width:2px; background:var(--green); flex:1; min-height:1rem; margin-top:.3rem; opacity:.4; }
.tl-content { flex:1; padding-bottom:.3rem; }
.tl-year { font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--green-dark); font-weight:600; margin-bottom:.25rem; }
.tl-text { font-size:.82rem; color:var(--text2); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding:1.6rem 1.1rem; border-radius:12px; }
  .wlogos img { height:38px; }
  .wtitle { font-size:1.35rem; }
  .htitle { display:none; }
  .hlogos img { height:20px; }
  .hchip { font-size:.63rem; padding:.15rem .45rem; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
  .lbody { padding:1.2rem .7rem 3rem; }
  .section h2 { font-size:1.3rem; }
  .rules-grid { grid-template-columns:1fr; }
  .evidence-grid { grid-template-columns:repeat(2,1fr); }
  .pbody { padding:.75rem; }
  .pstmt { font-size:.84rem; }
  .mcopt { font-size:.83rem; padding:.58rem .7rem; }
  .dcanvas { height:220px; }
  .ctoolbar { gap:.25rem; }
  .callout { padding:.8rem .9rem; }
  .rcard { overflow-x:auto; }
}
</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <!-- LOGO: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="logo-left" src="" alt="Institución" style="display:none">
      <div class="wlogsep" id="wlogsep" style="display:none"></div>
      <img id="logo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wt">Poblamiento de América y Pueblos Originarios</div>
    <div class="wcourse" id="wc">Historia 1° · Los albores de la humanidad</div>
    <label class="flabel" for="sName" id="lbl-name-el">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" for="sGroup" id="lbl-group-el">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 1A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar" style="background:var(--green-bg);color:var(--green-dark);border:1.5px solid var(--green);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;">
      <strong id="restoreMsg">📂 Sesión guardada encontrada</strong><br>
      <span id="restoreMsg2">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Retomar sesión</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px;}
          .lbl{stroke:var(--gold);stroke-width:2.5;}
          .lba{fill:var(--gold);}
        </style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle" id="htitleEl">Poblamiento de América</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lht{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px;}
          .lhl{stroke:var(--gold);stroke-width:2;}
          .lha{fill:var(--gold);}
        </style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;Descargar Resultados PDF</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   SCHOOL CONFIG
   ════════════════════════════════════════════════════════════════════════ */
var SCHOOL = {
  primary:      '#1a4a8a',
  primaryDark:  '#0c2547',
  primaryBg:    '#e7edf6',
  accent:       '#e07b1a',
  accentBg:     '#fbeddf',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

/* ── SEEDED RNG ── */
function seededRng(seed){
  var s=0; for(var i=0;i<seed.length;i++) s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){
    s=(s+0x9e3779b9)|0; var t=s^(s>>>16); t=Math.imul(t,0x21f0aaad); t^=(t>>>15);
    t=Math.imul(t,0x735a2d97); return((t^(t>>>15))>>>0)/4294967296;
  };
}
function pick(arr,rng){ return arr[Math.floor(rng()*arr.length)]; }
function shuffle(arr,rng){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(rng()*(i+1)); var tmp=a[i];a[i]=a[j];a[j]=tmp; } return a; }
function shuffleOpts(opts,correct,rng){ var a=opts.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(rng()*(i+1)); var tmp=a[i];a[i]=a[j];a[j]=tmp; } return {opts:a,correctIdx:a.indexOf(correct)}; }

  var err=document.getElementById('startErr');
  if(!name||!group){err.textContent=t('err-fields');return;}

  studentData={name:name,group:group};
  answeredCount=0; correctCount=0;
  var att=nextAttempt(name,group);
  buildLesson(seededRng(name+group+att));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});

/* ── CANVAS ── */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1, rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr); ctx.strokeStyle='#0f2244'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){ var r=canvas.getBoundingClientRect(); var src=e.touches?e.touches[0]:e; return[src.clientX-r.left,src.clientY-r.top]; }
  function onDown(e){ e.preventDefault(); drawing=true; var p=getPos(e); lx=p[0]; ly=p[1]; }
  function onMove(e){ e.preventDefault(); if(!drawing) return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp(){ drawing=false; saveSession(); }
  canvas.addEventListener('mousedown',onDown,{passive:false}); canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp); canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false}); canvas.addEventListener('touchmove',onMove,{passive:false}); canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){ tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen'))    { ctx.lineWidth=2; }
      if(btn.classList.contains('bmarker')) { ctx.lineWidth=10; ctx.globalAlpha=0.45; }
      if(btn.classList.contains('beraser')) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){ tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');}); dot.classList.add('sel'); ctx.strokeStyle=dot.dataset.color; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');}); tb.querySelector('.bpen').classList.add('on'); });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr); });
}

/* ── TWO-TAP MC ── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx]; if(prob.studentChoice!==null) return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx; prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){ if(i===prob.correctIdx) o.classList.add('rc'); if(i===chosenIdx&&isOk) o.classList.add('sc'); if(i===chosenIdx&&!isOk) o.classList.add('sw'); });
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>'+t('fb-correct')+'</strong> ':'<strong>'+t('fb-wrong')+'</strong> ')+prob.explanation[LANG];
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk) correctCount++; answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession(); if(answeredCount===problems.length) setTimeout(showResults,700);
    return;
  }
  prob.pendingChoice=chosenIdx; opts.forEach(function(o){o.classList.remove('pending');}); opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx]; if(prob.studentChoice!==null) return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx; prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);

  opts.forEach(function(o,i){ if(i===prob.correctIdx) o.classList.add('rc'); if(i===chosenIdx&&isOk) o.classList.add('sc'); if(i===chosenIdx&&!isOk) o.classList.add('sw'); });
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>'+t('fb-correct')+'</strong> ':'<strong>'+t('fb-wrong')+'</strong> ')+prob.explanation[LANG];
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');

    explanation: { es:'¡Correcto! Las leyendas familiares o comunitarias contadas de manera directa son <strong>fuentes orales primarias</strong>. En muchas comunidades indígenas, la tradición oral ha preservado la historia durante siglos. La historia inclusiva valora estas fuentes tanto como los documentos escritos.', en:'Correct! Family or community legends told directly are <strong>primary oral sources</strong>. In many indigenous communities, oral tradition has preserved history for centuries. Inclusive history values these sources as much as written documents.' },

    en: ['Creative adaptation to the environment: they used available resources to solve engineering problems','Magic: the gods taught them to build','They copied technology from European civilizations','It was only possible because they had metal tools']
  };
  var p10correct = { es:'Adaptación creativa al entorno: usaron los recursos disponibles para resolver problemas de ingeniería', en:'Creative adaptation to the environment: they used available resources to solve engineering problems' };
  var s10 = shuffleOpts(p10opts[LANG], p10correct[LANG], rng);
  problems.push({

    studentChoice: null, pendingChoice: null, showWork: false

/* ── PDF GENERATION ── */
function pdfText(h){ var d=document.createElement('div'); d.innerHTML=h||''; return d.textContent||d.innerText||''; }
function generatePDF(){
  var btn=document.getElementById('dlBtn'); btn.textContent='⏳...'; btn.disabled=true;
  try{
    var pBR=SCHOOL.pBR, pBG=SCHOOL.pBG, pBB=SCHOOL.pBB;
    var pAR=SCHOOL.pAR, pAG=SCHOOL.pAG, pAB=SCHOOL.pAB;
    var { jsPDF } = window.jspdf; var doc = new jsPDF({ unit:'mm', format:'letter' });
    var PW=215.9, PH=279.4, M=18, TW=PW-(2*M);
    var name=studentData.name, group=studentData.group;
    var total=problems.length;
    var pct=total>0?Math.round(correctCount/total*100):0;
    var now=new Date(); var dateStr=now.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
    var code=Math.random().toString(36).substr(2,8).toUpperCase();

    // Cover
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
    doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

    // Logo placeholder area
    var hl = document.getElementById('hlogo-left');
    if(hl && hl.src && hl.src !== window.location.href && hl.src.length > 50){
      var fmt = hl.src.indexOf('/9j/')>-1?'JPEG':'PNG';
      try{ doc.addImage(hl.src,fmt,M,4,40,22); }catch(e){}
    }

    // LIAXA logo on cover
    doc.setFillColor(pAR,pAG,pAB); doc.circle(PW-M-8,15,6,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('LIAXA',PW-M-17,8);

    doc.setTextColor(232,238,247); doc.setFontSize(19); doc.setFont('helvetica','bold');
    doc.text(LANG==='es'?'Poblamiento de América y Pueblos Originarios':'Settlement of America & Indigenous Peoples',M,49,{maxWidth:TW});
    doc.setTextColor(150,165,200); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text(dateStr,M,64);

    doc.setFillColor(237,240,245); doc.roundedRect(M,72,TW,20,3,3,'F');
    doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    doc.text(LANG==='es'?'ALUMNO':'STUDENT',M+4,79); doc.text(LANG==='es'?'GRUPO':'GROUP',130,79);
    doc.setTextColor(20,24,32); doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.text(name,M+4,87); doc.text(group,130,87);

    var sc=pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
    doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
    doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8); doc.roundedRect(M,100,TW,34,4,4,'S');
    doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
    doc.text(pct+'%',PW/2,124,{align:'center'});
    doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    doc.text(correctCount+(LANG==='es'?' correcta(s) de ':' correct of ')+total+(LANG==='es'?' preguntas':' questions'),PW/2,131,{align:'center'});

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,142,TW,8,'F'); doc.text(LANG==='es'?'RESUMEN DE PROBLEMAS':'PROBLEM SUMMARY',M+4,148);
    var sy=154;
    problems.forEach(function(prob,i){
      if(sy+12>PH-15){ doc.addPage(); sy=20; doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.rect(M,sy,TW,8,'F'); doc.text(LANG==='es'?'RESUMEN (continuación)':'SUMMARY (continued)',M+4,sy+6); sy+=12; }
      var ok=document.getElementById('pc'+i).classList.contains('ok');
      doc.setFillColor(ok?232:255,ok?240:232,ok?232:228); doc.roundedRect(M,sy,TW,10,2,2,'F');
      doc.setFillColor(ok?26:176,ok?106:48,ok?74:16); doc.circle(M+6,sy+5,2.5,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.text(ok?'✓':'✗',M+4.5,sy+6.5);
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
      doc.text((i+1)+': '+pdfText(prob.title[LANG]),M+12,sy+6.5);
      doc.setTextColor(ok?26:176,ok?106:48,ok?74:16);
      doc.text(ok?(LANG==='es'?'Correcto':'Correct'):(LANG==='es'?'Incorrecto':'Incorrect'),PW-M-24,sy+6.5);
      sy+=12;
    });

    for(var i=0;i<problems.length;i++){
      var prob=problems[i]; doc.addPage(); var wy=0;
      doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
      doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
      doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
      doc.text((LANG==='es'?'Historia 1°':'History 1st')+'  ·  '+(LANG==='es'?'Poblamiento de América':'Settlement of America'),M,10);
      doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
      doc.text((i+1)+(LANG==='es'?' de ':' of ')+total+'  —  '+pdfText(prob.title[LANG]),M,17);
      wy=25;
      var qRaw=pdfText(prob.questionText[LANG]);
      doc.setFontSize(8.5); doc.setFont('helvetica','normal');
      var qLines=doc.splitTextToSize(qRaw,TW-10); var qBoxH=8+qLines.length*5+3;
      doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
      doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.text(LANG==='es'?'PREGUNTA':'QUESTION',M+4,wy+6);
      doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
      var qy=wy+12; qLines.forEach(function(ln,li){doc.text(ln,M+4,qy+li*5);}); wy+=qBoxH+4;
      var isOk=document.getElementById('pc'+i).classList.contains('ok');
      var chosen=prob.studentChoice!=null?pdfText(prob.options[LANG][prob.studentChoice]||'—'):'—';
      var corr=pdfText(prob.options[LANG][prob.correctIdx]||'');
      var expRaw=pdfText(prob.explanation[LANG]||'');
      doc.setFontSize(8.5); var chLines=doc.splitTextToSize((LANG==='es'?'Alumno: ':'Student: ')+chosen,TW-18);
      doc.setFontSize(8); var coLines=doc.splitTextToSize((LANG==='es'?'Correcto: ':'Correct: ')+corr,TW-18);
      doc.setFontSize(7.5); var exLines=doc.splitTextToSize((LANG==='es'?'Solución: ':'Solution: ')+expRaw,TW-18).slice(0,4);
      var ansBoxH=8+chLines.length*5.5+coLines.length*5+exLines.length*5+6;
      doc.setFillColor(isOk?232:255,isOk?240:232,isOk?232:228); doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
      doc.setFillColor(isOk?26:176,isOk?106:48,isOk?74:16); doc.circle(M+7,wy+8,3.5,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.text(isOk?'✓':'✗',M+5.2,wy+10.5);
      var ay=wy+7;
      doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold'); chLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5.5);}); ay+=chLines.length*5.5+3;
      doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal'); coLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);}); ay+=coLines.length*5+3;
      doc.setTextColor(90,85,80); doc.setFontSize(7.5); exLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);}); wy+=ansBoxH+5;
      var dc=document.getElementById('dc'+i);
      if(dc){ try{ var imgD=dc.toDataURL('image/png'); var ar=dc.height/dc.width; var iw=TW; var ih=Math.min(iw*ar,68); doc.addImage(imgD,'PNG',M,wy,iw,ih); wy+=ih+4; }catch(e){} }
    }

    var pages=doc.internal.getNumberOfPages();
    for(var p=1;p<=pages;p++){
      doc.setPage(p); doc.setFillColor(pAR,pAG,pAB); doc.rect(0,PH-3,PW,3,'F');
      doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
      doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,PW/2,PH-5,{align:'center'});
    }
    doc.save(SCHOOL.filePrefix+'_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  }catch(err){ alert('Error al generar PDF: '+err.message); }
  btn.innerHTML='⬇ \u00a0'+t('btn-pdf'); btn.disabled=false;
}
