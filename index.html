<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaxa — Transferencia de conocimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1B2B52; --green-dark:#0F1C38; --green-bg:#EEF1F8;
  --gold:#E8A020; --gold-dark:#B87010; --gold-bg:#FEF6E7;
  --bg:#F8F7F4; --surface:#ffffff;
  --border:#DDD9D0; --text:#1A1A1E; --text2:#47464C; --text3:#7A7880;
  --shadow:0 4px 24px rgba(0,0,0,.10); --shadow-lg:0 12px 48px rgba(0,0,0,.18);
}
[data-theme="dark"] {
  --bg:#14141A; --surface:#1E1E28;
  --border:#32323E; --text:#E8E4DA; --text2:#A8A4B0; --text3:#8A8898;
  --green-bg:#161C2E; --gold-bg:#2E2410;
  --shadow:0 4px 24px rgba(0,0,0,.3); --shadow-lg:0 12px 48px rgba(0,0,0,.4);
}
[data-theme="dark"] .topbar-wordmark{color:#8BAAE8}
[data-theme="dark"] .topbar-graph{stroke:#8BAAE8 !important}
[data-theme="dark"] .hero-title{color:#C8D8F8}
[data-theme="dark"] .dark-toggle{background:var(--green)}
[data-theme="dark"] .dark-toggle::after{transform:translateX(16px)}
[data-theme="dark"] .lang-btn.active{background:#3A5A9A}
[data-theme="dark"] .spoke-card{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .spoke-card.edu .spoke-title{color:#8BAAE8}
[data-theme="dark"] .spoke-card.cap .spoke-title{color:#5AC890}
[data-theme="dark"] .spoke-card.cer .spoke-title{color:#E8A020}
[data-theme="dark"] .spoke-card.cap .spoke-icon-wrap{background:#162A1E}
[data-theme="dark"] footer{background:#0A0A12}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden;transition:background .3s,color .3s;min-height:100vh;display:flex;flex-direction:column}

.top-bar{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;justify-content:space-between;align-items:center;padding:.4rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);transition:background .3s,border-color .3s}
.top-bar-right{display:flex;align-items:center;gap:.75rem}
.lang-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.lang-btn{padding:.28rem .75rem;font-size:.75rem;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--green);color:#fff}
.dark-toggle{width:38px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;border:none;transition:background .25s;flex-shrink:0}
.dark-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--surface);transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.dark-icon{font-size:.8rem;cursor:pointer;background:none;border:none;color:var(--text3);padding:.2rem}
.topbar-logo{display:inline-flex;align-items:center;text-decoration:none}
.topbar-mark svg{width:30px;height:36px;display:block}
.topbar-divider{width:2px;height:34px;background:#E8A020;border-radius:1px;margin:0 8px;flex-shrink:0}
.topbar-wordmark{font-family:'Crimson Pro',Georgia,serif;font-size:1.5rem;font-weight:700;color:#1B2B52;line-height:1;letter-spacing:-.01em}

.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7rem 1.5rem 3rem;text-align:center;background:var(--surface);position:relative;overflow:hidden;transition:background .3s}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(27,43,82,.15) 1.5px,transparent 1.5px);background-size:32px 32px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 90%);-webkit-mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 90%)}
.hero::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 55% 50% at 8% 85%,rgba(27,43,82,.10) 0%,transparent 65%),radial-gradient(ellipse 50% 45% at 92% 10%,rgba(232,160,32,.12) 0%,transparent 60%),radial-gradient(ellipse 35% 30% at 15% 15%,rgba(232,160,32,.07) 0%,transparent 60%)}
.hero-bg-graph{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:.04}
.hero-bg-graph svg{position:absolute;bottom:-10%;right:-5%;width:55%;height:auto}
.hero-inner{position:relative;z-index:1;max-width:680px;width:100%}
.hero-eyebrow{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:1.2rem}
.hero-title{font-family:"Crimson Pro",serif;font-size:clamp(1.8rem,3.8vw,3rem);font-weight:700;line-height:1.2;color:#1B2B52;margin-bottom:1rem}
.hero-title em{font-style:italic;color:#3a7a4a}
.hero-sub{font-size:.97rem;color:var(--text2);line-height:1.75;margin:0 auto 2.6rem}
.hero-divider{width:40px;height:2px;background:var(--gold);margin:0 auto 2.6rem;border-radius:1px}

.spokes{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;width:100%}
@media(max-width:600px){.spokes{grid-template-columns:1fr}}

.spoke-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:1.8rem 1.2rem 1.6rem;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:inherit;position:relative;overflow:hidden;text-align:center;gap:.9rem}
.spoke-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.spoke-accent{position:absolute;top:0;left:0;right:0;height:3px}
.spoke-card.edu .spoke-accent{background:var(--green)}
.spoke-card.edu:hover{border-color:var(--green)}
.spoke-card.cap .spoke-accent{background:#2A6040}
.spoke-card.cap:hover{border-color:#2A6040}
.spoke-card.cer .spoke-accent{background:#B87010}
.spoke-card.cer:hover{border-color:#B87010}

.spoke-icon-wrap{width:54px;height:54px;border-radius:14px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.spoke-card.cap .spoke-icon-wrap{background:#E8F5EE}
.spoke-card.cer .spoke-icon-wrap{background:var(--gold-bg)}

.spoke-title{font-family:'Crimson Pro',serif;font-size:1.15rem;font-weight:700;line-height:1.25}
.spoke-card.edu .spoke-title{color:var(--green)}
.spoke-card.cap .spoke-title{color:#2A6040}
.spoke-card.cer .spoke-title{color:var(--gold-dark)}

.bottom-tag{text-align:center;padding:2rem 1.5rem .8rem;font-size:.78rem;color:var(--text3);letter-spacing:.04em;position:relative;z-index:1}

.fade-up{opacity:0;transform:translateY(20px);transition:opacity .55s,transform .55s}
.fade-up.vis{opacity:1;transform:none}

footer{background:var(--text);color:rgba(255,255,255,.55);text-align:center;padding:1.6rem;font-size:.76rem}
footer strong{color:#fff}
</style>
</head>
<body>

<div class="top-bar">
  <a class="topbar-logo" href="#">
    <div class="topbar-mark">
      <svg viewBox="0 0 68 80" xmlns="http://www.w3.org/2000/svg" fill="none">
        <polyline class="topbar-graph" points="0,62 18,46 36,52 58,22" stroke="#1B2B52" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="58" cy="22" r="6" fill="#E8A020"/>
      </svg>
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-wordmark">LIAXA</span>
  </a>
  <div class="top-bar-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <span class="dark-icon" title="Toggle dark mode" onclick="toggleDark()">🌙</span>
    <button class="dark-toggle" onclick="toggleDark()" aria-label="Toggle dark mode"></button>
  </div>
</div>

<section class="hero">
  <div class="hero-bg-graph">
    <svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg" fill="none">
      <polyline points="20,280 80,210 140,240 220,150 300,170 380,80 460,40" stroke="#1B2B52" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="460" cy="40" r="12" fill="#E8A020"/>
      <circle cx="220" cy="150" r="7" fill="#1B2B52"/>
      <circle cx="380" cy="80" r="7" fill="#1B2B52"/>
      <line x1="20" y1="280" x2="470" y2="280" stroke="#1B2B52" stroke-width="3"/>
      <line x1="20" y1="280" x2="20" y2="20" stroke="#1B2B52" stroke-width="3"/>
    </svg>
  </div>

  <div class="hero-inner">
    <div class="hero-eyebrow" id="h-eyebrow">Sistema de módulos interactivos</div>
    <h1 class="hero-title">
      <span id="h-title-main">Soluciones digitales,</span><br>
      <em id="h-title-em">listas para usar.</em>
    </h1>
    <p class="hero-sub" id="h-sub">Sin instalaciones. Todo en un enlace.</p>
    <div class="hero-divider"></div>

    <div class="spokes">
      <a class="spoke-card edu fade-up" href="educacion.html">
        <div class="spoke-accent"></div>
        <div class="spoke-icon-wrap">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <path d="M13 3L2 8.5L13 14L24 8.5L13 3Z" stroke="#1B2B52" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 8.5V17" stroke="#1B2B52" stroke-width="2" stroke-linecap="round"/>
            <path d="M7 11.2V18.5C7 18.5 9.5 21 13 21C16.5 21 19 18.5 19 18.5V11.2" stroke="#1B2B52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="spoke-title" id="edu-title">Para instituciones</div>
      </a>

      <a class="spoke-card cap fade-up" href="capacitacion.html" style="transition-delay:.1s">
        <div class="spoke-accent"></div>
        <div class="spoke-icon-wrap">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <rect x="3" y="5" width="20" height="14" rx="2" stroke="#2A6040" stroke-width="2"/>
            <path d="M8 19V22M18 19V22M5 22H21" stroke="#2A6040" stroke-width="2" stroke-linecap="round"/>
            <path d="M9 11H17M9 14H14" stroke="#2A6040" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="spoke-title" id="cap-title">Para empresas</div>
      </a>

      <a class="spoke-card cer fade-up" href="certificacion.html" style="transition-delay:.2s">
        <div class="spoke-accent"></div>
        <div class="spoke-icon-wrap">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <circle cx="13" cy="11" r="7" stroke="#B87010" stroke-width="2"/>
            <path d="M9 19L7 24L13 21.5L19 24L17 19" stroke="#B87010" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 11L12 13L16 9" stroke="#B87010" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="spoke-title" id="cer-title">Para certificadoras</div>
      </a>
    </div>
  </div>

  <div class="bottom-tag">liaxa.mx</div>
</section>

<footer>
  <strong>Liaxa</strong> &nbsp;·&nbsp; <span id="footer-txt">Tecnología educativa para instituciones en México</span>
  <br><br><span style="font-size:.7rem;opacity:.5">© <span id="footer-year"></span> Liaxa</span>
</footer>

<script>
function toggleDark(){
  var html=document.documentElement;
  html.setAttribute('data-theme',html.getAttribute('data-theme')==='dark'?'light':'dark');
}

var lang='es';
var TX={
  es:{
    'h-eyebrow':'Sistema de módulos interactivos',
    'h-title-main':'Soluciones digitales,',
    'h-title-em':'listas para usar.',
    'h-sub':'Sin instalaciones. Todo en un enlace.',
    'edu-title':'Para instituciones',
    'cap-title':'Para empresas',
    'cer-title':'Para certificadoras',
    'footer-txt':'Tecnología educativa'
  },
  en:{
    'h-eyebrow':'Interactive module system',
    'h-title-main':'Digital solutions,',
    'h-title-em':'ready to use.',
    'h-sub':'No installs. Everything in one link.',
    'edu-title':'For institutions',
    'cap-title':'For businesses',
    'cer-title':'For certifiers',
    'footer-txt':'Educational technology'
  }
};

function setLang(l){
  lang=l;
  document.getElementById('btn-es').classList.toggle('active',l==='es');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  var d=TX[l];
  Object.keys(d).forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.textContent=d[id];
  });
}

var obs=new IntersectionObserver(function(e){
  e.forEach(function(x){if(x.isIntersecting)x.target.classList.add('vis');});
},{threshold:.08});
document.querySelectorAll('.fade-up').forEach(function(el){obs.observe(el);});

document.addEventListener('DOMContentLoaded',function(){
  setLang('es');
  document.getElementById('footer-year').textContent=new Date().getFullYear();
});
</script>
</body>
</html>
