<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sucesiones Cuadráticas de Figuras — Matemáticas 2°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #1a3a6b;
  --green-dark: #0f2244;
  --green-bg:   #e8edf5;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

/* WELCOME */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border)}
.wlogos img{height:50px;width:auto;object-fit:contain}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3)}

/* RESTORE BAR */
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text)}
#restoreBar strong{color:var(--gold)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* LESSON */
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}

/* LANG TOGGLE */
.lang-toggle{display:inline-flex;align-items:center;flex-shrink:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:var(--surface)}
.lang-btn{background:none;border:none;padding:.3rem .7rem;font-size:.75rem;cursor:pointer;color:var(--text3);font-weight:600;transition:all .14s;line-height:1.2}
.lang-btn+.lang-btn{border-left:1px solid var(--border)}
.lang-btn.active{background:var(--green);color:#fff}

/* CONTENT */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}

/* RULE CARDS */
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green)}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem}
.rnote{font-size:.76rem;color:var(--text3)}

/* SEQUENCE DISPLAY */
.seq-display{display:flex;gap:.6rem;align-items:flex-end;justify-content:center;margin:1.2rem 0;flex-wrap:wrap}
.seq-step{text-align:center}
.seq-label{font-size:.7rem;color:var(--text3);margin-bottom:.3rem;font-family:'IBM Plex Mono',monospace}
.seq-num{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--green-dark);background:var(--green-bg);border-radius:8px;padding:.4rem .8rem;display:inline-block}

/* INTERACTIVE WIDGET */
.widget-box{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.3rem;margin:1rem 0}
.widget-title{font-size:.8rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.9rem}
.pattern-canvas-wrap{width:100%;overflow-x:auto;padding-bottom:.5rem}
#patternCanvas{border-radius:8px;display:block;margin:0 auto}
.slider-row{display:grid;grid-template-columns:1fr auto;gap:.8rem;align-items:center;margin-top:.8rem}
.slider-row input[type=range]{width:100%;accent-color:var(--green)}
.slider-val{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--green-dark);min-width:2.5rem;text-align:center}
.seq-formula{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--text2);margin-top:.5rem;text-align:center}

/* DIFF TABLE */
.diff-table{width:100%;border-collapse:collapse;font-size:.82rem;margin:1rem 0}
.diff-table th{background:var(--green);color:#fff;padding:.45rem .7rem;text-align:center;font-weight:600;font-size:.75rem}
.diff-table td{padding:.4rem .7rem;text-align:center;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace}
.diff-table tr:nth-child(even) td{background:var(--surface2)}
.diff-row td{color:var(--gold);font-weight:600}
.diff2-row td{color:var(--green-dark);font-weight:700}

/* PROBLEM CARDS */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)}
.pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500}

/* WORK AREA */
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green)}
.wpanel{display:none}
.wpanel.active{display:block}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical}
.wtextarea:focus{outline:none;border-color:var(--green)}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s}
.pzone:hover{border-color:var(--green)}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pzicon{font-size:1.7rem;margin-bottom:.35rem}
.pztxt{font-size:.8rem;color:var(--text3)}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain}

/* HINT */
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}

/* MC */
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg)}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg)}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok)}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}

/* MATH FRACTIONS */
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15em;line-height:1.1}
.mf-num{border-bottom:1.5px solid var(--text);padding:0 .2em .1em;font-size:.92em;text-align:center}
.mf-den{padding:.1em .2em 0;font-size:.92em;text-align:center}

/* RESULT */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}

/* FILL-IN DIFF TABLE */
.fidt{width:100%;border-collapse:collapse;font-size:.85rem;margin:1rem 0}
.fidt th{background:var(--green);color:#fff;padding:.45rem .7rem;text-align:center;font-weight:600;font-size:.75rem}
.fidt td{padding:.35rem .5rem;text-align:center;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace}
.fidt tr:nth-child(even) td{background:var(--surface2)}
.fidt .d1row td{color:#7a5a00;font-weight:600}
.fidt .d2row td{color:var(--green-dark);font-weight:700}
.fidt input.dblank{width:3.2rem;padding:.2rem .3rem;border:2px solid var(--gold);border-radius:5px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.85rem;background:var(--gold-bg);color:var(--text)}
.fidt input.dblank:focus{outline:none;border-color:var(--green)}
.fidt input.dblank.bok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.fidt input.dblank.bbad{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.dcheck-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.48rem 1.2rem;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:.7rem}
.dcheck-btn:hover{background:var(--green-dark)}
.dfeedback{font-size:.85rem;padding:.5rem .8rem;border-radius:8px;margin-top:.5rem;display:none}
.dfeedback.show{display:block}
.dfeedback.ok{background:var(--ok-bg);color:var(--ok)}
.dfeedback.bad{background:var(--bad-bg);color:var(--bad)}

/* CLASSIFY WIDGET */
.clf-seqs{display:flex;flex-direction:column;gap:.8rem;margin:.8rem 0}
.clf-row{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.75rem 1rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.clf-nums{font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--green-dark);font-weight:600;flex:1;min-width:160px}
.clf-btns{display:flex;gap:.4rem;flex-wrap:wrap}
.clf-btn{border:1.5px solid var(--border);border-radius:7px;padding:.28rem .7rem;font-size:.75rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .14s}
.clf-btn:hover{border-color:var(--green)}
.clf-btn.sel{border-color:var(--green);background:var(--green-bg);color:var(--green-dark)}
.clf-btn.bok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);pointer-events:none}
.clf-btn.bbad{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);pointer-events:none}

/* FIGURE ROW */
.fig-row{display:flex;gap:1rem;align-items:flex-end;justify-content:center;flex-wrap:wrap;margin:1rem 0;overflow-x:auto}
.fig-cell{text-align:center}
.fig-lbl{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text3);margin-top:.35rem}
.fig-cnt{font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:700;color:var(--green-dark);margin-top:.15rem}

/* MOBILE */
@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;border-radius:12px}
  .wlogos img{height:38px}
  .wtitle{font-size:1.35rem}
  .htitle{display:none}
  .hlogos img{height:20px}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:110px;overflow:hidden;text-overflow:ellipsis}
  .lbody{padding:1.2rem .7rem 3rem}
  .section h2{font-size:1.3rem}
  .pbody{padding:.75rem}
  .pstmt{font-size:.84rem}
  .mcopt{font-size:.83rem;padding:.58rem .7rem}
  .dcanvas{height:220px}
  .ctoolbar{gap:.25rem}
  .callout{padding:.8rem .9rem}
}

/* REAL-LIFE EXAMPLE CARDS */
.rl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem;margin:1rem 0}
.rl-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem .8rem;text-align:center;border-top:3px solid var(--gold)}
.rl-emoji{font-size:1.7rem;margin-bottom:.4rem}
.rl-name{font-weight:600;font-size:.83rem;color:var(--green-dark);margin-bottom:.25rem}
.rl-desc{font-size:.74rem;color:var(--text3);line-height:1.35}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wcard-title">Sucesiones Cuadráticas de Figuras</div>
    <div class="wcourse" id="wcard-course">Matemáticas · 2° Secundaria</div>
    <label class="flabel" id="lbl-name-el">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 2A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong>📂 Sesión guardada encontrada</strong><br>
      <span id="restoreMsg">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Retomar sesión</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px}.lbl{stroke:var(--gold);stroke-width:2.5}.lba{fill:var(--gold)}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="htitle" id="sticky-title">Sucesiones Cuadráticas de Figuras</div>
    <div class="halexis"></div>
    <div class="hchip" id="studentChip"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;Descargar Resultados PDF</button>
    </div>
  </div>
</div>

<script>
/* ── SCHOOL CONFIG ─────────────────────────────────────────────── */
var SCHOOL = {
  primary:         '#1e1e5c',
  primaryDark:     '#131340',
  primaryBg:       '#e9e9f4',
  accent:          '#c0202a',
  accentBg:        '#fae0e2',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

/* ── SEEDED RNG ──────────────────────────────────────────────────── */
function seededRng(seed){
  var s=0;
  for(var i=0;i<seed.length;i++) s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){
    s=(s+0x9e3779b9)|0;
    var t2=s^(s>>>16);
    t2=Math.imul(t2,0x21f0aaad);
    t2^=(t2>>>15);
    t2=Math.imul(t2,0x735a2d97);
    return((t2^(t2>>>15))>>>0)/4294967296;
  };
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}
function shuffleOpts(opts,correct,rng){
  var arr=opts.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
  return{opts:arr,correctIdx:arr.indexOf(correct)};
}

function saveSession(){
  if(!studentData.name)return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var blank=document.createElement('canvas');blank.width=dc.width;blank.height=dc.height;drawings.push(dc.toDataURL()===blank.toDataURL()?null:dc.toDataURL('image/png'));}
    else{drawings.push(null);}
    var ta=document.getElementById('ta'+i);texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}
function loadSession(name,group){
  var key='mat2_t02_g01__'+(name+'__'+group).replace(/\s+/g,'_');
  try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}
}
function checkForSavedSession(){

/* ── CANVAS ──────────────────────────────────────────────────────── */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen')){ctx.lineWidth=2;}
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});
      dot.classList.add('sel');
      ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

/* ── HANDLE MC (two-tap) ─────────────────────────────────────────── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();
    if(answeredCount===problems.length)setTimeout(showResults,700);
    return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>✓ ¡Correcto!</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
}

/* ══════════════════════════════════════════════════════════════
   SVG FIGURE GENERATORS
   Colors use theme-safe values: primary stroke + translucent fills
   ══════════════════════════════════════════════════════════════ */
var FIG_STROKE = '#4a7abf';   // visible on both light & dark
var FIG_FILL   = 'rgba(74,122,191,0.22)';
var FIG_FILL2  = 'rgba(201,168,76,0.35)';

/* Staircase (triangular numbers): term n = n(n+1)/2. Occupies n cols × n rows. */
function svgStaircase(n, sz, ox, oy) {
  var out = '';
  for (var row = 1; row <= n; row++) {
    for (var col = 1; col <= row; col++) {
      var x = ox + (col-1)*sz;
      var y = oy + (n-row)*sz;
      out += '<rect x="'+x+'" y="'+y+'" width="'+sz+'" height="'+sz+'" fill="'+FIG_FILL+'" stroke="'+FIG_STROKE+'" stroke-width="1.2"/>';
    }
  }
  return out;
}

/* Square grid: term n = n². Occupies n cols × n rows. */
function svgSquare(n, sz, ox, oy) {
  var out = '';
  for (var r = 0; r < n; r++) {
    for (var c = 0; c < n; c++) {
      var fill = (r===0 || c===0) ? FIG_FILL2 : FIG_FILL;
      out += '<rect x="'+(ox+c*sz)+'" y="'+(oy+r*sz)+'" width="'+sz+'" height="'+sz+'" fill="'+fill+'" stroke="'+FIG_STROKE+'" stroke-width="1.2"/>';
    }
  }
  return out;
}

/* Rectangle n×(n+1): term n = n(n+1). Occupies (n+1) cols × n rows.
   Drawn bottom-aligned within its slot. */
function svgRectN1(n, sz, ox, oy) {
  var out = '';
  for (var r = 0; r < n; r++) {
    for (var c = 0; c < n+1; c++) {
      var fill = (r===0 || c===0) ? FIG_FILL2 : FIG_FILL;
      out += '<rect x="'+(ox+c*sz)+'" y="'+(oy+r*sz)+'" width="'+sz+'" height="'+sz+'" fill="'+fill+'" stroke="'+FIG_STROKE+'" stroke-width="1.2"/>';
    }
  }
  return out;
}

/* Rectangle n×(n+2): term n = n(n+2). Occupies (n+2) cols × n rows. */
function svgRectN2(n, sz, ox, oy) {
  var out = '';
  for (var r = 0; r < n; r++) {
    for (var c = 0; c < n+2; c++) {
      var fill = (c < 2) ? FIG_FILL2 : FIG_FILL;
      out += '<rect x="'+(ox+c*sz)+'" y="'+(oy+r*sz)+'" width="'+sz+'" height="'+sz+'" fill="'+fill+'" stroke="'+FIG_STROKE+'" stroke-width="1.2"/>';
    }
  }
  return out;
}

/* ══════════════════════════════════════════════════════════════
   REAL-LIFE SCENARIO ILLUSTRATIONS
   Each returns a complete <svg> ~110×80 showing three growing steps.
   Theme-safe colors, no external assets.
   ══════════════════════════════════════════════════════════════ */
var RL_W = 116, RL_H = 74;
function rlFrame(inner){
  return '<svg viewBox="0 0 '+RL_W+' '+RL_H+'" width="100%" style="max-width:'+RL_W+'px;display:block;margin:0 auto .5rem">'+inner+'</svg>';
}
var RL_BLUE='#4a7abf', RL_BLUEFILL='rgba(74,122,191,0.30)', RL_GOLD='#c9a84c', RL_GOLDFILL='rgba(201,168,76,0.45)';

/* Growing floor tiles: three square grids 1×1, 2×2, 3×3 */
function rlTiles(){
  var out='', sizes=[1,2,3], baseX=[6,30,64], u=[14,9,7], baseY=RL_H-8;
  for(var i=0;i<3;i++){
    var n=sizes[i], s=u[i], bx=baseX[i];
    for(var r=0;r<n;r++)for(var c=0;c<n;c++){
      out+='<rect x="'+(bx+c*s)+'" y="'+(baseY-(r+1)*s)+'" width="'+(s-1)+'" height="'+(s-1)+'" fill="'+RL_GOLDFILL+'" stroke="'+RL_GOLD+'" stroke-width="1"/>';
    }
  }
  return rlFrame(out);
}

/* Stadium seating: three rows of seats, each row longer (fan/arc feel via trapezoid rows) */
function rlStadium(){
  var out='';
  // three stacked rows growing in width, like tiers
  var rows=[{y:RL_H-16,w:30,x:43,seats:3},{y:RL_H-32,w:52,x:32,seats:5},{y:RL_H-48,w:74,x:21,seats:7}];
  rows.forEach(function(rw){
    out+='<rect x="'+rw.x+'" y="'+rw.y+'" width="'+rw.w+'" height="9" rx="2" fill="'+RL_BLUEFILL+'" stroke="'+RL_BLUE+'" stroke-width="1"/>';
    var seatW=rw.w/rw.seats;
    for(var k=1;k<rw.seats;k++){
      var lx=rw.x+k*seatW;
      out+='<line x1="'+lx+'" y1="'+rw.y+'" x2="'+lx+'" y2="'+(rw.y+9)+'" stroke="'+RL_BLUE+'" stroke-width="0.7"/>';
    }
  });
  // field
  out+='<ellipse cx="'+(RL_W/2)+'" cy="'+(RL_H-4)+'" rx="30" ry="5" fill="'+RL_GOLDFILL+'" stroke="'+RL_GOLD+'" stroke-width="1"/>';
  return rlFrame(out);
}

/* Expanding garden: square plots of flowers growing 1,4,9 */
function rlGarden(){
  var out='', sizes=[1,2,3], baseX=[8,32,66], u=[13,9,7], baseY=RL_H-8;
  for(var i=0;i<3;i++){
    var n=sizes[i], s=u[i], bx=baseX[i];
    for(var r=0;r<n;r++)for(var c=0;c<n;c++){
      var cx=bx+c*s+s/2, cy=baseY-(r*s)-s/2;
      out+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(s*0.32)+'" fill="'+RL_GOLDFILL+'" stroke="'+RL_GOLD+'" stroke-width="0.9"/>';
      out+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(s*0.13)+'" fill="'+RL_BLUE+'"/>';
    }
  }
  return rlFrame(out);
}

/* Pyramid of cans: triangular stack 1,3,6 (rows 1,2,3) */
function rlCans(){
  var out='', rows=3, s=12, baseY=RL_H-8, cx=RL_W/2;
  for(var r=0;r<rows;r++){
    var count=r+1;               // top row 1, bottom row 3
    var y=baseY-(rows-r)*s;
    var rowW=count*s;
    var startX=cx-rowW/2;
    for(var c=0;c<count;c++){
      var x=startX+c*s;
      out+='<rect x="'+(x+1)+'" y="'+y+'" width="'+(s-2)+'" height="'+(s-1)+'" rx="2" fill="'+RL_BLUEFILL+'" stroke="'+RL_BLUE+'" stroke-width="1"/>';
      out+='<line x1="'+(x+1)+'" y1="'+(y+3)+'" x2="'+(x+s-1)+'" y2="'+(y+3)+'" stroke="'+RL_BLUE+'" stroke-width="0.6"/>';
    }
  }
  return rlFrame(out);
}

/* Pixel art: three stepped pixel grids growing (like a small sprite scaling) */
function rlPixels(){
  var out='', sizes=[1,2,3], baseX=[8,30,60], u=[13,9,7], baseY=RL_H-8;
  for(var i=0;i<3;i++){
    var n=sizes[i], s=u[i], bx=baseX[i];
    for(var r=0;r<n;r++)for(var c=0;c<n;c++){
      var fill=((r+c)%2===0)?RL_BLUEFILL:RL_GOLDFILL;
      var stroke=((r+c)%2===0)?RL_BLUE:RL_GOLD;
      out+='<rect x="'+(bx+c*s)+'" y="'+(baseY-(r+1)*s)+'" width="'+(s-1)+'" height="'+(s-1)+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="0.9"/>';
    }
  }
  return rlFrame(out);
}

/* Solar panels: three rectangular arrays growing (2×1, 2×2, 2×3 style) */
function rlSolar(){
  var out='', configs=[{r:1,c:2,x:6,s:10},{r:2,c:2,x:38,s:9},{r:2,c:3,x:70,s:8}], baseY=RL_H-10;
  configs.forEach(function(cf){
    for(var r=0;r<cf.r;r++)for(var c=0;c<cf.c;c++){
      var x=cf.x+c*(cf.s+1), y=baseY-(r+1)*(cf.s+1);
      out+='<rect x="'+x+'" y="'+y+'" width="'+cf.s+'" height="'+cf.s+'" fill="'+RL_BLUEFILL+'" stroke="'+RL_BLUE+'" stroke-width="1"/>';
      // cell lines
      out+='<line x1="'+(x+cf.s/2)+'" y1="'+y+'" x2="'+(x+cf.s/2)+'" y2="'+(y+cf.s)+'" stroke="'+RL_BLUE+'" stroke-width="0.5"/>';
      out+='<line x1="'+x+'" y1="'+(y+cf.s/2)+'" x2="'+(x+cf.s)+'" y2="'+(y+cf.s/2)+'" stroke="'+RL_BLUE+'" stroke-width="0.5"/>';
    }
    // little stand
    out+='<line x1="'+(cf.x+cf.c*(cf.s+1)/2)+'" y1="'+baseY+'" x2="'+(cf.x+cf.c*(cf.s+1)/2)+'" y2="'+(baseY+4)+'" stroke="'+RL_GOLD+'" stroke-width="1.4"/>';
  });
  return rlFrame(out);
}

/* ══════════════════════════════════════════════════════════════
   PROBLEM ILLUSTRATIONS (larger, shown inside real-life problems)
   Each shows the growing sequence across several steps with the
   figure number and count labeled, so students see the progression.
   ══════════════════════════════════════════════════════════════ */
var PI_STROKE='#4a7abf', PI_FILL='rgba(74,122,191,0.28)', PI_GOLD='#c9a84c', PI_GOLDFILL='rgba(201,168,76,0.42)';

/* Generic frame for a problem illustration */
function piFrame(w,h,inner){
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:'+Math.min(w,640)+'px;display:block;margin:.4rem auto .2rem;background:var(--surface);border-radius:8px;border:1px solid var(--border);padding:4px">'+inner+'</svg>';
}

/* Stadium seating: rows of seats growing. Row k has k seats.
   Shows rows 1..maxRow as horizontal benches, highlights an optional target row. */
function piStadium(maxRow, highlightRow){
  var seatW=13, seatH=11, gapY=4, padTop=10, padL=14;
  var W=padL*2 + maxRow*seatW + 60;
  var H=padTop + maxRow*(seatH+gapY) + 22;
  var out='';
  for(var k=1;k<=maxRow;k++){
    var y=padTop + (maxRow-k)*(seatH+gapY);   // bottom row = row 1 (shortest) at bottom
    var isHi=(k===highlightRow);
    for(var s=0;s<k;s++){
      var x=padL + s*seatW;
      out+='<rect x="'+x+'" y="'+y+'" width="'+(seatW-2)+'" height="'+seatH+'" rx="2" fill="'+(isHi?PI_GOLDFILL:PI_FILL)+'" stroke="'+(isHi?PI_GOLD:PI_STROKE)+'" stroke-width="'+(isHi?1.6:1)+'"/>';
    }
    // row label on the right
    out+='<text x="'+(padL + maxRow*seatW + 8)+'" y="'+(y+seatH-1)+'" font-family="IBM Plex Mono,monospace" font-size="10" fill="'+(isHi?PI_GOLD:'#7a7468')+'" font-weight="'+(isHi?'700':'400')+'">'+(LANG==='es'?'fila ':'row ')+k+': '+k+'</text>';
  }
  return piFrame(W,H,out);
}

/* Square patio tiles: shows patios n=1..4 as n×n grids, bottom-aligned, labeled. */
function piTiles(counts){
  return figRowSVG(function(n,sz,ox,oy){
    var o='';
    for(var r=0;r<n;r++)for(var c=0;c<n;c++)
      o+='<rect x="'+(ox+c*sz)+'" y="'+(oy+r*sz)+'" width="'+sz+'" height="'+sz+'" fill="'+((r+c)%2===0?PI_GOLDFILL:PI_FILL)+'" stroke="'+PI_STROKE+'" stroke-width="1.1"/>';
    return o;
  }, counts, 15, 4, 0);
}

/* Pyramid of cans: triangular stack. Shows levels 1..maxLevel as centered rows of circles (cans). */
function piCans(maxLevel){
  var s=17, padTop=8, cx=0;
  var W=maxLevel*s + 40;
  var H=padTop + maxLevel*s + 20;
  cx=W/2;
  var out='';
  for(var lvl=0;lvl<maxLevel;lvl++){
    var count=lvl+1;
    var y=padTop + (maxLevel-1-lvl)*s;   // level 1 (1 can) at top
    var rowW=count*s;
    var startX=cx - rowW/2;
    for(var c=0;c<count;c++){
      var x=startX + c*s + s/2;
      out+='<ellipse cx="'+x+'" cy="'+(y+s/2)+'" rx="'+(s/2-1.5)+'" ry="'+(s/2-1)+'" fill="'+PI_FILL+'" stroke="'+PI_STROKE+'" stroke-width="1.1"/>';
      out+='<line x1="'+(x-s/2+2)+'" y1="'+(y+3)+'" x2="'+(x+s/2-2)+'" y2="'+(y+3)+'" stroke="'+PI_STROKE+'" stroke-width="0.7"/>';
    }
  }
  return piFrame(W,H,out);
}

/* Expanding garden: rectangle n×(n+1) of flowers, shows gardens n=1..4. */
function piGarden(counts){
  return figRowSVG(function(n,sz,ox,oy){
    var o='';
    for(var r=0;r<n;r++)for(var c=0;c<n+1;c++){
      var ccx=ox+c*sz+sz/2, ccy=oy+r*sz+sz/2;
      o+='<circle cx="'+ccx+'" cy="'+ccy+'" r="'+(sz*0.34)+'" fill="'+PI_GOLDFILL+'" stroke="'+PI_GOLD+'" stroke-width="1"/>';
      o+='<circle cx="'+ccx+'" cy="'+ccy+'" r="'+(sz*0.13)+'" fill="'+PI_STROKE+'"/>';
    }
    return o;
  }, counts, 15, 5, 0);   // cellCols = n+1 max = 5 for n=4
}

/* Pixel art / solar array: shows growing designs with counts. Uses square-ish grids. */
function piPixels(counts, seqNums){
  // seqNums like [5,8,13,20]; draw as a growing L / stepped shape is hard, so show as labeled count blocks
  // Simpler: show 4 pixel-sprite grids that grow; use near-square layouts matching counts loosely.
  // We'll render each as a compact block of `count` pixels in a roughly square arrangement.
  var maxN=seqNums.length;
  var sz=10, gap=18, padL=10, padTop=8;
  // compute columns for near-square
  function dims(v){ var col=Math.ceil(Math.sqrt(v)); var row=Math.ceil(v/col); return [row,col]; }
  var maxCols=0, maxRows=0;
  seqNums.forEach(function(v){ var d=dims(v); if(d[1]>maxCols)maxCols=d[1]; if(d[0]>maxRows)maxRows=d[0]; });
  var slotW=maxCols*sz;
  var W=padL*2 + maxN*slotW + (maxN-1)*gap;
  var H=padTop + maxRows*sz + 24;
  var out='';
  for(var i=0;i<maxN;i++){
    var v=seqNums[i]; var d=dims(v); var rows=d[0], cols=d[1];
    var slotX=padL + i*(slotW+gap) + (slotW-cols*sz)/2;
    var baseY=padTop + maxRows*sz;
    var placed=0;
    for(var r=0;r<rows && placed<v;r++){
      for(var c=0;c<cols && placed<v;c++){
        var x=slotX + c*sz;
        var y=baseY - (r+1)*sz;
        out+='<rect x="'+x+'" y="'+y+'" width="'+(sz-1)+'" height="'+(sz-1)+'" fill="'+((r+c)%2===0?PI_FILL:PI_GOLDFILL)+'" stroke="'+((r+c)%2===0?PI_STROKE:PI_GOLD)+'" stroke-width="0.8"/>';
        placed++;
      }
    }
    var lblX=padL + i*(slotW+gap) + slotW/2;
    out+='<text x="'+lblX+'" y="'+(H-9)+'" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="9" fill="#7a7468">v'+(i+1)+'</text>';
    out+='<text x="'+lblX+'" y="'+(H-0.5)+'" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="10" font-weight="700" fill="#0f2244">'+v+'</text>';
  }
  return piFrame(W,H,out);
}

/* Wrap a figure row into an SVG showing n=1..4 with labels and counts */
function figRowSVG(drawer, counts, sz, cellCols, extraH) {
  // sz: square size in px
  // cellCols: max number of columns any single figure occupies (used to size each cell slot)
  // Each figure gets its own fixed-width slot so figures never overlap.
  sz = sz || 14;
  var maxN = counts.length; // number of figures shown (typically 4)
  cellCols = cellCols || maxN;         // widest figure, in columns
  var maxRows = maxN;                   // tallest figure, in rows (bottom-aligned)
  var gap = Math.round(sz * 1.4);       // horizontal gap between figure slots
  var slotW = cellCols * sz;            // width reserved for one figure
  var labelH = 30;                      // space for the two label lines
  var padX = sz;                        // left/right padding
  var padTop = sz * 0.5;
  var totalW = padX*2 + maxN*slotW + (maxN-1)*gap;
  var totalH = padTop + maxRows*sz + labelH + (extraH||0);
  var svgParts = ['<svg viewBox="0 0 '+totalW+' '+totalH+'" width="100%" style="max-width:'+Math.min(totalW, 620)+'px;display:block;margin:.6rem auto">'];
  for (var i = 0; i < maxN; i++) {
    var n = i + 1;
    var slotX = padX + i*(slotW + gap);
    // Center the figure horizontally within its slot; figures are drawn from their own origin
    // Most drawers draw a figure whose width in columns == n (staircase, square) or a fixed shape.
    // We bottom-align: oy so the figure sits on the baseline.
    var figCols = n;                    // default assumption; drawer decides actual
    var ox = slotX;                     // left edge of slot; drawer draws from here
    var oy = padTop + (maxRows - n)*sz; // bottom-align by pushing shorter figures down
    svgParts.push(drawer(n, sz, ox, oy));
    var labelX = slotX + slotW/2;
    svgParts.push('<text x="'+labelX+'" y="'+(totalH-16)+'" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="10" fill="#7a7468">n = '+n+'</text>');
    svgParts.push('<text x="'+labelX+'" y="'+(totalH-3)+'" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="700" fill="#0f2244">'+counts[i]+' \u25a1</text>');
  }
  svgParts.push('</svg>');
  return svgParts.join('');
}

/* Single figure SVG for problem illustrations */
function singleFigSVG(drawer, n, sz, label) {
  sz = sz || 14;
  var dim = (n+1)*sz + 10;
  var h = dim + 26;
  var out = '<svg viewBox="0 0 '+dim+' '+h+'" width="'+(Math.min(dim, 120))+'" style="display:inline-block;vertical-align:bottom">';
  out += drawer(n, sz, 5, 5);
  if (label) out += '<text x="'+(dim/2)+'" y="'+(h-4)+'" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="9" fill="#7a7468">'+label+'</text>';
  out += '</svg>';
  return out;
}

/* ── Fill-in diff table widget ─────────────────────────────── */
/* seq: array of numbers. blanks: which cells to blank ('d1' / 'd2' / 'all')
   widgetId: unique prefix for element IDs */
function buildFillDiffTable(seq, blankMode, widgetId) {
  var n = seq.length;
  var d1 = [], d2 = [];
  for (var i = 1; i < n; i++) d1.push(seq[i] - seq[i-1]);
  for (var i = 1; i < d1.length; i++) d2.push(d1[i] - d1[i-1]);

  var isEs = LANG === 'es';
  var termRow = '<tr><td style="font-weight:600;color:var(--text2)">'+(isEs?'Término (aₙ)':'Term (aₙ)')+'</td>';
  for (var i = 0; i < n; i++) termRow += '<td>'+seq[i]+'</td>';
  termRow += '</tr>';

  var d1Row = '<tr class="d1row"><td>'+(isEs?'1ª diferencia':'1st diff.')+'</td><td></td>';
  for (var i = 0; i < d1.length; i++) {
    var shouldBlank = blankMode === 'all' || blankMode === 'd1';
    if (shouldBlank) d1Row += '<td><input class="dblank" id="'+widgetId+'_d1_'+i+'" data-ans="'+d1[i]+'" maxlength="4" autocomplete="off"></td>';
    else d1Row += '<td>'+d1[i]+'</td>';
  }
  d1Row += '</tr>';

  var d2Row = '<tr class="d2row"><td>'+(isEs?'2ª diferencia':'2nd diff.')+'</td><td></td><td></td>';
  for (var i = 0; i < d2.length; i++) {
    var shouldBlank2 = blankMode === 'all' || blankMode === 'd2';
    if (shouldBlank2) d2Row += '<td><input class="dblank" id="'+widgetId+'_d2_'+i+'" data-ans="'+d2[i]+'" maxlength="4" autocomplete="off"></td>';
    else d2Row += '<td>'+d2[i]+'</td>';
  }
  d2Row += '</tr>';

  var hdr = '<tr><th>'+(isEs?'n':'n')+'</th>';
  for (var i = 0; i < n; i++) hdr += '<th>'+(i+1)+'</th>';
  hdr += '</tr>';

  return '<table class="fidt"><thead>'+hdr+'</thead><tbody>'+termRow+d1Row+d2Row+'</tbody></table>'+
    '<button class="dcheck-btn" onclick="checkDiffTable(\''+widgetId+'\')">'+
    (isEs?'Verificar tabla':'Check table')+'</button>'+
    '<div class="dfeedback" id="'+widgetId+'_fb"></div>';
}

function checkDiffTable(widgetId) {
  var blanks = document.querySelectorAll('[id^="'+widgetId+'_"][id$="_0"],[id^="'+widgetId+'_d1"],[id^="'+widgetId+'_d2"]');
  // Collect all blanks for this widget
  var allBlanks = document.querySelectorAll('input[id^="'+widgetId+'_d"]');
  var correct = 0, total = allBlanks.length;
  allBlanks.forEach(function(inp) {
    var ans = parseInt(inp.dataset.ans);
    var val = parseInt(inp.value);
    inp.classList.remove('bok','bbad');
    if (!isNaN(val) && val === ans) { inp.classList.add('bok'); correct++; }
    else { inp.classList.add('bbad'); }
  });
  var fb = document.getElementById(widgetId+'_fb');
  if (correct === total) {
    fb.className = 'dfeedback show ok';
    fb.textContent = LANG==='es' ? '¡Perfecto! Todos los valores son correctos.' : 'Perfect! All values are correct.';
  } else {
    fb.className = 'dfeedback show bad';
    fb.textContent = (LANG==='es'?correct+'/'+total+' correctos. Revisa los valores en rojo.':correct+'/'+total+' correct. Review the values in red.');
  }
}

/* ── Classify widget ─────────────────────────────────────────── */
var _clfAnswers = {}; // widgetId -> {rowIdx: chosen}
function clfSelect(widgetId, rowIdx, choice) {
  if (!_clfAnswers[widgetId]) _clfAnswers[widgetId] = {};
  _clfAnswers[widgetId][rowIdx] = choice;
  var row = document.getElementById(widgetId+'_row'+rowIdx);
  if (!row) return;
  row.querySelectorAll('.clf-btn').forEach(function(b){ b.classList.remove('sel'); });
  var btn = document.getElementById(widgetId+'_r'+rowIdx+'_'+choice);
  if (btn) btn.classList.add('sel');
}

function checkClassify(widgetId, answers) {
  // answers: array of correct choices per row
  var fb = document.getElementById(widgetId+'_fb');
  var userAnswers = _clfAnswers[widgetId] || {};
  var correct = 0;
  answers.forEach(function(ans, i) {
    var row = document.getElementById(widgetId+'_row'+i);
    if (!row) return;
    var chosen = userAnswers[i];
    row.querySelectorAll('.clf-btn').forEach(function(b){ b.classList.remove('sel'); b.classList.remove('bok'); b.classList.remove('bbad'); });
    if (chosen !== undefined) {
      var chosenBtn = document.getElementById(widgetId+'_r'+i+'_'+chosen);
      var correctBtn = document.getElementById(widgetId+'_r'+i+'_'+ans);
      if (chosen === ans) { if(chosenBtn) chosenBtn.classList.add('bok'); correct++; }
      else { if(chosenBtn) chosenBtn.classList.add('bbad'); if(correctBtn) correctBtn.classList.add('bok'); }
    } else {
      var correctBtn2 = document.getElementById(widgetId+'_r'+i+'_'+ans);
      if(correctBtn2) correctBtn2.classList.add('bok');
    }
  });
  fb.className = 'dfeedback show ' + (correct === answers.length ? 'ok' : 'bad');
  fb.textContent = correct === answers.length
    ? (LANG==='es'?'¡Excelente! Clasificaste todas correctamente.':'Excellent! You classified all of them correctly.')
    : (LANG==='es'?correct+'/'+answers.length+' correctas. Las respuestas correctas aparecen en verde.':correct+'/'+answers.length+' correct. Correct answers are shown in green.');
}

/* ══════════════════════════════════════════════════════════════
   BUILD LESSON — Sucesiones Cuadráticas de Figuras (REVISED)
   ══════════════════════════════════════════════════════════════ */
function buildLesson(rng){

  _clfAnswers = {};
  var isEs = LANG === 'es';

  /* ════════════════════════════════════════════════════════════

  var s1 = document.createElement('div');

    '<p>'+(isEs?
      'Muchos patrones del mundo real se construyen con figuras que crecen paso a paso. Observa esta sucesión de escaleras hechas de cuadros y cuenta cuántos cuadros forman cada figura:':
      'Many real-world patterns are built from figures that grow step by step. Observe this sequence of staircases made of squares and count how many squares form each figure:')+'</p>'+
    figRowSVG(svgStaircase, [1,3,6,10], 16, 4, 0)+
    '<p>'+(isEs?
      'Contando obtenemos la sucesión de números <strong>1, 3, 6, 10...</strong> A la cantidad de cuadros de la figura número n la llamamos <strong>término</strong> y la escribimos a<sub>n</sub>. Así: a<sub>1</sub> = 1, a<sub>2</sub> = 3, a<sub>3</sub> = 6, a<sub>4</sub> = 10.':
      'Counting gives the number sequence <strong>1, 3, 6, 10...</strong> The number of squares in figure number n is called the <strong>term</strong>, written a<sub>n</sub>. So: a<sub>1</sub> = 1, a<sub>2</sub> = 3, a<sub>3</sub> = 6, a<sub>4</sub> = 10.')+'</p>'+
    '<div class="callout"><p>'+(isEs?
      'Nuestro objetivo será encontrar patrones en estos conteos para poder <strong>predecir</strong> cuántos cuadros tendrá cualquier figura, incluso la número 100, sin tener que dibujarla.':
      'Our goal will be to find patterns in these counts so we can <strong>predict</strong> how many squares any figure will have, even figure number 100, without drawing it.')+'</p></div>';
  body.appendChild(s1);

  /* PROBLEM 1 — count and predict next (conceptual) */
  var p1r = shuffleOpts(['15','13','12','14'], '15', rng);
  problems.push({
    title: isEs?'Cuenta y predice':'Count and Predict',
    questionText: isEs?
      'La sucesión de escaleras de arriba tiene los conteos 1, 3, 6, 10. Cada figura añade una fila más que la anterior. ¿Cuántos cuadros tendrá la figura 5?':
      'The staircase sequence above has counts 1, 3, 6, 10. Each figure adds one more row than the previous. How many squares will figure 5 have?',
    svgExtra: figRowSVG(svgStaircase, [1,3,6,10], 13, 4, 0),
    options: p1r.opts,
    correctIdx: p1r.correctIdx,
    showWork: false,
    hint: isEs?
      'La figura 5 tiene una fila más que la figura 4. Esa nueva fila tiene 5 cuadros. Entonces: 10 + 5.':
      'Figure 5 has one more row than figure 4. That new row has 5 squares. So: 10 + 5.',
    explanation: isEs?
      'Cada figura añade una fila con un cuadro más que la anterior: +2, +3, +4, +5. La figura 5 = 10 + 5 = 15 cuadros.':
      'Each figure adds a row with one more square than before: +2, +3, +4, +5. Figure 5 = 10 + 5 = 15 squares.',
    studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[0], 0);

  /* ════════════════════════════════════════════════════════════
     SECTION 2 — Primeras y segundas diferencias
     ════════════════════════════════════════════════════════════ */
  var s2 = document.createElement('div');
  s2.className = 'section';
  s2.innerHTML =
    '<div class="stag">'+(isEs?'Concepto 2':'Concept 2')+'</div>'+
    '<h2>'+(isEs?'Primeras y segundas diferencias':'First and Second Differences')+'</h2>'+
    '<p>'+(isEs?
      'Para descubrir el patrón de una sucesión, calculamos las <strong>diferencias</strong> entre términos consecutivos. Con la escalera 1, 3, 6, 10:':
      'To discover a sequence\'s pattern, we calculate the <strong>differences</strong> between consecutive terms. With the staircase 1, 3, 6, 10:')+'</p>'+
    '<div class="callout"><p><strong>'+(isEs?'1ª diferencia: ':'1st difference: ')+'</strong>'+
    (isEs?
      'restamos cada término del siguiente: 3−1 = 2,  6−3 = 3,  10−6 = 4. Obtenemos 2, 3, 4. No son iguales, así que la sucesión <em>no es lineal</em>.':
      'we subtract each term from the next: 3−1 = 2,  6−3 = 3,  10−6 = 4. We get 2, 3, 4. They are not equal, so the sequence is <em>not linear</em>.')+'</p></div>'+
    '<div class="callout"><p><strong>'+(isEs?'2ª diferencia: ':'2nd difference: ')+'</strong>'+
    (isEs?
      'ahora restamos esas diferencias entre sí: 3−2 = 1,  4−3 = 1. ¡Siempre da 1! Cuando la <strong>segunda diferencia es constante</strong>, la sucesión es <strong>cuadrática</strong>.':
      'now we subtract those differences from each other: 3−2 = 1,  4−3 = 1. Always 1! When the <strong>second difference is constant</strong>, the sequence is <strong>quadratic</strong>.')+'</p></div>'+
    '<p>'+(isEs?
      'Estas figuras rectangulares tienen 2, 6, 12, 20 cuadros. <strong>Completa tú</strong> la tabla de diferencias para comprobar que son cuadráticas:':

  body.appendChild(s2);

  /* PROBLEM 2 — find 2nd difference from square figures (conceptual) */
  var p2r = shuffleOpts(['2','4','1','3'], '2', rng);
  problems.push({
    title: isEs?'Encuentra la 2ª diferencia':'Find the 2nd Difference',
    questionText: isEs?
      'Estas figuras cuadradas tienen 1, 4, 9, 16 cuadros. Calcula primero las diferencias entre términos y luego las diferencias de esas diferencias. ¿Cuál es la segunda diferencia constante?':
      'These square figures have 1, 4, 9, 16 squares. First calculate the differences between terms, then the differences of those differences. What is the constant second difference?',
    svgExtra: figRowSVG(svgSquare, [1,4,9,16], 13, 4, 0),
    options: p2r.opts,
    correctIdx: p2r.correctIdx,
    showWork: false,
    hint: isEs?
      '1ª diferencias: 4−1 = 3, 9−4 = 5, 16−9 = 7. Luego: 5−3 = ? y 7−5 = ?':
      '1st differences: 4−1 = 3, 9−4 = 5, 16−9 = 7. Then: 5−3 = ? and 7−5 = ?',
    explanation: isEs?
      '1ª diferencias: 3, 5, 7. 2ª diferencias: 5−3 = 2 y 7−5 = 2. La segunda diferencia constante es 2, así que la sucesión es cuadrática.':
      '1st differences: 3, 5, 7. 2nd differences: 5−3 = 2 and 7−5 = 2. The constant second difference is 2, so the sequence is quadratic.',
    studentChoice:null, pendingChoice:null
  });
  buildOneCard(problems[1], 1);

  /* ════════════════════════════════════════════════════════════
     SECTION 3 — Predecir con la 2ª diferencia
     ════════════════════════════════════════════════════════════ */
  var s3 = document.createElement('div');
  s3.className = 'section';
  s3.innerHTML =
    '<div class="stag">'+(isEs?'Concepto 3':'Concept 3')+'</div>'+
    '<h2>'+(isEs?'Predecir con la tabla de diferencias':'Predicting With the Difference Table')+'</h2>'+
    '<p>'+(isEs?

function updateSeqCanvas(){
  var canvas=document.getElementById('seqCanvas');
  if(!canvas)return;
  var slider=document.getElementById('nSlider');
  var n=parseInt(slider.value);
  document.getElementById('sliderVal').textContent=n;
  var total=n*(n+1)/2;
  var isEs=LANG==='es';
  var formula=document.getElementById('seqFormula');
  // Build the sum string 1 + 2 + ... + n
  var sumParts=[];
  for(var k=1;k<=n;k++) sumParts.push(k);
  formula.innerHTML=(isEs?'Fila por fila: ':'Row by row: ')+sumParts.join(' + ')+' = <strong>'+total+'</strong> '+(isEs?'cuadros':'squares')+
    '<br><span style="color:var(--text3)">'+(isEs?'Con la fórmula: ':'With the formula: ')+n+'×'+(n+1)+'/2 = '+total+'</span>';

  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=isDark?'#242420':'#ffffff';
  ctx.fillRect(0,0,W,H);

  // One clear staircase, centered, each row a different shade + a count label on the right of each row
  var pad=18;
  var labelSpace=70;                       // room on the right for "fila k: k cuadros"
  var availW=W-pad*2-labelSpace;
  var availH=H-pad*2;
  var sz=Math.floor(Math.min(availW/n, availH/n));
  sz=Math.max(8,Math.min(sz,30));
  var gridW=n*sz;
  var gridH=n*sz;
  var ox=pad;
  var oy=(H-gridH)/2;

  var green='#1a3a6b', gold='#c9a84c';
  // Draw each row with alternating fill so the "row = k squares" idea is visible
  for(var row=1;row<=n;row++){         // row 1 = bottom (1 square) ... row n = top? We want bottom row = n squares
    // bottom row (visually lowest) has n squares; top has 1. Staircase.
    var squaresInRow=row;               // rows from top(1) to bottom(n)
    var y=oy+(row-1)*sz;                // top row first
    for(var col=1;col<=squaresInRow;col++){
      var x=ox+(col-1)*sz;
      ctx.fillStyle=(row%2===0)?'rgba(26,58,107,0.18)':'rgba(201,168,76,0.28)';
      ctx.fillRect(x,y,sz-1.5,sz-1.5);
      ctx.strokeStyle=green;
      ctx.lineWidth=1.3;
      ctx.strokeRect(x,y,sz-1.5,sz-1.5);
    }
    // Row label: how many squares this row adds
    ctx.fillStyle=isDark?'#b0aa9e':'#7a7468';
    ctx.font='11px "IBM Plex Mono", monospace';
    ctx.textAlign='left';
    var lblY=y+sz/2+4;
    ctx.fillText('+'+squaresInRow, ox+gridW+10, lblY);
  }

  // Total label at bottom
  ctx.fillStyle=green;
  ctx.font='bold 13px "IBM Plex Sans", sans-serif';
  ctx.textAlign='left';
  ctx.fillText((isEs?'Total: ':'Total: ')+total, ox+gridW+10, oy+gridH-2);

  // "figura n" caption
  ctx.fillStyle=isDark?'#e8e4da':'#0f2244';
  ctx.font='bold 12px "IBM Plex Mono", monospace';
  ctx.textAlign='left';
  ctx.fillText((isEs?'figura ':'figure ')+'n = '+n, ox, oy-6 > 12 ? oy-6 : 12);
}

/* ── PDF ─────────────────────────────────────────────────────────── */
function generatePDF(){
  var btn=document.getElementById('dlBtn');
  btn.disabled=true;
  btn.innerHTML=LANG==='es'?'⏳ Generando PDF...':'⏳ Generating PDF...';
  try{
    var name=studentData.name||'—';
    var group=studentData.group||'—';
    var code=name.substring(0,2).toUpperCase()+(group||'').replace(/\s/g,'').toUpperCase()+problems.length+correctCount;
    var pBR=SCHOOL.pBR,pBG=SCHOOL.pBG,pBB=SCHOOL.pBB;
    var pAR=SCHOOL.pAR,pAG=SCHOOL.pAG,pAB=SCHOOL.pAB;
    var doc=new window.jspdf.jsPDF({unit:'mm',format:'letter'});
    var PW=215.9,PH=279.4,M=18,TW=PW-M*2;
    var total=problems.length;
    var guideTitle=SCHOOL.guideTitle[LANG]||SCHOOL.guideTitle.es;
    var courseName=SCHOOL.courseName[LANG]||SCHOOL.courseName.es;
    function pdfText(str){return (str||'').replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ');}

    // Cover
    doc.setFillColor(pAR,pAG,pAB);doc.rect(0,0,PW,2,'F');
    doc.setFillColor(255,255,255);doc.rect(0,2,PW,26,'F');
    doc.setFillColor(pAR,pAG,pAB);doc.rect(0,28,PW,2,'F');
    doc.setFillColor(pBR,pBG,pBB);doc.rect(0,30,PW,34,'F');

    // Logos
    var logoL=document.getElementById('hlogo-left');
    if(logoL&&logoL.src&&logoL.src.indexOf('data:')===0){
      try{doc.addImage(logoL.src,'PNG',M,4,0,18);}catch(e){}
    }

    // LIAXA drawing
    doc.setDrawColor(pAR,pAG,pAB);doc.setFillColor(pAR,pAG,pAB);
    var lx=PW-M-40,ly=8;
    doc.setLineWidth(0.8);
    [[lx,ly+8],[lx+4,ly+4],[lx+8,ly+6],[lx+14,ly]].forEach(function(pt,pi,arr){
      if(pi>0){doc.setDrawColor(pBR,pBG,pBB);doc.line(arr[pi-1][0],arr[pi-1][1],pt[0],pt[1]);}
    });
    doc.setFillColor(pAR,pAG,pAB);doc.circle(lx+14,ly,1.5,'F');
    doc.setDrawColor(pAR,pAG,pAB);doc.setLineWidth(0.6);doc.line(lx+18,ly-2,lx+18,ly+12);
    doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('LIAXA',lx+21,ly+8);

    // Blue band text
    doc.setTextColor(pAR,pAG,pAB);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
    doc.text(courseName,M,39);
    doc.setTextColor(232,238,247);doc.setFontSize(15);doc.setFont('helvetica','bold');
    doc.text(guideTitle,M,51);

    // Student info card
    doc.setFillColor(245,247,250);doc.roundedRect(M,72,TW,20,3,3,'F');
    doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text('ALUMNO',M+4,80);doc.text('GRUPO',M+TW/2+4,80);
    doc.setTextColor(20,24,32);doc.setFontSize(9.5);doc.setFont('helvetica','normal');
    doc.text(name,M+4,87);doc.text(group,M+TW/2+4,87);

    // Score box
    var pct=total>0?Math.round(correctCount/total*100):0;
    doc.setFillColor(pBR,pBG,pBB);doc.roundedRect(M,100,TW,34,3,3,'F');
    doc.setTextColor(pAR,pAG,pAB);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
    doc.text(LANG==='es'?'CALIFICACIÓN':'SCORE',M+6,110);
    doc.setTextColor(255,255,255);doc.setFontSize(28);
    doc.text(correctCount+'/'+total,M+6,130);
    doc.setFontSize(10);doc.text(pct+'%',M+55,130);
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(LANG==='es'?'respuestas correctas':'correct answers',M+6,138);

    // Summary bar
    var sy=150;
    doc.setFillColor(pBR,pBG,pBB);doc.rect(M,sy,TW,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text(LANG==='es'?'RESUMEN DE RESPUESTAS':'ANSWER SUMMARY',M+4,sy+5.5);
    sy+=10;
    problems.forEach(function(prob,i){
      if(sy>PH-20){doc.addPage();sy=20;}
      var ok=prob.studentChoice===prob.correctIdx;
      doc.setFillColor(ok?232:255,ok?240:232,ok?232:228);
      doc.roundedRect(M,sy,TW,10,2,2,'F');
      doc.setFillColor(ok?26:176,ok?106:48,ok?74:16);
      doc.circle(M+6,sy+5,2.5,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
      doc.text(ok?'✓':'✗',M+4.5,sy+6.5);
      doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('helvetica','normal');
      doc.text((LANG==='es'?'Problema ':'Problem ')+(i+1)+': '+pdfText(prob.title),M+12,sy+6.5);
      doc.setTextColor(ok?26:176,ok?106:48,ok?74:16);
      doc.text(ok?(LANG==='es'?'Correcto':'Correct'):(LANG==='es'?'Incorrecto':'Incorrect'),PW-M-24,sy+6.5);
      sy+=12;
    });

    // Per-problem pages
    for(var i=0;i<problems.length;i++){
      var prob=problems[i];
      doc.addPage();
      var wy=0;
      doc.setFillColor(pBR,pBG,pBB);doc.rect(0,0,PW,20,'F');
      doc.setFillColor(pAR,pAG,pAB);doc.rect(0,0,PW,3,'F');
      doc.setTextColor(pAR,pAG,pAB);doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text(courseName+'  ·  '+guideTitle,M,10);
      doc.setTextColor(232,238,247);doc.setFontSize(10.5);doc.setFont('helvetica','bold');
      doc.text((LANG==='es'?'Problema ':'Problem ')+(i+1)+' de '+total+'  —  '+pdfText(prob.title),M,17);
      wy=25;
      var qRaw=pdfText(prob.questionText);
      doc.setFontSize(8.5);doc.setFont('helvetica','normal');
      var qLines=doc.splitTextToSize(qRaw,TW-10);
      var qBoxH=8+qLines.length*5+3;
      doc.setFillColor(237,240,245);doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
      doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(6.5);doc.setFont('helvetica','bold');
      doc.text(LANG==='es'?'PREGUNTA':'QUESTION',M+4,wy+6);
      doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
      var qy=wy+12;
      qLines.forEach(function(ln,li){doc.text(ln,M+4,qy+li*5);});
      wy+=qBoxH+4;
      var isOk=document.getElementById('pc'+i).classList.contains('ok');
      var chosen=prob.studentChoice!=null?pdfText(prob.options[prob.studentChoice]||'—'):'—';
      var corr=pdfText(prob.options[prob.correctIdx]||'');
      var expRaw=pdfText(prob.explanation||'');
      doc.setFontSize(8.5);var chLines=doc.splitTextToSize((LANG==='es'?'Alumno: ':'Student: ')+chosen,TW-18);
      doc.setFontSize(8);var coLines=doc.splitTextToSize((LANG==='es'?'Correcto: ':'Correct: ')+corr,TW-18);
      doc.setFontSize(7.5);var exLines=doc.splitTextToSize((LANG==='es'?'Solución: ':'Solution: ')+expRaw,TW-18).slice(0,4);
      var ansBoxH=8+chLines.length*5.5+coLines.length*5+exLines.length*5+6;
      doc.setFillColor(isOk?232:255,isOk?240:232,isOk?232:228);
      doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
      doc.setFillColor(isOk?26:176,isOk?106:48,isOk?74:16);
      doc.circle(M+7,wy+8,3.5,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text(isOk?'✓':'✗',M+5.2,wy+10.5);
      var ay=wy+7;
      doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
      chLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5.5);});
      ay+=chLines.length*5.5+3;
      doc.setTextColor(26,106,74);doc.setFontSize(8);doc.setFont('helvetica','normal');
      coLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);});
      ay+=coLines.length*5+3;
      doc.setTextColor(90,85,80);doc.setFontSize(7.5);
      exLines.forEach(function(ln,li){doc.text(ln,M+14,ay+li*5);});
      wy+=ansBoxH+5;
      doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);
      doc.setFontSize(7);doc.setFont('helvetica','bold');
      doc.rect(M,wy,TW,8,'F');
      doc.text(LANG==='es'?'TRABAJO DEL ALUMNO':'STUDENT WORK',M+4,wy+5.5);
      wy+=11;
      var dc=document.getElementById('dc'+i);
      if(dc){try{var imgD=dc.toDataURL('image/png');var ar=dc.height/dc.width;var iw=TW;var ih=Math.min(iw*ar,68);doc.addImage(imgD,'PNG',M,wy,iw,ih);wy+=ih+4;}catch(e){}}
      var ta=document.getElementById('ta'+i);
      if(ta&&ta.value.trim()){if(wy>PH-30){doc.addPage();wy=20;}doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('courier','normal');var taLines=doc.splitTextToSize(ta.value,TW);taLines.slice(0,16).forEach(function(ln){if(wy>PH-15){doc.addPage();wy=20;}doc.text(ln,M,wy);wy+=5;});}
      var pp=document.getElementById('pp'+i);
      if(pp&&pp.src&&pp.src.indexOf('data:')===0){if(wy>PH-55){doc.addPage();wy=20;}try{doc.addImage(pp.src,'JPEG',M,wy,TW,68);wy+=72;}catch(e){}}
    }

    var pages=doc.internal.getNumberOfPages();
    for(var p=1;p<=pages;p++){
      doc.setPage(p);
      doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');
      doc.setTextColor(130,140,160);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
      doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,PW/2,PH-5,{align:'center'});
    }
    doc.save('mat2_t02_g01_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  }catch(e){alert('Error al generar el PDF: '+e.message);}
  btn.innerHTML=t('btn-pdf');
  btn.disabled=false;
}
