<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoterms 2020 — Comercio Internacional</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the 5 lines below.
   Derive from 2 institution colors:
     PRIMARY  = main dark color  (nav, buttons, progress bar, PDF band)
     ACCENT   = highlight color  (tags, hints, PDF stripe, wcard top line)
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #4a7c3f;   /* PRIMARY — LIAXA blue        */
  --green-dark: #33562b;   /* PRIMARY dark                */
  --green-bg:   #e7eee6;   /* PRIMARY tint                */
  --gold:       #c9a84c;   /* ACCENT  — LIAXA gold        */
  --gold-bg:    #f8f4e8;   /* ACCENT tint                 */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aac5c;
  --green-dark: #98c68e;
  --green-bg:   #1a2517;
  --gold:       #d7bf7b;
  --gold-bg:    #201c12;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}
</style>

<script>
/* ================================================
   STATE
   ================================================ */
var studentData   = {};
var problems      = [];

/* ================================================
   SESSION PERSISTENCE  (localStorage)
   ================================================ */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'incoterms2020_es_v1__' + (n + '__' + g).replace(/\s+/g, '_');
}

function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'incoterms2020_es_v1__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

function dismissRestore() {
  document.getElementById('restoreBar').style.display = 'none';
}

function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  if (!name || !group) { document.getElementById('restoreBar').style.display = 'none'; return; }
  var saved = loadSession(name, group);
  var bar = document.getElementById('restoreBar');
  bar.style.display = (saved && saved.choices && saved.choices.some(function(c){ return c !== null; })) ? 'block' : 'none';
}
var answeredCount = 0;
var correctCount  = 0;

/* ================================================
   THEME
   ================================================ */
var THEME_KEY = 'incoterms2020_es_v1__theme';
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
}
(function() {
  // Always default to light; only apply stored preference if explicitly set for THIS guide
  document.documentElement.setAttribute('data-theme', 'light');
  try {
    var t = localStorage.getItem(THEME_KEY);
    if (t === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.addEventListener('DOMContentLoaded', function() {
        var b = document.getElementById('themeBtn');
        if (b) b.textContent = '☀️';
      });
    }
  } catch(e) {}
  addEventListener('DOMContentLoaded', function() {
    var ll  = document.getElementById('logo-left');
    var lr  = document.getElementById('logo-right');
    var sep = document.getElementById('wlogsep');
    var hasL = ll  && ll.src  && ll.src  !== window.location.href;
    var hasR = lr  && lr.src  && lr.src  !== window.location.href;
    if (hasL) { ll.style.display = 'inline-block'; }
    if (hasR) { lr.style.display = 'inline-block'; }
    if (hasL && hasR && sep) {
      sep.style.display = 'block';
    }
    // Single logo: center it inside the flex row
    if ((hasL && !hasR) || (!hasL && hasR)) {
      var wl = document.getElementById('wlogos');
      if (wl) wl.style.justifyContent = 'center';
    }
    // Header logos
    var hl = document.getElementById('hlogo-left');
    var hr = document.getElementById('hlogo-right');
    if (hl && hl.src && hl.src !== window.location.href) hl.style.display = 'inline-block';
    if (hr && hr.src && hr.src !== window.location.href) hr.style.display = 'inline-block';
  });
})();

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   START
   ================================================ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor completa ambos campos.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0;
  correctCount  = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

function switchTab(idx, panel, btn) {

function handlePhoto(idx, input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('pp' + idx);
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('pz' + idx).style.opacity = '0.4';
    saveSession();
  };
  reader.readAsDataURL(input.files[0]);
}

/* ================================================
   ANSWER HANDLER — two-tap confirmation (Rule 8)
   Prevents accidental answer selection while scrolling on mobile.
   First tap highlights in gold (pending). Second tap on same option confirms.
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Second tap on same option → confirm
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // First tap → highlight as pending, clear any previous pending
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Direct confirm — used by restoreSession to bypass two-tap
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

  // LIAXA logo — right side of white strip
  var lx = PW - M - 36;
  var ly = 10;
  doc.setDrawColor(pBR,pBG,pBB); doc.setLineWidth(0.7);
  doc.lines([[2.57-1.03,4.63-6.17],[4.11-2.57,5.14-4.63],[5.66-4.11,2.57-5.14]], lx+1.03, ly+6.17);

  doc.setTextColor(150,165,200); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(dateStr, M, 59);

  // ── Student info card (name + group only — código goes to footer) ──
  doc.setFillColor(237,240,245); doc.roundedRect(M,72,TW,20,3,3,'F');
  doc.setTextColor(201,168,76); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  doc.text('ALUMNO', M+4, 79); doc.text('GRUPO', 130, 79);
  doc.setTextColor(20,24,32); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 87); doc.text(group, 130, 87);

  // ── Score box ──
  var sc = pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(201,168,76); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  // ── Problem summary table ──
  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS (continuación)', M+4, sy+6);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  // ── Per-problem pages ──
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;

    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Comercio Internacional  ·  Incoterms 2020', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  // ── Footer on every page ──
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(201,168,76); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});

  doc.save('Incoterms2020_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');

function initTimeline() {
  renderTimeline();
  /* Make tokens draggable */
  setTimeout(function() {
    setupTLDrag('tlTokenRiesgo', 'riesgo');
    setupTLDrag('tlTokenCosto',  'costo');
  }, 80);
}

function setupTLDrag(tokenId, tipo) {
  var token = document.getElementById(tokenId);
  if (!token) return;

  /* Desktop drag */
  token.setAttribute('draggable', 'true');
  token.addEventListener('dragstart', function(e) {
    e.dataTransfer.setData('text/plain', tipo);
    token.style.opacity = '.5';
  });
  token.addEventListener('dragend', function() {
    token.style.opacity = '1';
  });

  /* Touch drag */
  var clone = null;
  token.addEventListener('touchstart', function(e) {
    if (timelineState.verified) return;
    var t = e.touches[0];
    clone = token.cloneNode(true);
    clone.style.cssText = 'position:fixed;pointer-events:none;opacity:.75;z-index:9999;left:'+(t.clientX-40)+'px;top:'+(t.clientY-20)+'px';
    document.body.appendChild(clone);
  }, {passive:true});
  token.addEventListener('touchmove', function(e) {
    if (!clone) return;
    e.preventDefault();
    var t = e.touches[0];
    clone.style.left = (t.clientX-40)+'px';
    clone.style.top  = (t.clientY-20)+'px';
  }, {passive:false});
  token.addEventListener('touchend', function(e) {
    if (!clone) return;
    var t = e.changedTouches[0];
    document.body.removeChild(clone); clone = null;
    /* Find which stage is under the touch point */
    var stages = document.querySelectorAll('[data-stage]');
    var hit = null;
    stages.forEach(function(s) {
      var r = s.getBoundingClientRect();
      if (t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom) hit = s;
    });
    if (hit) dropOnStage(hit.getAttribute('data-stage'), tipo);
  });
}

function setupTLDropZones() {
  var stages = document.querySelectorAll('[data-stage]');
  stages.forEach(function(s) {
    s.addEventListener('dragover', function(e) { e.preventDefault(); s.style.opacity='.7'; });
    s.addEventListener('dragleave', function() { s.style.opacity='1'; });
    s.addEventListener('drop', function(e) {
      e.preventDefault(); s.style.opacity='1';
      var tipo = e.dataTransfer.getData('text/plain');
      dropOnStage(s.getAttribute('data-stage'), tipo);
    });
  });
}

function dropOnStage(stage, tipo) {
  if (timelineState.verified) return;
  timelineState[tipo] = stage;
  renderTimeline();
  setTimeout(function() {
    setupTLDropZones();
    setupTLDrag('tlTokenRiesgo','riesgo');
    setupTLDrag('tlTokenCosto','costo');
  }, 60);
}

function renderTimeline() {
  var stageKeys   = ['bodega-vendedor','aduana-exportacion','a-bordo-buque','en-transito','puerto-destino','bodega-comprador'];

  var verified = timelineState.verified;

  var correctC = stageKeys[inc._cIdx];

  /* Drag tokens */

  var cPlaced = timelineState.costo;

  /* Token shelf (always shown; tokens fade once placed) */
  html += '<div style="display:flex;gap:.65rem;margin-bottom:.9rem;flex-wrap:wrap">';

    '<div id="tlTokenCosto"  style="opacity:'+cFade+';background:var(--gold);color:#fff;border-radius:8px;padding:.45rem 1rem;font-size:.82rem;font-weight:700;cursor:grab;user-select:none;touch-action:none">💰 COSTO</div>';
  if (!rPlaced && !cPlaced) html += '<span style="font-size:.78rem;color:var(--text3);align-self:center">← Arrastra cada token a la etapa correcta</span>';
  html += '</div>';

  /* Timeline row */
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="display:flex;align-items:stretch;gap:0;min-width:540px;margin-bottom:.7rem">';
  stageKeys.forEach(function(s, i) {
    var isR = s === rPlaced;
    var isC = s === cPlaced;
    var bg='var(--surface2)', border='2px solid var(--border)';
    if (verified) {
      if (isR) { bg = (rPlaced===correctR)?'var(--ok-bg)':'var(--bad-bg)'; border='2px solid '+(rPlaced===correctR?'var(--ok)':'var(--bad)'); }
      if (isC) { bg = (cPlaced===correctC)?'var(--ok-bg)':'var(--bad-bg)'; border='2px solid '+(cPlaced===correctC?'var(--ok)':'var(--bad)'); }
      if (isR && isC) { bg='var(--gold-bg)'; border='2px solid var(--gold)'; }
    } else {
      if (isR && isC) { bg='var(--gold-bg)'; border='2px solid var(--gold)'; }
      else if (isR)   { bg='rgba(139,37,0,.08)'; border='2px solid var(--bad)'; }
      else if (isC)   { bg='var(--gold-bg)'; border='2px solid var(--gold)'; }
    }
    var badges = '';
    if (isR) badges += '<div style="background:var(--bad);color:#fff;border-radius:3px;font-size:.58rem;padding:.06rem .25rem;margin:.1rem auto 0;font-weight:700">⚠ RIESGO'+(verified&&rPlaced!==correctR?' ✗':verified?' ✓':'')+'</div>';
    if (isC) badges += '<div style="background:var(--gold);color:#fff;border-radius:3px;font-size:.58rem;padding:.06rem .25rem;margin:.06rem auto 0;font-weight:700">💰 COSTO'+(verified&&cPlaced!==correctC?' ✗':verified?' ✓':'')+'</div>';
    html +=
      '<div data-stage="'+s+'" style="flex:1;text-align:center;padding:.5rem .2rem .4rem;border-radius:8px;background:'+bg+';border:'+border+';min-width:70px;transition:background .15s;cursor:crosshair">'+
        '<div style="font-size:.67rem;color:var(--text2);line-height:1.35;pointer-events:none">'+stageLabels[i]+'</div>'+
        badges+
      '</div>';
    if (i < stageKeys.length-1) html += '<div style="flex-shrink:0;display:flex;align-items:center;padding:0 1px;color:var(--text3);font-size:1rem;pointer-events:none">›</div>';
  });
  html += '</div></div>';

  if (!verified) {
    var ready = rPlaced && cPlaced;
    html += '<button onclick="verifyTimeline()" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:.48rem 1.3rem;font-size:.85rem;font-weight:600;cursor:pointer;opacity:'+(ready?1:.4)+';'+(ready?'':'pointer-events:none')+'">Verificar →</button>';
  }

  var box = document.getElementById('tlBox');
  if (box) {
    box.innerHTML = html;
    setTimeout(function() {
      setupTLDropZones();
      setupTLDrag('tlTokenRiesgo','riesgo');
      setupTLDrag('tlTokenCosto','costo');
    }, 40);
  }
}

function verifyTimeline() {
  if (timelineState.verified) return;
  var stageKeys   = ['bodega-vendedor','aduana-exportacion','a-bordo-buque','en-transito','puerto-destino','bodega-comprador'];
  var stageLabels = ['Bodega del vendedor','Aduana de exportación','A bordo del buque','En tránsito','Puerto de destino','Bodega del comprador'];
  var inc = INC[timelineState.incoterm];
  var correctR = stageKeys[inc._rIdx];
  var correctC = stageKeys[inc._cIdx];
  var correctRLabel = stageLabels[inc._rIdx];
  var correctCLabel = stageLabels[inc._cIdx];
  var rOk = timelineState.riesgo === correctR;
  var cOk = timelineState.costo  === correctC;
  timelineState.verified = true;
  renderTimeline();
  var fb = document.getElementById('tlFeedback');
  if (!fb) return;
  if (rOk && cOk) {
    fb.innerHTML = '<div class="callout"><strong>✓ ¡Correcto en ambos!</strong><br>'+
      'Riesgo: <strong>'+correctRLabel+'</strong>.<br>'+
      'Costo: <strong>'+correctCLabel+'</strong>.</div>';
  } else {
    fb.innerHTML = '<div style="background:var(--bad-bg);border-left:3px solid var(--bad);border-radius:0 8px 8px 0;padding:.7rem 1rem;color:var(--bad);font-size:.85rem">'+
      (!rOk
        ? '<strong>✗ RIESGO incorrecto.</strong> La etapa correcta es: <strong style="color:var(--bad)">'+correctRLabel+'</strong><br>'
        : '<strong>✓ RIESGO correcto.</strong><br>')+
      (!cOk
        ? '<strong>✗ COSTO incorrecto.</strong> La etapa correcta es: <strong style="color:var(--bad)">'+correctCLabel+'</strong>'
        : '<strong>✓ COSTO correcto.</strong>')+
    '</div>';
  }
}

var sorterDragIdx = null;

function initSorter() {
  renderSorter();

function renderSorter() {
  var container = document.getElementById('sorterBox');
  if (!container) return;
  var correctOrder = ['EXW','FCA','FOB','CIF','DAP','DDP'];
  var keys = sorterState.order;
  var verified = sorterState.verified;
  /* lockedKeys: Set of Incoterm strings confirmed correct in their slot.
     A key is green only when it STILL sits in the right position. */
  var lockedKeys = sorterState.lockedKeys || {};

  var html = '<div id="sorterList" style="display:flex;flex-direction:column;gap:.45rem;margin:1rem 0">';
  keys.forEach(function(k, i) {
    var isCorrect = correctOrder[i] === k;
    /* Green if: key is in lockedKeys AND it is still in the correct slot */
    var isLocked    = !!lockedKeys[k] && isCorrect;
    var markedWrong = verified && !isCorrect;

    var bg     = isLocked    ? 'var(--ok-bg)'           : markedWrong ? 'var(--bad-bg)'           : 'var(--surface)';
    var border = isLocked    ? '1.5px solid var(--ok)'   : markedWrong ? '1.5px solid var(--bad)'   : '1.5px solid var(--border)';
    var draggable = isLocked ? 'false' : 'true';
    var cursor    = isLocked ? 'default' : 'grab';
    var mark = isLocked
      ? '<span style="color:var(--ok);font-weight:700;margin-left:.4rem">✓</span>'
      : markedWrong
        ? '<span style="color:var(--bad);font-weight:700;margin-left:.4rem">✗</span>'
        : '';
    html +=
      '<div class="sorter-row" data-idx="'+i+'" draggable="'+draggable+'" '+
        'style="display:flex;align-items:center;gap:.55rem;background:'+bg+';border:'+border+';border-radius:8px;padding:.55rem .85rem;cursor:'+cursor+';user-select:none;touch-action:none;transition:background .2s,border-color .2s,opacity .15s">' +
        '<span style="font-size:.78rem;color:var(--text3);width:1.3rem;flex-shrink:0">'+(i+1)+'.</span>' +
        '<span style="font-weight:700;font-size:.92rem;color:var(--green)">'+k+'</span>' +
        '<span style="color:var(--text2);font-size:.8rem">— '+INC[k].nombre+'</span>' +
        '<span style="flex:1"></span>' +
        mark +
        (!isLocked ? '<span style="font-size:.75rem;color:var(--text3);flex-shrink:0">⠿</span>' : '') +
      '</div>';
  });
  html += '</div>';

  /* Always show verify button unless all 6 are already locked (student finished) */
  var allLocked = keys.every(function(k,i){ return !!(lockedKeys[k] && correctOrder[i]===k); });
  if (!allLocked) {
    html += '<button onclick="verifySorter()" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:.48rem 1.3rem;font-size:.85rem;font-weight:600;cursor:pointer">Verificar →</button>';
  }

  container.innerHTML = html;
  setupSorterDrag();
}

/* Module-level drag state — survives across row closures */
var _sorterDragFrom = null;
var _sorterDropped  = false;
var _touchClone     = null;
var _touchFrom      = null;

function setupSorterDrag() {
  var rows = document.querySelectorAll('.sorter-row');

  rows.forEach(function(row) {
    if (row.getAttribute('draggable') !== 'true') return;
    var fromIdx = parseInt(row.getAttribute('data-idx'));

    /* ── Desktop HTML5 drag ── */
    row.addEventListener('dragstart', function(e) {
      _sorterDragFrom = fromIdx;
      _sorterDropped  = false;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(fromIdx));
      setTimeout(function(){ row.style.opacity = '.35'; }, 0);
    });

    row.addEventListener('dragend', function() {
      row.style.opacity = '1';
      /* Only re-render if no drop happened (drag cancelled) */
      if (!_sorterDropped) renderSorter();
      _sorterDragFrom = null;
      _sorterDropped  = false;
    });

    row.addEventListener('dragover', function(e) {
      var correctOrder = ['EXW','FCA','FOB','CIF','DAP','DDP'];
      var targetKey = sorterState.order[fromIdx];
      var isLockedSlot = sorterState.lockedKeys && sorterState.lockedKeys[targetKey] && correctOrder[fromIdx] === targetKey;
      if (isLockedSlot) {
        e.dataTransfer.dropEffect = 'none';
        row.style.cursor = 'not-allowed';
      } else {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (_sorterDragFrom !== null && _sorterDragFrom !== fromIdx) {
          row.style.outline = '2px solid var(--gold)';
        }
      }
    });

    row.addEventListener('dragleave', function(e) {
      /* Only clear highlight — never re-render here */
      row.style.outline = '';
    });

    row.addEventListener('drop', function(e) {
      e.preventDefault();
      row.style.outline = '';
      var from = _sorterDragFrom;
      if (from === null || from === fromIdx) return;
      /* Block drop onto a locked slot */
      var correctOrder = ['EXW','FCA','FOB','CIF','DAP','DDP'];
      var targetKey = sorterState.order[fromIdx];
      if (sorterState.lockedKeys && sorterState.lockedKeys[targetKey] && correctOrder[fromIdx] === targetKey) return;
      _sorterDropped = true;
      sorterState.verified = false;
      /* Swap the two positions — never splice-insert, which shifts locked slots */
      var arr = sorterState.order;
      var tmp = arr[from]; arr[from] = arr[fromIdx]; arr[fromIdx] = tmp;
      renderSorter();
    });

    /* ── Touch drag ── */
    row.addEventListener('touchstart', function(e) {
      _touchFrom  = fromIdx;
      _touchClone = row.cloneNode(true);
      var rect = row.getBoundingClientRect();
      _touchClone.style.cssText =
        'position:fixed;z-index:9999;pointer-events:none;opacity:.75;'+
        'left:'+rect.left+'px;top:'+rect.top+'px;width:'+row.offsetWidth+'px;'+
        'background:var(--green-bg);border-radius:8px;padding:.55rem .85rem;'+
        'box-shadow:0 4px 16px rgba(0,0,0,.2)';
      document.body.appendChild(_touchClone);
      row.style.opacity = '.3';
    }, {passive:true});

    row.addEventListener('touchmove', function(e) {
      if (!_touchClone) return;
      e.preventDefault();
      var t = e.touches[0];
      _touchClone.style.top  = (t.clientY - 22) + 'px';
      _touchClone.style.left = (t.clientX - 60) + 'px';
      /* Live highlight: find row under finger */
      document.querySelectorAll('.sorter-row').forEach(function(r) {
        var rr = r.getBoundingClientRect();
        r.style.outline = (t.clientY >= rr.top && t.clientY <= rr.bottom && parseInt(r.getAttribute('data-idx')) !== _touchFrom)
          ? '2px solid var(--gold)' : '';
      });
    }, {passive:false});

    row.addEventListener('touchend', function(e) {
      if (!_touchClone) return;
      var t = e.changedTouches[0];
      document.body.removeChild(_touchClone); _touchClone = null;
      row.style.opacity = '1';
      document.querySelectorAll('.sorter-row').forEach(function(r){ r.style.outline=''; });
      /* Find target */
      var targetIdx = null;
      document.querySelectorAll('.sorter-row').forEach(function(r) {
        var rr = r.getBoundingClientRect();
        if (t.clientY >= rr.top && t.clientY <= rr.bottom) targetIdx = parseInt(r.getAttribute('data-idx'));
      });
      if (targetIdx !== null && targetIdx !== _touchFrom) {
        /* Block drop onto a locked slot */
        var correctOrder = ['EXW','FCA','FOB','CIF','DAP','DDP'];
        var targetKey = sorterState.order[targetIdx];
        var isLockedSlot = sorterState.lockedKeys && sorterState.lockedKeys[targetKey] && correctOrder[targetIdx] === targetKey;
        if (!isLockedSlot) {
          sorterState.verified = false;
          /* Swap — never splice-insert, which shifts locked slots */
          var arr = sorterState.order;
          var tmp = arr[_touchFrom]; arr[_touchFrom] = arr[targetIdx]; arr[targetIdx] = tmp;
        }
      }
      _touchFrom = null;
      renderSorter();
    });
  });
}

function verifySorter() {
  var correctOrder = ['EXW','FCA','FOB','CIF','DAP','DDP'];
  if (!sorterState.lockedKeys) sorterState.lockedKeys = {};
  /* Add every key that is currently in the correct slot */
  sorterState.order.forEach(function(k, i) {
    if (correctOrder[i] === k) sorterState.lockedKeys[k] = true;
  });
  sorterState.verified = true;
  renderSorter();
  /* Score = how many of the 6 correct slots are still occupied by their key */
  var score = sorterState.order.filter(function(k,i){ return correctOrder[i]===k; }).length;
  var fb = document.getElementById('sorterFeedback');
  if (!fb) return;
  if (score === 6) {
    fb.innerHTML = '<div class="callout"><strong>✓ ¡Orden perfecto!</strong> De EXW (mínima obligación del vendedor) a DDP (máxima obligación del vendedor).</div>';
  } else {
    var remaining = 6 - score;
    fb.innerHTML = '<div style="background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem 1rem;color:var(--green-dark);font-size:.84rem">'+
      '<strong>'+score+'/6 correctos.</strong> '+remaining+' fuera de lugar — arrástralos y vuelve a verificar.</div>';
  }
}

function allocSet(itemKey, side) {
  if (allocState.verified) return;

function renderAlloc() {
  var container = document.getElementById('allocBox');

  var html = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;border-collapse:collapse;font-size:.82rem;margin:.6rem 0">';
  html +=
    '<thead><tr>'+

    '</tr></thead><tbody>';

  items.forEach(function(item, idx) {
    var sel     = allocState.cells[item.key] || null;
    var correct = item.correct;
    var rowBg   = idx%2===0 ? 'var(--surface)' : 'var(--surface2)';

    function cellStyle(side) {
      var isSel = sel === side;
      if (!isSel) return 'background:var(--surface2);border:2px solid var(--border)';
      if (!verified) return 'background:var(--gold);border:2px solid var(--gold)';
      return (correct === side)
        ? 'background:var(--ok);border:2px solid var(--ok)'
        : 'background:var(--bad);border:2px solid var(--bad)';
    }
    function cellMark(side) {
      var isSel = sel === side;
      if (!isSel) return '';
      if (!verified) return '<span style="color:#fff;font-size:.78rem">●</span>';
      return (correct === side)
        ? '<span style="color:#fff;font-size:.78rem">✓</span>'
        : '<span style="color:#fff;font-size:.78rem">✗</span>';
    }

    html +=
      '<tr style="background:'+rowBg+'">'+

      /* Vendedor cell — clicking this always sets vendedor */

      '</td>'+

  html += '</tbody></table></div>';

  var arr = opts.slice();
  for (var i = arr.length-1; i>0; i--) {

    var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;

}

    explanation:'<strong>EXW (Ex Works)</strong> es correcto. La única obligación del vendedor es poner la mercancía disponible en sus instalaciones. Todos los costos y riesgos a partir de ese punto — incluyendo el despacho de exportación — corresponden al comprador.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════
     SECCIÓN 3 — FOB y CIF + TIMELINE
  ══════════════════════════════════════════════════ */
  var s3div = document.createElement('div');
  s3div.className = 'section';
  s3div.innerHTML =
    '<div class="stag">Actividad interactiva · Concepto 3</div>'+
    '<h2>FOB y CIF: Las reglas del transporte marítimo</h2>'+
    '<p>Estas dos reglas aplican <strong>solo a transporte marítimo y vías navegables interiores</strong>. Son las más usadas en el comercio internacional de commodities.</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard">'+
        '<div class="rname">FOB — Free On Board</div>'+
        '<div class="rform">Riesgo: al cargar la mercancía A BORDO del buque</div>'+
        '<div class="rnote">Vendedor: despacho export + carga<br>Comprador: flete + seguro + importación</div>'+
      '</div>'+
      '<div class="rcard">'+
        '<div class="rname">CIF — Cost, Insurance &amp; Freight</div>'+
        '<div class="rform">Riesgo: al cargar (igual que FOB), pero el vendedor PAGA flete + seguro</div>'+
        '<div class="rnote">Vendedor: export + carga + flete + seguro mínimo<br>Comprador: importación + entrega interior</div>'+
      '</div>'+
    '</div>'+
    '<div class="callout" style="border-left-color:var(--gold);background:var(--gold-bg)">'+
    '<strong>⚠ Distinción crítica en CIF:</strong> El riesgo y el costo se transfieren en puntos <em>diferentes</em>. Bajo CIF, el riesgo pasa al comprador cuando la mercancía se carga en el buque — pero el vendedor sigue pagando el flete y el seguro del trayecto marítimo.</div>'+
    '<p style="margin-top:1rem"><strong>Practica ahora.</strong> Tu Incoterm asignado es <strong style="color:var(--green)">'+tlKey+'</strong>. Arrastra el token <strong style="color:var(--bad)">⚠ RIESGO</strong> y el token <strong style="color:#b8860b">💰 COSTO</strong> a la etapa del recorrido donde cada uno se transfiere:</p>'+
    '<div id="tlBox"></div>'+
    '<div id="tlFeedback" style="margin-top:.6rem"></div>';
  lb.appendChild(s3div);
  setTimeout(initTimeline, 60);

  var prod3 = pool[1];
  var r3a = 'El comprador — el riesgo se transfirió al cargar la mercancía en el buque en '+prod3.orig.split(',')[0]+', igual que bajo FOB.';
  var s3s = shuffleOpts([r3a,'El vendedor — porque el vendedor contrató el CIF y pagó el seguro.','Ninguno — el seguro cubre automáticamente cualquier pérdida en tránsito.','La naviera — es responsable de toda pérdida ocurrida a bordo del buque.'], r3a, rng);
  problems.push({title:'FOB vs. CIF — ¿Quién asume la pérdida?',
    questionText:'Un exportador mexicano envía <em>'+prod3.nom+'</em> de <strong>'+prod3.orig+'</strong> a <strong>'+prod3.dest+'</strong> bajo un contrato <strong>CIF</strong>. A mitad del viaje, una tormenta daña parte de la carga. ¿Quién asume la pérdida y cuál es la diferencia clave entre FOB y CIF?',
    fn:'', options:s3s.opts, correctIdx:s3s.correctIdx,
    hint:'En CIF, el riesgo y el costo tienen puntos de transferencia distintos. ¿Cuándo pasó el riesgo al comprador en este escenario?',
    explanation:'<strong>El comprador asume la pérdida.</strong> Bajo CIF, el riesgo se transfiere cuando la mercancía se carga en el buque. El vendedor pagó el seguro, pero ese seguro beneficia al comprador. La diferencia clave: CIF hace que el vendedor pague flete + seguro, pero el riesgo igual pasa en la carga — igual que FOB.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════
     SECCIÓN 4 — FCA y DAP + TABLA ASIGNACIÓN
  ══════════════════════════════════════════════════ */
  var s4div = document.createElement('div');
  s4div.className = 'section';
  s4div.innerHTML =
    '<div class="stag">Actividad interactiva · Concepto 4</div>'+
    '<h2>FCA y DAP: Reglas flexibles para cualquier transporte</h2>'+
    '<p>A diferencia de FOB y CIF, estas reglas funcionan con cualquier modo de transporte — contenedores, carga aérea y combinaciones multimodales.</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard">'+
        '<div class="rname">FCA — Free Carrier</div>'+
        '<div class="rform">Riesgo: al entregar la mercancía al transportista en el lugar acordado</div>'+
        '<div class="rnote">Vendedor: despacho export + entrega al carrier<br>Comprador: flete + seguro + importación</div>'+
      '</div>'+
      '<div class="rcard">'+
        '<div class="rname">DAP — Delivered at Place</div>'+
        '<div class="rform">Riesgo: al llegar al destino nombrado, lista para descarga</div>'+
        '<div class="rnote">Vendedor: todo hasta destino<br>Comprador: descarga + derechos de importación</div>'+
      '</div>'+
    '</div>'+
    '<div class="callout"><strong>FCA vs. FOB en contenedores:</strong> La ICC recomienda <strong>FCA</strong> para carga contenerizada — el vendedor entrega en terminal, no directamente al buque. FCA refleja mejor esa realidad.</div>'+
    '<p style="margin-top:1rem"><strong>Practica ahora.</strong> Tu Incoterm asignado es <strong style="color:var(--green)">'+allocKey+'</strong>. Haz clic en la columna <strong>Vendedor</strong> o <strong>Comprador</strong> para asignar cada costo:</p>'+
    '<div id="allocBox"></div>'+
    '<div id="allocFeedback" style="margin-top:.6rem"></div>';
  lb.appendChild(s4div);
  setTimeout(renderAlloc, 60);

  var prod4 = pool[2];
  var r4a = 'DAP — el vendedor paga el flete hasta la bodega del comprador pero el comprador gestiona el despacho aduanal y paga los derechos.';
  var s4s = shuffleOpts([r4a,'DDP — porque el vendedor entrega directamente en la bodega del comprador.','CIF — porque el vendedor contrató y pagó el flete internacional.','FCA — porque el vendedor entregó la mercancía a un agente de carga.'], r4a, rng);
  problems.push({title:'Identificando DAP',
    questionText:'Un proveedor en <strong>'+prod4.orig+'</strong> envía <em>'+prod4.nom+'</em> a <strong>'+prod4.dest+'</strong>. El contrato indica: <em>"El vendedor organizará y pagará todo el transporte hasta el centro de distribución del comprador. Al llegar, el comprador se encarga de la descarga y del pago de todos los derechos e impuestos de importación."</em> ¿Qué Incoterm aplica?',
    fn:'', options:s4s.opts, correctIdx:s4s.correctIdx,
    hint:'El vendedor paga todo el flete hasta la bodega del comprador — pero ¿quién paga los derechos de importación? Esa frase es la línea divisoria entre dos reglas muy similares.',
    explanation:'<strong>DAP (Delivered at Place)</strong> es correcto. El vendedor cubre todos los costos de transporte hasta el lugar nombrado. Pero el despacho de importación y los derechos son responsabilidad del comprador. Si el vendedor también pagara los derechos, sería DDP.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════
     SECCIÓN 5 — DDP
  ══════════════════════════════════════════════════ */
  sec(
    '<div class="stag">Concepto 5</div>'+
    '<h2>DDP: Obligación máxima del vendedor</h2>'+
    '<p><strong>DDP (Delivered Duty Paid)</strong> representa la obligación máxima del vendedor. Entrega la mercancía en el destino nombrado, despachada de importación y con todos los derechos pagados.</p>'+
    '<div class="callout"><strong>El vendedor bajo DDP cubre:</strong> empaque, despacho de exportación, flete internacional, despacho de importación en el país del comprador, y pago de derechos e impuestos. El comprador solo descarga.</div>'+
    '<div class="callout" style="border-left-color:var(--gold);background:var(--gold-bg)"><strong>DAP vs. DDP — Una sola diferencia:</strong> Ambas entregan en la ubicación del comprador. Bajo <strong>DAP</strong> el comprador paga los derechos de importación; bajo <strong>DDP</strong> los paga el <em>vendedor</em>.</div>'
  );

  var prod5 = pool[3];
  var r5a = 'DDP — la tienda entrega con todos los impuestos de importación incluidos en el precio de compra.';
  var s5s = shuffleOpts([r5a,'DAP — porque el paquete llega a la puerta del cliente.','FOB — porque la mercancía cruzó una frontera oceánica.','CIF — porque el vendedor contrató el envío y el seguro.'], r5a, rng);
  problems.push({title:'DDP en el comercio electrónico',
    questionText:'Un cliente en <strong>'+prod5.dest+'</strong> compra <em>'+prod5.nom+'</em> en una tienda online con sede en <strong>'+prod5.orig+'</strong>. El sitio dice: <em>"Todos los precios incluyen envío, aranceles e impuestos de importación. Tu paquete llega sin cargos adicionales."</em> ¿Qué Incoterm describe mejor este acuerdo?',
    fn:'', options:s5s.opts, correctIdx:s5s.correctIdx,
    hint:'Cuando el vendedor promete "sin cargos adicionales en la entrega", está asumiendo los derechos de importación. ¿Qué término da al comprador la experiencia más simple?',
    explanation:'<strong>DDP (Delivered Duty Paid)</strong> es correcto. El vendedor cubre todos los costos incluyendo los derechos de importación — el comprador no paga nada extra al recibir el pedido.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════
     EVALUACIÓN FINAL
  ══════════════════════════════════════════════════ */
  sec('<div class="stag">Evaluación final</div><h2>Aplica tu conocimiento</h2><p>Los siguientes cuatro escenarios evalúan tu capacidad de identificar el Incoterm correcto y determinar quién asume el costo y el riesgo. No hay explicaciones previas — usa lo que aprendiste.</p>');

  var prod6=pool[4];
  var r6a='El comprador — el riesgo se transfirió cuando la mercancía fue cargada en el buque en '+prod6.orig.split(',')[0]+'.';
  var s6s=shuffleOpts([r6a,'El vendedor — porque el vendedor contrató el CIF.','La aseguradora automáticamente — toda carga CIF está cubierta al 100%.','La naviera — es responsable de toda pérdida durante la travesía.'], r6a, rng);
  problems.push({title:'¿Quién asume el riesgo? (CIF)',
    questionText:'Un embarque de <em>'+prod6.nom+'</em> viaja de <strong>'+prod6.orig+'</strong> a <strong>'+prod6.dest+'</strong> bajo contrato <strong>CIF</strong>. A mitad del trayecto, un contenedor cae al mar y la mercancía se pierde. ¿Quién asume la pérdida económica?',
    fn:'', options:s6s.opts, correctIdx:s6s.correctIdx,
    hint:'Bajo CIF, recuerda dónde se transfiere el riesgo — es el mismo punto que FOB. ¿Dónde estaba la mercancía cuando el riesgo pasó al comprador?',
    explanation:'Bajo <strong>CIF</strong>, el riesgo se transfiere al comprador cuando la mercancía se carga en el buque en origen. El vendedor pagó el seguro, pero esa cobertura es para beneficio del comprador.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  var prod7=pool[5];
  var r7a='FOB '+prod7.orig.split(',')[0];
  var s7s=shuffleOpts([r7a,'EXW '+prod7.orig.split(',')[0],'DAP '+prod7.dest.split(',')[0],'DDP '+prod7.dest.split(',')[0]], r7a, rng);
  problems.push({title:'Selecciona el Incoterm',
    questionText:'Un contrato de <em>'+prod7.nom+'</em> estipula: <em>"El vendedor es responsable de entregar la mercancía en el puerto de '+prod7.orig.split(',')[0]+' y cargarla a bordo del buque. Todo el flete marítimo, seguro y costos de importación son responsabilidad del comprador."</em> La mercancía viaja en '+prod7.trans+'. ¿Qué Incoterm aplica?',
    fn:'', options:s7s.opts, correctIdx:s7s.correctIdx,
    hint:'El vendedor carga al buque y ahí termina su obligación. El comprador asume todos los costos desde ese punto. ¿Qué regla marítima transfiere riesgo y costo en la carga?',
    explanation:'<strong>FOB '+prod7.orig.split(',')[0]+'</strong> es correcto. La obligación del vendedor termina cuando la mercancía está a bordo del buque. Flete, seguro e importación son del comprador.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  var prod8=pool[6%pool.length];
  var r8a='DAP — el vendedor paga el flete hasta la bodega del comprador pero el comprador gestiona el despacho aduanal y paga derechos.';
  var s8s=shuffleOpts([r8a,'DDP — porque el vendedor entrega directamente en la bodega del comprador.','FCA — porque el vendedor contrató un agente de carga para el envío.','CIF — porque el vendedor pagó el flete y el seguro internacionales.'], r8a, rng);
  problems.push({title:'DAP vs. DDP',
    questionText:'Una empresa exporta <em>'+prod8.nom+'</em> a un distribuidor en <strong>'+prod8.dest+'</strong>. El contrato indica: <em>"El vendedor organiza y paga todo el transporte hasta el almacén del comprador. El comprador es responsable del despacho aduanal de importación y del pago de derechos."</em> ¿Qué Incoterm aplica?',
    fn:'', options:s8s.opts, correctIdx:s8s.correctIdx,
    hint:'El vendedor llega hasta la bodega y paga todo el flete — pero ¿quién paga los derechos de importación? Esa única frase es la clave.',
    explanation:'<strong>DAP (Delivered at Place)</strong> es correcto. El vendedor cubre todos los costos hasta el destino. Pero despacho y derechos de importación son del comprador. Si el vendedor también pagara los derechos, sería DDP.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  var prod9=pool[7%pool.length];
  var r9a='El vendedor paga el despacho de exportación y la entrega al transportista en origen. El comprador paga el flete principal, el seguro y los costos de importación.';
  var s9s=shuffleOpts([r9a,'El vendedor paga absolutamente todo, incluyendo flete y derechos de importación.','El comprador paga todos los costos desde las instalaciones del vendedor en adelante.','El vendedor paga el flete hasta destino; el comprador solo paga los derechos de importación.'], r9a, rng);
  problems.push({title:'Asignación de costos bajo FCA',
    questionText:'Un exportador y un importador acuerdan enviar <em>'+prod9.nom+'</em> por carga aérea bajo <strong>FCA</strong>, lugar nombrado: bodega del vendedor en <strong>'+prod9.orig+'</strong>. ¿Cómo se dividen los costos?',
    fn:'', options:s9s.opts, correctIdx:s9s.correctIdx,
    hint:'Bajo FCA, el vendedor entrega al transportista en el lugar nombrado. ¿Qué implica "free carrier" sobre quién toma el control después de esa entrega?',
    explanation:'Bajo <strong>FCA</strong>, el vendedor gestiona el despacho de exportación y entrega la mercancía al carrier en el lugar nombrado. A partir de esa entrega, todos los costos — flete, seguro, derechos de importación — corresponden al comprador.',
    studentChoice:null, pendingChoice:null});
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* Trigger scroll animations */
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('vis'); });
  },{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){ obs.observe(s); });
}

</script>
</body>
</html>
