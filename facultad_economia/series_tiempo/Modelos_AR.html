<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos AR — Series de Tiempo Financieras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#4a7c3f;--green-dark:#2d5a27;--green-bg:#eaf0e7;--gold:#c9a84c;--gold-bg:#faf3e0;--bg:#f8f6f1;--surface:#ffffff;--surface2:#f0ede6;--border:#ddd8cc;--text:#1a1a16;--text2:#4a4640;--text3:#7a7468;--ok:#2d6a4f;--ok-bg:rgba(45,106,79,.10);--bad:#8b2500;--bad-bg:rgba(139,37,0,.08);--shadow:0 4px 20px rgba(0,0,0,.09);}
[data-theme="dark"]{--bg:#18181a;--surface:#242420;--surface2:#2e2e28;--border:#3a3830;--text:#e8e4da;--text2:#b0aa9e;--text3:#7a7468;--green:#6aad5e;--green-dark:#8fd080;--green-bg:#1a281a;--gold:#e0bc6a;--gold-bg:#241e0e;--ok:#4a9a6f;--ok-bg:rgba(74,154,111,.12);--bad:#c05030;--bad-bg:rgba(192,80,48,.10);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}
.warn{background:var(--gold-bg);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.warn strong{color:var(--gold);}
.warn p{margin-bottom:0;}
.dtable{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.85rem;}
.dtable th{background:var(--green);color:#fff;padding:.6rem .8rem;text-align:left;}
.dtable td{padding:.6rem .8rem;border:1px solid var(--border);color:var(--text2);}
.dtable tr:nth-child(even) td{background:var(--surface2);}
.dtable .model{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--green-dark);}
.stepbox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.3rem;margin:1rem 0;}
.stepbox .step-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--green);font-weight:600;margin-bottom:.6rem;}
.step-row{display:flex;gap:.7rem;align-items:flex-start;margin-bottom:.5rem;}
.step-num{background:var(--green);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:.1rem;}
.step-body{flex:1;font-size:.87rem;color:var(--text2);}
.step-body code{font-family:'IBM Plex Mono',monospace;font-size:.82rem;background:var(--surface2);padding:.1rem .3rem;border-radius:3px;color:var(--green-dark);}
.formula{background:var(--surface2);border-radius:8px;padding:.75rem 1rem;margin:.8rem 0;font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--green-dark);text-align:center;}
.exbox{background:var(--green-bg);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.3rem;margin:1rem 0;}
.exbox .ex-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--green-dark);font-weight:600;margin-bottom:.6rem;}
.exbox p{color:var(--text);font-size:.88rem;margin-bottom:.5rem;}
.exbox .result{font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--green-dark);font-weight:600;margin-top:.4rem;}
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#ffffff;}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;background:#ffffff;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center;}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}
pre.rcode{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.8rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--green-dark);overflow-x:auto;white-space:pre-wrap;margin:.6rem 0;}
</style>
</head>

  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}

/* RNG */
function seededRng(seed){var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};}
function shuffleOpts(opts,correct,rng){var arr=opts.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return{opts:arr,correctIdx:arr.indexOf(correct)};}

/* CANVAS */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.strokeStyle='#000000';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){btn.addEventListener('click',function(){tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';if(btn.classList.contains('bpen')){ctx.lineWidth=2;}if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}});});
  tb.querySelectorAll('.cdot').forEach(function(dot){dot.addEventListener('click',function(){tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');});});
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

/* TWO-TAP MC */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);return;
  }
  prob.pendingChoice=chosenIdx;opts.forEach(function(o){o.classList.remove('pending');});opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');

  var fb=document.getElementById('fb'+probIdx);

}

/* ════════════════════════════════════════════════════
   BUILD LESSON
   ════════════════════════════════════════════════════ */
function buildLesson(rng){
  var lb=document.getElementById('lessonBody');lb.innerHTML='';problems=[];

  /* rng-derived values */
  var phiOpts=[0.3,0.5,0.6,0.7,0.8];
  var phi1 = phiOpts[Math.floor(rng()*phiOpts.length)];
  var Y0   = [1,2,3,4,5][Math.floor(rng()*5)];
  var eps1 = Math.round((0.3+rng()*0.6)*10)/10;    // positive noise ~0.3–0.9
  var eps2 = -Math.round((0.2+rng()*0.5)*10)/10;   // negative noise ~-0.2–-0.7
  // AR(1) step: Y2 = phi1*Y0 + eps1
  var Y1_calc = Math.round((phi1*Y0+eps1)*100)/100;
  // AR(2) parameters (fixed for clarity)
  var phi2a=0.6, phi2b=0.3;
  var Yt_1=2.0, Yt_2=1.0;
  var eps_ar2=0.4;
  // Y3 = 0.6*2.0 + 0.3*1.0 + 0.4 = 1.9  (verified)
  var Y3_ar2=1.9;

  /* ═══════════════════════════════════════════
     SECCIÓN 1: ¿Qué es un modelo AR?
     ═══════════════════════════════════════════ */
  addSection(
    '<div class="stag">Concepto 1 de 4</div>'+
    '<h2>¿Qué es un modelo Autoregresivo (AR)?</h2>'+
    '<div style="background:var(--surface);border:2px solid var(--green);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1.4rem;">'+
    '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green-dark);margin-bottom:.6rem;">🎯 Objetivo de la sesión</div>'+
    '<div style="font-size:.88rem;color:var(--text2);margin-bottom:.5rem;">Al finalizar esta actividad podrás:</div>'+
    '<ol style="margin-left:1.2rem;font-size:.88rem;color:var(--text2);line-height:1.8;">'+
    '<li>Calcular valores usando modelos AR(1) y AR(2)</li>'+
    '<li>Interpretar el coeficiente φ y decidir si es significativo</li>'+
    '<li>Evaluar si un modelo es adecuado usando diagnóstico de residuos</li>'+
    '<li>Aplicar el flujo completo (identificar → ajustar → diagnosticar) en R</li>'+
    '</ol>'+
    '</div>'+
    '<p>En las sesiones anteriores aprendiste a detectar si una serie tiene autocorrelación usando la ACF y la PACF. Ahora vamos a dar el siguiente paso: <strong>ajustar un modelo</strong> que capture esa autocorrelación y nos permita hacer pronósticos.</p>'+
    '<div class="callout">'+
      '<strong>Idea central:</strong>'+
      '<p>Un modelo AR dice que el valor de hoy se puede predecir como una combinación lineal de valores pasados, más un término de error. Es como decir: "el precio de AMXL hoy depende del precio de AMXL ayer (y quizá de hace dos días), más algo de ruido que no podemos predecir."</p>'+
    '</div>'+

    '<h2 style="margin-top:1.4rem;">AR(1): el modelo más simple</h2>'+
    '<p>El modelo AR de orden 1 usa solo el valor del día anterior para predecir el de hoy:</p>'+
    '<div class="formula">Y<sub>t</sub> = φ · Y<sub>t−1</sub> + ε<sub>t</sub></div>'+
    '<p>Donde:</p>'+
    '<div class="stepbox">'+
      '<div class="step-title">Componentes del AR(1)</div>'+
      '<div class="step-row"><div class="step-num">1</div><div class="step-body"><strong>Y<sub>t</sub></strong> — El valor que queremos predecir (hoy)</div></div>'+
      '<div class="step-row"><div class="step-num">2</div><div class="step-body"><strong>φ (phi)</strong> — El coeficiente: ¿qué tanto influye el pasado? Si φ = 0.7, entonces el 70% del valor de hoy viene del valor de ayer.</div></div>'+
      '<div class="step-row"><div class="step-num">3</div><div class="step-body"><strong>Y<sub>t−1</sub></strong> — El valor de ayer. En general, Y<sub>t−k</sub> es el valor de hace <em>k</em> días — a eso se le llama <strong>rezago k</strong>. Un rezago es simplemente un valor pasado de la serie (ayer = rezago 1, hace dos días = rezago 2, etc.).</div></div>'+
      '<div class="step-row"><div class="step-num">4</div><div class="step-body"><strong>ε<sub>t</sub></strong> — El error, llamado <strong>ruido blanco</strong>: valores completamente aleatorios, sin patrón ni relación entre sí. Tiene media 0 y varianza constante. En pocas palabras: es todo lo que el modelo <em>no</em> puede predecir.</div></div>'+
    '</div>'+

    '<div class="exbox">'+
      '<div class="ex-label">Ejemplo guiado — calcular Y₂ con AR(1)</div>'+
      '<p>Supón que φ = '+phi1+' y que Y₁ = '+Y0+'. Se observa un ruido ε₂ = '+eps1+'.</p>'+
      '<p><strong>Paso 1:</strong> Sustituir en la fórmula: Y₂ = φ · Y₁ + ε₂</p>'+
      '<p><strong>Paso 2:</strong> Y₂ = '+phi1+' × '+Y0+' + '+eps1+'</p>'+
      '<p><strong>Paso 3:</strong> Y₂ = '+Math.round(phi1*Y0*100)/100+' + '+eps1+' = '+Y1_calc+'</p>'+
      '<p class="result">Y₂ = '+Y1_calc+'</p>'+
    '</div>'+

    '<h2 style="margin-top:1.4rem;">AR(2): usando dos días pasados</h2>'+
    '<p>El AR(2) agrega un segundo rezago:</p>'+
    '<div class="formula">Y<sub>t</sub> = φ₁ · Y<sub>t−1</sub> + φ₂ · Y<sub>t−2</sub> + ε<sub>t</sub></div>'+

    '<div class="exbox">'+
      '<div class="ex-label">Ejemplo guiado — calcular Y₃ con AR(2)</div>'+
      '<p>φ₁ = 0.6, φ₂ = 0.3, Y₂ = 2.0, Y₁ = 1.0, ε₃ = 0.4</p>'+
      '<p><strong>Paso 1:</strong> Y₃ = 0.6 × Y₂ + 0.3 × Y₁ + ε₃</p>'+
      '<p><strong>Paso 2:</strong> Y₃ = 0.6 × 2.0 + 0.3 × 1.0 + 0.4</p>'+
      '<p><strong>Paso 3:</strong> Y₃ = 1.2 + 0.3 + 0.4 = 1.9</p>'+
      '<p class="result">Y₃ = 1.9</p>'+
    '</div>'+

    '<div class="warn">'+
      '<strong>Condición de estacionariedad</strong>'+
      '<p>Para que un AR(1) sea estacionario (es decir, que no explote al infinito), se necesita que |φ| &lt; 1. Si φ = 0.7, la condición se cumple. Si φ = 1.2, el modelo no es estacionario. Para AR(2), la condición es más compleja, pero en la práctica R nos avisa si hay un problema.</p>'+
    '</div>'
  );

  /* PROBLEMA 1 */
  var p1phi=0.6, p1y=3, p1e=0.5;
  var p1ans = Math.round((p1phi*p1y+p1e)*100)/100;  // 0.6*3+0.5 = 2.3
  var p1correct='Y₂ = '+p1ans+' (0.6 × 3 + 0.5 = '+p1ans+')';
  var p1s=shuffleOpts([
    p1correct,
    'Y₂ = 2.0 (se resta el ruido en lugar de sumarlo: 0.6×3 − 0.5)',
    'Y₂ = 1.8 (se aplica φ² en lugar de φ: 0.6²×3 + 0.5)',
    'Y₂ = 3.5 (se suma φ como constante: 3 + 0.6 − 0.5 + 0.4)'
  ],p1correct,rng);
  problems.push({title:'Cálculo AR(1)',questionText:'Un proceso AR(1) tiene coeficiente φ = 0.6. Observas Y₁ = 3 y el ruido ε₂ = 0.5. ¿Cuánto vale Y₂?',fn:'Fórmula: Y_t = φ · Y_{t−1} + ε_t',hint:'Sustituye directamente: Y₂ = 0.6 × 3 + 0.5. No hay suma ni multiplicación adicional.',options:p1s.opts,correctIdx:p1s.correctIdx,explanation:'Y₂ = φ × Y₁ + ε₂ = 0.6 × 3 + 0.5 = 1.8 + 0.5 = 2.3. El coeficiente φ multiplica el valor pasado, y el ruido se suma (o resta, si es negativo).',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ═══════════════════════════════════════════
     SECCIÓN 2: El coeficiente φ — cómo leer el output de R
     ═══════════════════════════════════════════ */
  addSection(
    '<div class="stag">Concepto 2 de 4</div>'+
    '<h2>¿Qué nos dice el coeficiente φ?</h2>'+
    '<p>Cuando ajustas un modelo AR en R, el resultado principal es el valor estimado de φ. Saber interpretar ese número es la habilidad central de esta sesión.</p><div class="callout" style="margin-bottom:1rem;"><strong>Regla de oro:</strong><p>φ indica qué tanto el pasado explica el presente. Si φ es grande (cercano a 1), el ayer tiene mucho peso en el hoy. Si φ es cercano a 0, el ayer casi no importa.</p></div>'+

    '<table class="dtable">'+
      '<thead><tr><th>Valor de φ</th><th>Interpretación</th><th>Comportamiento de la serie</th></tr></thead>'+
      '<tbody>'+
        '<tr><td>φ cercano a +1 (ej. 0.9)</td><td>Memoria muy fuerte y positiva: el valor de hoy replica casi exactamente el de ayer</td><td>La serie cambia muy lentamente, se "pega" a su nivel anterior</td></tr>'+
        '<tr><td>φ intermedio positivo (ej. 0.5)</td><td>El pasado influye moderadamente</td><td>Hay persistencia, pero la serie también puede moverse bastante</td></tr>'+
        '<tr><td>φ cercano a 0</td><td>El pasado casi no influye</td><td>La serie se comporta casi como ruido blanco</td></tr>'+

  problems.push({title:'Serie 1 — ¿Qué modelo ajustar?',questionText:'Después de correr acf(serie1) y pacf(serie1) en R, observas que la ACF muestra barras que decrecen gradualmente (muchos rezagos significativos que van bajando) y la PACF muestra solo el rezago 1 significativo (todos los demás dentro de las líneas azules). ¿Qué modelo debes ajustar?',fn:'Tabla de decisión: ACF decae → AR o ARMA | ACF se corta → MA',hint:'Aplica la tabla de decisión: ¿La ACF se corta o decae? ¿La PACF se corta o decae? ¿En qué rezago se corta la PACF?',options:p4s.opts,correctIdx:p4s.correctIdx,explanation:'La ACF que decae gradualmente + PACF que se corta en lag 1 → AR(1). El número de barras significativas en la PACF antes del corte es el orden p del proceso AR. Aquí p = 1.',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* PROBLEMA 5 */
  var p5correct='El AR(2) es mejor: su AIC = 580.3 es menor que el AIC del AR(1) = 589.7.';
  var p5s=shuffleOpts([
    p5correct,
    'El AR(1) es mejor porque tiene menos parámetros (principio de parsimonia).',
    'No se puede comparar modelos con AIC si tienen diferente número de parámetros.',
    'El AR(2) es mejor porque φ₂ = 0.31 > 0.05.'
  ],p5correct,rng);
  problems.push({title:'Comparar AR(1) vs AR(2) con AIC',questionText:'Ajustaste dos modelos sobre la misma serie. AR(1): AIC = 589.7. AR(2): AIC = 580.3. ¿Cuál modelo es preferible?',fn:'Regla AIC: menor es mejor',hint:'El AIC penaliza la complejidad automáticamente. Solo compara los valores: ¿cuál es menor?',options:p5s.opts,correctIdx:p5s.correctIdx,explanation:'El AIC menor indica mejor balance entre ajuste y parsimonia. AR(2) con AIC = 580.3 < 589.7 es el modelo preferido. El AIC ya penaliza el parámetro adicional, así que no necesitas hacer esa corrección manualmente.',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* PROBLEMA 6 */
  var p6correct='Ruido blanco: ni la ACF ni la PACF de serie3 muestran barras significativas.';
  var p6s=shuffleOpts([
    p6correct,
    'AR(1): siempre hay que ajustar al menos un AR(1) para verificar.',
    'MA(1): la ACF podría tener una barra significativa en lag 1 que no se nota.',
    'AR(2): con n = 200 observaciones siempre se puede ajustar AR(2).'
  ],p6correct,rng);
  problems.push({title:'Serie 3 — ¿Qué modelo ajustar?',questionText:'Al graficar acf(serie3) y pacf(serie3), observas que ninguna barra en ninguna de las dos gráficas rebasa las líneas azules punteadas. ¿Cuál es la conclusión correcta?',fn:'Umbral para n=200: ±1.96/√200 = ±0.139',hint:'Si ninguna barra es significativa en la ACF ni en la PACF, ¿qué fila de la tabla de decisión aplica?',options:p6s.opts,correctIdx:p6s.correctIdx,explanation:'Ninguna barra significativa en ACF ni PACF → Ruido blanco. No tiene sentido ajustar un modelo AR (ni MA ni ARMA) porque no hay estructura temporal que capturar. La serie ya es impredecible — cualquier modelo solo capturaría ruido.',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);
}

/* ════════════════════════════════════════════════════
   PDF GENERATOR
   ════════════════════════════════════════════════════ */
async function generatePDF(){
  var btn=document.getElementById('dlBtn');btn.textContent='Generando PDF…';btn.disabled=true;
  var jspdf=window.jspdf;
  var doc=new jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  var PW=215.9,M=18,TW=PW-M*2,PH=doc.internal.pageSize.height;
  var name=studentData.name,group=studentData.group,total=problems.length;
  var pct=Math.round(correctCount/total*100);
  var dateStr=new Date().toLocaleString('es-MX',{dateStyle:'long',timeStyle:'short'});
  var raw=name+'|'+group+'|'+correctCount+'|'+total+'|'+new Date().toDateString();
  var h=0;for(var ci=0;ci<raw.length;ci++)h=(Math.imul(31,h)+raw.charCodeAt(ci))|0;
  var code=Math.abs(h).toString(36).toUpperCase().slice(0,8);

  var pBR=74,pBG=124,pBB=63;   // --green  #4a7c3f
  var pAR=201,pAG=168,pAB=76;  // --gold   #c9a84c

  function pdfText(html){if(!html)return '';return html.replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2').replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/').replace(/\u2260/g,'!=').replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...').replace(/\s+/g,' ').trim();}

  // ── COVER ──
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

  // logos from hidden img tags
  var logoL=document.getElementById('pdf-logo-left');
  var logoR=document.getElementById('pdf-logo-right');
  if(logoL&&logoL.src&&logoL.src.indexOf('data:')===0){try{doc.addImage(logoL.src,'JPEG',M,4,40,22);}catch(e){}}
  if(logoR&&logoR.src&&logoR.src.indexOf('data:')===0){try{doc.addImage(logoR.src,'JPEG',PW/2-20,4,40,22);}catch(e){}}

  // LIAXA mark top-right
  var lx=PW-M-36,ly=10;
  doc.setDrawColor(pBR,pBG,pBB);doc.setLineWidth(0.7);
  doc.lines([[1.54,4.63-6.17],[1.54,0.51],[-1.55,2.57]],lx+1.03,ly+6.17);
  doc.setFillColor(pAR,pAG,pAB);doc.circle(lx+5.66,ly+2.57,0.9,'F');
  doc.setDrawColor(pAR,pAG,pAB);doc.setLineWidth(0.7);
  doc.line(lx+8.23,ly+1.54,lx+8.23,ly+7.2);
  doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('LIAXA',lx+10,ly+6.8);

  // Title in green bar
  doc.setTextColor(232,238,247);doc.setFontSize(19);doc.setFont('helvetica','bold');
  doc.text('Modelos Autoregresivos (AR)',M,49);
  doc.setTextColor(150,165,200);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Series de Tiempo Financieras  \u00b7  '+dateStr,M,59);

  // Student box
  doc.setFillColor(237,240,245);doc.roundedRect(M,72,TW,20,3,3,'F');
  doc.setTextColor(130,140,160);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
  doc.text('ESTUDIANTE',M+4,79);doc.text('GRUPO',130,79);
  doc.setTextColor(20,24,32);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text(name,M+4,87);doc.text(group,130,87);

  // Verification code
  doc.setTextColor(130,140,160);doc.setFontSize(7);doc.setFont('helvetica','normal');
  doc.text('C\u00d3DIGO DE VERIFICACI\u00d3N',M+4,97);
  doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(8.5);doc.setFont('courier','bold');
  doc.text(code,M+4,104);

  // Score box
  var sc=pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255);doc.roundedRect(M,110,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]);doc.setLineWidth(0.8);doc.roundedRect(M,110,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFontSize(40);doc.setFont('helvetica','bold');
  doc.text(pct+'%',PW/2,134,{align:'center'});
  doc.setTextColor(130,140,160);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
  doc.text(correctCount+' correctas de '+total+' preguntas',PW/2,141,{align:'center'});

  // Summary table
  doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);
  doc.setFontSize(7);doc.setFont('helvetica','bold');
  doc.rect(M,152,TW,8,'F');doc.text('RESUMEN DE PROBLEMAS',M+4,158);
  var sy=164;
  problems.forEach(function(prob,i){
    if(sy+12>PH-15){doc.addPage();sy=20;doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.rect(M,sy,TW,8,'F');doc.text('RESUMEN (cont.)',M+4,sy+6);sy+=12;}
    var ok=document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255,ok?240:232,ok?232:228);doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176,ok?106:48,ok?74:16);doc.circle(M+6,sy+5,2.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.text(ok?'V':'X',M+4.5,sy+6.5);
    doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Problema '+(i+1)+': '+pdfText(prob.title),M+12,sy+6.5);
    doc.setTextColor(ok?26:176,ok?106:48,ok?74:16);doc.text(ok?'Correcto':'Incorrecto',PW-M-24,sy+6.5);
    sy+=12;
  });

  // ── PER-PROBLEM PAGES ──
  for(var i=0;i<problems.length;i++){
    var prob=problems[i];doc.addPage();var wy=0;
    doc.setFillColor(pBR,pBG,pBB);doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB);doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text('Series de Tiempo Financieras  \u00b7  Modelos AR',M,10);
    doc.setTextColor(232,238,247);doc.setFontSize(10.5);doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  \u2014  '+pdfText(prob.title),M,17);
    wy=25;

    var qRaw=pdfText(prob.questionText);var qFn=pdfText(prob.fn||'');
    doc.setFontSize(8.5);doc.setFont('helvetica','normal');
    var qLines=doc.splitTextToSize(qRaw,TW-10);
    doc.setFontSize(7.5);doc.setFont('courier','bold');
    var fnLines=qFn?doc.splitTextToSize(qFn,TW-14):[];
    var qBoxH=8+qLines.length*5+(qFn?fnLines.length*4.8+5:0)+3;
    doc.setFillColor(237,240,245);doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB);doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.text('PREGUNTA',M+4,wy+6);
    doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
    var qy=wy+12;qLines.forEach(function(ln,li){doc.text(ln,M+4,qy+li*5);});
    if(qFn){var fny=qy+qLines.length*5+3;doc.setTextColor(45,90,35);doc.setFontSize(7.5);doc.setFont('courier','bold');fnLines.forEach(function(ln,li){doc.text(ln,M+4,fny+li*4.8);});}
    wy+=qBoxH+4;

    var isOk=document.getElementById('pc'+i).classList.contains('ok');
    var chosen=prob.studentChoice!=null?pdfText(prob.options[prob.studentChoice]||'\u2014'):'\u2014';
    var corr=pdfText(prob.options[prob.correctIdx]||'');
    var expRaw=pdfText(prob.explanation||'');
    var textW=TW-18;
    doc.setFontSize(8.5);var chLines=doc.splitTextToSize('Respuesta: '+chosen,textW);
    doc.setFontSize(8);var coLines=doc.splitTextToSize('Correcta: '+corr,textW);
    doc.setFontSize(7.5);var exLines=doc.splitTextToSize('Explicaci\u00f3n: '+expRaw,textW).slice(0,5);
    var ansBoxH=8+chLines.length*5.5+coLines.length*5+exLines.length*5+6;
    if(wy+ansBoxH>PH-18&&wy>40){doc.addPage();wy=20;}
    doc.setFillColor(isOk?232:255,isOk?240:232,isOk?232:228);doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176,isOk?106:48,isOk?74:16);doc.circle(M+7,wy+8,3.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(isOk?'\u2713':'\u2717',M+5.2,wy+10.5);
    var ay=wy+7;
    doc.setTextColor(20,24,32);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    chLines.forEach(function(ln){if(ay>PH-14){doc.addPage();ay=20;}doc.text(ln,M+14,ay);ay+=5.5;});ay+=2;
    doc.setTextColor(26,106,74);doc.setFontSize(8);doc.setFont('helvetica','normal');
    coLines.forEach(function(ln){if(ay>PH-14){doc.addPage();ay=20;}doc.text(ln,M+14,ay);ay+=5;});ay+=2;
    doc.setTextColor(90,85,80);doc.setFontSize(7.5);
    exLines.forEach(function(ln){if(ay>PH-14){doc.addPage();ay=20;}doc.text(ln,M+14,ay);ay+=5;});
    wy+=ansBoxH+5;

    doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);
    doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F');doc.text('TRABAJO DEL ESTUDIANTE',M+4,wy+5.5);wy+=11;

    var dc=document.getElementById('dc'+i);
    if(dc){try{var imgD=dc.toDataURL('image/png');var ar=dc.height/dc.width;var iw=TW;var ih=Math.min(iw*ar,68);doc.addImage(imgD,'PNG',M,wy,iw,ih);wy+=ih+4;}catch(e){}}
    var ta=document.getElementById('ta'+i);
    if(ta&&ta.value.trim()){if(wy>PH-30){doc.addPage();wy=20;}doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('courier','normal');var taLines=doc.splitTextToSize(ta.value,TW);taLines.slice(0,16).forEach(function(ln){if(wy>PH-15){doc.addPage();wy=20;}doc.text(ln,M,wy);wy+=5;});wy+=2;}
    var pp=document.getElementById('pp'+i);
    if(pp&&pp.src&&pp.src.indexOf('data:')===0){if(wy>PH-55){doc.addPage();wy=20;}try{doc.addImage(pp.src,'JPEG',M,wy,TW,68);wy+=72;}catch(e){}}
  }

  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');
    doc.setTextColor(130,140,160);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
    doc.text(name+'  \u00b7  '+group+'  \u00b7  C\u00f3digo: '+code+'  \u00b7  P\u00e1gina '+p+'/'+pages,PW/2,PH-5,{align:'center'});
  }

  doc.save('AR_Models_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='\u2b07 &nbsp;Descargar resultado PDF';btn.disabled=false;
}
