<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movimiento Parabólico — Instituto Salesiano Fray Pedro de Gante</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #3b3477;
  --green-dark: #251f4a;
  --green-bg:   #e8eef7;
  --gold:       #dc313a;
  --gold-bg:    #fdf3e7;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a2040; --gold-bg:#281e0e;
  --ok:#5a8fd4; --ok-bg:rgba(90,143,212,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── SIMULATION CARD ── */
.sim-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.sim-canvas-wrap { width:100%; border-radius:8px; overflow:hidden; background:#e8f4fd; border:1px solid var(--border); margin-bottom:.9rem; position:relative; }
canvas#simCanvas { display:block; width:100%; height:260px; }
.sim-controls { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:480px){ .sim-controls { grid-template-columns:1fr; } }
.sc-row label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.sc-row input[type=range] { width:100%; accent-color:var(--green); }
.sc-val { font-weight:600; color:var(--green); }
.sim-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.4rem; }
.smet { background:var(--surface2); border-radius:8px; padding:.6rem; text-align:center; }
.smet-lbl { font-size:.64rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.1rem; }
.smet-val { font-family:'IBM Plex Mono',monospace; font-size:.9rem; font-weight:600; color:var(--green-dark); }
.sim-launch-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.4rem; font-size:.88rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sim-launch-btn:hover { background:var(--green-dark); }

/* ── STEP BOX ── */
.stepbox { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.1rem 1.3rem; margin:.9rem 0; }
.stepbox .step { display:flex; gap:.75rem; margin-bottom:.75rem; }
.stepbox .step:last-child { margin-bottom:0; }
.step-num { background:var(--gold); color:#fff; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.74rem; font-weight:700; flex-shrink:0; margin-top:.1rem; }
.step-txt { font-size:.88rem; color:var(--text2); line-height:1.55; }
.step-txt strong { color:var(--text); }

/* ── FRACTION CSS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .1em; line-height:1.1; }
.mf-num { border-bottom:1.5px solid currentColor; padding:0 .15em; font-size:.85em; }
.mf-den { padding:0 .15em; font-size:.85em; }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }

/* ── MODE TABS ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
</style>
</head>

<script>
/* ================================================
   STATE
   ================================================ */
var studentData = {};
var problems    = [];

/* ================================================
   SESSION PERSISTENCE
   ================================================ */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'MP1__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = 'MP1__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc) return;
        var img = new Image();
        img.onload = function() {
          var ctx = dc.getContext('2d');
          ctx.drawImage(img, 0, 0, dc.width / (window.devicePixelRatio||1), dc.height / (window.devicePixelRatio||1));
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  if (!name || !group) { document.getElementById('restoreBar').style.display = 'none'; return; }
  var saved = loadSession(name, group);
  var bar = document.getElementById('restoreBar');
  bar.style.display = (saved && saved.choices && saved.choices.some(function(c){ return c !== null; })) ? 'block' : 'none';
}
var answeredCount = 0;
var correctCount  = 0;

/* ================================================
   THEME
   ================================================ */
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('salesiano_theme', next); } catch(e) {}
}
(function() {
  try {
    var t = localStorage.getItem('salesiano_theme');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
      document.addEventListener('DOMContentLoaded', function() {
        var b = document.getElementById('themeBtn');
        if (b) b.textContent = t === 'dark' ? '☀️' : '🌙';
      });
    }
  } catch(e) {}
})();

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   START
   ================================================ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor ingresa tu nombre y grupo.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0;
  correctCount  = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#3b3477';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

function switchTab(idx, panel, btn) {

/* ================================================
   ANSWER HANDLER — two-tap confirmation (Rule 8)
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   SIMULATION — parabolic trajectory canvas
   ================================================ */
function initSim() {
  var canvas = document.getElementById('simCanvas');
  if (!canvas) return;
  var dpr  = window.devicePixelRatio || 1;
  var W, H;
  function resize() {
    var rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
  }
  resize();
  var ctx = canvas.getContext('2d');
  var g = 9.8;
  var animId = null;

  // FIXED world coordinate system derived from slider maximums:
  //   v0_max=50 m/s, θ=45°  → max range = 50²/9.8 ≈ 255 m
  //   v0_max=50 m/s, θ=80°  → max height = (50·sin80°)²/(2·9.8) ≈ 124 m
  // Every launch plots in true proportion — a slow low shot looks small,
  // a fast high shot fills the canvas. Axis labels update to match.
  var PAD_L = 50, PAD_R = 16, PAD_T = 20, PAD_B = 32;
  var WORLD_RANGE  = 260;   // metres — fixed horizontal extent
  var WORLD_HEIGHT = 130;   // metres — fixed vertical extent

  function worldToCanvas(xM, yM) {
    var aw = W - PAD_L - PAD_R;
    var ah = H - PAD_T - PAD_B;
    return {
      x: PAD_L + (xM / WORLD_RANGE) * aw,
      y: (H - PAD_B) - (yM / WORLD_HEIGHT) * ah
    };
  }

  function getParams() {
    var v0 = parseFloat(document.getElementById('simV0').value);
    var ang = parseFloat(document.getElementById('simAngle').value);
    return { v0: v0, ang: ang };
  }

  function calcMetrics(v0, angDeg) {
    var ang = angDeg * Math.PI / 180;
    var vx = v0 * Math.cos(ang);
    var vy = v0 * Math.sin(ang);
    var tFlight = 2 * vy / g;
    var range   = vx * tFlight;
    var hMax    = (vy * vy) / (2 * g);
    return { tFlight: tFlight, range: range, hMax: hMax, vx: vx, vy: vy };
  }

  function drawAxes() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Ground line
    var gL = worldToCanvas(0, 0);
    var gR = worldToCanvas(WORLD_RANGE, 0);
    ctx.strokeStyle = '#6a9a5f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(gL.x, gL.y); ctx.lineTo(gR.x, gR.y); ctx.stroke();

    // Axis tick marks — horizontal every 50 m (5 ticks across 260 m world)
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
    ctx.fillStyle = '#7a7468'; ctx.font = '9px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    for (var xm = 0; xm <= WORLD_RANGE; xm += 50) {
      var tp = worldToCanvas(xm, 0);
      ctx.beginPath(); ctx.moveTo(tp.x, tp.y); ctx.lineTo(tp.x, tp.y + 5); ctx.stroke();
      ctx.fillText(xm + 'm', tp.x, tp.y + 14);
    }
    // Axis tick marks — vertical every 25 m (5 ticks up 130 m world)
    ctx.textAlign = 'right';
    for (var ym = 0; ym <= WORLD_HEIGHT; ym += 25) {
      var vp = worldToCanvas(0, ym);
      ctx.beginPath(); ctx.moveTo(PAD_L, vp.y); ctx.lineTo(PAD_L - 4, vp.y); ctx.stroke();
      ctx.fillText(ym + 'm', PAD_L - 6, vp.y + 3);
    }
    ctx.textAlign = 'left';
  }

  function drawIdleArrow() {
    // Show only the launch angle arrow before first launch
    var p = getParams();
    var origin = worldToCanvas(0, 0);
    var ang = p.ang * Math.PI / 180;
    var arrowLen = 36;
    var ax = origin.x + Math.cos(ang) * arrowLen;
    var ay = origin.y - Math.sin(ang) * arrowLen;
    ctx.strokeStyle = '#dc313a'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(origin.x, origin.y); ctx.lineTo(ax, ay); ctx.stroke();
    // Arrowhead
    var arrowAng = Math.atan2(origin.y - ay, ax - origin.x);
    ctx.fillStyle = '#dc313a';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 9 * Math.cos(arrowAng - 0.4), ay + 9 * Math.sin(arrowAng - 0.4));
    ctx.lineTo(ax - 9 * Math.cos(arrowAng + 0.4), ay + 9 * Math.sin(arrowAng + 0.4));
    ctx.closePath(); ctx.fill();
    // Label
    ctx.fillStyle = '#dc313a'; ctx.font = 'bold 10px IBM Plex Mono, monospace';
    ctx.fillText('θ=' + p.ang + '°  v₀=' + p.v0 + 'm/s', origin.x + 10, origin.y - 6);
    // Origin dot
    ctx.fillStyle = '#dc313a';
    ctx.beginPath(); ctx.arc(origin.x, origin.y, 5, 0, Math.PI * 2); ctx.fill();
  }

  function drawIdle() {
    drawAxes();
    drawIdleArrow();
  }

  function launchAnim() {
    if (animId) cancelAnimationFrame(animId);
    var p = getParams();
    var m = calcMetrics(p.v0, p.ang);

    // Set scale so trajectory fits canvas, then build points
    var NUM = 140;
    var pts = [];
    for (var k = 0; k <= NUM; k++) {
      var tt = (k / NUM) * m.tFlight;
      var xM = m.vx * tt;
      var yM = m.vy * tt - 0.5 * g * tt * tt;
      var cp = worldToCanvas(xM, Math.max(0, yM));
      pts.push(cp);
    }

    var frame = 0;
    function step() {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);
      drawAxes();

      // Draw trajectory tail
      if (frame > 0) {
        ctx.beginPath(); ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.5;
        for (var k = 0; k < frame && k < pts.length; k++) {
          if (k === 0) ctx.moveTo(pts[k].x, pts[k].y); else ctx.lineTo(pts[k].x, pts[k].y);
        }
        ctx.stroke();
      }

      // Ball
      var fi = Math.min(frame, pts.length - 1);
      ctx.fillStyle = '#dc313a';
      ctx.beginPath(); ctx.arc(pts[fi].x, pts[fi].y, 7, 0, Math.PI * 2); ctx.fill();

      frame += 2; // speed: advance 2 frames per tick for snappier feel
      if (frame < pts.length) {
        animId = requestAnimationFrame(step);
      } else {
        // Landing — draw complete trajectory + labels
        ctx.beginPath(); ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.5;
        pts.forEach(function(pt, k) { if (k === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y); });
        ctx.stroke();

        // Peak dashed line
        var peakPt = worldToCanvas(m.range / 2, m.hMax);
        var basePt = worldToCanvas(m.range / 2, 0);
        ctx.setLineDash([4, 4]); ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(basePt.x, basePt.y); ctx.lineTo(peakPt.x, peakPt.y); ctx.stroke();
        ctx.setLineDash([]);

        // H_max label
        ctx.fillStyle = '#3b3477'; ctx.font = 'bold 10px IBM Plex Mono, monospace';
        ctx.fillText('H=' + m.hMax.toFixed(1) + 'm', peakPt.x + 5, peakPt.y + 4);

        // Range label
        var landPt = worldToCanvas(m.range, 0);
        ctx.fillStyle = '#1d4e89'; ctx.font = 'bold 10px IBM Plex Mono, monospace';
        ctx.fillText('R=' + m.range.toFixed(1) + 'm', landPt.x - 44, landPt.y - 8);

        // Landing dot
        ctx.fillStyle = '#8b2500';
        ctx.beginPath(); ctx.arc(landPt.x, landPt.y, 5, 0, Math.PI * 2); ctx.fill();
      }
    }
    step();
  }

  function updateDisplay() {
    var p = getParams();
    var m = calcMetrics(p.v0, p.ang);
    document.getElementById('simV0Val').textContent    = p.v0 + ' m/s';
    document.getElementById('simAngVal').textContent   = p.ang + '°';
    document.getElementById('simRange').textContent    = m.range.toFixed(2) + ' m';
    document.getElementById('simHmax').textContent     = m.hMax.toFixed(2) + ' m';
    document.getElementById('simTflight').textContent  = m.tFlight.toFixed(2) + ' s';
    // Only redraw idle (arrow + axes) when sliders move — no trajectory shown yet
    drawIdle();
  }

  document.getElementById('simV0').addEventListener('input', function() { updateDisplay(); });
  document.getElementById('simAngle').addEventListener('input', function() { updateDisplay(); });
  document.getElementById('simLaunchBtn').addEventListener('click', function() { launchAnim(); });

  // Initial state: blank axes + arrow only
  updateDisplay();
  window.addEventListener('resize', function() { resize(); updateDisplay(); });
}

/* ================================================
   GYM SIMULATION
   ================================================ */
function initGym(ceilingH) {
  var canvas = document.getElementById('gymCanvas');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var W, H;
  function resize() {
    var rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
  }
  resize();
  var ctx = canvas.getContext('2d');
  var g = 9.8;
  var animId = null;

  // World: fixed to gym dimensions
  // Max range at v0=30,θ=45: 30²/9.8 ≈ 91 m — use 95 m wide
  // Height: ceiling is the top, add 20% headroom above it
  var WORLD_W = 95;
  var WORLD_H = ceilingH * 1.25;
  var PAD_L = 44, PAD_R = 12, PAD_T = 18, PAD_B = 28;

  function wc(xM, yM) {  // world → canvas
    var aw = W - PAD_L - PAD_R;
    var ah = H - PAD_T - PAD_B;
    return {
      x: PAD_L + (xM / WORLD_W) * aw,
      y: (H - PAD_B) - (yM / WORLD_H) * ah
    };
  }

  function getParams() {
    return {
      v0:  parseFloat(document.getElementById('gymV0').value),
      ang: parseFloat(document.getElementById('gymAngle').value)
    };
  }

  function calcMetrics(v0, angDeg) {
    var ang = angDeg * Math.PI / 180;
    var vx = v0 * Math.cos(ang);
    var vy = v0 * Math.sin(ang);
    var tFlight = 2 * vy / g;
    var range   = vx * tFlight;
    var hMax    = (vy * vy) / (2 * g);
    return { tFlight: tFlight, range: Math.min(range, WORLD_W * 0.98), hMax: hMax, vx: vx, vy: vy, rawRange: range };
  }

  function drawRoom(hitsOrClears) {
    // hitsOrClears: null=idle, true=hit, false=clear
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Floor
    var fl = wc(0, 0), fr = wc(WORLD_W, 0);
    ctx.strokeStyle = '#6a9a5f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(fr.x, fr.y); ctx.stroke();

    // Ceiling
    var cl = wc(0, ceilingH), cr = wc(WORLD_W, ceilingH);
    var ceilColor = hitsOrClears === true ? '#c05030' : hitsOrClears === false ? '#2d6a4f' : '#7a7468';
    ctx.strokeStyle = ceilColor; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cl.x, cl.y); ctx.lineTo(cr.x, cr.y); ctx.stroke();

    // Ceiling hatch marks (brick pattern suggestion)
    ctx.strokeStyle = ceilColor; ctx.lineWidth = 1; ctx.globalAlpha = 0.35;
    for (var xi = 0; xi < WORLD_W; xi += 5) {
      var p1 = wc(xi, ceilingH);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p1.x, p1.y - 6); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Ceiling label
    ctx.fillStyle = ceilColor; ctx.font = 'bold 9px IBM Plex Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('techo ' + ceilingH + '.0 m', cr.x - 4, cl.y - 5);
    ctx.textAlign = 'left';

    // Floor tick marks every 10 m
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
    ctx.fillStyle = '#7a7468'; ctx.font = '9px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    for (var xm = 0; xm <= WORLD_W; xm += 10) {
      var tp = wc(xm, 0);
      ctx.beginPath(); ctx.moveTo(tp.x, tp.y); ctx.lineTo(tp.x, tp.y + 4); ctx.stroke();
      ctx.fillText(xm + 'm', tp.x, tp.y + 13);
    }
    // Height ticks
    ctx.textAlign = 'right';
    for (var ym = 0; ym <= Math.floor(WORLD_H); ym += 2) {
      var vp = wc(0, ym);
      ctx.beginPath(); ctx.moveTo(PAD_L, vp.y); ctx.lineTo(PAD_L - 3, vp.y); ctx.stroke();
      if (ym % 4 === 0) ctx.fillText(ym + 'm', PAD_L - 5, vp.y + 3);
    }
    ctx.textAlign = 'left';
  }

  function drawIdleArrow() {
    var p = getParams();
    var origin = wc(0, 0);
    var ang = p.ang * Math.PI / 180;
    var aLen = 32;
    var ax = origin.x + Math.cos(ang) * aLen;
    var ay = origin.y - Math.sin(ang) * aLen;
    ctx.strokeStyle = '#dc313a'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(origin.x, origin.y); ctx.lineTo(ax, ay); ctx.stroke();
    var arrowAng = Math.atan2(origin.y - ay, ax - origin.x);
    ctx.fillStyle = '#dc313a';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 8 * Math.cos(arrowAng - 0.4), ay + 8 * Math.sin(arrowAng - 0.4));
    ctx.lineTo(ax - 8 * Math.cos(arrowAng + 0.4), ay + 8 * Math.sin(arrowAng + 0.4));
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#dc313a'; ctx.font = 'bold 9px IBM Plex Mono, monospace';
    ctx.fillText('θ=' + p.ang + '°  v₀=' + p.v0 + ' m/s', origin.x + 8, origin.y - 5);
    ctx.fillStyle = '#dc313a';
    ctx.beginPath(); ctx.arc(origin.x, origin.y, 5, 0, Math.PI * 2); ctx.fill();
  }

  function updateMetrics(m) {
    var gap = ceilingH - m.hMax;
    var hEl  = document.getElementById('gymHmax');
    var gEl  = document.getElementById('gymGap');
    var vEl  = document.getElementById('gymVerdict');
    hEl.textContent = m.hMax.toFixed(2) + ' m';
    if (m.hMax > ceilingH) {
      gEl.textContent = '¡GOLPEA!';
      gEl.style.color = 'var(--bad)';
      vEl.textContent = '✗ Demasiado alto';
      vEl.style.color = 'var(--bad)';
    } else {
      gEl.textContent = gap.toFixed(2) + ' m';
      gEl.style.color = gap <= 0.5 ? 'var(--ok)' : 'var(--gold)';
      vEl.textContent = gap <= 0.5 ? '🎯 ¡Perfecto!' : gap <= 1.5 ? '👍 Muy cerca' : '↑ Sube más';
      vEl.style.color = gap <= 0.5 ? 'var(--ok)' : gap <= 1.5 ? 'var(--gold)' : 'var(--text3)';
    }
  }

  function launch() {
    if (animId) cancelAnimationFrame(animId);
    var p = getParams();
    var m = calcMetrics(p.v0, p.ang);
    var hits = m.hMax > ceilingH;

    // Build trajectory points — clip at ceiling if ball would punch through
    var NUM = 120;
    var pts = [];
    var hitFrame = -1;
    for (var k = 0; k <= NUM; k++) {
      var tt = (k / NUM) * m.tFlight;
      var xM = m.vx * tt;
      var yM = m.vy * tt - 0.5 * g * tt * tt;
      if (yM > ceilingH && hitFrame < 0) hitFrame = k;
      var cp = wc(xM, Math.min(Math.max(0, yM), ceilingH));
      pts.push(cp);
    }

    var frame = 0;
    var stopAt = hits ? hitFrame : NUM;

    function step() {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);
      drawRoom(null);  // neutral ceiling during flight

      // Trajectory tail
      if (frame > 0) {
        ctx.beginPath(); ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.5;
        for (var k = 0; k < Math.min(frame, pts.length); k++) {
          if (k === 0) ctx.moveTo(pts[k].x, pts[k].y); else ctx.lineTo(pts[k].x, pts[k].y);
        }
        ctx.stroke();
      }

      // Ball
      var fi = Math.min(frame, pts.length - 1);
      ctx.fillStyle = hits && frame >= stopAt ? '#c05030' : '#dc313a';
      ctx.beginPath(); ctx.arc(pts[fi].x, pts[fi].y, 7, 0, Math.PI * 2); ctx.fill();

      frame += 2;
      if (frame <= stopAt + 2) {
        animId = requestAnimationFrame(step);
      } else {
        // Final state: redraw with result colors
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);
        drawRoom(hits);

        // Full trajectory
        ctx.beginPath(); ctx.strokeStyle = hits ? '#c05030' : '#1d4e89'; ctx.lineWidth = 2.5;
        for (var k = 0; k <= stopAt && k < pts.length; k++) {
          if (k === 0) ctx.moveTo(pts[k].x, pts[k].y); else ctx.lineTo(pts[k].x, pts[k].y);
        }
        ctx.stroke();

        if (!hits) {
          // Peak dashed line
          var peakPt  = wc(m.rawRange / 2, m.hMax);
          var ceilPt  = wc(m.rawRange / 2, ceilingH);
          var floorPt = wc(m.rawRange / 2, 0);

          // Gap bracket: from peak up to ceiling
          ctx.strokeStyle = '#3b3477'; ctx.lineWidth = 1.5;
          ctx.setLineDash([3, 3]);
          ctx.beginPath(); ctx.moveTo(peakPt.x, peakPt.y); ctx.lineTo(ceilPt.x, ceilPt.y); ctx.stroke();
          ctx.setLineDash([]);

          // Bracket end caps
          ctx.beginPath();
          ctx.moveTo(peakPt.x - 5, peakPt.y); ctx.lineTo(peakPt.x + 5, peakPt.y);
          ctx.moveTo(ceilPt.x - 5, ceilPt.y); ctx.lineTo(ceilPt.x + 5, ceilPt.y);
          ctx.stroke();

          // Gap label
          var gapM = ceilingH - m.hMax;
          var midY = (peakPt.y + ceilPt.y) / 2;
          ctx.fillStyle = '#3b3477'; ctx.font = 'bold 10px IBM Plex Mono, monospace';
          ctx.fillText(gapM.toFixed(2) + ' m', peakPt.x + 7, midY + 4);

          // H_max dashed to floor
          ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(floorPt.x, floorPt.y); ctx.lineTo(peakPt.x, peakPt.y); ctx.stroke();
          ctx.setLineDash([]);

          // Landing dot
          var landPt = wc(m.rawRange <= WORLD_W * 0.98 ? m.rawRange : WORLD_W * 0.98, 0);
          ctx.fillStyle = '#8b2500';
          ctx.beginPath(); ctx.arc(landPt.x, landPt.y, 5, 0, Math.PI * 2); ctx.fill();
        } else {
          // Hit mark on ceiling
          var hitPt = wc(m.vx * (hitFrame / NUM) * m.tFlight, ceilingH);
          ctx.fillStyle = '#c05030';
          ctx.font = 'bold 18px sans-serif';
          ctx.fillText('💥', hitPt.x - 10, hitPt.y + 6);
        }

        // Ball final position
        ctx.fillStyle = hits ? '#c05030' : '#dc313a';
        ctx.beginPath(); ctx.arc(pts[Math.min(stopAt, pts.length-1)].x, pts[Math.min(stopAt, pts.length-1)].y, 7, 0, Math.PI * 2); ctx.fill();

        updateMetrics(m);
      }
    }
    step();
  }

  function updateIdle() {
    var p = getParams();
    var m = calcMetrics(p.v0, p.ang);
    document.getElementById('gymV0Val').textContent  = p.v0 + ' m/s';
    document.getElementById('gymAngVal').textContent = p.ang + '°';
    document.getElementById('gymHmax').textContent   = m.hMax.toFixed(2) + ' m';
    var gap = ceilingH - m.hMax;
    var gEl = document.getElementById('gymGap');
    var vEl = document.getElementById('gymVerdict');
    if (m.hMax > ceilingH) {
      gEl.textContent = '¡GOLPEA!'; gEl.style.color = 'var(--bad)';
      vEl.textContent = '✗'; vEl.style.color = 'var(--bad)';
    } else {
      gEl.textContent = gap.toFixed(2) + ' m'; gEl.style.color = gap <= 0.5 ? 'var(--ok)' : 'var(--gold)';
      vEl.textContent = gap <= 0.5 ? '🎯' : gap <= 1.5 ? '👍' : '↑';
      vEl.style.color = gap <= 0.5 ? 'var(--ok)' : gap <= 1.5 ? 'var(--gold)' : 'var(--text3)';
    }
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    drawRoom(null);
    drawIdleArrow();
  }

  document.getElementById('gymV0').addEventListener('input', updateIdle);
  document.getElementById('gymAngle').addEventListener('input', updateIdle);
  document.getElementById('gymLaunchBtn').addEventListener('click', launch);

  updateIdle();
  window.addEventListener('resize', function() { resize(); updateIdle(); });
}

/* ================================================
   SHUFFLEOPTS helper (Rule 4)
   ================================================ */
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ================================================
   PDF GENERATION
   ================================================ */
async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('es-MX', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  // Anáhuac colors
  var pBR = 59,  pBG = 52,  pBB = 119;   // Salesiano purple #3b3477
  var pAR = 220, pAG = 49,  pAB = 58;    // Salesiano red #dc313a

  function pdfText(html) {
    if (!html) return '';
    return html
      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\u2080/g,'0').replace(/\u2081/g,'1').replace(/\u2082/g,'2')
      .replace(/\u2083/g,'3').replace(/\u2080/g,'0')
      .replace(/\s+/g,' ').trim();
  }

  // ── PORTADA ──
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
