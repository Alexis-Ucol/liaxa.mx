      options:saV.exprOpts, correctIdx:saV.exprCorrectIdx,
      explanation:{ es:'A = 4πr² → A = 4πx².', en:'A = 4πr² → A = 4πx².' }},
    step2:{ question: es?'¿Cuál es el área cuando x = ' + saV.gx + '? (π ≈ 3.14) — respuesta en cm²':'What is the area when x = ' + saV.gx + '? (π ≈ 3.14) — answer in cm³',
      options:saV.numOpts, correctIdx:saV.numCorrectIdx,
      explanation:{ es:'A = 4π(' + saV.gx + ')² ≈ ' + saV.area + ' cm².', en:'A = 4π(' + saV.gx + ')² ≈ ' + saV.area + ' cm².' }},
    hint: es?'A = 4πr²; eleva r al cuadrado.':'A = 4πr²; square r.'
  });

  /* ══════════════════════════════════════════════════════════════════════
     DESAFÍO — CUERPO COMPUESTO
  ══════════════════════════════════════════════════════════════════════ */
  sec(
    '<div class="stag">' + (es?'Desafío':'Challenge') + '</div>' +
    '<h2>' + (es?'Cuerpo geométrico compuesto':'Composite geometric solid') + '</h2>' +
    '<p>' + (es
      ? 'Algunos cuerpos combinan dos figuras. El volumen total es la <strong>suma</strong> de los volúmenes de cada parte.'
      : 'Some solids combine two shapes. The total volume is the <strong>sum</strong> of the volumes of each part.') + '</p>' +
    '<div class="callout"><strong>' + (es?'Ejemplo':'Example') + '</strong>' +
    '<p>' + (es
      ? 'Prisma de base 4 cm × 4 cm con altura (x+1) cm, más pirámide de igual base y 3 cm de altura. Cuando x = 4: altura prisma = 5, V<sub>prisma</sub> = (16)(5) = 80; V<sub>pirámide</sub> = ⅓(16)(3) = 16; Total = <strong>96 cm³</strong>'
      : 'Prism 4 cm × 4 cm base with height (x+1) cm, plus pyramid same base and 3 cm height. When x = 4: prism height = 5, V<sub>prism</sub> = (16)(5) = 80; V<sub>pyramid</sub> = ⅓(16)(3) = 16; Total = <strong>96 cm³</strong>') + '</p></div>'
  );
  var comp = genComposite(rng);
  var compScns = [
    { es:'Un silo tiene prisma de base ' + comp.b + '×' + comp.b + ' cm y altura (x+' + comp.c + ') cm, con pirámide de igual base y ' + comp.hp + ' cm de altura encima. ¿Volumen total cuando x = ' + comp.gx + '?',
      en:'A silo has a prism ' + comp.b + '×' + comp.b + ' cm base and height (x+' + comp.c + ') cm, with a pyramid same base and ' + comp.hp + ' cm height on top. Total volume when x = ' + comp.gx + '?' },
    { es:'Una maqueta de casa tiene prisma de base ' + comp.b + '×' + comp.b + ' cm y altura (x+' + comp.c + ') cm, con techo piramidal de igual base y ' + comp.hp + ' cm de altura. ¿Volumen total cuando x = ' + comp.gx + '?',
      en:'A model house has a prism ' + comp.b + '×' + comp.b + ' cm base and height (x+' + comp.c + ') cm, with pyramid roof same base and ' + comp.hp + ' cm height. Total volume when x = ' + comp.gx + '?' }
  ];
  var cpS = pick(compScns, rng);
  pushProblem({
    solid:'final',
    title: es?'Cuerpo compuesto':'Composite solid',
    questionText: es?cpS.es:cpS.en,
    options:comp.opts, correctIdx:comp.correctIdx,
    hint: es?'Calcula el prisma y la pirámide por separado, luego suma.':'Calculate the prism and pyramid separately, then add them.',
    explanation:{ es:'h<sub>prisma</sub> = ' + comp.hPrism + '. V = ' + comp.b + '²·' + comp.hPrism + ' + ⅓·' + comp.b + '²·' + comp.hp + ' = ' + comp.volPrism + ' + ' + comp.volPyr + ' = ' + comp.total + ' cm³.', en:'h<sub>prism</sub> = ' + comp.hPrism + '. V = ' + comp.b + '²·' + comp.hPrism + ' + ⅓·' + comp.b + '²·' + comp.hp + ' = ' + comp.volPrism + ' + ' + comp.volPyr + ' = ' + comp.total + ' cm³.' }
  });

  /* ══════════════════════════════════════════════════════════════════════
     EVALUACIÓN FINAL — inverso (cone height)
  ══════════════════════════════════════════════════════════════════════ */
  sec(
    '<div class="stag">' + (es?'Evaluación final':'Final assessment') + '</div>' +
    '<h2>' + (es?'Pon a prueba lo aprendido':'Test what you have learned') + '</h2>' +
    '<p>' + (es
      ? 'Esta vez el reto es inverso: conoces el volumen y debes encontrar la medida que falta.'
      : 'This time the challenge runs backwards: you know the volume and must find the missing measurement.') + '</p>'
  );
  var chi = genConeHeightInverse(rng);
  var chiScns = [
    { es:'Un embudo cónico debe contener exactamente ' + chi.vol + ' cm³ de líquido y tiene radio ' + chi.r + ' cm. ¿Qué altura necesita (al entero más cercano)?',
      en:'A cone-shaped funnel must hold exactly ' + chi.vol + ' cm³ of liquid and has radius ' + chi.r + ' cm. What height does it need (rounded to the nearest whole number)?' },
    { es:'Un cono de tránsito tiene volumen ' + chi.vol + ' cm³ y radio ' + chi.r + ' cm. ¿Cuál es su altura (al entero más cercano)?',
      en:'A traffic cone has volume ' + chi.vol + ' cm³ and radius ' + chi.r + ' cm. What is its height (rounded to the nearest whole number)?' }
  ];
  var chiS = pick(chiScns, rng);
  pushProblem({
    solid:'final',
    title: es?'Altura de un cono':'Height of a cone',
    figHtml:'<div class="figcard">' + coneSVG(chi.r, 5, chi.r, '?') + '</div>',
    questionText: es?chiS.es:chiS.en,
    options:chi.opts, correctIdx:chi.correctIdx,
    hint: es?'h = 3V ÷ (π·r²)':'h = 3V ÷ (π·r²)',
    explanation:{ es:'h = (3·' + chi.vol + ') ÷ (π·' + chi.r + '²) ≈ ' + chi.hTarget + ' cm.', en:'h = (3·' + chi.vol + ') ÷ (π·' + chi.r + '²) ≈ ' + chi.hTarget + ' cm.' },
    showWork:false
  });
}

/* ── helper: SVG with radius line (no r=r label, just r and h) ── */
function cylFigSVG() {
  var cx=90, R=48, ry=14, topY=30, botY=110;
  var s='<svg viewBox="0 0 220 140" width="100%" height="148" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono,monospace">';
  s+='<ellipse cx="'+cx+'" cy="'+botY+'" rx="'+R+'" ry="'+ry+'" fill="var(--surface)" stroke="var(--green)" stroke-width="1.6"/>';
  s+='<line x1="'+(cx-R)+'" y1="'+topY+'" x2="'+(cx-R)+'" y2="'+botY+'" stroke="var(--green)" stroke-width="1.6"/>';
  s+='<line x1="'+(cx+R)+'" y1="'+topY+'" x2="'+(cx+R)+'" y2="'+botY+'" stroke="var(--green)" stroke-width="1.6"/>';
  s+='<ellipse cx="'+cx+'" cy="'+topY+'" rx="'+R+'" ry="'+ry+'" fill="var(--gold-bg)" stroke="var(--green)" stroke-width="1.8"/>';
  // radius line on top ellipse
  s+='<line x1="'+cx+'" y1="'+topY+'" x2="'+(cx+R)+'" y2="'+topY+'" stroke="var(--green-dark)" stroke-width="1.6" stroke-dasharray="3,2"/>';
  s+='<circle cx="'+cx+'" cy="'+topY+'" r="2.5" fill="var(--green-dark)"/>';
  s+='<text x="'+(cx+R/2)+'" y="'+(topY-5)+'" font-size="12" fill="var(--green-dark)" font-weight="600" text-anchor="middle">r</text>';
  // height line on the right
  s+='<line x1="'+(cx+R+18)+'" y1="'+topY+'" x2="'+(cx+R+18)+'" y2="'+botY+'" stroke="var(--text3)" stroke-width="1.2" marker-start="url(#arr)" marker-end="url(#arr)"/>';
  s+='<text x="'+(cx+R+30)+'" y="'+(topY+(botY-topY)/2+4)+'" font-size="12" fill="var(--text2)" text-anchor="middle">h</text>';
  return s+'</svg>';
}
function coneFigSVG() {
  var cx=100, R=50, ry=14, baseY=108, apexY=24;
  var s='<svg viewBox="0 0 220 140" width="100%" height="148" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono,monospace">';
  s+='<ellipse cx="'+cx+'" cy="'+baseY+'" rx="'+R+'" ry="'+ry+'" fill="var(--surface)" stroke="var(--green)" stroke-width="1.6"/>';
  s+='<line x1="'+(cx-R)+'" y1="'+baseY+'" x2="'+cx+'" y2="'+apexY+'" stroke="var(--green)" stroke-width="1.8"/>';
  s+='<line x1="'+(cx+R)+'" y1="'+baseY+'" x2="'+cx+'" y2="'+apexY+'" stroke="var(--green)" stroke-width="1.8"/>';
  s+='<line x1="'+cx+'" y1="'+baseY+'" x2="'+cx+'" y2="'+apexY+'" stroke="var(--text3)" stroke-width="1.1" stroke-dasharray="3,2"/>';
  // radius line on base
  s+='<line x1="'+cx+'" y1="'+baseY+'" x2="'+(cx+R)+'" y2="'+baseY+'" stroke="var(--green-dark)" stroke-width="1.6" stroke-dasharray="3,2"/>';
  s+='<circle cx="'+cx+'" cy="'+baseY+'" r="2.5" fill="var(--green-dark)"/>';
  s+='<text x="'+(cx+R/2)+'" y="'+(baseY+15)+'" font-size="12" fill="var(--green-dark)" font-weight="600" text-anchor="middle">r</text>';
  s+='<text x="'+(cx+14)+'" y="'+(apexY+(baseY-apexY)/2+4)+'" font-size="12" fill="var(--text2)" text-anchor="middle">h</text>';
  return s+'</svg>';
}

/* ── Tank rounds generator: 3 rounds alternating solve-for-h and solve-for-r ── */
function genTankRounds(rng) {
  var rounds = [];
  // round types: 'h', 'r', 'h' (or randomise order a bit)
  var types = pick([['h','r','h'],['r','h','r'],['h','h','r'],['r','r','h'],['h','r','r']], rng);
  for (var i=0; i<3; i++) {
    var tp = types[i];
    var r, h, vol, target;
    if (tp==='h') {
      r = pick([2,3,4,5], rng);
      h = pick([3,4,5,6,7], rng);
      vol = Math.round(3.14*r*r*h*10)/10;
      target = h;
      rounds.push({ type:'h', r:r, h:h, vol:vol, target:target });
    } else {
      h = pick([4,5,6,7,8], rng);
      r = pick([2,3,4], rng);
      vol = Math.round(3.14*r*r*h*10)/10;
      target = r;
      rounds.push({ type:'r', r:r, h:h, vol:vol, target:target });
    }
  }
  return rounds;
}
function buildTankRoundHTML(idx, rd, es) {
  var label, find, navHTML='';
  if (rd.type==='h') {
    label = (es
      ? 'V = <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; r = <strong>'+rd.r+' cm</strong> &nbsp;·&nbsp; h = ?'
      : 'V = <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; r = <strong>'+rd.r+' cm</strong> &nbsp;·&nbsp; h = ?');
    find  = (es?'Escribe la altura (cm) para que el agua llegue exactamente al tope.':'Type the height (cm) so the water reaches exactly the top.');
  } else {
    label = (es
      ? 'V = <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; h = <strong>'+rd.h+' cm</strong> &nbsp;·&nbsp; r = ?'
      : 'V = <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; h = <strong>'+rd.h+' cm</strong> &nbsp;·&nbsp; r = ?');
    find  = (es?'Escribe el radio (cm, un decimal) para que el agua llegue exactamente al tope.':'Type the radius (cm, one decimal) so the water reaches exactly the top.');
  }
  if (idx < 2) {
    navHTML = '<div style="text-align:right;margin-top:.8rem">' +
      '<button class="vzbtn" id="tank_next_'+idx+'" style="display:none" onclick="nextTankRound('+(idx+1)+')">' +
        (es?'Siguiente ronda →':'Next round →') + '</button></div>';
  }
  return '<div style="font-size:.9rem;margin-bottom:.55rem;text-align:center">' + label + '</div>' +
    '<div style="font-size:.82rem;color:var(--text3);text-align:center;margin-bottom:.7rem">' + find + '</div>' +
    '<div id="tank_svgw_'+idx+'" style="text-align:center">' + fillVisualizationSVG('cylinder', -1, rd.r) + '</div>' +
    '<div class="vzinput-row">' +
      '<input type="number" step="0.1" class="vzinput" id="tank_in_'+idx+'" placeholder="?">' +
      '<span class="vzunit">cm</span>' +
      '<button class="vzbtn" id="tank_btn_'+idx+'" onclick="checkTankRound('+idx+')">' + (es?'Verificar':'Check') + '</button>' +
    '</div>' +
    '<div class="ibox-fb" id="tank_fb_'+idx+'"></div>' +
    navHTML;
}
function checkTankRound(idx) {
  var rd = MG.tankRounds[idx];
  if (MG.tankDone[idx]) return;
  var val = parseFloat(document.getElementById('tank_in_'+idx).value);
  if (isNaN(val) || val<=0) {
    var fbErr = document.getElementById('tank_fb_'+idx);
    fbErr.textContent = LANG==='es'?'Escribe un número positivo.':'Enter a positive number.';
    fbErr.className = 'ibox-fb show fbbad'; return;
  }
  var correct = rd.target;
  var isOk = Math.abs(val - correct)/correct < 0.06;
  var ratio = rd.type==='h' ? val/correct : (val*val*rd.h)/(correct*correct*rd.h);
  document.getElementById('tank_svgw_'+idx).innerHTML = fillVisualizationSVG('cylinder', isOk ? 1 : (val<correct?0.6:1.3), rd.r);
  document.getElementById('tank_in_'+idx).disabled = true;
  document.getElementById('tank_btn_'+idx).disabled = true;
  var fb = document.getElementById('tank_fb_'+idx);
  var expl = rd.type==='h'
    ? 'h = ' + rd.vol + ' ÷ (π·' + rd.r + '²) ≈ ' + rd.target + ' cm.'
    : 'r = √(' + rd.vol + ' ÷ (π·' + rd.h + ')) ≈ ' + rd.target + ' cm.';
  var es2 = (LANG==='es');
  if (isOk) {
    fb.innerHTML = '<strong>✓ ' + (es2?'¡El agua llegó exactamente al tope!':'The water reached exactly the top!') + '</strong> ' + expl;
  } else if (val < correct) {
    fb.innerHTML = '<strong>' + (es2?'El agua no llegó hasta arriba.':'The water did not reach the top.') + '</strong> ' + expl;
  } else {
    fb.innerHTML = '<strong>' + (es2?'El agua se derramó.':'The water overflowed.') + '</strong> ' + expl;
  }
  fb.className = 'ibox-fb show ' + (isOk?'fbok':'fbbad');
  MG.tankDone[idx] = true;
  var nxt = document.getElementById('tank_next_'+idx);
  if (nxt) nxt.style.display='inline-block';
}
function nextTankRound(idx) {
  var ibox = document.getElementById('tank_ibox');
  if (!ibox) return;
  ibox.innerHTML = buildTankRoundHTML(idx, MG.tankRounds[idx], LANG==='es');
}

/* ── Box rounds generator ── */
function genBoxRounds(rng) {
  var rounds = [];
  var types = pick([['h','l','h'],['l','h','l'],['h','h','l'],['l','l','h'],['h','l','l']], rng);
  for (var i=0; i<3; i++) {
    var tp = types[i], l, w, h, vol, target;
    if (tp==='h') {
      l = pick([4,5,6,7,8], rng); w = pick([3,4,5], rng); h = pick([3,4,5,6], rng);
      vol = l*w*h; target = h;
      rounds.push({ type:'h', l:l, w:w, h:h, vol:vol, target:target });
    } else {
      l = pick([4,5,6,7], rng); w = pick([3,4,5], rng); h = pick([3,4,5], rng);
      vol = l*w*h; target = l;
      rounds.push({ type:'l', l:l, w:w, h:h, vol:vol, target:target });
    }
  }
  return rounds;
}
function buildBoxRoundHTML(idx, rd, es) {
  var label, find, navHTML='';
  if (rd.type==='h') {
    label = (es
      ? 'Contenido: <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; Base: <strong>'+rd.l+' × '+rd.w+' cm</strong> &nbsp;·&nbsp; h = ?'
      : 'Contents: <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; Base: <strong>'+rd.l+' × '+rd.w+' cm</strong> &nbsp;·&nbsp; h = ?');
    find  = (es?'Escribe la altura (cm) para que el contenido quepa exactamente.':'Type the height (cm) so the contents fit exactly.');
  } else {
    label = (es
      ? 'Contenido: <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; Ancho: <strong>'+rd.w+' cm</strong> &nbsp;·&nbsp; Alto: <strong>'+rd.h+' cm</strong> &nbsp;·&nbsp; l = ?'
      : 'Contents: <strong>'+rd.vol+' cm³</strong> &nbsp;·&nbsp; Width: <strong>'+rd.w+' cm</strong> &nbsp;·&nbsp; Height: <strong>'+rd.h+' cm</strong> &nbsp;·&nbsp; l = ?');
    find  = (es?'Escribe el largo (cm) para que el contenido quepa exactamente.':'Type the length (cm) so the contents fit exactly.');
  }
  if (idx < 2) {
    navHTML = '<div style="text-align:right;margin-top:.8rem">' +
      '<button class="vzbtn" id="box_next_'+idx+'" style="display:none" onclick="nextBoxRound('+(idx+1)+')">' +
        (es?'Siguiente ronda →':'Next round →') + '</button></div>';
  }
  return '<div style="font-size:.9rem;margin-bottom:.55rem;text-align:center">' + label + '</div>' +
    '<div style="font-size:.82rem;color:var(--text3);text-align:center;margin-bottom:.7rem">' + find + '</div>' +
    '<div id="box_svgw_'+idx+'" style="text-align:center">' + boxFillSVG(rd, -1) + '</div>' +
    '<div class="vzinput-row">' +
      '<input type="number" step="1" class="vzinput" id="box_in_'+idx+'" placeholder="?">' +
      '<span class="vzunit">cm</span>' +
      '<button class="vzbtn" id="box_btn_'+idx+'" onclick="checkBoxRound('+idx+')">' + (es?'Verificar':'Check') + '</button>' +
    '</div>' +
    '<div class="ibox-fb" id="box_fb_'+idx+'"></div>' +
    navHTML;
}
function checkBoxRound(idx) {
  var rd = MG.boxRounds[idx];
  if (MG.boxDone[idx]) return;
  var val = parseFloat(document.getElementById('box_in_'+idx).value);
  if (isNaN(val)||val<=0) {
    var fbErr=document.getElementById('box_fb_'+idx);
    fbErr.textContent=LANG==='es'?'Escribe un número positivo.':'Enter a positive number.';
    fbErr.className='ibox-fb show fbbad'; return;
  }
  var isOk = (val === rd.target);
  document.getElementById('box_svgw_'+idx).innerHTML = boxFillSVG(rd, isOk?1:(val<rd.target?0.6:1.3));
  document.getElementById('box_in_'+idx).disabled=true;
  document.getElementById('box_btn_'+idx).disabled=true;
  var fb=document.getElementById('box_fb_'+idx);
  var expl = rd.type==='h'
    ? 'h = ' + rd.vol + ' ÷ (' + rd.l + '·' + rd.w + ') = ' + rd.target + ' cm.'
    : 'l = ' + rd.vol + ' ÷ (' + rd.w + '·' + rd.h + ') = ' + rd.target + ' cm.';
  var es2 = (LANG==='es');
  if (isOk) {
    fb.innerHTML = '<strong>✓ ' + (es2?'¡El contenido cabe exactamente!':'The contents fit exactly!') + '</strong> ' + expl;
  } else if (val < rd.target) {
    fb.innerHTML = '<strong>' + (es2?'La caja es demasiado pequeña — el contenido no cabe.':'The box is too small — the contents do not fit.') + '</strong> ' + expl;
  } else {
    fb.innerHTML = '<strong>' + (es2?'La caja es demasiado grande — sobra espacio.':'The box is too big — space is wasted.') + '</strong> ' + expl;
  }
  fb.className = 'ibox-fb show ' + (isOk?'fbok':'fbbad');
  MG.boxDone[idx]=true;
  var nxt=document.getElementById('box_next_'+idx);
  if (nxt) nxt.style.display='inline-block';
}
function nextBoxRound(idx) {
  var ibox=document.getElementById('box_ibox');
  if (!ibox) return;
  ibox.innerHTML=buildBoxRoundHTML(idx, MG.boxRounds[idx], LANG==='es');
}
