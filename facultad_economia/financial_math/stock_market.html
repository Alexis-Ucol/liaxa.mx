<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Market Investing — Financial Mathematics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;   /* PRIMARY      */
  --green-dark: #2d5a27;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #eaf0e7;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* ── INTERACTIVE CALCULATOR ── */
.calc-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.4rem; margin:1.2rem 0; }
.calc-card h3 { font-family:'Crimson Pro',serif; font-size:1.15rem; font-weight:700; margin-bottom:1rem; color:var(--green-dark); }
.calc-row { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.7rem; }
@media(max-width:480px){ .calc-row { grid-template-columns:1fr; } }
.calc-lbl { font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.25rem; }
.calc-inp { width:100%; padding:.6rem .8rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.9rem; transition:border-color .18s; }
.calc-inp:focus { outline:none; border-color:var(--green); }
.calc-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.65rem 1.4rem; font-size:.9rem; font-weight:600; cursor:pointer; transition:background .18s; }
.calc-btn:hover { background:var(--green-dark); }
.result-box { background:var(--surface2); border-radius:10px; padding:1rem 1.2rem; margin-top:.9rem; font-size:.88rem; display:none; }
.result-box.show { display:block; }
.result-big { font-family:'IBM Plex Mono',monospace; font-size:1.5rem; font-weight:700; margin:.3rem 0; }
.result-big.profit { color:var(--ok); }
.result-big.loss   { color:var(--bad); }
.result-lbl { font-size:.72rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; }

/* ── COMPARISON TABLE ── */
.ctable { width:100%; border-collapse:collapse; margin:1rem 0; font-size:.86rem; }
.ctable th { background:var(--green); color:#fff; padding:.6rem .8rem; text-align:left; font-weight:600; font-size:.8rem; }
.ctable td { padding:.6rem .8rem; border-bottom:1px solid var(--border); }
.ctable tr:last-child td { border-bottom:none; }
.ctable tr:nth-child(even) td { background:var(--surface2); }
.tpos { color:var(--ok); font-weight:600; }
.tneg { color:var(--bad); font-weight:600; }

/* ── CHART AREA ── */
.chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; margin:1rem 0; }
.chart-wrap canvas { width:100%; height:180px; display:block; }

/* ── METRICS ── */
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── STEP TRACKER ── */
.steps { counter-reset:step; margin:1rem 0; }
.step { display:flex; gap:.8rem; margin-bottom:.9rem; align-items:flex-start; }
.step-num { background:var(--green); color:#fff; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:700; flex-shrink:0; margin-top:.1rem; }
.step-body { font-size:.88rem; color:var(--text2); }
.step-body strong { color:var(--text); }

/* ── GOOGLE FINANCE GUIDE ── */
.gf-card { background:var(--surface); border:1.5px solid var(--green); border-radius:12px; padding:1.2rem; margin:1rem 0; }
.gf-card h4 { font-weight:700; color:var(--green-dark); margin-bottom:.7rem; font-size:.95rem; }
.gf-url { font-family:'IBM Plex Mono',monospace; font-size:.8rem; background:var(--surface2); border-radius:6px; padding:.4rem .7rem; color:var(--green-dark); margin-bottom:.7rem; word-break:break-all; }

/* ── LIVE LOOKUP WIDGET ── */
.lookup-wrap { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.4rem; margin:1.2rem 0; }
.lookup-wrap h3 { font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:700; color:var(--green-dark); margin-bottom:1rem; }
.ticker-row { display:flex; gap:.7rem; align-items:flex-end; flex-wrap:wrap; margin-bottom:1rem; }
.ticker-row .calc-lbl { margin-bottom:.25rem; }
.ticker-inp { flex:1; min-width:100px; padding:.6rem .8rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.9rem; text-transform:uppercase; }
.ticker-inp:focus { outline:none; border-color:var(--green); }
.quick-chips { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1rem; }
.chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.2rem .7rem; font-size:.76rem; cursor:pointer; transition:all .14s; color:var(--text2); }
.chip:hover, .chip.active { background:var(--green); color:#fff; border-color:var(--green); }
.price-entry { background:var(--surface2); border-radius:10px; padding:.9rem 1rem; margin-bottom:.7rem; }
.price-entry-lbl { font-size:.72rem; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.4rem; }
.price-entry-row { display:flex; gap:.7rem; align-items:center; flex-wrap:wrap; }
.date-inp { flex:1; min-width:120px; padding:.5rem .7rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.85rem; }
.date-inp:focus { outline:none; border-color:var(--green); }
.price-inp { width:110px; padding:.5rem .7rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.85rem; }
.price-inp:focus { outline:none; border-color:var(--green); }
.live-result { margin-top:1rem; display:none; }
.live-result.show { display:block; }
.lr-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.55rem; margin-bottom:.7rem; }
@media(max-width:480px){ .lr-grid { grid-template-columns:1fr; } }
.lr-box { background:var(--surface2); border-radius:8px; padding:.7rem .9rem; }
.lr-lbl { font-size:.67rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text3); margin-bottom:.2rem; }
.lr-val { font-family:'IBM Plex Mono',monospace; font-size:1.1rem; font-weight:700; }
.lr-val.pos { color:var(--ok); }
.lr-val.neg { color:var(--bad); }
.lr-val.neu { color:var(--text); }

/* ── ANNUALIZATION CHART ── */
.ann-bars { display:flex; gap:.8rem; align-items:flex-end; height:140px; margin:1rem 0; padding:0 .5rem; }
.ann-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:.4rem; }
.ann-bar { width:100%; background:var(--green); border-radius:5px 5px 0 0; transition:height .6s; min-height:4px; }
.ann-bar.accent { background:var(--gold); }
.ann-bar-lbl { font-size:.7rem; color:var(--text3); text-align:center; line-height:1.2; }
.ann-bar-val { font-family:'IBM Plex Mono',monospace; font-size:.78rem; font-weight:700; color:var(--green-dark); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .lr-grid { grid-template-columns: 1fr; }
}
</style>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">

  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    drawings.push(dc ? (function(){ try{ return dc.toDataURL('image/png'); } catch(e){ return ''; } })() : '');
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push(pp && pp.src.indexOf('data:') === 0 ? pp.src : '');
  });
  var state = { choices: problems.map(function(p){ return p.studentChoice; }), drawings:drawings, texts:texts, photos:photos };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = 'stockmarket_fm__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) saved.drawings.forEach(function(dataUrl, i) {
      if (!dataUrl) return;
      var dc = document.getElementById('dc' + i);
      if (!dc || !dc.width) return;
      var img = new Image();
      img.onload = function() {
        var dpr = window.devicePixelRatio || 1;
        dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
      };
      img.src = dataUrl;
    });
    if (saved.texts) saved.texts.forEach(function(text, i) {
      if (!text) return;
      var ta = document.getElementById('ta' + i);
      if (ta) ta.value = text;
    });
    if (saved.photos) saved.photos.forEach(function(dataUrl, i) {
      if (!dataUrl) return;
      var pp = document.getElementById('pp' + i);
      if (!pp) return;
      pp.src = dataUrl; pp.style.display = 'block';
      var pz = document.getElementById('pz' + i);
      if (pz) pz.style.opacity = '0.4';
    });
  }, 300);
}

/* ── SEEDED RNG ── */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function fmt2(n) { return n.toFixed(2); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function fmtDol(n) { return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2); }

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── ANSWER HANDLER ── */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================================
   INTERACTIVE CALCULATOR LOGIC
   ================================================================ */
function calcPL() {
  var buyP  = parseFloat(document.getElementById('calc_buy').value);
  var sellP = parseFloat(document.getElementById('calc_sell').value);
  var shares= parseFloat(document.getElementById('calc_shares').value) || 1;
  var rb = document.getElementById('calc_result');
  if (isNaN(buyP) || isNaN(sellP) || buyP <= 0 || sellP <= 0) {
    rb.className = 'result-box show';
    rb.innerHTML = '<span style="color:var(--bad)">Please enter valid positive prices.</span>';
    return;
  }
  var gain   = (sellP - buyP) * shares;
  var pct    = (sellP - buyP) / buyP * 100;
  var isProfit = gain >= 0;
  rb.className = 'result-box show';
  rb.innerHTML =
    '<div class="result-lbl">' + (isProfit ? '📈 Profit' : '📉 Loss') + '</div>' +
    '<div class="result-big ' + (isProfit ? 'profit' : 'loss') + '">' + fmtDol(gain) + '</div>' +
    '<div style="font-size:.82rem;color:var(--text3);margin-top:.3rem">Return: <strong style="color:var(--text)">' + fmtPct(pct) + '</strong> &nbsp;|&nbsp; ' + shares + ' share(s) × $' + fmt2(buyP) + ' → $' + fmt2(sellP) + '</div>';
}

function calcAnnual() {
  var r  = parseFloat(document.getElementById('ann_r').value);
  var m  = parseFloat(document.getElementById('ann_m').value);
  var rb = document.getElementById('ann_result');
  if (isNaN(r) || isNaN(m) || m <= 0) {
    rb.className = 'result-box show';
    rb.innerHTML = '<span style="color:var(--bad)">Please enter valid values.</span>';
    return;
  }
  var monthly = r / 100;
  var periods = 12 / m;
  var annual  = (Math.pow(1 + monthly, periods) - 1) * 100;
  var simple  = r * (12 / m);
  rb.className = 'result-box show';
  rb.innerHTML =
    '<div class="result-lbl">Annualized Return</div>' +
    '<div class="result-big ' + (annual >= 0 ? 'profit' : 'loss') + '">' + fmtPct(annual) + '</div>' +
    '<div style="font-size:.82rem;color:var(--text3);margin-top:.4rem">' +
      'Compound method: <strong style="color:var(--text)">' + fmtPct(annual) + '</strong><br>' +
      'Simple scaling: <strong style="color:var(--text)">' + fmtPct(simple) + '</strong>' +
    '</div>' +
    '<div style="font-size:.78rem;color:var(--text3);margin-top:.4rem">' + '(1 + r)<sup style="font-size:.75em"><span class="mf-outer" style="font-size:.8em"><span class="mf-num">12</span><span class="mf-den">' + m + '</span></span></sup> − 1</div>';
  updateAnnBars(r, m);
}

function updateAnnBars(r, m) {
  var monthly = r / 100;
  var periods = 12 / m;
  var annual  = (Math.pow(1 + monthly, periods) - 1) * 100;
  var raw     = r * (12 / m);
  var max     = Math.max(Math.abs(annual), Math.abs(raw), 1);
  var bars = document.querySelectorAll('.ann-bar');
  if (bars.length >= 2) {
    bars[0].style.height = Math.max(4, Math.abs(raw)    / max * 110) + 'px';
    bars[1].style.height = Math.max(4, Math.abs(annual) / max * 110) + 'px';
  }
  var vals = document.querySelectorAll('.ann-bar-val');
  if (vals.length >= 2) {
    vals[0].textContent = fmtPct(raw);
    vals[1].textContent = fmtPct(annual);
  }
}

function calcLiveStock() {
  var ticker = (document.getElementById('lk_ticker').value || '').trim().toUpperCase();
  var buyPrice  = parseFloat(document.getElementById('lk_buy_price').value);
  var sellPrice = parseFloat(document.getElementById('lk_sell_price').value);
  var buyDate   = document.getElementById('lk_buy_date').value;
  var sellDate  = document.getElementById('lk_sell_date').value;
  var shares    = parseFloat(document.getElementById('lk_shares').value) || 1;
  var rb = document.getElementById('lk_result');

  if (!ticker) { showLkError('Please enter a stock ticker.', rb); return; }

  if (isNaN(sellPrice) || sellPrice <= 0) { showLkError('Please enter a valid Sell/Current Price.', rb); return; }
  if (!buyDate || !sellDate) { showLkError('Please enter both dates.', rb); return; }

  var bd = new Date(buyDate + 'T00:00:00');
  var sd = new Date(sellDate + 'T00:00:00');
  if (sd <= bd) { showLkError('The end date must be after the buy date.', rb); return; }

  var daysHeld = (sd - bd) / (1000 * 60 * 60 * 24);
  var gain     = (sellPrice - buyPrice) * shares;
  var pct      = (sellPrice - buyPrice) / buyPrice * 100;
  var annComp  = (Math.pow(1 + pct/100, 365/daysHeld) - 1) * 100;
  var isProfit = gain >= 0;

  rb.className = 'live-result show';
  rb.innerHTML =
    '<div class="lr-grid">' +
      '<div class="lr-box"><div class="lr-lbl">Total ' + (isProfit?'Profit':'Loss') + '</div><div class="lr-val ' + (isProfit?'pos':'neg') + '">' + fmtDol(gain) + '</div></div>' +

      '<div class="lr-box"><div class="lr-lbl">Days Held</div><div class="lr-val neu">' + Math.round(daysHeld) + ' days</div></div>' +
      '<div class="lr-box"><div class="lr-lbl">Annualized Return</div><div class="lr-val ' + (annComp>=0?'pos':'neg') + '">' + fmtPct(annComp) + '</div></div>' +
    '</div>' +
    '<div style="font-size:.78rem;color:var(--text3);margin-top:.3rem">' +
      ticker + ' · ' + shares + ' share(s) · Bought $' + fmt2(buyPrice) + ' on ' + buyDate + ' · Valued $' + fmt2(sellPrice) + ' on ' + sellDate +
    '</div>';
}

      '<div class="rcard"><div class="rname">Volatility</div><div class="rform">σ (standard deviation)</div><div class="rnote">How much a price fluctuates day to day</div></div>' +
      '<div class="rcard"><div class="rname">Market Risk</div><div class="rform">Systematic</div><div class="rnote">Affects all stocks — recessions, rate hikes</div></div>' +
      '<div class="rcard"><div class="rname">Company Risk</div><div class="rform">Unsystematic</div><div class="rnote">Specific to one firm — can be reduced by diversification</div></div>' +
      '<div class="rcard"><div class="rname">Risk/Return</div><div class="rform">Higher risk → higher expected return</div><div class="rnote">Fundamental trade-off in finance</div></div>' +
    '</div>' +
    '<div class="callout"><strong>Golden rule:</strong><p>Never invest money you cannot afford to lose. Past performance does not guarantee future results. This guide is for educational purposes only.</p></div>';
  lb.appendChild(s7);

  /* ── PROBLEM 6: Break-even price ── */
  var buyP6  = Math.round((40 + rng() * 160) * 100) / 100;
  var fee6   = Math.round((2 + rng() * 8) * 100) / 100;
  var sh6    = 5 + Math.floor(rng() * 16);
  var beven6 = Math.round((buyP6 + fee6 / sh6) * 100) / 100;
  var c6    = '$' + fmt2(beven6) + ' per share';
  var w6a   = '$' + fmt2(buyP6) + ' per share';
  var w6b   = '$' + fmt2(Math.round((buyP6 + fee6)*100)/100) + ' per share';
  var w6c   = '$' + fmt2(Math.round(beven6 * 0.95 * 100)/100) + ' per share';
  var opts6 = shuffle([c6, w6a, w6b, w6c], rng);
  var ci6   = opts6.indexOf(c6);
  problems.push({
    title: 'Break-Even Price After Fees',
    questionText: 'You buy <strong>' + sh6 + ' shares</strong> at <strong>$' + fmt2(buyP6) + '</strong> each, and your broker charges a flat fee of <strong>$' + fmt2(fee6) + '</strong> for the transaction. What is your <em>break-even</em> sell price per share?',
    options: opts6,
    correctIdx: ci6,
    hint: 'Total cost = (buy price × shares) + fee. Divide by shares to get break-even per share.',
    explanation: 'Total cost = ' + sh6 + ' × $' + fmt2(buyP6) + ' + $' + fmt2(fee6) + ' = $' + fmt2(buyP6*sh6 + fee6) + '. Per share: $' + fmt2(buyP6*sh6+fee6) + ' ÷ ' + sh6 + ' = <strong>$' + fmt2(beven6) + '</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);

  /* ── PROBLEM 7: Final synthesis ── */
  var buyP7  = Math.round((50 + rng() * 100) * 100) / 100;
  var retM7  = 2 + Math.round(rng() * 6);
  var mon7   = 1 + Math.floor(rng() * 2);
  var sellP7 = Math.round(buyP7 * (1 + retM7/100) * 100) / 100;
  var annR7  = (Math.pow(1 + retM7/100, 12/mon7) - 1) * 100;
  var c7    = fmtPct(annR7);
  var w7a   = fmtPct(retM7);
  var w7b   = fmtPct(retM7 * 12);
  var w7c   = fmtPct(annR7 / 2);
  var opts7 = shuffle([c7, w7a, w7b, w7c], rng);
  var ci7   = opts7.indexOf(c7);
  problems.push({
    title: 'Full Analysis: Return &amp; Annualization',
    questionText: 'You bought a stock at <strong>$' + fmt2(buyP7) + '</strong> and sold at <strong>$' + fmt2(sellP7) + '</strong> after <strong>' + mon7 + ' month(s)</strong>. Which of the following correctly states the <em>compound annualized return</em>?',
    options: opts7,
    correctIdx: ci7,
    hint: 'Step 1: r = (' + fmt2(sellP7) + ' − ' + fmt2(buyP7) + ') ÷ ' + fmt2(buyP7) + '. Step 2: Annualize with (1+r)<sup>12/' + mon7 + '</sup> − 1.',
    explanation: 'r = ' + fmtPct(retM7) + '. Annualized: (1 + 0.' + String(retM7).padStart(2,'0') + ')<sup>' + fmt2(12/mon7) + '</sup> − 1 = <strong>' + c7 + '</strong>. Simple scaling would give ' + fmtPct(retM7*12/mon7) + ' — but that ignores compounding.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);
}

      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Code: '+code+'  ·  Page '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('StockMarket_FacEco_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Download Results PDF';
  btn.disabled  = false;
}

/* ── LOGO LAYOUT INIT ── */
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var ll  = document.getElementById('logo-left');
    var lr  = document.getElementById('logo-right');
    var sep = document.getElementById('wlogsep');
    var hasL = ll  && ll.src  && ll.src  !== window.location.href;
    var hasR = lr  && lr.src  && lr.src  !== window.location.href;
    if (hasL) { ll.style.display = 'inline-block'; }
    if (hasR) { lr.style.display = 'inline-block'; }
    if (hasL && hasR) { sep.style.display = 'block'; }
    if ((hasL && !hasR) || (!hasL && hasR)) {
      document.getElementById('wlogos').style.justifyContent = 'center';
    }
    var hl = document.getElementById('hlogo-left');
    var hr = document.getElementById('hlogo-right');
    if (hl && hl.src && hl.src !== window.location.href) hl.style.display = 'inline-block';
    if (hr && hr.src && hr.src !== window.location.href) hr.style.display = 'inline-block';
  });
})();
</script>
