<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pueblos del Mediterráneo Antiguo — Historia · 3° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a3a6b; --green-dark:#0f2244; --green-bg:#e8edf5;
  --gold:#c9a84c;  --gold-bg:#faf3e0;
  --bg:#f8f6f1;    --surface:#ffffff;    --surface2:#f0ede6;
  --border:#ddd8cc; --text:#1a1a16; --text2:#4a4640; --text3:#7a7468;
  --ok:#2d6a4f;    --ok-bg:rgba(45,106,79,.10);
  --bad:#8b2500;   --bad-bg:rgba(139,37,0,.08);
  --shadow:0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#4a7abf; --green-dark:#7aaae0; --green-bg:#0e1e38;
  --gold:#d4b86a;  --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border)}
.wlogos img{height:50px;width:auto;object-fit:contain}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot{display:flex;justify-content:center;align-items:center;padding-top:.9rem}
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text)}
#restoreBar strong{color:var(--gold)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}
.lang-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:.28rem .7rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--green);color:#fff}
[data-theme="dark"] .lang-btn.active{background:var(--green-dark)}
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)}
.pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;line-height:1.6}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);margin-bottom:.85rem}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.draw-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.4rem}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg)}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:#1a5c38;background:#b7e4cc;color:#0e3a22;font-weight:700}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:#1a5c38;background:#d4f0e2;color:#0e3a22;font-weight:600}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok)}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}
/* People cards */
.people-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin:1rem 0}
.p-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:.9rem;text-align:center;cursor:pointer;transition:transform .18s,box-shadow .18s}
.p-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.p-card.open .p-detail{display:block}
.p-emoji{font-size:1.75rem;margin-bottom:.3rem}
.p-name{font-weight:700;font-size:.88rem;color:var(--green-dark);margin-bottom:.18rem}
.p-loc{font-size:.7rem;color:var(--text3);margin-bottom:.3rem}
.p-tag{display:inline-block;background:var(--green-bg);color:var(--green-dark);font-size:.68rem;padding:.12rem .42rem;border-radius:20px}
.p-detail{display:none;text-align:left;font-size:.77rem;color:var(--text2);line-height:1.62;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)}
/* Sea box */
.sea-box{background:#e8edf5;border:1.5px solid var(--green-bg);border-radius:12px;padding:1rem;margin:1rem 0;position:relative;overflow:hidden}
[data-theme="dark"] .sea-box{background:#0e1e38;border-color:#1a3a6b}
.sea-box::after{content:'🌊';position:absolute;font-size:2.8rem;right:.4rem;top:0;opacity:.15;pointer-events:none}
.sea-title{font-weight:700;font-size:.88rem;color:var(--green-dark);margin-bottom:.5rem}
.sea-text{font-size:.83rem;color:var(--text2);line-height:1.65}
/* Horizontal timeline */
.tl-h-wrap{overflow-x:auto;margin:1rem 0;padding-bottom:.35rem}
.tl-h-row{display:flex;gap:0;min-width:520px}
.tl-h-step{flex:1;padding:.5rem .4rem;border-right:2px solid var(--border);text-align:center}
.tl-h-step:last-child{border-right:none}
.tl-h-yr{font-size:.7rem;font-weight:700;color:var(--green-dark);margin-bottom:.22rem}
.tl-h-ev{font-size:.73rem;color:var(--text2);line-height:1.5}
/* Integration cards */
.int-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem;margin:1rem 0}
.int-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:.9rem}
.int-emoji{font-size:1.5rem;margin-bottom:.3rem}
.int-title{font-weight:700;font-size:.88rem;color:var(--green-dark);margin-bottom:.3rem}
.int-text{font-size:.78rem;color:var(--text2);line-height:1.6}
/* Arrow match */
.arrow-match-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:1rem 0;position:relative}
.arrow-match-instr{font-size:.85rem;color:var(--text2);margin-bottom:.9rem}
.arrow-match-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:.5rem;align-items:start}
.am-col{display:flex;flex-direction:column;gap:.5rem}
.am-col-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem;text-align:center}
.am-item{padding:.6rem .75rem;border:2px solid var(--border);border-radius:8px;background:var(--surface2);font-size:.8rem;cursor:pointer;transition:all .15s;user-select:none;text-align:center}
.am-item:hover:not(.done):not(.am-sel){border-color:var(--green);background:var(--green-bg)}
.am-item.am-sel{border-color:var(--gold);background:var(--gold-bg);font-weight:600}
.am-item.done{font-weight:600}
.am-pair-0{border-color:#c0392b!important;background:#fde8e7!important;color:#7b1a13!important}
.am-pair-1{border-color:#e67e22!important;background:#fef0e1!important;color:#8a4a0d!important}
.am-pair-2{border-color:#27ae60!important;background:#e3f7ec!important;color:#145c35!important}
.am-pair-3{border-color:#2980b9!important;background:#e3f1fb!important;color:#12507a!important}
.am-pair-4{border-color:#8e44ad!important;background:#f3e8fb!important;color:#53216b!important}
.am-pair-5{border-color:#d4a017!important;background:#fef9e7!important;color:#7a5a00!important}
.am-arrows-col{display:flex;flex-direction:column;gap:.5rem;align-items:center;padding-top:1.5rem}
.am-arrow{width:44px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--border);transition:color .2s}
.am-arrow.matched{color:var(--ok)}
.am-progress{font-size:.72rem;color:var(--text3);text-align:right;margin-top:.6rem}
.am-reset{background:none;border:1px solid var(--border);border-radius:6px;padding:.28rem .65rem;font-size:.74rem;color:var(--text3);cursor:pointer;margin-top:.6rem}
.am-reset:hover{border-color:var(--green);color:var(--green)}
#amToast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(2rem);background:#8b2500;color:#fff;padding:.6rem 1.4rem;border-radius:20px;font-size:.82rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999}
#amToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;border-radius:12px}
  .wtitle{font-size:1.35rem}
  .htitle{display:none}
  .lbody{padding:1.2rem .7rem 3rem}
  .section h2{font-size:1.3rem}
  .people-grid{grid-template-columns:repeat(2,1fr)}
  .int-grid{grid-template-columns:1fr}
  .arrow-match-grid{grid-template-columns:1fr 40px 1fr}
  .mcopt{font-size:.83rem;padding:.58rem .7rem}
  .pbody{padding:.75rem}
  .pstmt{font-size:.84rem}
  .callout{padding:.8rem .9rem}
}
</style>
</head>
<body>

<div id="amToast"></div>

<!-- ════ WELCOME ════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitleEl">Pueblos del Mediterráneo Antiguo</div>
    <div class="wcourse" id="wcourseEl">Historia · 3° de Secundaria</div>
    <label class="flabel" id="lblNameEl" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lblGroupEl" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <span id="restoreMsg"><strong id="restoreMsg">📂 Sesión guardada encontrada</strong><br>¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Retomar sesión</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px}.lbl{stroke:var(--gold);stroke-width:2.5}.lba{fill:var(--gold)}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════ LESSON ════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle" id="htitleEl">Pueblos del Mediterráneo Antiguo</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>.lht{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px}.lhl{stroke:var(--gold);stroke-width:2}.lha{fill:var(--gold)}</style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none">
    <div style="text-align:center;padding:2rem 1rem">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;<span id="dlBtnLbl">Descargar Resultados PDF</span></button>
    </div>
  </div>
</div>

<script>
/* ════ SCHOOL CONFIG ════ */
var SCHOOL = {
  primary:'#0c246c', primaryDark:'#07184c', primaryBg:'#e6eaf7',
  accent:'#8484b4',  accentBg:'#e9e9f1',
  darkPrimary:'#385ed1', darkPrimaryDark:'#6a8bf0', darkPrimaryBg:'#08153e',
  darkAccent:'#8787b7',  darkAccentBg:'#14141e',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

function getAttemptKey(name,group){return 'liaxa_his3g05__att__'+(name+'__'+group).replace(/\s+/g,'_');}
function nextAttempt(name,group){var k=getAttemptKey(name,group),n=0;try{n=parseInt(localStorage.getItem(k)||'0',10)||0;}catch(e){}n++;try{localStorage.setItem(k,String(n));}catch(e){}return n;}

/* ════ SESSION ════ */
function lsKey(){var n=(studentData.name||'').trim(),g=(studentData.group||'').trim();return 'liaxa_his3g05__'+(n+'__'+g).replace(/\s+/g,'_');}
function saveSession(){
  if(!studentData.name)return;
  var drawings=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var blank=document.createElement('canvas');blank.width=dc.width;blank.height=dc.height;drawings.push(dc.toDataURL()===blank.toDataURL()?null:dc.toDataURL('image/png'));}
    else drawings.push(null);
  });
  try{localStorage.setItem(lsKey(),JSON.stringify({name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings}));}catch(e){}
}
function loadSession(name,group){var key='liaxa_his3g05__'+(name+'__'+group).replace(/\s+/g,'_');try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}}
function checkForSavedSession(){
  var name=document.getElementById('sName').value.trim(),group=document.getElementById('sGroup').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var saved=loadSession(name,group);
  document.getElementById('restoreBar').style.display=(saved&&saved.choices&&saved.choices.some(function(c){return c!==null;}))?'block':'none';
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}

function seededRng(seed){var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function shufflePerm(n,rng){var idx=[];for(var k=0;k<n;k++)idx.push(k);return shuffle(idx,rng);}
function buildBilingualOptions(rawEs,rawEn,rng){var perm=shufflePerm(rawEs.length,rng);return{es:perm.map(function(k){return rawEs[k];}),en:perm.map(function(k){return rawEn[k];}),correctIdx:perm.indexOf(0)};}

/* ════ MC ════ */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){confirmMC(probIdx,chosenIdx);return;}
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML='<strong>'+(isOk?t('fb-correct'):t('fb-wrong'))+'</strong> '+prob.explanation[LANG];
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
  saveSession();
  if(answeredCount===problems.length)setTimeout(showResults,700);
}

/* ════ CANVAS ════ */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#2e2e28':'#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);
  ctx.strokeStyle=SCHOOL.primary;ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  if(tb){
    tb.querySelectorAll('.tbtn2').forEach(function(btn){btn.addEventListener('click',function(){tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.lineWidth=2;if(btn.classList.contains('bmarker')){ctx.globalAlpha=0.45;ctx.lineWidth=8;}if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}});});
    tb.querySelectorAll('.cdot').forEach(function(dot){dot.addEventListener('click',function(){tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');});});
    var clr=tb.querySelector('.clrbtn');if(clr)clr.addEventListener('click',function(){var dpr2=window.devicePixelRatio||1;ctx.clearRect(0,0,canvas.width/dpr2,canvas.height/dpr2);});
  }
}

function buildArrowMatch(containerId,leftItems,rightItemsShuffled,pairMap){
  var wrap=document.getElementById(containerId);if(!wrap)return;
  var colors=['am-pair-0','am-pair-1','am-pair-2','am-pair-3','am-pair-4','am-pair-5'];

  window.amClickRight=function(cid,j){
    var st=window['_am_'+cid];if(st.selLeft===null)return;
    var alreadyUsed=Object.values(st.matched).indexOf(j)>=0;
    if(alreadyUsed){showAmToast(LANG==='es'?'Ese pueblo ya tiene pareja':'That people is already matched');return;}

      showAmToast(LANG==='es'?'Esa pareja no es correcta. Inténtalo de nuevo.':'That pair is incorrect. Try again.');

     hintEs:'Piensa en el latín, el derecho romano y la filosofía griega. ¿A qué regiones del mundo llegaron eventualmente?',
     hintEn:'Think about Latin, Roman law, and Greek philosophy. What regions of the world did they eventually reach?',
     explEs:'Roma absorbió la cultura griega y la difundió por todo el Mediterráneo a través del latín, el derecho romano y la arquitectura. Esta síntesis greco-romana es la base de la civilización occidental y, a través de España y Portugal, de América Latina.',
     explEn:'Rome absorbed Greek culture and spread it throughout the Mediterranean through Latin, Roman law, and architecture. This Greco-Roman synthesis is the foundation of Western civilization and, through Spain and Portugal, of Latin America.'}
  ];

  var shuffledA=shuffle(assessBank,rng);
  shuffledA.forEach(function(ap,i){
    var pidx=4+i;
    var bo=buildBilingualOptions(ap.optsEsRaw,ap.optsEnRaw,rng);
    problems.push({title:ap.title,questionText:ap.questionText,showWork:ap.showWork,options:bo,correctIdx:bo.correctIdx,hint:{es:ap.hintEs,en:ap.hintEn},explanation:{es:ap.explEs,en:ap.explEn},studentChoice:null,pendingChoice:null});
    buildOneCard(problems[pidx],pidx);
  });
}

async function generatePDF(){
  var btn=document.getElementById('dlBtn');btn.textContent=t('pdf-generating');btn.disabled=true;
  var doc=new jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  var PW=215.9,M=18;
  var pBR=SCHOOL.pBR,pBG=SCHOOL.pBG,pBB=SCHOOL.pBB,pAR=SCHOOL.pAR,pAG=SCHOOL.pAG,pAB=SCHOOL.pAB;
  doc.setFillColor(pAR,pAG,pAB);doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255);doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB);doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB);doc.rect(0,30,PW,34,'F');
  var ll=document.getElementById('hlogo-left');
  if(ll&&ll.src&&ll.src!==window.location.href){try{doc.addImage(ll.src,'PNG',M,4,22,22);}catch(e){}}
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(15);
  doc.text(SCHOOL.guideTitle[LANG],PW/2,44,{align:'center'});
  doc.setFontSize(9.5);doc.setFont('helvetica','normal');
  doc.text(SCHOOL.courseName[LANG],PW/2,52,{align:'center'});
  doc.setFillColor(245,247,250);doc.roundedRect(M,68,PW-M*2,20,3,3,'F');
  doc.setTextColor(80,80,100);doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text((LANG==='es'?'Nombre:':'Name:'),M+4,77);doc.setFont('helvetica','normal');doc.text(studentData.name||'',M+28,77);
  doc.text((LANG==='es'?'Grupo:':'Group:'),M+4,84);doc.text(studentData.group||'',M+28,84);
  doc.setFillColor(pBR,pBG,pBB);doc.roundedRect(M,95,PW-M*2,34,3,3,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(26);doc.setFont('helvetica','bold');
  doc.text(correctCount+'/'+problems.length,PW/2,114,{align:'center'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(correctCount+' '+(LANG==='es'?'correctas de':'correct out of')+' '+problems.length,PW/2,124,{align:'center'});
  doc.setTextColor(80,80,100);doc.setFontSize(8);var y=145;
  problems.forEach(function(p,i){
    var ok=p.studentChoice===p.correctIdx;
    doc.setFillColor(ok?220:255,ok?240:220,ok?220:220);
    doc.roundedRect(M,y,PW-M*2,7.5,2,2,'F');
    doc.setTextColor(60,60,80);
    doc.text((i+1)+'. '+(ok?'✓':'✗')+' '+(p.questionText[LANG].replace(/<[^>]+>/g,'').substring(0,65)+'…'),M+3,y+4.8);
    y+=9.5;if(y>250){doc.addPage();y=20;}
  });
  doc.setTextColor(150,150,170);doc.setFontSize(7);
  doc.text('LIAXA · '+SCHOOL.courseName[LANG]+' · '+new Date().toLocaleDateString(),PW/2,268,{align:'center'});
  doc.save(SCHOOL.filePrefix+'_'+(studentData.name||'alumno').replace(/\s+/g,'_')+'.pdf');
  var lbl=document.getElementById('dlBtnLbl');if(lbl)lbl.textContent=t('btn-pdf');
  btn.disabled=false;
}
