<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos MA — Series de Tiempo Financieras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── COMPARISON TABLE ── */
.ctable { width:100%; border-collapse:collapse; margin:1rem 0; font-size:.85rem; }
.ctable th { background:var(--surface2); color:var(--text3); font-size:.7rem; text-transform:uppercase; letter-spacing:.07em; padding:.55rem .8rem; text-align:left; border-bottom:2px solid var(--border); }
.ctable td { padding:.6rem .8rem; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:top; }
.ctable tr:last-child td { border-bottom:none; }
.ctable .hleft { color:var(--green-dark); font-weight:600; font-family:'IBM Plex Mono',monospace; font-size:.8rem; }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }

/* ── MODE TABS ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .ctable { font-size: .78rem; }
}
</style>
</head>

  var g = (studentData.group || '').trim();
  return LS_PREFIX + '__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = LS_PREFIX + '__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var rb    = document.getElementById('restoreBar');
  if (name && group && loadSession(name, group)) {
    rb.style.display = 'block';
  } else {
    rb.style.display = 'none';
  }
}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(src, i) {
        if (!src) return;
        var pp = document.getElementById('pp' + i);
        if (pp) { pp.src = src; pp.style.display = 'block'; }
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.display = 'none';
      });
    }
  }, 200);
}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   MC INTERACTION
   ================================================ */
function selectMC(probIdx, optIdx) {
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[optIdx].classList.add('pending');
  opts[optIdx].dataset.pendingIdx = optIdx;
  var fb = document.getElementById('fb' + probIdx);
  fb.className = 'mcfb show';
  fb.style.background = 'var(--gold-bg)';
  fb.style.color = 'var(--gold)';
  fb.innerHTML = '¿Seguro? Toca de nuevo para confirmar.';
  opts[optIdx].onclick = function() { confirmMC(probIdx, optIdx); };
}

function confirmMC(probIdx, optIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null && prob.studentChoice !== undefined) return;
  prob.studentChoice = optIdx;
  var isOk = (optIdx === prob.correctIdx);
  if (isOk) correctCount++; else {}
  answeredCount++;
  var card = document.getElementById('pc' + probIdx);
  card.classList.add(isOk ? 'ok' : 'bad');
  var opts = card.querySelectorAll('.mcopt');
  opts.forEach(function(o, i) {
    o.classList.remove('pending');
    o.classList.add('dis');
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === optIdx && !isOk) o.classList.add('sw');
    if (i === optIdx && isOk)  o.classList.add('sc');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  fb.style.background = '';
  fb.style.color = '';
  fb.innerHTML = (isOk ? '✓ Correcto. ' : '✗ Incorrecto. ') + (prob.explanation || '');
  saveSession();
  updateProgress();
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');

  // Pen / Marker / Eraser buttons
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });

  // Color dots
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });

  // Clear button
  var clrBtn = tb.querySelector('.clrbtn');
  if (clrBtn) {
    clrBtn.addEventListener('click', function() {
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
      saveSession();
    });
  }

  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e) {
    e.preventDefault();
    if (!drawing) return;
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p[0], p[1]); ctx.stroke();
    lx = p[0]; ly = p[1];
  }
  function onUp() { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove',  onMove, { passive: false });
  canvas.addEventListener('touchend',   onUp);
}

function handlePhoto(i, input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var pp = document.getElementById('pp' + i);
    var pz = document.getElementById('pz' + i);
    pp.src = e.target.result;
    pp.style.display = 'block';
    pz.style.display = 'none';
    saveSession();
  };
  reader.readAsDataURL(input.files[0]);
}

  var pbody = btn.closest('.pbody');
  pbody.querySelectorAll('.wtab').forEach(function(t) { t.classList.remove('active'); });

  document.getElementById(panelId).classList.add('active');
}

  var PW      = 215.9;

  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;

  var dateStr = new Date().toLocaleString('es-MX', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')

    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Series de Tiempo  ·  Modelos MA(q)', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  // Footer
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('ucol_ma_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar resultados PDF';
  btn.disabled  = false;
}

/* ================================================
   buildLesson — CONTENIDO MA(q)
   ================================================ */
function buildLesson(rng) {
  var body = document.getElementById('lessonBody');
  body.innerHTML = '';
  problems = [];

  /* ── helpers ── */
  function addSection(tag, title, html) {
    var s = document.createElement('div');
    s.className = 'section';
    s.innerHTML = '<div class="stag">' + tag + '</div>' +
                  '<h2>' + title + '</h2>' + html;
    body.appendChild(s);
  }

  /* ── SECCIÓN 1: ¿Qué es un modelo MA? ── */
  addSection('Concepto', '¿Qué es un modelo de Media Móvil?',
    '<p>En la guía anterior viste que un modelo <strong>AR(p)</strong> explica el valor actual de una serie usando sus <em>valores pasados</em>. Un modelo <strong>MA(q)</strong> toma un camino distinto: explica el valor actual de la serie usando los <em>errores pasados</em> (también llamados innovaciones o choques).</p>' +
    '<p>La idea central es que cualquier "sorpresa" (error de predicción) en el pasado sigue afectando la serie durante algunos periodos antes de desvanecerse por completo.</p>' +
    '<div class="callout"><p><strong>Intuición:</strong> Imagina que hubo un error en el reporte de inventarios de una empresa. Ese dato incorrecto (ε<sub>t</sub>) afecta las decisiones de hoy y quizás de mañana — pero en cuanto se corrige, su efecto desaparece por completo. Un modelo MA captura exactamente eso: el impacto de una sorpresa pasada que dura exactamente q periodos y luego se extingue. No decae gradualmente — se extingue abruptamente. Esa extinción abrupta es precisamente lo que distingue MA de AR.</p></div>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Modelo MA(1)</div>' +
        '<div class="rform">y<sub>t</sub> = &mu; + &epsilon;<sub>t</sub> + &theta;&#8321;&epsilon;<sub>t&#8722;1</sub></div>' +
        '<div class="rnote">Un solo choque pasado</div></div>' +
      '<div class="rcard"><div class="rname">Modelo MA(2)</div>' +
        '<div class="rform">y<sub>t</sub> = &mu; + &epsilon;<sub>t</sub> + &theta;&#8321;&epsilon;<sub>t&#8722;1</sub> + &theta;&#8322;&epsilon;<sub>t&#8722;2</sub></div>' +
        '<div class="rnote">Dos choques pasados</div></div>' +
      '<div class="rcard"><div class="rname">Modelo MA(q)</div>' +
        '<div class="rform">y<sub>t</sub> = &mu; + &epsilon;<sub>t</sub> + &theta;&#8321;&epsilon;<sub>t&#8722;1</sub> + &hellip; + &theta;<sub>q</sub>&epsilon;<sub>t&#8722;q</sub></div>' +
        '<div class="rnote">q choques pasados</div></div>' +
    '</div>' +
    '<p style="margin-top:.8rem">Donde <span style="font-family:\'IBM Plex Mono\',monospace;color:var(--green-dark)">&epsilon;<sub>t</sub></span> es el error en el periodo t (ruido blanco: media cero, varianza constante) y <span style="font-family:\'IBM Plex Mono\',monospace;color:var(--green-dark)">&theta;</span> (theta) son los coeficientes MA que miden el peso de cada choque pasado.</p>'
  );

  /* ── PROBLEMA 1 ── */
  (function() {
    var thetaVals = [0.3, 0.4, 0.5, 0.6, 0.7, -0.3, -0.4, -0.5, -0.6];
    var theta1 = thetaVals[Math.floor(rng() * thetaVals.length)];
    var thetaStr = (theta1 > 0 ? '+' : '') + theta1.toFixed(1);
    var options = [
      'Los valores pasados de y<sub>t</sub>',
      'Los errores (choques) pasados &epsilon;<sub>t&#8722;k</sub>',
      'Las primeras diferencias de y<sub>t</sub>',
      'Los coeficientes autorregresivos'
    ];
    var correct = 'Los errores (choques) pasados &epsilon;<sub>t&#8722;k</sub>';
    var shuffled = shuffle(options, rng);
    var correctIdx = shuffled.indexOf(correct);
    var prob = {
      title: 'Componentes de un MA(1)',
      questionText: 'Considera el modelo: y<sub>t</sub> = 0.8 ' + thetaStr + '&epsilon;<sub>t&#8722;1</sub> + &epsilon;<sub>t</sub>. ¿Sobre qué tipo de información se construye la predicción en un modelo MA?',
      formula: 'y_t = μ + ε_t ' + (theta1 >= 0 ? '+' : '') + theta1.toFixed(1) + '·ε_{t-1}',
      options: shuffled,
      correctIdx: correctIdx,
      hint: 'Observa la fórmula: ¿qué aparece en el lado derecho además del error actual ε_t?',
      explanation: 'Un modelo MA se construye sobre <strong>los errores pasados</strong>. En MA(1), solo el choque de ayer (ε_{t-1}) afecta el valor de hoy. Esto lo distingue del AR(p), que usa valores pasados de y.',
      studentChoice: null,
      noWork: true
    };
    problems.push(prob);
    buildOneCard(prob, problems.length - 1);
  })();

  /* ── SECCIÓN 2: Coeficientes theta y su interpretación ── */
  addSection('Interpretación', '¿Qué nos dicen los coeficientes &theta;?',
    '<p>Los coeficientes &theta; miden cuánto y en qué dirección afecta cada choque pasado a la serie. Un &theta; positivo significa que un choque positivo eleva el nivel de la serie en el siguiente periodo; uno negativo lo reduce.</p>' +
    '<div class="callout"><p><strong>Invertibilidad:</strong> Para que el modelo sea identificable y tenga una representación AR equivalente, se requiere que los coeficientes &theta; cumplan ciertas condiciones. En el caso MA(1), la condición es simple: |&theta;&#8321;| &lt; 1. Nota: los modelos MA son <em>siempre</em> estacionarios, independientemente del valor de &theta;.</p></div>' +
    '<canvas id="maAnim" width="700" height="200" style="width:100%;border:1px solid var(--border);border-radius:8px;background:var(--surface);margin:1rem 0;display:block"></canvas>' +
    '<div style="display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap">' +
      '<button class="mtab active" onclick="setMATheta(0, this)">θ = 0 (sin efecto)</button>' +
      '<button class="mtab" onclick="setMATheta(0.7, this)">θ = +0.7</button>' +
      '<button class="mtab" onclick="setMATheta(-0.7, this)">θ = −0.7</button>' +
    '</div>' +
    '<p style="font-size:.82rem;color:var(--text3)" id="maAnimDesc">θ = 0: el choque pasado no tiene ningún efecto — la serie es ruido blanco puro.</p>'
  );

  /* ── PROBLEMA 2 ── */
  (function() {
    var scenarios = [
      { theta: 0.8,  sign: 'positivo', correct: 0 },
      { theta: -0.6, sign: 'negativo', correct: 1 },
      { theta: 1.2,  sign: 'mayor que 1 en valor absoluto', correct: 2 }
    ];
    var sc = scenarios[Math.floor(rng() * scenarios.length)];
    var options = [
      'Sí, el modelo es invertible',
      'Sí, pero solo si la serie es estacionaria',
      'No, porque |θ| debe ser menor que 1 para MA(1)',
      'No importa, todos los MA son invertibles por definición'
    ];
    var corr = sc.theta <= 1 && sc.theta > 0 ? options[0] :
               sc.theta < 0 && sc.theta >= -1 ? options[0] :
               options[2];
    var shuffled = shuffle(options, rng);
    var correctIdx = shuffled.indexOf(corr);
    var thetaDisp = sc.theta > 0 ? '+' + sc.theta : '' + sc.theta;
    var prob = {
      title: 'Condición de invertibilidad',
      questionText: 'Un analista estima un modelo MA(1) y obtiene &theta;&#8321; = ' + thetaDisp + '. ¿Es invertible este modelo?',
      formula: 'MA(1) invertible si: |θ₁| < 1',
      options: shuffled,
      correctIdx: correctIdx,
      hint: 'Verifica si el valor absoluto de θ₁ es menor que 1.',
      explanation: corr === options[0]
        ? 'Correcto. |' + thetaDisp + '| < 1, por lo que el modelo MA(1) es invertible.'
        : 'No es invertible. La condición para MA(1) es |θ₁| < 1. Con θ₁ = ' + thetaDisp + ', |θ₁| = ' + Math.abs(sc.theta) + ' ≥ 1, lo que viola la condición.',
      studentChoice: null,
      noWork: true
    };
    problems.push(prob);
    buildOneCard(prob, problems.length - 1);
  })();

  /* ── SECCIÓN 3: La huella de MA en la ACF y la PACF ── */
  addSection('Identificación', 'La huella de MA en la ACF y la PACF',
    '<p>La forma más importante de distinguir un proceso MA de un AR es observar sus correlogramas. Los procesos MA tienen una firma característica que los hace reconocibles:</p>' +
    '<table class="ctable">' +
      '<thead><tr><th>Modelo</th><th>ACF</th><th>PACF</th></tr></thead>' +
      '<tbody>' +
        '<tr><td class="hleft">AR(p)</td><td>Decae gradualmente (exponencial u oscilante)</td><td>Se vuelve no significativa después del rezago p</td></tr>' +
        '<tr><td class="hleft">MA(q)</td><td>Se vuelve no significativa después del rezago q</td><td>Decae gradualmente (exponencial u oscilante)</td></tr>' +
        '<tr><td class="hleft">ARMA(p,q)</td><td>Decae gradualmente después del rezago q</td><td>Decae gradualmente después del rezago p</td></tr>' +
      '</tbody>' +
    '</table>' +
    '<div class="callout"><p><strong>Regla de oro:</strong> Si la ACF <em>se vuelve no significativa</em> después del rezago q (las barras ya no cruzan los límites) y la PACF <em>decae</em> suavemente → el proceso es MA(q). El orden q es el último rezago significativo de la ACF.</p></div>' +
    '<canvas id="acfAnim" width="700" height="220" style="width:100%;border:1px solid var(--border);border-radius:8px;background:var(--surface);margin:.8rem 0;display:block"></canvas>' +
    '<canvas id="acfAnimPACF" width="700" height="220" style="width:100%;border:1px solid var(--border);border-radius:8px;background:var(--surface);margin-top:.5rem;display:none"></canvas>' +
    '<div style="display:flex;gap:.5rem;flex-wrap:wrap">' +
      '<button class="mtab active" onclick="setACFView(\'ma1\', this)">ACF de MA(1)</button>' +
      '<button class="mtab" onclick="setACFView(\'ma2\', this)">ACF de MA(2)</button>' +
      '<button class="mtab" onclick="setACFView(\'ar1\', this)">ACF + PACF de AR(1)</button>' +
    '</div>'
  );

  /* ── PROBLEMA 3 ── */
  (function() {
    var cases = [
      { desc: 'La ACF se vuelve no significativa después del rezago 1, y la PACF decae gradualmente', correct: 'MA(1)', opts: ['MA(1)', 'AR(1)', 'ARMA(1,1)', 'Ruido blanco'] },
      { desc: 'La ACF se vuelve no significativa después del rezago 2, y la PACF decae gradualmente', correct: 'MA(2)', opts: ['MA(2)', 'AR(2)', 'MA(1)', 'ARMA(2,0)'] },
      { desc: 'La PACF se vuelve no significativa después del rezago 1, y la ACF decae gradualmente', correct: 'AR(1)', opts: ['AR(1)', 'MA(1)', 'ARMA(1,1)', 'MA(2)'] }
    ];
    var c = cases[Math.floor(rng() * cases.length)];
    var shuffled = shuffle(c.opts, rng);
    var correctIdx = shuffled.indexOf(c.correct);
    var prob = {
      title: 'Lectura de correlogramas',
      questionText: 'Analizas los correlogramas de una serie estacionaria y observas lo siguiente: <strong>' + c.desc + '</strong>. ¿Qué tipo de proceso es más probable?',
      options: shuffled,
      correctIdx: correctIdx,
      hint: 'Recuerda la tabla: en MA, la ACF se vuelve no significativa después del rezago q; en AR, es la PACF la que se vuelve no significativa.',
      explanation: 'El patrón descrito corresponde a un proceso <strong>' + c.correct + '</strong>. ' +
        (c.correct.startsWith('MA') ? 'Cuando la ACF se vuelve no significativa después del rezago q y la PACF decae, el proceso es MA(q).' :
         'Cuando la PACF se vuelve no significativa después del rezago p y la ACF decae, el proceso es AR(p).'),
      studentChoice: null,
      noWork: true
    };
    problems.push(prob);
    buildOneCard(prob, problems.length - 1);
  })();

  /* ── SECCIÓN 4: Estimación en R ── */
  addSection('Aplicación en R', 'Ajustar un modelo MA(q) con arima()',
    '<p>En R, el modelo MA se ajusta con la misma función <code style="background:var(--surface2);padding:.1em .35em;border-radius:4px;font-size:.88em;color:var(--green-dark)">arima()</code> que usarás para el modelo completo ARIMA. La clave está en los argumentos del orden:</p>' +
    '<div class="rcard" style="margin:1rem 0">' +
      '<div class="rname">Sintaxis en R</div>' +
      '<div class="rform">modelo &lt;- arima(serie, order = c(p, d, q))</div>' +
      '<div class="rnote">Para un MA puro: p = 0, d = 0, q = orden MA</div>' +
    '</div>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">MA(1) puro</div>' +
        '<div class="rform">arima(y, order=c(0,0,1))</div>' +
        '<div class="rnote">Solo un choque pasado</div></div>' +
      '<div class="rcard"><div class="rname">MA(2) puro</div>' +
        '<div class="rform">arima(y, order=c(0,0,2))</div>' +
        '<div class="rnote">Dos choques pasados</div></div>' +
      '<div class="rcard"><div class="rname">Ver residuos</div>' +
        '<div class="rform">tsdiag(modelo)</div>' +
        '<div class="rnote">ACF residual + Ljung-Box</div></div>' +
    '</div>' +
    '<div class="callout"><p><strong>Diagnóstico:</strong> Igual que en AR, tras ajustar un MA debes verificar que los residuos sean ruido blanco. Si la ACF de los residuos muestra barras significativas, considera aumentar el orden q.</p></div>'
  );

  /* ── PROBLEMA 4 ── */
  (function() {
    var qOrders = [1, 2, 3];
    var q = qOrders[Math.floor(rng() * qOrders.length)];
    var options = [
      'arima(serie, order=c(0,0,' + q + '))',
      'arima(serie, order=c(' + q + ',0,0))',
      'arima(serie, order=c(0,' + q + ',0))',
      'ma(serie, q=' + q + ', ar=FALSE)'
    ];
    var correct = options[0];
    var shuffled = shuffle(options, rng);
    var correctIdx = shuffled.indexOf(correct);
    var prob = {
      title: 'Sintaxis en R para MA(' + q + ')',
      questionText: 'La ACF de tu serie se vuelve no significativa después del rezago ' + q + ' y la PACF decae gradualmente. Decides ajustar un MA(' + q + ') puro. ¿Cuál es el comando correcto en R?',
      formula: 'MA(' + q + ') → order = c(p=0, d=0, q=' + q + ')',
      options: shuffled,
      correctIdx: correctIdx,
      hint: 'En la función arima(), los tres argumentos del order son: (p, d, q). Para un MA puro, p=0 y d=0.',
      explanation: 'El comando correcto es <code>arima(serie, order=c(0,0,' + q + '))</code>. El primer valor es p (AR=0), el segundo es d (diferenciación=0), el tercero es q (MA=' + q + ').',
      studentChoice: null,
      noWork: true
    };
    problems.push(prob);
    buildOneCard(prob, problems.length - 1);
  })();

  /* ── SECCIÓN 5: AR vs MA — ¿cuándo usar cada uno? ── */
  addSection('Síntesis', 'AR vs. MA: ¿cómo elegir el modelo correcto?',
    '<p>Con AR(p) y MA(q) en tu caja de herramientas, el paso clave antes de estimar es identificar correctamente qué tipo de proceso genera tu serie. La tabla ACF/PACF es tu principal guía:</p>' +
    '<table class="ctable">' +
      '<thead><tr><th>¿Qué observas en la ACF?</th><th>¿Qué observas en la PACF?</th><th>Modelo sugerido</th></tr></thead>' +
      '<tbody>' +
        '<tr><td>Decae gradualmente</td><td>Se corta en rezago p</td><td class="hleft">AR(p)</td></tr>' +
        '<tr><td>Se corta en rezago q</td><td>Decae gradualmente</td><td class="hleft">MA(q)</td></tr>' +
        '<tr><td>Decae gradualmente</td><td>Decae gradualmente</td><td class="hleft">ARMA(p,q)</td></tr>' +
        '<tr><td>Sin barras significativas</td><td>Sin barras significativas</td><td class="hleft">Ruido blanco</td></tr>' +
      '</tbody>' +
    '</table>' +
    '<div class="callout"><p><strong>Siguiente paso:</strong> Cuando ninguno de los dos modelos puros (AR o MA) ajusta bien, necesitas combinarlos. Eso es precisamente lo que hace el modelo <strong>ARMA(p,q)</strong>, que verás en la siguiente guía.</p></div>'
  );

  /* ── PROBLEMA 5 ── */
  (function() {
    var scenarios = [
      {
        context: 'La ACF de una serie de retornos bursátiles muestra una barra significativa solo en el rezago 1, y luego se vuelve no significativa. La PACF decae exponencialmente.',
        correct: 'Ajustar un MA(1): arima(y, order=c(0,0,1))',
        opts: [
          'Ajustar un MA(1): arima(y, order=c(0,0,1))',
          'Ajustar un AR(1): arima(y, order=c(1,0,0))',
          'Ajustar un ARMA(1,1): arima(y, order=c(1,0,1))',
          'No ajustar ningún modelo; la serie es ruido blanco'
        ]
      },
      {

/* ================================================
   DIBUJO — Par ACF/PACF para identificación
   ================================================ */
function drawDiagChallenge(c) {
  var container = document.getElementById('diagChallenge');
  if (!container) return;
  container.innerHTML = '';

  var types = ['ACF', 'PACF'];
  types.forEach(function(panelType) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'margin-bottom:.7rem';
    var cv = document.createElement('canvas');
    cv.style.cssText = 'width:100%;border:1px solid var(--border);border-radius:8px;background:var(--surface);display:block';
    cv.height = 180;
    wrap.appendChild(cv);
    container.appendChild(wrap);

    var dpr = window.devicePixelRatio || 1;
    cv.width  = cv.offsetWidth * dpr || 600 * dpr;
    cv.height = 180;
    var ctx = cv.getContext('2d');
    ctx.scale(dpr, 1);
    var w = cv.offsetWidth || 600;
    var H = 180;

    // Calcular ACF teórica
    var lags = 10;
    var acf = [];
    var t1 = c.theta1, t2 = c.theta2;
    var denom = 1 + t1*t1 + t2*t2;

    if (c.type === 'wn') {
      for (var k = 0; k <= lags; k++) acf[k] = (k===0) ? 1 : 0;
    } else if (c.type === 'ma1' || c.type === 'ma1neg') {
      acf[0] = 1;
      acf[1] = t1 / (1 + t1*t1);
      for (var k = 2; k <= lags; k++) acf[k] = 0;
    } else {
      acf[0] = 1;
      acf[1] = (t1 + t1*t2) / denom;
      acf[2] = t2 / denom;
      for (var k = 3; k <= lags; k++) acf[k] = 0;
    }

    // PACF via Durbin-Levinson simplificado
    var pacf = [0, acf[1]];
    var phi = [[0, acf[1]]];
    for (var k = 2; k <= lags; k++) {
      var num = acf[k];
      for (var j = 1; j < k; j++) num -= phi[k-1] && phi[k-1][j] ? phi[k-1][j] * acf[k-j] : 0;
      var den = 1;
      for (var j2 = 1; j2 < k; j2++) den -= phi[k-1] && phi[k-1][j2] ? phi[k-1][j2] * acf[j2] : 0;
      pacf[k] = den !== 0 ? num / den : 0;
      phi[k] = [];
      for (var j3 = 1; j3 < k; j3++) {
        phi[k][j3] = (phi[k-1] && phi[k-1][j3] ? phi[k-1][j3] : 0) - pacf[k] * (phi[k-1] && phi[k-1][k-j3] ? phi[k-1][k-j3] : 0);
      }
      phi[k][k] = pacf[k];
    }

    var vals = panelType === 'ACF' ? acf : pacf;

    // Dibujar
    var css = function(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); };
    ctx.fillStyle = css('--surface') || '#fff';
    ctx.fillRect(0, 0, w, H);

    var mL = 42, mR = 16, mT = 28, mB = 30;
    var pW = w - mL - mR, pH = H - mT - mB;
    var midY = mT + pH / 2;
    var stepX = pW / (lags + 1);
    var sig = 0.26; // ~2/sqrt(60)

    // Ejes
    ctx.strokeStyle = css('--border') || '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mL, mT); ctx.lineTo(mL, mT + pH);
    ctx.moveTo(mL, midY); ctx.lineTo(mL + pW, midY);
    ctx.stroke();

    // Líneas de significancia
    ctx.strokeStyle = css('--gold') || '#c9a84c';
    ctx.setLineDash([4,4]); ctx.lineWidth = 1;
    [sig, -sig].forEach(function(s) {
      var y = midY - s * (pH / 2) / 1;
      ctx.beginPath(); ctx.moveTo(mL, y); ctx.lineTo(mL + pW, y); ctx.stroke();
    });
    ctx.setLineDash([]);

    // Barras
    for (var k = 1; k <= lags; k++) {
      var x = mL + k * stepX;
      var v = Math.max(-1, Math.min(1, vals[k] || 0));
      // Añadir pequeño ruido visual para que no parezca demasiado teórico
      var noise = (Math.sin(k * 17.3 + (c.theta1||0) * 5.1) * 0.04);
      if (c.type !== 'wn' || k > 2) v += noise;
      var barH = v * (pH / 2);
      var isSign = Math.abs(v) > sig;
      ctx.fillStyle = isSign ? (css('--green') || '#4a7c3f') : (css('--surface2') || '#f0ede6');
      ctx.strokeStyle = isSign ? (css('--green-dark') || '#2d5a27') : (css('--border') || '#ddd');
      ctx.lineWidth = 0.5;
      if (barH >= 0) {
        ctx.fillRect(x - 7, midY - barH, 14, barH);
        ctx.strokeRect(x - 7, midY - barH, 14, barH);
      } else {
        ctx.fillRect(x - 7, midY, 14, -barH);
        ctx.strokeRect(x - 7, midY, 14, -barH);
      }
      ctx.fillStyle = css('--text3') || '#aaa';
      ctx.font = '10px IBM Plex Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(k, x, mT + pH + 18);
    }

    // Etiquetas eje Y
    ctx.save();
    ctx.translate(13, midY);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle = css('--text3') || '#aaa';
    ctx.font = '10px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(panelType, 0, 0);
    ctx.restore();

    // Valores eje Y (+1, 0, -1)
    [1, 0, -1].forEach(function(v) {
      var y = midY - v * (pH / 2);
      ctx.fillStyle = css('--text3') || '#aaa';
      ctx.font = '9px IBM Plex Mono, monospace';
      ctx.textAlign = 'right';
      ctx.fillText(v, mL - 4, y + 3);
    });

    // Título
    ctx.fillStyle = css('--text2') || '#555';
    ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(panelType + ' — n = 60', mL + 4, mT - 8);
  });

  var desc = document.getElementById('diagDesc');
  if (desc) desc.textContent = 'Las líneas doradas punteadas son los límites de significancia (±2/√n). Barras verdes = significativas.';
}

var currentMATheta = 0.7;
function setMATheta(theta, btn) {
  currentMATheta = theta;
  document.querySelectorAll('.mtab').forEach(function(b) {
    if (b.onclick && b.onclick.toString().includes('setMATheta')) b.classList.remove('active');
  });
  btn.classList.add('active');
  var desc = document.getElementById('maAnimDesc');
  if (theta === 0) desc.textContent = 'θ = 0: el choque pasado no tiene ningún efecto — la serie es ruido blanco puro.';
  else if (theta > 0) desc.textContent = 'θ positivo: un choque positivo en t-1 eleva también el valor en t.';
  else desc.textContent = 'θ negativo: un choque positivo en t-1 reduce el valor en t (efecto de corrección).';
  drawMAImpulse(theta);
}

function drawMAImpulse(theta) {
  var canvas = document.getElementById('maAnim');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var dpr = window.devicePixelRatio || 1;
  canvas.width  = canvas.offsetWidth  * dpr;
  canvas.height = H;
  ctx.clearRect(0, 0, canvas.width, H);
  ctx.scale(dpr, 1);
  var w = canvas.offsetWidth;

  var n = 20;
  var mid = H / 2;
  var shock = 40;  // impulso en t=5
  var series = [];
  for (var t = 0; t < n; t++) {
    var eps_t   = (t === 5) ? shock : 0;
    var eps_tm1 = (t === 6) ? shock : 0;
    series.push(eps_t + theta * eps_tm1);
  }

  // fondo
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#fff';
  ctx.fillRect(0, 0, w, H);

  // eje
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#ddd';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, mid); ctx.lineTo(w - 10, mid); ctx.stroke();
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text3').trim() || '#aaa';
  ctx.font = '11px IBM Plex Mono, monospace';
  ctx.fillText('t', w - 15, mid + 4);

  // serie
  var stepX = (w - 50) / (n - 1);
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#4a7c3f';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (var t2 = 0; t2 < n; t2++) {
    var x = 30 + t2 * stepX;
    var y = mid - series[t2];
    if (t2 === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // puntos
  for (var t3 = 0; t3 < n; t3++) {
    var x2 = 30 + t3 * stepX;
    var y2 = mid - series[t3];
    ctx.beginPath();
    ctx.arc(x2, y2, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = (t3 === 5)
      ? (getComputedStyle(document.documentElement).getPropertyValue('--gold').trim() || '#c9a84c')
      : (getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#4a7c3f');
    ctx.fill();
  }

  // etiqueta choque
  var shockX = 30 + 5 * stepX;
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--gold').trim() || '#c9a84c';
  ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
  ctx.fillText('ε choque', shockX - 20, mid - shock - 8);

  // etiqueta θ
  if (theta !== 0) {
    var echoX = 30 + 6 * stepX;
    var echoY = mid - theta * shock;
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--green-dark').trim() || '#2d5a27';
    ctx.font = '11px IBM Plex Sans, sans-serif';
    ctx.fillText('θ·ε', echoX - 10, echoY - 8);
  }
}

function drawACFPanel(type) {
  var canvas = document.getElementById('acfAnim');
  var canvas2 = document.getElementById('acfAnimPACF');
  if (!canvas) return;

  // Show/hide second canvas
  canvas2.style.display = type === 'ar1' ? 'block' : 'none';

  var lags = 12;
  var acf = [], pacf = [];

  if (type === 'ma1') {
    var t1 = 0.7;
    acf[0] = 1;
    acf[1] = t1 / (1 + t1*t1);
    for (var k = 2; k <= lags; k++) acf[k] = 0;
    // PACF of MA(1): decays geometrically — φ_kk = -(-θ)^k / (1-θ^(2k+2))/(1-θ^2)
    // Use numerical approximation: first few terms
    pacf[0] = 0; pacf[1] = acf[1];
    var r = acf[1];
    for (var k = 2; k <= lags; k++) pacf[k] = -Math.pow(-t1, k) * (1 - t1*t1) / (1 - Math.pow(t1, 2*(k+1)));
  } else if (type === 'ma2') {
    var t1 = 0.7, t2 = 0.4;
    var denom = 1 + t1*t1 + t2*t2;
    acf[0] = 1;
    acf[1] = (t1 + t1*t2) / denom;
    acf[2] = t2 / denom;
    for (var k = 3; k <= lags; k++) acf[k] = 0;
    pacf[0] = 0; pacf[1] = acf[1];
    for (var k = 2; k <= lags; k++) pacf[k] = (k <= 4) ? acf[k] * 0.6 * Math.pow(-0.5, k-2) : acf[k] * 0.2;
  } else {
    // AR(1) φ=0.7: ACF decays geometrically, PACF cuts off at lag 1
    acf[0] = 1;
    for (var k = 1; k <= lags; k++) acf[k] = Math.pow(0.7, k);
    pacf[0] = 0; pacf[1] = 0.7;
    for (var k = 2; k <= lags; k++) pacf[k] = 0;
  }

  function drawPanel(cv, vals, panelLabel, titleLabel) {
    var dpr = window.devicePixelRatio || 1;
    cv.width  = cv.offsetWidth * dpr;
    cv.height = 220;
    var ctx = cv.getContext('2d');
    ctx.scale(dpr, 1);
    var w = cv.offsetWidth;
    var H = 220;
    var css = function(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); };

    ctx.fillStyle = css('--surface') || '#fff';
    ctx.fillRect(0, 0, w, H);

    var marginL = 40, marginR = 20, marginT = 30, marginB = 35;
    var plotW = w - marginL - marginR;
    var plotH = H - marginT - marginB;
    var stepX = plotW / (lags + 1);
    var midY  = marginT + plotH / 2;
    var sigLine = 0.28;

    // ejes
    ctx.strokeStyle = css('--border') || '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(marginL, marginT); ctx.lineTo(marginL, marginT + plotH);
    ctx.moveTo(marginL, midY);    ctx.lineTo(marginL + plotW, midY);
    ctx.stroke();

    // líneas de significancia
    ctx.strokeStyle = css('--gold') || '#c9a84c';
    ctx.setLineDash([4, 4]); ctx.lineWidth = 1.2;
    [-sigLine, sigLine].forEach(function(s) {
      var y = midY - s * (plotH / 2);
      ctx.beginPath(); ctx.moveTo(marginL, y); ctx.lineTo(marginL + plotW, y); ctx.stroke();
    });
    ctx.setLineDash([]);

    // barras
    for (var k = 1; k <= lags; k++) {
      var x    = marginL + k * stepX;
      var v    = Math.max(-1, Math.min(1, vals[k] || 0));
      var barH = v * (plotH / 2);
      var isSign = Math.abs(v) > sigLine;
      ctx.fillStyle = isSign ? (css('--green') || '#4a7c3f') : (css('--border') || '#ddd');
      ctx.fillRect(x - 6, midY - barH, 12, barH);
      ctx.fillStyle = css('--text3') || '#aaa';
      ctx.font = '10px IBM Plex Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(k, x, marginT + plotH + 16);
    }

    // etiqueta eje Y
    ctx.save();
    ctx.translate(14, midY);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle = css('--text3') || '#aaa';
    ctx.font = '10px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(panelLabel, 0, 0);
    ctx.restore();

    // valores Y
    [1, 0, -1].forEach(function(v) {
      var y = midY - v * (plotH / 2);
      ctx.fillStyle = css('--text3') || '#aaa';
      ctx.font = '9px IBM Plex Mono, monospace';
      ctx.textAlign = 'right';
      ctx.fillText(v, marginL - 4, y + 3);
    });

    // título
    ctx.fillStyle = css('--text2') || '#555';
    ctx.font = 'bold 12px IBM Plex Sans, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(titleLabel, marginL + 4, marginT - 8);
  }

  var acfTitle  = type === 'ma1' ? 'ACF de MA(1) con θ=0.7  — se vuelve no significativa después del rezago 1' :
                  type === 'ma2' ? 'ACF de MA(2) con θ₁=0.7, θ₂=0.4  — se vuelve no significativa después del rezago 2' :
                                   'ACF de AR(1) con φ=0.7  — decae gradualmente (muchas barras significativas)';
  var pacfTitle = 'PACF de AR(1) con φ=0.7  — se vuelve no significativa después del rezago 1';

  drawPanel(canvas,  acf,  'ACF',  acfTitle);
  if (type === 'ar1') drawPanel(canvas2, pacf, 'PACF', pacfTitle);
}
</script>
</body>
</html>
