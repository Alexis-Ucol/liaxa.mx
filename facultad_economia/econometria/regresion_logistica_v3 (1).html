<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regresión Logística — Econometría</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }

/* ── BIENVENIDA ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LECCIÓN ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENIDO ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section h3 { font-family:'Crimson Pro',serif; font-size:1.15rem; font-weight:700; margin:1.1rem 0 .5rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }
.warn-box { background:var(--gold-bg); border-left:4px solid var(--gold); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.warn-box p { margin-bottom:0; color:var(--text2); }
.warn-box strong { color:var(--gold); }

/* ── TARJETAS DE REGLAS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── TABLAS ── */
.data-table { width:100%; border-collapse:collapse; margin:.9rem 0; font-size:.84rem; overflow-x:auto; display:block; }
.data-table th { background:var(--green); color:#fff; padding:.55rem .8rem; text-align:left; font-weight:600; font-size:.78rem; }
.data-table td { padding:.5rem .8rem; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:middle; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:nth-child(even) td { background:var(--surface2); }

/* ── PASOS ── */
.step-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem 1.1rem; margin:.7rem 0; }
.step-lbl { font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--green-dark); font-weight:600; margin-bottom:.35rem; }
.step-box p { margin-bottom:.35rem; color:var(--text2); }

/* ── FÓRMULA ── */
.fhl { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.6rem 1rem; margin:.7rem 0; font-family:'IBM Plex Mono',monospace; font-size:.83rem; color:var(--green-dark); overflow-x:auto; }

/* ── FRACCIONES ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* ── TARJETAS DE PROBLEMA (base) ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; color:var(--text2); }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC (tarjetas de cálculo con dibujo) ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── ÁREA DE TRABAJO (draw/type/photo) ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── DROPDOWNS ── */
.drop-sel { background:var(--surface); border:1.5px solid var(--green); border-radius:6px; padding:.3rem .55rem; font-size:.85rem; color:var(--text); font-family:'IBM Plex Sans',sans-serif; cursor:pointer; appearance:auto; min-width:160px; }
.drop-sel:focus { outline:none; border-color:var(--gold); }
.drop-sel.correct { border-color:var(--ok); background:var(--ok-bg); color:var(--ok); }
.drop-sel.wrong   { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.drop-sel:disabled { opacity:.75; cursor:default; }
.verify-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.2rem; font-size:.86rem; font-weight:600; cursor:pointer; transition:background .16s; margin-top:.8rem; }
.verify-btn:hover { background:var(--green-dark); }
.verify-btn:disabled { opacity:.55; cursor:default; }

/* ── MATCHING ── */
.drag-bank { display:flex; flex-wrap:wrap; gap:.45rem; margin-bottom:1rem; padding:.7rem; background:var(--surface2); border-radius:8px; border:1px solid var(--border); min-height:44px; }
.drag-chip { background:var(--surface); border:1.5px solid var(--green); border-radius:6px; padding:.3rem .75rem; font-size:.82rem; cursor:grab; user-select:none; color:var(--text); transition:box-shadow .13s; }
.drag-chip:active { cursor:grabbing; box-shadow:0 3px 12px rgba(0,0,0,.18); }
.drag-chip.placed { opacity:.4; cursor:default; pointer-events:none; }
.drag-zone { border:2px dashed var(--border); border-radius:6px; min-height:36px; padding:.25rem .6rem; display:inline-flex; align-items:center; min-width:150px; font-size:.82rem; transition:border-color .14s; }
.drag-zone.drag-over { border-color:var(--green); background:var(--green-bg); }
.drag-zone.filled  { border-style:solid; border-color:var(--green); background:var(--green-bg); cursor:pointer; }
.drag-zone.correct { border-color:var(--ok) !important; background:var(--ok-bg) !important; color:var(--ok); }
.drag-zone.wrong   { border-color:var(--bad) !important; background:var(--bad-bg) !important; color:var(--bad); }
.drag-zone-lbl { font-size:.7rem; color:var(--text3); margin-bottom:.2rem; }
.match-left { font-size:.84rem; color:var(--text2); padding:.4rem .65rem; background:var(--surface2); border-radius:6px; border-left:3px solid var(--gold); }

/* ── RESULTADO ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── CSV ── */
.dsbtn { display:inline-block; background:var(--surface); border:1.5px solid var(--green); color:var(--green-dark); border-radius:8px; padding:.55rem 1.1rem; font-size:.85rem; font-weight:600; cursor:pointer; text-decoration:none; transition:all .16s; margin-top:.4rem; }
.dsbtn:hover { background:var(--green-bg); }

/* ── MOBILE ── */
@media (max-width:600px) {
  .wcard { padding:1.6rem 1.1rem; border-radius:12px; }
  .wlogos img { height:38px; }
  .wtitle { font-size:1.35rem; }
  .htitle { display:none; }
  .hlogos img { height:20px; }
  .hchip { font-size:.63rem; padding:.15rem .45rem; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
  .lbody { padding:1.2rem .7rem 3rem; }
  .section h2 { font-size:1.3rem; }
  .rules-grid { grid-template-columns:1fr; }
  .pbody { padding:.75rem; }
  .pstmt { font-size:.84rem; }
  .mcopt { font-size:.83rem; padding:.58rem .7rem; }
  .dcanvas { height:220px; }
  .ctoolbar { gap:.25rem; }
  .callout { padding:.8rem .9rem; }
  .rcard { overflow-x:auto; }
  .drop-sel { min-width:120px; }
  .drag-chip { font-size:.78rem; }
}
</style>
</head>

/* ═══════════════════════════════════════════════
   SESIÓN
   ═══════════════════════════════════════════════ */
function lsKey(){
  return LS_PREFIX+'__'+(studentData.name+'__'+studentData.group).replace(/\s+/g,'_');
}
function saveSession(){
  if(!studentData.name) return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){
      var bl=document.createElement('canvas'); bl.width=dc.width; bl.height=dc.height;
      drawings.push(dc.toDataURL()===bl.toDataURL()?null:dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta=document.getElementById('ta'+i); texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);
    photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,
    answeredCount:answeredCount,correctCount:correctCount,
    choices:problems.map(function(p){return p.studentChoice!==undefined?p.studentChoice:null;}),
    drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}
function loadSession(name,group){
  var key=LS_PREFIX+'__'+(name+'__'+group).replace(/\s+/g,'_');
  try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}
}
function checkForSavedSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var saved=loadSession(name,group);
  document.getElementById('restoreBar').style.display=
    (saved&&saved.answeredCount>0)?'block':'none';
}
function restoreSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  document.getElementById('restoreBar').style.display='none';
  launchLesson(name,group,true);
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}

  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';

    }}catch(e){}
})();

/* ═══════════════════════════════════════════════
   RNG
   ═══════════════════════════════════════════════ */
function seededRng(seed){
  var s=0;for(var i=0;i<seed.length;i++) s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

/* ═══════════════════════════════════════════════
   INICIO
   ═══════════════════════════════════════════════ */
function startLesson(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!name||!group){err.textContent='Por favor ingresa tu nombre y grupo.';return;}
  err.textContent='';
  launchLesson(name,group,false);
}
function launchLesson(name,group,restore){
  studentData={name:name,group:group};
  answeredCount=0;correctCount=0;problems=[];
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});
  },{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  if(restore){
    var saved=loadSession(name,group);
    if(saved){
      setTimeout(function(){
        saved.choices.forEach(function(choice,idx){
          if(choice!==null&&choice!==undefined){
            var p=problems[idx];
            if(p&&p.type==='mc') confirmMC(idx,choice);
          }
        });
        if(saved.drawings){saved.drawings.forEach(function(d,i){if(!d)return;var dc=document.getElementById('dc'+i);if(!dc||!dc.width)return;var img=new Image();img.onload=function(){var dpr=window.devicePixelRatio||1;dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr);};img.src=d;});}
        if(saved.texts){saved.texts.forEach(function(t,i){if(!t)return;var ta=document.getElementById('ta'+i);if(ta)ta.value=t;});}
        if(saved.photos){saved.photos.forEach(function(d,i){if(!d)return;var pp=document.getElementById('pp'+i);if(!pp)return;pp.src=d;pp.style.display='block';var pz=document.getElementById('pz'+i);if(pz)pz.style.opacity='0.4';});}
      },350);
    }
  }
}

/* ═══════════════════════════════════════════════
   CANVAS
   ═══════════════════════════════════════════════ */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr); ctx.strokeStyle='#2d5a27'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on'); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen')){ctx.lineWidth=2;}
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});
      dot.classList.add('sel'); ctx.strokeStyle=dot.dataset.color;
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}
function switchTab(idx,panel,btn){
  var prefix='wp_'+idx+'_';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){p.classList.remove('active');});
  document.getElementById(prefix+panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
function handlePhoto(idx,input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){var img=document.getElementById('pp'+idx);img.src=e.target.result;img.style.display='block';document.getElementById('pz'+idx).style.opacity='0.4';saveSession();};
  reader.readAsDataURL(input.files[0]);
}

function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx; prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){
      if(i===prob.correctIdx)o.classList.add('rc');
      if(i===chosenIdx&&isOk)o.classList.add('sc');
      if(i===chosenIdx&&!isOk)o.classList.add('sw');
    });
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;
    answeredCount++;
    updateProgress();
    return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx; prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){
    if(i===prob.correctIdx)o.classList.add('rc');
    if(i===chosenIdx&&isOk)o.classList.add('sc');
    if(i===chosenIdx&&!isOk)o.classList.add('sw');
  });
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;
  answeredCount++;
  updateProgress();
}

      '<button class="verify-btn" id="vbtn'+i+'" onclick="verifyDrop('+i+')" disabled>Verificar</button>'+
      '<div class="mcfb" id="fb'+i+'"></div>'+

}
function checkDropReady(idx){
  var p=problems[idx]; if(!p)return;
  var allFilled=p.items.every(function(_,k){var s=document.getElementById('ds_'+idx+'_'+k);return s&&s.value!=='';});
  var btn=document.getElementById('vbtn'+idx); if(btn)btn.disabled=!allFilled;
}
function verifyDrop(idx){
  var p=problems[idx]; if(!p||p.studentChoice!==null)return;
  var allOk=true;
  p.items.forEach(function(it,k){
    var sel=document.getElementById('ds_'+idx+'_'+k); if(!sel)return;
    sel.disabled=true;
    var ok=(sel.value===it.correct);
    sel.className='drop-sel '+(ok?'correct':'wrong');
    if(!ok)allOk=false;
  });
  var fb=document.getElementById('fb'+idx);
  fb.innerHTML=(allOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Revisa las respuestas.</strong> ')+escH(p.explanation);
  fb.className='mcfb show '+(allOk?'fbok':'fbbad');
  document.getElementById('pc'+idx).classList.add(allOk?'ok':'bad');
  document.getElementById('vbtn'+idx).disabled=true;
  p.studentChoice=allOk?1:0;
  if(allOk)correctCount++;
  answeredCount++;
  updateProgress();
}

var _activeChipId=null;
function buildMatchProblem(cfg,globalIdx){
  var i=globalIdx;
  var card=document.createElement('div');
  card.className='pcrd section'; card.id='pc'+i;
  var bankHtml=cfg.chipPool.map(function(c,ci){
    return '<div class="drag-chip" id="chip_'+i+'_'+ci+'" draggable="true" '+
      'ondragstart="dragStart(event,\''+i+'_'+ci+'\')" onclick="chipTap(\''+i+'_'+ci+'\','+i+')" '+
      'data-val="'+escH(c)+'">'+c+'</div>';
  }).join('');
  var zonesHtml=cfg.pairs.map(function(pair,zi){
    return '<div style="display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.55rem;flex-wrap:wrap">'+
      '<div class="match-left" style="flex:1;min-width:150px">'+pair.left+'</div>'+
      '<div><div class="drag-zone-lbl">Arrastra aquí:</div>'+
      '<div class="drag-zone" id="zone_'+i+'_'+zi+'" data-correct="'+escH(pair.right)+'" '+
        'ondragover="event.preventDefault();this.classList.add(\'drag-over\')" '+
        'ondragleave="this.classList.remove(\'drag-over\')" '+
        'ondrop="dropInto(event,\''+i+'_'+zi+'\')" '+
        'onclick="zoneTap(\''+i+'_'+zi+'\','+i+')">&nbsp;</div></div></div>';
  }).join('');
  card.innerHTML=
    '<div class="phdr"><div class="pnum">'+(i+1)+'</div><div class="ptitle">'+cfg.title+'</div></div>'+
    '<div class="pbody">'+
      '<div class="pstmt">'+cfg.stmt+'</div>'+
      '<button class="hintbtn" onclick="toggleHint('+i+')">💡 Pista</button>'+
      '<div class="hintbox" id="hint'+i+'">'+cfg.hint+'</div>'+
      '<p style="font-size:.78rem;color:var(--text3);margin:.5rem 0 .4rem">Arrastra cada opción a donde corresponde (o tócala y luego toca la zona):</p>'+
      '<div class="drag-bank" id="bank_'+i+'">'+bankHtml+'</div>'+
      zonesHtml+
      '<button class="verify-btn" id="vbtn'+i+'" onclick="verifyMatch('+i+')" disabled>Verificar</button>'+
      '<div class="mcfb" id="fb'+i+'"></div>'+
    '</div>';
  document.getElementById('lessonBody').appendChild(card);
  problems.push({type:'match',title:cfg.title,pairs:cfg.pairs,explanation:cfg.explanation,selectedChip:null,studentChoice:null,pendingChoice:null});
}
function dragStart(e,chipId){_activeChipId=chipId;e.dataTransfer.effectAllowed='move';}
function dropInto(e,zoneKey){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!_activeChipId)return;
  placeChip(_activeChipId,zoneKey);_activeChipId=null;
}
function chipTap(chipId,gIdx){
  var prob=problems[gIdx];if(!prob||prob.studentChoice!==null)return;
  var chip=document.getElementById('chip_'+chipId);
  if(prob.selectedChip&&prob.selectedChip!==chipId){
    var prev=document.getElementById('chip_'+prob.selectedChip);if(prev)prev.style.outline='';
  }
  if(prob.selectedChip===chipId){prob.selectedChip=null;if(chip)chip.style.outline='';return;}
  prob.selectedChip=chipId;if(chip)chip.style.outline='2px solid var(--gold)';
}
function zoneTap(zoneKey,gIdx){
  var prob=problems[gIdx];if(!prob||prob.studentChoice!==null||!prob.selectedChip)return;
  placeChip(prob.selectedChip,zoneKey);
  var chip=document.getElementById('chip_'+prob.selectedChip);if(chip)chip.style.outline='';
  prob.selectedChip=null;
}
function placeChip(chipId,zoneKey){
  var parts=zoneKey.split('_');var gIdx=parseInt(parts[0]);
  var prob=problems[gIdx];if(!prob||prob.studentChoice!==null)return;
  var chip=document.getElementById('chip_'+chipId);
  if(!chip||chip.classList.contains('placed'))return;
  var zone=document.getElementById('zone_'+zoneKey);if(!zone)return;
  var prevCid=zone.dataset.chipId;
  if(prevCid){var prev=document.getElementById('chip_'+prevCid);if(prev)prev.classList.remove('placed');zone.dataset.chipId='';zone.textContent='\u00a0';zone.classList.remove('filled');}
  chip.classList.add('placed');
  zone.textContent=chip.dataset.val;zone.dataset.chipId=chipId;zone.classList.add('filled');
  // check if all zones filled
  var allFilled=prob.pairs.every(function(_,zi){var z=document.getElementById('zone_'+gIdx+'_'+zi);return z&&z.dataset.chipId&&z.dataset.chipId!=='';});
  var btn=document.getElementById('vbtn'+gIdx);if(btn)btn.disabled=!allFilled;
}
function verifyMatch(gIdx){
  var prob=problems[gIdx];if(!prob||prob.studentChoice!==null)return;
  var allOk=true;
  prob.pairs.forEach(function(pair,zi){
    var zone=document.getElementById('zone_'+gIdx+'_'+zi);if(!zone)return;
    var ok=(zone.textContent.trim()===pair.right);
    zone.classList.remove('filled');zone.classList.add(ok?'correct':'wrong');
    if(!ok)allOk=false;
    var cid=zone.dataset.chipId;if(cid){var c=document.getElementById('chip_'+cid);if(c)c.style.pointerEvents='none';}
  });
  var fb=document.getElementById('fb'+gIdx);
  fb.innerHTML=(allOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Algunas respuestas no son correctas.</strong> ')+escH(prob.explanation);
  fb.className='mcfb show '+(allOk?'fbok':'fbbad');
  document.getElementById('pc'+gIdx).classList.add(allOk?'ok':'bad');
  document.getElementById('vbtn'+gIdx).disabled=true;
  prob.studentChoice=allOk?1:0;
  if(allOk)correctCount++;
  answeredCount++;
  updateProgress();
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sig(z){return 1/(1+Math.exp(-z));}
function r3(x){return Math.round(x*1000)/1000;}

function buildLesson(rng){
  var body=document.getElementById('lessonBody');
  var pIdx=0;

  /* ─── SECCIÓN 1 — ¿Cuándo usar regresión logística? ─── */
  var s1=document.createElement('div');s1.className='section';
  s1.innerHTML=
    '<div class="stag">Sección 1</div>'+
    '<h2>¿Cuándo se usa la regresión logística?</h2>'+
    '<p>En econometría, muchas veces necesitas modelar una <strong>variable dependiente binaria</strong> — una decisión que solo puede tomar dos valores: sí/no, incumple/no incumple, empleado/desempleado. La regresión MCO (Mínimos Cuadrados Ordinarios) <em>no es adecuada</em> para esto, porque puede generar predicciones fuera del rango [0, 1], lo que no tiene ningún sentido como probabilidad.</p>'+
    '<p>La <strong>regresión logística</strong> resuelve este problema modelando la probabilidad de que el resultado sea 1, garantizando que la predicción siempre esté entre 0 y 1.</p>'+
    '<div class="rules-grid">'+
      '<div class="rcard"><div class="rname">Regresión MCO</div><div class="rform">ŷ = β₀ + β₁x</div><div class="rnote">Para variables dependientes continuas. Puede predecir valores como 1.3 o −0.2 — imposibles como probabilidades.</div></div>'+
      '<div class="rcard"><div class="rname">Regresión Logística</div><div class="rform">P(y=1) siempre entre 0 y 1</div><div class="rnote">Para variables dependientes binarias (0 ó 1). La predicción siempre es una probabilidad válida.</div></div>'+
    '</div>'+
    '<div class="callout"><strong>Regla clave:</strong><p>Si tu variable dependiente solo toma los valores 0 y 1, usa regresión logística. Si es continua (ingreso, precio, cantidad), usa MCO. El tipo de las variables <em>predictoras</em> no importa para esta decisión.</p></div>'+
    '<h3>Ejemplos económicos de variables binarias</h3>'+
    '<table class="data-table"><thead><tr><th>Variable dependiente</th><th>= 1 significa</th><th>= 0 significa</th></tr></thead><tbody>'+
      '<tr><td>Incumplimiento de crédito</td><td>El solicitante incumplió</td><td>El solicitante pagó</td></tr>'+
      '<tr><td>Participación laboral</td><td>La persona trabaja</td><td>La persona no trabaja</td></tr>'+
      '<tr><td>Decisión de compra</td><td>El cliente compró</td><td>El cliente no compró</td></tr>'+
      '<tr><td>Quiebra empresarial</td><td>La empresa quebró</td><td>La empresa es solvente</td></tr>'+
    '</tbody></table>';
  body.appendChild(s1);

  // P1 — Matching: MCO vs logística
  var matchScenarios=shuffle([
    {left:'Predecir el salario anual de un trabajador en pesos',right:'MCO — variable continua'},
    {left:'Predecir si un solicitante incumplirá un crédito (sí/no)',right:'Logística — variable binaria'},
    {left:'Predecir si una empresa quebrará el próximo año (sí/no)',right:'Logística — variable binaria'},
    {left:'Predecir el precio del petróleo en dólares por barril',right:'MCO — variable continua'},
  ],rng).slice(0,4);
  var pool1=shuffle(matchScenarios.map(function(p){return p.right;}).concat(['Logística — cualquier predictor','Ninguno de los dos']),rng);
  buildMatchProblem({title:'Selección de modelo',
    stmt:'Arrastra el modelo correcto (MCO o Logística) junto a cada situación.',
    hint:'Enfócate en la variable que quieres predecir, no en las variables predictoras.',
    pairs:matchScenarios,chipPool:pool1,
    explanation:'El tipo de modelo depende de la variable dependiente. Si es continua → MCO. Si solo toma valores 0 ó 1 → Logística. Las variables predictoras pueden ser de cualquier tipo en ambos modelos.'},pIdx);
  pIdx++;

  /* ─── SECCIÓN 2 — Lo que reporta StatsBlue y cómo usarlo ─── */
  var s2=document.createElement('div');s2.className='section';
  s2.innerHTML=
    '<div class="stag">Sección 2</div>'+
    '<h2>Lo que reporta StatsBlue y cómo usarlo</h2>'+
    '<h3>¿Qué verás en la pantalla de StatsBlue?</h3>'+
    '<p>Cuando corres una regresión logística en StatsBlue, el programa te entrega dos cosas fundamentales:</p>'+
    '<p><strong>1. Una tabla de coeficientes</strong> con β, razón de momios (OR) y valor-p para cada variable.</p>'+
    '<p><strong>2. La ecuación de probabilidad ya construida</strong>, que StatsBlue arma automáticamente con los coeficientes estimados. Se ve así:</p>'+
    '<div class="fhl">P(incumplimiento = 1) = 1 / (1 + e<sup>−(5.10 − 0.09·ingreso_k + 1.25·tipo_empleo)</sup>)</div>'+
    '<p>Esta ecuación ya incluye todo. No necesitas calcular ningún paso intermedio por separado — simplemente <strong>sustituyes los valores de tu observación</strong> y obtienes la probabilidad directamente.</p>'+

    '<h3>La tabla de resultados de StatsBlue</h3>'+
    '<p>Supón que corres logística de <em>incumplimiento</em> (1 = incumplió, 0 = no) sobre <em>ingreso_k</em> (miles de pesos) y <em>tipo_empleo</em> (1 = independiente, 0 = asalariado):</p>'+
    '<table class="data-table"><thead><tr><th>Variable</th><th>Coeficiente (β)</th><th>Razón de momios (OR)</th><th>Valor-p</th></tr></thead><tbody>'+
      '<tr><td>Intercepto</td><td>5.10</td><td>164.0</td><td>0.001</td></tr>'+
      '<tr><td>ingreso_k</td><td>−0.09</td><td>0.914</td><td>0.003</td></tr>'+
      '<tr><td>tipo_empleo</td><td>1.25</td><td>3.490</td><td>0.012</td></tr>'+
    '</tbody></table>'+
    '<p><strong>Coeficiente β:</strong> indica la dirección del efecto. Un β negativo significa que cuando esa variable sube, la probabilidad de incumplir baja. Sin embargo, el β por sí solo no se interpreta directamente en probabilidades — para eso usas la OR (para comparar efectos) o la ecuación de probabilidad (para calcular casos específicos).</p>'+
    '<p><strong>Razón de momios (OR):</strong> forma estándar de reportar e interpretar el efecto de cada variable. Se detalla en la Sección 3.</p>'+
    '<p><strong>Valor-p:</strong> igual que en MCO, indica significancia estadística (p &lt; 0.05 = significativo).</p>'+

    '<div class="warn-box"><strong>La distinción más importante:</strong>'+
    '<p>Usa la <strong>OR</strong> para interpretar y reportar cómo afecta cada variable al riesgo en general. Usa la <strong>ecuación de probabilidad</strong> (que StatsBlue ya construye por ti) para calcular la probabilidad de un caso específico. Sección 3 y 4 desarrollan esto con ejemplos.</p></div>'+

    '<h3>Ejemplo guiado: calcular la probabilidad para una persona concreta</h3>'+
    '<div class="step-box"><div class="step-lbl">La ecuación que StatsBlue reporta</div>'+
      '<p>P(incumplimiento = 1) = 1 / (1 + e<sup>−(5.10 − 0.09·ingreso_k + 1.25·tipo_empleo)</sup>)</p></div>'+
    '<div class="step-box"><div class="step-lbl">Persona: asalariada (tipo_empleo = 0), ingreso = 40</div>'+
      '<p>P = <span class="mf-outer"><span class="mf-num">1</span><span class="mf-den">1 + e<sup>−(5.10 − 0.09×40 + 1.25×0)</sup></span></span>'+
      ' = <span class="mf-outer"><span class="mf-num">1</span><span class="mf-den">1 + e<sup>−1.50</sup></span></span>'+
      ' = <span class="mf-outer"><span class="mf-num">1</span><span class="mf-den">1.223</span></span>'+
      ' ≈ <strong>0.818</strong></p>'+
      '<p style="font-size:.8rem;color:var(--text3)">Nota: como tipo_empleo = 0, ese término es 1.25 × 0 = 0 y desaparece.</p></div>'+
    '<div class="callout"><strong>Interpretación:</strong><p>Esta persona tiene una probabilidad estimada de incumplimiento del <strong>81.8%</strong>. El valor −1.50 dentro del exponente es solo un paso de cálculo interno — lo que le reportas al banco es la probabilidad final: 0.818.</p></div>';
  body.appendChild(s2);

  // P2 — MC con draw/type: calcular probabilidad (single step)
  var cases2=[[35,0],[50,0],[30,1],[45,1]];
  var c2=cases2[Math.floor(rng()*cases2.length)];
  var inc2=c2[0],emp2=c2[1];
  var z2=5.10-0.09*inc2+1.25*emp2;
  var p2=r3(sig(z2));
  var w2a=r3(sig(5.10-0.09*inc2+1.25*(1-emp2)));  // error: valor de empleo incorrecto
  var w2b=r3(1-p2);                                 // error: complemento (1−P)
  var w2c=z2.toFixed(3);                             // error: reportar z como si fuera P (olvida aplicar sigmoide)
  var empLbl2=emp2===1?'independiente (tipo_empleo = 1)':'asalariada (tipo_empleo = 0)';
  var opts2=shuffle([
    p2.toFixed(3),
    w2a.toFixed(3),
    w2b.toFixed(3),
    w2c,
  ],rng);
  var correct2=p2.toFixed(3);
  problems.push({type:'mc',title:'Calcular probabilidad de incumplimiento',
    questionText:'StatsBlue reporta la ecuación: P = 1 / (1 + e<sup>−(5.10 − 0.09·ingreso_k + 1.25·tipo_empleo)</sup>). Usa el área de trabajo para sustituir los valores y calcula la probabilidad de incumplimiento para una persona <strong>'+empLbl2+'</strong> con <strong>ingreso_k = '+inc2+'</strong>.',
    fn:'',
    options:opts2,correctIdx:opts2.indexOf(correct2),
    hint:'Sustituye en la ecuación completa: P = 1/(1 + e^−(5.10 − 0.09×'+inc2+' + 1.25×'+emp2+')). No te detengas en el valor del exponente — debes aplicar la función completa para obtener una probabilidad entre 0 y 1.',
    explanation:'P = 1/(1 + e^−(5.10 − 0.09×'+inc2+' + 1.25×'+emp2+')) = 1/(1 + e^−'+z2.toFixed(2)+') ≈ '+p2.toFixed(3)+'. Error frecuente 1: usar tipo_empleo incorrecto → '+w2a.toFixed(3)+'. Error frecuente 2: reportar el valor interno del exponente ('+w2c+') como si fuera la probabilidad — ese número aún no es P.',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],pIdx);
  pIdx++;

  /* ─── SECCIÓN 3 — Razones de momios ─── */
  var s3=document.createElement('div');s3.className='section';
  s3.innerHTML=
    '<div class="stag">Sección 3</div>'+
    '<h2>Interpretación de las razones de momios</h2>'+
    '<p>La <strong>razón de momios</strong> (OR, por <em>odds ratio</em>) es la forma estándar de comunicar los resultados de una regresión logística. Es simplemente <em>e</em> elevado al coeficiente β. Su ventaja es que permite comparar el efecto de las variables de manera directa.</p>'+

    '<h3>Reglas de interpretación</h3>'+
    '<table class="data-table"><thead><tr><th>Valor de la OR</th><th>Significado</th></tr></thead><tbody>'+
      '<tr><td>OR = 1</td><td>La variable no tiene efecto sobre los momios</td></tr>'+
      '<tr><td>OR &gt; 1</td><td>La variable <strong>aumenta</strong> los momios del evento (y = 1)</td></tr>'+
      '<tr><td>OR &lt; 1</td><td>La variable <strong>reduce</strong> los momios del evento (y = 1)</td></tr>'+
    '</tbody></table>'+
    '<p>El cambio porcentual en los momios por un aumento de una unidad en x es: <strong>(OR − 1) × 100%</strong>.</p>'+

    '<div class="warn-box"><strong>Momios ≠ probabilidad</strong>'+
    '<p>Los momios (<em>odds</em>) se definen como P/(1−P): la razón entre "que ocurra" y "que no ocurra". Si P = 0.80, los momios son 0.80/0.20 = 4. La OR describe cambios en esos momios, <em>no</em> cambios directos en la probabilidad. Confundir estos dos conceptos es el error más frecuente.</p></div>'+

    '<h3>Interpretación — variable numérica</h3>'+
    '<div class="step-box"><div class="step-lbl">Ejemplo: ingreso_k (OR = 0.914)</div>'+
      '<p>OR = 0.914 &lt; 1 → el ingreso <strong>reduce</strong> los momios de incumplir. Por cada mil pesos adicionales de ingreso, los momios de incumplimiento disminuyen en (1 − 0.914) × 100% = <strong>8.6%</strong>, manteniendo constante el tipo de empleo.</p></div>'+

    '<h3>Interpretación — variable categórica (indicadora)</h3>'+
    '<p>La OR compara el grupo codificado como 1 con el <em>grupo de referencia</em> (codificado como 0). Siempre debes indicar explícitamente cuál es el grupo de referencia.</p>'+
    '<div class="step-box"><div class="step-lbl">Ejemplo: tipo_empleo (OR = 3.490)</div>'+
      '<p>OR = 3.490 &gt; 1 → los trabajadores independientes (tipo_empleo = 1) tienen <strong>3.490 veces los momios</strong> de incumplir en comparación con los asalariados (grupo de referencia, tipo_empleo = 0). En porcentaje: (3.490 − 1) × 100% = <strong>249% más momios</strong>, controlando por ingreso.</p></div>'+

    '<h3>¿Cuándo uso la OR y cuándo la ecuación de probabilidad?</h3>'+
    '<table class="data-table"><thead><tr><th>Herramienta</th><th>Úsala para…</th><th>Ejemplo de pregunta</th></tr></thead><tbody>'+
      '<tr><td><strong>OR</strong></td><td>Describir el efecto general de una variable — para reportar e interpretar resultados</td><td>"¿Cómo afecta el ingreso al riesgo de incumplimiento en general?"</td></tr>'+
      '<tr><td><strong>Ecuación de probabilidad</strong></td><td>Calcular la probabilidad para una observación concreta</td><td>"¿Cuál es el riesgo de incumplir de Juan, asalariado con ingreso = $35,000?"</td></tr>'+
    '</tbody></table>'+
    '<div class="callout"><strong>Ambas usan los mismos β de la tabla — solo se aplican de manera diferente.</strong><p>La OR = e^β (para interpretar el efecto general). La ecuación de probabilidad sustituye los β con los valores concretos de la observación (para predecir).</p></div>'+

    '<h3>Practica completando interpretaciones</h3>'+
    '<p>El siguiente ejercicio usa una regresión de <em>participación laboral femenina</em> (1 = trabaja, 0 = no trabaja) con dos predictores: <em>años de educación</em> y <em>zona</em> (1 = urbana, 0 = rural).</p>';
  body.appendChild(s3);

  // P3 — Table-dropdown: completar interpretaciones de OR
  var eduSets=[[1.42,0.35,'42'],[1.28,0.25,'28'],[1.55,0.44,'55']];
  var es=eduSets[Math.floor(rng()*eduSets.length)];
  var eduOR=es[0],eduB=es[1],eduPct=es[2];
  var zoneOR=2.18;
  var tablHtml3=
    '<table class="data-table" style="margin:.7rem 0"><thead><tr>'+
    '<th>Variable</th><th>β</th><th>OR</th><th>Interpretación (completa)</th></tr></thead><tbody>'+
    '<tr><td>años_educacion</td><td>'+eduB+'</td><td>'+eduOR+'</td>'+
    '<td style="line-height:1.9">Por cada año adicional de educación, los momios de participar <strong>%%0%%</strong> en '+eduPct+'%.</td></tr>'+
    '<tr><td>zona (1=urbana)</td><td>0.78</td><td>'+zoneOR+'</td>'+
    '<td style="line-height:1.9">Las mujeres en zona <strong>%%1%%</strong> tienen <strong>%%2%%</strong> veces los momios de participar que las de zona rural.</td></tr>'+
    '</tbody></table>';
  buildTableProblem({title:'Interpretación de razones de momios',
    stmt:'Completa las interpretaciones correctas para cada variable.',
    hint:'OR > 1: la variable aumenta los momios. OR < 1: los reduce. Para la variable categórica, la OR compara el grupo 1 (urbana) contra el grupo 0 (rural = referencia). El número de veces = el valor de la OR.',
    tableHtml:tablHtml3,
    items:[
      {k:0,options:shuffle(['aumentan','disminuyen','no cambian','se duplican'],rng),correct:'aumentan'},
      {k:1,options:shuffle(['urbana','rural','nacional','mixta'],rng),correct:'urbana'},
      {k:2,options:shuffle([String(zoneOR),'1.00','0.46','3.49'],rng),correct:String(zoneOR)}
    ],
    explanation:'OR = '+eduOR+' > 1: la educación aumenta los momios de participar (+ '+eduPct+'% por año adicional). OR = '+zoneOR+' para zona urbana: las mujeres urbanas tienen '+zoneOR+'× los momios de participar que las rurales (grupo de referencia = rural, codificado como 0).'},pIdx);
  pIdx++;

  /* ─── SECCIÓN 4 — Predictores categóricos y numéricos ─── */
  var s4=document.createElement('div');s4.className='section';
  s4.innerHTML=
    '<div class="stag">Sección 4</div>'+
    '<h2>Predictores categóricos y numéricos en el mismo modelo</h2>'+
    '<p>La regresión logística puede incluir simultáneamente variables <strong>numéricas</strong> y variables <strong>categóricas</strong> codificadas como indicadoras (0/1). La forma de interpretar la OR depende del tipo de variable.</p>'+
    '<table class="data-table"><thead><tr><th>Tipo</th><th>Interpretación de la OR</th><th>Frase estándar</th></tr></thead><tbody>'+
      '<tr><td><strong>Numérica</strong><br><small>(ingreso, años, precio)</small></td><td>Cambio multiplicativo en los momios por cada unidad adicional de esa variable</td><td>"Por cada [unidad] más de X, los momios [aumentan/disminuyen] en [%], controlando las demás variables."</td></tr>'+
      '<tr><td><strong>Categórica</strong><br><small>(género, sector, región)</small></td><td>Momios del grupo 1 divididos entre los momios del grupo de referencia (0)</td><td>"El grupo [1] tiene [OR] veces los momios que el grupo de referencia [0], controlando las demás variables."</td></tr>'+
    '</tbody></table>'+
    '<div class="callout"><strong>Grupo de referencia:</strong><p>En una variable binaria (0/1), el grupo codificado como 0 es el grupo de referencia. La OR del grupo 1 siempre compara contra ese grupo. Siempre indica explícitamente cuál es el grupo de referencia al reportar resultados.</p></div>'+

    '<h3>Ejemplo guiado completo — modelo con tres predictores</h3>'+
    '<p>Regresión logística de <em>incumplimiento_credito</em>. StatsBlue reporta:</p>'+
    '<table class="data-table"><thead><tr><th>Variable</th><th>β</th><th>OR</th><th>Tipo</th></tr></thead><tbody>'+
      '<tr><td>Intercepto</td><td>4.80</td><td>—</td><td>—</td></tr>'+
      '<tr><td>ingreso_k</td><td>−0.09</td><td>0.914</td><td>Numérica</td></tr>'+
      '<tr><td>razon_deuda</td><td>2.85</td><td>17.3</td><td>Numérica (proporción 0–1)</td></tr>'+
      '<tr><td>tipo_empleo (1=independ.)</td><td>1.25</td><td>3.49</td><td>Categórica</td></tr>'+
    '</tbody></table>'+
    '<div class="step-box"><div class="step-lbl">Interpretar ingreso_k (numérica, OR = 0.914)</div>'+
      '<p>Por cada mil pesos adicionales de ingreso, los momios de incumplir disminuyen en (1 − 0.914) × 100% = <strong>8.6%</strong>, controlando las demás variables.</p></div>'+
    '<div class="step-box"><div class="step-lbl">Interpretar razon_deuda (numérica, OR = 17.3)</div>'+
      '<p>Por cada aumento de 1 unidad en la razón de deuda (de 0 a 1, es decir de 0% a 100% de deuda/activos), los momios de incumplir se multiplican por <strong>17.3</strong>, es decir, aumentan <strong>1,630%</strong>. Tiene sentido: un deudor totalmente comprometido tiene riesgo extremo.</p></div>'+
    '<div class="step-box"><div class="step-lbl">Interpretar tipo_empleo (categórica, OR = 3.49)</div>'+
      '<p>Los trabajadores independientes tienen <strong>3.49 veces los momios</strong> de incumplir que los asalariados (grupo de referencia), controlando ingreso y razón de deuda.</p></div>'+
    '<div class="step-box"><div class="step-lbl">Calcular probabilidad — ecuación de StatsBlue</div>'+
      '<p>P = 1/(1 + e<sup>−(4.80 − 0.09·ingreso_k + 2.85·razon_deuda + 1.25·tipo_empleo)</sup>)</p>'+
      '<p>Para un trabajador independiente, ingreso = 35, razón de deuda = 0.60:<br>'+
      'P = 1/(1 + e<sup>−(4.80 − 0.09×35 + 2.85×0.60 + 1.25×1)</sup>) = 1/(1 + e<sup>−4.61</sup>) ≈ <strong>0.990</strong></p></div>';
  body.appendChild(s4);

  // P4 — Matching: tipo de variable
  var varPairs=shuffle([
    {left:'Años de educación del trabajador',right:'Numérica'},
    {left:'Género (1 = mujer, 0 = hombre)',right:'Categórica'},
    {left:'Precio del producto en pesos',right:'Numérica'},
    {left:'Sector (1 = manufactura, 0 = servicios)',right:'Categórica'},
    {left:'Número de empleados de la empresa',right:'Numérica'},
    {left:'Región (1 = norte, 0 = sur)',right:'Categórica'},
  ],rng).slice(0,4);
  var pool4=shuffle(varPairs.map(function(p){return p.right;}).concat(['Logística','Ordinal']),rng);
  buildMatchProblem({title:'Tipo de variable predictora',
    stmt:'Clasifica cada variable como <em>Numérica</em> o <em>Categórica</em> para saber cómo interpretar su OR.',
    hint:'Las variables categóricas representan grupos codificados 0/1. Las numéricas pueden tomar muchos valores distintos.',
    pairs:varPairs,chipPool:pool4,
    explanation:'Numérica → OR se interpreta "por cada unidad adicional". Categórica → OR compara el grupo 1 con el grupo de referencia (0). Identificar el tipo es el primer paso antes de escribir la interpretación.'},pIdx);
  pIdx++;

  /* ─── SECCIÓN 5 — Dataset ─── */
  var s5=document.createElement('div');s5.className='section';
  s5.innerHTML=
    '<div class="stag">Sección 5</div>'+
    '<h2>Dataset de práctica: cartera de crédito</h2>'+
    '<p>El siguiente conjunto de datos contiene 40 observaciones de un portafolio de créditos ficticio. Úsalo en StatsBlue para correr tu propia regresión logística y comparar con los ejemplos de esta guía.</p>'+
    '<table class="data-table"><thead><tr><th>Variable</th><th>Tipo</th><th>Descripción</th><th>Valores</th></tr></thead><tbody>'+
      '<tr><td><code style="font-family:\'IBM Plex Mono\',monospace">ingreso_k</code></td><td>Numérica</td><td>Ingreso anual en miles de pesos</td><td>19 – 75</td></tr>'+
      '<tr><td><code style="font-family:\'IBM Plex Mono\',monospace">razon_deuda</code></td><td>Numérica</td><td>Deuda total / activos totales</td><td>0.15 – 0.88</td></tr>'+
      '<tr><td><code style="font-family:\'IBM Plex Mono\',monospace">tipo_empleo</code></td><td>Categórica</td><td>Tipo de empleo del solicitante</td><td>0 = asalariado, 1 = independiente</td></tr>'+
      '<tr><td><code style="font-family:\'IBM Plex Mono\',monospace">incumplimiento</code></td><td>Binaria — dependiente</td><td>¿Incumplió el solicitante?</td><td>0 = no, 1 = sí</td></tr>'+
    '</tbody></table>'+
    '<div class="callout"><strong>Resultados esperados en StatsBlue:</strong>'+
      '<p>β(ingreso_k) negativo y significativo · β(razon_deuda) positivo y significativo · β(tipo_empleo) positivo y significativo. Mayor ingreso = menor riesgo. Mayor endeudamiento = mayor riesgo. Trabajadores independientes = mayor riesgo que asalariados.</p></div>'+
    '<button class="dsbtn" onclick="downloadCSV()">⬇ Descargar datos_credito_incumplimiento.csv</button>'+
    '<p style="font-size:.78rem;color:var(--text3);margin-top:.5rem">En StatsBlue: Archivo → Importar datos → selecciona el archivo. Variable dependiente: <em>incumplimiento</em>. Predictores: las otras tres. Método: Regresión Logística.</p>';
  body.appendChild(s5);

  /* ─── EVALUACIÓN FINAL ─── */
  var sfa=document.createElement('div');sfa.className='section';
  sfa.innerHTML=
    '<div class="stag">Evaluación Final</div>'+
    '<h2>Comprueba tu comprensión</h2>'+
    '<p style="font-size:.88rem;color:var(--text3)">Cuatro problemas sin apoyo de las secciones anteriores. Usa el área de trabajo cuando se te pida calcular algo.</p>';
  body.appendChild(sfa);

  // FA1 — Dropdown: interpretar OR variable numérica
  var fa1sets=[
    {or:0.88,vname:'precio_entrada',unit:'peso adicional en el precio',dir:'disminuyen',pct:'12',dirW:'aumentan'},
    {or:1.34,vname:'anos_experiencia',unit:'año adicional de experiencia',dir:'aumentan',pct:'34',dirW:'disminuyen'},
    {or:0.73,vname:'calificacion_credito',unit:'punto adicional en la calificación',dir:'disminuyen',pct:'27',dirW:'aumentan'},
  ];
  var fa1s=fa1sets[Math.floor(rng()*fa1sets.length)];
  buildDropProblem({title:'Interpretar OR — variable numérica',
    stmt:'En una regresión logística, la razón de momios para <em>'+fa1s.vname+'</em> es <strong>'+fa1s.or+'</strong>. Completa la interpretación.',
    hint:(fa1s.or<1?'OR < 1: la variable reduce los momios. Cambio % = (1 − OR) × 100%.':'OR > 1: la variable aumenta los momios. Cambio % = (OR − 1) × 100%.')+' Siempre cierra con "controlando las demás variables".',
    items:[
      {before:'Por cada '+fa1s.unit+', los momios del evento',after:'en '+fa1s.pct+'%,',options:shuffle([fa1s.dir,fa1s.dirW,'no cambian','se duplican'],rng),correct:fa1s.dir},
      {before:'controlando',after:'las demás variables.',options:shuffle(['constantes','nulos','significativos','positivos'],rng),correct:'constantes'}
    ],
    explanation:'OR = '+fa1s.or+(fa1s.or<1?' < 1: reduce los momios. (1 − '+fa1s.or+') × 100% = '+fa1s.pct+'%.':' > 1: aumenta los momios. ('+fa1s.or+' − 1) × 100% = '+fa1s.pct+'%.')+' La expresión "controlando las demás variables" siempre va en la interpretación de un modelo de regresión múltiple.'},pIdx);
  pIdx++;

  // FA2 — Dropdown: OR vs ecuación de probabilidad (cuándo usar cada una)
  var fa2scens=[
    {q:'Un banco quiere redactar en su reporte: "Por cada año adicional de historial crediticio, el riesgo de incumplimiento de los clientes cambia en X%."',
     tool:'Razón de momios (OR)',o1:'Ecuación de probabilidad',o2:'Coeficiente β directamente',o3:'Valor-p del modelo',
     why:'Esta es una descripción general del efecto de la variable para reportar resultados → se usa la OR. La OR da directamente ese cambio porcentual en los momios.'},
    {q:'Un analista necesita saber: "¿Cuál es la probabilidad de que este solicitante específico — asalariado, ingreso = 42, razón de deuda = 0.55 — incumpla?"',
     tool:'Ecuación de probabilidad',o1:'Razón de momios (OR)',o2:'Solo el coeficiente β',o3:'El valor-p del modelo',
     why:'Para calcular la probabilidad de una observación específica se usa la ecuación de probabilidad que reporta StatsBlue, sustituyendo los valores concretos de esa persona.'},
    {q:'Un investigador quiere comparar el riesgo de incumplimiento entre trabajadores independientes y asalariados en general, para incluirlo en su artículo.',
     tool:'Razón de momios (OR)',o1:'Ecuación de probabilidad',o2:'La diferencia entre los coeficientes β',o3:'El intercepto del modelo',
     why:'Para comparar grupos y reportar el efecto de una variable categórica en general → OR. Indica cuántas veces son los momios del grupo 1 respecto al grupo de referencia.'},
  ];
  var fa2s=fa2scens[Math.floor(rng()*fa2scens.length)];
  buildDropProblem({title:'¿OR o ecuación de probabilidad?',
    stmt:fa2s.q,
    hint:'¿Quieres describir el efecto general de la variable (→ OR) o calcular la probabilidad exacta para una persona o empresa específica (→ ecuación de probabilidad)?',
    items:[{before:'La herramienta correcta es:',after:'',options:shuffle([fa2s.tool,fa2s.o1,fa2s.o2,fa2s.o3],rng),correct:fa2s.tool}],
    explanation:fa2s.why},pIdx);
  pIdx++;

  // FA3 — MC con draw/type: probabilidad con modelo de 3 predictores
  var fa3cases=[[30,0.40,0],[40,0.40,0],[40,0.65,1],[50,0.55,1]];
  var fc3=fa3cases[Math.floor(rng()*fa3cases.length)];
  var fi3=fc3[0],fd3=fc3[1],fe3=fc3[2];
  // Model: 4.80 - 0.09*inc + 2.85*debt + 1.25*emp
  var z3=4.80-0.09*fi3+2.85*fd3+1.25*fe3;
  var p3=r3(sig(z3));
  var w3a=r3(sig(4.80-0.09*fi3+2.85*fd3+1.25*(1-fe3)));  // wrong emp
  var w3b=r3(1-p3);                                        // complement
  var w3c=z3.toFixed(3);                                       // error: z reportado como probabilidad
  var empLbl3=fe3===1?'independiente (tipo_empleo = 1)':'asalariada (tipo_empleo = 0)';
  var opts3=shuffle([
    p3.toFixed(3),
    w3a.toFixed(3),
    w3b.toFixed(3),
    w3c,
  ],rng);
  var correct3=p3.toFixed(3);
  problems.push({type:'mc',title:'Predicción con modelo completo',
    questionText:'StatsBlue reporta: P = 1/(1 + e<sup>−(4.80 − 0.09·ingreso_k + 2.85·razon_deuda + 1.25·tipo_empleo)</sup>). Calcula la probabilidad de incumplimiento para una persona <strong>'+empLbl3+'</strong>, ingreso = '+fi3+', razón de deuda = '+fd3+'.',
    fn:'',
    options:opts3,correctIdx:opts3.indexOf(correct3),
    hint:'Sustituye los tres valores: P = 1/(1 + e^−(4.80 − 0.09×'+fi3+' + 2.85×'+fd3+' + 1.25×'+fe3+')). El resultado debe ser una probabilidad entre 0 y 1 — si obtienes un número mayor que 1, no aplicaste la función completa.',
    explanation:'P = 1/(1 + e^−(4.80 − 0.09×'+fi3+' + 2.85×'+fd3+' + 1.25×'+fe3+')) = 1/(1 + e^−'+z3.toFixed(2)+') ≈ '+p3.toFixed(3)+'. Error frecuente 1: invertir tipo_empleo → '+w3a.toFixed(3)+'. Error frecuente 2: reportar el valor del exponente ('+w3c+') como si fuera P — ese valor debe pasar por la función sigmoide primero.',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],pIdx);
  pIdx++;

  // FA4 — MC con draw/type: probabilidad con interpretación del resultado
  var fa4cases=[[35,0.50,0],[45,0.60,1],[50,0.35,0]];
  var fc4=fa4cases[Math.floor(rng()*fa4cases.length)];
  var fi4=fc4[0],fd4=fc4[1],fe4=fc4[2];
  var z4=4.80-0.09*fi4+2.85*fd4+1.25*fe4;
  var p4=r3(sig(z4));
  var w4a=r3(sig(4.80-0.09*fi4-2.85*fd4+1.25*fe4)); // wrong sign on debt
  var w4b=r3(1-p4);
  var w4c=r3(sig(4.80-0.09*(fi4+10)+2.85*fd4+1.25*fe4)); // wrong income value
  var empLbl4=fe4===1?'independiente (tipo_empleo = 1)':'asalariada (tipo_empleo = 0)';
  var opts4=shuffle([
    p4.toFixed(3),
    w4a.toFixed(3),
    w4b.toFixed(3),
    w4c.toFixed(3),
  ],rng);
  var correct4=p4.toFixed(3);
  problems.push({type:'mc',title:'Probabilidad e interpretación',
    questionText:'Con la misma ecuación del modelo completo: P = 1/(1 + e<sup>−(4.80 − 0.09·ingreso_k + 2.85·razon_deuda + 1.25·tipo_empleo)</sup>). Calcula la probabilidad de incumplimiento para una persona <strong>'+empLbl4+'</strong>, ingreso = '+fi4+', razón de deuda = '+fd4+'. Después reflexiona: ¿este resultado tiene sentido económicamente?',
    fn:'',
    options:opts4,correctIdx:opts4.indexOf(correct4),
    hint:'Sustituye: P = 1/(1 + e^−(4.80 − 0.09×'+fi4+' + 2.85×'+fd4+' + 1.25×'+fe4+')). Verifica el signo de cada coeficiente antes de calcular.',
    explanation:'P = 1/(1 + e^−'+z4.toFixed(2)+') ≈ '+p4.toFixed(3)+'. Sentido económico: una razón de deuda = '+fd4+' '+
      (fd4>=0.5?'(alta) aumenta considerablemente el riesgo':'(moderada) tiene efecto significativo pero no extremo')+
      '. El tipo de empleo '+(fe4===1?'independiente aumenta el riesgo adicionalmente':'asalariado reduce el riesgo relativo')+'. Siempre verifica que tu resultado sea consistente con el signo de los coeficientes.',
    studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],pIdx);
  pIdx++;
}

    doc.setTextColor(232,238,247);doc.setFontSize(10.5);doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  \u2014  '+pdfText(prob.title||''),M,17);wy=25;
    var isOk=document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(isOk?232:255,isOk?240:232,isOk?232:228);doc.roundedRect(M,wy,TW,12,2,2,'F');
    doc.setFillColor(isOk?26:176,isOk?106:48,isOk?74:16);doc.circle(M+7,wy+6,3.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(isOk?'V':'X',M+5.2,wy+8.5);
    doc.setTextColor(20,24,32);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(isOk?'Correcto':'Incorrecto',M+13,wy+8);wy+=16;
    if(prob.explanation){
      doc.setTextColor(90,85,80);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
      var exL=doc.splitTextToSize('Explicacion: '+pdfText(prob.explanation),TW-4);
      exL.slice(0,5).forEach(function(ln,li){doc.text(ln,M+2,wy+li*5);});wy+=exL.slice(0,5).length*5+4;
    }
    // Canvas work (MC problems only)
    var dc=document.getElementById('dc'+i);
    if(dc){try{var imgD=dc.toDataURL('image/png');var ar=dc.height/dc.width;var iw=TW;var ih=Math.min(iw*ar,65);if(wy+ih<PH-20){doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.rect(M,wy,TW,7,'F');doc.text('TRABAJO DEL ALUMNO',M+3,wy+5);wy+=9;doc.addImage(imgD,'PNG',M,wy,iw,ih);wy+=ih+3;}}catch(e){}}
    var ta=document.getElementById('ta'+i);
    if(ta&&ta.value.trim()){if(wy>PH-30){doc.addPage();wy=20;}doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('courier','normal');var taL=doc.splitTextToSize(ta.value,TW);taL.slice(0,14).forEach(function(ln){if(wy>PH-15){doc.addPage();wy=20;}doc.text(ln,M,wy);wy+=5;});}
    var pp=document.getElementById('pp'+i);
    if(pp&&pp.src&&pp.src.indexOf('data:')===0){if(wy>PH-55){doc.addPage();wy=20;}try{doc.addImage(pp.src,'JPEG',M,wy,TW,65);wy+=69;}catch(e){}}
  }
  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){
    doc.setPage(p);doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');
    doc.setTextColor(130,140,160);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
    doc.text(name+' \u00b7 '+group+' \u00b7 Codigo: '+code+' \u00b7 Pag. '+p+'/'+pages,PW/2,PH-5,{align:'center'});
  }
  doc.save('regresion_logistica_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='⬇ &nbsp;Descargar Resultados en PDF';btn.disabled=false;
}
</script>
