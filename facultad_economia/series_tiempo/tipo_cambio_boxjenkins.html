<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciclo Box-Jenkins Aplicado: Tipo de Cambio USD/MXN — Series de Tiempo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Universidad de Colima ──────────────────────────────────
   PRIMARY  #4a7c3f  (verde UdeC / Facultad de Economía)
   ACCENT   #c9a84c  (dorado LIAXA)
   ──────────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; display:none; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }
.callout-gold { background:var(--gold-bg); border-left:4px solid var(--gold); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout-gold strong { color:var(--gold); }
.callout-gold p { margin-bottom:0; color:var(--text2); }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── REFLEJO CARD (decisión de negocio) ── */
.refcard { background:var(--surface); border:2px solid var(--gold); border-radius:12px; padding:1.4rem 1.5rem; margin-top:1rem; }
.refcard-hdr { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; }
.refcard-ico { font-size:1.8rem; }
.refcard-title { font-family:'Crimson Pro',serif; font-size:1.25rem; font-weight:700; color:var(--green-dark); }
.refcard-sub { font-size:.8rem; color:var(--text3); margin-top:.1rem; }
.reftextarea { width:100%; min-height:140px; padding:.75rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:.88rem; resize:vertical; line-height:1.6; }
.reftextarea:focus { outline:none; border-color:var(--gold); }
.ref-prompts { list-style:none; margin:.75rem 0 .9rem; padding:0; }
.ref-prompts li { font-size:.83rem; color:var(--text2); padding:.25rem 0; padding-left:1.2rem; position:relative; }
.ref-prompts li::before { content:'→'; position:absolute; left:0; color:var(--gold); font-weight:700; }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── R CODE BLOCKS ── */
.rblock { background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin:1rem 0; overflow:hidden; }
.rblock-hdr { background:var(--green-dark); color:#fff; font-family:'IBM Plex Mono',monospace; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; padding:.45rem .85rem; display:flex; align-items:center; justify-content:space-between; }
.rblock-hdr span { opacity:.75; }
.rblock-copy { background:none; border:1px solid rgba(255,255,255,.35); border-radius:5px; color:#fff; font-size:.7rem; padding:.18rem .55rem; cursor:pointer; font-family:inherit; transition:background .15s; }
.rblock-copy:hover { background:rgba(255,255,255,.15); }
.rblock pre { margin:0; padding:.9rem 1rem; font-family:'IBM Plex Mono',monospace; font-size:.78rem; line-height:1.6; color:var(--text); overflow-x:auto; white-space:pre; }

/* ── STEP INDICATOR ── */
.step-indicator { display:flex; gap:.4rem; align-items:center; margin-bottom:1.2rem; flex-wrap:wrap; }
.step-pill { font-size:.7rem; font-weight:600; padding:.22rem .65rem; border-radius:20px; letter-spacing:.04em; }
.step-active { background:var(--green); color:#fff; }
.step-dim { background:var(--surface2); color:var(--text3); border:1px solid var(--border); }
.step-arrow { color:var(--text3); font-size:.75rem; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .step-indicator { gap: .25rem; }
}
</style>
</head>

    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var refText = document.getElementById('refTextarea');
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos,
    reflection: refText ? refText.value : ''
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'tc_boxjenkins__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
    if (saved.reflection) {
      var rt = document.getElementById('refTextarea');
      if (rt) rt.value = saved.reflection;
    }
  }, 300);
}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — doble toque para confirmar
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  // Escenario de negocio
  if (scenarioData && scenarioData.nombre) {
    doc.setFillColor(250,243,224); doc.roundedRect(M,142,TW,16,3,3,'F');
    doc.setDrawColor(pAR,pAG,pAB); doc.setLineWidth(0.6);
    doc.roundedRect(M,142,TW,16,3,3,'S');
    doc.setTextColor(130,100,30); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('ESCENARIO ASIGNADO', M+4, 149);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    doc.text(scenarioData.nombre + '  ·  ' + scenarioData.accion, M+4, 156);
  }

  // Reflexión final
  var refText = document.getElementById('refTextarea');
  if (refText && refText.value.trim()) {
    var sy2 = 166;
    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,sy2,TW,8,'F'); doc.text('REFLEXIÓN FINAL — DECISIÓN DE NEGOCIO', M+4, sy2+5.5);
    sy2 += 11;
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    var refLines = doc.splitTextToSize(refText.value, TW-8);
    refLines.slice(0,20).forEach(function(ln) {
      if (sy2 > PH-15) { doc.addPage(); sy2 = 20; }
      doc.text(ln, M+4, sy2); sy2 += 5;
    });
  }

  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  var sy = scenarioData && scenarioData.nombre ? 195 : 160;
  if (sy > PH - 80) { doc.addPage(); sy = 20; }
  doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PREGUNTAS', M+4, sy+5.5);
  sy += 12;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PREGUNTAS (cont.)', M+4, sy+5.5);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('P'+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Series de Tiempo  ·  Box-Jenkins: USD/MXN', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Pregunta '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Explicacion: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('BoxJenkins_USDMXN_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;
}

/* ================================================
   BUILD LESSON
   ================================================ */
function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');

  function sec(html) {
    var d = document.createElement('div');
    d.className = 'section';
    d.innerHTML = html;
    lb.appendChild(d);
  }

  function rblock(code) {
    return '<div class="rblock">' +
      '<div class="rblock-hdr"><span>R</span>' +
      '<button class="rblock-copy" onclick="copyRCode(this)">Copiar</button></div>' +
      '<pre>' + code + '</pre></div>';
  }

  function stepBar(active) {
    var steps = ['1. Datos','2. Estacionariedad','3. ACF/PACF','4. Estimación','5. Diagnóstico','6. Pronóstico'];
    var html = '<div class="step-indicator">';
    steps.forEach(function(s, i) {
      if (i > 0) html += '<span class="step-arrow">›</span>';
      html += '<span class="step-pill ' + (i === active ? 'step-active' : 'step-dim') + '">' + s + '</span>';
    });
    return html + '</div>';
  }

  /* ────────────────────────────────────────────────
     GENERATE STUDENT-SPECIFIC SERIES
     Base: realistic USD/MXN path ~17.5–22.5 range
     Student noise layered on top via rng
  ──────────────────────────────────────────────── */
  var base = [17.52,17.61,17.74,17.88,17.95,18.03,18.22,18.41,18.55,18.63,
              18.71,18.82,18.94,19.08,19.21,19.35,19.42,19.28,19.15,19.07,
              19.18,19.32,19.47,19.55,19.68,19.81,19.94,20.08,20.19,20.31,
              20.44,20.58,20.71,20.85,20.96,21.08,21.19,21.28,21.35,21.44,
              21.53,21.62,21.71,21.82,21.90,21.98,22.10,22.21];

  var series = base.map(function(v) {
    return Math.round((v + (rng() - 0.5) * 0.55) * 100) / 100;
  });

  var lastVal = series[series.length - 1];

  // ── SCENARIO ASSIGNMENT (seeded, 4 types) ──
  var scenarios = [
    {
      id: 0,
      icon: '🏭',
      nombre: 'Importador de maquinaria',
      desc: 'Tu empresa necesita comprar <strong>USD $80,000</strong> para pagar maquinaria industrial que llegará en 3 meses.',
      logica: 'Si el tipo de cambio <em>sube</em> (peso se deprecia), comprar dólares <strong>ahora</strong> es más barato. Si el tipo de cambio <em>baja</em> (peso se aprecia), conviene <strong>esperar</strong>.',
      accion: 'Decidir: ¿comprar los dólares hoy o en 3 meses?',
      promptExtra: '¿Tu pronóstico indica que el peso se apreciará o se depreciará? ¿Cuánto costarían los USD $80,000 al tipo de cambio actual vs. al pronosticado? ¿Cuál es tu recomendación y por qué?'
    },
    {
      id: 1,
      icon: '🌽',
      nombre: 'Exportador agroindustrial',
      desc: 'Tu empresa recibirá el pago de una exportación de <strong>USD $120,000</strong> en 3 meses.',
      logica: 'Si el tipo de cambio <em>sube</em> (peso se deprecia), convertir los dólares más tarde te da <strong>más pesos</strong>. Si el tipo de cambio <em>baja</em>, conviene <strong>convertir ahora</strong> con un contrato forward.',
      accion: 'Decidir: ¿fijar el tipo de cambio hoy (forward) o convertir al tipo spot en 3 meses?',
      promptExtra: '¿Tu pronóstico sugiere que recibirás más o menos pesos por esos USD $120,000 si esperas? Calcula la diferencia aproximada. ¿Qué recomiendas y por qué?'
    },
    {
      id: 2,
      icon: '✈️',
      nombre: 'Agencia de viajes',
      desc: 'Tu agencia debe pagar <strong>USD $35,000</strong> a un proveedor de tours internacionales en 3 meses.',
      logica: 'Si el tipo de cambio <em>sube</em>, el costo en pesos de ese pago <strong>aumenta</strong> — conviene cubrir el riesgo hoy. Si el tipo de cambio <em>baja</em>, podrías ahorrar <strong>esperando</strong>.',
      accion: 'Decidir: ¿contratar un seguro cambiario hoy o asumir el riesgo y pagar al tipo spot en 3 meses?',
      promptExtra: '¿Cuánto más (o menos) pagarías en pesos si el tipo de cambio llega al valor pronosticado? ¿Vale la pena pagar la prima del seguro? Justifica tu respuesta.'
    },
    {
      id: 3,
      icon: '🏦',
      nombre: 'Tesorero corporativo',
      desc: 'Tu empresa tiene reservas de <strong>MXN $2,000,000</strong>. Debes decidir si convertir parte de ellas a dólares como cobertura.',
      logica: 'Si el tipo de cambio <em>sube</em> (el dólar se encarece), convertir pesos a dólares <strong>hoy</strong> protege el valor de las reservas. Si el tipo de cambio <em>baja</em>, conviene <strong>mantener en pesos</strong>.',
      accion: 'Decidir: ¿convertir MXN $1,000,000 a dólares hoy o mantener la posición en pesos?',
      promptExtra: '¿Cuántos dólares obtendrías hoy con MXN $1,000,000? ¿Y con el tipo de cambio pronosticado? ¿Qué decisión maximiza el valor de las reservas?'
    }
  ];

  var scenIdx = Math.floor(rng() * 4);
  var sc = scenarios[scenIdx];
  scenarioData = sc;

  var seriesStr = series.join(', ');

  /* ════════════════════════════════════════
     INTRODUCCIÓN + ESCENARIO PERSONAL
  ════════════════════════════════════════ */
  sec('<div class="stag">Ciclo Box-Jenkins</div>' +
      '<h2>Tu misión de hoy</h2>' +
      '<p>Vas a recorrer el <strong>Ciclo Box-Jenkins completo</strong> con una serie real de tipo de cambio ' +
      'USD/MXN. No hay respuestas esperadas en pantalla — tú corres el código en R, interpretas tu propia ' +
      'salida, y llegas a tus propias conclusiones.</p>' +
      '<p>Al final, usarás tu pronóstico para tomar una <strong>decisión de negocio concreta</strong>.</p>' +
      '<div class="refcard">' +
        '<div class="refcard-hdr">' +
          '<div class="refcard-ico">' + sc.icon + '</div>' +
          '<div><div class="refcard-title">Tu escenario: ' + sc.nombre + '</div>' +
          '<div class="refcard-sub">' + sc.accion + '</div></div>' +
        '</div>' +
        '<p style="font-size:.88rem;color:var(--text2);margin-bottom:.6rem">' + sc.desc + '</p>' +
        '<div class="callout-gold"><p><strong>Lógica de decisión:</strong> ' + sc.logica + '</p></div>' +
      '</div>' +
      '<p style="margin-top:1rem;font-size:.84rem;color:var(--text3)">Sigue los pasos en orden. Cada bloque de R corresponde exactamente a una etapa del ciclo.</p>');

  /* ════════════════════════════════════════
     PASO 1 — CARGAR Y GRAFICAR
  ════════════════════════════════════════ */
  sec(stepBar(0) +
      '<div class="stag">Paso 1 · Exploración inicial</div>' +
      '<h2>Carga tu serie y grafícala</h2>' +
      '<p>Tu serie contiene <strong>48 observaciones mensuales</strong> de tipo de cambio USD/MXN ' +
      '(enero 2020 – diciembre 2023). Carga los datos y genera la gráfica de tiempo.</p>' +
      '<div class="callout"><strong>¿Qué buscar?</strong><p>' +
      'Una serie <em>estacionaria</em> oscila alrededor de un nivel constante sin tendencia visible. ' +
      'Una serie <em>no estacionaria</em> muestra una dirección sostenida hacia arriba o abajo, ' +
      'o varianza que cambia con el tiempo.</p></div>' +
      rblock(
'# ── Tu serie personal USD/MXN (48 meses) ──\ntc <- c(' + seriesStr + ')\n\n# Convertir a objeto ts (inicio: enero 2020)\ntc_ts <- ts(tc, start=c(2020,1), frequency=12)\n\n# Graficar\nplot(tc_ts,\n     main="Tipo de Cambio USD/MXN",\n     ylab="MXN por USD", xlab="Tiempo",\n     col="steelblue", lwd=2)\nabline(h=mean(tc_ts), col="firebrick", lty=2)\nlegend("topleft", legend="Media global", col="firebrick", lty=2, bty="n")'
      ) +
      '<p style="font-size:.84rem;color:var(--text3);margin-top:.5rem">📌 Pega o fotografía tu gráfica en el área de trabajo de la pregunta siguiente.</p>');

  /* Problem 1 */
  var p1 = shuffleOpts(
    ['No — hay una tendencia ascendente visible, la media no es constante',
     'Sí — la serie oscila alrededor de un nivel constante sin dirección',
     'No se puede determinar solo con la gráfica',
     'Sí — cualquier serie de tipo de cambio es estacionaria por definición'],
    'No — hay una tendencia ascendente visible, la media no es constante', rng);
  problems.push({
    title: 'Inspección visual de la serie',
    questionText: 'Observa tu gráfica. La línea de media global (roja punteada), ¿cruza el centro de la serie en todo momento, o queda por debajo al inicio y por arriba al final (o viceversa)? Con base en eso, ¿tu serie parece estacionaria?',
    fn: '',
    options: p1.opts, correctIdx: p1.correctIdx,
    explanation: 'Una serie no estacionaria tiene una media que cambia con el tiempo — la línea de media global no divide la serie simétricamente. Si la serie "sube" de forma sostenida (tendencia), la media global queda por debajo en los primeros períodos y por encima al final. Ese patrón confirma no estacionariedad.',
    hint: 'Fíjate si la serie "cruza" la línea punteada varias veces de manera simétrica, o si casi nunca la toca en un extremo y la supera constantemente en el otro.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     PASO 2 — PRUEBA ADF EN NIVELES
  ════════════════════════════════════════ */
  sec(stepBar(1) +
      '<div class="stag">Paso 2 · Prueba formal de estacionariedad</div>' +
      '<h2>Prueba ADF en niveles</h2>' +
      '<p>La gráfica da una primera impresión, pero necesitamos confirmación estadística. ' +
      'La <strong>Prueba Aumentada de Dickey-Fuller (ADF)</strong> contrasta formalmente si existe raíz unitaria.</p>' +
      '<div class="callout"><strong>Regla de decisión ADF</strong><p>' +
      '<strong>H₀:</strong> la serie tiene raíz unitaria → no es estacionaria.<br>' +
      '<strong>H₁:</strong> la serie es estacionaria.<br><br>' +
      'Si p-valor &lt; 0.05 → rechazamos H₀ → la serie <em>es</em> estacionaria → <strong>d = 0</strong><br>' +
      'Si p-valor ≥ 0.05 → no rechazamos H₀ → la serie <em>no es</em> estacionaria → hay que diferenciar' +
      '</p></div>' +
      rblock(
'# Instalar si no lo tienes: install.packages("tseries")\nlibrary(tseries)\n\n# ADF sobre la serie en niveles\nadf.test(tc_ts)\n\n# Registra: estadístico Dickey-Fuller y p-valor'
      ));

  var p2 = shuffleOpts(
    ['p ≥ 0.05 — no rechazamos H₀, la serie no es estacionaria, d ≥ 1',
     'p < 0.05 — rechazamos H₀, la serie ya es estacionaria, d = 0',
     'El p-valor no importa; la gráfica ya confirmó la respuesta',
     'p ≥ 0.05 — rechazamos H₀, hay que diferenciar dos veces'],
    'p ≥ 0.05 — no rechazamos H₀, la serie no es estacionaria, d ≥ 1', rng);
  problems.push({
    title: 'Interpretación de la ADF en niveles',
    questionText: 'Ejecuta la ADF sobre tc_ts. Para una serie de tipo de cambio con tendencia, ¿qué resultado esperas obtener y qué significa para el parámetro d?',
    fn: 'Usa el resultado real de tu R',
    options: p2.opts, correctIdx: p2.correctIdx,
    explanation: 'Las series de tipo de cambio típicamente tienen raíz unitaria — el p-valor ADF suele ser alto (> 0.05), indicando que no podemos rechazar H₀. Esto confirma no estacionariedad y que necesitamos al menos una diferencia (d ≥ 1). Si tu p-valor es < 0.05, la serie sería excepcionalmente estacionaria en niveles — poco común en FX.',
    hint: 'Con p ≥ 0.05 NO rechazamos H₀. H₀ dice "hay raíz unitaria = no estacionaria". Entonces la serie no es estacionaria y d ≥ 1.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     PASO 3 — PRIMERA DIFERENCIA + ADF
  ════════════════════════════════════════ */
  sec(stepBar(1) +
      '<div class="stag">Paso 2 (cont.) · Diferenciación</div>' +
      '<h2>Primera diferencia y verificación</h2>' +
      '<p>Si la ADF en niveles confirmó no estacionariedad, tomamos la <strong>primera diferencia</strong>: ' +
      '∆TC<sub>t</sub> = TC<sub>t</sub> − TC<sub>t−1</sub>. Esto convierte el tipo de cambio en ' +
      '<em>variación diaria del peso frente al dólar</em> — mucho más cercano a un proceso estacionario.</p>' +
      '<p>Luego repetimos la ADF para confirmar que logramos estacionariedad.</p>' +
      rblock(
'# Primera diferencia\ndtc <- diff(tc_ts)\n\n# Graficar la serie diferenciada\nplot(dtc,\n     main="Primera diferencia — ∆USD/MXN",\n     ylab="Cambio en tipo de cambio", xlab="Tiempo",\n     col="darkgreen", lwd=2)\nabline(h=0, col="firebrick", lty=2)\n\n# ADF sobre la primera diferencia\nadf.test(dtc)\n\n# ¿El p-valor es ahora < 0.05?'
      ));

  var p3 = shuffleOpts(
    ['d = 1 — una diferencia fue suficiente para lograr estacionariedad',
     'd = 0 — la serie en niveles ya era estacionaria',
     'd = 2 — siempre se necesitan dos diferencias para el tipo de cambio',
     'd = 1 — pero habría que confirmar también con la prueba KPSS'],
    'd = 1 — una diferencia fue suficiente para lograr estacionariedad', rng);
  problems.push({
    title: 'Determinación de d',
    questionText: 'Después de aplicar diff(), la ADF sobre dtc arroja p-valor < 0.05. ¿Qué valor de d corresponde para tu modelo ARIMA?',
    fn: 'ADF en ∆TC: p < 0.05',
    options: p3.opts, correctIdx: p3.correctIdx,
    explanation: 'Si la ADF en la primera diferencia da p < 0.05, rechazamos H₀ — la serie diferenciada es estacionaria. Eso significa que una sola diferencia fue suficiente, por lo tanto d = 1. El modelo tendrá la forma ARIMA(p, 1, q).',
    hint: 'd cuenta cuántas veces hay que diferenciar para alcanzar estacionariedad. Si una diferencia basta, d = 1.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     PASO 4 — ACF Y PACF
  ════════════════════════════════════════ */
  sec(stepBar(2) +
      '<div class="stag">Paso 3 · Identificación de p y q</div>' +
      '<h2>ACF y PACF de la serie diferenciada</h2>' +
      '<p>Ahora que <code>dtc</code> es estacionaria, graficamos la <strong>ACF</strong> y la <strong>PACF</strong> ' +
      'para identificar los órdenes autorregresivo (p) y de media móvil (q).</p>' +
      '<div class="callout"><strong>Guía de identificación</strong><p>' +
      'Observa las barras que <em>sobresalen</em> de las bandas de significancia (líneas azules punteadas en R):<br><br>' +
      '• <strong>PACF se corta en lag k, ACF decae gradualmente</strong> → proceso AR(k) → p = k, q = 0<br>' +
      '• <strong>ACF se corta en lag k, PACF decae gradualmente</strong> → proceso MA(k) → p = 0, q = k<br>' +
      '• <strong>Ambas decaen gradualmente</strong> → proceso ARMA(p,q) → experimenta con p y q pequeños<br>' +
      '• <strong>Ninguna barra significativa</strong> → posible ruido blanco → verifica que d sea correcto' +
      '</p></div>' +
      rblock(
'# ACF y PACF de la primera diferencia\npar(mfrow=c(1,2))\nacf(dtc,  main="ACF — ∆USD/MXN",  lag.max=16)\npacf(dtc, main="PACF — ∆USD/MXN", lag.max=16)\npar(mfrow=c(1,1))\n\n# ¿En qué lags hay barras significativas?\n# ¿Cuál se corta y cuál decae?'
      ) +
      '<p style="font-size:.84rem;color:var(--text3);margin-top:.5rem">📌 Fotografía o dibuja tus ACF/PACF — las necesitarás para justificar tu elección de modelo.</p>');

  var p4 = shuffleOpts(
    ['PACF se corta en lag 1, ACF decae → AR(1) → modelo candidato ARIMA(1,1,0)',
     'ACF se corta en lag 1, PACF decae → MA(1) → modelo candidato ARIMA(0,1,1)',
     'Ambas se cortan en lag 1 → ARMA(1,1) → modelo candidato ARIMA(1,1,1)',
     'Ninguna barra es significativa → ARIMA(0,1,0) — caminata aleatoria'],
    'PACF se corta en lag 1, ACF decae → AR(1) → modelo candidato ARIMA(1,1,0)', rng);
  problems.push({
    title: 'Identificación del modelo candidato',
    questionText: 'Observa tus gráficas de ACF y PACF. El patrón más común en tipos de cambio es una PACF que se corta abruptamente en lag 1 mientras la ACF decae gradualmente. Si ves ese patrón, ¿qué modelo candidato señala?',
    fn: 'Usa la guía de identificación de arriba',
    options: p4.opts, correctIdx: p4.correctIdx,
    explanation: 'PACF cortándose en lag 1 + ACF decayendo es la firma de un proceso AR(1). Con d = 1 ya determinado, el modelo completo es ARIMA(1,1,0). Si tu ACF/PACF muestra un patrón diferente, el modelo correcto para ti puede ser distinto — lo importante es que tu elección sea consistente con lo que observas.',
    hint: 'La función que SE CORTA define el componente dominante: PACF se corta → AR. ACF se corta → MA.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     PASO 5 — ESTIMACIÓN
  ════════════════════════════════════════ */
  sec(stepBar(3) +
      '<div class="stag">Paso 4 · Estimación</div>' +
      '<h2>Ajuste del modelo ARIMA</h2>' +
      '<p>Con p, d, q identificados, ajusta el modelo. Si tu ACF/PACF sugirió ARIMA(1,1,0), ' +
      'usa <code>order=c(1,1,0)</code>. Si identificaste otro modelo, ajusta el vector en consecuencia.</p>' +
      '<div class="callout"><strong>¿Qué revisar en la salida?</strong><p>' +
      'Observa el <strong>coeficiente estimado</strong> (ar1 o ma1) y su <strong>error estándar</strong>. ' +
      'Si |coeficiente / s.e.| &gt; 2, el parámetro es estadísticamente significativo al ~5%. ' +
      'También anota el <strong>AIC</strong> — si comparas modelos alternativos, elige el de menor AIC.' +
      '</p></div>' +
      rblock(
'# Ajustar ARIMA — cambia p,d,q según tu identificación\nmodelo <- arima(tc_ts, order=c(1,1,0))\n\n# Ver resultados\nsummary(modelo)\n\n# ¿El coeficiente es significativo?\n# t = coeficiente / s.e.  →  ¿|t| > 2?\ncoef(modelo)\n\n# AIC del modelo\nmodelo$aic'
      ));

  var p5 = shuffleOpts(
    ['|t| > 2 → el coeficiente es estadísticamente significativo y aporta al modelo',
     '|t| > 2 → el coeficiente no es significativo y debe eliminarse del modelo',
     '|t| < 2 → el coeficiente es significativo a un nivel de confianza mayor',
     'El estadístico t no aplica para modelos ARIMA, solo para regresión lineal'],
    '|t| > 2 → el coeficiente es estadísticamente significativo y aporta al modelo', rng);
  problems.push({
    title: 'Significancia del coeficiente estimado',
    questionText: 'Tu modelo devuelve un coeficiente con valor estimado y su error estándar. Calculas t = coeficiente / s.e. y obtienes un valor con |t| > 2. ¿Qué significa esto?',
    fn: 't = coeficiente ÷ s.e.',
    options: p5.opts, correctIdx: p5.correctIdx,
    explanation: '|t| > 2 equivale aproximadamente a un p-valor < 0.05 (para muestras moderadas). Significa que el coeficiente es estadísticamente distinguible de cero — el componente AR o MA que representa realmente contribuye a explicar la dinámica de la serie.',
    hint: 'La regla práctica: si el valor absoluto del estadístico t supera 2, el parámetro es significativo al ~5%.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     PASO 6 — DIAGNÓSTICO
  ════════════════════════════════════════ */
  sec(stepBar(4) +
      '<div class="stag">Paso 5 · Diagnóstico de residuos</div>' +
      '<h2>¿Los residuos son ruido blanco?</h2>' +
      '<p>El modelo es válido solo si sus <strong>residuos no muestran estructura autocorrelacionada</strong>. ' +
      'Si quedan patrones, el modelo está incompleto y los pronósticos serán sesgados.</p>' +
      '<p>Realizamos tres verificaciones:</p>' +
      '<div class="rules-grid">' +
        '<div class="rcard"><div class="rname">Verificación 1</div><div class="rform">Gráfica de residuos</div><div class="rnote">Deben oscilar alrededor de cero, sin tendencia ni varianza creciente.</div></div>' +
        '<div class="rcard"><div class="rname">Verificación 2</div><div class="rform">ACF de residuos</div><div class="rnote">Ninguna barra debe salir de las bandas de significancia.</div></div>' +
        '<div class="rcard"><div class="rname">Verificación 3</div><div class="rform">Prueba Ljung-Box</div><div class="rnote">H₀: residuos independientes. Queremos p-valor &gt; 0.05.</div></div>' +
      '</div>' +
      rblock(
'# Extraer y analizar residuos\nres <- modelo$residuals\n\n# Gráfica\nplot(res, main="Residuos del modelo ARIMA",\n     col="darkblue", lwd=1.5)\nabline(h=0, col="red", lty=2)\n\n# ACF de residuos\nacf(res, main="ACF — Residuos", lag.max=16)\n\n# Prueba de Ljung-Box (10 rezagos)\nBox.test(res, lag=10, type="Ljung-Box")\n\n# p-valor > 0.05 → residuos son ruido blanco ✓\n# p-valor < 0.05 → hay estructura residual → ajustar p o q'
      ));

  var p6 = shuffleOpts(
    ['Regresar a la etapa de identificación y ajustar p o q del modelo',
     'Aumentar d en 1 — los residuos autocorrelacionados indican más diferenciación',
     'Aceptar el modelo de todas formas — algún grado de autocorrelación es normal',
     'Cambiar el nivel α de la prueba a 0.01 para que el modelo pase'],
    'Regresar a la etapa de identificación y ajustar p o q del modelo', rng);
  problems.push({
    title: 'Diagnóstico: modelo rechazado',
    questionText: 'La prueba de Ljung-Box devuelve p-valor = 0.03 sobre los residuos de tu ARIMA. ¿Qué acción corresponde?',
    fn: 'H₀ Ljung-Box: residuos son independientes',
    options: p6.opts, correctIdx: p6.correctIdx,
    explanation: 'p = 0.03 < 0.05 → rechazamos H₀ → hay autocorrelación residual. El modelo no capturó toda la estructura de la serie. La acción correcta es volver a la identificación: quizás p o q están subestimados. Por ejemplo, si usaste ARIMA(1,1,0) y falla, prueba ARIMA(2,1,0) o ARIMA(1,1,1). Aumentar d sería incorrecto — ya logramos estacionariedad con d=1.',
    hint: 'Ljung-Box p < 0.05 = hay autocorrelación que el modelo no explicó. ¿Qué etapa del ciclo determina p y q?',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     PASO 7 — PRONÓSTICO
  ════════════════════════════════════════ */
  sec(stepBar(5) +
      '<div class="stag">Paso 6 · Pronóstico</div>' +
      '<h2>Pronóstico a 3 meses</h2>' +
      '<p>Si el diagnóstico pasó, generamos las predicciones para los <strong>3 meses siguientes</strong>. ' +
      'El paquete <code>forecast</code> produce el pronóstico puntual más intervalos al 80% y 95%.</p>' +
      '<div class="callout-gold"><strong>¿Por qué los intervalos se amplían?</strong><p>' +
      'Cada mes adicional de pronóstico acumula la incertidumbre de todos los períodos previos. ' +
      'El intervalo del mes 3 es más ancho que el del mes 1 porque incorpora más fuentes de error. ' +
      'Esto no es un defecto — es una propiedad matemática fundamental.</p></div>' +
      rblock(
'# Instalar si no lo tienes: install.packages("forecast")\nlibrary(forecast)\n\n# Pronóstico 3 meses adelante\npred <- forecast(modelo, h=3)\nprint(pred)\n\n# Visualizar\nplot(pred,\n     main="Pronóstico USD/MXN — ARIMA",\n     ylab="MXN por USD", xlab="Tiempo",\n     shadecols=c("lightblue","steelblue"),\n     fcol="darkblue", lwd=2)\n\n# Tipo de cambio actual (último valor observado)\ncat("Tipo de cambio actual:", tail(tc, 1), "\\n")\ncat("Pronóstico mes 1:", pred$mean[1], "\\n")\ncat("Pronóstico mes 2:", pred$mean[2], "\\n")\ncat("Pronóstico mes 3:", pred$mean[3], "\\n")'
      ) +
      '<p style="font-size:.84rem;color:var(--text3);margin-top:.5rem">📌 Anota el tipo de cambio actual (' + lastVal.toFixed(2) + ' MXN/USD en tu serie) y los tres valores pronosticados — los necesitarás para la reflexión final.</p>');

  var p7 = shuffleOpts(
    ['El pronóstico converge hacia la tendencia de largo plazo del modelo — los cambios son graduales',
     'El pronóstico oscila hacia arriba y abajo de forma aleatoria',
     'El pronóstico siempre converge a la media histórica de la serie en niveles',
     'Los tres pronósticos son idénticos — ARIMA predice valores constantes'],
    'El pronóstico converge hacia la tendencia de largo plazo del modelo — los cambios son graduales', rng);
  problems.push({
    title: 'Comportamiento del pronóstico ARIMA',
    questionText: 'Observa los tres valores pronosticados (meses 1, 2 y 3). En un ARIMA(1,1,0) con coeficiente AR positivo, ¿cómo se comportan los pronósticos a medida que avanza el horizonte?',
    fn: 'Coeficiente AR: 0 < φ < 1',
    options: p7.opts, correctIdx: p7.correctIdx,
    explanation: 'En un AR(1) con 0 < φ < 1, el pronóstico converge exponencialmente hacia la tendencia implícita del proceso diferenciado. Los cambios predichos se vuelven más pequeños conforme avanza el horizonte. No son idénticos ni oscilatorios, sino que "se apagan" gradualmente.',
    hint: 'Con φ positivo y menor a 1, el efecto del último valor observado se diluye con cada paso hacia el futuro.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     EVALUACIÓN FINAL — 3 preguntas sin explicación
  ════════════════════════════════════════ */
  sec('<div class="stag">Evaluación Final</div>' +
      '<h2>Preguntas de integración</h2>' +
      '<p>Las siguientes tres preguntas cubren el ciclo completo sin apoyo adicional. ' +
      'Responde con base en lo que hiciste hoy.</p>');

  /* Final 1 */
  var f1 = shuffleOpts(
    ['Identificación → Estimación → Diagnóstico → Pronóstico',
     'Estimación → Identificación → Diagnóstico → Pronóstico',
     'Diferenciación → Estimación → ACF/PACF → Pronóstico',
     'Pronóstico → Diagnóstico → Estimación → Identificación'],
    'Identificación → Estimación → Diagnóstico → Pronóstico', rng);
  problems.push({
    title: 'Orden del Ciclo Box-Jenkins',
    questionText: '¿Cuál es el orden correcto de las cuatro etapas del Ciclo Box-Jenkins?',
    fn: '',
    options: f1.opts, correctIdx: f1.correctIdx,
    explanation: 'El ciclo siempre sigue: (1) Identificación — determinar d con ADF, luego p y q con ACF/PACF. (2) Estimación — ajustar el modelo por máxima verosimilitud. (3) Diagnóstico — verificar que los residuos sean ruido blanco. (4) Pronóstico — solo si el modelo pasó el diagnóstico. Saltarse el diagnóstico es el error más común.',
    hint: 'El ciclo empieza siempre explorando los datos, nunca ajustando directamente.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* Final 2 */
  var f2 = shuffleOpts(
    ['ADF p < 0.05 → rechazamos H₀ → la serie ya es estacionaria → d = 0',
     'ADF p < 0.05 → no rechazamos H₀ → hay que diferenciar → d = 1',
     'ADF p < 0.05 → la serie tiene raíz unitaria → d = 2',
     'ADF p < 0.05 → el resultado es inconcluso — se necesita otra prueba'],
    'ADF p < 0.05 → rechazamos H₀ → la serie ya es estacionaria → d = 0', rng);
  problems.push({
    title: 'Lectura correcta de la ADF',
    questionText: 'Aplicas la ADF directamente a una serie en niveles y obtienes p-valor = 0.008. ¿Qué concluyes sobre d?',
    fn: 'H₀ ADF: la serie tiene raíz unitaria',
    options: f2.opts, correctIdx: f2.correctIdx,
    explanation: 'p = 0.008 < 0.05 → rechazamos H₀ (raíz unitaria) → la serie en niveles ya es estacionaria → d = 0. El error clásico es confundir la dirección: rechazar H₀ en ADF significa que la serie ES estacionaria, no que necesita diferenciarse.',
    hint: 'Rechazar H₀ en ADF es la buena noticia: significa que la serie ya es estacionaria.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* Final 3 */
  var f3 = shuffleOpts(
    ['El intervalo crece porque cada paso acumula la incertidumbre de los errores previos',
     'El intervalo crece porque el modelo está mal especificado',
     'El intervalo es constante en un ARIMA bien ajustado; si crece hay un error',
     'El intervalo crece solo para horizontes mayores a 12 períodos'],
    'El intervalo crece porque cada paso acumula la incertidumbre de los errores previos', rng);
  problems.push({
    title: 'Amplitud de los intervalos de predicción',
    questionText: 'El intervalo de predicción al 95% para el mes 1 es más estrecho que para el mes 3. ¿Por qué se amplían los intervalos con el horizonte de pronóstico?',
    fn: '',
    options: f3.opts, correctIdx: f3.correctIdx,
    explanation: 'El error de pronóstico en el horizonte k depende de k innovaciones (errores). La varianza acumulada crece con k, por lo que el intervalo se amplía. En un AR(1): Var(error h=1) = σ², Var(error h=2) = σ²(1 + φ²), etc. Este crecimiento es una propiedad matemática, no un defecto del modelo.',
    hint: 'Cuanto más lejos miramos al futuro, más "pasos" de incertidumbre se acumulan.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════
     REFLEXIÓN FINAL — DECISIÓN DE NEGOCIO
  ════════════════════════════════════════ */
  var refDiv = document.createElement('div');
  refDiv.className = 'section';
  refDiv.id = 'refSection';
  refDiv.innerHTML =
    '<div class="stag">Reflexión Final</div>' +
    '<h2>Tu decisión de negocio</h2>' +
    '<p>Ahora integra tu pronóstico con el escenario que te fue asignado. ' +
    'No hay respuesta correcta única — lo que importa es que tu recomendación sea <strong>coherente con tu modelo</strong>.</p>' +
    '<div class="refcard">' +
      '<div class="refcard-hdr">' +
        '<div class="refcard-ico">' + sc.icon + '</div>' +
        '<div><div class="refcard-title">' + sc.nombre + '</div>' +
        '<div class="refcard-sub">Tipo de cambio actual en tu serie: ' + lastVal.toFixed(2) + ' MXN/USD</div></div>' +
      '</div>' +
      '<p style="font-size:.88rem;color:var(--text2);margin-bottom:.8rem">' + sc.desc + '</p>' +
      '<div class="callout-gold"><p><strong>Recuerda:</strong> ' + sc.logica + '</p></div>' +
      '<ul class="ref-prompts">' +
        '<li>' + sc.promptExtra + '</li>' +
        '<li>¿Cuál es el intervalo de confianza al 95% de tu pronóstico para el mes 3? ¿Qué tan seguros podemos estar de la decisión?</li>' +
        '<li>¿Cambia tu recomendación si el tipo de cambio llega al límite superior del intervalo en lugar del pronóstico puntual?</li>' +
      '</ul>' +
      '<textarea class="reftextarea" id="refTextarea" placeholder="Escribe aquí tu análisis y recomendación (mínimo 4 oraciones)..." oninput="saveSession()"></textarea>' +
    '</div>';
  lb.appendChild(refDiv);
  setTimeout(function() { refDiv.classList.add('vis'); }, 100);
}
</script>
</body>
</html>
