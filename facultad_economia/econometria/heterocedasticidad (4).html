<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heterocedasticidad — Econometría</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}

/* ── WELCOME ── */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}

/* ── LESSON ── */
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}

/* ── CONTENT ── */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}
.callout-warn{background:var(--gold-bg);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout-warn strong{color:var(--gold);}
.callout-warn p{margin-bottom:0;}

/* ── RULE CARDS ── */
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green);}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem;}
.rnote{font-size:.76rem;color:var(--text3);}

/* ── GRAPH CARD ── */
.gcrd{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem;margin:.9rem 0;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin-top:.9rem;}
.metric{background:var(--surface2);border-radius:8px;padding:.65rem;text-align:center;}
.mlbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.15rem;}
.mnum{font-family:'IBM Plex Mono',monospace;font-size:.95rem;font-weight:600;}
.mnum.cs{color:var(--green);}
.mnum.ps{color:var(--gold);}

/* ── PROBLEM CARDS ── */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}

/* ── WORK AREA TABS ── */
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}

/* ── CANVAS ── */
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15em;line-height:1.1;}
.mf-num{border-bottom:1.5px solid var(--text);padding:0 .2em .1em;font-size:.92em;text-align:center;}
.mf-den{padding:.1em .2em 0;font-size:.92em;text-align:center;}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopt.pending{border-color:var(--gold);background:var(--surface);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}

/* ── RESULT ── */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center;}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}

/* ── SCATTER / PLOT ── */
.plot-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.2rem 0;}
@media(max-width:540px){.plot-grid{grid-template-columns:1fr;}}
.plot-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.plot-label{padding:.5rem .8rem;font-size:.73rem;font-weight:700;text-align:center;background:var(--surface2);border-bottom:1px solid var(--border);}
.plot-label.good{color:var(--ok);}
.plot-label.bad{color:var(--bad);}
.plot-canvas{display:block;width:100%;height:160px;}

/* ── GRETL OUTPUT MOCKUP ── */
.gout{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin:1.2rem 0;font-family:'IBM Plex Mono',monospace;font-size:.78rem;}
.gout-title{background:var(--surface2);border-bottom:1px solid var(--border);padding:.5rem .9rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:flex;align-items:center;gap:.5rem;}
.gout-title span{background:var(--green);color:#fff;border-radius:4px;padding:.1rem .45rem;font-size:.66rem;}
.gout-body{padding:.8rem .9rem;overflow-x:auto;}
.gout-body table{width:100%;border-collapse:collapse;}
.gout-body th{text-align:left;color:var(--text3);font-weight:600;font-size:.72rem;padding:.2rem .5rem .4rem;border-bottom:1px solid var(--border);}
.gout-body td{padding:.3rem .5rem;color:var(--text);font-size:.78rem;white-space:nowrap;}
.gout-body tr:nth-child(even) td{background:var(--surface2);}
.gout-sep{border:none;border-top:1px dashed var(--border);margin:.6rem 0;}
.gout-stat{display:flex;flex-wrap:wrap;gap:.4rem .9rem;font-size:.78rem;color:var(--text2);}
.gout-stat strong{color:var(--text);}
.gout-pval{color:var(--bad);font-weight:700;}
.gout-pok{color:var(--ok);font-weight:700;}

/* ── CONSEQUENCES STEPS ── */
.conseq-step{display:flex;gap:.9rem;margin-bottom:.9rem;}
.conseq-num{background:var(--green);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:.15rem;}
.conseq-body{}
.conseq-title{font-weight:600;font-size:.9rem;margin-bottom:.2rem;}
.conseq-text{font-size:.84rem;color:var(--text2);}

/* ── SIM ── */
.sim-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1.2rem 0;}
.sim-title{font-weight:700;font-size:.9rem;margin-bottom:.7rem;}
.sim-controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;margin-bottom:.9rem;}
@media(max-width:540px){.sim-controls{grid-template-columns:1fr;}}
.sim-ctrl label{font-size:.73rem;color:var(--text3);display:block;margin-bottom:.25rem;}
.sim-ctrl select,.sim-ctrl input{width:100%;accent-color:var(--green);}
.sim-val{font-weight:600;color:var(--green);}
.sim-canvas{display:block;width:100%;height:180px;border-radius:8px;border:1px solid var(--border);}
.sim-result{margin-top:.65rem;font-size:.82rem;color:var(--text2);background:var(--surface2);border-radius:8px;padding:.55rem .8rem;}

/* ── MOBILE ── */
@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;border-radius:12px;}
  .wlogos img{height:38px;}
  .wtitle{font-size:1.35rem;}
  .htitle{display:none;}
  .hlogos img{height:20px;}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:110px;overflow:hidden;text-overflow:ellipsis;}
  .lbody{padding:1.2rem .7rem 3rem;}
  .section h2{font-size:1.3rem;}
  .rules-grid{grid-template-columns:1fr;}
  .metrics{grid-template-columns:repeat(2,1fr);}
  .pbody{padding:.75rem;}
  .pstmt{font-size:.84rem;}
  .mcopt{font-size:.83rem;padding:.58rem .7rem;}
  .dcanvas{height:220px;}
  .ctoolbar{gap:.25rem;}
  .callout{padding:.8rem .9rem;}
  .rcard{overflow-x:auto;}
  .sim-controls{grid-template-columns:1fr;}
  .gout-body{font-size:.72rem;}
  .ds-col-grid{grid-template-columns:1fr !important;}
}
</style>

  var drawings=[], texts=[], photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var b=document.createElement('canvas');b.width=dc.width;b.height=dc.height;drawings.push(dc.toDataURL()===b.toDataURL()?null:dc.toDataURL('image/png'));}
    else drawings.push(null);
    var ta=document.getElementById('ta'+i); texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i); photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  var state={name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,
    choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos};
  try{localStorage.setItem(lsKey(),JSON.stringify(state));}catch(e){}
}

function loadSession(name,group){
  var key='heterocedasticidad__'+(name+'__'+group).replace(/\s+/g,'_');
  try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}
}

function restoreSession(){
  var name=document.getElementById('sName').value.trim();
  var group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group);
  if(!saved)return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};
  answeredCount=0;correctCount=0;
  buildLesson(seededRng(name+group));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
  saved.choices.forEach(function(c,idx){if(c!==null&&c!==undefined)confirmMC(idx,c);});
  setTimeout(function(){
    if(saved.drawings)saved.drawings.forEach(function(d,i){if(!d)return;var dc=document.getElementById('dc'+i);if(!dc||!dc.width)return;var img=new Image();img.onload=function(){var dpr=window.devicePixelRatio||1;dc.getContext('2d').drawImage(img,0,0,dc.width/dpr,dc.height/dpr);};img.src=d;});
    if(saved.texts)saved.texts.forEach(function(t,i){if(!t)return;var ta=document.getElementById('ta'+i);if(ta)ta.value=t;});
    if(saved.photos)saved.photos.forEach(function(d,i){if(!d)return;var pp=document.getElementById('pp'+i);if(!pp)return;pp.src=d;pp.style.display='block';var pz=document.getElementById('pz'+i);if(pz)pz.style.opacity='0.4';});
  },300);
}

/* ── SEEDED RNG ── */
function seededRng(seed){
  var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function shuffleOpts(opts,correct,rng){
  var arr=opts.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
  return{opts:arr,correctIdx:arr.indexOf(correct)};
}

/* ── CANVAS ── */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  if(rect.width===0)return;
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p.x;ly=p.y;ctx.beginPath();ctx.arc(lx,ly,ctx.lineWidth/2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(lx,ly);}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);lx=p.x;ly=p.y;}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){
    btn.addEventListener('click',function(){
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      if(btn.classList.contains('bpen'))ctx.lineWidth=2;
      if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}
      if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot){
    dot.addEventListener('click',function(){
      tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});
      dot.classList.add('sel');ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;
      ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

/* ── TWO-TAP MC ── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();
    if(answeredCount===problems.length)setTimeout(showResults,700);
    return;
  }
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];
  if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
  saveSession();
  if(answeredCount===problems.length)setTimeout(showResults,700);
}

/* ── CANVAS PLOTS ── */
function drawResidualPlot(canvasId, pattern, n, spread) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  if (rect.width === 0) { setTimeout(function(){drawResidualPlot(canvasId,pattern,n,spread);},100); return; }
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var W = rect.width, H = rect.height;
  var pad = 22;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#ddd8cc'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(pad, H/2); ctx.lineTo(W-pad, H/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad, pad); ctx.lineTo(pad, H-pad); ctx.stroke();
  var seed = 42;
  function rnd() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 4294967296; }
  ctx.fillStyle = '#4a7c3f';
  for (var k = 0; k < n; k++) {
    var t = rnd();
    var x = pad + t * (W - 2*pad);
    var base = (rnd() - 0.5) * 2;
    var s = spread;
    if (pattern === 'fanout')  s = spread * (0.2 + 1.6*t);
    if (pattern === 'fanin')   s = spread * (1.8 - 1.4*t);
    if (pattern === 'grouped') s = spread * (rnd() > 0.5 ? 1.8 : 0.35);
    var y = H/2 + base * s * (H/2 - pad) * 0.7;
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
  }
}

function checkScenarios() {

  selects.forEach(function(s){ if(s.value==='') allDone=false; });
  var btn = document.getElementById('sc_check_btn');

}

function submitScenarios() {
  var answers = window._sc_answers||[];
  var reasons = window._sc_reasons||[];
  var correct = 0;
  for(var i=0;i<answers.length;i++){
    var sel=document.getElementById('sc_sel_'+i);
    var icon=document.getElementById('sc_icon_'+i);
    var ok=(sel&&sel.value==='yes')===answers[i];
    if(ok)correct++;
    if(icon)icon.innerHTML=ok?'<span style="color:var(--ok);font-size:1.1rem">✓</span>':'<span style="color:var(--bad);font-size:1.1rem">✗</span>';
    if(sel)sel.disabled=true;
  }
  var btn=document.getElementById('sc_check_btn');
  if(btn)btn.disabled=true;
  var pct=Math.round(correct/answers.length*100);
  var fbHtml='<strong>'+correct+' de '+answers.length+' correctas ('+pct+'%).</strong><br><ul style="margin-top:.5rem;padding-left:1.2rem">';
  for(var j=0;j<answers.length;j++){
    var selJ=document.getElementById('sc_sel_'+j);
    var userJ=selJ?selJ.value:'';
    var okJ=(userJ==='yes')===answers[j];
    fbHtml+='<li style="margin-bottom:.3rem;font-size:.82rem;color:'+(okJ?'var(--ok)':'var(--bad)')+'">'+
      (answers[j]?'Sí — ':'No — ')+reasons[j]+'</li>';
  }
  fbHtml+='</ul>';
  var fb=document.getElementById('sc_feedback');
  if(fb){fb.innerHTML=fbHtml;fb.style.display='block';fb.style.background=pct>=67?'var(--ok-bg)':'var(--bad-bg)';fb.style.color=pct>=67?'var(--ok)':'var(--bad)';}
  var prob=problems[0];
  if(prob&&prob.studentChoice===null){
    prob.studentChoice=0;correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    document.getElementById('pc0').classList.add('ok');
    saveSession();
    if(answeredCount===problems.length)setTimeout(showResults,700);
  }
}

function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');

  /* ══ SEC 1: DEFINICIÓN ══ */
  var s1 = document.createElement('div'); s1.className = 'section';
  s1.innerHTML =
    '<div class="stag">Sección 1 · Definición</div>' +
    '<h2>¿Qué es la heterocedasticidad?</h2>' +
    '<p>MCO asume que el error de cada observación tiene la <strong>misma varianza</strong>. Cuando eso se cumple se llama <em>homoscedasticidad</em> — los residuos se dispersan de manera uniforme sin importar el valor de X.</p>' +
    '<p>La <strong>heterocedasticidad</strong> ocurre cuando ese supuesto se viola: la varianza del error <em>cambia</em> según el nivel de alguna variable del modelo.</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Supuesto cumplido</div><div class="rform">Var(εᵢ) = σ²</div><div class="rnote">La misma varianza para toda observación. Los residuos se dispersan igual en todos los niveles de X.</div></div>' +
      '<div class="rcard"><div class="rname">Heterocedasticidad</div><div class="rform">Var(εᵢ) = σᵢ²</div><div class="rnote">Cada observación tiene su propia varianza — el subíndice i indica que cambia con los datos.</div></div>' +
    '</div>' +
    '<div class="callout">' +
      '<p><strong>Ejemplo concreto:</strong> Un modelo que predice el gasto discrecional a partir del ingreso mensual. Las familias con ingresos bajos gastan cantidades muy similares entre sí — poca dispersión. Las familias con ingresos altos muestran una enorme variedad: algunas ahorran casi todo, otras gastan cantidades enormes. La varianza del error crece con el ingreso — eso es heterocedasticidad.</p>' +
    '</div>' +
    '<div class="callout-warn" style="margin-top:1rem">' +
      '<p><strong>¿Por qué es un problema?</strong> Cuando la varianza no es constante, MCO calcula mal los errores estándar. Esto hace que los estadísticos t y los valores p sean incorrectos — podrías declarar que una variable es significativa cuando no lo es. Los coeficientes β̂ en sí siguen siendo válidos, pero la inferencia (pruebas de hipótesis e intervalos de confianza) deja de ser confiable.</p>' +
    '</div>';
  lb.appendChild(s1);

  // P1 — Scenario dropdown: ¿cuándo esperarías heterocedasticidad?
  var beta1_raw = +(0.22 + rng()*0.12).toFixed(4);
  var se_std    = +(0.018 + rng()*0.012).toFixed(4);

  var scenarios = [
    { text: 'Ventas diarias de una tienda de conveniencia en distintos días del año',
      hetero: false,
      reason: 'Las ventas de una tienda de conveniencia varían de forma bastante uniforme — no hay razón para que la dispersión cambie sistemáticamente con el nivel de ventas.' },
    { text: 'Salarios de empleados en función de sus años de experiencia',
      hetero: true,
      reason: 'Entre empleados con poca experiencia los salarios son bajos y similares, pero entre los más experimentados la dispersión es enorme — algunos se quedan en rangos medios, otros llegan a ejecutivos.' },
    { text: 'Número de errores en exámenes de estudiantes con el mismo nivel de preparación',
      hetero: false,
      reason: 'Si todos tienen el mismo nivel de preparación, la varianza debería ser similar — no hay una variable que haga que la dispersión cambie sistemáticamente.' },

  // Helper: OLS from arrays
  function olsFit(xs, ys) {
    var n = xs.length, sx=0, sy=0, sxy=0, sxx=0;
    for(var i=0;i<n;i++){sx+=xs[i];sy+=ys[i];sxy+=xs[i]*ys[i];sxx+=xs[i]*xs[i];}
    var b1 = (sxy - sx*sy/n) / (sxx - sx*sx/n);
    var b0 = sy/n - b1*(sx/n);
    return {b0:+b0.toFixed(4), b1:+b1.toFixed(4)};
  }

    function lrng(){ localSeed=(localSeed*1664525+1013904223)&0xffffffff; return (localSeed>>>0)/4294967296; }

    var trueB0 = +(4 + rng()*6).toFixed(2);
    var trueB1 = +(0.4 + rng()*1.2).toFixed(3);

      var x = +(ctx2.xBase + lrng()*ctx2.xRange).toFixed(2);
      var t = (x - ctx2.xBase) / ctx2.xRange; // 0..1 normalized
      var baseNoise = (lrng()-0.5)*2;
      var noise;
      if(pat==='homo')    noise = baseNoise * 1.4;

function submitCSV() {

    if(icon) icon.innerHTML = ok
      ? '<span style="color:var(--ok);font-size:1.1rem">✓</span>'
      : '<span style="color:var(--bad);font-size:1.1rem">✗</span>';
    if(cb) cb.disabled = true;
  }
  var pct = Math.round(correct/total*100);
  var sigVals = pvRef.filter(function(p){return p.hetero;}).map(function(p){return 'p = '+p.val;}).join(', ');
  var nosigVals = pvRef.filter(function(p){return !p.hetero;}).map(function(p){return 'p = '+p.val;}).join(', ');
  var fbHtml = '<strong>'+correct+' de '+total+' correctas ('+pct+'%).</strong><br>'+
    '<span style="font-size:.83rem">Indicaban heterocedasticidad (p &lt; 0.05): <strong>'+sigVals+'</strong><br>'+
    'No indicaban heterocedasticidad (p &ge; 0.05): <strong>'+nosigVals+'</strong></span>';
  var fb = document.getElementById('pv_feedback');
  if(fb){fb.innerHTML=fbHtml;fb.style.display='block';fb.style.background=pct===100?'var(--ok-bg)':'var(--gold-bg)';fb.style.color=pct===100?'var(--ok)':'var(--text2)';}
  var prob = problems[3];
  if(prob && prob.studentChoice===null){
    prob.studentChoice=0;correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    document.getElementById('pc3').classList.add(pct===100?'ok':'bad');
    saveSession();
    if(answeredCount===problems.length)setTimeout(showResults,700);
  }
}
