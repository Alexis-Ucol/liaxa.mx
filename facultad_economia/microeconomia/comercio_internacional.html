<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercio Internacional — Microeconomía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* WELCOME */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* LESSON */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* CONTENT */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* RULE CARDS */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* GRAPH / SVG CONTAINERS */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* MODE TABS */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* PROBLEM CARDS */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* WORK AREA TABS */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* CANVAS */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* MATH FRACTIONS */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* TEXTAREA */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* PHOTO */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* HINT */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* MC */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* RESULT */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* INTERACTIVE GRAPH */
.trade-graph { width:100%; max-width:540px; margin:0 auto; display:block; }
.slider-row { display:flex; align-items:center; gap:.7rem; margin:.5rem 0; font-size:.82rem; color:var(--text2); }
.slider-row input { flex:1; accent-color:var(--green); }
.slider-row span { font-weight:600; color:var(--green); min-width:2.5rem; text-align:right; font-family:'IBM Plex Mono',monospace; }
.graph-legend { display:flex; gap:1rem; flex-wrap:wrap; font-size:.74rem; margin:.5rem 0; color:var(--text3); }
.leg-item { display:flex; align-items:center; gap:.3rem; }
.leg-dot { width:12px; height:3px; border-radius:2px; }
.surplus-box { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; margin-top:.8rem; }
.sbox { background:var(--surface2); border-radius:8px; padding:.6rem; text-align:center; }
.sbox-lbl { font-size:.65rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text3); margin-bottom:.2rem; }
.sbox-val { font-family:'IBM Plex Mono',monospace; font-size:.9rem; font-weight:600; }

/* MOBILE */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .surplus-box { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

}
function saveSession() {

  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = 'COMERCIO_INTL__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }

function checkForSavedSession() {

}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';

  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;

  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;

      });

/* ── SEEDED RNG ── */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function ri(lo, hi, rng) { return lo + Math.floor(rng() * (hi - lo + 1)); }

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── MC HANDLER (two-tap) ── */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    confirmMC(probIdx, chosenIdx);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

   INTERACTIVE GRAPH FUNCTIONS

/* Grafica 1: Autarquía — mercado doméstico sin comercio */
function drawAutarkyGraph(canvasId, a) {
  // Curvas: Oferta P = 0.8*Q, Demanda P = a - 0.8*Q
  // Equilibrio: 0.8Q = a - 0.8Q → Q* = a/1.6, P* = 0.8*(a/1.6) = a/2
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  var pad = { l:50, r:20, t:20, b:40 };
  var gW = W - pad.l - pad.r, gH = H - pad.t - pad.b;

  // Escala fija: precio 0–240, cantidad 0–240
  var maxP = 240, maxQ = 240;
  function px(q) { return pad.l + (q / maxQ) * gW; }
  function py(p) { return pad.t + gH - (p / maxP) * gH; }

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var axisColor = isDark ? '#b0aa9e' : '#4a4640';
  var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  var textColor = isDark ? '#e8e4da' : '#1a1a16';

  // Grid
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var g = 0; g <= maxP; g += 60) {
    ctx.beginPath(); ctx.moveTo(pad.l, py(g)); ctx.lineTo(pad.l + gW, py(g)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(g), pad.t); ctx.lineTo(px(g), pad.t + gH); ctx.stroke();
  }

  // Ejes
  ctx.strokeStyle = axisColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + gH); ctx.lineTo(pad.l + gW, pad.t + gH); ctx.stroke();

  // Labels ejes
  ctx.fillStyle = textColor; ctx.font = '11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Cantidad', pad.l + gW/2, H - 5);
  ctx.save(); ctx.translate(13, pad.t + gH/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Precio', 0, 0); ctx.restore();

  // Equilibrio
  var Qeq = a / 1.6;
  var Peq = a / 2;

  // Relleno EC (triángulo: (0,a), (0,Peq), (Qeq,Peq))
  ctx.fillStyle = 'rgba(139,37,0,0.10)';
  ctx.beginPath();
  ctx.moveTo(px(0), py(a > maxP ? maxP : a));
  // sigue la curva demanda hasta el equilibrio
  for (var q = 0; q <= Qeq; q += 1) {
    var p = a - 0.8*q;
    if (p > maxP) { ctx.moveTo(px(q), py(maxP)); continue; }
    ctx.lineTo(px(q), py(p));
  }
  ctx.lineTo(px(Qeq), py(Peq));
  ctx.lineTo(px(0), py(Peq));
  ctx.closePath();
  ctx.fill();

  // Relleno EP (triángulo: (0,0), (Qeq,0)→curva oferta→(Qeq,Peq)→(0,Peq))
  ctx.fillStyle = 'rgba(29,78,137,0.10)';
  ctx.beginPath();
  ctx.moveTo(px(0), py(0));
  for (var q = 0; q <= Qeq; q += 1) {
    ctx.lineTo(px(q), py(0.8*q));
  }
  ctx.lineTo(px(Qeq), py(Peq));
  ctx.lineTo(px(0), py(Peq));
  ctx.closePath();
  ctx.fill();

  // Curva de Oferta: P = 0.8*Q
  ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (var q = 0; q <= maxQ; q += 2) {
    var p = 0.8 * q;
    if (p > maxP) break;
    if (q === 0) ctx.moveTo(px(q), py(p)); else ctx.lineTo(px(q), py(p));
  }
  ctx.stroke();
  ctx.fillStyle = '#1d4e89'; ctx.textAlign = 'left'; ctx.font = '11px IBM Plex Sans, sans-serif';
  ctx.fillText('Oferta (S)', px(190), py(152) - 8);

  // Curva de Demanda: P = a - 0.8*Q
  ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (var q = 0; q <= maxQ; q += 2) {
    var p = a - 0.8 * q;
    if (p < 0) break;
    if (p > maxP) { ctx.moveTo(px(q), py(maxP)); continue; }
    if (q === 0) ctx.moveTo(px(q), py(p)); else ctx.lineTo(px(q), py(p));
  }
  ctx.stroke();
  ctx.fillStyle = '#8b2500'; ctx.textAlign = 'right'; ctx.font = '11px IBM Plex Sans, sans-serif';
  ctx.fillText('Demanda (D)', px(maxQ - 5), py(5));

  // Líneas punteadas al equilibrio
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, py(Peq)); ctx.lineTo(px(Qeq), py(Peq)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(Qeq), pad.t + gH); ctx.lineTo(px(Qeq), py(Peq)); ctx.stroke();
  ctx.setLineDash([]);

  // Punto de equilibrio
  ctx.fillStyle = '#4a7c3f';
  ctx.beginPath(); ctx.arc(px(Qeq), py(Peq), 5, 0, Math.PI*2); ctx.fill();

  // Etiquetas
  ctx.fillStyle = textColor; ctx.font = 'bold 11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('P*=' + Math.round(Peq), pad.l - 3, py(Peq) + 4);
  ctx.textAlign = 'center';
  ctx.fillText('Q*=' + Math.round(Qeq), px(Qeq), pad.t + gH + 14);
  ctx.font = 'bold 12px IBM Plex Sans, sans-serif'; ctx.fillStyle = '#4a7c3f'; ctx.textAlign = 'left';
  ctx.fillText('E*', px(Qeq) + 7, py(Peq) - 7);

  return { Peq: Math.round(Peq), Qeq: Math.round(Qeq) };
}

/* Grafica 2: Apertura al comercio — importador o exportador con precio mundial interactivo */
function drawTradeGraph(canvasId, Pw) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  var pad = { l:50, r:20, t:20, b:40 };
  var gW = W - pad.l - pad.r, gH = H - pad.t - pad.b;

  function px(q) { return pad.l + (q / 200) * gW; }
  function py(p) { return pad.t + gH - (p / 200) * gH; }

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var axisColor = isDark ? '#b0aa9e' : '#4a4640';
  var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  var textColor = isDark ? '#e8e4da' : '#1a1a16';

  // Grid
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var g = 0; g <= 200; g += 50) {
    ctx.beginPath(); ctx.moveTo(pad.l, py(g)); ctx.lineTo(pad.l + gW, py(g)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(g), pad.t); ctx.lineTo(px(g), pad.t + gH); ctx.stroke();
  }
  ctx.strokeStyle = axisColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + gH); ctx.lineTo(pad.l + gW, pad.t + gH); ctx.stroke();
  ctx.fillStyle = textColor; ctx.font = '11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Cantidad', pad.l + gW/2, H - 5);
  ctx.save(); ctx.translate(13, pad.t + gH/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Precio', 0, 0); ctx.restore();

  // Oferta: P = 0.8*Q → Q_s = P/0.8 = 1.25*P
  // Demanda: P = 160 - 0.8*Q → Q_d = (160-P)/0.8 = 200 - 1.25*P
  var Qeq = 100, Peq = 80;

  // Precio mundial clipeado
  Pw = Math.max(10, Math.min(190, Pw));
  var Qs = Pw / 0.8;          // producción doméstica al precio mundial
  var Qd = (160 - Pw) / 0.8;  // consumo doméstico al precio mundial
  if (Qd < 0) Qd = 0;

  var isImporter = Pw < Peq;
  var isExporter = Pw > Peq;

  // Relleno excedente del consumidor (entre Pw y curva demanda, 0 a Qd)
  if (Qd > 0 && isImporter) {
    ctx.fillStyle = 'rgba(139,37,0,0.13)';
    ctx.beginPath();
    ctx.moveTo(px(0), py(160));
    for (var q = 0; q <= Qd; q += 1) {
      var p = 160 - 0.8*q;
      ctx.lineTo(px(q), py(p));
    }
    ctx.lineTo(px(Qd), py(Pw));
    ctx.lineTo(px(0), py(Pw));
    ctx.closePath();
    ctx.fill();
  } else if (Qd > 0 && isExporter) {
    ctx.fillStyle = 'rgba(139,37,0,0.13)';
    ctx.beginPath();
    ctx.moveTo(px(0), py(160));
    for (var q = 0; q <= Qd; q += 1) {
      var p = 160 - 0.8*q;
      ctx.lineTo(px(q), py(p));
    }
    ctx.lineTo(px(Qd), py(Pw));
    ctx.lineTo(px(0), py(Pw));
    ctx.closePath();
    ctx.fill();
  }

  // Relleno excedente del productor (entre curva oferta y Pw, 0 a Qs)
  if (Qs > 0) {
    ctx.fillStyle = 'rgba(29,78,137,0.13)';
    ctx.beginPath();
    ctx.moveTo(px(0), py(0));
    for (var q = 0; q <= Qs; q += 1) {
      var p = 0.8*q;
      if (p > Pw) break;
      ctx.lineTo(px(q), py(p));
    }
    ctx.lineTo(px(Qs), py(Pw));
    ctx.lineTo(px(0), py(Pw));
    ctx.closePath();
    ctx.fill();
  }

  // Curva Oferta
  ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (var q = 0; q <= 200; q += 2) {
    var p = 0.8*q;
    if (p > 200) break;
    if (q === 0) ctx.moveTo(px(q), py(p)); else ctx.lineTo(px(q), py(p));
  }
  ctx.stroke();

  // Curva Demanda
  ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (var q = 0; q <= 200; q += 2) {
    var p = 160 - 0.8*q;
    if (p < 0) break;
    if (q === 0) ctx.moveTo(px(q), py(p)); else ctx.lineTo(px(q), py(p));
  }
  ctx.stroke();

  // Labels curvas
  ctx.fillStyle = '#1d4e89'; ctx.font = '11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('S', px(168), py(134) - 8);
  ctx.fillStyle = '#8b2500'; ctx.textAlign = 'right';
  ctx.fillText('D', px(192), py(6));

  // Precio autarquía (punteado gris)
  ctx.strokeStyle = isDark ? '#7a7468' : '#aaa8a0'; ctx.lineWidth = 1.2; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, py(Peq)); ctx.lineTo(pad.l + gW, py(Peq)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = isDark ? '#7a7468' : '#aaa8a0'; ctx.font = '10px IBM Plex Sans, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('P* autarquía', pad.l + gW - 2, py(Peq) - 4);

  // Línea precio mundial
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(pad.l, py(Pw)); ctx.lineTo(pad.l + gW, py(Pw)); ctx.stroke();
  ctx.fillStyle = '#c9a84c'; ctx.font = 'bold 11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('P_mundial = ' + Math.round(Pw), pad.l + 5, py(Pw) - 6);

  // Marcadores Qs y Qd
  function drawQmark(q, label, col) {
    if (q < 0 || q > 200) return;
    ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(px(q), pad.t + gH); ctx.lineTo(px(q), py(Pw)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px(q), py(Pw), 4, 0, Math.PI*2); ctx.fill();
    ctx.font = 'bold 10px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(label + '=' + Math.round(q), px(q), pad.t + gH + 14);
  }
  drawQmark(Qs, 'Qs', '#1d4e89');
  drawQmark(Qd, 'Qd', '#8b2500');

  // Flecha importaciones o exportaciones
  if (isImporter && Qd > Qs && Qd > 0) {
    ctx.fillStyle = '#4a7c3f'; ctx.font = 'bold 11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('← Importaciones →', px((Qs + Qd)/2), py(Pw) + 18);
  } else if (isExporter && Qs > Qd) {
    ctx.fillStyle = '#4a7c3f'; ctx.font = 'bold 11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('← Exportaciones →', px((Qd + Qs)/2), py(Pw) + 18);
  }

  // Retornar valores para los cuadros de métricas
  return {
    Pw: Math.round(Pw), Qs: Math.round(Qs), Qd: Math.round(Qd),
    imports: isImporter ? Math.max(0, Math.round(Qd - Qs)) : 0,
    exports: isExporter ? Math.max(0, Math.round(Qs - Qd)) : 0,
    CS: isImporter ? Math.round(0.5 * (160 - Pw) * Qd) : (isExporter ? Math.round(0.5 * (160 - Pw) * Qd) : 0),
    PS: Math.round(0.5 * Pw * Qs)
  };
}

/* Grafica 3: Términos de intercambio — razón de precios */
function drawTOTGraph(canvasId, Px, Py) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  var pad = { l:50, r:30, t:20, b:40 };
  var gW = W - pad.l - pad.r, gH = H - pad.t - pad.b;

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var axisColor = isDark ? '#b0aa9e' : '#4a4640';
  var textColor = isDark ? '#e8e4da' : '#1a1a16';
  var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';

  // Ejes
  ctx.strokeStyle = axisColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + gH); ctx.lineTo(pad.l + gW, pad.t + gH); ctx.stroke();

  // Escala: X 0–8, Y 0–5 (términos de intercambio como razón Px/Py)
  function px(x) { return pad.l + (x / 8) * gW; }
  function py(y) { return pad.t + gH - (y / 5) * gH; }

  // Grid
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var xi = 0; xi <= 8; xi += 2) { ctx.beginPath(); ctx.moveTo(px(xi), pad.t); ctx.lineTo(px(xi), pad.t + gH); ctx.stroke(); }
  for (var yi = 0; yi <= 5; yi += 1) { ctx.beginPath(); ctx.moveTo(pad.l, py(yi)); ctx.lineTo(pad.l + gW, py(yi)); ctx.stroke(); }

  // Curva Indiferencia (simplificada: U = x^0.5 * y^0.5 con U=2)
  var U = 2;
  ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 2;
  ctx.beginPath();
  var started = false;
  for (var x = 0.5; x <= 8; x += 0.1) {
    var y = (U * U) / x;
    if (y > 5 || y < 0.05) continue;
    if (!started) { ctx.moveTo(px(x), py(y)); started = true; }
    else ctx.lineTo(px(x), py(y));
  }
  ctx.stroke();
  ctx.fillStyle = '#8b2500'; ctx.font = '11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('Curva de indiferencia', px(6), py(0.7));

  // Línea presupuestaria: anchored so it's tangent to U=2 curve
  // For U = x^0.5 * y^0.5 = 2, tangency: x* = I/(2Px), y* = I/(2Py)
  // Need x*·y* = 4 → I²/(4PxPy) = 4 → I = 4*sqrt(Px*Py)
  var I = 4 * Math.sqrt(Px * Py);
  var xInt = I / Px;
  var yInt = I / Py;
  var xopt = I / (2 * Px);   // = 2*sqrt(Py/Px)
  var yopt = I / (2 * Py);   // = 2*sqrt(Px/Py)

  // Proper viewport clipping for the budget line y = yInt - (yInt/xInt)*x
  // Find the segment of the line that lies within [0,8] x [0,5]
  var slope_bl = yInt / xInt;  // = Px/Py
  var pts = [];
  // Check intersection with each boundary and keep points inside the box
  function inBox(x, y) { return x >= -0.001 && x <= 8.001 && y >= -0.001 && y <= 5.001; }
  // x=0: y=yInt
  if (inBox(0, yInt)) pts.push([0, yInt]);
  // x=xInt: y=0
  if (inBox(xInt, 0)) pts.push([xInt, 0]);
  // y=5: x = (yInt-5)/slope_bl
  var x_at_y5 = slope_bl > 0 ? (yInt - 5) / slope_bl : -1;
  if (inBox(x_at_y5, 5)) pts.push([x_at_y5, 5]);
  // x=8: y = yInt - slope_bl*8
  var y_at_x8 = yInt - slope_bl * 8;
  if (inBox(8, y_at_x8)) pts.push([8, y_at_x8]);

  if (pts.length >= 2) {
    ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px(pts[0][0]), py(pts[0][1])); ctx.lineTo(px(pts[1][0]), py(pts[1][1])); ctx.stroke();
  }

  // Punto óptimo — always on the indifference curve by construction
  if (xopt > 0 && xopt <= 8 && yopt > 0 && yopt <= 5) {
    ctx.fillStyle = '#4a7c3f';
    ctx.beginPath(); ctx.arc(px(xopt), py(yopt), 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = textColor; ctx.font = 'bold 10px IBM Plex Sans, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('E* ('+xopt.toFixed(1)+', '+yopt.toFixed(1)+')', px(xopt)+7, py(yopt)-7);
  }

  // Pendiente = −Px/Py
  ctx.fillStyle = '#1d4e89'; ctx.font = '11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('LPP  pendiente = −' + (Px/Py).toFixed(2), pad.l + gW, pad.t + 14);

  // Etiquetas ejes
  ctx.fillStyle = textColor; ctx.font = '11px IBM Plex Sans, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Bien X', pad.l + gW/2, H - 5);
  ctx.save(); ctx.translate(13, pad.t + gH/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Bien Y', 0, 0); ctx.restore();

  return { tot: (Px/Py).toFixed(2), xopt: xopt.toFixed(1), yopt: yopt.toFixed(1) };
}

/* ════════════════════════════════════════════════════
   GRAPH UPDATE FUNCTIONS (llamadas desde sliders)
   ════════════════════════════════════════════════════ */
function updateAutarkyGraph() {
  var slider = document.getElementById('autarkySlider');
  if (!slider) return;
  var a = parseFloat(slider.value);
  document.getElementById('autarkyVal').textContent = Math.round(a);
  var result = drawAutarkyGraph('autarkyCanvas', a);
  if (result) {
    document.getElementById('autarkyP').textContent = result.Peq;
    document.getElementById('autarkyQ').textContent = result.Qeq;
    var wt = Math.round(0.5 * (a - result.Peq) * result.Qeq + 0.5 * result.Peq * result.Qeq);
    document.getElementById('autarkyWT').textContent = wt.toLocaleString('es-MX');
  }
}

function updateTradeGraph() {
  var slider = document.getElementById('pwSlider');
  if (!slider) return;
  var Pw = parseFloat(slider.value);
  document.getElementById('pwVal').textContent = Math.round(Pw);
  var canvas = document.getElementById('tradeCanvas');
  if (!canvas) return;
  var result = drawTradeGraph('tradeCanvas', Pw);
  if (result) {
    document.getElementById('qsVal').textContent  = result.Qs;
    document.getElementById('qdVal').textContent  = result.Qd;
    var status = '';
    if (result.imports > 0) {
      document.getElementById('tradeVal').textContent = result.imports + ' imp.';
      status = '🌍 País IMPORTADOR: compra ' + result.imports + ' unidades del exterior';
    } else if (result.exports > 0) {
      document.getElementById('tradeVal').textContent = result.exports + ' exp.';
      status = '🚢 País EXPORTADOR: vende ' + result.exports + ' unidades al exterior';
    } else {
      document.getElementById('tradeVal').textContent = '0';
      status = '⚖️ Precio mundial = P* autarquía — sin flujo comercial';
    }
    document.getElementById('tradeStatus').textContent = status;
  }
}

function updateSurplusGraph() {
  var slider = document.getElementById('pxSlider');
  if (!slider) return;
  var Pw = parseFloat(slider.value);
  document.getElementById('pxVal').textContent = Math.round(Pw);
  var result = drawTradeGraph('exportCanvas', Pw);
  if (result) {
    var Peq = 80;
    // EC = ½(160-Pw)*Qd  (triangle under D and above Pw, from 0 to Qd)
    var ec = Math.round(0.5 * Math.max(0, 160 - Pw) * result.Qd);
    // EP = ½*Pw*Qs  (triangle above S and below Pw, from 0 to Qs)
    var ep = Math.round(0.5 * Pw * result.Qs);
    var wt = ec + ep;
    document.getElementById('ecXVal').textContent = ec.toLocaleString('es-MX');
    document.getElementById('epXVal').textContent = ep.toLocaleString('es-MX');
    document.getElementById('wtXVal').textContent = wt.toLocaleString('es-MX');
    var wtAut = 8000;
    var gain = wt - wtAut;
    var isImp = Pw < Peq, isExp = Pw > Peq;
    var msg = '';
    if (isImp) msg = '📥 Importador: EC ↑ (consumidores ganan), EP ↓ (productores pierden). Ganancia neta = ' + gain.toLocaleString('es-MX');
    else if (isExp) msg = '📤 Exportador: EP ↑ (productores ganan), EC ↓ (consumidores pierden). Ganancia neta = ' + gain.toLocaleString('es-MX');
    else msg = '⚖️ P_mundial = P* autarquía — sin flujo comercial. WT = WT autarquía.';
    document.getElementById('surplusStatus').textContent = msg;
  }
}

function updateTOT() {
  var px = parseFloat(document.getElementById('pxTot').value);
  var py = parseFloat(document.getElementById('pyTot').value);
  document.getElementById('pxTotVal').textContent = px;
  document.getElementById('pyTotVal').textContent = py;
  var result = drawTOTGraph('totCanvas', px, py);
  if (result) {
    document.getElementById('totVal').textContent  = result.tot;
    document.getElementById('xoptVal').textContent = result.xopt;
    document.getElementById('yoptVal').textContent = result.yopt;
  }
}

/* ════════════════════════════════════════════════════
   PDF
   ════════════════════════════════════════════════════ */
async function generatePDF() {
  var btn = document.getElementById('dlBtn');

  if (!window.jspdf) {
    alert('No se pudo cargar la librería de PDF. Verifica tu conexión a internet y recarga la página.');
    return;
  }

  btn.textContent = 'Generando PDF…';
  btn.disabled = true;

  try {

  var jspdf  = window.jspdf;
  var doc    = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW     = 215.9;
  var M      = 18;
  var TW     = PW - M * 2;
  var PH     = doc.internal.pageSize.height;
  var name   = studentData.name;
  var group  = studentData.group;
  var total  = problems.length;
  var pct    = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('es-MX', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  var pBR = 74,  pBG = 124, pBB = 63;
  var pAR = 201, pAG = 168, pAB = 76;

  function pdfText(html) {
    if (!html) return '';
    return html
      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\s+/g,' ').trim();
  }

  // Portada
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

  // Institutional logos — read from DOM (already injected at page load)
  // Use hlogo- elements (always in viewport) as primary source; fall back to logo- elements
  try {
    var ll = document.getElementById('hlogo-left')  || document.getElementById('logo-left');
    var lr = document.getElementById('hlogo-right') || document.getElementById('logo-right');
    if (ll && ll.src && ll.src.indexOf('data:') === 0) {
      doc.addImage(ll.src, 'JPEG', M, 4, 48, 22);
    }
    if (lr && lr.src && lr.src.indexOf('data:') === 0) {
      doc.addImage(lr.src, 'JPEG', 130, 4, 48, 22);
    }
  } catch(e) { console.warn('Logo insert failed:', e); }

  // LIAXA logo
  var lx = PW - M - 36, ly = 10;
  doc.setDrawColor(pBR,pBG,pBB); doc.setLineWidth(0.7);
  doc.lines([[2.57-1.03,4.63-6.17],[4.11-2.57,5.14-4.63],[5.66-4.11,2.57-5.14]], lx+1.03, ly+6.17);
  doc.setFillColor(pAR,pAG,pAB); doc.circle(lx+5.66, ly+2.57, 0.9, 'F');
  doc.setDrawColor(pAR,pAG,pAB); doc.setLineWidth(0.7);
  doc.line(lx+8.23, ly+1.54, lx+8.23, ly+7.2);
  doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('LIAXA', lx+10, ly+6.8);

  doc.setTextColor(232,238,247); doc.setFontSize(19); doc.setFont('helvetica','bold');
  doc.text('Comercio Internacional', M, 49);
  doc.setTextColor(150,165,200); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Microeconomia  ·  Facultad de Economia  ·  ' + dateStr, M, 59);

  doc.setFillColor(237,240,245); doc.roundedRect(M,72,TW,20,3,3,'F');
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  doc.text('ALUMNO', M+4, 79); doc.text('GRUPO', 130, 79);
  doc.setTextColor(20,24,32); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 87); doc.text(group, 130, 87);

  var sc = pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS (cont.)', M+4, sy+6);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  // Páginas por problema
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Microeconomia  ·  Comercio Internacional', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solucion: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }
    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }
    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  // Footer en todas las páginas
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages, PW/2, PH-5, {align:'center'});
  }

  try {
    var pdfBlob = doc.output('blob');
    var blobURL = URL.createObjectURL(pdfBlob);
    var a = document.createElement('a');
    a.href = blobURL;
    a.download = 'comercio_internacional_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf';
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(blobURL); }, 5000);
  } catch(saveErr) {
    // Fallback for iOS Safari: open inline
    try {
      var dataUri = doc.output('datauristring');
      window.open(dataUri, '_blank');
    } catch(e2) {
      alert('No se pudo descargar el PDF. Intenta desde una computadora.');
    }
  }
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;

  } catch(err) {
    console.error('PDF generation error:', err);
    alert('Error al generar el PDF: ' + err.message + '\nIntenta de nuevo o usa una computadora.');
    btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
    btn.disabled  = false;
  }
}

(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var ll  = document.getElementById('logo-left');
    var lr  = document.getElementById('logo-right');
    var sep = document.getElementById('wlogsep');
    var hasL = ll  && ll.src  && ll.src  !== window.location.href;
    var hasR = lr  && lr.src  && lr.src  !== window.location.href;
    if (hasL) { ll.style.display = 'inline-block'; }
    if (hasR) { lr.style.display = 'inline-block'; }
    if (hasL && hasR) { sep.style.display = 'block'; }
    if ((hasL && !hasR) || (!hasL && hasR)) {
      document.getElementById('wlogos').style.justifyContent = 'center';
    }
    var hl = document.getElementById('hlogo-left');
    var hr = document.getElementById('hlogo-right');
    if (hl && hl.src && hl.src !== window.location.href) hl.style.display = 'inline-block';
    if (hr && hr.src && hr.src !== window.location.href) hr.style.display = 'inline-block';
  });
})();
