<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --c-prim:#D9628B; --c-prim-f:#C14D75; --c-suave:#F7D8E0;
  --c-fondo:#FDF4F7; --c-texto:#46242F; --c-texto-s:#8A6470;
  --c-linea:#F0DCE3; --c-crema:#FFFFFF; --peligro:#B4304C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--c-fondo);color:var(--c-texto);min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:28px 20px 80px}

header{display:flex;align-items:center;gap:14px;margin-bottom:26px}
.logo{width:58px;height:58px;border-radius:50%;object-fit:cover;
  box-shadow:0 6px 18px color-mix(in srgb, var(--c-prim) 25%, transparent)}
h1{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;line-height:1.2}
.sub{color:var(--c-texto-s);font-size:.8rem;letter-spacing:2px;text-transform:uppercase}

.pinbox{max-width:320px;margin:80px auto;text-align:center}
.pinbox h2{font-family:'Playfair Display',serif;margin-bottom:18px}
.pinbox input{
  width:100%;padding:15px;text-align:center;font-size:1.6rem;letter-spacing:12px;
  border:1.5px solid var(--c-linea);border-radius:15px;font-family:'Jost',sans-serif;
}
.pinbox input:focus{outline:none;border-color:var(--c-prim)}
.pin-err{color:var(--peligro);margin-top:12px;font-size:.9rem;display:none}

.bar{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.bar input[type=date]{
  flex:1;padding:12px 14px;border:1.5px solid var(--c-linea);border-radius:13px;
  font-family:'Jost',sans-serif;font-size:1rem;color:var(--c-texto);background:var(--c-crema);
}
.icon-btn{
  padding:12px 16px;border:1.5px solid var(--c-linea);border-radius:13px;background:var(--c-crema);
  cursor:pointer;font-size:1rem;font-family:'Jost',sans-serif;color:var(--c-texto);transition:all .2s;
}
.icon-btn:hover{border-color:var(--c-prim)}

.filter{margin-bottom:18px}
.filter select{
  width:100%;padding:11px 12px;border:1.5px solid var(--c-linea);border-radius:12px;
  font-family:'Jost',sans-serif;font-size:.95rem;color:var(--c-texto);background:var(--c-crema);
}

.card{background:var(--c-crema);border:1.5px solid var(--c-linea);border-radius:18px;padding:18px;margin-bottom:18px}
.card h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .spark{color:var(--c-prim);font-size:.9rem}

.cita{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:13px 0;border-bottom:1px solid var(--c-linea)}
.cita:last-child{border-bottom:none}
.cita .hora{font-family:'Playfair Display',serif;font-weight:700;font-size:1.05rem;min-width:86px}
.cita .info{flex:1}
.cita .nombre{font-weight:600}
.cita .svc{color:var(--c-texto-s);font-size:.85rem}
.cita a.tel{color:var(--c-prim-f);text-decoration:none;font-size:.85rem}
.emp-badge{display:inline-block;background:var(--c-suave);color:var(--c-texto);
  border-radius:8px;padding:2px 9px;font-size:.75rem;font-weight:500;margin-left:6px}
.mini{padding:7px 12px;border:1.5px solid var(--c-linea);border-radius:10px;background:none;
  cursor:pointer;font-family:'Jost',sans-serif;font-size:.8rem;color:var(--peligro);transition:all .2s}
.mini:hover{border-color:var(--peligro)}
.mini.suave{color:var(--c-prim-f)}
.mini.suave:hover{border-color:var(--c-prim-f)}
.vacio{color:var(--c-texto-s);text-align:center;padding:18px 0;font-size:.95rem}

.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:4px}
.brow select{
  padding:10px 12px;border:1.5px solid var(--c-linea);border-radius:11px;
  font-family:'Jost',sans-serif;font-size:.95rem;color:var(--c-texto);background:var(--c-crema);
}
.btn{padding:11px 18px;border:none;border-radius:12px;cursor:pointer;background:var(--c-prim-f);
  color:#fff;font-family:'Jost',sans-serif;font-size:.95rem;font-weight:600;transition:all .2s}
.btn:hover{filter:brightness(.92)}
.btn.claro{background:var(--c-suave);color:var(--c-texto)}
.bloq{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--c-linea);font-size:.95rem}
.bloq:last-child{border-bottom:none}
.tag{background:var(--c-fondo);border-radius:8px;padding:3px 10px;font-size:.8rem;color:var(--c-texto-s)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--c-texto);color:#fff;padding:12px 22px;border-radius:30px;
  font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50}
.toast.show{opacity:1}
footer{text-align:center;margin-top:40px;color:var(--c-texto-s);font-size:.8rem;letter-spacing:1px}
footer a{color:var(--c-prim);text-decoration:none}
.loading{text-align:center;padding:50px 0;color:var(--c-texto-s)}
</style>
</head>
<body>
<div class="wrap">

  <div class="pinbox" id="pinBox">
    <h2>Panel de administración</h2>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="····" autofocus>
    <div class="pin-err" id="pinErr">PIN incorrecto</div>
  </div>

  <div id="panel" style="display:none">
    <header>
      <img class="logo" id="logoImg" alt="">
      <div>
        <h1 id="bizName"></h1>
        <div class="sub">Administrador</div>
      </div>
    </header>

    <div class="bar">
      <button class="icon-btn" id="prevDay" aria-label="Día anterior">‹</button>
      <input type="date" id="datePick">
      <button class="icon-btn" id="nextDay" aria-label="Día siguiente">›</button>
      <button class="icon-btn" id="refresh" title="Actualizar">⟳</button>
    </div>

    <div class="filter">
      <select id="empFilter"></select>
    </div>

    <div id="loading" class="loading">Cargando…</div>

    <div id="content" style="display:none">
      <div class="card">
        <h3><span class="spark">✦</span> Citas del día <span id="citasCount" class="tag"></span></h3>
        <div id="citasList"></div>
      </div>

      <div class="card">
        <h3><span class="spark">✦</span> Bloquear horarios</h3>
        <div class="brow">
          <select id="bWho"></select>
          <select id="bStart"></select>
          <span>a</span>
          <select id="bEnd"></select>
        </div>
        <div class="brow" style="margin-top:10px">
          <button class="btn" id="btnBlock">Bloquear horario</button>
          <button class="btn claro" id="btnBlockDay">Bloquear todo el día</button>
        </div>
        <div id="bloqList" style="margin-top:14px"></div>
      </div>
    </div>

    <footer>Powered by <a href="https://liaxa.mx">LIAXA</a> · todo en un enlace</footer>
  </div>
</div>
<div class="toast" id="toast"></div>

FFFMAooooELmlFFFNAFKKKKYDqWiimhMcKKKKZJ//Z",

  /* ── 4. EMPLEADOS (mismos ids que reservaciones.html) ─── */
  empleados: [
    { id:"ana",      nombre:"Ana" },
    { id:"fernanda", nombre:"Fernanda" }
  ],

  /* ── 5. RANGO DE HORAS PARA BLOQUEOS ──────────────────── */
  dayStart: "9:00",   // hora más temprana para bloqueos
  dayEnd:  "19:00",   // hora más tardía para bloqueos
  stepMin: 30
};
/* ╚══════════════ FIN DE LA CONFIGURACIÓN ══════════════════╝ */

const $ = id => document.getElementById(id);
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
let DATA = { bookings: [], blocks: [] };
let curDate = new Date(); curDate.setHours(0,0,0,0);

(function applyTheme(){
  const t = CONFIG.theme, r = document.documentElement.style;
  r.setProperty('--c-prim', t.primario);
  r.setProperty('--c-prim-f', t.primarioFuerte);
  r.setProperty('--c-suave', t.suave);
  r.setProperty('--c-fondo', t.fondo);
  r.setProperty('--c-texto', t.texto);
  r.setProperty('--c-texto-s', t.textoSuave);
  r.setProperty('--c-linea', t.linea);
  document.title = CONFIG.negocio.nombre + " — Administrador";
  $("logoImg").src = CONFIG.logoBase64;
  $("logoImg").alt = CONFIG.negocio.nombre;
  $("bizName").textContent = CONFIG.negocio.nombre;
})();

const toMin  = h => { const p = String(h).split(":"); return +p[0]*60 + +p[1]; };
CONFIG.dayStart = typeof CONFIG.dayStart === "number" ? CONFIG.dayStart : toMin(CONFIG.dayStart);
CONFIG.dayEnd   = typeof CONFIG.dayEnd   === "number" ? CONFIG.dayEnd   : toMin(CONFIG.dayEnd);  
const toHHMM = m => String(Math.floor(m/60)).padStart(2,"0") + ":" + String(m%60).padStart(2,"0");
const fmt12  = m => { let h=Math.floor(m/60),mm=String(m%60).padStart(2,"0");const ap=h>=12?"pm":"am";h=h%12||12;return h+":"+mm+" "+ap; };
const dateKey = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const empName = id => {
  if(id==="negocio"||id==="") return "Todo el negocio";
  const e = CONFIG.empleados.find(x=>x.id===id);
  return e ? e.nombre : id;
};

/* ---------- PIN ---------- */
$("pinInput").addEventListener("input", e=>{
  if(e.target.value.length >= CONFIG.adminPIN.length){
    if(e.target.value === CONFIG.adminPIN){
      $("pinBox").style.display="none";
      $("panel").style.display="block";
      init();
    }else{
      $("pinErr").style.display="block";
      e.target.value="";
    }
  }
});

let toastT;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2600);
}

/* ---------- datos ---------- */
async function loadData(){
  $("loading").style.display="block"; $("content").style.display="none";
  try{
    const r = await fetch(CONFIG.scriptURL);
    const j = await r.json();
    DATA.bookings = j.bookings || [];
    DATA.blocks   = j.blocks || [];
    render();
  }catch(e){
    $("loading").textContent="No se pudo cargar. Revisa tu conexión y presiona ⟳";
    return;
  }
  $("loading").style.display="none"; $("content").style.display="block";
}

async function post(payload){
  payload.pin = CONFIG.adminPIN;
  const r = await fetch(CONFIG.scriptURL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return r.json();
}

/* ---------- render ---------- */
function render(){
  const key = dateKey(curDate);
  $("datePick").value = key;
  const filtro = $("empFilter").value || "todos";

  let citas = DATA.bookings
    .filter(b=>b.fecha===key && b.estado==="activa")
    .sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
  if(filtro !== "todos") citas = citas.filter(b=>b.empleado===filtro);

  $("citasCount").textContent = citas.length + (citas.length===1?" cita":" citas");
  $("citasList").innerHTML = citas.length ? citas.map(b=>`
    <div class="cita">
      <div class="hora">${fmt12(toMin(b.hora_inicio))}</div>
      <div class="info">
        <div class="nombre">${esc(b.nombre)}<span class="emp-badge">${esc(empName(b.empleado))}</span></div>
        <div class="svc">${esc(b.servicio)} · ${b.duracion_min} min · <a class="tel" href="https://wa.me/52${String(b.telefono).replace(/\D/g,"")}" target="_blank" rel="noopener">${esc(b.telefono)}</a></div>
      </div>
      <button class="mini" data-cancel="${b.id}">Cancelar</button>
    </div>`).join("")
    : `<div class="vacio">Sin citas este día ✦</div>`;

  $("citasList").querySelectorAll("[data-cancel]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("¿Cancelar esta cita?")) return;
      const j = await post({action:"cancel", id:btn.dataset.cancel});
      if(j.ok){ toast("Cita cancelada"); await loadData(); } else toast("Error: "+j.error);
    });
  });

  const bloqs = DATA.blocks
    .filter(b=>b.fecha===key)
    .sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
  $("bloqList").innerHTML = bloqs.length ? bloqs.map(b=>{
    const full = toMin(b.hora_inicio)<=CONFIG.dayStart && toMin(b.hora_fin)>=CONFIG.dayEnd;
    const rango = full ? "Día completo" : fmt12(toMin(b.hora_inicio)) + " – " + fmt12(toMin(b.hora_fin));
    return `<div class="bloq">
      <span>${rango} <span class="tag">${esc(empName(b.empleado))}</span></span>
      <button class="mini suave" data-unblock="${b.id}">Quitar</button>
    </div>`;
  }).join("") : "";

  $("bloqList").querySelectorAll("[data-unblock]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const j = await post({action:"unblock", id:btn.dataset.unblock});
      if(j.ok){ toast("Bloqueo eliminado"); await loadData(); } else toast("Error: "+j.error);
    });
  });
}

function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

/* ---------- selects ---------- */
function fillSelects(){
  let opts = "";
  for(let t=CONFIG.dayStart; t<=CONFIG.dayEnd; t+=CONFIG.stepMin) opts += `<option value="${t}">${fmt12(t)}</option>`;
  $("bStart").innerHTML = opts;
  $("bEnd").innerHTML = opts;
  $("bEnd").value = CONFIG.dayEnd;

  $("bWho").innerHTML = `<option value="negocio">Todo el negocio</option>` +
    CONFIG.empleados.map(e=>`<option value="${e.id}">${e.nombre}</option>`).join("");

  $("empFilter").innerHTML = `<option value="todos">Ver citas: todos los empleados</option>` +
    CONFIG.empleados.map(e=>`<option value="${e.id}">Ver citas: ${e.nombre}</option>`).join("");
  $("empFilter").addEventListener("change", render);
}

$("btnBlock").addEventListener("click", async ()=>{
  const s = +$("bStart").value, e = +$("bEnd").value;
  if(e<=s){ toast("La hora final debe ser mayor a la inicial"); return; }
  const j = await post({action:"block", fecha:dateKey(curDate),
    hora_inicio:toHHMM(s), hora_fin:toHHMM(e), empleado:$("bWho").value});
  if(j.ok){ toast("Horario bloqueado"); await loadData(); } else toast("Error: "+j.error);
});

$("btnBlockDay").addEventListener("click", async ()=>{
  const who = $("bWho").value;
  const msg = who==="negocio"
    ? "¿Bloquear todo el día para todo el negocio?"
    : "¿Bloquear todo el día para " + empName(who) + "?";
  if(!confirm(msg)) return;
  const j = await post({action:"block", fecha:dateKey(curDate),
    hora_inicio:"00:00", hora_fin:"23:59", nota:"día completo", empleado:who});
  if(j.ok){ toast("Día bloqueado"); await loadData(); } else toast("Error: "+j.error);
});

/* ---------- navegación ---------- */
$("prevDay").addEventListener("click",()=>{ curDate.setDate(curDate.getDate()-1); render(); });
$("nextDay").addEventListener("click",()=>{ curDate.setDate(curDate.getDate()+1); render(); });
$("datePick").addEventListener("change",e=>{
  const [y,m,d]=e.target.value.split("-").map(Number);
  curDate = new Date(y,m-1,d); render();
});
$("refresh").addEventListener("click",loadData);

function init(){ fillSelects(); loadData(); }
</script>
