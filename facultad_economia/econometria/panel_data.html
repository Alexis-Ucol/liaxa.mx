<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de Panel — Econometría</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* WELCOME */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* LESSON */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* CONTENT */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* RULE CARDS */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* MODE TABS */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* PROBLEM CARDS */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* WORK AREA TABS */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* CANVAS */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* MATH FRACTIONS */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* TEXTAREA */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* PHOTO */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* HINT */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* MC */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* RESULT */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── PANEL-SPECIFIC WIDGETS ── */
.panel-table { width:100%; border-collapse:collapse; font-size:.82rem; margin:1rem 0; overflow-x:auto; display:block; }
.panel-table th { background:var(--green); color:#fff; padding:.45rem .7rem; text-align:center; font-size:.76rem; }
.panel-table td { padding:.38rem .7rem; text-align:center; border-bottom:1px solid var(--border); font-family:'IBM Plex Mono',monospace; font-size:.8rem; }
.panel-table tr:nth-child(even) td { background:var(--surface2); }
.panel-table .row-hi td { background:var(--green-bg); font-weight:600; }
.panel-table .row-t2 td { background:var(--gold-bg); }

/* Interactive scatter canvas */
.scatter-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin:.9rem 0; }
.scatter-wrap canvas { width:100%; max-width:680px; display:block; margin:0 auto; }
.scatter-legend { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.5rem; justify-content:center; }
.sleg-item { display:flex; align-items:center; gap:.3rem; font-size:.74rem; color:var(--text2); }
.sleg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* FE/RE comparison grid */
.comp-grid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin:1rem 0; }
.comp-card { border:1px solid var(--border); border-radius:10px; padding:.9rem; }
.comp-card.fe { border-top:3px solid var(--green); }
.comp-card.re { border-top:3px solid var(--gold); }
.comp-title { font-weight:700; font-size:.85rem; margin-bottom:.4rem; }
.comp-title.fe { color:var(--green-dark); }
.comp-title.re { color:var(--gold); }
.comp-li { font-size:.78rem; color:var(--text2); margin-bottom:.25rem; padding-left:.7rem; position:relative; }
.comp-li::before { content:'•'; position:absolute; left:0; color:var(--text3); }

/* Hausman test widget */
.hausman-widget { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem; margin:.9rem 0; }
.hausman-row { display:flex; align-items:center; gap:.7rem; margin-bottom:.7rem; }
.hausman-row label { font-size:.78rem; color:var(--text3); width:120px; flex-shrink:0; }
.hausman-row input[type=range] { flex:1; accent-color:var(--green); }
.hausman-val { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--green-dark); font-weight:600; width:50px; text-align:right; }
.hausman-result { background:var(--surface2); border-radius:8px; padding:.7rem 1rem; font-size:.84rem; color:var(--text2); margin-top:.5rem; }

/* Download CSV button */
.csv-btn { display:inline-flex; align-items:center; gap:.45rem; background:var(--green-bg); color:var(--green-dark); border:1.5px solid var(--green); border-radius:8px; padding:.55rem 1.1rem; font-size:.83rem; font-weight:600; cursor:pointer; transition:all .15s; margin:.5rem 0; }
.csv-btn:hover { background:var(--green); color:#fff; }

/* Metrics */
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* Within-variation demo */
.within-demo { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin:.9rem 0; }
.wdemo-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.8rem; }
.wdemo-lbl { font-size:.69rem; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:.5rem; }

/* MOBILE */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .comp-grid { grid-template-columns: 1fr; }
  .within-demo { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left"  src="" alt="Institution" style="display:none">
      <div class="wlogsep" id="wlogsep" style="display:none"></div>
      <img id="logo-right" src="" alt="Institution" style="display:none">
    </div>
    <div class="wtitle">Datos de Panel</div>
    <div class="wcourse">Econometría · Facultad de Economía</div>
    <label class="flabel" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="Ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar" style="display:none; margin-top:.8rem; background:var(--green-bg); border:1px solid var(--green); border-radius:8px; padding:.6rem .9rem; font-size:.84rem; color:var(--green-dark);">
      📂 Se encontró una sesión guardada para este estudiante.
      <button onclick="restoreSession()" style="margin-left:.6rem; background:var(--green); color:#fff; border:none; border-radius:5px; padding:.25rem .7rem; cursor:pointer; font-size:.82rem;">Restaurar</button>
      <button onclick="dismissRestore()" style="margin-left:.4rem; background:none; border:1px solid var(--green); border-radius:5px; padding:.25rem .7rem; cursor:pointer; font-size:.82rem; color:var(--green);">Ignorar</button>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.5rem">
      <svg width="196" height="48" viewBox="0 0 140 34" xmlns="http://www.w3.org/2000/svg" class="liaxa-wf">
        <style>
          .liaxa-wf .lw-line { stroke:var(--green); stroke-width:2; fill:none; }
          .liaxa-wf .lw-acc  { fill:var(--gold); }
          .liaxa-wf .lw-bar  { stroke:var(--gold); stroke-width:2; }
          .liaxa-wf .lw-txt  { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" class="lw-line"/>
        <circle cx="22" cy="10" r="2.5" class="lw-acc"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lw-bar"/>
        <text x="42" y="22" class="lw-txt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institution" style="display:none">
      <img id="hlogo-right" src="" alt="Institution" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Datos de Panel</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg" class="liaxa-hdr">
        <style>
          .liaxa-hdr .lh-line { stroke:var(--green); stroke-width:2; fill:none; }
          .liaxa-hdr .lh-acc  { fill:var(--gold); }
          .liaxa-hdr .lh-bar  { stroke:var(--gold); stroke-width:2; }
          .liaxa-hdr .lh-txt  { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" class="lh-line"/>
        <circle cx="22" cy="10" r="2.5" class="lh-acc"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lh-bar"/>
        <text x="42" y="22" class="lh-txt">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="sbtn" id="dlBtn" onclick="generatePDF()" style="max-width:280px;margin:0 auto;">⬇ &nbsp;Descargar Resultados PDF</button>
    </div>
  </div>
</div>

<script>
/* ── STATE ── */
var studentData   = {};
var problems      = [];
var answeredCount = 0;
var correctCount  = 0;

/* ── SESSION PERSISTENCE ── */
var LS_PREFIX = 'panel_data_eco';
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return LS_PREFIX + '__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    drawings.push(dc && dc.width ? (function(){try{return dc.toDataURL('image/png');}catch(e){return null;}})() : null);
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : null);
    var pp = document.getElementById('pp' + i);

/* ── SEEDED RNG ── */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function rnd(min, max, rng) { return +(min + rng() * (max - min)).toFixed(2); }
function rndInt(min, max, rng) { return Math.floor(min + rng() * (max - min + 1)); }

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── MC HANDLER ── */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ── SHUFFLE ── */
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

var scatterColors = ['#4a7c3f','#c9a84c','#1d4e89','#8b2500','#5c4f8a'];
var scatterInited = false;

function initScatterPlot(canvasId) {
  if (scatterInited) return;
  scatterInited = true;
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.offsetWidth || 640;
  var H = 280;
  canvas.style.height = H + 'px';
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  drawSpaghetti(ctx, W, H, false);

  document.getElementById('scatterToggle').addEventListener('change', function() {
    ctx.clearRect(0, 0, W, H);
    drawSpaghetti(ctx, W, H, this.checked);
  });
}

function drawSpaghetti(ctx, W, H, showFE) {
  var pad = { l:52, r:20, t:20, b:42 };
  var cw = W - pad.l - pad.r;
  var ch = H - pad.t - pad.b;

  // Background
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface') || '#fff';
  ctx.fillRect(0, 0, W, H);

  // Axes
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border') || '#ddd';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + ch);
  ctx.lineTo(pad.l + cw, pad.t + ch);
  ctx.stroke();

  // Labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text3') || '#888';
  ctx.font = '11px IBM Plex Sans, sans-serif';

/* Hausman slider widget */
function updateHausman() {
  var chiSq = parseFloat(document.getElementById('hsman_chi').value);
  var df    = parseInt(document.getElementById('hsman_df').value);
  document.getElementById('hsman_chi_val').textContent = chiSq.toFixed(1);
  document.getElementById('hsman_df_val').textContent = df;

  // Approximate chi-square CDF using Wilson-Hilferty
  function chi2pval(x, k) {
    if (x <= 0) return 1;
    var z = Math.pow(x/k, 1/3) - (1 - 2/(9*k));
    z /= Math.sqrt(2/(9*k));
    return 1 - normalCDF(z);
  }
  function normalCDF(z) {
    var t = 1 / (1 + 0.2316419 * Math.abs(z));
    var d = 0.3989423 * Math.exp(-z*z/2);
    var p = d*t*(0.3193815 + t*(-0.3565638 + t*(1.7814779 + t*(-1.8212560 + t*1.3302744))));
    return z > 0 ? 1 - p : p;
  }

  var pval = chi2pval(chiSq, df);
  var res = document.getElementById('hsman_result');
  res.innerHTML = 'p-valor ≈ <strong>' + pval.toFixed(4) + '</strong> &nbsp;|&nbsp; ' +
    (pval < 0.05
      ? '<span style="color:var(--ok)"><strong>p &lt; 0.05 → Rechazar H₀ → Usar Efectos Fijos</strong></span>'
      : '<span style="color:var(--gold)"><strong>p ≥ 0.05 → No rechazar H₀ → Usar Efectos Aleatorios</strong></span>');
}

R² within = 0.847  (N=5, T=4, obs=20)</pre>
      <div class="rnote">Nota: educación no aparece porque no cambia dentro de cada empresa.</div>
    </div>`;
  lb.appendChild(s3);

  /* === PROBLEMA 3 === */
  var yVals3 = [rnd(2.5, 3.5, rng), rnd(2.5, 3.5, rng), rnd(2.5, 3.5, rng), rnd(2.5, 3.5, rng)];

  var yrs3 = ['2019','2020','2021','2022'];
  problems.push({
    title: 'Transformación Within',
    questionText: 'Una empresa tiene los siguientes valores de ln(Salario): <strong>' + yVals3.map(function(v,k){ return yrs3[k]+': '+v; }).join(' | ') + '</strong>. <br><br>Calcula el valor <em>within</em> (demeaned) para el año <strong>' + yrs3[tChoice] + '</strong>.',
    fn: 'ÿ_it = y_it − ȳ_i',
    hint: 'Primero calcula la media: ȳ = (' + yVals3.join('+') + ')/4 = ' + yMean3 + '. Luego resta: y_' + yrs3[tChoice] + ' − ȳ.',
    options: s3r.opts,
    correctIdx: s3r.correctIdx,
    explanation: 'Media: ȳ = ' + yMean3 + '. Valor demeaned = ' + yVals3[tChoice] + ' − ' + yMean3 + ' = <strong>' + demeaned3 + '</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);

  /* ══ SECCIÓN 4: Efectos Aleatorios ══ */
  var s4 = document.createElement('div');
  s4.className = 'section';
  s4.innerHTML = `
    <div class="stag">Sección 4 · GLS y Supuestos</div>
    <h2>Modelo de Efectos Aleatorios (RE)</h2>
    <p>El modelo de <strong>efectos aleatorios</strong> trata α<sub>i</sub> como una variable aleatoria no correlacionada con los regresores. En lugar de estimarlo como parámetro fijo, lo incluye en el término de error compuesto:</p>

    <div class="rcard" style="margin:.8rem 0">
      <div class="rname">Efectos Aleatorios</div>
      <div class="rform">y<sub>it</sub> = α + β·x<sub>it</sub> + (u<sub>i</sub> + ε<sub>it</sub>)</div>
      <div class="rnote">u<sub>i</sub> ~ iid(0, σ²<sub>u</sub>) es el efecto individual aleatorio; ε<sub>it</sub> ~ iid(0, σ²<sub>ε</sub>) es el error idiosincrático</div>
    </div>

    <p>El estimador RE es GLS transformado. Usa una combinación ponderada de variación <em>within</em> y <em>between</em>:</p>

    <div class="rcard" style="margin:.8rem 0">
      <div class="rname">Quasi-demeaning (RE)</div>
      <div class="rform">ỹ<sub>it</sub> = y<sub>it</sub> − θ·ȳ<sub>i</sub></div>
      <div class="rnote">θ = 1 − √(σ²<sub>ε /(σ²</sub><sub>ε</sub> + T·σ²<sub>u</sub>)) &nbsp; (0 ≤ θ ≤ 1)</div>
    </div>

    <p>Cuando θ → 1, RE se convierte en FE. Cuando θ → 0, RE se convierte en Pooled OLS.</p>

    <p><strong>Ventaja clave de RE:</strong> A diferencia de FE, puede estimar el efecto de variables que no cambian en el tiempo (p.ej. educación si no cambia, sector, género).</p>

    <div class="comp-grid">
      <div class="comp-card fe">
        <div class="comp-title fe">⚙ Efectos Fijos (FE)</div>
        <div class="comp-li">Permite correlación entre α<sub>i</sub> y x<sub>it</sub></div>
        <div class="comp-li">Elimina todas las variables time-invariant</div>
        <div class="comp-li">Usa sólo variación within</div>
        <div class="comp-li">Consistente incluso con endogeneidad del efecto</div>
        <div class="comp-li">Pierde eficiencia si RE es correcto</div>
      </div>
      <div class="comp-card re">
        <div class="comp-title re">🎲 Efectos Aleatorios (RE)</div>
        <div class="comp-li">Requiere que α<sub>i</sub> no esté correlacionado con x<sub>it</sub></div>
        <div class="comp-li">Puede estimar variables time-invariant</div>
        <div class="comp-li">Usa variación within y between</div>
        <div class="comp-li">Más eficiente que FE si supuesto se cumple</div>
        <div class="comp-li">Inconsistente si α<sub>i</sub> está correlacionado</div>
      </div>
    </div>`;
  lb.appendChild(s4);

  /* === PROBLEMA 4 === */
  var sigmaE = rnd(0.05, 0.15, rng);
  var sigmaU = rnd(0.10, 0.30, rng);
  var T4 = rndInt(3, 6, rng);
  var thetaNum = Math.sqrt(sigmaE * sigmaE / (sigmaE * sigmaE + T4 * sigmaU * sigmaU));
  var theta4 = +(1 - thetaNum).toFixed(3);
  var w4b = +(1 - sigmaE / sigmaU).toFixed(3);
  var w4c = +(sigmaE / (sigmaE + sigmaU)).toFixed(3);
  var w4d = +(thetaNum).toFixed(3);
  var s4r = shuffleOpts([theta4+'', w4b+'', w4c+'', w4d+''], theta4+'', rng);
  problems.push({
    title: 'Parámetro θ en Efectos Aleatorios',
    questionText: 'Para un panel con T = <strong>' + T4 + ' períodos</strong>, σ²<sub>ε</sub> = <strong>' + (sigmaE*sigmaE).toFixed(4) + '</strong> y σ²<sub>u</sub> = <strong>' + (sigmaU*sigmaU).toFixed(4) + '</strong>, calcula el parámetro θ del quasi-demeaning de RE.',
    fn: 'θ = 1 − √( σ²_ε / (σ²_ε + T·σ²_u) )',
    hint: 'Sustituye: σ²_ε = '+(sigmaE*sigmaE).toFixed(4)+', T·σ²_u = '+T4+'×'+(sigmaU*sigmaU).toFixed(4)+' = '+(T4*sigmaU*sigmaU).toFixed(4)+'. Calcula la raíz y resta de 1.',
    options: s4r.opts,
    correctIdx: s4r.correctIdx,
    explanation: '1 − √('+((sigmaE*sigmaE).toFixed(4))+'/('+((sigmaE*sigmaE).toFixed(4))+'+'+T4+'×'+((sigmaU*sigmaU).toFixed(4))+')) = 1 − √('+((sigmaE*sigmaE/(sigmaE*sigmaE + T4*sigmaU*sigmaU)).toFixed(4))+') = 1 − '+thetaNum.toFixed(3)+' = <strong>'+theta4+'</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);

  /* ══ SECCIÓN 5: Test de Hausman ══ */
  var s5 = document.createElement('div');
  s5.className = 'section';
  s5.innerHTML = `
    <div class="stag">Sección 5 · Elección del Modelo</div>
    <h2>Test de Hausman: ¿FE o RE?</h2>
    <p>El test de Hausman responde la pregunta más importante en análisis de panel: <em>¿son los efectos individuales aleatorios y no correlacionados con los regresores, o están correlacionados?</em></p>

    <div class="callout">
      <strong>Hipótesis del Test de Hausman:</strong>
      <p>H₀: Cov(α<sub>i</sub>, x<sub>it</sub>) = 0 &nbsp;→ &nbsp;Los efectos individuales <em>no</em> están correlacionados con los regresores (RE es consistente y eficiente)</p>
      <p>H₁: Cov(α<sub>i</sub>, x<sub>it</sub>) ≠ 0 &nbsp;→ &nbsp;Los efectos individuales <em>sí</em> están correlacionados (FE es preferible)</p>
    </div>

    <p>El estadístico de prueba se basa en la diferencia entre los estimadores FE y RE:</p>

    <div class="rcard" style="margin:.8rem 0">
      <div class="rname">Estadístico Hausman</div>
      <div class="rform">H = (β̂<sub>FE</sub> − β̂<sub>RE</sub>)′ [Var(β̂<sub>FE</sub>) − Var(β̂<sub>RE</sub>)]⁻¹ (β̂<sub>FE</sub> − β̂<sub>RE</sub>)</div>
      <div class="rnote">Bajo H₀: H ~ χ²(k) donde k = número de regresores time-varying</div>
    </div>

    <p><strong>Simulador interactivo:</strong> Ajusta el estadístico χ² y los grados de libertad para ver qué decisión tomar:</p>

    </div>

    <p style="margin-top:.8rem"><strong>Con nuestros datos de panel:</strong></p>

chi-squared = 9.24, df = 2, p-value = 0.0098

→ p &lt; 0.05: Rechazamos H₀
→ Los efectos individuales están correlacionados con los regresores
→ <strong>Usar Efectos Fijos</strong></pre>
    </div>`;
  lb.appendChild(s5);
  setTimeout(updateHausman, 300);

  /* === PROBLEMA 5 === */
  var chi5 = rnd(3.5, 18.0, rng);

  var crit5 = critVals[df5 - 1];

  var w5b = rejectH0 ? 'No rechazar H₀ → usar Efectos Aleatorios' : 'Rechazar H₀ → usar Efectos Fijos';

  /* ══ SECCIÓN 6: Variación Between y Within ══ */

    options: s9r.opts,
    correctIdx: s9r.correctIdx,
    explanation: 'En FE con VD logarítmica, β̂ = ' + betaFE9.toFixed(3) + ' significa que <strong>' + s9correct + '</strong>. El énfasis en "dentro de la empresa" refleja que FE elimina las diferencias permanentes entre unidades.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);

  /* === PROBLEMA 10 (FE no puede estimar time-invariant) === */
  var vars10 = ['el género del trabajador','el país de origen de la empresa','el sector industrial','la raza del empleado'];
  var cannotEstimate = pick(vars10, rng);
  var canEstimate    = pick(['el número de horas trabajadas por semana','los años de experiencia','la adopción de tecnología','el nivel de ventas'], rng);
  var s10correct = 'No puede estimarse con FE porque no varía en el tiempo dentro de cada unidad';
  var w10b = 'Puede estimarse con FE si se usa la transformación between';
  var w10c = 'Puede estimarse con FE si se incluyen dummies de tiempo';
  var w10d = 'Puede estimarse con FE porque tiene variación suficiente entre unidades';
  var s10r = shuffleOpts([s10correct, w10b, w10c, w10d], s10correct, rng);
  problems.push({
    title: 'Variables time-invariant en FE',
    questionText: 'Un investigador desea incluir <em>' + cannotEstimate + '</em> como regresor en un modelo de Efectos Fijos. ¿Cuál de las siguientes afirmaciones es correcta?',
    fn: '',
    hint: 'Recuerda: la transformación within resta la media temporal de cada unidad. ¿Qué ocurre con una variable que es constante en el tiempo para cada unidad?',
    options: s10r.opts,
    correctIdx: s10r.correctIdx,
    explanation: '<em>' + cannotEstimate + '</em> no cambia con el tiempo para cada unidad (es time-invariant). Al aplicar la transformación within, esta variable desaparece completamente. Por eso, <strong>FE no puede estimar su efecto</strong>. Una alternativa es usar RE o el estimador de Hausman-Taylor.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);
}

/* ── PDF ── */
async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('es-MX', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  var pBR = 74,  pBG = 124, pBB = 63;
  var pAR = 201, pAG = 168, pAB = 76;

  function pdfText(html) {
    if (!html) return '';
    return html
      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\s+/g,' ').trim();
  }

  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

  var lx2 = PW - M - 36;
  var ly2 = 10;
  doc.setDrawColor(pBR,pBG,pBB); doc.setLineWidth(0.7);
  doc.lines([[2.57-1.03,4.63-6.17],[4.11-2.57,5.14-4.63],[5.66-4.11,2.57-5.14]], lx2+1.03, ly2+6.17);
  doc.setFillColor(pAR,pAG,pAB); doc.circle(lx2+5.66, ly2+2.57, 0.9, 'F');
  doc.setDrawColor(pAR,pAG,pAB); doc.setLineWidth(0.7);
  doc.line(lx2+8.23, ly2+1.54, lx2+8.23, ly2+7.2);
  doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('LIAXA', lx2+10, ly2+6.8);

  doc.setTextColor(232,238,247); doc.setFontSize(19); doc.setFont('helvetica','bold');
  doc.text('Datos de Panel', M, 49);
  doc.setTextColor(150,165,200); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Econometría · Facultad de Economía · ' + dateStr, M, 59);

  doc.setFillColor(237,240,245); doc.roundedRect(M,72,TW,20,3,3,'F');
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  doc.text('ALUMNO', M+4, 79); doc.text('GRUPO', 130, 79);
  doc.setTextColor(20,24,32); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 87); doc.text(group, 130, 87);

  var sc = pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS (continuación)', M+4, sy+6);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  for (var pi = 0; pi < problems.length; pi++) {
    var prob = problems[pi];
    doc.addPage();
    var wy = 0;
    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Econometría · Datos de Panel', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(pi+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+pi).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solucion: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+pi);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }
    var ta = document.getElementById('ta'+pi);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }
    var pp = document.getElementById('pp'+pi);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('datos_panel_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;
}
