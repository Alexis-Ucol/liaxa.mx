<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Curva IS — Macroeconomía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
  --is-color:   #1d4e89;
  --is-light:   #dce8f5;
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28; --border:#3a3830;
  --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468; --shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#6aaa5f; --green-dark:#8ecf82; --green-bg:#1a281a;
  --gold:#d4b86a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
  --is-color:#5b8fd4; --is-light:#1a2a3e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}

#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}

#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}

.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}
.is-callout{background:var(--is-light);border-left:4px solid var(--is-color);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.is-callout strong{color:var(--is-color);}
.is-callout p{margin-bottom:0;color:var(--text2);}

.eq-box{background:var(--surface);border:1.5px solid var(--is-color);border-radius:12px;padding:1.1rem 1.3rem;margin:1rem 0;}
.eq-box .eq-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--is-color);font-weight:700;margin-bottom:.6rem;}
.eq-main{font-family:'IBM Plex Mono',monospace;font-size:1rem;color:var(--text);font-weight:500;margin-bottom:.3rem;}
.eq-where{font-size:.78rem;color:var(--text3);margin-top:.5rem;line-height:1.9;}
.eq-step{display:flex;align-items:baseline;gap:.7rem;padding:.4rem 0;border-bottom:1px solid var(--border);}
.eq-step:last-child{border-bottom:none;}
.eq-step .sn{font-size:.68rem;color:var(--text3);min-width:1.4rem;text-align:right;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
.eq-step .se{font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--text);flex:1;}
.eq-step .snote{font-size:.74rem;color:var(--text3);font-style:italic;flex-shrink:0;max-width:190px;}

.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green);overflow-x:auto;}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem;}
.rnote{font-size:.76rem;color:var(--text3);}

.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .2em;line-height:1.1;}
.mf-num{border-bottom:1.5px solid currentColor;padding:0 .2em .1em;font-size:.9em;text-align:center;}
.mf-den{padding:.1em .2em 0;font-size:.9em;text-align:center;}

.widget{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin:.9rem 0;}
.widget-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem;font-weight:600;display:flex;align-items:center;gap:.5rem;}
.widget-title::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);}
.wslider{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;margin-bottom:.5rem;}
.wslider label{font-size:.76rem;color:var(--text2);display:flex;justify-content:space-between;margin-bottom:.3rem;}
.wslider label span{color:var(--is-color);font-weight:700;font-family:'IBM Plex Mono',monospace;}
.wslider input[type=range]{width:100%;accent-color:var(--is-color);}
.wleg{display:flex;gap:1rem;margin-top:.6rem;flex-wrap:wrap;}
.wleg-i{display:flex;align-items:center;gap:.35rem;font-size:.74rem;color:var(--text2);}
.wleg-line{width:20px;height:3px;border-radius:2px;}
.wmetrics{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-top:.7rem;}
.wmet{background:var(--surface2);border-radius:8px;padding:.5rem .6rem;text-align:center;}
.wmet .ml{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.15rem;}
.wmet .mn{font-family:'IBM Plex Mono',monospace;font-size:.95rem;font-weight:700;color:var(--is-color);}

.shift-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.7rem;}
.shbtn{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:.45rem .8rem;font-size:.8rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.shbtn:hover{border-color:var(--is-color);}
.shbtn.active{border-color:var(--is-color);background:var(--is-light);color:var(--is-color);font-weight:600;}
.shift-result{background:var(--surface2);border-radius:8px;padding:.7rem .9rem;font-size:.83rem;color:var(--text2);margin-top:.7rem;min-height:44px;transition:all .3s;}
.shift-result.show{border-left:3px solid var(--is-color);background:var(--is-light);}

.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopt.pending{border-color:var(--gold);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}

@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;} .wlogos img{height:38px;} .wtitle{font-size:1.35rem;}
  .htitle{display:none;} .hlogos img{height:20px;}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:110px;overflow:hidden;text-overflow:ellipsis;}
  .lbody{padding:1.2rem .7rem 3rem;} .section h2{font-size:1.3rem;}
  .rules-grid{grid-template-columns:1fr;} .wmetrics{grid-template-columns:1fr 1fr;}
  .pbody{padding:.75rem;} .pstmt{font-size:.84rem;} .mcopt{font-size:.83rem;padding:.58rem .7rem;}
  .dcanvas{height:220px;} .ctoolbar{gap:.25rem;} .callout{padding:.8rem .9rem;}
  .rcard{overflow-x:auto;} .eq-step{flex-wrap:wrap;} .eq-step .snote{max-width:100%;}
}
</style>
</head>

/* ── RNG ── */
function seededRng(seed){
  var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);

/* ══════════════════════════════════════════════════════
   DRAWING ENGINE — shared by all three widgets
   Key design principle: compute Y* and GA* first,
   then set axis max from actual data (never hardcode).
   ══════════════════════════════════════════════════════ */

function getTC(){
  var cs=getComputedStyle(document.documentElement);
  return{
    text:  cs.getPropertyValue('--text').trim()||'#1a1a16',
    text3: cs.getPropertyValue('--text3').trim()||'#7a7468',
    border:cs.getPropertyValue('--border').trim()||'#ddd8cc',
    surf2: cs.getPropertyValue('--surface2').trim()||'#f0ede6',
    is:    cs.getPropertyValue('--is-color').trim()||'#1d4e89',
    gold:  cs.getPropertyValue('--gold').trim()||'#c9a84c'
  };
}

/* Compute IS equilibrium for a given r and parameter set */
function computeYeq(params,r){
  var I=Math.max(0,params.I0-params.b*r);
  var intercept=params.C0+I+params.G-params.c*params.T;
  return intercept/(1-params.c);
}

/* Get a fresh canvas size (always call before drawing) */
function freshSize(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  var W=rect.width,H=rect.height;
  if(W<10||H<10)return null;
  // Always resize if needed, then always reset transform
  // (stale transform from prior draw causes all subsequent draws to be invisible)
  if(canvas.width!==Math.round(W*dpr)||canvas.height!==Math.round(H*dpr)){
    canvas.width=Math.round(W*dpr);
    canvas.height=Math.round(H*dpr);
  }
  var ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return{W:W,H:H};
}

function drawGrid(ctx,pad,W,H,col){
  ctx.fillStyle=col.surf2;ctx.fillRect(pad.l,pad.t,W-pad.l-pad.r,H-pad.t-pad.b);
  ctx.strokeStyle=col.border;ctx.lineWidth=0.8;
  var gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  for(var i=0;i<=4;i++){var x=pad.l+i*gW/4;ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gH);ctx.stroke();}
  for(var i=0;i<=4;i++){var y=pad.t+i*gH/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gW,y);ctx.stroke();}
}

/* ══ WIDGET 1: Cruz Keynesiana ══
   Sliders: G (100-500) and r (1-10).
   Axes are dynamic: Ymax and GAmax derived from data.
*/
var kcSliders={G:300,r:4};

function drawKC(){
  var canvas=document.getElementById('kcCanvas');if(!canvas)return;
  var sz=freshSize(canvas);if(!sz)return;
  var W=sz.W,H=sz.H,col=getTC(),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  var pad={l:56,r:16,t:22,b:46};
  var gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;

  // Current params (merge student P with slider overrides)
  var params={C0:P.C0,c:P.c,I0:P.I0,b:P.b,G:kcSliders.G,T:P.T};
  var r=kcSliders.r;
  var I=Math.max(0,params.I0-params.b*r);
  var intercept=params.C0+I+params.G-params.c*params.T;
  var slope=params.c;
  var Yeq=intercept/(1-slope);

  // Dynamic axis: Ymax = max(Yeq, 200)*1.25, min 400
  var Ymax=Math.max(400,Yeq*1.3);
  var GAmax=Ymax; // same scale so 45° line has slope 1 in pixel space

  function tx(y){return pad.l+y/Ymax*gW;}
  function ty(ga){return pad.t+gH-ga/GAmax*gH;}

  drawGrid(ctx,pad,W,H,col);

  // 45° line: GA = Y  (the equilibrium condition)
  ctx.strokeStyle=col.text3;ctx.lineWidth=1.2;ctx.setLineDash([5,4]);ctx.globalAlpha=0.55;
  ctx.beginPath();ctx.moveTo(tx(0),ty(0));ctx.lineTo(tx(Ymax),ty(GAmax));ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
  ctx.fillStyle=col.text3;ctx.font='italic 9px IBM Plex Sans,sans-serif';ctx.textAlign='left';
  ctx.fillText('GA = Y (equilibrio)',tx(Ymax*0.55)+3,ty(Ymax*0.55)-5);

  // GA line: GA = intercept + slope*Y
  var ga0=intercept, gaEnd=intercept+slope*Ymax;
  ctx.strokeStyle=col.is;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(tx(0),ty(ga0));ctx.lineTo(tx(Ymax),ty(gaEnd));ctx.stroke();
  // GA label near the end of the line
  var labelX=Ymax*0.72;
  ctx.fillStyle=col.is;ctx.font='bold 10px IBM Plex Sans,sans-serif';ctx.textAlign='left';
  ctx.fillText('GA',tx(labelX)+3,ty(intercept+slope*labelX)-5);

  // Equilibrium dashed lines and dot
  ctx.setLineDash([3,3]);ctx.strokeStyle=col.gold;ctx.lineWidth=1;ctx.globalAlpha=0.65;
  ctx.beginPath();ctx.moveTo(tx(Yeq),ty(Yeq));ctx.lineTo(tx(Yeq),pad.t+gH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.l,ty(Yeq));ctx.lineTo(tx(Yeq),ty(Yeq));ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(tx(Yeq),ty(Yeq),6,0,Math.PI*2);
  ctx.fillStyle=col.gold;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

  // Axis labels
  ctx.save();ctx.translate(14,pad.t+gH/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';
  ctx.fillStyle=col.text;ctx.globalAlpha=0.6;ctx.font='9px IBM Plex Sans,sans-serif';
  ctx.fillText('Gasto Agregado (GA)',0,0);ctx.restore();
  ctx.textAlign='center';ctx.fillStyle=col.text;ctx.globalAlpha=0.6;ctx.font='9px IBM Plex Sans,sans-serif';
  ctx.fillText('Ingreso / Producción (Y)',pad.l+gW/2,H-6);ctx.globalAlpha=1;

  // Y* tick
  ctx.font='bold 9px IBM Plex Mono,monospace';ctx.fillStyle=col.gold;ctx.textAlign='center';
  ctx.fillText('Y*='+Math.round(Yeq),tx(Yeq),pad.t+gH+16);

  // Y-axis ticks (4 evenly spaced)
  ctx.font='9px IBM Plex Mono,monospace';ctx.fillStyle=col.text;ctx.globalAlpha=0.4;ctx.textAlign='right';
  for(var i=1;i<=4;i++){var v=Math.round(Ymax/4*i);ctx.fillText(v,pad.l-4,ty(v)+3);}
  ctx.globalAlpha=1;

  // Update metrics
  var mult=1/(1-slope);
  var eY=document.getElementById('kc_Yeq'),eI=document.getElementById('kc_I'),eM=document.getElementById('kc_mult');
  if(eY)eY.textContent=Math.round(Yeq);
  if(eI)eI.textContent=Math.round(I);
  if(eM)eM.textContent=mult.toFixed(2);
}

function setupKC(){
  ['kc_G','kc_r'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.addEventListener('input',function(){
      var key=id.replace('kc_','');
      kcSliders[key]=parseFloat(el.value);
      var vEl=document.getElementById(id+'_val');
      if(vEl)vEl.textContent=(key==='r'?el.value+'%':el.value);
      drawKC();
    });
  });
  // Ensure canvas has dimensions before first draw
  var canvas=document.getElementById('kcCanvas');

    var sz=freshSize(canvas);
    if(!sz){setTimeout(function(){freshSize(document.getElementById('kcCanvas'));drawKC();},150);}
  }
  drawKC();
}

/* ══ WIDGET 2: IS Derivation (two panels)
   Left: KC for current r. Right: IS being traced.
   Axes computed from data — no hardcoded limits.
*/
var isDerPts=[]; // collected {r, Y} pairs

function computeISRange(){
  // Find Y range for r from 1% to rMax where I stays positive
  var rMax=Math.min(10, P.I0/P.b - 0.5);
  if(rMax<1)rMax=1;
  var pts=[];
  for(var rv=0.5;rv<=rMax;rv+=0.25){
    var Yv=computeYeq(P,rv);
    if(Yv>0&&isFinite(Yv))pts.push({r:rv,Y:Yv});
  }
  return{pts:pts,rMax:rMax};
}

function drawISDer(){
  var canvas=document.getElementById('isDerCanvas');if(!canvas)return;
  var sz=freshSize(canvas);if(!sz)return;
  var W=sz.W,H=sz.H,col=getTC(),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  var range=computeISRange();
  if(range.pts.length<2)return;

  var Ymin=range.pts[range.pts.length-1].Y, Ymax_r=range.pts[0].Y;
  var rMax=range.rMax;
  var Yaxis=Ymax_r*1.2;
  var GAaxis=Yaxis;

  var half=Math.floor(W/2)-4;
  var padL={l:44,r:6,t:18,b:38},padR={l:44,r:10,t:18,b:38};
  var gWL=half-padL.l-padL.r,gHL=H-padL.t-padL.b;
  var gWR=half-padR.l-padR.r,gHR=H-padR.t-padR.b;

  function txL(y){return padL.l+y/Yaxis*gWL;}
  function tyL(ga){return padL.t+gHL-ga/GAaxis*gHL;}
  function txR(y){return half+8+padR.l+y/Yaxis*gWR;}
  function tyR(r){return padR.t+gHR-r/rMax*gHR;}

  // ── LEFT PANEL: Cruz Keynesiana ──
  drawGrid(ctx,padL,half,H,col);

  // 45° line
  ctx.strokeStyle=col.text3;ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.globalAlpha=0.4;
  ctx.beginPath();ctx.moveTo(txL(0),tyL(0));ctx.lineTo(txL(Yaxis),tyL(GAaxis));ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;

  // GA line for current r
  var r=isDerSlider;
  var params=P;
  var I=Math.max(0,params.I0-params.b*r);
  var intercept=params.C0+I+params.G-params.c*params.T;
  var Yeq=intercept/(1-params.c);

  ctx.strokeStyle=col.is;ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(txL(0),tyL(intercept));ctx.lineTo(txL(Yaxis),tyL(intercept+params.c*Yaxis));ctx.stroke();

  // DA label
  var lx=Yaxis*0.65;
  var ly=intercept+params.c*lx;
  if(ly<GAaxis){ctx.fillStyle=col.is;ctx.font='bold 9px IBM Plex Sans';ctx.textAlign='left';ctx.fillText('GA',txL(lx)+3,tyL(ly)-5);}

  // Equilibrium on left
  if(Yeq>0&&Yeq<Yaxis){
    ctx.setLineDash([3,3]);ctx.strokeStyle=col.gold;ctx.lineWidth=0.9;ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.moveTo(txL(Yeq),tyL(Yeq));ctx.lineTo(txL(Yeq),padL.t+gHL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(padL.l,tyL(Yeq));ctx.lineTo(txL(Yeq),tyL(Yeq));ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(txL(Yeq),tyL(Yeq),5,0,Math.PI*2);
    ctx.fillStyle=col.gold;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=col.gold;ctx.font='bold 8px IBM Plex Mono';ctx.textAlign='center';
    ctx.fillText('Y*',txL(Yeq),padL.t+gHL+13);
  }

  // Left axis labels
  ctx.save();ctx.translate(12,padL.t+gHL/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';
  ctx.fillStyle=col.text;ctx.globalAlpha=0.5;ctx.font='8px IBM Plex Sans';ctx.fillText('GA',0,0);ctx.restore();
  ctx.textAlign='center';ctx.fillStyle=col.text;ctx.globalAlpha=0.5;ctx.font='8px IBM Plex Sans';ctx.fillText('Y',padL.l+gWL/2,padL.t+gHL+14);ctx.globalAlpha=1;
  ctx.fillStyle=col.is;ctx.font='bold 9px IBM Plex Sans';ctx.textAlign='center';ctx.fillText('Cruz Keynesiana',padL.l+gWL/2,padL.t-3);

  // Arrow
  ctx.fillStyle=col.gold;ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('→',half+4,H/2+4);

  // ── RIGHT PANEL: IS curve ──
  var offX=half+8;
  // Background
  ctx.fillStyle=col.surf2;ctx.fillRect(offX+padR.l,padR.t,gWR,gHR);
  ctx.strokeStyle=col.border;ctx.lineWidth=0.8;
  for(var i=0;i<=4;i++){var x=offX+padR.l+i*gWR/4;ctx.beginPath();ctx.moveTo(x,padR.t);ctx.lineTo(x,padR.t+gHR);ctx.stroke();}
  for(var i=0;i<=4;i++){var y=padR.t+i*gHR/4;ctx.beginPath();ctx.moveTo(offX+padR.l,y);ctx.lineTo(offX+padR.l+gWR,y);ctx.stroke();}

  // Full IS ghost
  ctx.strokeStyle=col.is;ctx.lineWidth=1.5;ctx.globalAlpha=0.18;
  ctx.beginPath();var first=true;
  range.pts.forEach(function(pt){
    var px=txR(pt.Y),py=tyR(pt.r);
    if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);
  });ctx.stroke();ctx.globalAlpha=1;

  // Traced points connected
  if(isDerPts.length>1){
    var sorted=isDerPts.slice().sort(function(a,b){return a.r-b.r;});
    ctx.strokeStyle=col.is;ctx.lineWidth=2.5;
    ctx.beginPath();sorted.forEach(function(pt,idx){idx===0?ctx.moveTo(txR(pt.Y),tyR(pt.r)):ctx.lineTo(txR(pt.Y),tyR(pt.r));});ctx.stroke();
  }
  isDerPts.forEach(function(pt){
    ctx.beginPath();ctx.arc(txR(pt.Y),tyR(pt.r),3.5,0,Math.PI*2);
    ctx.fillStyle=col.gold;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.stroke();
  });

  // Current large dot + dashes
  if(Yeq>0){
    ctx.beginPath();ctx.arc(txR(Yeq),tyR(r),6,0,Math.PI*2);
    ctx.fillStyle=col.gold;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.setLineDash([3,3]);ctx.strokeStyle=col.gold;ctx.lineWidth=0.9;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.moveTo(txR(Yeq),tyR(r));ctx.lineTo(txR(Yeq),padR.t+gHR);ctx.stroke();
    ctx.beginPath();ctx.moveTo(offX+padR.l,tyR(r));ctx.lineTo(txR(Yeq),tyR(r));ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }

  // IS label
  var midPt=range.pts[Math.floor(range.pts.length*0.3)];
  if(midPt){ctx.fillStyle=col.is;ctx.font='bold 10px IBM Plex Sans';ctx.textAlign='left';ctx.fillText('IS',txR(midPt.Y)+4,tyR(midPt.r)-4);}

  // Right axis labels
  ctx.save();ctx.translate(offX+12,padR.t+gHR/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';
  ctx.fillStyle=col.text;ctx.globalAlpha=0.5;ctx.font='8px IBM Plex Sans';ctx.fillText('r (%)',0,0);ctx.restore();
  ctx.textAlign='center';ctx.fillStyle=col.text;ctx.globalAlpha=0.5;ctx.font='8px IBM Plex Sans';ctx.fillText('Y',offX+padR.l+gWR/2,padR.t+gHR+14);ctx.globalAlpha=1;
  ctx.fillStyle=col.is;ctx.font='bold 9px IBM Plex Sans';ctx.textAlign='center';ctx.fillText('Curva IS (trazándose)',offX+padR.l+gWR/2,padR.t-3);

  // r-axis ticks right
  ctx.font='8px IBM Plex Mono';ctx.fillStyle=col.text;ctx.globalAlpha=0.4;ctx.textAlign='right';
  for(var i=1;i<=4;i++){var rv=rMax/4*i;ctx.fillText(Math.round(rv)+'%',offX+padR.l-3,tyR(rv)+3);}
  ctx.globalAlpha=1;
}

var isDerSlider=3; // start at r=3 so Y is visible on both panels
function setupISDer(){
  // pre-populate a few points across the IS range
  isDerPts=[];
  var range=computeISRange();
  var step=Math.floor(range.pts.length/5);
  for(var i=0;i<range.pts.length;i+=Math.max(1,step)){isDerPts.push(range.pts[i]);}
  isDerSlider=Math.round(range.rMax*0.35*10)/10;

  var sl=document.getElementById('isDer_r');
  if(sl){
    sl.min=0.5;sl.max=Math.round(range.rMax*10)/10;sl.value=isDerSlider;
    document.getElementById('isDer_rval').textContent=isDerSlider.toFixed(1)+'%';
    sl.addEventListener('input',function(){
      isDerSlider=parseFloat(sl.value);
      document.getElementById('isDer_rval').textContent=isDerSlider.toFixed(1)+'%';
      var Yv=computeYeq(P,isDerSlider);
      if(Yv>0&&isFinite(Yv)){
        var existing=isDerPts.findIndex(function(p){return Math.abs(p.r-isDerSlider)<0.2;});
        if(existing>=0)isDerPts[existing]={r:isDerSlider,Y:Yv};
        else isDerPts.push({r:isDerSlider,Y:Yv});
        isDerPts.sort(function(a,b){return a.r-b.r;});
      }
      drawISDer();
    });
  }
  drawISDer();
}

/* ══ WIDGET 3: IS Shifts
   Draws base IS and shifted IS on same canvas.
   Lazy init: freshSize() called at draw time.
*/
var activeShift=null;
var shiftDefs={
  upG:  {dG:+200, dT:0, dI0:0, dC0:0,  result:'La IS se desplaza a la <strong>derecha</strong>: ↑G eleva directamente el gasto Y = C+I+G. Para cualquier r, el Y de equilibrio es ahora mayor. El intercepto de IS sube en ΔG/(1-c).'},
  upI0: {dG:0, dT:0, dI0:+120, dC0:0, result:'La IS se desplaza a la <strong>derecha</strong>: ↑I₀ eleva la inversión autónoma. Como I = I₀ − b·r, mayor I₀ aumenta I para cualquier r, elevando Y* para toda la curva.'},
  upT:  {dG:0, dT:+150, dI0:0, dC0:0,  result:'La IS se desplaza a la <strong>izquierda</strong>: ↑T reduce el ingreso disponible (Y-T) → cae C → cae el gasto total → Y* cae para toda r.'},
  upC0: {dG:0, dT:0,    dI0:0, dC0:+80, result:'La IS se desplaza a la <strong>derecha</strong>: ↑C₀ eleva el consumo autónomo — los hogares gastan más independientemente de su ingreso — aumentando Y* para toda r.'}
};

function pickShift(key,btn){
  activeShift=key;
  document.querySelectorAll('.shbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var res=document.getElementById('shift-result');
  res.innerHTML=shiftDefs[key].result;res.className='shift-result show';
  drawISShift();
}

function makeISPoints(params){
  var rMax=Math.min(10,params.I0/params.b-0.5);if(rMax<0.5)rMax=0.5;
  var pts=[];
  for(var rv=0.3;rv<=rMax;rv+=0.2){
    var Yv=computeYeq(params,rv);
    if(Yv>0&&isFinite(Yv)&&Yv<1e6)pts.push({r:rv,Y:Yv});
  }
  return pts;
}

function drawISShift(){
  var canvas=document.getElementById('shiftCanvas');if(!canvas)return;
  var sz=freshSize(canvas);if(!sz)return;
  var W=sz.W,H=sz.H,col=getTC(),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  var pad={l:52,r:20,t:24,b:44};
  var gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;

  // Fixed base params — centered so IS sits in the left-center of the canvas
  var baseParams={C0:100,c:0.7,I0:150,b:25,G:200,T:100};
  var basePts=makeISPoints(baseParams);
  if(basePts.length<2)return;

  // Compute shifted params
  var shiftPts=null,def=null;
  if(activeShift){
    def=shiftDefs[activeShift];
    var sp={
      C0:baseParams.C0+(def.dC0||0), c:baseParams.c,
      I0:baseParams.I0+def.dI0, b:baseParams.b,
      G:baseParams.G+def.dG, T:baseParams.T+def.dT
    };
    shiftPts=makeISPoints(sp);
  }

  // Fixed axis sized so base IS sits in center and all shifts are visible
  var Ymax=2200, rMaxAxis=11;
  function tx(y){return pad.l+y/Ymax*gW;}
  function tr(r){return pad.t+gH-r/rMaxAxis*gH;}

  drawGrid(ctx,pad,W,H,col);

  function drawCurve(pts,alpha,label,dashed,lw){
    if(!pts||pts.length<2)return;
    ctx.strokeStyle=col.is;ctx.lineWidth=lw||2.3;ctx.globalAlpha=alpha;
    if(dashed)ctx.setLineDash([8,5]);
    ctx.beginPath();
    pts.forEach(function(pt,i){
      if(pt.Y<0||pt.Y>Ymax||pt.r<0||pt.r>rMaxAxis)return;
      i===0?ctx.moveTo(tx(pt.Y),tr(pt.r)):ctx.lineTo(tx(pt.Y),tr(pt.r));
    });
    ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    // Label near 35% along the curve
    var vis=pts.filter(function(pt){return pt.Y>=0&&pt.Y<=Ymax&&pt.r>=0&&pt.r<=rMaxAxis;});
    var midPt=vis[Math.floor(vis.length*0.35)];
    if(midPt){
      ctx.fillStyle=col.is;ctx.globalAlpha=alpha;
      ctx.font='bold 11px IBM Plex Sans,sans-serif';ctx.textAlign='left';
      ctx.fillText(label,tx(midPt.Y)+6,tr(midPt.r)-5);ctx.globalAlpha=1;
    }
  }

  // Original IS — dashed, faded
  drawCurve(basePts,0.45,'IS',true,1.8);

  // New IS' — solid, bold
  if(shiftPts&&shiftPts.length>1){
    drawCurve(shiftPts,1,"IS'",false,3);

    // Big filled arrow at a comfortable mid-r position
    var rMid=5;
    var yBase=computeYeq(baseParams,rMid);
    var yShift=computeYeq({
      C0:baseParams.C0+(def.dC0||0),c:baseParams.c,
      I0:baseParams.I0+def.dI0,b:baseParams.b,
      G:baseParams.G+def.dG,T:baseParams.T+def.dT
    },rMid);
    if(isFinite(yBase)&&isFinite(yShift)&&Math.abs(yShift-yBase)>30){
      var midX=tx((yBase+yShift)/2), midY=tr(rMid);
      var dir=(yShift>yBase)?1:-1;
      var aw=28,ah=12;  // arrow width and half-height
      ctx.fillStyle=col.gold;ctx.globalAlpha=0.95;
      ctx.beginPath();
      if(dir>0){
        // pointing right →
        ctx.moveTo(midX-aw,midY-ah); ctx.lineTo(midX-aw,midY+ah);
        ctx.lineTo(midX+aw,midY);
      } else {
        // pointing left ←
        ctx.moveTo(midX+aw,midY-ah); ctx.lineTo(midX+aw,midY+ah);
        ctx.lineTo(midX-aw,midY);
      }
      ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    }
  }

  // Axis labels
  ctx.save();ctx.translate(14,pad.t+gH/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';
  ctx.fillStyle=col.text;ctx.globalAlpha=0.55;ctx.font='9px IBM Plex Sans';ctx.fillText('r (%)',0,0);ctx.restore();
  ctx.textAlign='center';ctx.fillStyle=col.text;ctx.globalAlpha=0.55;ctx.font='9px IBM Plex Sans';
  ctx.fillText('Producción (Y)',pad.l+gW/2,H-6);ctx.globalAlpha=1;
  // r ticks
  ctx.font='8px IBM Plex Mono';ctx.fillStyle=col.text;ctx.globalAlpha=0.4;ctx.textAlign='right';
  for(var i=1;i<=4;i++){var rv=rMaxAxis/4*i;ctx.fillText(Math.round(rv)+'%',pad.l-4,tr(rv)+3);}
  // Y ticks
  ctx.textAlign='center';
  for(var i=1;i<=4;i++){var yv=Math.round(Ymax/4*i);ctx.fillText(yv,tx(yv),pad.t+gH+16);}
  ctx.globalAlpha=1;
}

    '<div class="callout" style="border-color:var(--gold);background:var(--gold-bg)">'+
      '<strong>Ejemplo:</strong>'+
      '<p>Si I₀ = 200 y b = 30, con r = 4%: I = 200 − 30 × 4 = 200 − 120 = 80. Si r sube a 5%: I = 200 − 30 × 5 = 50. Un punto más de tasa redujo la inversión en 30 unidades.</p>'+
    '</div>'+
    '<div class="is-callout">'+
      '<strong>Esta función es la clave de todo:</strong>'+
      '<p>Porque I depende de r, el equilibrio Y = C + I + G también depende de r. Eso significa que cada nivel de r produce un Y de equilibrio distinto — y esa relación es exactamente la curva IS.</p>'+
    '</div>'
  );

  /* MC 4 — I exercise with student numbers */
  var r_i = 2 + Math.floor(rng()*5);   // r from 2 to 6
  var I_ans = Math.max(0, I0 - b*r_i);
  var o4 = shuffle([
    Math.round(I_ans).toString(),
    Math.round(I0 + b*r_i).toString(),      // added instead of subtracted
    Math.round(I0 - b*(r_i+2)).toString(),  // wrong r
    Math.round(I0).toString()               // forgot the b·r term
  ], rng);
  pushCard({
    title: 'Calculando la inversión I',
    questionText: 'Con I₀ = '+I0+', b = '+b+' y r = '+r_i+'%, ¿cuánto es la inversión I?',
    fn: 'I = I₀ − b · r',
    hint: 'Sustituye directamente: I = '+I0+' − '+b+' × '+r_i+'.',
    options: o4,
    correctIdx: o4.indexOf(Math.round(I_ans).toString()),
    explanation: 'I = '+I0+' − '+b+' × '+r_i+' = '+I0+' − '+b*r_i+' = '+Math.round(I_ans)+'. Cada punto porcentual de r reduce la inversión en '+b+' unidades.',
    workArea: true, studentChoice: null, pendingChoice: null
  });

  /* MC 5 — what happens when r rises */
  var r_rise = r_i + 2;
  var I_new = Math.max(0, I0 - b*r_rise);
  var deltaI = Math.round(I_ans - I_new);
  var o5 = shuffle([
    'I cae en '+deltaI+' (de '+Math.round(I_ans)+' a '+Math.round(I_new)+')',
    'I sube en '+deltaI+' porque la tasa premia la inversión',
    'I no cambia porque I₀ es fijo',
    'I cae en '+Math.round(b)+' exactamente un punto, no dos'
  ], rng);
  pushCard({
    title: 'Efecto de una subida de r sobre I',
    questionText: 'La tasa de interés sube de '+r_i+'% a '+r_rise+'%. Con b = '+b+', ¿qué le pasa a la inversión?',
    fn: 'I = I₀ − b · r',
    hint: 'Calcula I con r = '+r_i+'% y luego con r = '+r_rise+'%. La diferencia es el cambio en I.',
    options: o5,
    correctIdx: o5.indexOf('I cae en '+deltaI+' (de '+Math.round(I_ans)+' a '+Math.round(I_new)+')'),
    explanation: 'I('+r_i+'%) = '+Math.round(I_ans)+'. I('+r_rise+'%) = '+Math.round(I_new)+'. La caída es '+deltaI+' = '+b+' × 2 (dos puntos de subida). La inversión cae en b unidades por cada punto que sube r.',
    workArea: true, studentChoice: null, pendingChoice: null
  });

  /* ══════════════════════════════════════════════════
     SECTION 4 — Derivación algebraica con números
  ══════════════════════════════════════════════════ */
  var r_der = 3 + Math.floor(rng()*4);   // r = 3,4,5,6 for the derivation example
  var I_der = Math.max(0, I0 - b*r_der);
  var intercept_der = C0 + I_der + G - c*T;
  var Yeq_der = Math.round(intercept_der/(1-c));

  sec(
    '<div class="stag">Derivación</div>'+
    '<h2>Obteniendo la ecuación IS</h2>'+
    '<p>Sustituimos las funciones de C e I dentro de Y = C + I + G y despejamos Y. Primero lo hacemos con letras para ver la forma general, y luego con tus números.</p>'+
    '<div class="eq-box">'+
      '<div class="eq-label">Derivación general — solo letras</div>'+
      '<div class="eq-step"><span class="sn">1</span>'+
        '<span class="se">Y = C + I + G</span>'+
        '<span class="snote">Condición de equilibrio</span></div>'+
      '<div class="eq-step"><span class="sn">2</span>'+
        '<span class="se">Y = [C₀ + c·(Y − T)] + [I₀ − b·r] + G</span>'+
        '<span class="snote">Sustituimos C e I</span></div>'+
      '<div class="eq-step"><span class="sn">3</span>'+
        '<span class="se">Y = C₀ + cY − cT + I₀ − b·r + G</span>'+
        '<span class="snote">Expandimos</span></div>'+
      '<div class="eq-step"><span class="sn">4</span>'+
        '<span class="se">Y − cY = C₀ + I₀ + G − cT − b·r</span>'+
        '<span class="snote">Pasamos cY al lado izquierdo</span></div>'+
      '<div class="eq-step"><span class="sn">5</span>'+
        '<span class="se">Y · (1 − c) = (C₀ + I₀ + G − cT) − b·r</span>'+
        '<span class="snote">Factorizamos Y</span></div>'+
      '<div class="eq-step"><span class="sn">6</span>'+
        '<span class="se">Y = <span class="mf-outer"><span class="mf-num">C₀ + I₀ + G − cT</span><span class="mf-den">1 − c</span></span> − <span class="mf-outer"><span class="mf-num">b</span><span class="mf-den">1 − c</span></span> · r</span>'+
        '<span class="snote">Dividimos entre (1 − c) — esta es la IS</span></div>'+
    '</div>'+
    '<div class="is-callout">'+
      '<strong>La ecuación IS general:</strong>'+
      '<p style="font-family:IBM Plex Mono,monospace;font-size:.93rem;margin:.5rem 0">'+
        'Y = <span class="mf-outer"><span class="mf-num">C₀ + I₀ + G − cT</span><span class="mf-den">1 − c</span></span> − <span class="mf-outer"><span class="mf-num">b</span><span class="mf-den">1 − c</span></span> · r'+
      '</p>'+
      '<p style="font-size:.82rem;margin-top:.4rem">El primer término es el intercepto — depende de la política fiscal (G, T) y de los parámetros de consumo e inversión. El segundo término tiene pendiente negativa porque b y (1−c) son siempre positivos.</p>'+
    '</div>'+
    '<p>Ahora sustituimos tus parámetros directamente en la fórmula general que acabamos de obtener:</p>'+
    '<div class="eq-box" style="border-color:var(--gold)">'+
      '<div class="eq-label" style="color:var(--gold)">Paso A — Sustituir los parámetros en la fórmula IS general</div>'+
      '<div class="eq-step"><span class="sn">Fórmula</span>'+
        '<span class="se">Y = <span class="mf-outer"><span class="mf-num">C₀ + I₀ + G − cT</span><span class="mf-den">1 − c</span></span> − <span class="mf-outer"><span class="mf-num">b</span><span class="mf-den">1 − c</span></span> · r</span>'+
        '<span class="snote">IS general</span></div>'+
      '<div class="eq-step"><span class="sn">Sustituir</span>'+
        '<span class="se">Y = <span class="mf-outer"><span class="mf-num">'+C0+' + '+I0+' + '+G+' − '+c+'·'+T+'</span><span class="mf-den">1 − '+c+'</span></span> − <span class="mf-outer"><span class="mf-num">'+b+'</span><span class="mf-den">1 − '+c+'</span></span> · r</span>'+
        '<span class="snote">Ponemos los números</span></div>'+
      '<div class="eq-step"><span class="sn">Calcular</span>'+
        '<span class="se">Y = <span class="mf-outer"><span class="mf-num">'+Math.round(alpha)+'</span><span class="mf-den">'+Math.round((1-c)*100)/100+'</span></span> − <span class="mf-outer"><span class="mf-num">'+b+'</span><span class="mf-den">'+Math.round((1-c)*100)/100+'</span></span> · r</span>'+
        '<span class="snote">Sumamos el numerador</span></div>'+
      '<div class="eq-step"><span class="sn">IS final</span>'+
        '<span class="se">Y = '+isIntercept+' − '+isSlope+' · r</span>'+
        '<span class="snote">Tu ecuación IS específica</span></div>'+
    '</div>'+
    '<div class="is-callout">'+
      '<strong>Esta es tu curva IS:</strong>'+
      '<p style="font-family:IBM Plex Mono,monospace;font-size:.95rem;margin:.4rem 0">Y = '+isIntercept+' − '+isSlope+' · r</p>'+
      '<p style="font-size:.82rem">Con esta ecuación puedes obtener Y* para cualquier r sin hacer toda la álgebra desde cero. Cada punto porcentual que sube r reduce Y* en <strong>'+isSlope+'</strong> unidades — confirmando que la IS tiene pendiente negativa.</p>'+
    '</div>'+
    '<p>Para comprobar que la ecuación IS es correcta, usémosla con r = '+r_der+'% y verifiquemos que obtenemos el mismo Y* que si calculáramos directamente:</p>'+
    '<div class="eq-box">'+
      '<div class="eq-label">Paso B — Verificación con r = '+r_der+'%</div>'+
      '<div class="eq-step"><span class="sn">Vía IS</span>'+
        '<span class="se">Y = '+isIntercept+' − '+isSlope+' × '+r_der+' = '+Math.round(isIntercept - isSlope*r_der)+'</span>'+
        '<span class="snote">Usando la IS directamente</span></div>'+
      '<div class="eq-step"><span class="sn">Vía original</span>'+
        '<span class="se">I = '+I0+' − '+b+'×'+r_der+' = '+Math.round(I_der)+'   →   Y* = ('+C0+'+'+Math.round(I_der)+'+'+G+' − '+c+'×'+T+') ÷ '+Math.round((1-c)*100)/100+' = '+Yeq_der+'</span>'+
        '<span class="snote">Desde Y = C + I + G</span></div>'+
      '<div class="eq-step"><span class="sn">Resultado</span>'+
        '<span class="se">'+Math.round(isIntercept - isSlope*r_der)+' ≈ '+Yeq_der+' ✓</span>'+
        '<span class="snote">Ambos métodos dan el mismo Y* — la IS es correcta</span></div>'+
    '</div>'+
    '<div class="callout">'+
      '<strong>¿Cuál es la relación entre las dos vías?</strong>'+
      '<p>Son exactamente lo mismo. La ecuación IS resume todo el álgebra de Y = C + I + G en una sola fórmula. Una vez que la tienes, no necesitas volver a la ecuación original — simplemente sustituyes r y obtienes Y* en un paso.</p>'+
    '</div>'
  );

  /* MC 6 — compute Y* from IS equation, work area */
  var r_test = r_der === 5 ? 4 : 5;
  var Yeq_test = Math.round(isIntercept - isSlope*r_test);
  var o6 = shuffle([
    Yeq_test.toString(),
    Math.round(Yeq_test * 1.10).toString(),
    Math.round(Yeq_test * 0.90).toString(),
    Math.round(alpha).toString()  // numerator without multiplier
  ], rng);
  pushCard({
    title: 'Usando la ecuación IS',
    questionText: 'Con la ecuación IS de tu guía, calcula Y* cuando r = '+r_test+'%. Muestra el cálculo en el área de trabajo.',
    fn: 'IS: Y = '+isIntercept+' − '+isSlope+' · r',
    hint: 'Sustituye r = '+r_test+' directamente: Y = '+isIntercept+' − '+isSlope+' × '+r_test+'.',
    options: o6,
    correctIdx: o6.indexOf(Yeq_test.toString()),
    explanation: 'Y = '+isIntercept+' − '+isSlope+' × '+r_test+' = '+isIntercept+' − '+isSlope*r_test+' = '+Yeq_test+'.',
    workArea: true, studentChoice: null, pendingChoice: null
  });

  /* ══════════════════════════════════════════════════
     SECTION 5 — Desplazamientos de la IS
  ══════════════════════════════════════════════════ */
  sec(
    '<div class="stag">Desplazamientos</div>'+
    '<h2>¿Cuándo se mueve la curva IS?</h2>'+
    '<p>La curva IS se desplaza cuando cambia cualquier variable que afecte Y = C + I + G sin ser la propia tasa r. Cuando r cambia, nos movemos a lo largo de la IS — la curva no se mueve. Cuando cambia G, T, I₀ o C₀, toda la curva se desplaza.</p>'+
    '<div class="eq-box">'+
      '<div class="eq-label">Regla de desplazamiento</div>'+
      '<div class="eq-step"><span class="sn">→</span><span class="se">↑G,  ↑I₀,  ↑C₀,  ↓T</span><span class="snote">IS se desplaza a la derecha — mayor Y para toda r</span></div>'+
      '<div class="eq-step"><span class="sn">←</span><span class="se">↓G,  ↓I₀,  ↓C₀,  ↑T</span><span class="snote">IS se desplaza a la izquierda — menor Y para toda r</span></div>'+
      '<div class="eq-step"><span class="sn">⚠</span><span class="se">Cambio en r</span><span class="snote">Movimiento a lo largo de la IS — la curva no cambia</span></div>'+
    '</div>'+
    '<p>Elige un escenario. La línea punteada muestra siempre la IS original en la misma posición. La línea sólida es la IS nueva después del cambio.</p>'+
    '<div class="widget">'+
      '<div class="widget-title">Simulador de desplazamientos</div>'+
      '<div class="shift-btns">'+
        '<button class="shbtn" onclick="pickShift(\'upG\',this)">↑ Gasto público (G)</button>'+
        '<button class="shbtn" onclick="pickShift(\'upI0\',this)">↑ Inversión autónoma (I₀)</button>'+
        '<button class="shbtn" onclick="pickShift(\'upT\',this)">↑ Impuestos (T)</button>'+
        '<button class="shbtn" onclick="pickShift(\'upC0\',this)">↑ Consumo autónomo (C₀)</button>'+
      '</div>'+
      '<canvas id="shiftCanvas" style="width:100%;height:260px;display:block;margin-top:.7rem;"></canvas>'+
      '<div class="shift-result" id="shift-result">Elige un escenario para ver el desplazamiento.</div>'+
    '</div>'
  );
  setTimeout(function(){
    var c2=document.getElementById('shiftCanvas');
    if(c2){freshSize(c2);drawISShift();}
  },300);

  /* MC 7 — shift with equation */
  var dG2 = 100 + Math.floor(rng()*3)*50;
  var newAlpha = alpha + dG2;
  var newIntercept = Math.round(newAlpha/(1-c));
  var deltaInt = Math.round(dG2/(1-c));
  var o7 = shuffle([
    'IS derecha; nuevo intercepto Y = '+newIntercept+' − '+isSlope+'·r',
    'IS izquierda; el mayor G reduce el ingreso disponible',
    'La pendiente se vuelve más plana; el intercepto no cambia',
    'IS no cambia; solo sube el punto de equilibrio'
  ], rng);
  pushCard({
    title: 'Efecto de ↑G sobre la IS',
    questionText: 'El gobierno aumenta G en '+dG2+' unidades. ¿Cómo cambia la ecuación IS?',
    fn: 'IS original: Y = '+isIntercept+' − '+isSlope+'·r',
    hint: 'El intercepto de IS es (C₀+I₀+G−cT)/(1−c). Si G sube en '+dG2+', el intercepto sube en '+dG2+'/(1−'+c+') = '+deltaInt+'.',
    options: o7,
    correctIdx: o7.indexOf('IS derecha; nuevo intercepto Y = '+newIntercept+' − '+isSlope+'·r'),
    explanation: 'El intercepto sube en '+dG2+'/(1−'+c+') = '+deltaInt+'. Nuevo intercepto: '+isIntercept+' + '+deltaInt+' = '+newIntercept+'. La pendiente −'+isSlope+' no cambia. La IS se desplaza a la derecha: para cada r, hay un Y* mayor.',
    workArea: true, studentChoice: null, pendingChoice: null
  });

  /* ══════════════════════════════════════════════════
     SECTION 6 — EVALUACIÓN FINAL
  ══════════════════════════════════════════════════ */
  sec('<div class="stag">Evaluación Final</div><h2>Problemas de cierre</h2><p>Sin consultar el material anterior, resuelve los siguientes problemas.</p>');

  /* MC 8 — IS pendiente comparison */
  var bA = 15 + Math.floor(rng()*2)*10;
  var bB = bA + 25;
  var slopeA = Math.round((1-c)/bA*1000)/1000;
  var slopeB = Math.round((1-c)/bB*1000)/1000;
  var o8 = shuffle([
    'Economía B (b='+bB+') — IS más plana porque la inversión es más sensible a r',
    'Economía A (b='+bA+') — IS más plana porque b es menor',
    'Ambas tienen la misma pendiente porque comparten el mismo c',
    'Economía A — IS más plana porque tiene mayor intercepto'
  ], rng);
  pushCard({
    title: 'Comparando pendientes de la IS',
    questionText: 'Dos economías comparten c = '+c+' pero difieren en b: Economía A tiene b = '+bA+', Economía B tiene b = '+bB+'. ¿Cuál IS es más plana?',
    fn: 'Pendiente IS (en r = f(Y)) = −(1−c)/b',
    hint: 'Calcula (1−c)/b para cada economía. El valor mayor en términos absolutos corresponde a la curva más empinada.',
    options: o8,
    correctIdx: o8.indexOf('Economía B (b='+bB+') — IS más plana porque la inversión es más sensible a r'),
    explanation: 'Pendiente A = (1−'+c+')/'+bA+' = '+slopeA+'. Pendiente B = (1−'+c+')/'+bB+' = '+slopeB+'. Economía B tiene menor pendiente → IS más plana. Mayor b significa que un pequeño cambio en r produce un gran cambio en I y por tanto en Y.',
    workArea: true, studentChoice: null, pendingChoice: null
  });

  /* MC 9 — full IS derivation, work area */
  var C0f = 80  + Math.floor(rng()*5)*20;
  var cf  = Math.round((0.6 + Math.floor(rng()*4)*0.05)*100)/100;
  var I0f = 100 + Math.floor(rng()*5)*50;
  var bf  = 15  + Math.floor(rng()*5)*10;
  var Gf  = 150 + Math.floor(rng()*5)*50;
  var Tf  = 50  + Math.floor(rng()*5)*50;
  var alphaf    = C0f + I0f + Gf - cf*Tf;
  var intF      = Math.round(alphaf/(1-cf));
  var slopeF    = Math.round(bf/(1-cf));
  var o9 = shuffle([
    'Y = '+intF+' − '+slopeF+'·r',
    'Y = '+Math.round(alphaf)+' − '+bf+'·r',
    'Y = '+Math.round(intF*1.1)+' − '+slopeF+'·r',
    'Y = '+intF+' − '+Math.round(slopeF*1.2)+'·r'
  ], rng);
  pushCard({
    title: 'Derivación completa',
    questionText: 'Deriva la ecuación IS completa para esta economía. Muestra todos los pasos en el área de trabajo.',
    fn: 'C₀='+C0f+'  c='+cf+'  I₀='+I0f+'  b='+bf+'  G='+Gf+'  T='+Tf,
    hint: 'Parte de Y = C₀+c(Y−T)+(I₀−br)+G. Expande, agrupa los Y al lado izquierdo, factoriza (1−c) y despeja Y. Intercepto = (C₀+I₀+G−cT)/(1−c), pendiente = b/(1−c).',
    options: o9,
    correctIdx: o9.indexOf('Y = '+intF+' − '+slopeF+'·r'),
    explanation: 'Intercepto = ('+C0f+'+'+I0f+'+'+Gf+'−'+cf+'×'+Tf+')/(1−'+cf+') = '+Math.round(alphaf)+'/'+Math.round((1-cf)*100)/100+' ≈ '+intF+'. Pendiente = '+bf+'/(1−'+cf+') ≈ '+slopeF+'. IS: Y = '+intF+' − '+slopeF+'·r.',
    workArea: true, studentChoice: null, pendingChoice: null
  });
}

  doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F');doc.text('RESUMEN',M+4,148);var sy=154;
  problems.forEach(function(prob,i){
    if(sy+12>PH-15){doc.addPage();sy=20;doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.rect(M,sy,TW,8,'F');doc.text('RESUMEN (cont.)',M+4,sy+6);sy+=12;}

    doc.setTextColor(20,24,32);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('P'+(i+1)+': '+pdfT(prob.title),M+12,sy+6.5);
    doc.setTextColor(ok?26:176,ok?106:48,ok?74:16);doc.text(ok?'Correcto':'Incorrecto',PW-M-22,sy+6.5);sy+=12;
  });
  for(var i=0;i<problems.length;i++){

    doc.setFillColor(pBR,pBG,pBB);doc.rect(0,0,PW,20,'F');

    doc.setFillColor(pBR,pBG,pBB);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');

  }
  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){doc.setPage(p);doc.setFillColor(pAR,pAG,pAB);doc.rect(0,PH-3,PW,3,'F');doc.setTextColor(130,140,160);doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.text(name+'  ·  '+group+'  ·  Cod: '+code+'  ·  Pag. '+p+'/'+pages,PW/2,PH-5,{align:'center'});}
  doc.save('IS_curva_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='Descargar Resultados PDF';btn.disabled=false;
}
