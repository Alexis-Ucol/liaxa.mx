<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amortization — Financial Mathematics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); overflow-x:auto; }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── AMORTIZATION TABLE ── */
.amort-table { width:100%; border-collapse:collapse; font-size:.83rem; margin:1rem 0; }
.amort-table th { background:var(--green); color:#fff; padding:.5rem .6rem; text-align:center; font-size:.75rem; letter-spacing:.05em; }
.amort-table td { padding:.45rem .6rem; text-align:right; border-bottom:1px solid var(--border); font-family:'IBM Plex Mono',monospace; }
.amort-table td:first-child { text-align:center; font-weight:600; color:var(--green-dark); }
.amort-table tr:last-child td { font-weight:700; background:var(--green-bg); }
.amort-table tr:hover td { background:var(--surface2); }

/* ── DRAG DROP ── */
.dd-zone { background:var(--surface2); border:2px dashed var(--border); border-radius:8px; padding:1rem; margin:1rem 0; }
.dd-chips { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:.75rem; }
.dd-chip { background:var(--green); color:#fff; border-radius:6px; padding:.3rem .75rem; font-family:'IBM Plex Mono',monospace; font-size:.82rem; cursor:grab; user-select:none; transition:opacity .15s, transform .1s; }
.dd-chip:active { cursor:grabbing; transform:scale(1.07); }
.dd-chip.used { opacity:.35; cursor:default; }
.dd-slots { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:.6rem; }
.dd-slot { border:2px dashed var(--border); border-radius:8px; padding:.55rem .75rem; min-height:44px; display:flex; align-items:center; justify-content:space-between; gap:.4rem; font-size:.82rem; transition:border-color .15s, background .15s; }
.dd-slot.drag-over { border-color:var(--green); background:var(--green-bg); }
.dd-slot.correct { border-color:var(--ok); background:var(--ok-bg); }
.dd-slot.wrong { border-color:var(--bad); background:var(--bad-bg); }
.dd-slot-label { font-size:.72rem; color:var(--text3); white-space:nowrap; }
.dd-slot-val { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--green-dark); font-weight:600; }
.dd-check-btn { background:var(--green); color:#fff; border:none; border-radius:7px; padding:.4rem 1rem; font-size:.82rem; cursor:pointer; margin-top:.75rem; }
.dd-reset-btn { background:none; border:1px solid var(--border); color:var(--text2); border-radius:7px; padding:.4rem .8rem; font-size:.82rem; cursor:pointer; margin-top:.75rem; margin-left:.5rem; }
.dd-feedback { font-size:.82rem; margin-top:.5rem; padding:.5rem .75rem; border-radius:7px; display:none; }
.dd-feedback.show { display:block; }

/* ── INTERACTIVE CALC ── */
.calc-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem; margin:1rem 0; }
.calc-row { display:flex; align-items:center; gap:.65rem; margin-bottom:.6rem; flex-wrap:wrap; }
.calc-lbl { font-size:.78rem; color:var(--text3); min-width:120px; }
.calc-inp { border:1.5px solid var(--border); border-radius:7px; padding:.38rem .65rem; font-family:'IBM Plex Mono',monospace; font-size:.9rem; width:110px; background:var(--surface2); color:var(--text); }
.calc-inp:focus { outline:none; border-color:var(--green); }
.calc-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.48rem 1.1rem; font-size:.85rem; font-weight:600; cursor:pointer; }
.calc-result { background:var(--green-bg); border-radius:8px; padding:.65rem .9rem; font-family:'IBM Plex Mono',monospace; font-size:.88rem; color:var(--green-dark); margin-top:.5rem; display:none; }
.calc-result.show { display:block; }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .dd-slots { grid-template-columns: 1fr; }
  .calc-lbl { min-width: 80px; }
  .amort-table { font-size: .75rem; }
}
</style>

/* ── SEEDED RNG ── */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function fmt(n, d) {
  d = (d === undefined) ? 2 : d;
  return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── ANSWER HANDLER ── */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

/* ── DRAG AND DROP LOGIC ── */
var ddDragging = null;

function ddDragStart(chip) {
  if (chip.classList.contains('used')) return false;
  ddDragging = chip;
  chip.style.opacity = '0.5';
}
function ddDragEnd(chip) { chip.style.opacity = chip.classList.contains('used') ? '0.35' : '1'; }
function ddDragOver(ev, slot) { ev.preventDefault(); slot.classList.add('drag-over'); }
function ddDragLeave(slot) { slot.classList.remove('drag-over'); }
function ddDrop(ev, slot) {
  ev.preventDefault();
  slot.classList.remove('drag-over');
  if (!ddDragging || ddDragging.classList.contains('used')) return;
  if (slot.dataset.filled === '1') return; // already filled
  var existingChip = slot.querySelector('.dd-chip');
  if (existingChip) {
    existingChip.classList.remove('used');
    existingChip.style.opacity = '1';
    slot.innerHTML = '<span class="dd-slot-label">' + slot.dataset.label + '</span>';
    slot.dataset.filled = '0';
  }
  ddDragging.classList.add('used');
  slot.dataset.filled = '1';
  slot.dataset.placed = ddDragging.dataset.val;
  slot.innerHTML = '<span class="dd-slot-label">' + slot.dataset.label + '</span><span class="dd-slot-val">' + ddDragging.textContent + '</span>';
  ddDragging = null;
  slot.classList.remove('correct','wrong');
}
// Touch / click fallback for drag-drop
function ddClickChip(chip, zoneId) {
  if (chip.classList.contains('used')) return;
  ddDragging = chip;
  var zone = document.getElementById(zoneId);
  var slots = zone.querySelectorAll('.dd-slot[data-filled="0"]');
  if (slots.length === 0) return;
  ddDrop({ preventDefault: function(){} }, slots[0]);
}

function ddCheck(zoneId, answers, feedbackId, chipsId) {
  var zone = document.getElementById(zoneId);
  var slots = zone.querySelectorAll('.dd-slot');
  var allFilled = true;
  var allCorrect = true;
  slots.forEach(function(slot, idx) {
    if (slot.dataset.filled !== '1') { allFilled = false; return; }
    var placed = slot.dataset.placed;
    var correct = String(answers[idx]);
    if (placed === correct) {
      slot.classList.add('correct'); slot.classList.remove('wrong');
    } else {
      slot.classList.add('wrong'); slot.classList.remove('correct');
      allCorrect = false;
    }
  });
  var fb = document.getElementById(feedbackId);
  fb.style.display = 'block';
  if (!allFilled) {
    fb.style.background = 'var(--gold-bg)'; fb.style.color = 'var(--gold)';
    fb.textContent = '⚠️ Please fill all slots before checking.';
  } else if (allCorrect) {
    fb.style.background = 'var(--ok-bg)'; fb.style.color = 'var(--ok)';
    fb.textContent = '✓ Perfect! All values are correctly placed.';
  } else {
    fb.style.background = 'var(--bad-bg)'; fb.style.color = 'var(--bad)';
    fb.textContent = '✗ Some values are wrong. Review the calculations and try again.';
  }
}
function ddReset(zoneId, feedbackId) {
  var zone = document.getElementById(zoneId);
  zone.querySelectorAll('.dd-slot').forEach(function(slot) {
    slot.classList.remove('correct','wrong');
    slot.dataset.filled = '0';

  zone.querySelectorAll('.dd-chip').forEach(function(chip) {

/* ── INTERACTIVE AMORT CALC ── */
function buildAmortCalc(containerId, prefix) {
  // Reads inputs, computes full table and shows it
  var P = parseFloat(document.getElementById(prefix + 'P').value);
  var rAnn = parseFloat(document.getElementById(prefix + 'r').value);
  var n = parseInt(document.getElementById(prefix + 'n').value);
  var freq = document.getElementById(prefix + 'freq').value;
  var res = document.getElementById(prefix + 'res');
  var tbl = document.getElementById(prefix + 'tbl');
  if (isNaN(P) || isNaN(rAnn) || isNaN(n) || P <= 0 || rAnn <= 0 || n <= 0) {
    res.style.display = 'block';
    res.innerHTML = '<span style="color:var(--bad)">⚠ Please enter valid positive numbers for all fields.</span>';
    tbl.innerHTML = '';
    return;
  }
  var periods, r;
  if (freq === 'monthly') { periods = n * 12; r = rAnn / 100 / 12; }
  else if (freq === 'quarterly') { periods = n * 4; r = rAnn / 100 / 4; }
  else { periods = n; r = rAnn / 100; }

  var pmt = P * r * Math.pow(1+r, periods) / (Math.pow(1+r, periods) - 1);
  var balance = P;
  var totalInterest = 0;
  res.style.display = 'block';
  res.innerHTML = '📊 Payment per period: <strong>$' + fmt(pmt) + '</strong>';

  var rows = '<table class="amort-table"><thead><tr>' +
    '<th>#</th><th>Payment</th><th>Interest</th><th>Principal</th><th>Balance</th>' +
    '</tr></thead><tbody>';
  for (var k = 1; k <= periods; k++) {
    var interest = balance * r;
    var principal = pmt - interest;
    balance -= principal;
    if (balance < 0.005) balance = 0;
    totalInterest += interest;
    rows += '<tr><td>' + k + '</td><td>$' + fmt(pmt) + '</td><td>$' + fmt(interest) +
      '</td><td>$' + fmt(principal) + '</td><td>$' + fmt(Math.max(0, balance)) + '</td></tr>';
  }
  rows += '<tr><td>Σ</td><td>$' + fmt(pmt * periods) + '</td><td>$' + fmt(totalInterest) +
    '</td><td>$' + fmt(P) + '</td><td>$0.00</td></tr>';
  rows += '</tbody></table>';
  tbl.innerHTML = rows;
}

    '<h2>Total Cost & Comparing Loans</h2>' +
    '<p>The total interest paid over the life of a loan is simply:</p>' +
    '<div class="callout"><strong>Total Interest = (PMT × n) − P</strong><p style="margin-top:.4rem">This tells you how much extra you pay beyond the principal — the "true cost" of borrowing.</p></div>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Shorter Term</div><div class="rform">Higher PMT, less total interest</div><div class="rnote">You pay it off faster — less time for interest to accumulate</div></div>' +
      '<div class="rcard"><div class="rname">Lower Rate</div><div class="rform">Lower PMT, less total interest</div><div class="rnote">Each period you owe less interest on the same balance</div></div>' +
      '<div class="rcard"><div class="rname">More Frequent</div><div class="rform">Semi-monthly vs monthly</div><div class="rnote">More periods per year slightly reduces total interest</div></div>' +
    '</div>' +
    '<div class="callout"><p><strong>Key insight for borrowers:</strong> Making even one extra payment per year can dramatically reduce total interest and shorten the loan term. This is why biweekly mortgage payments (26 half-payments ≈ 13 full payments/year) are popular.</p></div>';
  lb.appendChild(s4);

  /* ── FINAL ASSESSMENT HEADER ── */
  var finalHdr = document.createElement('div');
  finalHdr.className = 'section';
  finalHdr.innerHTML =
    '<div class="stag">Final Assessment</div>' +
    '<h2>Practice Problems</h2>' +
    '<p>Apply everything you have learned. Show your work in the drawing or typing area before selecting an answer.</p>';
  lb.appendChild(finalHdr);

  /* ── PROBLEM 4: Total Interest ── */
  var P5 = (Math.floor(rng() * 25) + 10) * 1000;
  var rAnn5 = (Math.floor(rng() * 7) + 5);
  var t5 = Math.floor(rng() * 4) + 3;
  var i5 = rAnn5 / 100 / 12;
  var n5 = t5 * 12;
  var pmt5 = P5 * i5 * Math.pow(1+i5, n5) / (Math.pow(1+i5, n5) - 1);
  var totalInt5 = Math.round((pmt5 * n5 - P5) * 100) / 100;
  var raw5 = [
    { txt: '$' + fmt(totalInt5), correct: true },
    { txt: '$' + fmt(Math.round(totalInt5 * 1.15 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(totalInt5 * 0.80 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(P5 * rAnn5/100 * t5 * 100)/100), correct: false }  // simple interest trap
  ];
  var sh5 = shuffle(raw5, rng);
  var ci5 = sh5.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Total Interest Paid',
    questionText: 'A loan of <strong>$' + fmt(P5,0) + '</strong> at <strong>' + rAnn5 + '% annual</strong> (monthly compounding) for <strong>' + t5 + ' years</strong>. What is the <strong>total interest</strong> paid over the entire loan term?',
    fn: 'Total Interest = PMT × n − P',
    options: sh5.map(function(x){ return x.txt; }),
    correctIdx: ci5,
    hint: 'Find PMT = $' + fmt(pmt5) + '. Total paid = PMT × n = PMT × ' + n5 + '. Subtract the original principal P = $' + fmt(P5,0) + '.',
    explanation: 'PMT = $' + fmt(pmt5) + '. Total paid = $' + fmt(pmt5) + ' × ' + n5 + ' = $' + fmt(pmt5 * n5) + '. Total interest = $' + fmt(pmt5*n5) + ' − $' + fmt(P5,0) + ' = <strong>$' + fmt(totalInt5) + '</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 5: Comparing two loans ── */
  var P6 = (Math.floor(rng() * 10) + 15) * 1000;
  var rA6 = (Math.floor(rng() * 3) + 7); // loan A: 7-9%
  var tA6 = 5;
  var rB6 = rA6 - 1; // loan B: 1% less but...
  var tB6 = 7;  // loan B: longer term
  var iA6 = rA6/100/12; var nA6 = tA6*12;
  var iB6 = rB6/100/12; var nB6 = tB6*12;
  var pmtA6 = P6 * iA6 * Math.pow(1+iA6,nA6) / (Math.pow(1+iA6,nA6)-1);
  var pmtB6 = P6 * iB6 * Math.pow(1+iB6,nB6) / (Math.pow(1+iB6,nB6)-1);
  var intA6 = pmtA6*nA6 - P6;
  var intB6 = pmtB6*nB6 - P6;
  var cheaperLoan, cheaperStr;
  if (intA6 < intB6) { cheaperLoan = 'Loan A (' + rA6 + '%, ' + tA6 + ' yrs)'; cheaperStr = 'A'; }
  else { cheaperLoan = 'Loan B (' + rB6 + '%, ' + tB6 + ' yrs)'; cheaperStr = 'B'; }
  var optsP5 = [
    { txt: cheaperStr === 'A' ? 'Loan A — lower total interest ($' + fmt(intA6) + ')' : 'Loan A — lower total interest ($' + fmt(intA6) + ')', correct: cheaperStr === 'A' },
    { txt: cheaperStr === 'B' ? 'Loan B — lower total interest ($' + fmt(intB6) + ')' : 'Loan B — lower total interest ($' + fmt(intB6) + ')', correct: cheaperStr === 'B' },
    { txt: 'Loan B — it has a lower annual rate', correct: false },
    { txt: 'Both loans have the same total interest', correct: false }
  ];
  // fix: ensure only one correct
  var rawOpts5 = optsP5.filter(function(o,idx){ return idx < 2 || !o.correct; });
  var shP5 = shuffle(rawOpts5.slice(0,4), rng);
  var ciP5 = shP5.findIndex(function(x){ return x.correct; });
  if (ciP5 < 0) { shP5[0].correct = false; shP5[0].txt = 'Loan A — lower total interest ($' + fmt(intA6) + ')'; shP5[1].txt = 'Loan B — lower total interest ($' + fmt(intB6) + ')'; shP5[1].correct = true; ciP5 = 1; }
  problems.push({
    title: 'Comparing Loan Costs',
    questionText: 'You need to borrow <strong>$' + fmt(P6,0) + '</strong>. You have two options:<br>' +
      '<strong>Loan A:</strong> ' + rA6 + '% annual, monthly, ' + tA6 + ' years (PMT = $' + fmt(pmtA6) + ')<br>' +
      '<strong>Loan B:</strong> ' + rB6 + '% annual, monthly, ' + tB6 + ' years (PMT = $' + fmt(pmtB6) + ')<br>' +
      'Which loan costs less in total interest?',
    fn: 'Total Interest = PMT × n − P',
    options: shP5.map(function(x){ return x.txt; }),
    correctIdx: ciP5,
    hint: 'Compute total interest for each: (PMT × n) − P. Loan A: $' + fmt(pmtA6) + ' × ' + nA6 + ' − $' + fmt(P6,0) + '. Loan B: $' + fmt(pmtB6) + ' × ' + nB6 + ' − $' + fmt(P6,0) + '. A lower rate does NOT always mean lower total cost!',
    explanation: 'Loan A total interest = $' + fmt(intA6) + '. Loan B total interest = $' + fmt(intB6) + '. <strong>' + cheaperLoan + ' is cheaper overall</strong>. A lower rate but longer term can cost more in total.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 6: Find n given PMT ── */
  var P7 = (Math.floor(rng() * 10) + 5) * 1000;
  var rAnn7 = (Math.floor(rng() * 5) + 7);
  var i7 = rAnn7 / 100 / 12;
  var n7true = (Math.floor(rng() * 3) + 3) * 12; // 36, 48, or 60
  var pmt7 = Math.round(P7 * i7 * Math.pow(1+i7, n7true) / (Math.pow(1+i7, n7true) - 1) * 100) / 100;
  // n = -ln(1 - P*i/PMT) / ln(1+i)
  var nCalc7 = -Math.log(1 - P7*i7/pmt7) / Math.log(1+i7);
  var nRound7 = Math.round(nCalc7);
  var raw7 = [
    { txt: nRound7 + ' months', correct: true },
    { txt: (nRound7 + 6) + ' months', correct: false },
    { txt: (nRound7 - 6) + ' months', correct: false },
    { txt: (nRound7 + 12) + ' months', correct: false }
  ];
  var sh7 = shuffle(raw7, rng);
  var ci7 = sh7.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Find the Loan Term',
    questionText: 'You borrow <strong>$' + fmt(P7,0) + '</strong> at <strong>' + rAnn7 + '% annual</strong> (monthly compounding) and can afford a payment of <strong>$' + fmt(pmt7) + '/month</strong>. How many months will it take to pay off the loan?',
    fn: 'n = <span class="mf-outer"><span class="mf-num">−ln(1 − P·i/PMT)</span><span class="mf-den">ln(1+i)</span></span>',
    options: sh7.map(function(x){ return x.txt; }),
    correctIdx: ci7,
    hint: 'Rearrange the PMT formula to solve for n. Use n = <span class="mf-outer"><span class="mf-num">−ln(1 − P·i/PMT)</span><span class="mf-den">ln(1+i)</span></span>, where i = ' + fmt(i7,6) + '.',
    explanation: 'i = ' + fmt(i7,6) + '. n = <span class="mf-outer"><span class="mf-num">−ln(1 − ' + fmt(P7,0) + '·' + fmt(i7,6) + '/' + fmt(pmt7) + ')</span><span class="mf-den">ln(1+' + fmt(i7,6) + ')</span></span> = <strong>' + nRound7 + ' months</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 7: Refinancing ── */
  var P8orig = (Math.floor(rng() * 15) + 10) * 1000;
  var r8orig = (Math.floor(rng() * 4) + 9);  // original rate 9-12%
  var t8orig = 5;
  var i8orig = r8orig/100/12;
  var n8orig = t8orig*12;
  var pmt8orig = P8orig * i8orig * Math.pow(1+i8orig,n8orig) / (Math.pow(1+i8orig,n8orig)-1);
  var k8 = 12; // after 1 year
  var bal8 = pmt8orig * (1 - Math.pow(1+i8orig,-(n8orig-k8))) / i8orig;
  var r8new = r8orig - 2; // new rate 2% lower
  var i8new = r8new/100/12;
  var n8rem = n8orig - k8;
  var pmt8new = bal8 * i8new * Math.pow(1+i8new,n8rem) / (Math.pow(1+i8new,n8rem)-1);
  var savings8 = Math.round((pmt8orig - pmt8new) * 100) / 100;
  var raw8 = [
    { txt: '$' + fmt(Math.round(pmt8new*100)/100) + '/month', correct: true },
    { txt: '$' + fmt(Math.round(pmt8new*1.08*100)/100) + '/month', correct: false },
    { txt: '$' + fmt(Math.round(pmt8orig*100)/100) + '/month (no change)', correct: false },
    { txt: '$' + fmt(Math.round(pmt8new*0.90*100)/100) + '/month', correct: false }
  ];
  var sh8 = shuffle(raw8, rng);
  var ci8 = sh8.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Refinancing',
    questionText: 'You took a <strong>$' + fmt(P8orig,0) + '</strong> loan at <strong>' + r8orig + '% annual</strong> for <strong>' + t8orig + ' years</strong> (monthly). After making <strong>12 payments</strong>, you refinance the outstanding balance at <strong>' + r8new + '% annual</strong> for the remaining term. What is your new monthly payment?',
    fn: 'Step 1: B<sub>k</sub> = PMT × <span class="mf-outer"><span class="mf-num">1 − (1+i)<sup>−(n−k)</sup></span><span class="mf-den">i</span></span> &nbsp; Step 2: Apply PMT formula with new rate &amp; remaining term.',
    options: sh8.map(function(x){ return x.txt; }),
    correctIdx: ci8,
    hint: 'Step 1: PMT at original terms = $' + fmt(pmt8orig) + '. Outstanding balance after 12 payments = $' + fmt(Math.round(bal8*100)/100) + '. Step 2: Use this as new P, with i = ' + r8new + '%/12 and n = ' + n8rem + ' months.',
    explanation: 'Balance after 12 pmts = $' + fmt(Math.round(bal8*100)/100) + '. New PMT = $' + fmt(Math.round(bal8*100)/100) + ' × <span class="mf-outer"><span class="mf-num">' + fmt(i8new,6) + ' × (1+' + fmt(i8new,6) + ')<sup>' + n8rem + '</sup></span><span class="mf-den">(1+' + fmt(i8new,6) + ')<sup>' + n8rem + '</sup> − 1</span></span> = <strong>$' + fmt(Math.round(pmt8new*100)/100) + '/month</strong>. Monthly savings: $' + fmt(savings8) + '.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

} // end buildLesson

  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correct of '+total+' questions', PW/2, 131, {align:'center'});

  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('PROBLEM SUMMARY', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('PROBLEM SUMMARY (continued)', M+4, sy+6);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problem '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correct':'Incorrect', PW-M-24, sy+6.5);
    sy += 12;
  });

  // Per-problem pages
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;

    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Financial Mathematics  ·  Amortization', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problem '+(i+1)+' of '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('QUESTION', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Student: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correct: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solution: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('STUDENT WORK', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  // Footer
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Code: '+code+'  ·  Page '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('Amortization_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Download Results PDF';
  btn.disabled  = false;
}
</script>
</body>
</html>
