<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álgebra: Áreas y Volúmenes de Cuerpos Geométricos — Matemáticas · 3° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the SCHOOL CONFIG
   object at the top of <script> below. These :root values are only a
   fallback for the instant before applyBranding() runs.
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #1a4a8a;   /* PRIMARY      */
  --green-dark: #0f2d5a;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #e8edf5;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --liquid:     #5b9bd5;
  --grain:      #c9a84c;
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
  --liquid:     #4a86c0;
  --grain:      #b89a52;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); text-align:left; }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); flex-wrap:wrap; }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; color:var(--text2); }
.callout p + p { margin-top:.5rem; }

/* ── FIGURE CARD (SVG illustrations) ── */
.figcard { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin:1rem 0; text-align:center; }
.figcap { font-size:.76rem; color:var(--text3); margin-top:.5rem; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); cursor:pointer; transition:transform .12s, border-color .12s; user-select:none; }
.rcard:hover { transform:translateY(-2px); }
.rcard.matched { border-top-color:var(--ok); opacity:.55; cursor:default; pointer-events:none; }
.rcard.wrong { border-top-color:var(--bad); animation: shakeR .3s; }
.rcard.selshape { border-top-color:var(--gold); box-shadow:0 0 0 2px var(--gold); }
@keyframes shakeR { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }
.matchfb { min-height:1.3rem; font-size:.82rem; color:var(--text2); margin-top:.4rem; text-align:center; }

/* ── GRAPH / EXPLORER CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (shape toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── FILL VISUALIZER (interactive inverse-solve widget) ── */
.vzwrap { background:var(--surface2); border-radius:8px; padding:1rem; margin-bottom:.9rem; text-align:center; }
.vzinput-row { display:flex; align-items:center; justify-content:center; gap:.6rem; margin-bottom:.9rem; flex-wrap:wrap; }
.vzinput { width:110px; padding:.55rem .7rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-size:1rem; font-family:'IBM Plex Mono',monospace; text-align:center; }
.vzinput:focus { outline:none; border-color:var(--green); }
.vzunit { font-size:.82rem; color:var(--text3); }
.vzbtn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.1rem; font-size:.86rem; font-weight:600; cursor:pointer; }
.vzbtn:hover { background:var(--green-dark); }
.vzbtn:disabled { opacity:.5; cursor:default; }
.vzsvg { margin:0 auto; display:block; }
.vzfb { min-height:1.4rem; font-size:.86rem; margin-top:.6rem; padding:.55rem .8rem; border-radius:8px; display:none; }
.vzfb.show { display:block; }
.vzfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.vzfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── TWO-STEP PROBLEM (represent algebraically, then substitute) ── */
.step-block { margin-bottom:1.1rem; }
.step-label { font-family:'IBM Plex Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--gold); text-transform:uppercase; margin-bottom:.5rem; font-weight:600; }
.step-block.locked { opacity:.4; pointer-events:none; position:relative; }
.step-lockmsg { font-size:.78rem; color:var(--text3); font-style:italic; margin-bottom:.5rem; }

/* ── INTERACTION BOX (fracciones-style) ── */
.ibox { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem 1rem; margin:1rem 0; }
.ibox-fb { display:none; font-size:.85rem; margin-top:.7rem; padding:.6rem .85rem; border-radius:8px; }
.ibox-fb.show { display:block; }
.ibox-fb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.ibox-fb.fbbad { background:var(--bad-bg); color:var(--bad); }
.ibox-actions { display:flex; align-items:center; justify-content:center; gap:.7rem; margin-top:.7rem; flex-wrap:wrap; }
.ibox-live { text-align:center; font-family:'IBM Plex Mono',monospace; font-size:.86rem; color:var(--text2); margin:.5rem 0 .2rem; }
.ibox-live strong { color:var(--green); }

/* figure + formula panel */
.fig-panel { display:grid; grid-template-columns:1fr 1fr; gap:1rem; align-items:start; margin:1rem 0; }
@media(max-width:520px){ .fig-panel { grid-template-columns:1fr; } }
.fig-panel .figcard { margin:0; }
.formula-col { display:flex; flex-direction:column; gap:.55rem; }
.fml { background:var(--surface2); border-left:3px solid var(--green); border-radius:0 8px 8px 0; padding:.6rem .85rem; font-family:'IBM Plex Mono',monospace; font-size:.88rem; color:var(--green-dark); font-weight:600; }
.fml-lbl { font-size:.64rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:.2rem; font-family:'IBM Plex Sans',sans-serif; font-weight:600; }

/* gauge with target mark */
.gauge { position:relative; height:20px; background:var(--surface2); border-radius:99px; margin:.7rem .2rem .1rem; }
.gauge-fill { height:100%; background:var(--gold); border-radius:99px; width:0%; transition:width .35s cubic-bezier(.2,.8,.3,1); max-width:100%; }
.gauge-fill.hit { background:var(--ok); }
.gauge-mark { position:absolute; top:-4px; bottom:-4px; width:3px; background:var(--green-dark); border-radius:2px; }
.gauge-marklbl { position:absolute; top:-1.15rem; transform:translateX(-50%); font-size:.64rem; color:var(--text3); font-family:'IBM Plex Mono',monospace; white-space:nowrap; }

/* formula chips */
.chips { display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; margin:.6rem 0 .2rem; }
.chip { font-family:'IBM Plex Mono',monospace; font-size:.95rem; background:var(--surface2); border:1.5px solid var(--border); color:var(--text); border-radius:10px; padding:.5rem .85rem; cursor:pointer; transition:all .15s; user-select:none; }
.chip:hover { border-color:var(--green); transform:translateY(-2px); }
.chip.on { background:var(--green-bg); border-color:var(--green); color:var(--green-dark); box-shadow:0 0 0 2px var(--green-bg); }
.chip.chipok { background:var(--ok-bg); border-color:var(--ok); color:var(--ok); pointer-events:none; }
.chip.chipoff { opacity:.3; pointer-events:none; }
.chip.chipbad { border-color:var(--bad); color:var(--bad); animation:shakeR .35s; }
.fx-line { display:none; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:1.05rem; font-weight:600; color:var(--green-dark); background:var(--green-bg); border-radius:10px; padding:.65rem; margin-top:.7rem; }
.fx-line.show { display:block; animation:xdrop .55s ease; }

/* pour game */
.pourbtn { background:var(--gold); color:#fff; border:none; border-radius:10px; padding:.6rem 1.2rem; font-size:.92rem; font-weight:600; cursor:pointer; transition:transform .12s, opacity .2s; }
.pourbtn:hover { transform:translateY(-2px); }
.pourbtn:disabled { opacity:.45; cursor:default; transform:none; }
.mg-reset { background:none; border:none; color:var(--text3); font-size:.78rem; cursor:pointer; text-decoration:underline; }
.pour-count { display:flex; justify-content:center; gap:.45rem; margin-top:.55rem; }
.pour-dot { width:14px; height:14px; border-radius:50%; background:var(--surface2); border:1.5px solid var(--border); transition:all .25s; }
.pour-dot.full { background:var(--gold); border-color:var(--gold); transform:scale(1.15); }

/* substitution reveal */
.xchip { display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:.85rem; font-weight:600; background:var(--gold-bg); color:var(--gold); border:1.5px solid var(--gold); border-radius:99px; padding:.22rem .8rem; margin:.1rem 0 .45rem; animation:xdrop .6s ease; }
.subflash { animation:subpulse .9s ease; border-radius:12px; }
@keyframes subpulse { 0% { box-shadow:0 0 0 4px var(--gold); } 100% { box-shadow:0 0 0 0 rgba(0,0,0,0); } }
@keyframes xdrop { 0% { transform:translateY(-10px); opacity:0; } 100% { transform:none; opacity:1; } }

/* confetti + toast */
.cf { position:fixed; top:-14px; width:9px; height:13px; z-index:98; pointer-events:none; border-radius:2px; animation:cfall linear forwards; }
@keyframes cfall { to { transform:translateY(105vh) rotate(680deg); opacity:.85; } }
.toastb { position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(18px); background:var(--green); color:#fff; padding:.7rem 1.35rem; border-radius:99px; box-shadow:var(--shadow); opacity:0; transition:opacity .35s, transform .35s; z-index:99; font-size:.9rem; font-weight:600; pointer-events:none; max-width:92vw; text-align:center; }
.toastb.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}
</style>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitle-el">Álgebra: Áreas y Volúmenes de Cuerpos Geométricos</div>
    <div class="wcourse" id="wcourse-el">Matemáticas · 3° Secundaria</div>
    <label class="flabel" id="lbl-name-el" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="p. ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong>📂 <span id="restoreTitle">Sesión guardada encontrada</span></strong><br>
      <span id="restoreMsg">¿Deseas continuar donde te quedaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Reanudar sesión</button>
        <button class="rbtn rbtn-no" id="dismissBtn" onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.5rem">
      <svg width="196" height="48" viewBox="0 0 140 34" xmlns="http://www.w3.org/2000/svg" class="liaxa-wf">
        <style>
          .liaxa-wf .lw-line { stroke:var(--green); stroke-width:2; fill:none; }
          .liaxa-wf .lw-acc  { fill:var(--gold); }
          .liaxa-wf .lw-bar  { stroke:var(--gold); stroke-width:2; }
          .liaxa-wf .lw-txt  { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" class="lw-line"/>
        <circle cx="22" cy="10" r="2.5" class="lw-acc"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lw-bar"/>
        <text x="42" y="22" class="lw-txt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle" id="htitle-el">Álgebra: Áreas y Volúmenes de Cuerpos Geométricos</div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg" class="liaxa-hdr">
        <style>
          .liaxa-hdr .lh-line { stroke:var(--green); stroke-width:2; fill:none; }
          .liaxa-hdr .lh-acc  { fill:var(--gold); }
          .liaxa-hdr .lh-bar  { stroke:var(--gold); stroke-width:2; }
          .liaxa-hdr .lh-txt  { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" class="lh-line"/>
        <circle cx="22" cy="10" r="2.5" class="lh-acc"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lh-bar"/>
        <text x="42" y="22" class="lh-txt">LIAXA</text>
      </svg>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>

  <!-- RESULTS SECTION (always in DOM, revealed by showResults) -->
  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="sbtn dlbtn" id="dlBtn" onclick="generatePDF()" style="max-width:280px;margin:0 auto;">⬇ &nbsp;<span id="dlBtnTxt">Descargar Resultados PDF</span></button>
    </div>
  </div>
</div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

function applyThemeColors(theme) {

  }
}

var studentData   = {};
var problems      = [];
var answeredCount = 0;
var correctCount  = 0;

/* ================================================
   SESSION PERSISTENCE  (localStorage)
   ================================================ */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return 'mat3_algebra_areas__' + (n + '__' + g).replace(/\s+/g, '_');
}

function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    values: problems.map(function(p) { return p.studentValue !== undefined ? p.studentValue : null; }),
    step1Choices: problems.map(function(p) { return p.step1Choice !== undefined ? p.step1Choice : null; }),
    step2Choices: problems.map(function(p) { return p.step2Choice !== undefined ? p.step2Choice : null; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'mat3_algebra_areas__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  var att = currentAttempt(name, group);
  buildLesson(seededRng(name + group + att));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined && problems[idx] && problems[idx].type !== 'visualizer' && problems[idx].type !== 'twostep') confirmMC(idx, choice);
  });
  if (saved.values) {
    saved.values.forEach(function(val, idx) {
      if (val !== null && val !== undefined && problems[idx] && problems[idx].type === 'visualizer') confirmVisualizer(idx, val);
    });
  }
  if (saved.step1Choices) {
    saved.step1Choices.forEach(function(c1, idx) {
      if (c1 !== null && c1 !== undefined && problems[idx] && problems[idx].type === 'twostep') {
        var c2 = saved.step2Choices ? saved.step2Choices[idx] : null;
        confirmTwoStep(idx, c1, c2);
      }
    });
  }
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

function dismissRestore() {
  document.getElementById('restoreBar').style.display = 'none';
}

function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  if (!name || !group) { document.getElementById('restoreBar').style.display = 'none'; return; }
  var saved = loadSession(name, group);
  var bar = document.getElementById('restoreBar');
  bar.style.display = (saved && saved.choices && saved.choices.some(function(c){ return c !== null; })) ? 'block' : 'none';
}

/* ================================================
   ATTEMPT COUNTER
   ================================================ */
function getAttemptKey(name, group) {
  return 'mat3_algebra_areas__att__' + (name + '__' + group).replace(/\s+/g, '_');
}
function nextAttempt(name, group) {
  var k = getAttemptKey(name, group);
  var n = 0;
  try { n = parseInt(localStorage.getItem(k) || '0', 10) || 0; } catch(e) {}
  n++;
  try { localStorage.setItem(k, String(n)); } catch(e) {}
  return n;
}
function currentAttempt(name, group) {
  var k = getAttemptKey(name, group);
  try { return parseInt(localStorage.getItem(k) || '1', 10) || 1; } catch(e) { return 1; }
}

var THEME_KEY = 'mat3_algebra_areas__theme';
function toggleTheme() {

  applyThemeColors(next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';

  r.setProperty('--green',      isDark ? SCHOOL.darkPrimary     : SCHOOL.primary);
  r.setProperty('--green-dark', isDark ? SCHOOL.darkPrimaryDark : SCHOOL.primaryDark);
  r.setProperty('--green-bg',   isDark ? SCHOOL.darkPrimaryBg   : SCHOOL.primaryBg);
  r.setProperty('--gold',       isDark ? SCHOOL.darkAccent      : SCHOOL.accent);
  r.setProperty('--gold-bg',    isDark ? SCHOOL.darkAccentBg    : SCHOOL.accentBg);
}
(function() {
  document.documentElement.setAttribute('data-theme', 'light');

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var tt = s ^ (s >>> 16);
    tt = Math.imul(tt, 0x21f0aaad);
    tt ^= (tt >>> 15);
    tt = Math.imul(tt, 0x735a2d97);
    return ((tt ^ (tt >>> 15)) >>> 0) / 4294967296;
  };
}
function rint(rng, min, max) { return Math.floor(rng() * (max - min + 1)) + min; }
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}
function shuffle4(correct, distractors, rng) {
  var set = [correct];
  distractors.forEach(function(d) { if (set.indexOf(d) === -1 && d !== correct) set.push(d); });
  var guard = 0;
  while (set.length < 4 && guard < 20) {
    guard++;
    var bump = correct + (set.length * 3 + rint(rng, 1, 4));
    if (set.indexOf(bump) === -1 && bump > 0) set.push(bump);
  }
  set = set.slice(0, 4);
  for (var i = set.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var tmp = set[i]; set[i] = set[j]; set[j] = tmp; }
  return { opts: set.map(function(v){ return String(v); }), correctIdx: set.indexOf(correct) };
}
function shuffleFloat4(correct, distractors, rng) {
  var set = [correct];
  distractors.forEach(function(d) { if (set.indexOf(d) === -1 && d !== correct) set.push(d); });
  var guard = 0;
  while (set.length < 4 && guard < 20) {
    guard++;
    var bump = Math.round((correct + (set.length * 3 + rint(rng, 1, 4))) * 10) / 10;
    if (set.indexOf(bump) === -1 && bump > 0) set.push(bump);
  }
  set = set.slice(0, 4);
  for (var i = set.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var tmp = set[i]; set[i] = set[j]; set[j] = tmp; }
  return { opts: set.map(function(v){ return String(v); }), correctIdx: set.indexOf(correct) };
}
function shuffleStrings(correct, distractors, rng) {
  var arr = [correct].concat(distractors);
  for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp; }
  return { options: arr, correctIdx: arr.indexOf(correct) };
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#0f2d5a';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — two-tap confirmation
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + (prob.explanation[LANG] || prob.explanation);
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + (prob.explanation[LANG] || prob.explanation);
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   FILL VISUALIZER — interactive inverse-solve widget
   Student types a missing dimension (height); the container fills to show
   whether it overflows (too high), leaves an empty gap (too low), or is
   exactly right.
   ================================================ */
function fillVisualizationSVG(kind, ratio, r) {
  // kind: 'cylinder' | 'prism'.  ratio = studentHeight / targetHeight (1 = exact).
  var W = 220, H = 200, topY = 20, botY = 180, contH = botY - topY;
  var clamped = Math.max(0, Math.min(ratio, 1.35));
  var fillTopY = botY - clamped * contH;
  if (clamped > 1) fillTopY = topY; // container visually full, overflow drawn above
  var overflow = ratio > 1.05;
  var underfill = ratio < 0.95 && ratio >= 0;
  var cx = W / 2;
  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="210" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">';

  if (kind === 'cylinder') {
    var rx = 70, ry = 16;
    // liquid fill (clip to container ellipse-rect shape approx)
    svg += '<clipPath id="clipTank"><rect x="' + (cx-rx) + '" y="' + topY + '" width="' + (rx*2) + '" height="' + contH + '" rx="4"/></clipPath>';
    svg += '<g clip-path="url(#clipTank)">';
    svg += '<rect x="' + (cx-rx) + '" y="' + fillTopY + '" width="' + (rx*2) + '" height="' + (botY-fillTopY) + '" fill="var(--liquid)" opacity="0.75"/>';
    svg += '</g>';
    // container outline
    svg += '<rect x="' + (cx-rx) + '" y="' + topY + '" width="' + (rx*2) + '" height="' + contH + '" fill="none" stroke="var(--green)" stroke-width="2" rx="4"/>';
    svg += '<ellipse cx="' + cx + '" cy="' + topY + '" rx="' + rx + '" ry="' + ry + '" fill="var(--surface)" stroke="var(--green)" stroke-width="2"/>';
  } else {
    var bw = 130;
    svg += '<clipPath id="clipBox"><rect x="' + (cx-bw/2) + '" y="' + topY + '" width="' + bw + '" height="' + contH + '"/></clipPath>';
    svg += '<g clip-path="url(#clipBox)">';
    svg += '<rect x="' + (cx-bw/2) + '" y="' + fillTopY + '" width="' + bw + '" height="' + (botY-fillTopY) + '" fill="var(--grain)" opacity="0.55"/>';
    svg += '</g>';
    svg += '<rect x="' + (cx-bw/2) + '" y="' + topY + '" width="' + bw + '" height="' + contH + '" fill="none" stroke="var(--green)" stroke-width="2"/>';
  }

  // target line (dashed) at the correct fill level
  svg += '<line x1="' + (cx-90) + '" y1="' + botY + '" x2="' + (cx+90) + '" y2="' + botY + '" stroke="var(--text3)" stroke-width="1" stroke-dasharray="4,3"/>';

  if (overflow) {
    svg += '<text x="' + cx + '" y="12" font-size="20" text-anchor="middle">💧💧💧</text>';
  } else if (underfill && ratio >= 0) {
    svg += '<text x="' + cx + '" y="' + (topY + 20) + '" font-size="26" fill="var(--bad)" text-anchor="middle" font-weight="bold">✗</text>';
  } else if (ratio >= 0) {
    svg += '<text x="' + cx + '" y="' + (topY + 20) + '" font-size="20" fill="var(--ok)" text-anchor="middle">✓</text>';
  }
  svg += '</svg>';
  return svg;
}

      '<div class="hintbox" id="hint'+i+'">' + (prob.hint||'') + '</div>' +
    '</div>';
  document.getElementById('lessonBody').appendChild(card);
}

function checkVisualizer(i) {
  var prob = problems[i];
  if (prob.studentValue !== null) return;
  var input = document.getElementById('vzin' + i);
  var val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) {
    var fbErr = document.getElementById('vzfb' + i);
    fbErr.textContent = LANG === 'es' ? 'Escribe un número mayor que cero.' : 'Enter a number greater than zero.';
    fbErr.className = 'vzfb show fbbad';
    return;
  }
  prob.studentValue = val;
  var ratio = val / prob.correctValue;
  var isOk = Math.abs(ratio - 1) < 0.06;
  document.getElementById('vzsvg' + i).innerHTML = fillVisualizationSVG(prob.vzKind, ratio, prob.r);
  input.disabled = true;
  document.getElementById('vzbtn' + i).disabled = true;
  var fb = document.getElementById('vzfb' + i);
  var msg;
  if (isOk) {
    msg = '<strong>' + t('fb-correct') + '</strong> ' + (prob.explanation[LANG] || prob.explanation);
  } else if (ratio < 1) {
    msg = '<strong>' + (LANG === 'es' ? '✗ Muy bajo — queda espacio vacío.' : '✗ Too low — empty space remains.') + '</strong> ' + (prob.explanation[LANG] || prob.explanation);
  } else {
    msg = '<strong>' + (LANG === 'es' ? '✗ Muy alto — se derrama.' : '✗ Too high — it overflows.') + '</strong> ' + (prob.explanation[LANG] || prob.explanation);
  }
  fb.innerHTML = msg;
  fb.className = 'vzfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + i).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

function confirmVisualizer(i, val) {
  var prob = problems[i];
  if (!prob || prob.studentValue !== null) return;
  var input = document.getElementById('vzin' + i);
  if (input) input.value = val;
  checkVisualizer(i);
}

/* ================================================
   TWO-STEP PROBLEM — Step 1: represent algebraically.
   Step 2: substitute the given value. Both steps grade together as
   ONE problem card; overall correct only if both steps are correct.
   ================================================ */
function pushTwoStepProblem(prob) {
  prob.type = 'twostep';
  prob.step1Choice = null; prob.step1Pending = null;
  prob.step2Choice = null; prob.step2Pending = null;
  problems.push(prob);
  buildTwoStepCard(prob, problems.length - 1);
}

function buildTwoStepCard(prob, i) {
  var opts1 = prob.step1.options.map(function(opt, oi) {
    return '<div class="mcopt" onclick="handleStep1(' + i + ',' + oi + ')">' + opt + '</div>';
  }).join('');
  var opts2 = prob.step2.options.map(function(opt, oi) {
    return '<div class="mcopt" onclick="handleStep2(' + i + ',' + oi + ')">' + opt + '</div>';
  }).join('');
  var card = document.createElement('div');
  card.className = 'pcrd section';
  card.id = 'pc' + i;
  card.innerHTML =
    '<div class="phdr"><div class="pnum">' + (i+1) + '</div>' +
    '<div class="ptitle">' + prob.title + '</div></div>' +
    '<div class="pbody">' +
      '<div class="pstmt">' + prob.setupText + '</div>' +
      (prob.figHtml ? '<div id="pfig' + i + '">' + prob.figHtml + '</div>' : '') +
      '<div class="step-block" id="step1_' + i + '">' +
        '<div class="step-label">' + (LANG==='es' ? 'PASO 1 · REPRESENTA ALGEBRAICAMENTE' : 'STEP 1 · REPRESENT ALGEBRAICALLY') + '</div>' +
        '<div class="pstmt">' + prob.step1.question + '</div>' +
        '<div class="mcopts">' + opts1 + '</div>' +
        '<div class="mcfb" id="fb' + i + '_1"></div>' +
      '</div>' +
      '<div class="step-block locked" id="step2_' + i + '">' +
        '<div class="step-lockmsg">' + (LANG==='es' ? '🔒 Completa el Paso 1 primero.' : '🔒 Complete Step 1 first.') + '</div>' +
        '<div class="step-label">' + (LANG==='es' ? 'PASO 2 · CALCULA EL VALOR' : 'STEP 2 · CALCULATE THE VALUE') + '</div>' +
        '<div class="pstmt">' + prob.step2.question + '</div>' +
        '<div class="mcopts">' + opts2 + '</div>' +
        '<div class="mcfb" id="fb' + i + '_2"></div>' +
      '</div>' +
    '</div>';
  document.getElementById('lessonBody').appendChild(card);
}

function handleStep1(i, chosenIdx) {
  var prob = problems[i];
  if (prob.step1Choice !== null) return;
  var opts = document.querySelectorAll('#step1_' + i + ' .mcopt');
  if (prob.step1Pending === chosenIdx) {
    prob.step1Choice = chosenIdx;
    prob.step1Pending = null;
    var isOk = (chosenIdx === prob.step1.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, oi) {
      if (oi === prob.step1.correctIdx) o.classList.add('rc');
      if (oi === chosenIdx && isOk)  o.classList.add('sc');
      if (oi === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + i + '_1');
    fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + (prob.step1.explanation[LANG] || prob.step1.explanation);
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    // unlock step 2, and reveal the numeric figure now that x's value is stated
    var s2 = document.getElementById('step2_' + i);
    s2.classList.remove('locked');
    var lockMsg = s2.querySelector('.step-lockmsg');
    if (lockMsg) lockMsg.style.display = 'none';
    if (prob.figHtmlRevealed) {
      var fig = document.getElementById('pfig' + i);
      if (fig) {
        fig.innerHTML = (prob.xReveal ? '<div style="text-align:center"><span class="xchip">' + prob.xReveal + '</span></div>' : '') + prob.figHtmlRevealed;
        fig.classList.remove('subflash');
        void fig.offsetWidth;
        fig.classList.add('subflash');
      }
    }
    saveSession();
    return;
  }
  prob.step1Pending = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function handleStep2(i, chosenIdx) {
  var prob = problems[i];
  if (prob.step1Choice === null) return; // locked
  if (prob.step2Choice !== null) return;
  var opts = document.querySelectorAll('#step2_' + i + ' .mcopt');
  if (prob.step2Pending === chosenIdx) {
    prob.step2Choice = chosenIdx;
    prob.step2Pending = null;
    var isOk = (chosenIdx === prob.step2.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, oi) {
      if (oi === prob.step2.correctIdx) o.classList.add('rc');
      if (oi === chosenIdx && isOk)  o.classList.add('sc');
      if (oi === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + i + '_2');
    fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + (prob.step2.explanation[LANG] || prob.step2.explanation);
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    // finalize whole problem: correct only if BOTH steps correct
    var bothOk = (prob.step1Choice === prob.step1.correctIdx) && isOk;
    document.getElementById('pc' + i).classList.add(bothOk ? 'ok' : 'bad');
    if (bothOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.step2Pending = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmTwoStep(i, c1, c2) {
  var prob = problems[i];
  if (!prob || prob.step1Choice !== null) return;
  // replay step 1
  var opts1 = document.querySelectorAll('#step1_' + i + ' .mcopt');
  prob.step1Choice = c1;
  var isOk1 = (c1 === prob.step1.correctIdx);
  opts1.forEach(function(o) { o.classList.add('dis'); });
  opts1.forEach(function(o, oi) {
    if (oi === prob.step1.correctIdx) o.classList.add('rc');
    if (oi === c1 && isOk1)  o.classList.add('sc');
    if (oi === c1 && !isOk1) o.classList.add('sw');
  });
  var fb1 = document.getElementById('fb' + i + '_1');
  fb1.innerHTML = '<strong>' + (isOk1 ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + (prob.step1.explanation[LANG] || prob.step1.explanation);
  fb1.className = 'mcfb show ' + (isOk1 ? 'fbok' : 'fbbad');
  var s2 = document.getElementById('step2_' + i);
  s2.classList.remove('locked');
  var lockMsg = s2.querySelector('.step-lockmsg');
  if (lockMsg) lockMsg.style.display = 'none';
  if (prob.figHtmlRevealed) {
    var fig = document.getElementById('pfig' + i);
    if (fig) fig.innerHTML = (prob.xReveal ? '<div style="text-align:center"><span class="xchip">' + prob.xReveal + '</span></div>' : '') + prob.figHtmlRevealed;
  }
  if (c2 === null || c2 === undefined) return;
  // replay step 2
  var opts2 = document.querySelectorAll('#step2_' + i + ' .mcopt');
  prob.step2Choice = c2;
  var isOk2 = (c2 === prob.step2.correctIdx);
  opts2.forEach(function(o) { o.classList.add('dis'); });
  opts2.forEach(function(o, oi) {
    if (oi === prob.step2.correctIdx) o.classList.add('rc');
    if (oi === c2 && isOk2)  o.classList.add('sc');
    if (oi === c2 && !isOk2) o.classList.add('sw');
  });
  var fb2 = document.getElementById('fb' + i + '_2');
  fb2.innerHTML = '<strong>' + (isOk2 ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + (prob.step2.explanation[LANG] || prob.step2.explanation);
  fb2.className = 'mcfb show ' + (isOk2 ? 'fbok' : 'fbbad');
  var bothOk = isOk1 && isOk2;
  document.getElementById('pc' + i).classList.add(bothOk ? 'ok' : 'bad');
  if (bothOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
}

/* ================================================
   SVG FIGURE GENERATORS — one per solid, labeled, theme-aware
   ================================================ */
function prismSVG(l, w, h, lLabel, wLabel, hLabel) {
  lLabel = (lLabel !== undefined) ? lLabel : l;
  wLabel = (wLabel !== undefined) ? wLabel : w;
  hLabel = (hLabel !== undefined) ? hLabel : h;
  var unit = Math.min(16, 150 / Math.max(l, 1));
  var L = Math.max(l * unit, 18), W = Math.max(w * unit * 0.6, 14), H = Math.max(h * unit, 18);
  var x0 = 40, y0 = 105 - H;
  var p0 = x0 + ',' + y0, p1 = (x0 + L) + ',' + y0, p2 = (x0 + L) + ',' + (y0 + H), p3 = x0 + ',' + (y0 + H);
  var p4 = (x0 + W) + ',' + (y0 - W * 0.55), p5 = (x0 + L + W) + ',' + (y0 - W * 0.55),
      p6 = (x0 + L + W) + ',' + (y0 + H - W * 0.55), p7 = (x0 + W) + ',' + (y0 + H - W * 0.55);
  return '<svg viewBox="0 0 280 140" width="100%" height="150" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">' +
    '<polygon points="' + p0 + ' ' + p1 + ' ' + p5 + ' ' + p4 + '" fill="var(--gold-bg)" stroke="var(--green)" stroke-width="1.6"/>' +
    '<polygon points="' + p1 + ' ' + p2 + ' ' + p6 + ' ' + p5 + '" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1.6"/>' +
    '<polygon points="' + p0 + ' ' + p1 + ' ' + p2 + ' ' + p3 + '" fill="var(--surface)" stroke="var(--green)" stroke-width="1.8"/>' +
    '<text x="' + (x0 + L / 2) + '" y="' + (y0 + H + 16) + '" font-size="11" fill="var(--text2)" text-anchor="middle">l = ' + lLabel + '</text>' +
    '<text x="' + (x0 - 14) + '" y="' + (y0 + H / 2) + '" font-size="11" fill="var(--text2)" text-anchor="middle">h = ' + hLabel + '</text>' +
    '<text x="' + (x0 + L + W / 2 + 6) + '" y="' + (y0 - W * 0.55 - 4) + '" font-size="11" fill="var(--text2)" text-anchor="middle">w = ' + wLabel + '</text>' +
    '</svg>';
}
function cylinderSVG(r, h, rLabel, hLabel) {
  rLabel = (rLabel !== undefined) ? rLabel : r;
  hLabel = (hLabel !== undefined) ? hLabel : h;
  var unit = Math.min(14, 90 / Math.max(r, 1));
  var R = Math.max(r * unit, 16), H = Math.max(h * 8, 24);
  var cx = 90, topY = 70 - H / 2, botY = 70 + H / 2;
  var ry = R * 0.32;
  return '<svg viewBox="0 0 220 140" width="100%" height="150" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">' +
    '<ellipse cx="' + cx + '" cy="' + botY + '" rx="' + R + '" ry="' + ry + '" fill="var(--surface)" stroke="var(--green)" stroke-width="1.6"/>' +
    '<line x1="' + (cx - R) + '" y1="' + topY + '" x2="' + (cx - R) + '" y2="' + botY + '" stroke="var(--green)" stroke-width="1.6"/>' +
    '<line x1="' + (cx + R) + '" y1="' + topY + '" x2="' + (cx + R) + '" y2="' + botY + '" stroke="var(--green)" stroke-width="1.6"/>' +
    '<ellipse cx="' + cx + '" cy="' + topY + '" rx="' + R + '" ry="' + ry + '" fill="var(--gold-bg)" stroke="var(--green)" stroke-width="1.8"/>' +
    '<text x="' + (cx + R / 2) + '" y="' + (topY - 4) + '" font-size="10" fill="var(--text2)" text-anchor="middle">r = ' + rLabel + '</text>' +
    '<text x="' + (cx + R + 14) + '" y="70" font-size="11" fill="var(--text2)" text-anchor="middle">h = ' + hLabel + '</text>' +
    '</svg>';
}
function pyramidSVG(s, h, sLabel, hLabel) {
  sLabel = (sLabel !== undefined) ? sLabel : s;
  hLabel = (hLabel !== undefined) ? hLabel : h;
  var unit = Math.min(12, 80 / Math.max(s, 1));
  var S = Math.max(s * unit, 22), H = Math.max(h * 7, 26);
  var cx = 110, baseY = 100, apexY = baseY - H;
  var skew = S * 0.45;
  var bl = cx - S / 2, br = cx + S / 2;
  return '<svg viewBox="0 0 220 140" width="100%" height="150" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">' +
    '<polygon points="' + (bl - skew) + ',' + (baseY - skew * 0.4) + ' ' + (br - skew) + ',' + (baseY - skew * 0.4) + ' ' + br + ',' + baseY + ' ' + bl + ',' + baseY + '" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1.6"/>' +
    '<line x1="' + bl + '" y1="' + baseY + '" x2="' + cx + '" y2="' + apexY + '" stroke="var(--green)" stroke-width="1.8"/>' +

}
function coneSVG(r, h, rLabel, hLabel) {

    '<ellipse cx="' + cx + '" cy="' + baseY + '" rx="' + R + '" ry="' + ry + '" fill="var(--surface)" stroke="var(--green)" stroke-width="1.6"/>' +

    '<line x1="' + (cx + R) + '" y1="' + baseY + '" x2="' + cx + '" y2="' + apexY + '" stroke="var(--green)" stroke-width="1.8"/>' +

}
function sphereSVG(r, rLabel) {
  rLabel = (rLabel !== undefined) ? rLabel : r;

/* ── Tank SVG: a cylinder holding a fixed liquid order. If the container is
   too small the order overflows; too big and space is left over. ── */
function tankSVG(r, h, targetK) {
  // targetK and r*r*h are in the same "r²h" units, so ratio is exact.
  var k = r * r * h;
  var unit = Math.min(14, 90 / Math.max(r, 1));
  var R = Math.max(r * unit, 16), H = Math.max(h * 10, 24);
  var cx = 110, topY = 78 - H / 2, botY = 78 + H / 2, ry = R * 0.32;
  var over = k < targetK;
  var ratio = over ? 1 : (targetK / k);
  var liqTop = botY - ratio * H;
  var svg = '<svg viewBox="0 0 220 156" width="100%" height="160" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">';
  // liquid body
  svg += '<path d="M ' + (cx - R) + ' ' + liqTop + ' L ' + (cx - R) + ' ' + botY +
         ' A ' + R + ' ' + ry + ' 0 0 0 ' + (cx + R) + ' ' + botY +
         ' L ' + (cx + R) + ' ' + liqTop + ' Z" fill="var(--liquid)" opacity="0.7"/>';
  // liquid surface
  svg += '<ellipse cx="' + cx + '" cy="' + liqTop + '" rx="' + R + '" ry="' + ry + '" fill="var(--liquid)" opacity="0.9"/>';
  // container
  svg += '<ellipse cx="' + cx + '" cy="' + botY + '" rx="' + R + '" ry="' + ry + '" fill="none" stroke="var(--green)" stroke-width="1.6"/>';
  svg += '<line x1="' + (cx - R) + '" y1="' + topY + '" x2="' + (cx - R) + '" y2="' + botY + '" stroke="var(--green)" stroke-width="1.8"/>';
  svg += '<line x1="' + (cx + R) + '" y1="' + topY + '" x2="' + (cx + R) + '" y2="' + botY + '" stroke="var(--green)" stroke-width="1.8"/>';
  svg += '<ellipse cx="' + cx + '" cy="' + topY + '" rx="' + R + '" ry="' + ry + '" fill="var(--surface)" fill-opacity="0.25" stroke="var(--green)" stroke-width="1.8"/>';
  if (over) svg += '<text x="' + cx + '" y="' + (topY - 8) + '" font-size="16" text-anchor="middle">💧💧💧</text>';
  svg += '<text x="' + (cx + R + 16) + '" y="80" font-size="11" fill="var(--text2)" text-anchor="middle">h = ' + h + '</text>';
  svg += '<text x="' + (cx + R / 2) + '" y="' + (topY - (over ? 24 : 6)) + '" font-size="10" fill="var(--text2)" text-anchor="middle">r = ' + r + '</text>';
  return svg + '</svg>';
}
function updateTankGame() {

      : '🎉 <strong>Order delivered!</strong> 3.14 × ' + MG.tr + '² × ' + MG.th + ' = ' + MG.tankVol + ' cubic units, not a drop more. Fun fact: there is <em>another</em> r and h combination that also works. Can you find it in your head?';

/* ── Prism cube-builder SVG: prism drawn with unit-cube grid lines ── */
function prismGridSVG(l, w, h) {
  var unit = Math.min(16, 150 / Math.max(l, 1));
  var L = Math.max(l * unit, 18), W = Math.max(w * unit * 0.6, 14), H = Math.max(h * unit, 18);
  var uL = L / l, uH = H / h, uW = W / w;
  var x0 = 40, y0 = 105 - H;
  var p0 = x0 + ',' + y0, p1 = (x0 + L) + ',' + y0, p2 = (x0 + L) + ',' + (y0 + H), p3 = x0 + ',' + (y0 + H);
  var p4 = (x0 + W) + ',' + (y0 - W * 0.55), p5 = (x0 + L + W) + ',' + (y0 - W * 0.55);
  var p6 = (x0 + L + W) + ',' + (y0 + H - W * 0.55);
  var svg = '<svg viewBox="0 0 280 140" width="100%" height="150" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">';
  svg += '<polygon points="' + p0 + ' ' + p1 + ' ' + p5 + ' ' + p4 + '" fill="var(--gold-bg)" stroke="var(--green)" stroke-width="1.6"/>';
  svg += '<polygon points="' + p1 + ' ' + p2 + ' ' + p6 + ' ' + p5 + '" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1.6"/>';
  svg += '<polygon points="' + p0 + ' ' + p1 + ' ' + p2 + ' ' + p3 + '" fill="var(--surface)" stroke="var(--green)" stroke-width="1.8"/>';
  var i;
  for (i = 1; i < l; i++) { // vertical grid on front face + oblique on top
    svg += '<line x1="' + (x0 + i * uL) + '" y1="' + y0 + '" x2="' + (x0 + i * uL) + '" y2="' + (y0 + H) + '" stroke="var(--green)" stroke-width="0.7" opacity="0.5"/>';
    svg += '<line x1="' + (x0 + i * uL) + '" y1="' + y0 + '" x2="' + (x0 + i * uL + W) + '" y2="' + (y0 - W * 0.55) + '" stroke="var(--green)" stroke-width="0.7" opacity="0.5"/>';
  }
  for (i = 1; i < h; i++) { // horizontal grid on front + side faces
    svg += '<line x1="' + x0 + '" y1="' + (y0 + i * uH) + '" x2="' + (x0 + L) + '" y2="' + (y0 + i * uH) + '" stroke="var(--green)" stroke-width="0.7" opacity="0.5"/>';
    svg += '<line x1="' + (x0 + L) + '" y1="' + (y0 + i * uH) + '" x2="' + (x0 + L + W) + '" y2="' + (y0 + i * uH - W * 0.55) + '" stroke="var(--green)" stroke-width="0.7" opacity="0.5"/>';
  }
  for (i = 1; i < w; i++) { // depth grid on top + side faces
    svg += '<line x1="' + (x0 + i * uW) + '" y1="' + (y0 - i * uW * 0.55) + '" x2="' + (x0 + L + i * uW) + '" y2="' + (y0 - i * uW * 0.55) + '" stroke="var(--green)" stroke-width="0.7" opacity="0.5"/>';
    svg += '<line x1="' + (x0 + L + i * uW) + '" y1="' + (y0 - i * uW * 0.55) + '" x2="' + (x0 + L + i * uW) + '" y2="' + (y0 + H - i * uW * 0.55) + '" stroke="var(--green)" stroke-width="0.7" opacity="0.5"/>';
  }
  svg += '<text x="' + (x0 + L / 2) + '" y="' + (y0 + H + 16) + '" font-size="11" fill="var(--text2)" text-anchor="middle">l = ' + l + '</text>';
  svg += '<text x="' + (x0 - 14) + '" y="' + (y0 + H / 2) + '" font-size="11" fill="var(--text2)" text-anchor="middle">h = ' + h + '</text>';
  svg += '<text x="' + (x0 + L + W / 2 + 6) + '" y="' + (y0 - W * 0.55 - 4) + '" font-size="11" fill="var(--text2)" text-anchor="middle">w = ' + w + '</text>';
  return svg + '</svg>';
}

function updateSphereGuess() {

function checkSphereGuess() {
  if (MG.sphWon) return;
  var es = (LANG === 'es');
  var fb = document.getElementById('mgs_fb');
  var g = MG.sphGuess;
  if (Math.abs(g - 52) <= 4) {
    MG.sphWon = true;
    document.getElementById('mg_sph').classList.add('won');
    fb.innerHTML = es
      ? '🎉 <strong>¡Gran ojo!</strong> La esfera ocupa ≈ <strong>52.4%</strong> del cubo. La cuenta: V(esfera) ÷ V(cubo) = (4/3 π r³) ÷ (2r)³ = π/6 ≈ 0.524. Casi la mitad del cubo es aire.'
      : '🎉 <strong>Great eye!</strong> The sphere fills ≈ <strong>52.4%</strong> of the cube. The math: V(sphere) ÷ V(cube) = (4/3 π r³) ÷ (2r)³ = π/6 ≈ 0.524. Almost half the cube is air.';
    fb.className = 'ibox-fb show fbok';
  } else if (g < 52) {
    fb.innerHTML = es ? '⬆ Más alto: la esfera ocupa más de ' + g + '%. Vuelve a intentar.' : '⬆ Go higher: the sphere fills more than ' + g + '%. Try again.';

  }
}

/* ================================================
   CONTENT GENERATORS (all numbers from rng)
   ================================================ */
function genPrismArea(rng) {
  var a = rint(rng, 1, 4), w = rint(rng, 2, 5), h = rint(rng, 2, 5), gx = rint(rng, 2, 6);
  var l = gx + a;
  var area = 2 * (l * w + l * h + w * h);
  var sh = shuffle4(area, [l * w + l * h + w * h, l * w * h, area - 2 * (w * h)], rng);
  return { a:a, w:w, h:h, gx:gx, l:l, area:area, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genPrismVolume(rng) {
  var a = rint(rng, 1, 4), w = rint(rng, 2, 6), h = rint(rng, 2, 6), gx = rint(rng, 2, 6);
  var l = gx + a;
  var vol = l * w * h;
  var sh = shuffle4(vol, [l * w, l * h, vol + w], rng);
  return { a:a, w:w, h:h, gx:gx, l:l, vol:vol, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genCylinderVolume(rng) {
  var h = rint(rng, 3, 7), gx = rint(rng, 2, 5);
  var vol = Math.round(3.14 * gx * gx * h * 10) / 10;
  var sh = shuffleFloat4(vol, [Math.round(3.14*gx*h*10)/10, Math.round(2*3.14*gx*h*10)/10, Math.round(3.14*gx*gx*10)/10], rng);
  return { h:h, gx:gx, vol:vol, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genCylinderArea(rng) {
  var h = rint(rng, 3, 6), gx = rint(rng, 2, 5);
  var area = Math.round(2 * 3.14 * gx * (gx + h) * 10) / 10;
  var sh = shuffleFloat4(area, [Math.round(3.14*gx*gx*10)/10, Math.round(2*3.14*gx*h*10)/10, Math.round(3.14*gx*h*10)/10], rng);
  return { h:h, gx:gx, area:area, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genPyramidVolume(rng) {
  var a = rint(rng, 1, 3), h = rint(rng, 3, 8), gx = rint(rng, 2, 5);
  var s = gx + a;
  var vol = Math.round((1/3) * s * s * h * 10) / 10;
  var sh = shuffleFloat4(vol, [s*s*h, Math.round((1/2)*s*s*h*10)/10, s*s], rng);
  return { a:a, h:h, gx:gx, s:s, vol:vol, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genConeVolume(rng) {
  var h = rint(rng, 3, 8), gx = rint(rng, 2, 5);
  var vol = Math.round((1/3) * 3.14 * gx * gx * h * 10) / 10;
  var sh = shuffleFloat4(vol, [Math.round(3.14*gx*gx*h*10)/10, Math.round((1/3)*3.14*gx*h*10)/10, Math.round(3.14*gx*h*10)/10], rng);
  return { h:h, gx:gx, vol:vol, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genSphereVolume(rng) {
  var gx = rint(rng, 2, 5);
  var vol = Math.round((4/3) * 3.14 * Math.pow(gx,3) * 10) / 10;
  var sh = shuffleFloat4(vol, [Math.round(4*3.14*gx*gx*10)/10, Math.round((4/3)*3.14*gx*gx*10)/10, Math.round((2/3)*3.14*Math.pow(gx,3)*10)/10], rng);
  return { gx:gx, vol:vol, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genSphereArea(rng) {
  var gx = rint(rng, 2, 6);
  var area = Math.round(4 * 3.14 * gx * gx * 10) / 10;
  var sh = shuffleFloat4(area, [Math.round(2*3.14*gx*gx*10)/10, Math.round(3.14*gx*gx*10)/10, Math.round((4/3)*3.14*gx*gx*10)/10], rng);
  return { gx:gx, area:area, opts: sh.opts, correctIdx: sh.correctIdx };
}
function genComposite(rng) {
  var b = rint(rng, 3, 5), c = rint(rng, 1, 3), hp = rint(rng, 2, 5), gx = rint(rng, 2, 6);
  var hPrism = gx + c;
  var volPrism = b * b * hPrism;
  var volPyr = Math.round((1/3) * b * b * hp * 10) / 10;
  var total = Math.round((volPrism + volPyr) * 10) / 10;
  var sh = shuffleFloat4(total, [volPrism, volPyr, Math.round((volPrism + volPyr*2)*10)/10], rng);
  return { b:b, c:c, hp:hp, gx:gx, hPrism:hPrism, volPrism:volPrism, volPyr:volPyr, total:total, opts: sh.opts, correctIdx: sh.correctIdx };
}

/* ── INVERSE-SOLVE GENERATORS (solve for one variable given the others) ── */
function genCylinderTub(rng) {
  var r = rint(rng, 2, 4);
  var hTarget = rint(rng, 3, 7);
  var vol = Math.round(3.14 * r * r * hTarget * 100) / 100;
  return { r: r, hTarget: hTarget, vol: vol };
}
function genPrismBox(rng) {
  var l = rint(rng, 3, 6), w = rint(rng, 3, 5);
  var hTarget = rint(rng, 3, 7);
  var vol = l * w * hTarget;
  return { l: l, w: w, hTarget: hTarget, vol: vol };
}
function genConeHeightInverse(rng) {
  var r = rint(rng, 2, 4);
  var hTarget = rint(rng, 3, 8);
  var vol = Math.round((1/3) * 3.14 * r * r * hTarget * 10) / 10;
  var sh = shuffleFloat4(hTarget, [hTarget*3, Math.round(hTarget/3*10)/10, hTarget+r], rng);
  return { r: r, hTarget: hTarget, vol: vol, opts: sh.opts, correctIdx: sh.correctIdx };
}

/* ── TWO-STEP GENERATORS (Step 1: represent algebraically; Step 2: substitute) ── */
function genCylinderTwoStep(rng) {
  var h = rint(rng, 3, 7), gx = rint(rng, 2, 5);
  var vol = Math.round(3.14 * gx * gx * h * 10) / 10;
  var exprSh = shuffleStrings(h + 'πx²',
    [h + 'πx', 'πx(x + ' + h + ')', 'πx² + ' + h], rng);
  var numSh = shuffleFloat4(vol, [Math.round(3.14*gx*h*10)/10, Math.round(2*3.14*gx*h*10)/10, Math.round(3.14*gx*gx*10)/10], rng);
  return { h:h, gx:gx, vol:vol, exprOpts:exprSh.options, exprCorrectIdx:exprSh.correctIdx, numOpts:numSh.opts, numCorrectIdx:numSh.correctIdx };
}
function genConeTwoStep(rng) {
  var h = rint(rng, 3, 8), gx = rint(rng, 2, 5);
  var vol = Math.round((1/3) * 3.14 * gx * gx * h * 10) / 10;
  var coneCoeff = (h % 3 === 0) ? (h/3) + '' : '⅓(' + h + ')';
  var exprSh = shuffleStrings(coneCoeff + 'πx²',
    [h + 'πx²', coneCoeff + 'πx', '½(' + h + ')πx²'], rng);
  var numSh = shuffleFloat4(vol, [Math.round(3.14*gx*gx*h*10)/10, Math.round((1/3)*3.14*gx*h*10)/10, Math.round(3.14*gx*h*10)/10], rng);
  return { h:h, gx:gx, vol:vol, exprOpts:exprSh.options, exprCorrectIdx:exprSh.correctIdx, numOpts:numSh.opts, numCorrectIdx:numSh.correctIdx };
}
function genPrismTwoStep(rng) {
  var l = rint(rng, 3, 6), w = rint(rng, 2, 5), gx = rint(rng, 2, 6);
  var vol = l * w * gx;
  var exprSh = shuffleStrings(l*w + 'x',
    [(l+w) + 'x', l*w + ' + x', l*w + 'x²'], rng);
  var numSh = shuffleFloat4(vol, [l*w, l+w+gx, l*w*gx + w], rng);
  return { l:l, w:w, gx:gx, vol:vol, exprOpts:exprSh.options, exprCorrectIdx:exprSh.correctIdx, numOpts:numSh.opts, numCorrectIdx:numSh.correctIdx };
}
function genPyramidTwoStep(rng) {
  var s = rint(rng, 3, 6), gx = rint(rng, 2, 6);
  var s2 = s * s;
  var vol = Math.round((1/3) * s2 * gx * 10) / 10;
  var exprSh = shuffleStrings('⅓' + s2 + 'x',
    [s2 + 'x', '⅓' + s + 'x', '⅓' + s2 + 'x²'], rng);
  var numSh = shuffleFloat4(vol, [s2*gx, Math.round((1/2)*s2*gx*10)/10, s2], rng);
  return { s:s, s2:s2, gx:gx, vol:vol, exprOpts:exprSh.options, exprCorrectIdx:exprSh.correctIdx, numOpts:numSh.opts, numCorrectIdx:numSh.correctIdx };
}
function genSphereVolTwoStep(rng) {
  var gx = rint(rng, 2, 5);
  var vol = Math.round((4/3) * 3.14 * Math.pow(gx,3) * 10) / 10;
  var exprSh = shuffleStrings('⁴⁄₃πx³',
    ['⁴⁄₃πx²', '4πx²', 'πx³'], rng);
  var numSh = shuffleFloat4(vol, [Math.round(4*3.14*gx*gx*10)/10, Math.round((4/3)*3.14*gx*gx*10)/10, Math.round((2/3)*3.14*Math.pow(gx,3)*10)/10], rng);
  return { gx:gx, vol:vol, exprOpts:exprSh.options, exprCorrectIdx:exprSh.correctIdx, numOpts:numSh.opts, numCorrectIdx:numSh.correctIdx };
}
function genSphereAreaTwoStep(rng) {
  var gx = rint(rng, 2, 6);
  var area = Math.round(4 * 3.14 * gx * gx * 10) / 10;
  var exprSh = shuffleStrings('4πx²',
    ['2πx²', 'πx²', '⁴⁄₃πx²'], rng);
  var numSh = shuffleFloat4(area, [Math.round(2*3.14*gx*gx*10)/10, Math.round(3.14*gx*gx*10)/10, Math.round((4/3)*3.14*gx*gx*10)/10], rng);
  return { gx:gx, area:area, exprOpts:exprSh.options, exprCorrectIdx:exprSh.correctIdx, numOpts:numSh.opts, numCorrectIdx:numSh.correctIdx };
}

/* ── 3D box fill SVG for Diseña la caja ── */
function boxFillSVG(rd, ratio) {
  // ratio: -1 = empty, 0..1 = fill fraction, >1 = overfull
  var W=260, H=180;
  // box geometry: isometric-ish projection
  var bw=110, bh=100, bd=40; // box front width, height, depth offset
  var x0=60, y0=H-30; // front bottom-left
  // vertices
  var fl = x0, fr = x0+bw, fb = y0, ft = y0-bh;
  var dl = x0+bd, dr = x0+bw+bd, dt = y0-bh-bd*0.5, db=y0-bd*0.5;
  var clamped = (ratio < 0) ? 0 : Math.min(ratio, 1.2);
  var fillH = Math.min(clamped, 1) * bh;
  var overflow = ratio > 1.05;
  // grain color
  var gc = "var(--grain)";
  var s = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="185" xmlns="http://www.w3.org/2000/svg">';
  // draw box back & side (behind grain)
  s += '<polygon points="'+fl+','+ft+' '+fr+','+ft+' '+dr+','+dt+' '+dl+','+dt+'" fill="var(--surface2)" stroke="var(--border)" stroke-width="1.2"/>'; // top
  s += '<polygon points="'+fr+','+ft+' '+fr+','+fb+' '+dr+','+db+' '+dr+','+dt+'" fill="var(--surface2)" stroke="var(--border)" stroke-width="1.2"/>'; // right side
  // grain fill (clipped to front face height)
  if (ratio > 0) {
    var gy = fb - fillH; // fill from bottom up
    if (!overflow) {
      // front face fill
      s += '<rect x="'+fl+'" y="'+gy+'" width="'+bw+'" height="'+fillH+'" fill="'+gc+'" opacity="0.7"/>';
      // side fill (trapezoid)
      var sideTop = gy-bd*0.5*(fillH/bh);
      s += '<polygon points="'+fr+','+gy+' '+dr+','+(gy-bd*0.5)+' '+dr+','+db+' '+fr+','+fb+'" fill="'+gc+'" opacity="0.5"/>';
    } else {
      // full box + overflow indicator
      s += '<rect x="'+fl+'" y="'+ft+'" width="'+bw+'" height="'+bh+'" fill="'+gc+'" opacity="0.7"/>';
      s += '<polygon points="'+fr+','+ft+' '+dr+','+dt+' '+dr+','+db+' '+fr+','+fb+'" fill="'+gc+'" opacity="0.5"/>';
      s += '<text x="'+(W/2)+'" y="22" font-size="15" text-anchor="middle">⚠️</text>';
    }
  }
  // box front outline (over grain)
  s += '<rect x="'+fl+'" y="'+ft+'" width="'+bw+'" height="'+bh+'" fill="none" stroke="var(--green)" stroke-width="2" rx="1"/>';
  s += '<polygon points="'+fl+','+ft+' '+fr+','+ft+' '+dr+','+dt+' '+dl+','+dt+'" fill="none" stroke="var(--green)" stroke-width="1.5"/>';
  s += '<polygon points="'+fr+','+ft+' '+fr+','+fb+' '+dr+','+db+' '+dr+','+dt+'" fill="none" stroke="var(--green)" stroke-width="1.5"/>';
  // checkmark or X
  if (ratio >= 0.94 && ratio <= 1.06) {
    s += '<text x="'+(fl+bw/2)+'" y="'+(ft-8)+'" font-size="18" text-anchor="middle" fill="var(--ok)">✓</text>';
  } else if (ratio > 1.06) {
    s += '<text x="'+(fl+bw/2)+'" y="'+(ft-8)+'" font-size="18" text-anchor="middle" fill="var(--bad)">✗</text>';
  } else if (ratio > 0 && ratio < 0.94) {
    s += '<text x="'+(fl+bw/2)+'" y="'+(ft+12)+'" font-size="18" text-anchor="middle" fill="var(--bad)">✗</text>';
  }
  return s + '</svg>';
}
