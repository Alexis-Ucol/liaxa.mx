<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heterocedasticidad — Econometría · UdeC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28; --border:#3a3830;
  --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#6aad5e; --green-dark:#8fd080; --green-bg:#1a281a;
  --gold:#e0bc6a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);}
#restoreBar strong{color:var(--gold);}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem;}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;}
.rbtn-yes{background:var(--green);color:#fff;} .rbtn-yes:hover{background:var(--green-dark);}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}
.callout-warn{background:var(--gold-bg);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout-warn strong{color:var(--gold);}
.callout-warn p{margin-bottom:0;}
.callout-bad{background:var(--bad-bg);border-left:4px solid var(--bad);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout-bad strong{color:var(--bad);}
.callout-bad p{margin-bottom:0;}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem;margin:1.1rem 0;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green);}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem;}
.rnote{font-size:.76rem;color:var(--text3);}
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15em;line-height:1.1;}
.mf-num{border-bottom:1.5px solid var(--text);padding:0 .2em .1em;font-size:.92em;text-align:center;}
.mf-den{padding:.1em .2em 0;font-size:.92em;text-align:center;}
/* PLOT */
.plot-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.2rem 0;}
@media(max-width:540px){.plot-grid{grid-template-columns:1fr;}}
.plot-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.plot-label{padding:.5rem .8rem;font-size:.73rem;font-weight:700;text-align:center;background:var(--surface2);border-bottom:1px solid var(--border);}
.plot-label.good{color:var(--ok);} .plot-label.bad{color:var(--bad);}
.plot-canvas{display:block;width:100%;height:170px;}
/* SIM */
.sim-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:1.3rem;margin:1.2rem 0;}
.sim-title{font-weight:700;font-size:.95rem;margin-bottom:.9rem;color:var(--green-dark);}
.sim-controls{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1rem;}
@media(max-width:480px){.sim-controls{grid-template-columns:1fr;}}
.sim-ctrl label{display:block;font-size:.73rem;color:var(--text3);margin-bottom:.25rem;}
.sim-ctrl input[type=range]{width:100%;accent-color:var(--green);}
.sim-val{font-weight:600;color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:.82rem;}
.sim-canvas{display:block;width:100%;height:240px;border-radius:8px;border:1px solid var(--border);}
.sim-result{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.85rem;background:var(--surface2);border:1px solid var(--border);}
/* DATA BUTTONS */
.dl-data-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.2rem;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .18s;margin:.35rem .25rem;}
.dl-data-btn:hover{background:var(--green-dark);}
.dl-data-btn.secondary{background:var(--gold);color:#fff;}
.dl-data-btn.secondary:hover{background:#5e7200;}
/* COLAB */
.colab-btn{display:inline-flex;align-items:center;gap:.6rem;padding:.75rem 1.4rem;background:#F9AB00;color:#1a1a16;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .18s;text-decoration:none;margin:.4rem .25rem;box-shadow:0 2px 8px rgba(249,171,0,.3);}
.colab-btn:hover{background:#e09900;}
.colab-steps{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.3rem;margin:1rem 0;}
.colab-steps-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.7rem;}
.colab-step{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.65rem;}
.colab-step:last-child{margin-bottom:0;}
.cs-num{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
.cs-txt{font-size:.84rem;color:var(--text2);padding-top:.15rem;}
.cs-txt strong{color:var(--text);}
.cs-code{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.2rem .6rem;font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--green-dark);margin-top:.3rem;}
/* BP TABLE */
.bp-table{width:100%;border-collapse:collapse;font-size:.84rem;margin:1rem 0;}
.bp-table th{background:var(--green);color:#fff;padding:.55rem .8rem;text-align:left;font-size:.77rem;}
.bp-table td{padding:.5rem .8rem;border-bottom:1px solid var(--border);}
.bp-table tr:nth-child(even) td{background:var(--surface2);}
.bp-table .sig{color:var(--bad);font-weight:700;}
.bp-table .nosig{color:var(--ok);}
/* SOL CARDS */
.sol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.85rem;margin:1rem 0;}
.sol-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1rem;}
.sol-icon{font-size:1.6rem;margin-bottom:.4rem;}
.sol-name{font-weight:700;font-size:.88rem;margin-bottom:.3rem;}
.sol-desc{font-size:.78rem;color:var(--text3);line-height:1.5;}
/* CONSEQUENCE STEPS */
.conseq-step{display:flex;gap:1rem;align-items:flex-start;padding:.85rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:.65rem;}
.conseq-num{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0;margin-top:.1rem;}
.conseq-body{flex:1;}
.conseq-title{font-weight:700;font-size:.88rem;margin-bottom:.2rem;}
.conseq-text{font-size:.82rem;color:var(--text2);line-height:1.55;}
/* PCRD */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);} .pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;} .wpanel.active{display:block;}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;} .mcfb.fbok{background:var(--ok-bg);color:var(--ok);} .mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center;}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);} .dlbtn:disabled{opacity:.6;cursor:wait;}
@media(max-width:600px){.wcard{padding:1.6rem 1.1rem;}.sim-controls{grid-template-columns:1fr;}.plot-grid{grid-template-columns:1fr;}.sol-grid{grid-template-columns:1fr 1fr;}.htitle{display:none;}.lbody{padding:1.2rem .7rem 3rem;}}
</style>
</head>

function downloadXLSX(b64, filename) {
  var bin=atob(b64), arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  var blob=new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function seededRng(seed){
  var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;
  return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};
}
function shuffleOpts(opts,correct,rng){
  var arr=opts.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return{opts:arr,correctIdx:arr.indexOf(correct)};
}

  ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0,tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){btn.addEventListener('click',function(){tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';if(btn.classList.contains('bpen'))ctx.lineWidth=2;if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}});});

  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

function handleMC(probIdx,chosenIdx){

    prob.studentChoice=chosenIdx;prob.pendingChoice=null;var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});

/* ── RESIDUAL PLOT — realistic with many points and proper noise ── */
function drawResidualPlot(canvasId, mode, n, spread) {
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width=canvas.offsetWidth, H=canvas.height=canvas.offsetHeight||220;
  ctx.clearRect(0,0,W,H);
  var bg=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#fff';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  var padL=40,padR=15,padT=18,padB=35,plotW=W-padL-padR,plotH=H-padT-padB;
  // grid lines
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'#ddd';
  ctx.lineWidth=0.5; ctx.setLineDash([]);
  for(var g=1;g<4;g++){var gy=padT+g*(plotH/4);ctx.beginPath();ctx.moveTo(padL,gy);ctx.lineTo(padL+plotW,gy);ctx.stroke();}
  // axes
  ctx.lineWidth=1.5;
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()||'#aaa';
  ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+plotH);ctx.lineTo(padL+plotW,padT+plotH);ctx.stroke();
  // zero line
  var yZero=padT+plotH/2;
  ctx.setLineDash([5,4]);ctx.lineWidth=1;
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--bad').trim()||'#c00';
  ctx.beginPath();ctx.moveTo(padL,yZero);ctx.lineTo(padL+plotW,yZero);ctx.stroke();
  ctx.setLineDash([]);
  // labels
  var t3=getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()||'#888';
  ctx.fillStyle=t3;ctx.font='10px IBM Plex Sans,sans-serif';ctx.textAlign='center';
  ctx.fillText('Ŷ (valores ajustados)',padL+plotW/2,H-6);
  ctx.save();ctx.translate(12,padT+plotH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Residuos (ε̂)',0,0);ctx.restore();
  // points — use seeded LCG for reproducibility, many points for realism
  var s=12345;
  function rr(){s=(s*1664525+1013904223)&0xffffffff;return((s>>>0)/4294967296)*2-1;}
  function rr2(){s=(s*69069+1)&0xffffffff;return((s>>>0)/4294967296)*2-1;}  // 2nd stream
  var clr=getComputedStyle(document.documentElement).getPropertyValue('--green').trim()||'#4a7c3f';
  for(var i=0;i<n;i++){
    var t=i/(n-1);
    var x=padL+4+t*(plotW-8);
    // add slight horizontal jitter so points don't align perfectly
    x+=rr2()*(plotW/n)*0.6;
    x=Math.max(padL+2,Math.min(padL+plotW-2,x));
    var baseNoise=rr();
    var vm;
    if(mode==='homo')    vm=1;
    else if(mode==='fanout')  vm=0.1+Math.pow(t,1.2)*3.2;
    else if(mode==='fanin')   vm=0.1+Math.pow(1-t,1.2)*3.2;
    else vm=(Math.floor(t*5)%2===0)?0.25:2.2;
    var ey=baseNoise*spread*vm*(plotH/2.8);
    // add a second noise layer for more realism
    ey+=rr()*spread*0.3*(plotH/6);
    var y=yZero-ey;y=Math.max(padT+2,Math.min(padT+plotH-2,y));
    ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle=clr;ctx.globalAlpha=0.6;ctx.fill();ctx.globalAlpha=1;
  }
}

/* ══════════════════════════════════════════════════════════════════
   BUILD LESSON
══════════════════════════════════════════════════════════════════ */
function buildLesson(rng){
  var lb=document.getElementById('lessonBody');lb.innerHTML='';problems=[];

  /* ── SEC 1: DEFINICIÓN ── */
  var s1=document.createElement('div');s1.className='section';
  s1.innerHTML=`
    <div class="stag">Sección 1 · Definición</div>
    <h2>¿Qué es la heterocedasticidad?</h2>
    <p>En MCO (Mínimos Cuadrados Ordinarios) existe un supuesto fundamental: la <strong>varianza del error es constante</strong> para todas las observaciones. Esto se llama <em>homoscedasticidad</em>.</p>
    <p>La <strong>heterocedasticidad</strong> ocurre cuando ese supuesto se viola — la varianza del error cambia según el nivel de alguna variable del modelo.</p>
    <div class="rules-grid">
      <div class="rcard"><div class="rname">Supuesto MCO cumplido</div><div class="rform">Var(εᵢ) = σ²</div><div class="rnote">La misma varianza σ² para toda observación i.</div></div>
      <div class="rcard"><div class="rname">Heterocedasticidad</div><div class="rform">Var(εᵢ) = σᵢ²</div><div class="rnote">Cada observación tiene su propia varianza. El subíndice i cambia.</div></div>
    </div>
    <div class="callout"><p><strong>📖 Ejemplo concreto:</strong> Usaremos dos datasets reales en esta guía. <strong>Dataset 1</strong>: horas de estudio → calificación (varianza constante). <strong>Dataset 2</strong>: ingreso mensual → gasto discrecional (varianza crece con el ingreso). Descárgalos ahora y ábrelos en Excel para verlos mientras avanzas.</p></div>
    <div style="margin:1.2rem 0">
      <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.7rem">📂 Descarga los datasets de práctica</div>
      <button class="dl-data-btn" onclick="downloadXLSX(DS_HOMO,'dataset1_homocedástico.xlsx')">⬇ Dataset 1 — Homoskedástico (Horas → Calificación)</button>
      <button class="dl-data-btn secondary" onclick="downloadXLSX(DS_HETERO,'dataset2_heterocedástico.xlsx')">⬇ Dataset 2 — Heteroskedástico (Ingreso → Gasto)</button>
      <p style="font-size:.78rem;color:var(--text3);margin-top:.5rem">Tip: en Excel, selecciona las dos columnas de cada dataset, inserta un gráfico de dispersión, y observa la forma de la nube de puntos.</p>
    </div>`;
  lb.appendChild(s1);

  // P1 — Dataset identification
  var opt1a='Dataset 1 (Horas → Calificación) — la varianza parece constante en toda la nube.';
  var opt1b='Dataset 2 (Ingreso → Gasto) — la dispersión de puntos se abre hacia la derecha.';
  var opt1c='Ambos datasets muestran heterocedasticidad.';
  var opt1d='Ninguno de los dos datasets tiene heterocedasticidad.';
  var s1r=shuffleOpts([opt1a,opt1b,opt1c,opt1d],opt1b,rng);
  problems.push({title:'Identificando heterocedasticidad en tus datos',questionText:'Abre ambos datasets en Excel e inserta una gráfica de dispersión en cada uno. ¿Cuál de las siguientes descripciones corresponde mejor a lo que observas?',fn:'Pista: en el gráfico de dispersión, el eje X es la variable independiente, el eje Y es la dependiente.',options:s1r.opts,correctIdx:s1r.correctIdx,explanation:'El Dataset 2 (Ingreso → Gasto) muestra una nube que se "abre" hacia la derecha — las familias con ingresos altos tienen mucha más variabilidad en su gasto discrecional que las de ingresos bajos. Eso es el patrón fan-out de la heterocedasticidad.',hint:'Observa si la nube de puntos tiene el mismo "ancho" de izquierda a derecha, o si se va ensanchando.',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ── SEC 2: CONSECUENCIAS ── */
  var s2=document.createElement('div');s2.className='section';
  s2.innerHTML=`
    <div class="stag">Sección 2 · Consecuencias</div>
    <h2>¿Qué le pasa a tu modelo cuando hay heterocedasticidad?</h2>
    <p>Hay una distinción crucial que muchos estudiantes no conocen. Aquí la explicamos paso a paso:</p>

    <div class="conseq-step">
      <div class="conseq-num">1</div>
      <div class="conseq-body">
        <div class="conseq-title">Los coeficientes β̂ siguen siendo correctos</div>
        <div class="conseq-text">MCO sigue estimando bien los coeficientes — son <em>insesgados y consistentes</em>. Si la verdadera relación es β₁ = 0.28, tu estimación β̂₁ seguirá siendo cercana a 0.28 aunque haya heterocedasticidad. <strong>Esto es lo que SÍ funciona.</strong></div>
      </div>
    </div>

    <div class="conseq-step">
      <div class="conseq-num">2</div>
      <div class="conseq-body">
        <div class="conseq-title">Los errores estándar quedan mal calculados</div>
        <div class="conseq-text">MCO calcula los errores estándar asumiendo que σ² es constante. Cuando la varianza cambia entre observaciones, esa fórmula da números incorrectos — generalmente <em>demasiado pequeños</em> (subestimados).</div>
      </div>
    </div>

    <div class="conseq-step">
      <div class="conseq-num">3</div>
      <div class="conseq-body">
        <div class="conseq-title">Las pruebas estadísticas se invalidan</div>
        <div class="conseq-text">El estadístico <strong>t</strong> se calcula dividiendo β̂ entre su error estándar. Si el error estándar está subestimado, el t queda inflado — más grande de lo que debería ser. Esto hace que variables aparezcan como <em>significativas cuando no lo son</em>.</div>
      </div>
    </div>

    <div class="conseq-step">
      <div class="conseq-num">4</div>
      <div class="conseq-body">
        <div class="conseq-title">Los intervalos de confianza y valores p ya no son fiables</div>
        <div class="conseq-text">Los intervalos de confianza se construyen a partir de los errores estándar. Si el error estándar está mal, el intervalo es demasiado estrecho — parece que tienes más precisión de la que realmente tienes. Los valores p quedan incorrectamente pequeños.</div>
      </div>
    </div>

    <div class="callout-warn"><p><strong>Ejemplo con Dataset 2:</strong> El modelo MCO estima β̂₁ = 0.2749 (efecto del ingreso sobre el gasto). El error estándar MCO es 0.0271 → t = 10.14. Con errores robustos correctos, el SE baja a 0.0205 → t = 13.43. Aquí el t robusto es <em>mayor</em> porque MCO subestimó la certeza. En otros casos puede ser al revés — el punto es que MCO no es confiable.</p></div>`;
  lb.appendChild(s2);

  // P2 — consequence with real numbers from dataset
  var seOLS=0.0271,seRob=0.0205,bval=0.2749;
  var tOLS=(bval/seOLS).toFixed(2),tRob=(bval/seRob).toFixed(2);
  var opt2a='Los coeficientes β̂ cambian y ya no son válidos.';
