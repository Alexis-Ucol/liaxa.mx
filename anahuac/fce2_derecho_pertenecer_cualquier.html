<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derecho a Pertenecer a Cualquier Grupo — FCE 2°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#1a3a6b;--green-dark:#0f2244;--green-bg:#e8edf5;--gold:#c9a84c;--gold-bg:#faf3e0;--bg:#f8f6f1;--surface:#ffffff;--surface2:#f0ede6;--border:#ddd8cc;--text:#1a1a16;--text2:#4a4640;--text3:#7a7468;--ok:#2d6a4f;--ok-bg:rgba(45,106,79,.10);--bad:#8b2500;--bad-bg:rgba(139,37,0,.08);--shadow:0 4px 20px rgba(0,0,0,.09);}
[data-theme="dark"]{--bg:#18181a;--surface:#242420;--surface2:#2e2e28;--border:#3a3830;--text:#e8e4da;--text2:#b0aa9e;--text3:#7a7468;--shadow:0 4px 20px rgba(0,0,0,.35);--green:#4a7abf;--green-dark:#7aaae0;--green-bg:#0e1e38;--gold:#d4b86a;--gold-bg:#241e0e;--ok:#4a9a6f;--ok-bg:rgba(74,154,111,.12);--bad:#c05030;--bad-bg:rgba(192,80,48,.10);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold);}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.55rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
#restoreBar{display:none;background:var(--green-bg);border:1.5px solid var(--green);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);}
#restoreBar strong{color:var(--green-dark);}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem;}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;}
.rbtn-yes{background:var(--green);color:#fff;}.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}.callout p{margin-bottom:0;}
.gcrd{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem;margin:.9rem 0;}
.id-tile{padding:.4rem .85rem;border-radius:20px;border:1.5px solid var(--border);font-size:.82rem;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;display:inline-block;margin:.2rem;}
.id-tile.selected{background:var(--green);color:#fff;border-color:var(--green);}
.arg-chip{padding:.3rem .7rem;border-radius:16px;border:1.5px solid var(--gold);background:var(--gold-bg);font-size:.78rem;cursor:pointer;color:var(--text);transition:all .15s;display:inline-block;margin:.2rem;}
.arg-chip.used{opacity:.35;pointer-events:none;}
.arg-box{min-height:80px;border:2px dashed var(--border);border-radius:8px;padding:.7rem;background:var(--surface2);font-size:.82rem;color:var(--text2);}
.arg-box.has-content{border-color:var(--green);background:var(--green-bg);color:var(--text);}
.check-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.45rem 1.1rem;font-size:.82rem;font-weight:600;cursor:pointer;margin-top:.7rem;}
.widget-feedback{font-size:.82rem;margin-top:.5rem;padding:.5rem .8rem;border-radius:8px;display:none;}
.widget-feedback.show{display:block;}.widget-feedback.ok{background:var(--ok-bg);color:var(--ok);}.widget-feedback.bad{background:var(--bad-bg);color:var(--bad);}
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15em;line-height:1.1;}
.mf-num{border-bottom:1.5px solid var(--text);padding:0 .2em .1em;font-size:.92em;text-align:center;}
.mf-den{padding:.1em .2em 0;font-size:.92em;text-align:center;}
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;}
.dlbtn:hover{background:var(--green-dark);}.dlbtn:disabled{opacity:.6;cursor:wait;}
.lang-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.lang-btn{padding:.28rem .7rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;transition:all .15s;}
.lang-btn.active{background:var(--green);color:#fff;}
[data-theme="dark"] .lang-btn.active{background:var(--green-dark);}
@media(max-width:600px){.wcard{padding:1.6rem 1.1rem;}.wtitle{font-size:1.25rem;}.htitle{display:none;}.lbody{padding:1.2rem .7rem 3rem;}.section h2{font-size:1.3rem;}.pbody{padding:.75rem;}.pstmt{font-size:.84rem;}.mcopt{font-size:.83rem;padding:.58rem .7rem;}.callout{padding:.8rem .9rem;}}
</style>
</head>
<body>
<div id="welcomeScreen"><div class="wcard">
  <div class="wlogos"><img id="logo-left" src="" alt="Institución" style="display:none"></div>
  <div class="wtitle" id="wTitle">Derecho a Pertenecer a Cualquier Grupo</div>
  <div class="wcourse" id="wCourse">Formación Cívica y Ética · 2° Secundaria</div>
  <label class="flabel" for="sName" id="lbl-name-el">Nombre completo</label>
  <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
  <label class="flabel" for="sGroup" id="lbl-group-el">Grupo</label>
  <input class="finput" id="sGroup" type="text" placeholder="ej. 2A" autocomplete="off" oninput="checkForSavedSession()">
  <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
  <div class="serr" id="startErr"></div>
  <div id="restoreBar"><strong id="restoreMsg">📂 Sesión guardada</strong><br>¿Continuar donde la dejaste?
    <div class="rbar-btns"><button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Retomar</button><button class="rbtn rbtn-no" id="dismissBtn" onclick="dismissRestore()">Nueva sesión</button></div>
  </div>
  <div class="wfoot" style="display:flex;justify-content:center;padding-top:.9rem">
    <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
      <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px;}.lbl{stroke:var(--gold);stroke-width:2.5;}.lba{fill:var(--gold);}</style>
      <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
      <circle cx="36" cy="14" r="4.5" class="lba"/><line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
      <text x="64" y="38" class="lbt">LIAXA</text>
    </svg>
  </div>
</div></div>
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos"><img id="hlogo-left" src="" alt="Institución" style="display:none"><img id="hlogo-right" src="" alt="Institución" style="display:none"></div>
    <div class="hsep"></div><div class="htitle" id="hTitle">Derecho a Pertenecer</div><div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>.lht{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px;}.lhl{stroke:var(--gold);stroke-width:2;}.lha{fill:var(--gold);}</style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/><line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="pdfBtn" onclick="generatePDF()">⬇ &nbsp;Descargar Resultados PDF</button>
    </div>
  </div>
</div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

  ];
  
  // SECTION 1
  var s1=document.createElement("div");s1.className="section";
  s1.innerHTML=L==="es"
    ?'<div class="stag">Concepto 1</div><h2>El derecho a pertenecer: fundamento en los derechos humanos</h2><p>En la adolescencia construimos nuestra identidad al relacionarnos con grupos que comparten nuestra cultura, ideolog\u00EDa, intereses o formas de vida. Este proceso no es opcional: es un <strong>derecho humano reconocido internacionalmente</strong>.</p><p>Los Derechos del Ni\u00F1o (ONU, 1989) y la Constituci\u00F3n Pol\u00EDtica de M\u00E9xico reconocen el derecho a asociarse libremente con grupos culturales, sociales, econ\u00F3micos, ideol\u00F3gicos, sexuales o de g\u00E9nero, sin importar si la mayor\u00EDa lo aprueba.</p><div class="callout"><p><strong>Principio clave:</strong> El derecho a pertenecer no depende de la aprobaci\u00F3n de los dem\u00E1s. Solo se limita cuando se da\u00F1an los derechos de otras personas.</p></div>'
    :'<div class="stag">Concept 1</div><h2>The right to belong: grounded in human rights</h2><p>In adolescence we build our identity by relating to groups that share our culture, ideology, interests, or ways of life. This is not optional: it is an <strong>internationally recognized human right</strong>.</p><p>The Rights of the Child (UN, 1989) and Mexico\'s Constitution recognize the right to freely associate with cultural, social, economic, ideological, sexual, or gender groups, regardless of majority approval.</p><div class="callout"><p><strong>Key principle:</strong> The right to belong does not depend on others\' approval. It is only limited when the rights of others are harmed.</p></div>';

  problems.push({title:L==="es"?"Grupos ideol\u00F3gicos":"Ideological groups",questionText:p1q,options:sh1.opts,correctIdx:sh1.correctIdx,hint:L==="es"?"\u00BFQu\u00E9 derecho protege asociarse a grupos ideol\u00F3gicos?":"What right protects joining ideological groups?",explanation:L==="es"?"La libertad de pensamiento y asociaci\u00F3n protege el derecho a participar en grupos ideol\u00F3gicos. No requiere aprobaci\u00F3n de los padres cuando no implica da\u00F1o a otros.":"Freedom of thought and association protects the right to participate in ideological groups. It does not require parental approval when no harm to others is involved.",studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);
  
  // SECTION 2 — Argumentar
  var s2=document.createElement("div");s2.className="section";
  s2.innerHTML=L==="es"
    ?'<div class="stag">Concepto 2</div><h2>Argumentar: defender un derecho con razones</h2><p>Argumentar no es solo opinar. Es ofrecer <strong>razones v\u00E1lidas y fundamentadas</strong> para defender una postura. Un buen argumento sobre el derecho a pertenecer incluye: (1) el derecho violado, (2) el grupo afectado, (3) la evidencia del da\u00F1o, y (4) el fundamento legal.</p><p>Los derechos humanos son <strong>universales, inalienables e indivisibles</strong>. No pueden eliminarse por decreto, opini\u00F3n p\u00FAblica ni tradici\u00F3n.</p><div class="callout"><p><strong>Estructura de argumento:</strong> Tesis &rarr; Raz\u00F3n &rarr; Fundamento legal &rarr; Conclusi\u00F3n</p></div>'
    :'<div class="stag">Concept 2</div><h2>Arguing: defending a right with reasons</h2><p>Arguing is not just giving opinions. It means offering <strong>valid, well-founded reasons</strong> to defend a position. A good argument about the right to belong includes: (1) the right being violated, (2) the affected group, (3) evidence of harm, and (4) the legal basis.</p><p>Human rights are <strong>universal, inalienable, and indivisible</strong>. They cannot be eliminated by decree, public opinion, or tradition.</p><div class="callout"><p><strong>Argument structure:</strong> Thesis &rarr; Reason &rarr; Legal basis &rarr; Conclusion</p></div>';

  w2.innerHTML=(L==="es"
    ?'<div class="stag">&#x1F5E3;&#xFE0F; Constructor de Argumento</div><h2 style="font-size:1.05rem">Construye el argumento en orden</h2><p style="color:var(--text2);font-size:.85rem;margin-bottom:.3rem">Un estudiante quiere formar un club LGBTQ+ en su escuela. Selecciona las partes del argumento en orden: <strong>Tesis &rarr; Raz\u00F3n &rarr; Fundamento &rarr; Conclusi\u00F3n</strong>.</p><p style="color:var(--text3);font-size:.78rem;margin-bottom:.6rem">'+dblTipEs+'</p>'
    :'<div class="stag">&#x1F5E3;&#xFE0F; Argument Builder</div><h2 style="font-size:1.05rem">Build the argument in order</h2><p style="color:var(--text2);font-size:.85rem;margin-bottom:.3rem">A student wants to form an LGBTQ+ club at their school. Select the argument parts in order: <strong>Thesis &rarr; Reason &rarr; Foundation &rarr; Conclusion</strong>.</p><p style="color:var(--text3);font-size:.78rem;margin-bottom:.6rem">'+dblTipEn+'</p>')

  var p3scenarios=[
    {es:{ctx:"El director quiere prohibir el club de debate pol\u00EDtico. Un estudiante responde: \'Los clubes pol\u00EDticos son peligrosos porque generan conflictos. Por eso este debe cerrarse.\'",q:"\u00BFQu\u00E9 le falta a este argumento para ser s\u00F3lido?",c:"Le falta un fundamento legal: no cita ning\u00FAn derecho ni ley que respalde la prohibici\u00F3n, y la raz\u00F3n dada (\'genera conflictos\') no justifica violar un derecho",opts:["Le falta un fundamento legal: no cita ning\u00FAn derecho ni ley que respalde la prohibici\u00F3n, y la raz\u00F3n dada (\'genera conflictos\') no justifica violar un derecho","Nada; es un argumento completo porque explica el problema con claridad","Le falta ser m\u00E1s largo y usar palabras m\u00E1s formales","Le falta la firma del director para tener validez oficial"],hint:"Un argumento s\u00F3lido necesita tesis, raz\u00F3n, fundamento legal y conclusi\u00F3n. \u00BFCu\u00E1l de esos cuatro elementos falta aqu\u00ED?",exp:"La afirmaci\u00F3n de que \'genera conflictos\' es una raz\u00F3n d\u00E9bil sin respaldo legal. Para ser s\u00F3lido, el argumento deber\u00EDa citar qu\u00E9 ley o derecho avala la prohibici\u00F3n \u2014 y en este caso no existe ninguno, ya que la libertad de asociaci\u00F3n est\u00E1 constitucionalmente protegida."},

  // SECTION 3 — Diversidad protegida

  var gtH=GT.map(function(g){return'<div style="padding:.5rem .8rem;border:1px solid var(--border);border-radius:8px;background:var(--surface)"><strong style="color:var(--green-dark)">'+(L==="es"?g.es.tp:g.en.tp)+'</strong><br><span style="font-size:.78rem;color:var(--text3)">'+(L==="es"?g.es.dr:g.en.dr)+'</span></div>';}).join("");
  s3.innerHTML=(L==="es"?'<div class="stag">Concepto 3</div><h2>Diversidad protegida: cultural, econ\u00F3mica, ideol\u00F3gica y de g\u00E9nero</h2><p>El derecho a pertenecer abarca una amplia variedad de grupos. Cuando alguien es <strong>excluido por su identidad</strong> \u2014y no por sus actos\u2014, se viola el derecho a la libre asociaci\u00F3n y a la no discriminaci\u00F3n.</p><p>Argumentar a favor del derecho de un grupo no significa compartir sus valores: significa reconocer que tiene la misma protecci\u00F3n legal que cualquier otro.</p>':'<div class="stag">Concept 3</div><h2>Protected diversity: cultural, economic, ideological, and gender</h2><p>The right to belong covers a wide variety of groups. When someone is <strong>excluded because of their identity</strong> \u2014not their actions\u2014, the right to free association and non-discrimination is violated.</p><p>Arguing in favor of a group\'s right does not mean sharing their values: it means recognizing that they have the same legal protection as any other group.</p>')+'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.5rem;margin:.8rem 0">'+gtH+'</div><div class="callout"><p>'+(L==="es"?"<strong>Recuerda:</strong> Los derechos humanos son universales. No se pierden por ser minor\u00EDa ni por carecer de aprobaci\u00F3n de la mayor\u00EDa.":"<strong>Remember:</strong> Human rights are universal. They are not lost by being a minority or lacking majority approval.")+'</p></div>';

function toggleGT(i){
  var panel=document.getElementById("gtpanel"+i);
  var arrow=document.getElementById("gtarrow"+i);
  var card =document.getElementById("gtcard"+i);
  if(!panel)return;
  var open=panel.style.display==="none";
  panel.style.display=open?"block":"none";
  if(arrow)arrow.style.transform=open?"rotate(180deg)":"rotate(0deg)";
  if(card) card.style.borderColor=open?"var(--green)":"var(--border)";
}

function fce2AddArg(i,chip){
  if(chip.classList.contains("used"))return;
  chip.classList.add("used");
  window._fce2ArgBuilt=window._fce2ArgBuilt||[];
  window._fce2ArgBuilt.push(chip.dataset.text);
  fce2RenderBox();
  // clear feedback when building
  var fb=document.getElementById("fce2wf");
  if(fb){fb.className="widget-feedback";fb.textContent="";}
}

function fce2RemoveLast(){
  var built=window._fce2ArgBuilt||[];
  if(built.length===0)return;
  var removed=built.pop();
  // re-enable the chip whose text matches
  document.querySelectorAll("#fce2Bank .arg-chip").forEach(function(c){
    if(c.dataset.text===removed&&c.classList.contains("used")){
      c.classList.remove("used");
    }
  });
  fce2RenderBox();
  var fb=document.getElementById("fce2wf");
  if(fb){fb.className="widget-feedback";fb.textContent="";}
}

function fce2RenderBox(){
  var built=window._fce2ArgBuilt||[];
  var box=document.getElementById("fce2Box");
  if(!box)return;
  if(built.length===0){
    box.classList.remove("has-content");
    box.innerHTML=LANG==="es"?"(Doble clic en una parte para agregarla \u2014 clic aqu\u00ED para quitar la \u00FAltima)":"(Double-click a part to add it \u2014 click here to remove the last one)";
  } else {
    box.classList.add("has-content");
    box.innerHTML=built.map(function(t,idx){
      return'<div style="margin-bottom:.3rem"><span style="color:var(--green-dark);font-weight:600">'+(idx+1)+". </span>"+t+"</div>";
    }).join("");
  }
}

function fce2CheckArg(){
  var correct=window._fce2ArgCorrect||[];
  var built=window._fce2ArgBuilt||[];
  var fb=document.getElementById("fce2wf");
  if(!fb)return;
  if(built.length<4){
    fb.textContent=LANG==="es"?"Selecciona las 4 partes primero.":"Select all 4 parts first.";
    fb.className="widget-feedback show bad";return;
  }
  var isOk=built.every(function(t,i){return t===correct[i];});
  if(isOk){
    fb.textContent=LANG==="es"?"✓ ¡Argumento bien estructurado! Tesis → Razón → Fundamento → Conclusión.":"✓ Well-structured argument! Thesis → Reason → Foundation → Conclusion.";
    fb.className="widget-feedback show ok";
  } else {
    fb.textContent=LANG==="es"?"✗ El orden no es correcto. Reinicia e intenta de nuevo.":"✗ The order is not correct. Reset and try again.";
    fb.className="widget-feedback show bad";
    // auto-reset after 1.4s so they can try again without hunting for the button
    setTimeout(function(){fce2ResetArg(true);},1400);
  }
}

function fce2ResetArg(silent){
  window._fce2ArgBuilt=[];
  document.querySelectorAll("#fce2Bank .arg-chip").forEach(function(c){c.classList.remove("used");});
  fce2RenderBox();
  if(!silent){
    var fb=document.getElementById("fce2wf");
    if(fb){fb.className="widget-feedback";fb.textContent="";}
  }
}
