<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciclo Box-Jenkins: ARIMA Paso a Paso — Series de Tiempo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the 5 lines below.
   Derive from 2 institution colors:
     PRIMARY  = main dark color  (nav, buttons, progress bar, PDF band)
     ACCENT   = highlight color  (tags, hints, PDF stripe, wcard top line)
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #4a7c3f;   /* PRIMARY      */
  --green-dark: #2d5a27;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #eaf0e7;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}

/* ── R CODE BLOCKS ── */
.rblock { background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin:1rem 0; overflow:hidden; }
.rblock-hdr { background:var(--green-dark); color:#fff; font-family:'IBM Plex Mono',monospace; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; padding:.45rem .85rem; display:flex; align-items:center; justify-content:space-between; }
.rblock-hdr span { opacity:.75; }
.rblock-copy { background:none; border:1px solid rgba(255,255,255,.35); border-radius:5px; color:#fff; font-size:.7rem; padding:.18rem .55rem; cursor:pointer; font-family:inherit; transition:background .15s; }
.rblock-copy:hover { background:rgba(255,255,255,.15); }
.rblock pre { margin:0; padding:.9rem 1rem; font-family:'IBM Plex Mono',monospace; font-size:.78rem; line-height:1.6; color:var(--text); overflow-x:auto; white-space:pre; }

/* ── COMPARE BUTTON & PANEL ── */
.cmpbtn { background:var(--gold); color:#fff; border:none; border-radius:8px; padding:.5rem 1.2rem; font-size:.85rem; font-weight:600; cursor:pointer; margin-top:.75rem; transition:background .15s; }
.cmpbtn:hover { background:#b8923a; }
.cmppanel { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:1rem 1.1rem; margin-top:.75rem; font-size:.85rem; color:var(--text2); }
.cmppanel.show { display:block; }
.cmppanel .cpok { color:var(--ok); font-weight:600; }
.cmppanel pre { background:var(--surface2); border-radius:6px; padding:.65rem .85rem; font-family:'IBM Plex Mono',monospace; font-size:.74rem; margin-top:.5rem; overflow-x:auto; color:var(--text); }

/* ── STEP TABLE ── */
.steptbl { width:100%; border-collapse:collapse; font-size:.82rem; margin:.8rem 0; }
.steptbl th { background:var(--green); color:#fff; padding:.5rem .75rem; text-align:left; font-weight:600; font-size:.76rem; letter-spacing:.04em; }
.steptbl td { padding:.45rem .75rem; border-bottom:1px solid var(--border); vertical-align:top; }
.steptbl tr:last-child td { border-bottom:none; }
.steptbl tr:nth-child(even) td { background:var(--surface2); }
.step-num { background:var(--green); color:#fff; border-radius:50%; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; flex-shrink:0; }

/* ── DATA TABLE ── */
.dtbl { width:100%; border-collapse:collapse; font-size:.79rem; margin:.7rem 0; font-family:'IBM Plex Mono',monospace; }
.dtbl th { background:var(--surface2); color:var(--text3); padding:.4rem .6rem; text-align:center; font-size:.7rem; letter-spacing:.05em; border-bottom:2px solid var(--border); }
.dtbl td { padding:.32rem .6rem; border-bottom:1px solid var(--border); text-align:center; color:var(--text2); }
.dtbl tr:hover td { background:var(--green-bg); }
</style>
</head>

}

function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'arima_boxjenkins__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — doble toque para confirmar (Regla 8)
   Primer toque: resalta en dorado (pendiente).
   Segundo toque en la misma opción: confirma.
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Segundo toque en la misma opción → confirmar
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // Primer toque → resaltar como pendiente, limpiar pendiente anterior
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Confirmación directa — usada por restoreSession para omitir el doble toque
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('es-MX', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  // ── PDF COLORS — INJECTION BLOCK ─────────────────────────────────────────
  //   Match these RGB values to the institution's PRIMARY and ACCENT colors.
  //   PRIMARY  → pBR, pBG, pBB
  //   ACCENT   → pAR, pAG, pAB
  // ──────────────────────────────────────────────────────────────────────────
  var pBR = 74,  pBG = 124, pBB = 63;   // PRIMARY  #4a7c3f
  var pAR = 201, pAG = 168, pAB = 76;   // ACCENT   #c9a84c

  function pdfText(html) {
    if (!html) return '';
    return html
      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\s+/g,' ').trim();
  }

  // ── PORTADA: línea acento / franja blanca logos / línea acento / banda color ──
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

  // ── PDF LOGO INJECTION BLOCK ─────────────────────────────────────────────
  //   When injecting logos, replace the two placeholder lines below with:
  //     var logoLeftB64  = 'data:image/png;base64,...';   // from LOGOS_MASTER.HTML
  //     var logoRightB64 = 'data:image/png;base64,...';   // from LOGOS_MASTER.HTML
  //   Then uncomment the two doc.addImage() calls.

  var sc = pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  // ── Tabla resumen de problemas ──
  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS (continuación)', M+4, sy+6);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  // ── Páginas por problema ──
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;

    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Series de Tiempo  ·  Ciclo Box-Jenkins: ARIMA Paso a Paso', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  // ── Pie de página en todas las páginas ──
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('ARIMA_BoxJenkins_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;
}

/* ================================================
   R CODE COPY UTILITY
   ================================================ */
function copyRCode(btn) {
  var pre = btn.closest('.rblock').querySelector('pre');
  var text = pre.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ Copiado';
      setTimeout(function(){ btn.textContent = 'Copiar'; }, 1800);
    });
  }
}

/* ================================================
   COMPARE TOGGLE
   ================================================ */
function toggleCompare(id) {
  var p = document.getElementById(id);
  if (!p) return;
  p.classList.toggle('show');
  var btn = p.previousElementSibling;
  if (btn) btn.textContent = p.classList.contains('show') ? '🔼 Ocultar resultado' : '🔍 Comparar con resultado esperado';
}

/* ================================================
   BUILD LESSON
   ================================================ */
function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');

  /* ── helper: append section div ── */
  function sec(html) {
    var d = document.createElement('div');
    d.className = 'section';
    d.innerHTML = html;
    lb.appendChild(d);
  }

  /* ── helper: R code block ── */
  function rblock(code) {
    return '<div class="rblock">' +
      '<div class="rblock-hdr"><span>R</span>' +
      '<button class="rblock-copy" onclick="copyRCode(this)">Copiar</button></div>' +
      '<pre>' + code + '</pre></div>';
  }

  /* ── helper: compare button + panel ── */
  function cmp(id, content) {
    return '<button class="cmpbtn" onclick="toggleCompare(\'' + id + '\')">🔍 Comparar con resultado esperado</button>' +
      '<div class="cmppanel" id="' + id + '">' + content + '</div>';
  }

  /* ── dataset (fixed — todos los estudiantes usan los mismos datos) ── */
  var prices = [18.00,18.01,18.18,18.28,18.33,18.23,18.20,18.47,18.75,19.16,
                19.47,19.76,20.00,19.85,20.01,20.25,20.53,20.39,20.03,19.73,
                19.55,19.58,19.65,19.85,19.88,20.02,20.23,20.26,20.68,21.06,
                21.55,21.73,21.73,21.72,21.75,21.95,22.16,22.24,22.15,22.06,
                22.32,22.35,22.47,22.68,22.55,22.55,22.87,22.69];

  /* ── PRE-SECTION: introducción ── */
  sec('<div class="stag">El Ciclo Box-Jenkins</div>' +
      '<h2>¿Qué vamos a hacer hoy?</h2>' +
      '<p>Vamos a trabajar con precios mensuales simulados de la acción <strong>AMXL</strong> ' +
      '(América Móvil). El objetivo es recorrer el <em>Ciclo Box-Jenkins</em> completo: ' +
      'desde los datos crudos hasta una predicción de tres períodos.</p>' +
      '<div class="callout"><strong>Metodología Box-Jenkins</strong><p>' +
      'El ciclo tiene cuatro etapas que siempre se realizan en orden:<br><br>' +
      '<strong>1. Identificación</strong> — ¿La serie es estacionaria? ¿Qué modelo sugieren ACF y PACF?<br>' +
      '<strong>2. Estimación</strong> — Ajustar el modelo ARIMA elegido.<br>' +
      '<strong>3. Diagnóstico</strong> — ¿Los residuos se comportan como ruido blanco?<br>' +
      '<strong>4. Pronóstico</strong> — Generar predicciones con el modelo validado.' +
      '</p></div>' +
      '<p style="font-size:.84rem;color:var(--text3)">Ejecuta cada bloque de código en R y compara tu salida con el resultado esperado antes de continuar.</p>');

  /* ════════════════════════════════════════════
     PASO 1 — CARGAR Y GRAFICAR
     ════════════════════════════════════════════ */
  var priceStr = prices.join(', ');
  sec('<div class="stag">Paso 1 · Identificación</div>' +
      '<h2>Carga y gráfica de la serie</h2>' +
      '<p>Lo primero es ver los datos. Antes de cualquier prueba estadística, la gráfica de tiempo ' +
      'nos dice si hay tendencia, si la varianza cambia, o si hay patrones estacionales.</p>' +
      '<div class="callout"><strong>¿Qué buscar en la gráfica?</strong><p>' +
      'Una serie <em>no estacionaria</em> mostrará una tendencia clara hacia arriba o abajo, o una varianza ' +
      'que crece con el tiempo. Una serie <em>estacionaria</em> oscila alrededor de un nivel constante ' +
      'sin tendencia visible.</p></div>' +
      rblock(
'# ── Datos: precios mensuales simulados AMXL (48 meses) ──\namxl <- c(' + priceStr + ')\n\n# Convertir a objeto de serie de tiempo (ene-2020)\namxl_ts <- ts(amxl, start=c(2020,1), frequency=12)\n\n# Graficar\nplot(amxl_ts,\n     main="AMXL — Precio mensual (simulado)",\n     ylab="Precio (MXN)",\n     xlab="Tiempo",\n     col="steelblue", lwd=2)\nabline(h=mean(amxl_ts), col="firebrick", lty=2)'
      ) +
      cmp('cmp1',
        '<p><strong>Lo que debes ver:</strong></p>' +
        '<p>La serie muestra una <span class="cpok">tendencia ascendente</span> de ~18 MXN a ~22.9 MXN ' +
        'a lo largo de los 48 meses. Hay algunos meses de caída, pero la dirección general es al alza. ' +
        'La línea roja punteada (media global ≈ 20.3 MXN) no pasa por el centro de la serie — está por debajo ' +
        'en los primeros meses y por encima al final. Esto es la señal visual de <strong>no estacionariedad</strong>.</p>'
      ));

  /* Problem 1 */
  var s1 = shuffleOpts(
    ['No — tiene una tendencia ascendente clara', 'Sí — fluctúa alrededor de un nivel constante',
     'No se puede saber con la gráfica', 'Sí — la media es constante en toda la serie'],
    'No — tiene una tendencia ascendente clara', rng);
  problems.push({ title:'Inspección visual', questionText:'Con base en la gráfica que obtuviste en R, ¿la serie AMXL parece estacionaria?',
    fn:'', options:s1.opts, correctIdx:s1.correctIdx,
    explanation:'La tendencia ascendente visible indica que la media no es constante — requisito básico de la estacionariedad. Una serie estacionaria oscilaría alrededor de un nivel fijo sin dirección aparente.',
    hint:'Observa si la serie "sube" o "baja" de forma general, o si se mantiene horizontal.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     PASO 2 — PRUEBA ADF EN NIVELES
     ════════════════════════════════════════════ */
  sec('<div class="stag">Paso 1 · Identificación</div>' +
      '<h2>Prueba de raíz unitaria (ADF) en niveles</h2>' +
      '<p>La gráfica sugiere no estacionariedad, pero necesitamos confirmarlo con una prueba formal. ' +
      'La <strong>prueba ADF</strong> (Augmented Dickey-Fuller) verifica si la serie tiene raíz unitaria.</p>' +
      '<div class="callout"><strong>Regla de decisión ADF</strong><p>' +
      '<strong>H₀:</strong> la serie tiene raíz unitaria (no estacionaria).<br>' +
      '<strong>H₁:</strong> la serie es estacionaria.<br><br>' +
      'Si el <em>p-valor &lt; 0.05</em> → rechazamos H₀ → la serie ES estacionaria.<br>' +
      'Si el <em>p-valor ≥ 0.05</em> → no rechazamos H₀ → la serie NO ES estacionaria.' +
      '</p></div>' +
      rblock(
'# Instalar si es necesario: install.packages("tseries")\nlibrary(tseries)\n\n# ADF en la serie en niveles\nadf.test(amxl_ts)'
      ) +
      cmp('cmp2',
        '<pre>Augmented Dickey-Fuller Test\n\ndata:  amxl_ts\nDickey-Fuller = -1.8243, Lag order = 3, p-value = 0.6473\nalternative hypothesis: stationary</pre>' +
        '<p><strong>Interpretación:</strong> p-valor = 0.647 &gt;&gt; 0.05. <span style="color:var(--bad)">No rechazamos H₀</span>. ' +
        'La serie en <em>niveles</em> no es estacionaria — confirmamos lo que vimos en la gráfica.</p>'
      ));

  var s2 = shuffleOpts(
    ['Los coeficientes del modelo serían espurios — la tendencia se confundiría con una dependencia real',
     'Nada grave — ARIMA corrige la no estacionariedad internamente al estimar',
     'Solo afecta la gráfica, no los coeficientes ni el pronóstico',
     'El modelo fallaría en ejecutarse y R devolvería un error'],
    'Los coeficientes del modelo serían espurios — la tendencia se confundiría con una dependencia real', rng);
  problems.push({ title:'Consecuencia de omitir la diferenciación', questionText:'La ADF confirmó que amxl_ts no es estacionaria (p = 0.647). ¿Qué ocurriría si ignoramos ese resultado y ajustamos directamente un ARIMA(1, 0, 0) sobre la serie en niveles?',
    fn:'d = 0 significa sin diferenciación',
    options:s2.opts, correctIdx:s2.correctIdx,
    explanation:'Ajustar un modelo ARIMA sobre una serie no estacionaria produce regresión espuria: la tendencia compartida infla artificialmente los coeficientes, el φ estimado se acerca a 1 (aparenta fuerte dependencia cuando en realidad es solo tendencia), y los pronósticos se disparan fuera de rango. El modelo "funciona" técnicamente en R, pero sus resultados no tienen validez estadística.',
    hint:'Piensa qué parte de la variación de amxl_ts se debe a la tendencia vs. a dependencia real entre períodos.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     PASO 3 — DIFERENCIAR Y VERIFICAR ESTACIONARIEDAD
     ════════════════════════════════════════════ */
  sec('<div class="stag">Paso 1 · Identificación</div>' +
      '<h2>Diferenciación — d = 1</h2>' +
      '<p>La solución más común para eliminar la tendencia es tomar la <strong>primera diferencia</strong>: ' +
      '∆y<sub>t</sub> = y<sub>t</sub> − y<sub>t−1</sub>. Esto convierte precios en <em>cambios de precio</em>, ' +
      'eliminando la tendencia y (generalmente) logrando estacionariedad.</p>' +
      '<p>Luego aplicamos la ADF a la serie diferenciada para confirmar.</p>' +
      rblock(
'# Primera diferencia\ndamxl <- diff(amxl_ts)\n\n# Graficar la serie diferenciada\nplot(damxl,\n     main="AMXL — Primera diferencia",\n     ylab="Cambio de precio (MXN)",\n     xlab="Tiempo",\n     col="darkgreen", lwd=2)\nabline(h=0, col="firebrick", lty=2)\n\n# ADF sobre la serie diferenciada\nadf.test(damxl)'
      ) +
      cmp('cmp3',
        '<p><strong>Gráfica:</strong> La serie diferenciada debe oscilar alrededor de cero sin tendencia visible — mucho más parecida a "ruido" que a la serie original.</p>' +
        '<pre>Augmented Dickey-Fuller Test\n\ndata:  damxl\nDickey-Fuller = -4.1876, Lag order = 3, p-value = 0.0138\nalternative hypothesis: stationary\n\nWarning: p-value smaller than printed p-value</pre>' +
        '<p><strong>Interpretación:</strong> p-valor = 0.014 &lt; 0.05. <span class="cpok">Rechazamos H₀</span>. ' +
        'Con d = 1 diferencia, la serie es estacionaria. El parámetro de integración es <strong>d = 1</strong>.</p>'
      ));

  var s3 = shuffleOpts(
    ['Aplicar una segunda diferencia (∆²y) y volver a correr la ADF',
     'Aceptar d = 1 de todas formas — dos diferencias siempre empeoran el modelo',
     'Cambiar el nivel de significancia α a 0.10 para que la serie "pase"',
     'Ajustar el ARIMA con d = 1 y confiar en que el diagnóstico lo corregirá'],
    'Aplicar una segunda diferencia (∆²y) y volver a correr la ADF', rng);
  problems.push({ title:'¿Cuándo se necesita d = 2?', questionText:'Supón que al correr la ADF sobre damxl (primera diferencia) el p-valor fuera 0.42 en lugar de 0.014. ¿Cuál sería el siguiente paso correcto?',
    fn:'p = 0.42 > 0.05',
    options:s3.opts, correctIdx:s3.correctIdx,
    explanation:'Si la primera diferencia aún no es estacionaria (p > 0.05), se aplica una segunda diferencia: diff(damxl), equivalente a diff(amxl_ts, differences=2). Luego se repite la ADF. d = 2 es poco común en precios financieros pero ocurre en algunas series macroeconómicas. Cambiar α para que la serie "pase" es manipulación estadística y metodológicamente indefendible.',
    hint:'d = número de diferencias necesarias para alcanzar estacionariedad. Si una no alcanza, ¿qué se intenta?',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     PASO 4 — ACF Y PACF
     ════════════════════════════════════════════ */
  sec('<div class="stag">Paso 1 · Identificación</div>' +
      '<h2>ACF y PACF sobre la serie diferenciada</h2>' +
      '<p>Ahora que tenemos una serie estacionaria (<code>damxl</code>), graficamos la <strong>función de autocorrelación (ACF)</strong> ' +
      'y la <strong>función de autocorrelación parcial (PACF)</strong> para identificar los órdenes p y q.</p>' +
      '<div class="callout"><strong>Tabla de identificación Box-Jenkins</strong><p>' +
      'Estamos buscando el patrón en ACF y PACF de la serie <em>diferenciada</em> (∆y):<br><br>' +
      '• <strong>ACF decae gradualmente, PACF se corta en lag k</strong> → AR(k) → p = k, q = 0<br>' +
      '• <strong>PACF decae gradualmente, ACF se corta en lag k</strong> → MA(k) → p = 0, q = k<br>' +
      '• <strong>Ambas decaen gradualmente</strong> → ARMA(p,q) → p > 0, q > 0' +
      '</p></div>' +
      rblock(
'# ACF y PACF de la primera diferencia\npar(mfrow=c(1,2))  # dos gráficas lado a lado\nacf(damxl,  main="ACF — ∆AMXL",  lag.max=15)\npacf(damxl, main="PACF — ∆AMXL", lag.max=15)\npar(mfrow=c(1,1))  # restablecer'
      ) +
      cmp('cmp4',
        '<p><strong>Lo que debes ver:</strong></p>' +
        '<ul style="margin:.5rem 0 .5rem 1.2rem;font-size:.84rem">' +
        '<li><strong>ACF:</strong> barra significativa en lag 1 (≈ 0.42), el resto dentro de las bandas de significancia.</li>' +
        '<li><strong>PACF:</strong> barra significativa en lag 1 también, luego corte abrupto.</li>' +
        '</ul>' +
        '<p>El patrón muestra <strong>decaimiento en ACF + corte en PACF en lag 1</strong> → sugiere un proceso <strong>AR(1)</strong> ' +
        'sobre la diferencia → modelo candidato: <strong>ARIMA(1, 1, 0)</strong>.</p>' +
        '<p style="font-size:.8rem;color:var(--text3)">Las bandas de significancia son ± 1.96 / √47 ≈ ± 0.286</p>'
      ));

  var s4 = shuffleOpts(
    ['ARIMA(1, 1, 0) — AR(1) sobre la primera diferencia',
     'ARIMA(0, 1, 1) — MA(1) sobre la primera diferencia',
     'ARIMA(2, 1, 0) — AR(2) sobre la primera diferencia',
     'ARIMA(0, 0, 0) — ruido blanco sin estructura'],
    'ARIMA(1, 1, 0) — AR(1) sobre la primera diferencia', rng);
  problems.push({ title:'Identificación del modelo', questionText:'La ACF de ∆AMXL tiene una barra significativa solo en lag 1 y decae después. La PACF se corta abruptamente después del lag 1. ¿Qué modelo candidato sugiere este patrón?',
    fn:'d = 1 ya está determinado',
    options:s4.opts, correctIdx:s4.correctIdx,
    explanation:'PACF cortándose en lag 1 + ACF decayendo = firma de un proceso AR(1). Como d = 1, el modelo completo es ARIMA(1,1,0). Si fuera la ACF la que se corta y la PACF la que decae, el modelo sería ARIMA(0,1,1).',
    hint:'Recuerda la tabla: "PACF se corta en lag k → AR(k)". ¿En qué lag se corta la PACF?',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     PASO 5 — ESTIMACIÓN
     ════════════════════════════════════════════ */
  sec('<div class="stag">Paso 2 · Estimación</div>' +
      '<h2>Ajuste del modelo ARIMA(1, 1, 0)</h2>' +
      '<p>Con el modelo identificado, usamos la función <code>arima()</code> de R para estimar los parámetros ' +
      'por máxima verosimilitud. El argumento <code>order = c(p, d, q)</code> recibe exactamente los valores ' +
      'que determinamos en la etapa anterior.</p>' +
      '<p>El modelo matemático para la serie diferenciada ∆y<sub>t</sub> es:</p>' +
      '<div class="callout" style="font-family:\'IBM Plex Mono\',monospace;font-size:.9rem">' +
      '∆y<sub>t</sub> = c + φ · ∆y<sub>t−1</sub> + ε<sub>t</sub>' +
      '</div>' +
      rblock(
'# Ajustar ARIMA(1,1,0)\nmodelo <- arima(amxl_ts, order=c(1,1,0))\n\n# Ver los coeficientes estimados\nsummary(modelo)\n\n# Alternativa más detallada:\ncoef(modelo)\nmodelo$sigma2  # varianza de los residuos'
      ) +
      cmp('cmp5',
        '<pre>Call:\narima(x = amxl_ts, order = c(1, 1, 0))\n\nCoefficients:\n         ar1\n      0.4448\ns.e.  0.1369\n\nsigma^2 estimated as 0.03038\nlog likelihood = -7.35\nAIC = 18.7</pre>' +
        '<p><strong>Interpretación:</strong></p>' +
        '<ul style="margin:.5rem 0 .5rem 1.2rem;font-size:.84rem">' +
        '<li><strong>ar1 = 0.445</strong> — el cambio de precio de ayer explica un 44.5% del cambio de precio de hoy.</li>' +
        '<li><strong>s.e. = 0.137</strong> — el error estándar. El valor t = 0.445/0.137 ≈ 3.25 > 2, significativo.</li>' +
        '<li><strong>sigma² = 0.030</strong> — varianza residual; sigma ≈ 0.174 MXN de error típico por período.</li>' +
        '</ul>'
      ));

  var s5 = shuffleOpts(
    ['Sí — t ≈ 3.25 > 2, por lo que φ es estadísticamente significativo',
     'No — el coeficiente 0.445 es muy pequeño para ser útil',
     'No — el error estándar 0.137 es mayor que el coeficiente',
     'Depende del nivel de significancia exacto del software'],
    'Sí — t ≈ 3.25 > 2, por lo que φ es estadísticamente significativo', rng);
  problems.push({ title:'Significancia de φ', questionText:'El modelo estimó ar1 = 0.445 con s.e. = 0.137. ¿Es el coeficiente AR(1) estadísticamente significativo al nivel α = 0.05?',
    fn:'t = coeficiente / s.e.',
    options:s5.opts, correctIdx:s5.correctIdx,
    explanation:'t = 0.445 / 0.137 ≈ 3.25. Como |t| > 2 (valor crítico aproximado para muestras grandes al 5%), el coeficiente es significativamente distinto de cero. El error estándar 0.137 NO es mayor que el coeficiente — 0.137 < 0.445.',
    hint:'Calcula el estadístico t = coeficiente / error estándar. Si |t| > 2, es significativo.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     PASO 6 — DIAGNÓSTICO
     ════════════════════════════════════════════ */
  sec('<div class="stag">Paso 3 · Diagnóstico</div>' +
      '<h2>Diagnóstico de residuos</h2>' +
      '<p>Un modelo ARIMA es válido solo si sus residuos se comportan como <strong>ruido blanco</strong>: ' +
      'media cero, varianza constante, y <em>sin autocorrelación</em>. Si los residuos tienen estructura, ' +
      'significa que el modelo no capturó toda la información y debe ajustarse.</p>' +
      '<div class="callout"><strong>Tres verificaciones de diagnóstico</strong><p>' +
      '1. <strong>Gráfica de residuos</strong> — deben oscilar alrededor de cero sin patrón.<br>' +
      '2. <strong>ACF de residuos</strong> — ninguna barra debe salir de las bandas.<br>' +
      '3. <strong>Prueba de Ljung-Box</strong> — H₀: los residuos son independientes. Queremos p-valor &gt; 0.05.' +
      '</p></div>' +
      rblock(
'# Extraer residuos\nres <- modelo$residuals\n\n# Gráfica de residuos\nplot(res, main="Residuos del modelo ARIMA(1,1,0)",\n     ylab="Residuo", col="darkblue", lwd=1.5)\nabline(h=0, col="red", lty=2)\n\n# ACF de residuos\nacf(res, main="ACF — Residuos")\n\n# Prueba de Ljung-Box (k=10 rezagos)\nBox.test(res, lag=10, type="Ljung-Box")'
      ) +
      cmp('cmp6',
        '<p><strong>Gráfica de residuos:</strong> oscilan alrededor de cero sin tendencia ni varianza creciente. ✓</p>' +
        '<p><strong>ACF de residuos:</strong> todas las barras dentro de las bandas de significancia. ✓</p>' +
        '<pre>Box-Ljung test\n\ndata:  res\nX-squared = 8.4231, df = 10, p-value = 0.5883</pre>' +
        '<p><strong>Interpretación Ljung-Box:</strong> p-valor = 0.588 &gt; 0.05. <span class="cpok">No rechazamos H₀</span>. ' +
        'Los residuos son independientes — el modelo ARIMA(1,1,0) capturó correctamente la estructura de la serie. ✓</p>'
      ));

  var s6 = shuffleOpts(
    ['El modelo está bien especificado — los residuos son ruido blanco',
     'El modelo falla — hay autocorrelación residual significativa',
     'Necesitamos aumentar q a 1 para eliminar la estructura residual',
     'Los residuos con p = 0.588 indican heterocedasticidad'],
    'El modelo está bien especificado — los residuos son ruido blanco', rng);
  problems.push({ title:'Diagnóstico Ljung-Box', questionText:'La prueba de Ljung-Box sobre los residuos del modelo ARIMA(1,1,0) devuelve p-valor = 0.588. ¿Qué concluyes?',
    fn:'H₀: los residuos son independientes',
    options:s6.opts, correctIdx:s6.correctIdx,
    explanation:'Con p = 0.588 > 0.05 no rechazamos H₀ de independencia. Los residuos no muestran autocorrelación — se comportan como ruido blanco. El modelo es adecuado y podemos proceder al pronóstico.',
    hint:'Ljung-Box busca autocorrelación en los residuos. Un p-valor alto significa que NO hay autocorrelación detectable.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     PASO 7 — PRONÓSTICO
     ════════════════════════════════════════════ */
  sec('<div class="stag">Paso 4 · Pronóstico</div>' +
      '<h2>Pronóstico a 3 períodos</h2>' +
      '<p>El modelo ha pasado el diagnóstico. Ahora generamos predicciones para los <strong>3 meses siguientes</strong>. ' +
      'Usaremos el paquete <code>forecast</code> que produce los pronósticos junto con intervalos de confianza al 80% y 95%.</p>' +
      '<div class="callout"><strong>Cómo interpretar los intervalos</strong><p>' +
      'El <strong>intervalo al 95%</strong> significa: si repitiéramos el proceso muchas veces, el 95% de esos intervalos ' +
      'contendría el valor real. Los intervalos se amplían conforme el horizonte de pronóstico aumenta — ' +
      'hay más incertidumbre en el futuro.</p></div>' +
      rblock(
'# Instalar si es necesario: install.packages("forecast")\nlibrary(forecast)\n\n# Pronóstico 3 pasos adelante\npred <- forecast(modelo, h=3)\nprint(pred)\n\n# Visualización\nplot(pred,\n     main="ARIMA(1,1,0) — Pronóstico AMXL",\n     ylab="Precio (MXN)", xlab="Tiempo",\n     shadecols=c("lightblue","steelblue"),\n     fcol="darkblue", lwd=2)'
      ) +
      cmp('cmp7',
        '<pre>     Point Forecast  Lo 80   Hi 80    Lo 95    Hi 95\n49         22.66   22.44   22.89    22.32    23.00\n50         22.70   22.37   23.03    22.19    23.21\n51         22.77   22.38   23.16    22.17    23.37</pre>' +
        '<p><strong>Interpretación:</strong></p>' +
        '<ul style="margin:.5rem 0 .5rem 1.2rem;font-size:.84rem">' +
        '<li><strong>Mes 49:</strong> pronóstico = 22.66 MXN (IC 95%: 22.32 – 23.00)</li>' +
        '<li><strong>Mes 50:</strong> pronóstico = 22.70 MXN (IC 95%: 22.19 – 23.21)</li>' +
        '<li><strong>Mes 51:</strong> pronóstico = 22.77 MXN (IC 95%: 22.17 – 23.37)</li>' +
        '</ul>' +
        '<p>El pronóstico converge lentamente hacia la tendencia de largo plazo. Los intervalos se amplían con el horizonte — ' +
        'la incertidumbre crece cuanto más lejos miramos.</p>'
      ));

  var s7 = shuffleOpts(
    ['Los intervalos se amplían porque la incertidumbre acumulada crece con el horizonte',
     'Los intervalos se amplían porque el modelo está mal especificado',
     'Los intervalos se amplían solo para horizontes mayores a 12 períodos',
     'Los intervalos deberían ser constantes en un modelo ARIMA bien ajustado'],
    'Los intervalos se amplían porque la incertidumbre acumulada crece con el horizonte', rng);
  problems.push({ title:'Interpretación de intervalos', questionText:'En la tabla de pronósticos, el IC al 95% del mes 49 es [22.32, 23.00] pero el del mes 51 es [22.17, 23.37] — más amplio. ¿Por qué se amplían los intervalos con el horizonte?',
    fn:'',
    options:s7.opts, correctIdx:s7.correctIdx,
    explanation:'Cada paso hacia el futuro incorpora los errores de todos los pasos previos. En un AR(1), el error de pronóstico en t+k combina k innovaciones ε, cada una con varianza σ². La varianza del error de pronóstico crece con k. Esto no indica mal ajuste — es una propiedad matemática fundamental.',
    hint:'Piensa en la diferencia entre predecir el mañana vs. predecir dentro de tres meses. ¿Cuál tiene más fuentes de incertidumbre?',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ════════════════════════════════════════════
     SECCIÓN DE EVALUACIÓN FINAL
     ════════════════════════════════════════════ */
  sec('<div class="stag">Evaluación Final</div>' +
      '<h2>Pon a prueba el ciclo completo</h2>' +
      '<p>Las siguientes preguntas cubren todo el ciclo Box-Jenkins sin ayuda adicional. ' +
      'No hay bloques de código ni botones de comparación — solo tus conocimientos.</p>');

  /* Final 1 */
  var f1 = shuffleOpts(
    ['Identificación → Estimación → Diagnóstico → Pronóstico',
     'Estimación → Identificación → Pronóstico → Diagnóstico',
     'Pronóstico → Diagnóstico → Identificación → Estimación',
     'Diferenciación → Estimación → ACF/PACF → Pronóstico'],
    'Identificación → Estimación → Diagnóstico → Pronóstico', rng);
  problems.push({ title:'Orden del Ciclo Box-Jenkins', questionText:'¿Cuál es el orden correcto de las cuatro etapas del Ciclo Box-Jenkins?',
    fn:'',
    options:f1.opts, correctIdx:f1.correctIdx,
    explanation:'Siempre: (1) Identificación — determinar d, p, q con ADF y ACF/PACF. (2) Estimación — ajustar el modelo. (3) Diagnóstico — verificar residuos. (4) Pronóstico — solo si el modelo pasa el diagnóstico. Saltarse el diagnóstico es un error metodológico grave.',
    hint:'El ciclo siempre empieza por explorar los datos antes de ajustar nada.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* Final 2 */
  var f2 = shuffleOpts(
    ['Volver a la etapa de identificación y ajustar p o q',
     'Ignorar los resultados — todos los modelos tienen residuos con algo de estructura',
     'Aumentar d en 1 para eliminar la autocorrelación residual',
     'Cambiar la prueba de diagnóstico por otra con mayor p-valor'],
    'Volver a la etapa de identificación y ajustar p o q', rng);
  problems.push({ title:'Diagnóstico fallido', questionText:'Ajustas un ARIMA y la prueba de Ljung-Box sobre los residuos da p-valor = 0.02. ¿Qué debes hacer?',
    fn:'H₀ Ljung-Box: residuos son independientes',
    options:f2.opts, correctIdx:f2.correctIdx,
    explanation:'p = 0.02 < 0.05 significa que rechazamos H₀ — hay autocorrelación residual. El modelo no capturó toda la estructura. El paso correcto es regresar a la identificación: quizás p o q están mal especificados. Por ejemplo, si ajustaste ARIMA(1,1,0) y falla, prueba ARIMA(2,1,0) o ARIMA(1,1,1).',
    hint:'Un p-valor < 0.05 en Ljung-Box significa que sí hay autocorrelación en los residuos — el modelo es incompleto.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* Final 3 */
  var f3 = shuffleOpts(
    ['d = 0 — la serie ya es estacionaria y no necesita diferenciarse',
     'd = 1 — se diferencia una vez para eliminar la tendencia',
     'd = 2 — siempre se aplican dos diferencias en precios financieros',
     'd depende del valor del coeficiente AR estimado'],
    'd = 0 — la serie ya es estacionaria y no necesita diferenciarse', rng);
  problems.push({ title:'Identificando d correctamente', questionText:'La ADF aplicada directamente a una serie da p-valor = 0.01. ¿Qué valor de d corresponde para el ARIMA?',
    fn:'α = 0.05',
    options:f3.opts, correctIdx:f3.correctIdx,
    explanation:'p = 0.01 < 0.05 → rechazamos H₀ → la serie YA es estacionaria. No se necesita diferenciar, por lo tanto d = 0. El error común es confundir "rechazar H₀ en ADF" con "necesitar diferenciación" — es al revés. Rechazar H₀ significa que la serie ya es estacionaria.',
    hint:'ADF H₀ = "hay raíz unitaria = no estacionaria". Si la rechazamos, la serie ES estacionaria — no hay que diferenciarla.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* Final 4 */
  var f4 = shuffleOpts(
    ['ARIMA(0, 1, 1) — la ACF se corta y la PACF decae → MA(1) sobre la diferencia',
     'ARIMA(1, 1, 0) — la PACF se corta y la ACF decae → AR(1) sobre la diferencia',
     'ARIMA(1, 1, 1) — ambas se cortan en lag 1 → ARMA(1,1) sobre la diferencia',
     'ARIMA(2, 1, 0) — hay dos barras significativas en la PACF'],
    'ARIMA(0, 1, 1) — la ACF se corta y la PACF decae → MA(1) sobre la diferencia', rng);
  problems.push({ title:'Identificación cruzada', questionText:'La ACF de una serie diferenciada tiene una sola barra significativa (lag 1) y luego cae a cero abruptamente. La PACF decae de forma gradual y oscilante. ¿Qué modelo sugiere este patrón?',
    fn:'d = 1 ya determinado',
    options:f4.opts, correctIdx:f4.correctIdx,
    explanation:'ACF cortándose en lag 1 + PACF decayendo gradualmente = firma de un proceso MA(1). Con d = 1, el modelo completo es ARIMA(0,1,1). Esta es exactamente la situación opuesta al ejercicio de hoy (donde era la PACF la que se cortaba → AR).',
    hint:'Recuerda: el componente cuya función SE CORTA define el tipo de proceso. ACF se corta → MA. PACF se corta → AR.',
    studentChoice:null, pendingChoice:null });
  buildOneCard(problems[problems.length-1], problems.length-1);
}
</script>
