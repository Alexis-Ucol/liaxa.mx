<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funciones Lineales — Instituto Adonai</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Adonai palette ── */
:root {
  --green:#2b2d56; --green-dark:#1a1b36; --green-bg:#e8e8f2;
  --gold:#d4a020;  --gold-bg:#fdf6e0;
  --bg:#f5f7fa;    --surface:#ffffff;    --surface2:#edf0f5;
  --border:#d4d9e3; --text:#141820;      --text2:#3a4050; --text3:#6a7080;
  --ok:#1a6a4a;    --ok-bg:rgba(26,106,74,.10);
  --bad:#8b2200;   --bad-bg:rgba(176,48,16,.08);
  --shadow:0 4px 24px rgba(43,45,86,.13);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green:#6a6dc0; --green-dark:#9899d8;
  --green-bg:#1a1a2e; --gold:#e8b840; --gold-bg:#241e08;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
  --shadow:0 4px 24px rgba(0,0,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

/* ── WELCOME ── */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:1.4rem 1.6rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.wlogos img{height:110px;width:auto;object-fit:contain;max-width:100%}
.wlogsep{display:none}
.wfoot-liaxa{display:flex;justify-content:center;align-items:center;padding-top:1.2rem;margin-top:1rem}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.4rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.4rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}

/* ── LESSON ── */
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}

/* ── CONTENT ── */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}

/* ── FORMULA CARDS ── */
.fml-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem;margin:1rem 0}
.fml-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green)}
.fml-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.3rem}
.fml-eq{font-family:'IBM Plex Mono',monospace;font-size:1rem;color:var(--green-dark);font-weight:600;margin-bottom:.25rem}
.fml-note{font-size:.76rem;color:var(--text3)}

/* ── COORDINATE CANVAS ── */
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0}
.graph-controls{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.9rem}
@media(max-width:480px){.graph-controls{grid-template-columns:1fr}}
.ctrl-group label{display:block;font-size:.73rem;color:var(--text3);margin-bottom:.2rem}
.ctrl-group input[type=range]{width:100%;accent-color:var(--green)}
.ctrl-val{font-weight:700;color:var(--green);font-family:'IBM Plex Mono',monospace}
.graph-canvas{display:block;width:100%;border-radius:8px;border:1px solid var(--border)}
.graph-eq{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--green-dark);text-align:center;margin:.6rem 0 .3rem}


/* ── SLOPE TRIANGLE ── */
.slope-demo{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0}
.slope-canvas-wrap{position:relative;width:100%;margin:.7rem 0}

/* ── TABLE OF VALUES ── */
.tval-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.88rem}
.tval-table th{background:var(--green);color:#fff;padding:.5rem .8rem;text-align:center;font-size:.75rem;letter-spacing:.05em}
.tval-table td{padding:.45rem .8rem;text-align:center;border:1px solid var(--border)}
.tval-table tr:nth-child(even) td{background:var(--surface2)}
.tval-input{width:60px;padding:.3rem .4rem;border:1.5px solid var(--border);border-radius:5px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.85rem;background:var(--surface);color:var(--text)}
.tval-input:focus{outline:none;border-color:var(--green)}
.tval-input.ok{border-color:var(--ok);background:var(--ok-bg)}
.tval-input.bad{border-color:var(--bad);background:var(--bad-bg)}
.check-tval-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.5rem 1.2rem;font-size:.85rem;cursor:pointer;font-weight:600;margin-top:.5rem}
.check-tval-btn:hover{background:var(--green-dark)}

/* ── POINT VERIFIER ── */
.point-verify{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0}
.pv-row{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-bottom:.7rem}
.pv-input{width:70px;padding:.45rem .6rem;border:1.5px solid var(--border);border-radius:7px;font-size:.95rem;text-align:center;font-family:'IBM Plex Mono',monospace;background:var(--surface2);color:var(--text)}
.pv-input:focus{outline:none;border-color:var(--green)}
.pv-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.5rem 1.1rem;font-size:.85rem;cursor:pointer;font-weight:600}
.pv-btn:hover{background:var(--green-dark)}
.pv-fb{font-size:.85rem;font-weight:600;min-height:1.4rem;margin-top:.4rem}

/* ── STEP REVEAL ── */
.steps-box{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:1rem 0}
.step-row{display:flex;align-items:baseline;gap:.8rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);background:var(--surface);opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s}
.step-row:last-child{border-bottom:none}
.step-row.shown{opacity:1;transform:none}
.step-num{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);flex-shrink:0;width:46px}
.step-math{font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--green-dark);font-weight:600}
.step-why{font-size:.78rem;color:var(--text2);margin-left:.5rem}
.step-next-btn{display:block;width:100%;padding:.6rem;background:var(--green-bg);border:none;border-top:1px solid var(--border);font-size:.82rem;color:var(--green-dark);cursor:pointer;font-weight:600;transition:background .15s}
.step-next-btn:hover{background:var(--green-bg)}
.step-next-btn:disabled{opacity:.4;cursor:default}

/* ── PROBLEM CARDS ── */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)}
.pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--green-dark);margin-top:.4rem;font-weight:600}

/* ── WORK AREA ── */
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green)}
.wpanel{display:none}
.wpanel.active{display:block}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
[data-theme="dark"] .cvwrap{border-color:#5a5850}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:160px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.wtextarea{width:100%;min-height:110px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical}
.wtextarea:focus{outline:none;border-color:var(--green)}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.2rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s}
.pzone:hover{border-color:var(--green)}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pzicon{font-size:1.7rem;margin-bottom:.35rem}
.pztxt{font-size:.8rem;color:var(--text3)}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:260px;object-fit:contain}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}

/* ── MC ── */
.mcopt.pending{border-color:var(--gold);background:var(--surface)}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg)}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok)}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}

/* ── RESULT ── */
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}

/* ── CSS FRACTIONS ── */
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .18rem;line-height:1.1}
.mf-num{border-bottom:2px solid currentColor;padding:0 .2em .05em;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700}
.mf-den{padding:.05em .2em 0;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700}
.mf-row{display:inline-flex;align-items:center;gap:.25rem;font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--green-dark);font-weight:600}

/* ── POINT PLOTTER ── */
.plot-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0}
.plot-input-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.7rem}
.plot-input{width:65px;padding:.4rem .5rem;border:1.5px solid var(--border);border-radius:7px;font-size:.95rem;text-align:center;font-family:'IBM Plex Mono',monospace;background:var(--surface2);color:var(--text)}
.plot-input:focus{outline:none;border-color:var(--green)}
.plot-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.45rem 1rem;font-size:.85rem;cursor:pointer;font-weight:600}
.plot-btn:hover{background:var(--green-dark)}
.plot-fb{font-size:.85rem;font-weight:600;min-height:1.4rem;margin-top:.4rem}

/* ── RESTORE BAR ── */
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1rem;font-size:.88rem;color:var(--text)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
</style>
</head>

  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return LS_PREFIX + '__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = LS_PREFIX + '__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var bar   = document.getElementById('restoreBar');
  if (name && group && loadSession(name, group)) {
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }
}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  setupObserver();
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var ctx = dc.getContext('2d');
          var dpr = window.devicePixelRatio || 1;
          ctx.drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(txt, i) {
        var ta = document.getElementById('ta' + i);
        if (ta && txt) ta.value = txt;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(src, i) {
        if (!src) return;
        var pp = document.getElementById('pp' + i);
        var pz = document.getElementById('pz' + i);
        if (pp) { pp.src = src; pp.style.display = 'block'; }
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

/* ════ RNG ════ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = Math.imul(31, s) + seed.charCodeAt(i) | 0;
  s = Math.abs(s);
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function ri(rng, lo, hi) { return lo + Math.floor(rng() * (hi - lo + 1)); }
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length-1; i > 0; i--) { var j = Math.floor(rng()*(i+1)); var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp; }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}
function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }

/* ── linEq: produces clean y = mx + b string, never +(-n) ── */
function linEq(m, b, useY) {
  var lhs = useY ? '<strong>y</strong>' : 'y';
  var mPart = (m === 1 ? '' : m === -1 ? '−' : (m < 0 ? '−' + Math.abs(m) : String(m)));
  var xPart = mPart + '<strong>x</strong>';
  if (m === 0 && b === 0) return lhs + ' = 0';
  if (m === 0) return lhs + ' = ' + b;
  if (b === 0) return lhs + ' = ' + xPart;
  if (b > 0)  return lhs + ' = ' + xPart + ' + ' + b;
  return lhs + ' = ' + xPart + ' − ' + Math.abs(b);
}
/* plain text version for PDF / option strings */
function linEqTxt(m, b) {
  var mPart = (m === 1 ? '' : m === -1 ? '-' : (m < 0 ? '-' + Math.abs(m) : String(m)));
  var xPart = mPart + 'x';
  if (m === 0 && b === 0) return 'y = 0';
  if (m === 0) return 'y = ' + b;
  if (b === 0) return 'y = ' + xPart;
  if (b > 0)  return 'y = ' + xPart + ' + ' + b;
  return 'y = ' + xPart + ' − ' + Math.abs(b);
}
/* HTML fraction: frac(num, den) */
function frac(num, den) {
  return '<span class="mf-outer"><span class="mf-num">' + num + '</span><span class="mf-den">' + den + '</span></span>';
}
/* bold x and y in explanation text */
function bxy(s) {
  return s.replace(/\by\b/g, '<strong>y</strong>').replace(/\bx\b/g, '<strong>x</strong>');
}

/* ════ START ════ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor llena ambos campos.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  setupObserver();
}
function setupObserver() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ════ TWO-TAP MC ════ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx; prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    saveSession();
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx; prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ════ CANVAS ════ */
function canvasBg() {
  return document.documentElement.getAttribute('data-theme') === 'dark' ? '#2e2e28' : '#ffffff';
}
function fillCanvasBg(canvas, dpr) {
  var ctx = canvas.getContext('2d');
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = canvasBg();
  ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.restore();
}
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  fillCanvasBg(canvas, dpr);
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  ctx.strokeStyle = isDark ? '#8ab4e8' : '#2b2d56';
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) { var r=canvas.getBoundingClientRect(); var s=e.touches?e.touches[0]:e; return [s.clientX-r.left, s.clientY-r.top]; }
  function onDown(e) { e.preventDefault(); drawing=true; var p=getPos(e); lx=p[0]; ly=p[1]; }
  function onMove(e) { e.preventDefault(); if(!drawing) return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp() { drawing=false; saveSession(); }
  canvas.addEventListener('mousedown', onDown, {passive:false});
  canvas.addEventListener('mousemove', onMove, {passive:false});
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on'); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth=2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth=10; ctx.globalAlpha=0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d){ d.classList.remove('sel'); });
      dot.classList.add('sel'); ctx.strokeStyle=dot.dataset.color; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){ b.classList.remove('on'); }); tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function(){
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    fillCanvasBg(canvas, dpr);
  });
}
function switchTab(idx, panel, btn) {
  var prefix = 'wp_'+idx+'_';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(prefix+panel).classList.add('active');

/* ════ COORDINATE GRAPH ════ */
var _graphState = {};
function drawGraph(id) {
  var s = _graphState[id];
  if (!s) return;
  var canvas = document.getElementById(id + '_canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var bgColor     = isDark ? '#242420' : '#ffffff';
  var gridColor   = isDark ? '#3a3830' : '#e8eef7';
  var axisColor   = isDark ? '#b0aa9e' : '#141820';
  var lineColor   = '#2b2d56';
  var textColor   = isDark ? '#b0aa9e' : '#3a4050';

  var range = 6;
  var cx = W/2, cy = H/2;
  var scale = Math.min(W, H) / (range * 2 + 2);

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var gx = -range; gx <= range; gx++) {
    ctx.beginPath(); ctx.moveTo(cx + gx*scale, 0); ctx.lineTo(cx + gx*scale, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy + gx*scale); ctx.lineTo(W, cy + gx*scale); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = axisColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();

  // axis labels
  ctx.fillStyle = textColor; ctx.font = '11px IBM Plex Mono, monospace'; ctx.textAlign = 'center';
  for (var lx = -range; lx <= range; lx++) {
    if (lx === 0) continue;
    ctx.fillText(lx, cx + lx*scale, cy + 14);
    ctx.fillText(lx, cx + 8, cy - lx*scale + 4);
  }
  ctx.fillText('x', W - 8, cy - 6); ctx.fillText('y', cx + 8, 12);

  // line y = mx + b
  var m = s.m, b = s.b;
  var x1 = -range - 1, y1 = m*x1 + b;
  var x2 =  range + 1, y2 = m*x2 + b;
  ctx.strokeStyle = lineColor; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx + x1*scale, cy - y1*scale);
  ctx.lineTo(cx + x2*scale, cy - y2*scale);
  ctx.stroke();

  // y-intercept point
  ctx.fillStyle = lineColor;
  ctx.beginPath(); ctx.arc(cx, cy - b*scale, 5, 0, Math.PI*2); ctx.fill();

  // slope triangle if m != 0
  if (m !== 0) {
    var tx = 1, ty = m;
    ctx.strokeStyle = '#d4a020'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
    ctx.beginPath();
    ctx.moveTo(cx, cy - b*scale);
    ctx.lineTo(cx + tx*scale, cy - b*scale);
    ctx.lineTo(cx + tx*scale, cy - (b + ty)*scale);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#d4a020'; ctx.font = 'bold 11px IBM Plex Mono, monospace'; ctx.textAlign = 'left';
    ctx.fillText('Δx=1', cx + tx*scale + 3, cy - b*scale + 13);
    ctx.fillText('Δy='+(m > 0 ? m : m), cx + tx*scale + 3, cy - (b + ty/2)*scale);
  }

  window._activeGraphId = id;
}
function buildGraph(containerId, initM, initB) {
  _graphState[containerId] = { m: initM, b: initB };
  var wrap = document.getElementById(containerId);
  var dpr = window.devicePixelRatio || 1;
  wrap.innerHTML =
    '<div class="graph-wrap">' +
      '<div class="graph-controls">' +
        '<div class="ctrl-group"><label>Pendiente <em>m</em> = <span class="ctrl-val" id="'+containerId+'_mv">'+initM+'</span></label>' +
          '<input type="range" min="-4" max="4" step="1" value="'+initM+'" oninput="updateGraph(\''+containerId+'\',\'m\',this.value)"></div>' +
        '<div class="ctrl-group"><label>Ordenada al origen <em>b</em> = <span class="ctrl-val" id="'+containerId+'_bv">'+initB+'</span></label>' +
          '<input type="range" min="-5" max="5" step="1" value="'+initB+'" oninput="updateGraph(\''+containerId+'\',\'b\',this.value)"></div>' +
      '</div>' +
      '<canvas id="'+containerId+'_canvas" class="graph-canvas" width="'+(320*dpr)+'" height="'+(280*dpr)+'" style="width:100%;height:280px"></canvas>' +
      '<div class="graph-eq" id="'+containerId+'_eq">'+linEqTxt(initM,initB)+'</div>' +
    '</div>';
  setTimeout(function(){ drawGraph(containerId); }, 60);
}
function updateGraph(id, param, val) {
  val = parseInt(val);
  _graphState[id][param] = val;
  document.getElementById(id + '_' + param + 'v').textContent = val;
  var m = _graphState[id].m, b = _graphState[id].b;
  document.getElementById(id + '_eq').textContent = linEqTxt(m, b);
  drawGraph(id);
}

/* ════ STEP REVEAL ════ */
var _stepState = {};
function buildStepReveal(containerId, steps) {
  _stepState[containerId] = { shown: 0, steps: steps };
  var wrap = document.getElementById(containerId);
  var html = '<div class="steps-box" id="'+containerId+'_box">';
  steps.forEach(function(step, i) {
    html += '<div class="step-row" id="'+containerId+'_s'+i+'"><div class="step-num">Paso '+(i+1)+'</div><div><span class="step-math">'+step.math+'</span><span class="step-why"> — '+step.why+'</span></div></div>';
  });
  html += '</div>';
  html += '<button class="step-next-btn" id="'+containerId+'_btn" onclick="revealNextStep(\''+containerId+'\')">▶ Ver siguiente paso</button>';
  wrap.innerHTML = html;
  setTimeout(function(){ revealNextStep(containerId); }, 200);
}
function revealNextStep(id) {
  var st = _stepState[id]; if (!st) return;
  var row = document.getElementById(id+'_s'+st.shown);
  if (row) { row.classList.add('shown'); st.shown++; }
  if (st.shown >= st.steps.length) {

/* ════ POINT VERIFIER ════ */

}

function drawStaticGraph(id) {
  var s = _graphState[id]; if (!s) return;
  var canvas = document.getElementById(id + '_canvas'); if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var bgColor   = isDark ? '#242420' : '#ffffff';
  var gridColor = isDark ? '#3a3830' : '#e8eef7';
  var axisColor = isDark ? '#b0aa9e' : '#141820';
  var textColor = isDark ? '#b0aa9e' : '#3a4050';
  var range = 6, cx = W/2, cy = H/2;
  var scale = Math.min(W, H) / (range * 2 + 2);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var g = -range; g <= range; g++) {
    ctx.beginPath(); ctx.moveTo(cx+g*scale,0); ctx.lineTo(cx+g*scale,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,cy+g*scale); ctx.lineTo(W,cy+g*scale); ctx.stroke();
  }
  ctx.strokeStyle = axisColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  ctx.fillStyle = textColor; ctx.font = '11px IBM Plex Mono,monospace'; ctx.textAlign='center';
  for (var l = -range; l <= range; l++) {
    if (l===0) continue;
    ctx.fillText(l, cx+l*scale, cy+14);
    ctx.fillText(l, cx+8, cy-l*scale+4);
  }
  ctx.fillText('x',W-8,cy-6); ctx.fillText('y',cx+8,12);
  // Draw line
  ctx.strokeStyle='#2b2d56'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(cx+(-range-1)*scale, cy-((s.m)*(-range-1)+s.b)*scale);
  ctx.lineTo(cx+(range+1)*scale,  cy-((s.m)*(range+1)+s.b)*scale);
  ctx.stroke();
  // y-intercept dot
  ctx.fillStyle='#2b2d56';
  ctx.beginPath(); ctx.arc(cx, cy-s.b*scale, 5, 0, Math.PI*2); ctx.fill();
  // Table points (xVals)
  if (s.tablePoints) {
    s.tablePoints.forEach(function(pt) {
      ctx.fillStyle='rgba(43,45,86,0.25)';
      ctx.beginPath(); ctx.arc(cx+pt[0]*scale, cy-pt[1]*scale, 5, 0, Math.PI*2); ctx.fill();
    });
  }
  // User plotted point
  if (s.px !== null && s.py !== null) {
    var onLine = Math.abs(s.py - (s.m*s.px + s.b)) < 0.001;
    ctx.fillStyle = onLine ? '#1a6a4a' : '#8b2200';
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx+s.px*scale, cy-s.py*scale, 7, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    // label
    ctx.fillStyle = onLine ? '#1a6a4a' : '#8b2200';
    ctx.font = 'bold 11px IBM Plex Mono,monospace'; ctx.textAlign='left';
    ctx.fillText('(' + s.px + ', ' + s.py + ')', cx+s.px*scale+10, cy-s.py*scale-6);
  }
}
function drawStaticGraphRange(id, range) {
  var s = _graphState[id]; if (!s) return;
  var canvas = document.getElementById(id + '_canvas'); if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var bgColor   = isDark ? '#242420' : '#ffffff';
  var gridColor = isDark ? '#3a3830' : '#e8eef7';
  var axisColor = isDark ? '#b0aa9e' : '#141820';
  var textColor = isDark ? '#b0aa9e' : '#3a4050';
  var cx = W/2, cy = H/2;
  var scale = Math.min(W, H) / (range * 2 + 2);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var g = -range; g <= range; g++) {
    ctx.beginPath(); ctx.moveTo(cx+g*scale,0); ctx.lineTo(cx+g*scale,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,cy+g*scale); ctx.lineTo(W,cy+g*scale); ctx.stroke();
  }
  ctx.strokeStyle = axisColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  ctx.fillStyle = textColor; ctx.font = '11px IBM Plex Mono,monospace'; ctx.textAlign='center';
  var step = range > 8 ? 2 : 1;
  for (var l = -range; l <= range; l += step) {
    if (l===0) continue;
    ctx.fillText(l, cx+l*scale, cy+14);
    ctx.fillText(l, cx+8, cy-l*scale+4);
  }
  ctx.fillText('x',W-8,cy-6); ctx.fillText('y',cx+8,12);
  ctx.strokeStyle='#2b2d56'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(cx+(-range-1)*scale, cy-((s.m)*(-range-1)+s.b)*scale);
  ctx.lineTo(cx+(range+1)*scale,  cy-((s.m)*(range+1)+s.b)*scale);
  ctx.stroke();
  // Pre-marked points (example points for section 4)
  if (s.tablePoints) {
    s.tablePoints.forEach(function(pt) {
      ctx.fillStyle = '#d4a020';
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx+pt[0]*scale, cy-pt[1]*scale, 7, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#d4a020'; ctx.font='bold 11px IBM Plex Mono,monospace'; ctx.textAlign='left';
      ctx.fillText('('+pt[0]+', '+pt[1]+')', cx+pt[0]*scale+10, cy-pt[1]*scale-6);
    });
  }
  // User plotted point
  if (s.px !== null && s.py !== null) {
    var onLine = Math.abs(s.py - (s.m*s.px + s.b)) < 0.001;
    ctx.fillStyle = onLine ? '#1a6a4a' : '#8b2200';
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx+s.px*scale, cy-s.py*scale, 7, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
}

/* ════════════════════════════════════════════

function buildLesson(rng) {
  var body = document.getElementById('lessonBody');

  /* ─────────────────────────────────────────
     SECCIÓN 1: ¿Qué es una función lineal?

  var initM1 = ri(rng,1,3), initB1 = ri(rng,-3,3);

  /* — Problema 1 — */

  var ySample = m1 * 2 + b1;

    title: 'Evaluar una función lineal',

    fn: '',
    options: s1.opts, correctIdx: s1.correctIdx,

  /* ─────────────────────────────────────────
     SECCIÓN 2: La pendiente

  var m2val = ri(rng,2,5), b2val = ri(rng,-3,3);
  var x1s = ri(rng,1,3), y1s = m2val*x1s + b2val;
  var x2s = x1s + ri(rng,1,3), y2s = m2val*x2s + b2val;

      '<div class="mf-row" style="font-size:1rem">m = ' + frac('y₂ − y₁', 'x₂ − x₁') + ' = ' + frac('Δy', 'Δx') + '</div>' +

  /* — Problema 3 — */
  var m3p = ri(rng,1,4), b3p = ri(rng,-4,4);

    '<ol style="padding-left:1.4rem;color:var(--text2);margin-bottom:.8rem">' +
      '<li style="margin-bottom:.4rem">Calcula la pendiente: <span class="mf-row">m = ' + frac('y₂ − y₁', 'x₂ − x₁') + '</span></li>' +
      '<li>Sustituye un punto en <strong>y</strong> = m<strong>x</strong> + b y despeja b</li>' +
    '</ol>' +
    '<p>Procedimiento completo para la recta que pasa por <strong>(' + ex1 + ', ' + ey1 + ')</strong> y <strong>(' + ex2 + ', ' + ey2 + ')</strong>:</p>' +
    '<div id="step_reveal1_wrap"></div>';
  body.appendChild(sec4);
  buildStepReveal('step_reveal1_wrap', [
    { math: 'm = ' + frac(ey2 + ' − ' + ey1, ex2 + ' − ' + ex1), why: 'Aplicamos la fórmula de pendiente' },
    { math: 'm = ' + frac(ey2-ey1, ex2-ex1) + (Number.isInteger(m4) ? ' = ' + m4 : ''), why: 'Calculamos Δy / Δx' },
    { math: ey1 + ' = ' + m4 + '(' + ex1 + ') + b  →  b = ' + ey1, why: 'Sustituimos (' + ex1 + ', ' + ey1 + ') para hallar b' },
    { math: linEqTxt(m4,b4), why: 'Ecuación completa de la recta ✓' }
  ]);
  /* — Problema 4 — */
  var m4p = ri(rng,1,4), b4p = ri(rng,-4,4);
  var fx1 = 0, fy1 = b4p, fx2 = 1, fy2 = m4p + b4p;
  var correctEq = linEqTxt(m4p,b4p);
  var wrong4a = linEqTxt(m4p+1, b4p);
  var wrong4b = linEqTxt(m4p, b4p+1);
  var wrong4c = linEqTxt(m4p, -b4p);
  var opts4r = [correctEq, wrong4a, wrong4b, wrong4c];
  var s4 = shuffleOpts(opts4r, correctEq, rng);
  problems.push({
    title: 'Encontrar la ecuación',
    questionText: '¿Cuál es la ecuación de la recta que pasa por (' + fx1 + ', ' + fy1 + ') y (' + fx2 + ', ' + fy2 + ')?',
    fn: '',
    options: s4.opts, correctIdx: s4.correctIdx,
    explanation: 'm = (' + fy2 + ' − ' + fy1 + ') / (' + fx2 + ' − ' + fx1 + ') = ' + m4p + '. Con el punto (0, ' + fy1 + '): b = ' + b4p + '. Ecuación: ' + correctEq + '.',
    hint: 'El punto (0, ' + fy1 + ') te da directamente el valor de b. Luego usa el segundo punto para confirmar m.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─────────────────────────────────────────
     SECCIÓN 5: ¿Está un punto en la recta?
  ───────────────────────────────────────────*/
  var m5 = ri(rng,1,3), b5 = ri(rng,-3,3);
  var testX = ri(rng,1,4), testY = m5*testX + b5;
  var badY = testY + pick(rng,[-2,-1,1,2]);

  var sec5 = document.createElement('div');
  sec5.className = 'section'; sec5.id = 's5';
  sec5.innerHTML =
    '<div class="stag">Concepto 5</div>' +
    '<h2>¿Está un punto en la recta?</h2>' +
    '<p>Para saber si un punto (<strong>x</strong>, <strong>y</strong>) pertenece a una recta, sustituimos el valor de <strong>x</strong> y verificamos si el resultado iguala el <strong>y</strong> dado.</p>' +
    '<div class="callout">' +
      '<p>Si al sustituir <strong>x</strong> obtenemos el mismo <strong>y</strong> → el punto <strong>sí está</strong> en la recta.</p>' +
      '<p>Si el resultado es diferente → el punto <strong>no está</strong> en la recta.</p>' +
    '</div>' +
    '<p>Prueba con la recta <strong>' + linEqTxt(m5,b5) + '</strong>. Ingresa un punto y míralo aparecer en la gráfica:</p>' +
    '<div id="graph5_wrap"></div>' +
    '<p style="font-size:.83rem;color:var(--text3);margin-top:.5rem">💡 Prueba con (' + testX + ', ' + testY + ') y con (' + testX + ', ' + badY + ') para ver la diferencia.</p>';
  body.appendChild(sec5);
  buildStaticGraph('graph5_wrap', m5, b5);

  /* — Problema 5 — */
  var m5p = ri(rng,1,3), b5p = ri(rng,-3,3);
  var chkX = ri(rng,1,5);
  var trueY = m5p * chkX + b5p;
  var opts5r = [
    'Sí, porque ' + linEqTxt(m5p,b5p).replace('y','y') + ' con x = ' + chkX + ' da ' + trueY,
    'No, porque da ' + (trueY+1) + ', no ' + trueY,
    'Sí, porque la pendiente es positiva',
    'No, porque x > 0'
  ];
  var s5 = shuffleOpts(opts5r, opts5r[0], rng);
  problems.push({
    title: '¿El punto pertenece a la recta?',
    questionText: '¿El punto (' + chkX + ', ' + trueY + ') está en la recta ' + linEq(m5p,b5p,false) + '?',
    fn: '',
    options: s5.opts, correctIdx: s5.correctIdx,
    explanation: bxy('Sustituimos x = ' + chkX + ': y = ' + m5p + '(' + chkX + ')' + (b5p >= 0 ? ' + ' + b5p : ' − ' + Math.abs(b5p)) + ' = ' + (m5p*chkX) + (b5p >= 0 ? ' + ' + b5p : ' − ' + Math.abs(b5p)) + ' = ' + trueY + '. Coincide con el y dado → sí pertenece.'),
    hint: 'Sustituye x = ' + chkX + ' y compara el resultado con y = ' + trueY + '.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ─────────────────────────────────────────
     EVALUACIÓN FINAL
  ───────────────────────────────────────────*/
  var secF = document.createElement('div');
  secF.className = 'section'; secF.id = 'sf';
  secF.innerHTML =
    '<div class="stag">Evaluación Final</div>' +
    '<h2>Problemas de evaluación</h2>' +
    '<p>Resuelve los siguientes problemas. No hay explicación previa — ¡confía en lo que practicaste!</p>';
  body.appendChild(secF);

  /* — Problema 6: Identificar m y b — */
  var m6 = pick(rng, [-3,-2,-1,1,2,3,4]);
  var b6 = ri(rng,-5,5);
  var eqShow6 = linEq(m6, b6, false);
  var correct6 = 'm = ' + m6 + ', b = ' + b6;
  var wrong6a  = 'm = ' + b6 + ', b = ' + m6;
  var wrong6b  = 'm = ' + m6 + ', b = ' + (b6+1);
  var wrong6c  = 'm = ' + (m6 < 0 ? m6+1 : m6+1) + ', b = ' + b6;
  var opts6r = [correct6, wrong6a, wrong6b, wrong6c];
  var s6 = shuffleOpts(opts6r, correct6, rng);
  problems.push({
    title: 'Identificar m y b',
    questionText: 'Para la función ' + eqShow6 + ', ¿cuáles son la pendiente (m) y la ordenada al origen (b)?',
    fn: '',
    options: s6.opts, correctIdx: s6.correctIdx,
    explanation: bxy('En y = mx + b, el coeficiente de x es la pendiente y el término independiente es b. Entonces m = ' + m6 + ' y b = ' + b6 + '.'),
    hint: 'Compara con <strong>y</strong> = m<strong>x</strong> + b. El número junto a <strong>x</strong> es m; el número suelto es b.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* — Problema 7: Pendiente entre dos puntos — */
  var m7 = ri(rng,1,5);
  var qx1 = ri(rng,-3,0), qy1 = ri(rng,-3,3);
  var qx2 = qx1 + ri(rng,1,4), qy2 = qy1 + m7*(qx2-qx1);
  var dy7 = qy2-qy1, dx7 = qx2-qx1;
  var wm7a = m7+1, wm7b = m7-1===0 ? m7+2 : m7-1, wm7c = -m7;
  var opts7r = [String(m7), String(wm7a), String(wm7b), String(wm7c)];
  var s7 = shuffleOpts(opts7r, String(m7), rng);
  problems.push({
    title: 'Pendiente entre dos puntos',
    questionText: 'Calcula la pendiente de la recta que pasa por (' + qx1 + ', ' + qy1 + ') y (' + qx2 + ', ' + qy2 + ').',
    fn: '',
    options: s7.opts, correctIdx: s7.correctIdx,
    explanation: 'm = (' + qy2 + ' − ' + qy1 + ') / (' + qx2 + ' − ' + qx1 + ') = ' + dy7 + ' / ' + dx7 + ' = ' + m7 + '.',
    hint: 'Usa m = (y₂ − y₁) / (x₂ − x₁). Resta los y primero, luego los x.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* — Problema 8: Aplicación real (tarifa de taxi) — */
  var base8 = ri(rng,10,30), rate8 = ri(rng,3,8);
  var km8 = ri(rng,4,10);
  var total8 = base8 + rate8 * km8;
  var wrong8a = base8 + rate8*(km8+1), wrong8b = rate8*km8, wrong8c = base8 + rate8*(km8-1);
  var opts8r = ['$' + total8, '$' + wrong8a, '$' + wrong8b, '$' + wrong8c];
  var s8 = shuffleOpts(opts8r, '$' + total8, rng);
  problems.push({
    title: 'Aplicación: Tarifa de taxi',
    questionText: 'Un taxi cobra $' + base8 + ' de tarifa fija más $' + rate8 + ' por kilómetro. Si el viaje es de ' + km8 + ' km, ¿cuánto cuesta en total?',
    fn: 'C(x) = ' + rate8 + 'x + ' + base8,
    options: s8.opts, correctIdx: s8.correctIdx,
    explanation: 'C(' + km8 + ') = ' + rate8 + '(' + km8 + ') + ' + base8 + ' = ' + (rate8*km8) + ' + ' + base8 + ' = $' + total8 + '.',
    hint: 'La tarifa fija es b y el costo por km es m. Sustituye x = ' + km8 + ' en C(x) = ' + rate8 + 'x + ' + base8 + '.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);
}

  doc.text(name, M+4, 87); doc.text(group, 130, 87);

  // Score box
  var sc = pct>=70?[26,106,74]:pct>=50?[212,160,32]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,130,150); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  doc.setFillColor(43,45,86); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) { doc.addPage(); sy = 20;
      doc.setFillColor(43,45,86); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS (continuación)', M+4, sy+6); sy += 12; }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  // Per-problem pages
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage(); var wy = 0;
    doc.setFillColor(43,45,86); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(212,160,32); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(212,160,32); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Instituto Adonai  ·  Funciones Lineales', M, 10);
    doc.setTextColor(232,232,242); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH = 8 + qLines.length*5 + 4;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(43,45,86); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    if (prob.fn) {
      var fnRaw = pdfText(prob.fn);
      doc.setTextColor(43,45,86); doc.setFontSize(7.5); doc.setFont('courier','bold');
      doc.text(fnRaw, M+4, qy + qLines.length*5 + 2);
    }
    wy += qBoxH + 4;

    var isOk = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(43,45,86); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) { try { var imgD=dc.toDataURL('image/png'); var ar=dc.height/dc.width; var iw=TW; var ih=Math.min(iw*ar,68); doc.addImage(imgD,'PNG',M,wy,iw,ih); wy+=ih+4; } catch(e){} }
    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln){ if(wy>PH-15){doc.addPage();wy=20;} doc.text(ln,M,wy); wy+=5; }); wy+=2;
    }
    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src,'JPEG',M,wy,TW,68); wy+=72; } catch(e){}
    }
  }

  // Footers
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(212,160,32); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,130,150); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages, PW/2, PH-5, {align:'center'});
  }

  doc.save('FuncionesLineales_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF'; btn.disabled = false;
}
</script>
</body>
</html>
