<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agua y Civilización — Historia · 3° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a3a6b; --green-dark:#0f2244; --green-bg:#e8edf5;
  --gold:#c9a84c;  --gold-bg:#faf3e0;
  --bg:#f8f6f1;    --surface:#ffffff;    --surface2:#f0ede6;
  --border:#ddd8cc; --text:#1a1a16; --text2:#4a4640; --text3:#7a7468;
  --ok:#2d6a4f;    --ok-bg:rgba(45,106,79,.10);
  --bad:#8b2500;   --bad-bg:rgba(139,37,0,.08);
  --shadow:0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --shadow:0 4px 20px rgba(0,0,0,.35);
  --green:#4a7abf; --green-dark:#7aaae0; --green-bg:#0e1e38;
  --gold:#d4b86a;  --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

/* ── WELCOME ── */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border)}
.wlogos img{height:50px;width:auto;object-fit:contain}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot{display:flex;justify-content:center;align-items:center;padding-top:.9rem}

/* ── RESTORE BAR ── */
#restoreBar{display:none;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:10px;padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text)}
#restoreBar strong{color:var(--gold)}
.rbar-btns{display:flex;gap:.6rem;margin-top:.6rem}
.rbtn{padding:.45rem 1rem;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-yes:hover{background:var(--green-dark)}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ── LESSON ── */
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}

/* ── LANGUAGE TOGGLE ── */
.lang-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:.28rem .7rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--green);color:#fff}
[data-theme="dark"] .lang-btn.active{background:var(--green-dark)}

/* ── CONTENT ── */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}

/* ── PROBLEM CARDS ── */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)}
.pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;line-height:1.6}

/* ── WORK AREA (draw only — for questions that need it) ── */
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);margin-bottom:.85rem}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.draw-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.4rem}

/* ── HINT ── */
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}

/* ── MC ── */
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg)}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:#1a5c38;background:#b7e4cc;color:#0e3a22;font-weight:700}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:#1a5c38;background:#d4f0e2;color:#0e3a22;font-weight:600}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok)}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}

/* ── RESULT ── */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}

/* ── CIV CARDS ── */
.civ-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin:1rem 0}
.civ-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1rem;text-align:center;transition:transform .2s,box-shadow .2s;cursor:pointer}
.civ-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.civ-card.open .civ-detail{display:block}
.civ-emoji{font-size:2.2rem;margin-bottom:.4rem}
.civ-name{font-weight:700;font-size:.95rem;color:var(--green-dark);margin-bottom:.2rem}
.civ-river{font-size:.78rem;color:var(--text3);margin-bottom:.35rem}
.civ-tag{display:inline-block;background:var(--green-bg);color:var(--green-dark);font-size:.72rem;padding:.13rem .45rem;border-radius:20px}
.civ-detail{display:none;text-align:left;font-size:.8rem;color:var(--text2);line-height:1.65;margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border)}

/* ── WATER BARS ── */
.water-widget{background:var(--surface2);border-radius:10px;padding:1rem;margin:1rem 0}
.water-title{font-size:.78rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.7rem}
.water-river{display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem}
.water-name{font-size:.8rem;font-weight:600;width:100px;color:var(--text2);flex-shrink:0}
.water-bg{flex:1;height:12px;background:var(--border);border-radius:6px;overflow:hidden}
.water-fill{height:100%;background:linear-gradient(90deg,#64b5f6,#1a3a6b);border-radius:6px;transition:width 1.1s ease;width:0}
.water-pct{font-size:.74rem;color:var(--text3);width:32px;text-align:right}

/* ── ARROW MATCHING WIDGET ── */
.arrow-match-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin:1rem 0;position:relative}
.arrow-match-instr{font-size:.85rem;color:var(--text2);margin-bottom:.9rem}
.arrow-match-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:.5rem;align-items:start}
.am-col{display:flex;flex-direction:column;gap:.5rem}
.am-col-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem;text-align:center}
.am-item{padding:.6rem .75rem;border:2px solid var(--border);border-radius:8px;background:var(--surface2);font-size:.8rem;cursor:pointer;transition:all .15s;user-select:none;text-align:center}
.am-item:hover:not(.done):not(.am-sel){border-color:var(--green);background:var(--green-bg)}
.am-item.am-sel{border-color:var(--gold);background:var(--gold-bg);font-weight:600}
.am-item.done{font-weight:600}
.am-pair-0{border-color:#c0392b!important;background:#fde8e7!important;color:#7b1a13!important}
.am-pair-1{border-color:#e67e22!important;background:#fef0e1!important;color:#8a4a0d!important}
.am-pair-2{border-color:#27ae60!important;background:#e3f7ec!important;color:#145c35!important}
.am-pair-3{border-color:#2980b9!important;background:#e3f1fb!important;color:#12507a!important}
.am-arrows-col{display:flex;flex-direction:column;gap:.5rem;align-items:center;padding-top:1.5rem}
.am-arrow{width:44px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--border);transition:color .2s}
.am-arrow.matched{color:var(--ok)}
.am-progress{font-size:.72rem;color:var(--text3);text-align:right;margin-top:.6rem}
.am-reset{background:none;border:1px solid var(--border);border-radius:6px;padding:.28rem .65rem;font-size:.74rem;color:var(--text3);cursor:pointer;margin-top:.6rem}
.am-reset:hover{border-color:var(--green);color:var(--green)}
#amToast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(2rem);background:#8b2500;color:#fff;padding:.6rem 1.4rem;border-radius:20px;font-size:.82rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999}
#amToast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── COMPARE GRID ── */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0}
.compare-box{border-radius:12px;padding:.9rem}
.compare-green{background:var(--green-bg);border:1.5px solid var(--green)}
.compare-gold{background:var(--gold-bg);border:1.5px solid var(--gold)}
.compare-label{font-weight:700;font-size:.76rem;margin-bottom:.55rem;text-transform:uppercase;letter-spacing:.07em}
.compare-green .compare-label{color:var(--green-dark)}
.compare-gold .compare-label{color:#8a6c1a}
.compare-list{list-style:none;font-size:.8rem;color:var(--text2);line-height:2}

/* ── TIMELINE ── */
.tl-wrap{overflow-x:auto;padding:.5rem 0;margin:1rem 0}
.tl{display:flex;align-items:center;min-width:580px;position:relative;padding:1.4rem 0}
.tl-line{position:absolute;left:0;right:0;top:50%;height:3px;background:var(--border);z-index:0}
.tl-ev{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.tl-dot{width:13px;height:13px;border-radius:50%;background:var(--green);border:3px solid var(--surface);box-shadow:0 0 0 2px var(--green);margin:0 auto;transition:transform .2s}
.tl-ev:hover .tl-dot{transform:scale(1.5)}
.tl-lbl{font-size:.67rem;color:var(--text2);margin-top:.45rem;text-align:center;max-width:78px;line-height:1.3}
.tl-yr{font-size:.7rem;font-weight:700;color:var(--green-dark);margin-bottom:.45rem;text-align:center}
.tl-tip{display:none;position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.55rem .8rem;font-size:.76rem;white-space:nowrap;box-shadow:var(--shadow);z-index:10;color:var(--text)}
.tl-ev:hover .tl-tip{display:block}

/* ── DRAG MAP ── */
.drag-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1rem;margin:1rem 0}
.drag-title{font-weight:600;font-size:.88rem;margin-bottom:.7rem;color:var(--text)}
.drag-tokens{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.7rem}
.dtoken{padding:.35rem .75rem;border-radius:20px;background:var(--green-bg);border:1.5px solid var(--green);color:var(--green-dark);font-size:.78rem;font-weight:600;cursor:grab;user-select:none;transition:all .18s}
.dtoken:active{cursor:grabbing;opacity:.65}
.dtoken.used{opacity:.3;pointer-events:none}
.drop-zones{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:.55rem .75rem;min-height:50px;font-size:.76rem;color:var(--text3);transition:all .2s;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.4}
.drop-zone.over{border-color:var(--green);background:var(--green-bg)}
.drop-zone.filled{border-style:solid;border-color:var(--green);background:var(--green-bg);color:var(--green-dark);font-weight:600}
.drop-zone.wrong-fill{border-color:var(--bad);background:var(--bad-bg)}
.chk-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.45rem 1.1rem;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:.6rem}
.rst-btn{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:.45rem 1.1rem;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:.6rem;margin-left:.4rem}
.drag-fb{font-size:.82rem;font-weight:600;margin-top:.5rem;min-height:1.1rem}

/* ── MOBILE ── */
@media(max-width:600px){
  .wcard{padding:1.6rem 1.1rem;border-radius:12px}
  .wtitle{font-size:1.35rem}
  .htitle{display:none}
  .hlogos img{height:20px}
  .hchip{font-size:.63rem;padding:.15rem .45rem;max-width:110px;overflow:hidden;text-overflow:ellipsis}
  .lbody{padding:1.2rem .7rem 3rem}
  .section h2{font-size:1.3rem}
  .civ-grid{grid-template-columns:1fr 1fr}
  .compare-grid{grid-template-columns:1fr}
  .drop-zones{grid-template-columns:1fr}
  .arrow-match-grid{grid-template-columns:1fr 40px 1fr}
  .mcopt{font-size:.83rem;padding:.58rem .7rem}
  .pbody{padding:.75rem}
  .pstmt{font-size:.84rem}
  .callout{padding:.8rem .9rem}
}
</style>
</head>
<body>

<div id="amToast"></div>

<!-- ════ WELCOME ════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitleEl">Agua y Civilización</div>
    <div class="wcourse" id="wcourseEl">Historia · 3° de Secundaria</div>
    <label class="flabel" id="lblNameEl" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lblGroupEl" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <span id="restoreMsg"><strong id="restoreMsg">📂 Sesión guardada encontrada</strong><br>¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Retomar sesión</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Empezar de nuevo</button>
      </div>
    </div>
    <div class="wfoot">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>.lbt{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.1em;fill:var(--green);font-size:28px}.lbl{stroke:var(--gold);stroke-width:2.5}.lba{fill:var(--gold)}</style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════ LESSON ════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle" id="htitleEl">Agua y Civilización</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>.lht{font-family:'Crimson Pro',serif;font-weight:700;letter-spacing:.08em;fill:var(--green);font-size:16px}.lhl{stroke:var(--gold);stroke-width:2}.lha{fill:var(--gold)}</style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

/* ════ ATTEMPT COUNTER ════ */
function getAttemptKey(name,group){return 'liaxa_his3g04__att__'+(name+'__'+group).replace(/\s+/g,'_');}
function nextAttempt(name,group){var k=getAttemptKey(name,group),n=0;try{n=parseInt(localStorage.getItem(k)||'0',10)||0;}catch(e){}n++;try{localStorage.setItem(k,String(n));}catch(e){}return n;}
function currentAttempt(name,group){var k=getAttemptKey(name,group);try{return parseInt(localStorage.getItem(k)||'1',10)||1;}catch(e){return 1;}}

/* ════ SESSION ════ */
function lsKey(){var n=(studentData.name||'').trim(),g=(studentData.group||'').trim();return 'liaxa_his3g04__'+(n+'__'+g).replace(/\s+/g,'_');}
function saveSession(){
  if(!studentData.name)return;
  var drawings=[],texts=[],photos=[];
  problems.forEach(function(p,i){
    var dc=document.getElementById('dc'+i);
    if(dc&&dc.width){var blank=document.createElement('canvas');blank.width=dc.width;blank.height=dc.height;drawings.push(dc.toDataURL()===blank.toDataURL()?null:dc.toDataURL('image/png'));}
    else{drawings.push(null);}
    var ta=document.getElementById('ta'+i);texts.push(ta?ta.value:'');
    var pp=document.getElementById('pp'+i);photos.push((pp&&pp.src&&pp.src.indexOf('data:')===0)?pp.src:null);
  });
  try{localStorage.setItem(lsKey(),JSON.stringify({name:studentData.name,group:studentData.group,answeredCount:answeredCount,correctCount:correctCount,choices:problems.map(function(p){return p.studentChoice;}),drawings:drawings,texts:texts,photos:photos}));}catch(e){}
}
function loadSession(name,group){var key='liaxa_his3g04__'+(name+'__'+group).replace(/\s+/g,'_');try{var r=localStorage.getItem(key);return r?JSON.parse(r):null;}catch(e){return null;}}
function checkForSavedSession(){
  var name=document.getElementById('sName').value.trim(),group=document.getElementById('sGroup').value.trim();
  if(!name||!group){document.getElementById('restoreBar').style.display='none';return;}
  var saved=loadSession(name,group);
  document.getElementById('restoreBar').style.display=(saved&&saved.choices&&saved.choices.some(function(c){return c!==null;}))?'block':'none';
}
function dismissRestore(){document.getElementById('restoreBar').style.display='none';}

/* ════ RNG ════ */
function seededRng(seed){var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function shufflePerm(n,rng){var idx=[];for(var k=0;k<n;k++)idx.push(k);return shuffle(idx,rng);}
function buildBilingualOptions(rawEs,rawEn,rng){var perm=shufflePerm(rawEs.length,rng);return{es:perm.map(function(k){return rawEs[k];}),en:perm.map(function(k){return rawEn[k];}),correctIdx:perm.indexOf(0)};}

  var name=document.getElementById('sName').value.trim(),group=document.getElementById('sGroup').value.trim();
  var err=document.getElementById('startErr');
  if(!name||!group){err.textContent=t('err-fields');return;}

  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});
}

function restoreSession(){
  var name=document.getElementById('sName').value.trim(),group=document.getElementById('sGroup').value.trim();
  var saved=loadSession(name,group);if(!saved)return;
  document.getElementById('restoreBar').style.display='none';
  studentData={name:name,group:group};answeredCount=0;correctCount=0;
  var att=currentAttempt(name,group);
  buildLesson(seededRng(name+group+att));
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('lessonScreen').style.display='block';
  document.getElementById('studentChip').textContent=name+' · '+group;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){obs.observe(s);});

  },300);

/* ════ MC ════ */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){confirmMC(probIdx,chosenIdx);return;}
  prob.pendingChoice=chosenIdx;
  opts.forEach(function(o){o.classList.remove('pending');});
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  prob.studentChoice=chosenIdx;prob.pendingChoice=null;
  var isOk=(chosenIdx===prob.correctIdx);
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
  opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
  var fb=document.getElementById('fb'+probIdx);
  fb.innerHTML='<strong>'+(isOk?t('fb-correct'):t('fb-wrong'))+'</strong> '+prob.explanation[LANG];
  fb.className='mcfb show '+(isOk?'fbok':'fbbad');
  document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
  if(isOk)correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
  saveSession();
  if(answeredCount===problems.length)setTimeout(showResults,700);
}

/* ════ CANVAS ════ */
function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#2e2e28':'#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.scale(dpr,dpr);
  ctx.strokeStyle=SCHOOL.primary;ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});
  canvas.addEventListener('mousemove',onMove,{passive:false});
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp);
  if(tb){
    tb.querySelectorAll('.tbtn2').forEach(function(btn){
      btn.addEventListener('click',function(){
        tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
        ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.lineWidth=2;
        if(btn.classList.contains('bmarker')){ctx.globalAlpha=0.45;ctx.lineWidth=8;}
        if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}
      });
    });
    tb.querySelectorAll('.cdot').forEach(function(dot){
      dot.addEventListener('click',function(){
        tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');
        ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
        tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');
      });
    });
    var clr=tb.querySelector('.clrbtn');
    if(clr)clr.addEventListener('click',function(){var dpr2=window.devicePixelRatio||1;ctx.clearRect(0,0,canvas.width/dpr2,canvas.height/dpr2);});
  }
}

/* ════ ARROW MATCHING WIDGET ════ */
function buildArrowMatch(containerId, leftItems, rightItemsShuffled, pairMap, lang){
  /* pairMap[leftIdx] = rightIdx (correct pair) */
  var wrap=document.getElementById(containerId);if(!wrap)return;
  var selLeft=null,matched={};
  var colors=['am-pair-0','am-pair-1','am-pair-2','am-pair-3'];
  function render(){
    var leftHtml='<div class="am-col-label">'+(lang==='es'?'Civilización':'Civilization')+'</div>';
    leftItems.forEach(function(item,i){
      var cls='am-item'+(matched[i]!==undefined?' done '+colors[matched[i]]:'')+(selLeft===i?' am-sel':'');
      leftHtml+='<div class="'+cls+'" id="aml-'+i+'" onclick="amClickLeft(\''+containerId+'\','+i+')">'+item+'</div>';
    });
    var rightHtml='<div class="am-col-label">'+(lang==='es'?'Tecnología hídrica':'Water tech')+'</div>';
    rightItemsShuffled.forEach(function(item,j){
      var matchedPairIdx=null;
      Object.keys(matched).forEach(function(li){if(matched[li]===j)matchedPairIdx=parseInt(li);});
      var cls='am-item'+(matchedPairIdx!==null?' done '+colors[matchedPairIdx]:'');
      rightHtml+='<div class="'+cls+'" id="amr-'+j+'" onclick="amClickRight(\''+containerId+'\','+j+')">'+item+'</div>';
    });
    var arrowHtml='';
    leftItems.forEach(function(_,i){
      var isMatched=matched[i]!==undefined;
      arrowHtml+='<div class="am-arrow'+(isMatched?' matched':'')+'">'+( isMatched?'✓':'→')+'</div>';
    });
    wrap.innerHTML=
      '<div class="arrow-match-instr">'+(lang==='es'?'Haz clic en una civilización y luego en su tecnología hídrica para conectarlas.':'Click a civilization, then its water technology to connect them.')+'</div>'+
      '<div class="arrow-match-grid">'+
        '<div class="am-col">'+leftHtml+'</div>'+
        '<div class="am-arrows-col">'+arrowHtml+'</div>'+
        '<div class="am-col">'+rightHtml+'</div>'+
      '</div>'+
      '<div class="am-progress" id="'+containerId+'_prog">'+(lang==='es'?'0 de '+leftItems.length+' parejas':'0 of '+leftItems.length+' pairs')+'</div>'+
      '<button class="am-reset" onclick="amReset(\''+containerId+'\')">'+(lang==='es'?'↺ Reiniciar':'↺ Reset')+'</button>';
  }
  render();
  window['_am_'+containerId]={selLeft:null,matched:{},leftItems:leftItems,rightItems:rightItemsShuffled,pairMap:pairMap,colors:colors,lang:lang};
  window.amClickLeft=function(cid,i){
    var st=window['_am_'+cid];if(st.matched[i]!==undefined)return;
    st.selLeft=i;
    document.querySelectorAll('#'+cid+' .am-item').forEach(function(el){el.classList.remove('am-sel');});
    var el=document.getElementById('aml-'+i);if(el)el.classList.add('am-sel');
  };
  window.amClickRight=function(cid,j){
    var st=window['_am_'+cid];if(st.selLeft===null)return;
    var alreadyUsed=Object.values(st.matched).indexOf(j)>=0;
    if(alreadyUsed){showAmToast(LANG==='es'?'Esa tecnología ya tiene pareja':'That technology is already matched');return;}
    var correct=(st.pairMap[st.selLeft]===j);
    if(correct){
      st.matched[st.selLeft]=j;st.selLeft=null;
      var matchCount=Object.keys(st.matched).length;
      var progEl=document.getElementById(cid+'_prog');
      if(progEl)progEl.textContent=(LANG==='es'?matchCount+' de '+st.leftItems.length+' parejas':matchCount+' of '+st.leftItems.length+' pairs');
      rebuildAmWidget(cid);
      if(matchCount===st.leftItems.length){
        var progEl2=document.getElementById(cid+'_prog');
        if(progEl2)progEl2.textContent='🎉 '+(LANG==='es'?'¡Todas las parejas correctas!':'All pairs matched!');
      }
    } else {
      var lEl=document.getElementById('aml-'+st.selLeft);
      var rEl=document.getElementById('amr-'+j);
      if(lEl)lEl.classList.add('wrong');if(rEl)rEl.classList.add('wrong');
      setTimeout(function(){if(lEl)lEl.classList.remove('wrong','am-sel');if(rEl)rEl.classList.remove('wrong');st.selLeft=null;},500);
      showAmToast(LANG==='es'?'Esa pareja no es correcta. Inténtalo de nuevo.':'That pair is incorrect. Try again.');
    }
  };
  window.amReset=function(cid){
    var st=window['_am_'+cid];st.matched={};st.selLeft=null;rebuildAmWidget(cid);
    var progEl=document.getElementById(cid+'_prog');
    if(progEl)progEl.textContent=(LANG==='es'?'0 de '+st.leftItems.length+' parejas':'0 of '+st.leftItems.length+' pairs');
  };
  function rebuildAmWidget(cid){
    var st=window['_am_'+cid];
    var leftHtml='<div class="am-col-label">'+(LANG==='es'?'Civilización':'Civilization')+'</div>';
    st.leftItems.forEach(function(item,i){
      var matched=st.matched[i]!==undefined;
      var sel=st.selLeft===i;
      var cls='am-item'+(matched?' done '+st.colors[i]:'')+(sel?' am-sel':'');
      leftHtml+='<div class="'+cls+'" id="aml-'+i+'" onclick="amClickLeft(\''+cid+'\','+i+')">'+item+'</div>';
    });
    var rightHtml='<div class="am-col-label">'+(LANG==='es'?'Tecnología hídrica':'Water tech')+'</div>';
    st.rightItems.forEach(function(item,j){
      var matchedLi=null;
      Object.keys(st.matched).forEach(function(li){if(st.matched[li]===j)matchedLi=parseInt(li);});
      var cls='am-item'+(matchedLi!==null?' done '+st.colors[matchedLi]:'');
      rightHtml+='<div class="'+cls+'" id="amr-'+j+'" onclick="amClickRight(\''+cid+'\','+j+')">'+item+'</div>';
    });
    var arrowHtml='';
    st.leftItems.forEach(function(_,i){
      var isMatched=st.matched[i]!==undefined;
      arrowHtml+='<div class="am-arrow'+(isMatched?' matched':'')+'">'+( isMatched?'✓':'→')+'</div>';
    });

      explEs:'Los fósiles de homínidos más antiguos tienen más de 4 millones de años; las primeras civilizaciones surgieron hace apenas 5,000. Hubo un larguísimo período nómada antes de las ciudades.',
      explEn:'The oldest hominin fossils are over 4 million years old; the first civilizations appeared only 5,000 years ago. A very long nomadic period preceded cities.'
    }
  ];
  var pv4=pick(p4bank,rng);
  var bo4=buildBilingualOptions(pv4.optsEsRaw,pv4.optsEnRaw,rng);
  problems.push({title:pv4.title,questionText:pv4.questionText,showWork:pv4.showWork,options:bo4,correctIdx:bo4.correctIdx,hint:{es:pv4.hintEs,en:pv4.hintEn},explanation:{es:pv4.explEs,en:pv4.explEn},studentChoice:null,pendingChoice:null});
  buildOneCard(problems[3],3);

  /* ═══ SECTION 5: Drag map ═══ */
  var sec5=document.createElement('div');sec5.className='section';

    '<div class="stag">'+(LANG==='es'?'GEOGRAFÍA':'GEOGRAPHY')+'</div>'+
    '<h2>'+(LANG==='es'?'Ubica las Civilizaciones en el Mapa':'Place Civilizations on the Map')+'</h2>'+
    '<p>'+(LANG==='es'?'La geografía no es solo un dato — es la razón de muchas decisiones históricas. Arrastra cada civilización a su región geográfica.':'Geography isn\'t just data — it\'s the reason behind many historical decisions. Drag each civilization to its geographic region.')+'</p>';
  var dragHTML='<div class="drag-wrap"><div class="drag-title">'+(LANG==='es'?'Arrastra a su región:':'Drag to its region:')+'</div><div class="drag-tokens" id="dragTokens">';

  dragHTML+='</div><div class="drop-zones" id="dropZones">';
  dragZones.forEach(function(zone,i){dragHTML+='<div class="drop-zone" id="dropzone-'+i+'" data-zone="'+i+'" data-label="'+zone+'">'+zone+'</div>';});
  dragHTML+='</div><div><button class="chk-btn" onclick="checkDrag()">'+(LANG==='es'?'Verificar':'Check')+'</button><button class="rst-btn" onclick="resetDrag()">'+(LANG==='es'?'Reiniciar':'Reset')+'</button></div><div class="drag-fb" id="drag-fb"></div></div>';

  _dropState={};
  setTimeout(function(){
    document.querySelectorAll('.dtoken').forEach(function(tok){
      tok.addEventListener('dragstart',function(e){e.dataTransfer.setData('text/plain',tok.dataset.idx);tok.style.opacity='.5';});
      tok.addEventListener('dragend',function(){tok.style.opacity='1';});
    });
    document.querySelectorAll('.drop-zone').forEach(function(zone){
      zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('over');});
      zone.addEventListener('dragleave',function(){zone.classList.remove('over');});
      zone.addEventListener('drop',function(e){
        e.preventDefault();zone.classList.remove('over');
        var ti=e.dataTransfer.getData('text/plain');var zi=zone.getAttribute('data-zone');
        Object.keys(_dropState).forEach(function(z){if(_dropState[z]===ti){delete _dropState[z];var oz=document.getElementById('dropzone-'+z);if(oz){oz.textContent=oz.getAttribute('data-label');oz.classList.remove('filled','wrong-fill');}}});
        _dropState[zi]=ti;zone.textContent=dragTokens[parseInt(ti)];
        zone.classList.add('filled');zone.classList.remove('wrong-fill');
        document.querySelectorAll('.dtoken').forEach(function(tk){tk.classList.toggle('used',Object.values(_dropState).indexOf(tk.dataset.idx)>=0);});
      });
    });
  },60);
  window.checkDrag=function(){
    var c=0;
    document.querySelectorAll('.drop-zone').forEach(function(z,i){
      var zi=z.getAttribute('data-zone');var ti=_dropState[zi];
      if(ti!==undefined){if(parseInt(ti)===i){c++;z.classList.remove('wrong-fill');}else{z.classList.add('wrong-fill');}}
    });
    var fb=document.getElementById('drag-fb');
    if(c===4){fb.textContent='🎉 '+(LANG==='es'?'¡Perfecto!':'Perfect!');fb.style.color='var(--ok)';}
    else{fb.textContent=c+' / 4 '+(LANG==='es'?'correctas. Revisa las rojas.':'correct. Check the red ones.');fb.style.color='var(--bad)';}
  };
  window.resetDrag=function(){
    _dropState={};
    document.querySelectorAll('.dtoken').forEach(function(tk){tk.classList.remove('used');});
    document.querySelectorAll('.drop-zone').forEach(function(z){z.textContent=z.getAttribute('data-label');z.classList.remove('filled','wrong-fill');});
    document.getElementById('drag-fb').textContent='';
  };

  /* ─ PROBLEMS 5–10: Assessment ─ */
  var assessBank=[
    {
      title:{es:'Código de Hammurabi',en:'Code of Hammurabi'},
      questionText:{es:'El <strong>Código de Hammurabi</strong> fue uno de los primeros conjuntos de leyes escritas. Su existencia demuestra que Babilonia…',en:'The <strong>Code of Hammurabi</strong> was one of the first written law codes. Its existence shows Babylon…'},
      showWork:false,
      optsEsRaw:['Había desarrollado un Estado organizado capaz de codificar y aplicar normas','Era la única civilización sin conflictos internos','Solo existía como sociedad oral sin escritura','No tenía diferencias sociales entre sus habitantes'],
      optsEnRaw:['Had developed an organized state capable of codifying and enforcing norms','Was the only civilization without internal conflicts','Only existed as an oral society without writing','Had no social differences among its inhabitants'],
      hintEs:'¿Para qué sirven las leyes escritas? ¿Qué tipo de sociedad las necesita?',hintEn:'What are written laws for? What kind of society needs them?',
      explEs:'Un código de leyes escritas implica escritura, un Estado con autoridad y una sociedad compleja con conflictos que resolver. Hammurabi usó este código para centralizar el poder.',
      explEn:'A written law code implies writing, a state with authority, and a complex society with conflicts to resolve. Hammurabi used this code to centralize power.'
    },
    {
      title:{es:'Las pirámides de Egipto',en:'Egyptian pyramids'},
      questionText:{es:'Las <strong>pirámides de Egipto</strong> requerían decenas de miles de trabajadores durante décadas. ¿Qué condición económica lo hizo posible?',en:'Egypt\'s <strong>pyramids</strong> required tens of thousands of workers for decades. What economic condition made this possible?'},
      showWork:false,
      optsEsRaw:['Un excedente agrícola enorme que permitía liberar trabajadores de la producción de alimentos','Que todos los egipcios eran esclavos sin pago','La importación masiva de alimentos del exterior','Tecnología secreta que reducía la cantidad de trabajadores'],
      optsEnRaw:['A massive agricultural surplus that freed workers from food production','That all Egyptians were unpaid slaves','Massive food imports from abroad','Secret technology that reduced the number of workers'],
      hintEs:'Si miles de personas construyen sin producir alimentos, ¿quién los alimenta?',hintEn:'If thousands of people build without growing food, who feeds them?',
      explEs:'El excedente del Nilo permitía al Estado destinar miles de trabajadores (muchos pagados, no esclavos) a construir monumentos mientras otros seguían produciendo alimentos.',
      explEn:'The Nile surplus allowed the state to dedicate thousands of workers (many paid, not slaves) to building monuments while others continued producing food.'
    },
    {
      title:{es:'La escritura cuneiforme',en:'Cuneiform writing'},
      questionText:{es:'¿Por qué la invención de la <strong>escritura cuneiforme</strong> fue tan importante?',en:'Why was the invention of <strong>cuneiform writing</strong> so important?'},
      showWork:false,
      optsEsRaw:['Permitía registrar comercio, leyes, impuestos e historia con precisión','Solo decoraba templos y palacios reales','Era exclusivamente religiosa y no tenía uso práctico','Fue inventada para competir militarmente con Egipto'],
      optsEnRaw:['It allowed recording trade, laws, taxes, and history with precision','It only decorated temples and royal palaces','It was exclusively religious with no practical use','It was invented to compete militarily with Egypt'],
      hintEs:'¿Qué pasa cuando no hay registro escrito de una transacción económica?',hintEn:'What happens when there\'s no written record of an economic transaction?',
      explEs:'La escritura surgió de necesidades prácticas: registrar el grano en almacenes, deudas y leyes. Esta capacidad transformó cómo funcionaban las civilizaciones.',
      explEn:'Writing arose from practical needs: recording grain in storehouses, debts, and laws. This ability transformed how civilizations functioned.'
    },
    {

      showWork:false,
      optsEsRaw:['Una sociedad jerárquica facilitaba coordinar grandes obras de ingeniería hídrica','Confucio era ingeniero hidráulico antes de filósofo','El confucianismo prohibía usar el agua para riego','El Huang He no requería ninguna organización colectiva'],
      optsEnRaw:['A hierarchical society facilitated coordinating large water engineering works','Confucius was a hydraulic engineer before becoming a philosopher','Confucianism prohibited using water for irrigation','The Yellow River required no collective organization'],
      hintEs:'Para construir un gran dique necesitas miles de personas coordinadas. ¿Qué tipo de sociedad facilita eso?',hintEn:'To build a large dike you need thousands of coordinated people. What type of society facilitates that?',
      explEs:'El control del Huang He requería obras colosales que exigían decenas de miles de personas coordinadas — lo que algunos historiadores llaman "despotismo hidráulico".',

    {

      questionText:{es:'Un historiador afirma que el éxito de estas civilizaciones dependía principalmente de su capacidad para gestionar el agua. ¿Cómo evaluarías esta afirmación?',en:'A historian claims the success of these civilizations depended mainly on their ability to manage water. How would you evaluate this claim?'},

      optsEsRaw:['Es una hipótesis razonable: todas surgieron en cuencas fluviales y dependían del agua para la agricultura','Es completamente falsa: la religión fue el único factor determinante','Es válida solo para Egipto y no para las demás','Es una exageración sin ningún fundamento histórico'],

      explEs:'El eje del agua es una herramienta analítica poderosa: no el único factor, pero sí fundamental. Todas las civilizaciones estudiadas surgieron junto a ríos porque el agua fértil y controlable hacía posible la agricultura intensiva y la organización estatal.',
      explEn:'The water axis is a powerful analytical tool: not the only factor, but fundamental. All studied civilizations arose next to rivers because controllable, fertile water made intensive agriculture and state organization possible.'
    },
    {
      title:{es:'Conclusión comparativa',en:'Comparative conclusion'},
      questionText:{es:'Comparando las cuatro civilizaciones, ¿cuál es la conclusión histórica más sólida?',en:'Comparing the four civilizations, which historical conclusion is most solid?'},
      showWork:false,
      optsEsRaw:['El río fue el elemento geográfico más determinante en el surgimiento de estas civilizaciones','Las civilizaciones se habrían desarrollado igual sin importar su ubicación geográfica','China fue la más importante porque desarrolló más inventos tecnológicos','Egipto fue la única civilización verdaderamente organizada de la antigüedad'],

  var shuffledA=shuffle(assessBank,rng);
  shuffledA.forEach(function(ap,i){
    var pidx=4+i;
    var bo=buildBilingualOptions(ap.optsEsRaw,ap.optsEnRaw,rng);
    problems.push({title:ap.title,questionText:ap.questionText,showWork:ap.showWork,options:bo,correctIdx:bo.correctIdx,hint:{es:ap.hintEs,en:ap.hintEn},explanation:{es:ap.explEs,en:ap.explEn},studentChoice:null,pendingChoice:null});
    buildOneCard(problems[pidx],pidx);
  });
}
