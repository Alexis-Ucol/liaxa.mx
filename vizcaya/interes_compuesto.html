<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interés Compuesto — Colegio Vizcaya</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:#78001e; --green-dark:#4a0012; --green-bg:#f5e8ea;
  --gold:#1a1a16;  --gold-bg:#efefef;
  --bg:#f5f7fa;    --surface:#ffffff;    --surface2:#edf0f5;
  --border:#d4d9e3; --text:#141820;      --text2:#3a4050; --text3:#6a7080;
  --ok:#1a6a4a;    --ok-bg:rgba(26,106,74,.10);
  --bad:#b03010;   --bad-bg:rgba(176,48,16,.08);
  --shadow:0 4px 24px rgba(120,0,30,.13);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green:#b03050; --green-dark:#d06080;
  --green-bg:#2a0810; --gold:#d0ccc4; --gold-bg:#2a2a28;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
  --shadow:0 4px 24px rgba(0,0,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

/* ── WELCOME ── */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.wlogos img{height:110px;width:auto;object-fit:contain;max-width:100%}
.hlogos{display:flex;gap:.5rem;align-items:center}
.hlogos img{height:26px;width:auto}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:1.6rem 1.8rem 2rem;width:100%;max-width:460px;text-align:center;border-top:4px solid var(--gold)}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.75rem;font-weight:700;margin-bottom:.3rem;color:var(--green)}
.wsubtitle{font-size:.8rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot-liaxa{display:flex;justify-content:center;align-items:center;padding-top:1.2rem;margin-top:1.2rem;border-top:1px solid var(--border)}
#restoreBar{display:none;margin-top:.8rem;background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:.7rem .9rem;font-size:.82rem;text-align:left}
.rbar-btns{display:flex;gap:.5rem;margin-top:.5rem}
.rbtn{padding:.35rem .85rem;border-radius:6px;font-size:.8rem;cursor:pointer;font-weight:600;border:none}
.rbtn-yes{background:var(--green);color:#fff}
.rbtn-no{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ── LESSON ── */
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.halexis{flex:1;display:flex;justify-content:center;align-items:center}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;font-weight:600}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--gold);width:0%;transition:width .4s}

/* ── CONTENT ── */
.lbody{max-width:780px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;color:var(--green)}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout p{margin-bottom:0;color:var(--text2)}
.callout strong{color:var(--green)}

/* ── FORMULA BOX ── */
.formula-box{background:var(--surface);border:2px solid var(--green);border-radius:12px;padding:1.2rem 1.5rem;margin:1rem 0;text-align:center}
.formula-main{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--green);letter-spacing:.03em;margin-bottom:.5rem}
.formula-legend{display:flex;flex-wrap:wrap;gap:.5rem .9rem;justify-content:center;margin-top:.6rem}
.fl-item{font-size:.78rem;color:var(--text3)}
.fl-item strong{color:var(--green);font-family:'IBM Plex Mono',monospace}

/* ── MONEY MACHINE (compound interest visualizer) ── */
.machine-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.4rem;margin:1rem 0;overflow:hidden}
.machine-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:600;margin-bottom:1rem}
.machine-controls{display:grid;grid-template-columns:1fr 1fr;gap:.9rem 1.2rem;margin-bottom:1.2rem}
@media(max-width:480px){.machine-controls{grid-template-columns:1fr}}
.mc-group label{display:block;font-size:.75rem;color:var(--text3);margin-bottom:.3rem;font-weight:500}
.mc-group input[type=range]{width:100%;accent-color:var(--green);margin-bottom:.15rem}
.mc-val{font-family:'IBM Plex Mono',monospace;font-size:.88rem;font-weight:700;color:var(--green)}
.machine-display{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.1rem}
@media(max-width:440px){.machine-display{grid-template-columns:1fr}}
.md-card{background:var(--surface2);border-radius:10px;padding:.8rem 1rem;border-top:3px solid var(--gold)}
.md-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.2rem}
.md-value{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--green)}
.md-sub{font-size:.72rem;color:var(--text3);margin-top:.1rem}
.compound-canvas{display:block;width:100%;height:180px;border-radius:8px;border:1px solid var(--border);background:var(--surface)}
.ci-eq{font-family:'IBM Plex Mono',monospace;font-size:.9rem;font-weight:600;color:var(--green);text-align:center;margin:.6rem 0 .2rem;background:var(--green-bg);padding:.5rem;border-radius:8px}

/* ── TIME MACHINE (money time travel widget) ── */
.timemachine{background:linear-gradient(135deg,#2a3f6a 0%,#1B2B52 100%);border-radius:16px;padding:1.5rem;margin:1rem 0;color:#fff;position:relative;overflow:hidden}
.timemachine::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(232,160,32,.15);pointer-events:none}
.tm-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;opacity:.7;margin-bottom:.8rem;font-weight:600}
.tm-row{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.8rem}
.tm-input{width:90px;padding:.45rem .6rem;border:1.5px solid rgba(255,255,255,.4);border-radius:8px;font-size:.95rem;text-align:center;font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,.18);color:#fff}
.tm-input:focus{outline:none;border-color:#E8A020}
.tm-input::placeholder{color:rgba(255,255,255,.5)}
.tm-label{font-size:.8rem;opacity:.9}
.tm-arrow{font-size:1.4rem;opacity:.8}
.tm-result{background:rgba(255,255,255,.12);border-radius:10px;padding:.9rem 1.1rem;margin-top:.5rem;display:flex;align-items:center;gap:.9rem;flex-wrap:wrap}
.tm-amount{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--gold)}
.tm-detail{font-size:.78rem;opacity:.7;line-height:1.5}
.tm-btn{background:#E8A020;color:#1B2B52;border:none;border-radius:8px;padding:.48rem 1.1rem;font-size:.85rem;cursor:pointer;font-weight:700;transition:all .15s}
.tm-btn:hover{background:#f0b840}

/* ── RULE OF 72 EXPLORER ── */
.r72-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1rem 0}
.r72-slider-row{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap}
.r72-slider-row label{font-size:.78rem;color:var(--text3);white-space:nowrap}
.r72-slider-row input{flex:1;min-width:120px;accent-color:var(--gold)}
.r72-result{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;margin-top:.7rem}
@media(max-width:440px){.r72-result{grid-template-columns:1fr}}
.r72-card{text-align:center;background:var(--surface2);border-radius:10px;padding:.75rem;border-bottom:3px solid var(--gold)}
.r72-num{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--green)}
.r72-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-top:.2rem}

/* ── STEP REVEAL ── */
.steps-box{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:1rem 0}
.step-row{display:flex;align-items:baseline;gap:.8rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);background:var(--surface);opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s}
.step-row:last-child{border-bottom:none}
.step-row.shown{opacity:1;transform:none}
.step-num{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);flex-shrink:0;width:52px}
.step-math{font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--green);font-weight:600}
.step-why{font-size:.78rem;color:var(--text2);margin-left:.5rem}
.step-next-btn{display:block;width:100%;padding:.6rem;background:var(--green-bg);border:none;border-top:1px solid var(--border);font-size:.82rem;color:var(--green);cursor:pointer;font-weight:600;transition:background .15s}
.step-next-btn:hover{background:var(--gold-bg)}
.step-next-btn:disabled{opacity:.4;cursor:default}

/* ── PROBLEM CARDS ── */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)}
.pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;color:var(--text2)}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--green);margin-top:.4rem;font-weight:600}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg)}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok)}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--amber-dark);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;font-weight:600}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green)}
.wpanel{display:none}
.wpanel.active{display:block}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:160px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.wtextarea{width:100%;min-height:110px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical}
.wtextarea:focus{outline:none;border-color:var(--green)}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.2rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s}
.pzone:hover{border-color:var(--green)}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pzicon{font-size:1.7rem;margin-bottom:.35rem}
.pztxt{font-size:.8rem;color:var(--text3)}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:260px;object-fit:contain}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}

/* ── CSS FRACTIONS ── */
.mf-outer{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .18rem;line-height:1.1}
.mf-num{border-bottom:2px solid currentColor;padding:0 .2em .05em;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700}
.mf-den{padding:.05em .2em 0;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700}
.mf-row{display:inline-flex;align-items:center;gap:.25rem;font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--green-dark);font-weight:600}
</style>
</head>

<script>
/* ════ STATE ════ */
var studentData   = {};
var problems      = [];
var answeredCount = 0;
var correctCount  = 0;
var LS_PREFIX = 'vizcaya_interes_compuesto';

/* ════ SESSION PERSISTENCE ════ */
function lsKey() {
  var n = (studentData.name  || '').trim();
  var g = (studentData.group || '').trim();
  return LS_PREFIX + '__' + (n + '__' + g).replace(/\s+/g, '_');
}
function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = LS_PREFIX + '__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function checkForSavedSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var bar   = document.getElementById('restoreBar');
  if (name && group && loadSession(name, group)) { bar.style.display = 'block'; }
  else { bar.style.display = 'none'; }
}
function dismissRestore() { document.getElementById('restoreBar').style.display = 'none'; }
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  setupObserver();
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc) return;
        var img = new Image();
        img.onload = function() {
          var ctx = dc.getContext('2d');
          var dpr = window.devicePixelRatio || 1;
          ctx.drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(t, i) {
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = t;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(src, i) {
        if (!src) return;
        var pp = document.getElementById('pp' + i);
        if (pp) { pp.src = src; pp.style.display = 'block'; }
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 400);
}

/* ════ RNG ════ */
function seededRng(seed) {
  var h = 0;
  for (var i = 0; i < seed.length; i++) h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0;
  return function() { h ^= h << 13; h ^= h >> 17; h ^= h << 5; return ((h >>> 0) / 4294967296); };
}
function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(rng, arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

/* ════ THEME ════ */
function toggleTheme() {
  var d = document.documentElement;
  var dark = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  redrawMachineChart();
}

/* ════ START ════ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor ingresa tu nombre y grupo.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  setupObserver();
}
function setupObserver() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('vis'); updateProgress(); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ════ PROGRESS ════ */
function updateProgress() {
  var total = document.querySelectorAll('.section').length;
  var vis   = document.querySelectorAll('.section.vis').length;
  document.getElementById('progFill').style.width = Math.round(vis / total * 100) + '%';
}

/* ════ DRAWING ════ */
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#78001e'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) { var r=canvas.getBoundingClientRect(); var s=e.touches?e.touches[0]:e; return [s.clientX-r.left, s.clientY-r.top]; }
  function onDown(e) { e.preventDefault(); drawing=true; var p=getPos(e); lx=p[0]; ly=p[1]; }
  function onMove(e) { e.preventDefault(); if(!drawing) return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()    { drawing=false; saveSession(); }
  canvas.addEventListener('mousedown', onDown, {passive:false});
  canvas.addEventListener('mousemove', onMove, {passive:false});
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on'); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth=2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth=10; ctx.globalAlpha=0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d){ d.classList.remove('sel'); });
      dot.classList.add('sel'); ctx.strokeStyle=dot.dataset.color; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b){ b.classList.remove('on'); }); tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function(){ ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr); });
}
function handlePhoto(idx, input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) { var img=document.getElementById('pp'+idx); img.src=e.target.result; img.style.display='block'; document.getElementById('pz'+idx).style.opacity='0.4'; saveSession(); };
  reader.readAsDataURL(input.files[0]);
}
function toggleHint(idx) { document.getElementById('hint'+idx).classList.toggle('show'); }

/* ════ MACHINE CHART (global reference) ════ */
var machineChartCallback = null;
function redrawMachineChart() { if (machineChartCallback) machineChartCallback(); }

/* ════ BUILD LESSON ════ */
function buildLesson(rng) {
  var body = document.getElementById('lessonBody');
  body.innerHTML = '';

  /* ── SECTION 1: Concepto ── */
  var s1 = document.createElement('div');
  s1.className = 'section'; s1.id = 's1';
  s1.innerHTML =
    '<div class="stag">Concepto Clave</div>' +
    '<h2>¿Qué es el interés compuesto?</h2>' +
    '<p>Cuando ahorras dinero en un banco, el banco te paga por usarlo. Ese pago se llama <strong>interés</strong>. Con el interés simple, solo ganas sobre tu dinero original. Con el <strong>interés compuesto</strong>, ganas también sobre los intereses que ya ganaste.</p>' +
    '<div class="callout"><p>💡 Einstein supuestamente dijo que el interés compuesto es <strong>"la octava maravilla del mundo"</strong>: quien lo entiende lo gana, quien no lo entiende lo paga.</p></div>' +

/* ════ MACHINE ════ */
var nMap = [1, 12, 52, 365];
var nLabMap = ['Anual', 'Mensual', 'Semanal', 'Diaria'];
function updateMachine() {
  var P = parseFloat(document.getElementById('mr_p').value);
  var r = parseFloat(document.getElementById('mr_r').value) / 100;
  var t = parseFloat(document.getElementById('mr_t').value);
  var ni = parseInt(document.getElementById('mr_n').value);
  var n = nMap[ni];
  var A = P * Math.pow(1 + r/n, n*t);
  var I = A - P;
  var doublings = A / P;

  document.getElementById('mv_p').textContent = '$' + P.toLocaleString('es-MX');
  document.getElementById('mv_r').textContent = (r*100).toFixed(1) + '%';
  document.getElementById('mv_t').textContent = t + ' año' + (t > 1 ? 's' : '');
  document.getElementById('mv_n').textContent = nLabMap[ni];
  document.getElementById('md_p').textContent = '$' + P.toLocaleString('es-MX');
  document.getElementById('md_a').textContent = '$' + A.toLocaleString('es-MX', {maximumFractionDigits:0});
  document.getElementById('md_i').textContent = '$' + I.toLocaleString('es-MX', {maximumFractionDigits:0});
  document.getElementById('md_ip').textContent = '+' + ((I/P)*100).toFixed(0) + '% de ganancia';
  document.getElementById('md_d').textContent = doublings.toFixed(1) + '×';

  var rD = (r*100).toFixed(1);
  document.getElementById('ci_eq').textContent =
    'A = $' + P.toLocaleString('es-MX') + ' × (1 + ' + rD + '%/' + n + ')^(' + n + '×' + t + ') = $' + A.toLocaleString('es-MX', {maximumFractionDigits:0});

  drawMachineChart(P, r, n, t);
}
function initMachine() {
  machineChartCallback = function() { updateMachine(); };
  updateMachine();
}
function drawMachineChart(P, r, n, t) {
  var canvas = document.getElementById('machineCanvas');
  if (!canvas) return;
  var W = canvas.parentElement.clientWidth || 600;
  var H = 180;
  var dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var bgColor = dark ? '#1e2030' : '#ffffff';
  var borderColor = dark ? '#343650' : '#d4d9e3';
  var textColor = dark ? '#a8a4b0' : '#6a7080';

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  var steps = Math.min(t, 40);
  var pad = { l: 54, r: 14, t: 14, b: 28 };
  var cW = W - pad.l - pad.r;
  var cH = H - pad.t - pad.b;

  // compute max for scale
  var maxA = P * Math.pow(1 + r/n, n*steps);
  var yScale = cH / maxA;

  // Draw gridlines
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 0.5;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.t + cH - (g / 4) * cH;
    ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(pad.l + cW, gy); ctx.stroke();
    var label = '$' + Math.round(maxA * g / 4).toLocaleString('es-MX', {notation:'compact'});
    ctx.fillStyle = textColor; ctx.font = '9px IBM Plex Sans, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(label, pad.l - 4, gy + 3);
  }

  // Principal line (flat)
  ctx.beginPath();
  ctx.strokeStyle = dark ? '#b03050' : '#78001e';
  ctx.setLineDash([5, 3]);
  ctx.lineWidth = 1.5;
  ctx.moveTo(pad.l, pad.t + cH - P * yScale);
  ctx.lineTo(pad.l + cW, pad.t + cH - P * yScale);
  ctx.stroke();
  ctx.setLineDash([]);

  // Compound area fill
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t + cH);
  for (var xi = 0; xi <= steps; xi++) {
    var yr = P * Math.pow(1 + r/n, n * xi);
    var xp = pad.l + (xi / steps) * cW;
    var yp = pad.t + cH - yr * yScale;
    ctx.lineTo(xp, yp);
  }
  ctx.lineTo(pad.l + cW, pad.t + cH);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + cH);
  grad.addColorStop(0, 'rgba(232,160,32,0.55)');
  grad.addColorStop(1, 'rgba(232,160,32,0.05)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Compound line
  ctx.beginPath();
  ctx.strokeStyle = '#E8A020';
  ctx.lineWidth = 2.5;
  for (var xi2 = 0; xi2 <= steps; xi2++) {
    var yr2 = P * Math.pow(1 + r/n, n * xi2);
    var xp2 = pad.l + (xi2 / steps) * cW;
    var yp2 = pad.t + cH - yr2 * yScale;
    xi2 === 0 ? ctx.moveTo(xp2, yp2) : ctx.lineTo(xp2, yp2);
  }
  ctx.stroke();

  // X-axis labels
  ctx.fillStyle = textColor; ctx.textAlign = 'center'; ctx.font = '9px IBM Plex Sans, sans-serif';
  var labelStep = Math.ceil(steps / 8);
  for (var xi3 = 0; xi3 <= steps; xi3 += labelStep) {
    var xp3 = pad.l + (xi3 / steps) * cW;
    ctx.fillText('a' + xi3, xp3, H - 6);
  }

  // Legend
  ctx.textAlign = 'left'; ctx.font = '9px IBM Plex Sans, sans-serif';
  ctx.fillStyle = dark ? '#6080c8' : '#1B2B52';
  ctx.fillText('— Capital original', pad.l + 4, pad.t + 10);
  ctx.fillStyle = '#E8A020';
  ctx.fillText('── Monto compuesto', pad.l + 100, pad.t + 10);
}

/* ════ RULE OF 72 ════ */
function updateR72() {
  var r = parseFloat(document.getElementById('r72_slider').value);
  document.getElementById('r72_val').textContent = r + '%';
  document.getElementById('r72_years').textContent = (72 / r).toFixed(1);
  document.getElementById('r72_triple').textContent = (114 / r).toFixed(1);
  document.getElementById('r72_ten').textContent = (240 / r).toFixed(1);
}

/* ════ TIME MACHINE CALC ════ */
function calcTimeMachine() {
  var P = parseFloat(document.getElementById('tm_p').value) || 0;
  var r = parseFloat(document.getElementById('tm_r').value) / 100 || 0;
  var t = parseFloat(document.getElementById('tm_t').value) || 0;
  if (!P || !r || !t) return;
  var A = P * Math.pow(1 + r, t); // annual compounding
  var I = A - P;
  var res = document.getElementById('tm_result');
  document.getElementById('tm_amount').textContent = '$' + A.toLocaleString('es-MX', {maximumFractionDigits:0});
  document.getElementById('tm_detail').innerHTML =
    'Capital original: $' + P.toLocaleString('es-MX', {maximumFractionDigits:0}) + '<br>' +
    'Intereses ganados: $' + I.toLocaleString('es-MX', {maximumFractionDigits:0}) + '<br>' +
    'Crecimiento: ' + ((A/P - 1)*100).toFixed(0) + '% en ' + t + ' años';
  res.style.display = 'flex';
}

/* ════ STEP REVEAL ════ */
function showNextStep(secId) {
  var key = 'steps' + secId;
  var data = window[key + 'Data'];
  var shown = window[key + 'Shown'];
  if (!data || shown >= data.length) return;
  var box = document.getElementById('steps' + secId);
  var row = document.createElement('div');
  row.className = 'step-row';
  row.innerHTML = '<span class="step-num">' + data[shown].num + '</span><span class="step-math">' + data[shown].math + '</span><span class="step-why">' + data[shown].why + '</span>';
  box.appendChild(row);
  setTimeout(function() { row.classList.add('shown'); }, 30);
  window[key + 'Shown']++;
  var btn = document.getElementById('snext' + secId);
  if (window[key + 'Shown'] >= data.length) {
    btn.textContent = '✓ Procedimiento completo';
    btn.disabled = true;
  } else {
    btn.textContent = 'Ver paso ' + (window[key + 'Shown'] + 1) + ' →';
  }
}

/* ════ MULTIPLE CHOICE ════ */
function confirmMC(probIdx, choiceIdx) {
  var p = problems[probIdx];
  if (p.studentChoice !== null && p.studentChoice !== undefined) return;
  p.studentChoice = choiceIdx;
  var card = document.getElementById('pc' + probIdx);
  var opts = card.querySelectorAll('.mcopt');
  var fb   = document.getElementById('fb' + probIdx);
  opts.forEach(function(o) { o.classList.add('dis'); });
  if (choiceIdx === p.correctIdx) {
    opts[choiceIdx].classList.add('sc');
    fb.textContent = '✓ Correcto. ' + (p.explanation || '');
    fb.className = 'mcfb show fbok';
    correctCount++;
    card.classList.add('ok');
  } else {
    opts[choiceIdx].classList.add('sw');
    opts[p.correctIdx].classList.add('rc');
    fb.textContent = '✗ Incorrecto. La respuesta correcta es: ' + p.options[p.correctIdx] + '. ' + (p.explanation || '');
    fb.className = 'mcfb show fbbad';
    card.classList.add('bad');
  }
  answeredCount++;
  saveSession();
  if (answeredCount === problems.length) {
    document.getElementById('s_results').classList.add('vis');
  }
}


function switchTab(idx, panel, btn) {
  var prefix='wp_'+idx+'_';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(prefix+panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

/* ════ PROBLEM POOL ════ */
function makeProblemPool(rng) {
  // Pick randomized parameters
  var capitals = [5000, 8000, 10000, 15000, 20000, 30000, 50000];
  var rates    = [5, 6, 7, 8, 9, 10, 12, 15];
  var years    = [2, 3, 5, 8, 10, 15, 20];

  function ci(P, r, n, t) { return P * Math.pow(1 + r/(n*100), n*t); }
  function fmt(x) { return '$' + x.toLocaleString('es-MX', {maximumFractionDigits:2}); }
  function wrong(correct, spread) {
    var v = correct;
    var opts = [fmt(correct)];
    var diffs = [correct * (0.85 + rng()*0.1), correct * (1.05 + rng()*0.1), correct * (1.12 + rng()*0.15)];
    diffs.forEach(function(d) { opts.push(fmt(d)); });
    return opts;
  }

  var P1 = pick(rng, capitals), r1 = pick(rng, rates), t1 = pick(rng, years);
  var a1 = ci(P1, r1, 1, t1);

  var P2 = pick(rng, capitals), r2 = pick(rng, rates), t2 = pick(rng, [3,5,10]);
  var a2_mensual = ci(P2, r2, 12, t2);
  var a2_simple  = P2 * (1 + r2/100 * t2);

  var P3 = pick(rng, capitals), r3 = pick(rng, [6,8,9,12]), t3 = pick(rng, [5,10,15,20]);
  var a3 = ci(P3, r3, 4, t3);
  var intereses3 = a3 - P3;

  var P4 = pick(rng, [10000, 20000, 50000]), r4 = pick(rng, [6,8,12]);
  var years4 = Math.round(72 / r4);
  var wrong4a = years4 + pick(rng, [2,3,-2,-3]);
  var wrong4b = years4 + pick(rng, [5,6,-5,-6]);
  var wrong4c = Math.round(72 * r4);

  return [
    {
      title: 'Capitalización anual',
      questionText: 'Lupita deposita ' + fmt(P1) + ' en un banco que paga el ' + r1 + '% anual con capitalización anual. ¿Cuánto tendrá después de ' + t1 + ' años?',
      fn: 'A = ' + P1 + ' × (1 + ' + r1 + '/100)^' + t1,
      options: [fmt(a1), fmt(a1 * 0.88), fmt(a1 * 1.09), fmt(P1 * (1 + r1/100 * t1))],
      correctIdx: 0,
      explanation: 'A = ' + P1 + ' × (1.' + String(r1).padStart(2,'0') + ')^' + t1 + ' = ' + fmt(a1)
    },
    {
      title: 'Mensual vs. simple',
      questionText: 'Jorge invierte ' + fmt(P2) + ' al ' + r2 + '% anual durante ' + t2 + ' años. ¿Cuánto más gana con interés compuesto mensual que con interés simple?',
      fn: 'Diferencia = A_compuesto − A_simple',
      options: [
        fmt(a2_mensual - a2_simple),
        fmt((a2_mensual - a2_simple) * 0.5),
        fmt((a2_mensual - a2_simple) * 1.8),
        fmt(a2_mensual - P2)
      ],
      correctIdx: 0,
      explanation: 'Compuesto mensual: ' + fmt(a2_mensual) + ' — Simple: ' + fmt(a2_simple) + ' — Diferencia: ' + fmt(a2_mensual - a2_simple)
    },
    {
      title: 'Interés total ganado',
      questionText: 'Ana invierte ' + fmt(P3) + ' al ' + r3 + '% anual capitalizado trimestralmente (n=4) por ' + t3 + ' años. ¿Cuánto interés ganó en total?',
      fn: 'I = A − P',
      options: [
        fmt(intereses3),
        fmt(intereses3 * 1.2),
        fmt(P3 * r3/100 * t3),
        fmt(intereses3 * 0.75)
      ],
      correctIdx: 0,
      explanation: 'A = ' + fmt(a3) + ' — P = ' + fmt(P3) + ' — I = ' + fmt(intereses3)
    },
    {
      title: 'Regla del 72',
      questionText: 'Con la Regla del 72, ¿cuántos años tardará en duplicarse una inversión al ' + r4 + '% anual?',
      fn: 'Años ≈ 72 ÷ tasa%',
      options: [
        years4 + ' años',
        wrong4a + ' años',
        wrong4b + ' años',
        wrong4c + ' años'
      ],
      correctIdx: 0,
      explanation: '72 ÷ ' + r4 + ' = ' + years4 + ' años aproximadamente.'
    }
  ];
}

    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  // Per-problem pages
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage(); var wy = 0;
    doc.setFillColor(120,0,30); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(120,0,30); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Colegio Vizcaya  ·  Interés Compuesto', M, 10);
    doc.setFillColor(120,0,30); doc.rect(0,12,PW,10,'F');
    doc.setTextColor(230,242,230); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 19);
    wy = 28;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH = 8 + qLines.length*5 + 4;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(120,0,30); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    if (prob.fn) {
      doc.setTextColor(120,0,30); doc.setFontSize(7.5); doc.setFont('courier','bold');
      doc.text(pdfText(prob.fn), M+4, qy + qLines.length*5 + 2);
    }
    wy += qBoxH + 4;

    var isOk = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(120,0,30); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc && dc.width) { try { var imgD=dc.toDataURL('image/png'); var ar=dc.height/dc.width; var iw=TW; var ih=Math.min(iw*ar,68); doc.addImage(imgD,'PNG',M,wy,iw,ih); wy+=ih+4; } catch(e){} }
    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln){ if(wy>PH-15){doc.addPage();wy=20;} doc.text(ln,M,wy); wy+=5; }); wy+=2;
    }
    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.length > 10 && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src,'JPEG',M,wy,TW,68); wy+=72; } catch(e){}
    }
  }

  // Footers
  var pages = doc.internal.getNumberOfPages();
  for (var p2 = 1; p2 <= pages; p2++) {
    doc.setPage(p2);
    doc.setFillColor(120,0,30); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p2+'/'+pages, PW/2, PH-5, {align:'center'});
  }

  doc.save('Vizcaya_InteresCompuesto_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF'; btn.disabled = false;
}
</script>
</body>
</html>
