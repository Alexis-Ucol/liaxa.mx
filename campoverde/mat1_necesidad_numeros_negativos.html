<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Necesidad de los Números Negativos — Matemáticas 1° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the 5 lines below.
   Derive from 2 institution colors:
     PRIMARY  = main dark color  (nav, buttons, progress bar, PDF band)
     ACCENT   = highlight color  (tags, hints, PDF stripe, wcard top line)
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #1a3a6b;   /* PRIMARY      */
  --green-dark: #0f2244;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #e8edf5;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
}
/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

</style>
</head>
<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <!-- LOGO: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitle-el">Necesidad de los Números Negativos</div>
    <div class="wcourse" id="wcourse-el">Matemáticas 1° Secundaria</div>
    <label class="flabel" id="lbl-name-el" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 3A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Tienes una sesión guardada.</strong><br>
      <span id="restoreSub">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Continuar</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Nueva sesión</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <!-- ── LIAXA FOOTER SVG ──────────────────────────────────────────────────
           When branding for an institution, replace the two hex color values
           below with the institution's PRIMARY and ACCENT colors respectively.
           PRIMARY  → stroke/fill on the chart line and LIAXA text
           ACCENT   → fill on the dot and stroke on the vertical bar
           ──────────────────────────────────────────────────────────────────── -->
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lbt { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.1em; fill:var(--green); font-size:28px; }
          .lbl { stroke:var(--gold); stroke-width:2.5; }
          .lba { fill:var(--gold); }
        </style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <!-- LOGO_LEFT: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <!-- LOGO_RIGHT: replace src with base64 from LOGOS_MASTER.HTML -->
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Necesidad de los Números Negativos</div>
    <div class="hsep"></div>
    <div class="halexis">
      <!-- ── LIAXA HEADER SVG — same color tokens as footer ── -->
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lht { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
          .lhl { stroke:var(--gold); stroke-width:2; }
          .lha { fill:var(--gold); }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>

  <!-- RESULTS SECTION (always in DOM, revealed by showResults) -->
  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;<span id="pdfBtnLbl">Descargar Resultados PDF</span></button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   SCHOOL CONFIG — edit ONLY this block to rebrand for a different school
   ════════════════════════════════════════════════════════════════════════ */
var SCHOOL = {
  primary:      '#0c0c84',
  primaryDark:  '#05054e',
  primaryBg:    '#e5e5f7',
  accent:       '#0c840c',
  accentBg:     '#defcde',
  pBR: 12,  pBG: 12,  pBB: 132,
  pAR: 12, pAG: 132, pAB: 12,
  darkPrimary:     '#3535d4',
  darkPrimaryDark: '#6767f3',
  darkPrimaryBg:   '#06063f',

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

function applyThemeColors(theme) {
  var r = document.documentElement.style;
  if (theme === 'dark') {
    r.setProperty('--green',      SCHOOL.darkPrimary);
    r.setProperty('--green-dark', SCHOOL.darkPrimaryDark);
    r.setProperty('--green-bg',   SCHOOL.darkPrimaryBg);
    r.setProperty('--gold',       SCHOOL.darkAccent);
    r.setProperty('--gold-bg',    SCHOOL.darkAccentBg);
  } else {
    r.setProperty('--green',      SCHOOL.primary);
    r.setProperty('--green-dark', SCHOOL.primaryDark);
    r.setProperty('--green-bg',   SCHOOL.primaryBg);
    r.setProperty('--gold',       SCHOOL.accent);
    r.setProperty('--gold-bg',    SCHOOL.accentBg);
  }
}

/* ================================================
   ATTEMPT COUNTER  (new attempt = new numbers)
   ================================================ */
function attKey(n, g) {
  return SCHOOL.ls + '__att__' + (n + '__' + g).replace(/\s+/g, '_');
}
function nextAttempt(n, g) {
  var k = attKey(n, g), v = 0;
  try { v = parseInt(localStorage.getItem(k) || '0', 10) || 0; } catch(e) {}
  v++;
  try { localStorage.setItem(k, String(v)); } catch(e) {}
  return v;
}
function currentAttempt(n, g) {
  var k = attKey(n, g);
  try { return parseInt(localStorage.getItem(k) || '1', 10) || 1; } catch(e) { return 1; }
}

function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — doble toque para confirmar (Regla 8)
   Primer toque: resalta en dorado (pendiente).
   Segundo toque en la misma opción: confirma.
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Segundo toque en la misma opción → confirmar
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // Primer toque → resaltar como pendiente, limpiar pendiente anterior
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Confirmación directa — usada por restoreSession para omitir el doble toque
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ ¡Correcto!</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('es-MX', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  // ── PDF COLORS — INJECTION BLOCK ─────────────────────────────────────────
  //   Match these RGB values to the institution's PRIMARY and ACCENT colors.
  //   PRIMARY  → pBR, pBG, pBB
  //   ACCENT   → pAR, pAG, pAB
  // ──────────────────────────────────────────────────────────────────────────
  var pBR = SCHOOL.pBR, pBG = SCHOOL.pBG, pBB = SCHOOL.pBB;  // from SCHOOL
  var pAR = SCHOOL.pAR, pAG = SCHOOL.pAG, pAB = SCHOOL.pAB;

  function pdfText(html) {
    if (!html) return '';
    return html
      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\s+/g,' ').trim();
  }

  // ── PORTADA: línea acento / franja blanca logos / línea acento / banda color ──
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,2,'F');
  doc.setFillColor(255,255,255); doc.rect(0,2,PW,26,'F');
  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

  // ── PDF LOGO INJECTION BLOCK ─────────────────────────────────────────────
  //   When injecting logos, replace the two placeholder lines below with:
  //     var logoLeftB64  = 'data:image/png;base64,...';   // from LOGOS_MASTER.HTML
  //     var logoRightB64 = 'data:image/png;base64,...';   // from LOGOS_MASTER.HTML
  //   Then uncomment the two doc.addImage() calls.
  //   Left logo  → Facultad / department logo  (x=M,   y=4,  w=48, h=22)
  //   Right logo → University logo             (x=130, y=4,  w=48, h=22)
  // var logoLeftB64  = '';
  // var logoRightB64 = '';
  // doc.addImage(logoLeftB64,  'PNG', M,   4, 48, 22);
  // doc.addImage(logoRightB64, 'PNG', 130, 4, 48, 22);
  // ─────────────────────────────────────────────────────────────────────────

  // Logo LIAXA — lado derecho de la franja blanca
  var lx = PW - M - 36;
  var ly = 10;
  doc.setDrawColor(pBR,pBG,pBB); doc.setLineWidth(0.7);
  doc.lines([[2.57-1.03,4.63-6.17],[4.11-2.57,5.14-4.63],[5.66-4.11,2.57-5.14]], lx+1.03, ly+6.17);
  doc.setFillColor(pAR,pAG,pAB); doc.circle(lx+5.66, ly+2.57, 0.9, 'F');
  doc.setDrawColor(pAR,pAG,pAB); doc.setLineWidth(0.7);
  doc.line(lx+8.23, ly+1.54, lx+8.23, ly+7.2);
  doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('LIAXA', lx+10, ly+6.8);

  // Título de la guía + fecha dentro de la banda de color
  doc.setTextColor(232,238,247); doc.setFontSize(19); doc.setFont('helvetica','bold');
  doc.text('Necesidad de los Números Negativos', M, 49);
  doc.setTextColor(150,165,200); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(dateStr, M, 59);

  // ── Tarjeta del alumno ──
  doc.setFillColor(237,240,245); doc.roundedRect(M,72,TW,20,3,3,'F');
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  doc.text('ALUMNO', M+4, 79); doc.text('GRUPO', 130, 79);
  doc.setTextColor(20,24,32); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 87); doc.text(group, 130, 87);

  // ── Cuadro de calificación ──
  var sc = pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,100,TW,34,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,100,TW,34,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(40); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 124, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' preguntas', PW/2, 131, {align:'center'});

  // ── Tabla resumen de problemas ──
  doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,142,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 148);
  var sy = 154;
  problems.forEach(function(prob, i) {
    if (sy + 12 > PH - 15) {
      doc.addPage(); sy = 20;
      doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.rect(M,sy,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS (continuación)', M+4, sy+6);
      sy += 12;
    }
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?26:176, ok?106:48, ok?74:16);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?26:176, ok?106:48, ok?74:16);
    doc.text(ok?'Correcto':'Incorrecto', PW-M-24, sy+6.5);
    sy += 12;
  });

  // ── Páginas por problema ──
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;

    doc.setFillColor(pBR,pBG,pBB); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(pAR,pAG,pAB); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Matemáticas 1° Secundaria  ·  Necesidad de los Números Negativos', M, 10);
    doc.setTextColor(232,238,247); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    var qRaw = pdfText(prob.questionText);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    var qBoxH  = 8 + qLines.length*5 + 3;
    doc.setFillColor(237,240,245); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(pBR,pBG,pBB); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Alumno: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcto: '+corr, TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?26:176, isOk?106:48, isOk?74:16);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+7;
    doc.setTextColor(20,24,32); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(26,106,74); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(pBR,pBG,pBB); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ALUMNO', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(20,24,32); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src, 'JPEG', M, wy, TW, 68); wy += 72; } catch(e) {}
    }
  }

  // ── Pie de página en todas las páginas ──
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(pAR,pAG,pAB); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Código: '+code+'  ·  Página '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('mat1_t02_g01_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled  = false;
}

/* ================================================

function buildLesson(rng) {
  var body = document.getElementById('lessonBody');
  var L = LANG;
  function ri(a,b){ return a + Math.floor(rng()*(b-a+1)); }
  function shuf(opts, cor) {
    var a = opts.slice();
    for (var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
    return { opts:a, ci:a.indexOf(cor) };
  }

  /* ══════════════════════════════════════════════════════
     SECTION 1 — El Mundo Tiene Dos Lados
  ══════════════════════════════════════════════════════ */

  s1.innerHTML =
    '<div class="stag">'+(L==='es'?'Concepto 1':'Concept 1')+'</div>' +
    '<h2>'+(L==='es'?'El Mundo Tiene Dos Lados':'The World Has Two Sides')+'</h2>' +
    '<p>'+(L==='es'?'Imagina que estás escalando una montaña: subes <strong>+300 m</strong> sobre el nivel del mar. Ahora un submarino baja 300 m <em>bajo</em> el mar. ¿Cómo escribirías eso?':'Imagine climbing a mountain: you go up <strong>+300 m</strong> above sea level. Now a submarine descends 300 m <em>below</em> the sea. How would you write that?')+'</p>' +
    '<p>'+(L==='es'?'Los números que conocías (1, 2, 3…) solo describen cantidades <em>sobre</em> un punto de referencia. Pero la realidad tiene dos lados: <strong>calor y frío, ganancia y pérdida, subir y bajar</strong>.':'The numbers you already knew (1, 2, 3…) only describe amounts <em>above</em> a reference point. But reality has two sides: <strong>heat and cold, gain and loss, up and down</strong>.')+'</p>' +
    '<div class="callout"><strong>'+(L==='es'?'El cero es la frontera.':'Zero is the boundary.')+'</strong> '+(L==='es'?'Los <em>positivos</em> están a la derecha del cero, los <em>negativos</em> a la izquierda. Los números negativos se escriben con el signo <strong>−</strong> antes del número.':'The <em>positives</em> are to the right of zero, the <em>negatives</em> to the left. Negative numbers are written with the sign <strong>−</strong> before the number.')+'</div>' +
    '<svg viewBox="0 0 460 56" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:460px;display:block;margin:1rem auto;">' +
    '<line x1="10" y1="28" x2="450" y2="28" stroke="var(--border)" stroke-width="2"/>' +
    '<polygon points="450,28 442,23 442,33" fill="var(--border)"/>' +
    (function(){var pts=[[-5,28],[-4,65],[-3,102],[-2,139],[-1,176],[0,213],[1,250],[2,287],[3,324],[4,361],[5,398]];return pts.map(function(p){var iz=p[0]===0;var col=iz?'var(--gold)':'var(--border)';var tc=iz?'var(--gold)':'var(--text3)';var fw=iz?'700':'400';return '<line x1="'+p[1]+'" y1="22" x2="'+p[1]+'" y2="34" stroke="'+col+'" stroke-width="'+(iz?2.5:1.5)+'"/><text x="'+p[1]+'" y="50" text-anchor="middle" font-size="9" fill="'+tc+'" font-weight="'+fw+'">'+(p[0]>0?'+':'')+p[0]+'</text>';}).join('');})() +
    '</svg>';
  body.appendChild(s1);

  /* ══════════════════════════════════════════════════════
     INTERACTIVO 1 — Termómetro (slider LEFT, SVG RIGHT)
  ══════════════════════════════════════════════════════ */
  var tb = 0;
  window._g01_tb = tb;
  var thsec = document.createElement('div'); thsec.className='section'; thsec.id='thsec';
  thsec.innerHTML =
    '<div class="stag">'+(L==='es'?'Interactivo':'Interactive')+'</div>' +
    '<h2 style="font-size:1.2rem;margin-bottom:.6rem">🌡 '+(L==='es'?'Termómetro: Positivos y Negativos':'Thermometer: Positives and Negatives')+'</h2>' +
    '<p>'+(L==='es'?'Mueve el control. Observa cómo cambia el signo cuando la temperatura cruza el cero.':'Move the slider. Watch how the sign changes when the temperature crosses zero.')+'</p>' +
    '<div style="display:flex;gap:1.4rem;align-items:center;flex-wrap:wrap;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem;">' +
      /* LEFT: controls */
      '<div style="flex:1;min-width:160px;">' +
        '<div id="thval" style="font-family:\'IBM Plex Mono\',monospace;font-size:1.6rem;font-weight:700;color:var(--green-dark);margin-bottom:.3rem">'+tb+'°C</div>' +

  /* ══════════════════════════════════════════════════════
     PROBLEMA 1 — Temperatura en la recta numérica
     (draw: number line canvas + MC)
  ══════════════════════════════════════════════════════ */
  var cities = L==='es'
    ? [{n:'Siberia',t:ri(-25,-5)},{n:'Antártida',t:ri(-40,-20)},{n:'Alaska',t:ri(-18,-2)}]

      ?'La temperatura en <strong>'+cc.n+'</strong> es <strong>'+cc.t+'°C</strong> y en <strong>'+wc.n+'</strong> es <strong>+'+wc.t+'°C</strong>.<br>En tu área de dibujo, dibuja una recta numérica y ubica ambas temperaturas. Luego responde:<br><br>¿Cuál de estas representaciones usa un número negativo?'

      ?cc.t+'°C está a la <em>izquierda</em> del cero en la recta: es un número negativo. '+wc.t+'°C está a la derecha: positivo.'
      :cc.t+'°C is to the <em>left</em> of zero on the number line: it is a negative number. '+wc.t+'°C is to the right: positive.',
    showWork:false, studentChoice:null, pendingChoice:null
  });
  buildOneCardWithDraw(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════════════════════
     SECTION 2 — Negativos en la Vida Cotidiana
  ══════════════════════════════════════════════════════ */
  var debt=ri(50,300), earn=ri(20,Math.min(debt-1,200)), bal=earn-debt;
  var s2=document.createElement('div'); s2.className='section';
  s2.innerHTML =
    '<div class="stag">'+(L==='es'?'Concepto 2':'Concept 2')+'</div>' +
    '<h2>💰 '+(L==='es'?'Negativos en la Vida Cotidiana':'Negatives in Everyday Life')+'</h2>' +

    '<div class="stag" style="color:var(--gold)">'+(L==='es'?'Reflexión Final':'Final Reflection')+'</div>' +
    '<h2>💭 '+(L==='es'?'¿Qué NO puede ser negativo?':'What CAN\'T be negative?')+'</h2>' +
    '<p>'+(L==='es'?
      'Como viste en esta guía, los números negativos aparecen en muchísimos contextos. Pero no en todos. Hay cantidades que tienen un <strong>mínimo natural en cero</strong>: no pueden bajar de ahí porque la cosa que miden simplemente no puede ser "menos que nada".':
      'As you saw in this guide, negative numbers appear in many contexts. But not all. Some quantities have a <strong>natural floor at zero</strong>: they can\'t go below it because the thing being measured simply cannot be "less than nothing".')+'</p>' +
    '<div class="callout" style="background:var(--gold-bg);border-color:var(--gold)"><strong style="color:var(--gold)">'+(L==='es'?'Ejemplo:':'Example:')+'</strong> '+(L==='es'?
      'El número de goles en un partido de fútbol. Un equipo puede marcar 0 goles, pero nunca −1.':
      'The number of goals in a soccer match. A team can score 0 goals, but never −1.')+'</div>' +
    '<p style="margin-top:.8rem">'+(L==='es'?
      'Escribe <strong>al menos 3 cosas</strong> que no puedan tener valor negativo, y explica brevemente por qué cada una tiene al cero como mínimo.':
      'Write <strong>at least 3 things</strong> that cannot have a negative value, and briefly explain why each one has zero as its minimum.')+'</p>' +
    '<textarea id="rf-text" style="width:100%;min-height:130px;padding:.75rem;margin-top:.5rem;border:1.5px solid var(--border);border-radius:8px;background:#ffffff;color:#1a1a16;font-family:inherit;font-size:.92rem;line-height:1.6;resize:vertical;" placeholder="'+(L==='es'?'1. ...\n2. ...\n3. ...':'1. ...\n2. ...\n3. ...')+'"></textarea>' +
    '<div style="display:flex;align-items:center;gap:.8rem;margin-top:.7rem;flex-wrap:wrap;">' +

      '<button onclick="rfReveal()" id="rf-btn" style="margin-left:auto;padding:.38rem .9rem;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:.8rem;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s">'+(L==='es'?'💡 Ver dos ejemplos poco obvios':'💡 See two non-obvious examples')+'</button>' +
    '</div>' +
    '<div id="'+rfId+'" style="display:none;margin-top:.8rem">' +
      '<div class="callout" style="margin-bottom:.6rem"><strong>'+(L==='es'?'El número de veces que has visto un amanecer hoy:':'The number of times you have seen a sunrise today:')+'</strong><br>' +
      (L==='es'?
        'Puede ser 0 (si dormiste todo el día) o 1, nunca negativo. No existe un "amanecer que no has visto" que reste al conteo.':
        'It can be 0 (if you slept all day) or 1, never negative. There is no "unseen sunrise" that subtracts from the count.')+'</div>' +
      '<div class="callout"><strong>'+(L==='es'?'La cantidad de idiomas que habla una persona:':'The number of languages a person speaks:')+'</strong><br>' +
      (L==='es'?
        'Mínimo es 0 (alguien que aún no desarrolla lenguaje) o 1. No puedes "saber menos que ningún idioma". El conocimiento no resta.':
        'The minimum is 0 (someone who has not yet developed language) or 1. You cannot "know less than no language". Knowledge does not subtract.')+'</div>' +
    '</div>';
  body.appendChild(rf);
}

function rfReveal() {
  var box = document.getElementById('rf-reveal');
  var btn = document.getElementById('rf-btn');
  if (!box || !btn) return;
  var visible = box.style.display !== 'none';
  box.style.display = visible ? 'none' : 'block';
  btn.textContent = visible
    ? (LANG==='es'?'💡 Ver dos ejemplos poco obvios':'💡 See two non-obvious examples')
    : (LANG==='es'?'Ocultar ejemplos':'Hide examples');
}

/* ── Draw canvas state ── */
var _drawState = {};
function initDrawCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = (rect.width  || 300) * dpr;
  canvas.height = 180 * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  _drawState[canvas.id] = { mode:'pen', color:'#0f2244', dn:false, lx:0, ly:0 };
  function gp(e){ var r=canvas.getBoundingClientRect(); var s=e.touches?e.touches[0]:e; return {x:s.clientX-r.left, y:s.clientY-r.top}; }
  function dn(e){ e.preventDefault(); var p=gp(e); var s=_drawState[canvas.id]; s.dn=true; s.lx=p.x; s.ly=p.y; }
  function mv(e){ e.preventDefault(); var s=_drawState[canvas.id]; if(!s.dn) return; var p=gp(e); var c2=canvas.getContext('2d');
    c2.beginPath(); c2.moveTo(s.lx,s.ly); c2.lineTo(p.x,p.y);
    c2.strokeStyle = s.mode==='eraser'?'#ffffff':s.color;
    c2.lineWidth   = s.mode==='eraser'?18:s.mode==='pen'?2:5;
    c2.lineCap='round'; c2.stroke(); s.lx=p.x; s.ly=p.y; }
  function up(){ _drawState[canvas.id].dn=false; }
  canvas.addEventListener('mousedown',dn); canvas.addEventListener('mousemove',mv); canvas.addEventListener('mouseup',up);
  canvas.addEventListener('touchstart',dn,{passive:false}); canvas.addEventListener('touchmove',mv,{passive:false}); canvas.addEventListener('touchend',up);
}
function smDraw(i, mode, btn) {
  var id='dc'+i; if(_drawState[id]) _drawState[id].mode=mode;
  btn.closest('.ctbar').querySelectorAll('.tb2').forEach(function(b){b.classList.remove('on'); b.style.background='var(--surface2)'; b.style.color='var(--text2)'; b.style.borderColor='var(--border)';});
  btn.classList.add('on'); btn.style.background='var(--green)'; btn.style.color='#fff'; btn.style.borderColor='var(--green)';
}
function scDraw(i, dot, col) {
  var id='dc'+i; if(_drawState[id]){ _drawState[id].color=col; _drawState[id].mode='pen'; }
  dot.closest('.ctbar').querySelectorAll('.cdot').forEach(function(d){d.style.border='2px solid transparent';});
  dot.style.border='2px solid var(--text)';
  /* reset pen button */
  var pnBtn=document.getElementById('pn'+i); if(pnBtn){ smDraw(i,'pen',pnBtn); }
}
function clrDraw(i) {
  var c=document.getElementById('dc'+i); if(!c) return;
  var ctx=c.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,c.width,c.height);
}

/* ── Thermometer widget handler ── */
function updTh(val, init) {
  val = parseInt(val);
  var L = LANG;
  var el=document.getElementById('thr'); if(el) el.value=val;
  var tv=document.getElementById('thval'); if(tv) tv.textContent=val+'°C';
  var zeroY=91, pxpd=166/80, fp=Math.abs(val)*pxpd;
  var tf=document.getElementById('thf');
  if(tf){
    if(val>=0){tf.setAttribute('y',String(zeroY-fp));tf.setAttribute('height',String(fp));tf.setAttribute('fill','#e05c4a');}
    else{tf.setAttribute('y',String(zeroY));tf.setAttribute('height',String(fp));tf.setAttribute('fill','#4a9ad4');}
  }
  var bdg=document.getElementById('thbdg'), ctx=document.getElementById('thctx');
  if(val>0){
    if(bdg)bdg.innerHTML='<span style="display:inline-block;font-size:.73rem;font-weight:700;padding:.18rem .5rem;border-radius:20px;background:#e8f5e9;color:#2d5a27">✚ '+(L==='es'?'Positivo':'Positive')+'</span>';
    if(ctx)ctx.innerHTML=L==='es'?'Temperatura de <strong>+'+val+'°C</strong>. Por encima del punto de congelación.':'Temperature of <strong>+'+val+'°C</strong>. Above the freezing point.';
  } else if(val<0){
    if(bdg)bdg.innerHTML='<span style="display:inline-block;font-size:.73rem;font-weight:700;padding:.18rem .5rem;border-radius:20px;background:#fdecea;color:#c0392b">− '+(L==='es'?'Negativo':'Negative')+'</span>';
    if(ctx)ctx.innerHTML=L==='es'?'Temperatura de <strong>'+val+'°C</strong>. Por debajo del punto de congelación.':'Temperature of <strong>'+val+'°C</strong>. Below the freezing point.';
  } else {
    if(bdg)bdg.innerHTML='<span style="display:inline-block;font-size:.73rem;font-weight:700;padding:.18rem .5rem;border-radius:20px;background:var(--gold-bg);color:var(--gold)">0 '+(L==='es'?'Cero':'Zero')+'</span>';
    if(ctx)ctx.innerHTML=L==='es'?'Exactamente 0°C, punto de congelación del agua.':'Exactly 0°C, the water freezing point.';
  }
}

/* ── Classify widget handler ── */
function clkC(i, ch, cor) {
  var L = LANG;
  if(window._csc[i]!==null) return;
  var pb=document.getElementById('cp'+i), nb=document.getElementById('cn'+i), fb=document.getElementById('cf'+i);
  pb.disabled=true; nb.disabled=true;
  var ok=(ch===cor); window._csc[i]=ok;
  var selStyle='border-color:'+(ok?'#4a7c3f':'#c0392b')+';background:'+(ok?'#e8f5e9':'#fdecea')+';color:'+(ok?'#2d5a27':'#c0392b');
  if(ch==='pos') pb.setAttribute('style',pb.getAttribute('style')+';'+selStyle);
  else           nb.setAttribute('style',nb.getAttribute('style')+';'+selStyle);
  fb.textContent = ok
    ? (L==='es'?'✓ ¡Correcto!':'✓ Correct!')
    : (L==='es'?'✗ Incorrecto. Era '+(cor==='pos'?'positivo':'negativo')+'.':'✗ Incorrect. It was '+(cor==='pos'?'positive':'negative')+'.');
  fb.style.color=ok?'#2d5a27':'#c0392b'; fb.style.display='block';
  if(window._csc.every(function(s){return s!==null;})){
    var sm=window._csc.filter(Boolean).length;
    var csum=document.getElementById('csum');
    if(csum) csum.innerHTML='<div class="callout" style="margin-top:.7rem">'+(L==='es'?'Resultado: '+sm+'/3 correctas. '+(sm===3?'¡Excelente dominio del concepto!':'Repasa los ejemplos de arriba.'):'Result: '+sm+'/3 correct. '+(sm===3?'Excellent!':'Review the examples above.'))+'</div>';
  }
}
