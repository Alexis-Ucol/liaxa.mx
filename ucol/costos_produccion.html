<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costos de Producción — Facultad de Economía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#4a7c3f; --green-dark:#2d5a27; --green-bg:#eaf0e7;
  --gold:#c9a84c; --gold-bg:#faf3e0;
  --bg:#f8f6f1; --surface:#ffffff; --surface2:#f0ede6;
  --border:#ddd8cc; --text:#1a1a16; --text2:#4a4640; --text3:#7a7468;
  --ok:#2d6a4f; --ok-bg:rgba(45,106,79,.10);
  --bad:#8b2500; --bad-bg:rgba(139,37,0,.08);
  --shadow:0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}

/* WELCOME */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center}
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.1rem}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s}
.finput:focus{outline:none;border-color:var(--green)}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s}
.sbtn:hover{background:var(--green-dark)}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3)}

/* LESSON */
#lessonScreen{display:none}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s}

/* CONTENT */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem}
.section.vis{opacity:1;transform:none}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem}
.section p{color:var(--text2);margin-bottom:.8rem}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0}
.callout strong{color:var(--green-dark)}
.callout p{margin-bottom:0}

/* RULE CARDS */
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.75rem;margin:1.1rem 0}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;border-top:3px solid var(--green)}
.rname{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem}
.rform{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--green-dark);font-weight:500;margin-bottom:.3rem}
.rnote{font-size:.74rem;color:var(--text3)}

/* EXPLORER */
.gcrd{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem;margin:.9rem 0}
.gcrd h3{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:700;margin-bottom:.7rem}
.sliders-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.9rem}
@media(max-width:500px){.sliders-row{grid-template-columns:1fr}}
.sl-group label{display:block;font-size:.73rem;color:var(--text3);margin-bottom:.25rem}
.sl-group input[type=range]{width:100%;accent-color:var(--green)}
.sl-val{font-weight:600;color:var(--green)}
.exp-canvas-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);margin-bottom:.9rem}
.exp-canvas-wrap canvas{display:block;width:100%;height:260px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin-bottom:.9rem}
@media(max-width:420px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--surface2);border-radius:8px;padding:.65rem;text-align:center}
.mlbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.15rem}
.mnum{font-family:'IBM Plex Mono',monospace;font-size:.95rem;font-weight:600}
.mnum.gn{color:var(--green)} .mnum.gd{color:var(--gold)} .mnum.rd{color:var(--bad)} .mnum.tx{color:var(--text)}

/* QUIZ INSIDE EXPLORER */
.exp-quiz{background:var(--gold-bg);border:1px solid var(--gold);border-radius:10px;padding:1rem 1.1rem;margin-top:.5rem}
.exp-quiz p{font-size:.86rem;color:var(--text2);margin-bottom:.6rem}
.exp-qinput{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.exp-qinput input[type=number]{width:90px;padding:.45rem .6rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.88rem}
.exp-qinput input:focus{outline:none;border-color:var(--gold)}
.exp-qbtn{background:var(--gold);color:#fff;border:none;border-radius:7px;padding:.45rem .9rem;font-size:.82rem;font-weight:600;cursor:pointer}
.exp-fb{font-size:.82rem;margin-top:.5rem;padding:.45rem .7rem;border-radius:6px;display:none}
.exp-canvas-wrap{position:relative}
#expTooltip{position:absolute;pointer-events:none;background:var(--text);color:var(--bg);
  font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:.3rem .55rem;
  border-radius:6px;white-space:nowrap;display:none;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.25);line-height:1.5}
.exp-fb.ok{background:var(--ok-bg);color:var(--ok);display:block}
.exp-fb.bad{background:var(--bad-bg);color:var(--bad);display:block}

/* DRAG & DROP TABLE */
.dnd-wrap{margin:.9rem 0}
.dnd-bank{display:flex;flex-wrap:wrap;gap:.45rem;padding:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:.75rem;min-height:44px}
.chip{display:inline-flex;align-items:center;padding:.3rem .7rem;background:var(--green);color:#fff;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:500;cursor:grab;user-select:none;transition:opacity .15s}
.chip:active{cursor:grabbing;opacity:.7}
.chip.placed{display:none}
.dnd-table{width:100%;border-collapse:collapse;font-size:.82rem}
.dnd-table th{background:var(--green);color:#fff;padding:.5rem .6rem;text-align:center;font-size:.7rem;letter-spacing:.05em;text-transform:uppercase}
.dnd-table td{border:1px solid var(--border);padding:.4rem .5rem;text-align:center;background:var(--surface)}
.dnd-table td.q-col{background:var(--surface2);font-weight:600;font-family:'IBM Plex Mono',monospace}
.drop-zone{min-height:32px;min-width:60px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .15s;position:relative}
.drop-zone.over{background:var(--green-bg);border-color:var(--green)}
.drop-zone.correct{border-color:var(--ok);background:var(--ok-bg)}
.drop-zone.incorrect{border-color:var(--bad);background:var(--bad-bg)}
.drop-zone .chip{margin:0;font-size:.75rem;cursor:default}
.dnd-btn-row{display:flex;gap:.5rem;margin-top:.65rem;flex-wrap:wrap}
.dnd-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.5rem 1.1rem;font-size:.82rem;font-weight:600;cursor:pointer}
.dnd-btn.sec{background:none;border:1px solid var(--border);color:var(--text2)}
.dnd-score{font-size:.82rem;color:var(--text2);margin-top:.5rem}

/* PROBLEM CARDS */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s}
.pcrd.ok{border-color:var(--ok)} .pcrd.bad{border-color:var(--bad)}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.ptitle{font-weight:600;font-size:.88rem}
.pbody{padding:1rem}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500}
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green)}
.wpanel{display:none} .wpanel.active{display:block}
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2)}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green)}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot.sel{border-color:var(--gold)}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto}
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical}
.wtextarea:focus{outline:none;border-color:var(--green)}
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s}
.pzone:hover{border-color:var(--green)}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pzicon{font-size:1.7rem;margin-bottom:.35rem}
.pztxt{font-size:.8rem;color:var(--text3)}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain}
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2)}
.hintbox.show{display:block}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg)}
.mcopt.dis{cursor:default;pointer-events:none}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg)}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem}
.mcfb.show{display:block} .mcfb.fbok{background:var(--ok-bg);color:var(--ok)} .mcfb.fbbad{background:var(--bad-bg);color:var(--bad)}

/* RESULT */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s}
.dlbtn:hover{background:var(--green-dark)}
.dlbtn:disabled{opacity:.6;cursor:wait}
.curve-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:.28rem .75rem;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.curve-btn.active{opacity:1;box-shadow:0 0 0 2px currentColor inset}
</style>
</head>

    t = Math.imul(t, 0x735a2d97);

  };
}
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ─── CANVAS ─── */
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tool = 'pen';
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left), y: (src.clientY - r.top) };
  }
  function down(e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p.x; ly = p.y; }
  function move(e) {
    if (!drawing) return; e.preventDefault();
    var p = getPos(e);
    if (tool === 'eraser') {
      ctx.clearRect(p.x - 12, p.y - 12, 24, 24);
    } else {
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    }
    lx = p.x; ly = p.y;
  }
  function up() { drawing = false; }
  canvas.addEventListener('mousedown', down); canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', up); canvas.addEventListener('mouseleave', up);
  canvas.addEventListener('touchstart', down, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', up);
  var toolbar = canvas.parentElement.querySelector('.ctoolbar');
  if (toolbar) {
    toolbar.querySelector('.bpen').addEventListener('click', function() {
      tool = 'pen'; ctx.lineWidth = 2; ctx.globalAlpha = 1;
      toolbar.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      this.classList.add('on');
    });
    toolbar.querySelector('.bmarker').addEventListener('click', function() {
      tool = 'pen'; ctx.lineWidth = 8; ctx.globalAlpha = 0.4;
      toolbar.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      this.classList.add('on');
    });
    toolbar.querySelector('.beraser').addEventListener('click', function() {
      tool = 'eraser';
      toolbar.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      this.classList.add('on');
    });
    toolbar.querySelectorAll('.cdot').forEach(function(dot) {
      dot.addEventListener('click', function() {
        toolbar.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
        this.classList.add('sel');
        ctx.strokeStyle = this.getAttribute('data-color');
        tool = 'pen'; ctx.lineWidth = 2; ctx.globalAlpha = 1;
      });
    });
    toolbar.querySelector('.clrbtn').addEventListener('click', function() {
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    });
  }
}

/* ─── MC HANDLER (mobile tap-safe) ─── */
function selectMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (!prob || prob.studentChoice !== null) return;
  if (pendingMC && pendingMC.probIdx === probIdx && pendingMC.chosenIdx === chosenIdx) {
    pendingMC = null;
    handleMC(probIdx, chosenIdx);
  } else {
    if (pendingMC) {
      var prev = document.getElementById('mc_' + pendingMC.probIdx + '_' + pendingMC.chosenIdx);
      if (prev) prev.style.outline = '';
    }
    pendingMC = { probIdx: probIdx, chosenIdx: chosenIdx };
    var el = document.getElementById('mc_' + probIdx + '_' + chosenIdx);
    if (el) el.style.outline = '2px solid var(--gold)';
  }
}
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (!prob || prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx;
  var card = document.getElementById('pc' + probIdx);
  var opts = card.querySelectorAll('.mcopt');
  opts.forEach(function(o) { o.classList.add('dis'); o.style.outline = ''; });
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk) o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  card.classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

function showResults() {
  var el = document.getElementById('s_results');
  el.style.display = 'block';
  el.classList.add('vis');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ════════════════════════════════════════
   BUILD LESSON
════════════════════════════════════════ */
function buildLesson(rng) {
  var body = document.getElementById('lessonBody');

  /* ── PARÁMETROS ALEATORIOS POR ESTUDIANTE ── */
  var FC  = 50  + Math.round(rng() * 10) * 10;          // 50–140
  var a   = 20  + Math.round(rng() * 8)  * 5;           // 20–60  (coef lineal CV)
  var b   = 2   + Math.round(rng() * 4);                 // 2–6    (coef cuadrático CV)
  // CV(Q) = a*Q + b*Q^2  →  TC(Q) = FC + a*Q + b*Q^2
  // Para Q=0..5
  function tc(q) { return FC + a*q + b*q*q; }
  function vc(q) { return a*q + b*q*q; }
  function mc_q(q) { return q === 0 ? '—' : (tc(q) - tc(q-1)).toFixed(0); }
  function atc(q) { return q === 0 ? '—' : (tc(q)/q).toFixed(1); }
  function avc(q) { return q === 0 ? '—' : (vc(q)/q).toFixed(1); }
  function afc(q) { return q === 0 ? '—' : (FC/q).toFixed(1); }

  /* ── Tabla de referencia interna (para DnD y problemas) ── */
  var tableData = [];
  for (var q = 0; q <= 5; q++) {
    tableData.push({
      q:   q,
      fc:  FC,
      vc:  vc(q),
      tc:  tc(q),
      mc:  q === 0 ? null : tc(q) - tc(q-1),

      avc: q === 0 ? null : vc(q)/q,
      afc: q === 0 ? null : FC/q

  /* ══════════════════════════════════════

      </div>

  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════
     SECCIÓN 2 — Costos Medios (Unitarios)
  ══════════════════════════════════════ */
  var s2 = document.createElement('div');
  s2.className = 'section';

  var p7_avc = (p7_cv4 / p7_q).toFixed(1);
  var p7correct = '$' + p7_atc;
  var p7w1 = '$' + p7_afc;
  var p7w2 = '$' + p7_avc;
  // w3: CT/Q at a wrong Q (Q+1), always structurally different
  var p7_ct_plus = p7_fc4 + p7_a4*(p7_q+1) + p7_b4*(p7_q+1)*(p7_q+1);
  var p7w3 = '$' + (p7_ct_plus / (p7_q+1)).toFixed(1);
  var s7opts = shuffleOpts([p7correct, p7w1, p7w2, p7w3], p7correct, rng);
  problems.push({
    title: 'Costo Total Medio (CMT)',
    questionText: 'Con CT(Q) = ' + p7_fc4 + ' + ' + p7_a4 + 'Q + ' + p7_b4 + 'Q², ¿cuál es el CMT cuando Q = ' + p7_q + '?',
    fn: '',
    options: s7opts.opts,
    correctIdx: s7opts.correctIdx,
    studentChoice: null,
    hint: 'CMT = (CF + CV) / Q. Calcula primero CT completo, luego divide entre ' + p7_q + '.',
    explanation: 'CV(' + p7_q + ') = ' + p7_cv4 + '. CT = ' + p7_fc4 + ' + ' + p7_cv4 + ' = ' + p7_ct4 + '. CMT = ' + p7_ct4 + ' / ' + p7_q + ' = $' + p7_atc + '.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ══════════════════════════════════════
     INIT EXPLORER CANVAS
  ══════════════════════════════════════ */
  // Pick quiz target: Q from 3-6 (never 1 which is the default), curve cycles
  var quizQ = 3 + Math.floor(rng() * 4);  // 3,4,5,6
  var quizCurves = ['cmt','cmv','cmf','cmg','ct'];
  var quizCurve = quizCurves[Math.floor(rng() * 4)]; // pick from first 4 (medios)
  var quizLabels = { cmt:'CMT', cmv:'CMV', cmf:'CMF', cmg:'CMg', ct:'CT' };
  // Pre-compute correct answer for the quiz
  var quizCorrect;
  if (quizCurve === 'cmt') quizCorrect = parseFloat((tc(quizQ)/quizQ).toFixed(2));
  if (quizCurve === 'cmv') quizCorrect = parseFloat((vc(quizQ)/quizQ).toFixed(2));
  if (quizCurve === 'cmf') quizCorrect = parseFloat((FC/quizQ).toFixed(2));
  if (quizCurve === 'cmg') quizCorrect = tc(quizQ) - tc(quizQ-1);
  if (quizCurve === 'ct')  quizCorrect = tc(quizQ);
  setTimeout(function() { initExplorer(FC, a, b, quizQ, quizCurve, quizLabels[quizCurve], quizCorrect); }, 150);
}

/* ════════════════════════════════════════
   EXPLORER LOGIC
════════════════════════════════════════ */
var expState = { fc: 0, a: 0, b: 0, q: 0 };
var activeCurves = { ct: true, cmt: false, cmv: false, cmf: false, cmg: false };

function initExplorer(fc0, a0, b0, quizQ, quizCurve, quizLbl, quizCorrect) {
  expState.fc = fc0; expState.a = a0; expState.b = b0; expState.q = 1;
  // Build Q buttons 0..6 (matches graph range)
  var qbtns = document.getElementById('q_btns');
  if (qbtns) {
    qbtns.innerHTML = '';
    for (var qi = 0; qi <= 6; qi++) {
      (function(q){
        var btn = document.createElement('button');
        btn.className = 'curve-btn' + (q === 1 ? ' active' : '');
        btn.textContent = q;
        btn.style.minWidth = '32px';
        btn.onclick = function() {
          document.querySelectorAll('#q_btns .curve-btn').forEach(function(b){ b.classList.remove('active'); });
          btn.classList.add('active');
          expState.q = q;
          drawExplorer();
          updateReadout();
        };
        qbtns.appendChild(btn);
      })(qi);
    }
  }
  // Set CT button initial filled state
  var ctBtn = document.querySelector('[data-curve="ct"]');
  if (ctBtn) {
    ctBtn.style.background  = ctBtn.getAttribute('data-color');
    ctBtn.style.color       = '#fff';
    ctBtn.style.borderColor = ctBtn.getAttribute('data-color');
  }
  // Set quiz question to fixed target
  window._quizQ       = quizQ       || 4;
  window._quizCurve   = quizCurve   || 'cmt';
  window._quizLbl     = quizLbl     || 'CMT';
  window._quizCorrect = quizCorrect != null ? quizCorrect : null;
  var eqlbl  = document.getElementById('eq_lbl');
  var eqqlbl = document.getElementById('eq_qlbl');
  if (eqlbl)  eqlbl.textContent  = window._quizLbl;
  if (eqqlbl) eqqlbl.textContent = window._quizQ;
  drawExplorer();
  updateReadout();

  // Tooltip: hover/click on dots
  var cvs = document.getElementById('expCanvas');
  var tip = document.getElementById('expTooltip');
  function showTip(e) {
    if (!cvs || !tip) return;
    var rect = cvs.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    var mx = src.clientX - rect.left;
    var my = src.clientY - rect.top;
    var dpr = window.devicePixelRatio || 1;
    var hit = null;
    var dots = window._expDots || [];
    for (var di = 0; di < dots.length; di++) {
      var d = dots[di];
      var dx = mx - d.cx / dpr;
      var dy = my - d.cy / dpr;
      if (Math.sqrt(dx*dx + dy*dy) < 14) { hit = d; break; }
    }
    if (hit) {
      var val = Number.isInteger(hit.val) ? hit.val : parseFloat(hit.val.toFixed(2));
      tip.innerHTML = '<span style="color:' + hit.color + '">●</span> ' + hit.label + ' = $' + val;
      tip.style.display = 'block';
      var tx = mx + 12, ty = my - 20;
      if (tx + 120 > rect.width) tx = mx - 130;
      if (ty < 0) ty = my + 8;
      tip.style.left = tx + 'px';
      tip.style.top  = ty + 'px';
      cvs.style.cursor = 'pointer';
    } else {
      tip.style.display = 'none';
      cvs.style.cursor = 'default';
    }
  }
  cvs.addEventListener('mousemove', showTip);
  cvs.addEventListener('mouseleave', function(){ if(tip) tip.style.display='none'; });
  cvs.addEventListener('click', showTip);
  cvs.addEventListener('touchstart', function(e){ showTip(e); setTimeout(function(){ if(tip) tip.style.display='none'; }, 2500); }, { passive:true });
}

function toggleCurve(name, btn) {
  activeCurves[name] = !activeCurves[name];
  btn.classList.toggle('active', activeCurves[name]);
  var baseColor = btn.getAttribute('data-color'); // always stable
  btn.style.background = activeCurves[name] ? baseColor : '';
  btn.style.color      = activeCurves[name] ? '#fff' : baseColor;
  btn.style.borderColor = baseColor;
  drawExplorer();
  updateReadout();
}

function expTC(fc, a, b, q) { return fc + a*q + b*q*q; }
function expVC(a, b, q)     { return a*q + b*q*q; }

function updateReadout() {
  var fc = expState.fc, a = expState.a, b = expState.b, q = expState.q;
  var ro = document.getElementById('exp_readout');
  var roQ = document.getElementById('ro_q');
  var roV = document.getElementById('ro_values');
  if (!ro) return;
  ro.style.display = 'block';
  roQ.textContent = q;
  var rows = [];
  rows.push({ lbl: 'CF', val: '$' + fc, color: '#8b2500' });
  var vcQ = expVC(a, b, q);
  rows.push({ lbl: 'CV', val: '$' + vcQ, color: '#c9a84c' });
  var ctQ = expTC(fc, a, b, q);
  rows.push({ lbl: 'CT', val: '$' + ctQ, color: '#4a7c3f' });
  if (q > 0) {
    if (activeCurves.cmt) rows.push({ lbl: 'CMT', val: '$' + (ctQ/q).toFixed(2), color: '#1d4e89' });
    if (activeCurves.cmv) rows.push({ lbl: 'CMV', val: '$' + (vcQ/q).toFixed(2), color: '#c9a84c' });
    if (activeCurves.cmf) rows.push({ lbl: 'CMF', val: '$' + (fc/q).toFixed(2),  color: '#8b2500' });
    if (activeCurves.cmg) rows.push({ lbl: 'CMg', val: '$' + (ctQ - expTC(fc,a,b,q-1)), color: '#5c3d99' });
  }
  roV.innerHTML = rows.map(function(r) {
    return '<div style="background:var(--surface);border-radius:6px;padding:.4rem .6rem;border-left:3px solid '+r.color+'">' +
      '<span style="font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)">' + r.lbl + '</span>' +
      '<div style="font-family:IBM Plex Mono,monospace;font-weight:600;color:'+r.color+'">' + r.val + '</div></div>';
  }).join('');
  // Update quiz label
  var activeNames = Object.keys(activeCurves).filter(function(k){ return activeCurves[k]; });
  var label = activeNames.length > 0 ? activeNames[activeNames.length-1].toUpperCase() : 'CMT';
  // eq_lbl and eq_qlbl are set once in initExplorer and stay fixed
  // (they show the quiz target, not the current selection)

  // Update equation display
  var eqBox = document.getElementById('exp_equation');
  if (eqBox) {
    var fc = expState.fc, a = expState.a, b = expState.b;
    var lines = ['CT(Q) = ' + fc + ' + ' + a + 'Q + ' + b + 'Q²',
                 'CV(Q) = ' + a + 'Q + ' + b + 'Q²   |   CF = ' + fc];
    if (activeCurves.cmt) lines.push('CMT(Q) = CT(Q) / Q = (' + fc + ' + ' + a + 'Q + ' + b + 'Q²) / Q');
    if (activeCurves.cmv) lines.push('CMV(Q) = CV(Q) / Q = ' + a + ' + ' + b + 'Q');
    if (activeCurves.cmf) lines.push('CMF(Q) = CF / Q = ' + fc + ' / Q');
    if (activeCurves.cmg) lines.push('CMg = ΔCT/ΔQ ≈ ' + a + ' + ' + b + '(2Q−1)');
    eqBox.innerHTML = lines.map(function(l){ return '<div>' + l + '</div>'; }).join('');
  }
}

function drawExplorer() {
  var canvas = document.getElementById('expCanvas');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.offsetWidth, H = 280;
  canvas.width = W * dpr; canvas.height = H * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var bgCol   = isDark ? '#242420' : '#ffffff';
  var axCol   = isDark ? '#7a7468' : '#aaa8a0';
  var txtCol  = isDark ? '#b0aa9e' : '#4a4640';
  var gridCol = isDark ? '#2e2e28' : '#f0ede6';

  ctx.fillStyle = bgCol;
  ctx.fillRect(0, 0, W, H);

  var fc = expState.fc, a = expState.a, b = expState.b, Qi = expState.q;
  var maxQ = 6;
  var pad = { l: 58, r: 20, t: 20, b: 36 };
  var gW = W - pad.l - pad.r, gH = H - pad.t - pad.b;

  /* Compute y scale: max of CT curve */
  var maxY = 0;
  for (var q = 0; q <= maxQ; q++) {
    var v = expTC(fc, a, b, q);
    if (v > maxY) maxY = v;
  }
  maxY = Math.ceil(maxY / 50) * 50 + 50;

  function px(q) { return pad.l + (q / maxQ) * gW; }
  function py(y) { return pad.t + gH - (y / maxY) * gH; }

  /* Grid */
  ctx.strokeStyle = gridCol; ctx.lineWidth = 1;
  for (var yi = 0; yi <= 5; yi++) {
    var yv = yi * maxY / 5;
    ctx.beginPath(); ctx.moveTo(pad.l, py(yv)); ctx.lineTo(pad.l + gW, py(yv)); ctx.stroke();
  }
  for (var xi = 0; xi <= maxQ; xi++) {
    ctx.beginPath(); ctx.moveTo(px(xi), pad.t); ctx.lineTo(px(xi), pad.t + gH); ctx.stroke();
  }

  /* Axes */
  ctx.strokeStyle = axCol; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + gH); ctx.lineTo(pad.l + gW, pad.t + gH); ctx.stroke();
  ctx.fillStyle = txtCol; ctx.font = '10px IBM Plex Sans, sans-serif';
  ctx.textAlign = 'right';
  for (var yi2 = 0; yi2 <= 5; yi2++) {
    var yval = Math.round(yi2 * maxY / 5);
    ctx.fillText('$' + yval, pad.l - 5, py(yval) + 3);
  }
  ctx.textAlign = 'center';
  for (var xi2 = 0; xi2 <= maxQ; xi2++) {
    ctx.fillText(xi2, px(xi2), pad.t + gH + 14);
  }
  ctx.fillText('Q', pad.l + gW / 2, pad.t + gH + 28);

  /* Helper: draw a smooth curve */
  function drawCurve(colorStr, lineW, dashArr, valFn, startQ) {
    ctx.strokeStyle = colorStr; ctx.lineWidth = lineW;
    ctx.setLineDash(dashArr || []);
    ctx.beginPath();
    var first = true;
    for (var qi = (startQ||0); qi <= maxQ; qi++) {
      var yv2 = valFn(qi);
      if (yv2 < 0 || yv2 > maxY * 2) { first = true; continue; }
      if (first) { ctx.moveTo(px(qi), py(yv2)); first = false; }
      else ctx.lineTo(px(qi), py(yv2));
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  /* Always draw: CF horizontal + CV curve */
  ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, py(fc)); ctx.lineTo(pad.l + gW, py(fc)); ctx.stroke();
  ctx.setLineDash([]);
  drawCurve('#c9a84c', 2, [], function(q){ return expVC(a,b,q); });

  /* Optional curves */
  if (activeCurves.ct)  drawCurve('#4a7c3f', 2.5, [], function(q){ return expTC(fc,a,b,q); });
  if (activeCurves.cmt) drawCurve('#1d4e89', 2,   [], function(q){ return expTC(fc,a,b,q)/q; }, 1);
  if (activeCurves.cmv) drawCurve('#e0a020', 2, [3,3], function(q){ return expVC(a,b,q)/q; }, 1);
  if (activeCurves.cmf) drawCurve('#c05030', 1.5, [4,3], function(q){ return fc/q; }, 1);
  if (activeCurves.cmg) drawCurve('#5c3d99', 2, [], function(q){ return q===0?null:expTC(fc,a,b,q)-expTC(fc,a,b,q-1); }, 1);

  /* Vertical line at selected Q */
  // Store dot positions for tooltip hit-testing
  window._expDots = [];
  if (Qi > 0) {
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(px(Qi), pad.t); ctx.lineTo(px(Qi), pad.t + gH); ctx.stroke();
    ctx.setLineDash([]);
    /* Dots on active curves at Qi */
    function dotAt(colorStr, yVal, label) {
      if (yVal == null || yVal > maxY * 1.1 || yVal < 0) return;
      var cx = px(Qi), cy = py(yVal);
      ctx.fillStyle = colorStr;
      ctx.beginPath(); ctx.arc(cx, cy, 5.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = bgCol; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, 5.5, 0, Math.PI*2); ctx.stroke();
      // Draw value label directly on canvas
      var valStr = (Number.isInteger(yVal) ? yVal : parseFloat(yVal.toFixed(2))) + '';
      ctx.font = 'bold 10px IBM Plex Mono, monospace';
      ctx.textAlign = 'left';
      var tx = cx + 9, ty = cy + 4;
      if (tx + ctx.measureText(label + ' ' + valStr).width > W - pad.r) tx = cx - 9 - ctx.measureText(label + ' ' + valStr).width;
      // white bg for readability
      var tw = ctx.measureText(label + ':$' + valStr).width + 8;
      ctx.fillStyle = isDark ? 'rgba(36,36,32,0.85)' : 'rgba(255,255,255,0.85)';
      ctx.fillRect(tx - 2, ty - 10, tw, 14);
      ctx.fillStyle = colorStr;
      ctx.fillText(label + ':$' + valStr, tx, ty);
      // Store for hover
      window._expDots.push({ cx: cx, cy: cy, label: label, val: yVal, color: colorStr, dpr: dpr });
    }
    dotAt('#8b2500', fc, 'CF');
    dotAt('#c9a84c', expVC(a,b,Qi), 'CV');
    if (activeCurves.ct)  dotAt('#4a7c3f', expTC(fc,a,b,Qi), 'CT');
    if (activeCurves.cmt) dotAt('#1d4e89', expTC(fc,a,b,Qi)/Qi, 'CMT');
    if (activeCurves.cmv) dotAt('#e0a020', expVC(a,b,Qi)/Qi, 'CMV');
    if (activeCurves.cmf) dotAt('#c05030', fc/Qi, 'CMF');
    if (activeCurves.cmg) dotAt('#5c3d99', expTC(fc,a,b,Qi)-expTC(fc,a,b,Qi-1), 'CMg');
  }

  /* Legend */
  var legend = [
    { lbl: 'CF', color: '#8b2500' },
    { lbl: 'CV', color: '#c9a84c' },
  ];
  if (activeCurves.ct)  legend.push({ lbl: 'CT',  color: '#4a7c3f' });
  if (activeCurves.cmt) legend.push({ lbl: 'CMT', color: '#1d4e89' });
  if (activeCurves.cmv) legend.push({ lbl: 'CMV', color: '#e0a020' });
  if (activeCurves.cmf) legend.push({ lbl: 'CMF', color: '#c05030' });
  if (activeCurves.cmg) legend.push({ lbl: 'CMg', color: '#5c3d99' });
  ctx.font = 'bold 9px IBM Plex Sans, sans-serif'; ctx.textAlign = 'left';
  var lx = pad.l + 4, ly = pad.t + 12;
  legend.forEach(function(leg) {
    ctx.fillStyle = leg.color;
    ctx.fillRect(lx, ly - 7, 14, 3);
    ctx.fillText(leg.lbl, lx + 18, ly);
    lx += 44;
    if (lx > W - 60) { lx = pad.l + 4; ly += 14; }
  });
}

function checkExpQ1() {
  var fc = expState.fc, a = expState.a, b = expState.b;
  var fb  = document.getElementById('eq1_fb');
  var ans = parseFloat(document.getElementById('eq1_ans').value);
  if (isNaN(ans)) {
    fb.textContent = 'Ingresa un número en el campo de respuesta.';
    fb.className = 'exp-fb bad'; return;
  }
  // Use the fixed quiz target set at lesson-generation time
  var targetQ    = window._quizQ       != null ? window._quizQ       : 4;
  var lbl        = window._quizLbl     || 'CMT';
  var correctVal = window._quizCorrect != null ? window._quizCorrect : null;
  // Recompute if not stored
  if (correctVal == null) {
    var curve = window._quizCurve || 'cmt';
    var ctQ = expTC(fc,a,b,targetQ), vcQ = expVC(a,b,targetQ);
    if (curve === 'ct')  correctVal = ctQ;
    if (curve === 'cmt') correctVal = ctQ / targetQ;
    if (curve === 'cmv') correctVal = vcQ / targetQ;
    if (curve === 'cmf') correctVal = fc  / targetQ;
    if (curve === 'cmg') correctVal = ctQ - expTC(fc,a,b,targetQ-1);
    if (correctVal == null) correctVal = ctQ / targetQ;
  }
  var tol = Math.max(0.15, Math.abs(correctVal) * 0.005);
  if (Math.abs(ans - correctVal) <= tol) {
    fb.textContent = '✓ ¡Correcto! ' + lbl + '(Q=' + targetQ + ') = $' + parseFloat(correctVal.toFixed(2)) + '. El gráfico y el álgebra coinciden.';
    fb.className = 'exp-fb ok';
  } else {
    fb.textContent = '✗ Revisa. ' + lbl + '(Q=' + targetQ + ') = $' + parseFloat(correctVal.toFixed(2)) + '. Navega a Q=' + targetQ + ' en el gráfico y activa la curva ' + lbl + '.';
    fb.className = 'exp-fb bad';
  }
}

/* ════════════════════════════════════════
   DRAG & DROP LOGIC  (mouse + touch)
════════════════════════════════════════ */
var dndSelected   = null;   // tap-mode selected chip
var _touchClone   = null;   // floating ghost during touch-drag
var _touchChipIdx = null;   // which chip is being touch-dragged

/* ── Desktop mouse drag ── */
function dndDragStart(e) {
  e.dataTransfer.setData('chipIdx', e.target.getAttribute('data-idx'));
  e.target.style.opacity = '0.4';
}
function dndDragEnd(e) {
  e.currentTarget.style.opacity = '';
}
function dndOver(e)  { e.preventDefault(); e.currentTarget.classList.add('over'); }
function dndLeave(e) { e.currentTarget.classList.remove('over'); }
function dndDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  var idx = e.dataTransfer.getData('chipIdx');
  placeChip(idx, e.currentTarget);
}

/* ── Mobile touch drag ── */
function dndTouchStart(e) {
  var chip = e.currentTarget;
  if (chip.classList.contains('placed')) return;
  _touchChipIdx = chip.getAttribute('data-idx');
  // Create a floating ghost clone
  var rect = chip.getBoundingClientRect();
  _touchClone = chip.cloneNode(true);
  _touchClone.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;opacity:.85;' +
    'width:' + rect.width + 'px;left:' + rect.left + 'px;top:' + rect.top + 'px;margin:0;';
  document.body.appendChild(_touchClone);
  chip.style.opacity = '0.3';
  e.preventDefault();
}
function dndTouchMove(e) {
  if (!_touchClone) return;
  var t = e.touches[0];
  _touchClone.style.left = (t.clientX - _touchClone.offsetWidth  / 2) + 'px';
  _touchClone.style.top  = (t.clientY - _touchClone.offsetHeight / 2) + 'px';
  e.preventDefault();
}
function dndTouchEnd(e) {
  if (!_touchClone || _touchChipIdx == null) return;
  var t = e.changedTouches[0];
  // Remove clone first so it doesn't interfere with elementFromPoint
  document.body.removeChild(_touchClone);
  _touchClone = null;
  // Restore chip opacity
  var chip = document.getElementById('chip_' + _touchChipIdx);
  if (chip) chip.style.opacity = '';
  // Find drop target under finger
  var el = document.elementFromPoint(t.clientX, t.clientY);
  // Walk up to find a .drop-zone
  var zone = null;
  while (el && el !== document.body) {
    if (el.classList && el.classList.contains('drop-zone')) { zone = el; break; }
    el = el.parentElement;
  }
  if (zone) {
    placeChip(_touchChipIdx, zone);
  }
  _touchChipIdx = null;
  e.preventDefault();
}

/* ── Tap fallback (for short taps without movement) ── */
function dndTap(e) {
  // Only used on desktop or as secondary; touch handled by dndTouchStart/End
  if (e.sourceCapabilities && !e.sourceCapabilities.firesTouchEvents) {
    var chip = e.currentTarget;
    if (chip.classList.contains('placed')) return;
    if (dndSelected && dndSelected === chip) {
      dndSelected.style.outline = ''; dndSelected = null; return;
    }
    if (dndSelected) dndSelected.style.outline = '';
    dndSelected = chip;
    chip.style.outline = '2px solid var(--gold)';
  }
}
function dndZoneTap(e) {
  if (!dndSelected) return;
  var zone = e.currentTarget;
  if (zone.children.length > 0) return;
  placeChip(dndSelected.getAttribute('data-idx'), zone);
  dndSelected.style.outline = '';
  dndSelected = null;
}

/* ── Place a chip into a zone ── */
function placeChip(idx, zone) {
  if (zone.children.length > 0) return;
  var chip = document.getElementById('chip_' + idx);
  if (!chip || chip.classList.contains('placed')) return;
  chip.classList.add('placed');
  var display = document.createElement('div');
  display.className = 'chip';
  display.style.cssText = 'cursor:pointer;margin:0;font-size:.75rem';
  display.draggable = false;
  display.setAttribute('data-val', chip.getAttribute('data-val'));
  display.setAttribute('data-col', chip.getAttribute('data-col'));
  display.setAttribute('data-q',   chip.getAttribute('data-q'));
  display.setAttribute('data-idx', idx);
  display.textContent = chip.textContent;
  display.title = 'Toca para quitar';
  display.onclick = function(e) { e.stopPropagation(); removeFromZone(zone, idx); };
  zone.appendChild(display);
}
function removeFromZone(zone, idx) {
  zone.innerHTML = '';
  zone.classList.remove('correct','incorrect');
  var chip = document.getElementById('chip_' + idx);
  if (chip) { chip.classList.remove('placed'); chip.style.opacity = ''; }
}

/* ── Wire touch events to bank chips after DnD table is built ── */
function initDndTouch() {
  document.querySelectorAll('#dnd_bank .chip').forEach(function(chip) {
    chip.addEventListener('touchstart', dndTouchStart, { passive: false });
    chip.addEventListener('touchmove',  dndTouchMove,  { passive: false });
    chip.addEventListener('touchend',   dndTouchEnd,   { passive: false });
  });
}

function checkDnD() {
  var correct = 0, total = 0;
  var zones = document.querySelectorAll('.drop-zone');
  zones.forEach(function(zone) {
    var col = zone.getAttribute('data-col');
    var q   = parseInt(zone.getAttribute('data-q'));
    if (!col || isNaN(q)) return;
    total++;
    if (zone.children.length === 0) { zone.classList.add('incorrect'); return; }
    var chip = zone.children[0];
    var chipCol = chip.getAttribute('data-col');
    var chipQ   = parseInt(chip.getAttribute('data-q'));
    var chipVal = parseFloat(chip.getAttribute('data-val'));
    // Determine correct value
    var correctVal;
    var fc = expState.fc;
    var a  = expState.a;
    var b  = expState.b;
    if (col === 'fc')  correctVal = fc;
    if (col === 'cv')  correctVal = expVC(a, b, q);
    if (col === 'mc')  correctVal = q === 0 ? null : expTC(fc,a,b,q) - expTC(fc,a,b,q-1);
    if (col === 'atc') correctVal = q === 0 ? null : expTC(fc,a,b,q) / q;
    if (col === 'avc') correctVal = q === 0 ? null : expVC(a,b,q) / q;
    if (correctVal === null) return;
    var isOk = Math.abs(chipVal - correctVal) < 0.2;
    zone.classList.toggle('correct', isOk);
    zone.classList.toggle('incorrect', !isOk);
    if (isOk) correct++;
  });
  document.getElementById('dnd_score').textContent = '✔ ' + correct + ' de ' + total + ' celdas correctas. ' + (correct === total ? '¡Tabla completa! 🎉' : 'Revisa las celdas marcadas en rojo.');
}

function resetDnD() {
  document.querySelectorAll('.drop-zone').forEach(function(zone) {
    zone.innerHTML = '';
    zone.classList.remove('correct','incorrect','over');
  });
  document.querySelectorAll('.chip').forEach(function(chip) {
    chip.classList.remove('placed');
    chip.style.outline = '';
    chip.style.opacity = '';
  });
  document.getElementById('dnd_score').textContent = '';
  dndSelected = null;
  if (_touchClone) { document.body.removeChild(_touchClone); _touchClone = null; }
  _touchChipIdx = null;
  setTimeout(initDndTouch, 50);
}

    doc.text('MICROECONOMÍA  ·  COSTOS DE PRODUCCIÓN', M, 10);
    doc.setTextColor(232,228,216); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(pi+1)+' de '+total+'  —  '+prob.title, M, 17);
    wy = 25;

    var qRaw = (prob.questionText||'').replace(/<[^>]+>/g,'');
    var qFn  = (prob.fn||'').replace(/<[^>]+>/g,'');
    doc.setFontSize(8.5);
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    doc.setFontSize(7.5);
    var fnLines = doc.splitTextToSize(qFn, TW-10);

    doc.setFillColor(isOk2?232:255, isOk2?240:232, isOk2?232:228);
