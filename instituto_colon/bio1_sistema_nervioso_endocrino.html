<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Nervioso y Endocrino: Coordinación Corporal — Biología · 1° Secundaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — INJECTION BLOCK ──────────────────────────────────────
   To brand this guide for an institution, change ONLY the SCHOOL CONFIG
   object at the top of <script> below. These :root values are only a
   fallback for the instant before applyBranding() runs.
   ──────────────────────────────────────────────────────────────────────── */
:root {
  --green:      #1a3a6b;   /* PRIMARY      */
  --green-dark: #0f2244;   /* PRIMARY dark (darken ~15%)  */
  --green-bg:   #e8edf5;   /* PRIMARY tint (lighten ~85%) */
  --gold:       #c9a84c;   /* ACCENT       */
  --gold-bg:    #faf3e0;   /* ACCENT tint  (lighten ~85%) */
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #4a7abf;
  --green-dark: #7aaae0;
  --green-bg:   #0e1e38;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:100px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.55rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── RESTORE BAR ── */
#restoreBar { display:none; background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.85rem 1.1rem; margin-top:.9rem; font-size:.88rem; color:var(--text); text-align:left; }
#restoreBar strong { color:var(--gold); }
.rbar-btns { display:flex; gap:.6rem; margin-top:.6rem; }
.rbtn { padding:.45rem 1rem; border-radius:8px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; }
.rbtn-yes { background:var(--green); color:#fff; }
.rbtn-yes:hover { background:var(--green-dark); }
.rbtn-no  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); flex-wrap:wrap; }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.lang-btn { padding:.28rem .7rem; font-size:.72rem; font-weight:600; letter-spacing:.06em; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; transition:all .15s; }
.lang-btn.active { background:var(--green); color:#fff; }
[data-theme="dark"] .lang-btn.active { background:var(--green-dark); }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.55rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; color:var(--text2); }
.callout p + p { margin-top:.5rem; }

/* ── RULE CARDS (now interactive) ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); margin-bottom:.65rem; }
.rchips { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.55rem; }
.rchip { font-family:'IBM Plex Mono',monospace; font-size:.8rem; font-weight:600; padding:.4rem .6rem; border:1.5px solid var(--border); border-radius:6px; cursor:pointer; background:var(--surface2); color:var(--text2); transition:all .13s; user-select:none; text-align:center; min-width:54px; }
.rchip:hover { border-color:var(--green); }
/* Pending (first click, not yet verified) */
.rchip.selected { border-color:var(--gold); background:var(--gold-bg); color:var(--text); }
/* After Verificar: student chose correctly → solid dark green */
.rchip.rt-strong-ok  { border-color:#1a6b40; background:#1a6b40; color:#fff; cursor:default; }
/* After Verificar: student chose wrong → soft red background, dark red text (readable) */
.rchip.rt-strong-bad { border-color:#c0392b; background:#fde8e6; color:#9b1c0e; cursor:default; }
/* After Verificar: reveals the correct answer (student didn't pick it) → light green */
.rchip.rt-light-ok   { border-color:#1a6b40; background:#d4edda; color:#1a6b40; cursor:default; }
/* After Verificar: a wrong option that was not chosen → just dim it */
.rchip.rt-light-bad  { border-color:var(--border); background:var(--surface2); color:var(--text3); opacity:.55; cursor:default; }
.rverify-btn { font-size:.72rem; font-weight:600; padding:.32rem .7rem; border-radius:6px; border:none; background:var(--green); color:#fff; cursor:pointer; }
.rverify-btn:hover { background:var(--green-dark); }
.rfb { font-size:.72rem; color:var(--text3); margin-top:.4rem; min-height:1rem; }

/* ── INTERACTIVE WIDGET CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.iw-tag { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:.4rem; }
.iw-title { font-family:'Crimson Pro',serif; font-size:1.2rem; font-weight:700; margin-bottom:.5rem; }
.iw-desc { font-size:.85rem; color:var(--text2); margin-bottom:1rem; }

/* ── SLIDER CONTROLS + LIVE METRICS (for explorable widgets) ── */
.cgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:.7rem; margin:.9rem 0; }
.cg label { display:block; font-size:.76rem; color:var(--text2); margin-bottom:.3rem; font-family:'IBM Plex Mono',monospace; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; margin-top:.8rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.7rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.2rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:1.05rem; font-weight:600; }
.mnum.cs { color:var(--green-dark); }
.mnum.ps { color:var(--gold); }

/* ── FACTOR LADDER ── */
.ladder-wrap { display:flex; gap:1.4rem; flex-wrap:wrap; margin:.9rem 0; }
.ladder-block { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.85rem 1.1rem; }
.ladder-title { font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.5rem; }
.ladder { display:flex; flex-direction:column; font-family:'IBM Plex Mono',monospace; font-size:.86rem; }
.ladder-row { display:flex; align-items:center; gap:.55rem; padding:.22rem 0; border-bottom:1px dashed var(--border); }
.ladder-row.result { border-bottom:none; border-top:1.5px solid var(--gold); margin-top:.2rem; padding-top:.45rem; font-weight:700; color:var(--green-dark); }
.ladder-num { min-width:2.2rem; text-align:right; }
.ladder-op { color:var(--text3); }
.ladder-div { color:var(--gold); font-weight:700; min-width:1.4rem; text-align:center; }

/* ── SIEVE OF ERATOSTHENES WIDGET (compact) ── */
.sieve-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:.35rem; margin-bottom:1rem; max-width:480px; }
.sieve-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:6px; background:var(--surface2); cursor:pointer; font-size:.78rem; font-family:'IBM Plex Mono',monospace; color:var(--text); transition:all .12s; user-select:none; }
.sieve-cell:hover { border-color:var(--green); }
.sieve-cell.marked { background:var(--gold-bg); color:var(--gold); text-decoration:line-through; border-color:var(--gold); }
.sieve-cell.check-ok { border-color:var(--ok); background:var(--ok-bg); color:var(--ok); }
.sieve-cell.check-bad { border-color:var(--bad); box-shadow:0 0 0 2px var(--bad-bg); }
.sieve-btns { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:.9rem; }
.sieve-btn { padding:.55rem 1rem; border-radius:8px; font-size:.82rem; font-weight:600; cursor:pointer; border:none; }
.sieve-btn.primary { background:var(--green); color:#fff; }
.sieve-btn.primary:hover { background:var(--green-dark); }
.sieve-btn.secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.sieve-result { font-size:.85rem; color:var(--text2); margin-top:.6rem; min-height:1.3rem; }
.sieve-result strong { color:var(--green-dark); }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--text); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 72px; }
  .wtitle { font-size: 1.3rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.25rem; }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .rules-grid { grid-template-columns: 1fr; }
  .rchip { font-size: .7rem; padding: .28rem .5rem; }
  .ladder-wrap { gap: .9rem; }
  .sieve-grid { grid-template-columns: repeat(5,1fr); gap: .3rem; max-width: 100%; }
  .sieve-cell { font-size: .68rem; border-radius: 4px; }
}

/* ── DRAG-TO-MATCH CARD ── */
.match-container { display:flex; gap:1rem; flex-wrap:wrap; margin:.6rem 0; }
.match-col { flex:1; min-width:140px; }
.match-col-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.09em; color:var(--text3); margin-bottom:.4rem; font-weight:600; }
/* Left-column term chips */
.match-item { padding:.5rem .75rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); font-size:.82rem; margin-bottom:.4rem; cursor:grab; user-select:none; transition:border-color .15s, background .15s; color:var(--text2); }
.match-item:hover { border-color:var(--green); background:var(--green-bg); }
.match-item.dragging { opacity:.35; cursor:grabbing; }
/* Right-column definition slots */
.match-slot { position:relative; min-height:2.8rem; padding:.4rem .65rem; border:1.5px dashed var(--border); border-radius:8px; background:var(--surface); font-size:.75rem; margin-bottom:.4rem; transition:border-color .15s, background .15s; color:var(--text3); display:flex; align-items:center; }
.match-slot .slot-def-label { font-size:.72rem; color:var(--text3); line-height:1.3; }
.match-slot.drag-over { border-color:var(--gold); background:var(--gold-bg); }
.match-slot.filled { border-style:solid; border-color:var(--green); }
.match-slot.slot-ok  { border-color:#1a6b40; background:#d4edda; }
.match-slot.slot-bad { border-color:#c0392b; background:#fde8e6; }
/* Term chip when placed in a slot */
.slot-placed-chip { display:inline-block; padding:.38rem .65rem; background:var(--green); color:#fff; border-radius:7px; font-size:.8rem; font-weight:600; cursor:pointer; user-select:none; margin-right:.4rem; flex-shrink:0; }
.slot-placed-chip:hover { background:var(--green-dark); }
.slot-placed-chip.match-ok  { background:#1a6b40; cursor:default; }
.slot-placed-chip.match-bad { background:#c0392b; cursor:default; }
.match-check-btn { font-size:.8rem; font-weight:600; padding:.45rem 1.1rem; border-radius:8px; border:none; background:var(--green); color:#fff; cursor:pointer; margin-top:.4rem; }
.match-check-btn:hover { background:var(--green-dark); }
.match-check-btn:disabled { opacity:.55; cursor:default; }
.match-fb { font-size:.82rem; margin-top:.5rem; min-height:1.1rem; }
.mf-outer{display:inline-block;vertical-align:middle;text-align:center;margin:0 .15em}
.mf-num{display:block;padding:0 .25em;border-bottom:1.5px solid currentColor;line-height:1.15;font-size:.85em}
.mf-den{display:block;padding:0 .25em;line-height:1.15;font-size:.85em}

<body>

<!-- ════════════════════ WELCOME ════════════════════ -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogos" id="wlogos">
      <img id="logo-left" src="" alt="Institución" style="display:none">
    </div>
    <div class="wtitle" id="wtitle-el">Sistema Nervioso y Endocrino: Coordinación Corporal</div>
    <div class="wcourse" id="wcourse-el">Biología · 1° Secundaria</div>
    <label class="flabel" id="lbl-name-el" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Tu nombre completo" autocomplete="name" oninput="checkForSavedSession()">
    <label class="flabel" id="lbl-group-el" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="ej. 2A" autocomplete="off" oninput="checkForSavedSession()">
    <button class="sbtn" id="startBtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div id="restoreBar">
      <strong id="restoreMsg">📂 Tienes una sesión guardada.</strong><br>
      <span id="restoreSub">¿Deseas continuar donde la dejaste?</span>
      <div class="rbar-btns">
        <button class="rbtn rbtn-yes" id="restoreBtn" onclick="restoreSession()">Continuar</button>
        <button class="rbtn rbtn-no"  id="dismissBtn" onclick="dismissRestore()">Nueva sesión</button>
      </div>
    </div>
    <div class="wfoot" style="display:flex;justify-content:center;align-items:center;padding-top:.9rem">
      <svg width="160" height="52" viewBox="0 0 180 52" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lbt { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.1em; fill:var(--green); font-size:28px; }
          .lbl { stroke:var(--gold); stroke-width:2.5; }
          .lba { fill:var(--gold); }
        </style>
        <polyline points="5,40 14,28 24,33 36,14" fill="none" stroke="var(--green)" stroke-width="3"/>
        <circle cx="36" cy="14" r="4.5" class="lba"/>
        <line x1="52" y1="6" x2="52" y2="46" class="lbl"/>
        <text x="64" y="38" class="lbt">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- ════════════════════ LESSON ════════════════════ -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="hlogos">
      <img id="hlogo-left"  src="" alt="Institución" style="display:none">
      <img id="hlogo-right" src="" alt="Institución" style="display:none">
    </div>
    <div class="hsep"></div>
    <div class="htitle">Sistema Nervioso y Endocrino: Coordinación Corporal</div>
    <div class="hsep"></div>
    <div class="halexis">
      <svg width="120" height="30" viewBox="0 0 100 34" xmlns="http://www.w3.org/2000/svg">
        <style>
          .lht { font-family:'Crimson Pro',serif; font-weight:700; letter-spacing:.08em; fill:var(--green); font-size:16px; }
          .lhl { stroke:var(--gold); stroke-width:2; }
          .lha { fill:var(--gold); }
        </style>
        <polyline points="4,24 10,18 16,20 22,10" fill="none" stroke="var(--green)" stroke-width="2"/>
        <circle cx="22" cy="10" r="2.5" class="lha"/>
        <line x1="32" y1="6" x2="32" y2="28" class="lhl"/>
        <text x="42" y="22" class="lht">LIAXA</text>
      </svg>
    </div>
    <div class="hchip" id="studentChip"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>

  <div class="section" id="s_results" style="display:none;">
    <div class="sbody" style="text-align:center;padding:2rem 1rem;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;<span id="pdfBtnLbl">Descargar Resultados PDF</span></button>
    </div>
  </div>
</div>

/* ── Drawing palette, derived from the school's colours ──────────────────
   slots 1-2 : school primary + accent
   slots 3-4 : the two of black/red/blue least similar to the school colours
   ───────────────────────────────────────────────────────────────────── */
var DRAW_PALETTE = (function () {
  function hex2rgb(h) {
    h = String(h).replace('#', '');
    if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
  }
  function dist(a, b) {
    var dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
    return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
  }
  var COMMON = ['#1a1a16', '#c0392b', '#1d4e89'];   /* black, red, blue */
  var schoolRGB;
  try {
    schoolRGB = [hex2rgb(SCHOOL.primary), hex2rgb(SCHOOL.accent)];
  } catch (e) {
    return [SCHOOL.primary, SCHOOL.accent, '#1a1a16', '#1d4e89'];
  }
  var scored = COMMON.map(function (c, idx) {
    var rgb = hex2rgb(c);
    var nearest = Math.min(dist(rgb, schoolRGB[0]), dist(rgb, schoolRGB[1]));
    return { c: c, idx: idx, d: nearest };
  });
  scored.sort(function (a, b) { return b.d - a.d; });      /* farthest first */
  var keep = scored.slice(0, 2);
  keep.sort(function (a, b) { return a.idx - b.idx; });    /* restore visual order */
  return [SCHOOL.primary, SCHOOL.accent, keep[0].c, keep[1].c];
})();

function drawDotsHTML() {
  return DRAW_PALETTE.map(function (c, i) {
    return '<div class="cdot' + (i === 0 ? ' sel' : '') + '" data-color="' + c +
           '" style="background:' + c + '"></div>';
  }).join('');
}

function applyThemeColors(theme) {
  var r = document.documentElement.style;
  if (theme === 'dark') {
    r.setProperty('--green',      SCHOOL.darkPrimary);
    r.setProperty('--green-dark', SCHOOL.darkPrimaryDark);
    r.setProperty('--green-bg',   SCHOOL.darkPrimaryBg);
    r.setProperty('--gold',       SCHOOL.darkAccent);
    r.setProperty('--gold-bg',    SCHOOL.darkAccentBg);
  } else {
    r.setProperty('--green',      SCHOOL.primary);
    r.setProperty('--green-dark', SCHOOL.primaryDark);
    r.setProperty('--green-bg',   SCHOOL.primaryBg);
    r.setProperty('--gold',       SCHOOL.accent);
    r.setProperty('--gold-bg',    SCHOOL.accentBg);
  }
}

  return 'liaxa_bio1_nervioso_endocrino__att__' + (name + '__' + group).replace(/\s+/g, '_');
}
function nextAttempt(name, group) {
  var k = getAttemptKey(name, group);
  var n = 0;
  try { n = parseInt(localStorage.getItem(k) || '0', 10) || 0; } catch(e) {}
  n++;
  try { localStorage.setItem(k, String(n)); } catch(e) {}
  return n;
}

  try { return parseInt(localStorage.getItem(k) || '1', 10) || 1; } catch(e) { return 1; }

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var tt = s ^ (s >>> 16);
    tt = Math.imul(tt, 0x21f0aaad);
    tt ^= (tt >>> 15);
    tt = Math.imul(tt, 0x735a2d97);
    return ((tt ^ (tt >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

function saveSession() {
  if (!studentData.name) return;
  var drawings = [], texts = [], photos = [];
  problems.forEach(function(p, i) {
    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      drawings.push(isCanvasBlank(dc) ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }

    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}
function loadSession(name, group) {
  var key = 'liaxa_bio1_nervioso_endocrino__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  var att = currentAttempt(name, group);
  buildLesson(seededRng(name + group + att));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

/* ================================================
   CANVAS
   ================================================ */
function isCanvasBlank(dc) {
  if (!dc || !dc.width) return true;
  var ref = document.createElement('canvas');
  ref.width = dc.width; ref.height = dc.height;
  var rctx = ref.getContext('2d');
  rctx.fillStyle = '#ffffff';
  rctx.fillRect(0, 0, ref.width, ref.height);
  return dc.toDataURL() === ref.toDataURL();
}
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — two-tap confirmation (Rule 8)
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  // Skip match cards — they get restored differently (just mark answered)
  if (prob.isMatch) {
    prob.studentChoice = chosenIdx;
    document.getElementById('pc' + probIdx).classList.add(chosenIdx === prob.correctIdx ? 'ok' : 'bad');
    if (chosenIdx === prob.correctIdx) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    return;
  }
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = '<strong>' + (isOk ? t('fb-correct') : t('fb-wrong')) + '</strong> ' + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   DRAG-TO-MATCH CARD — for graded questions that fit a matching format
   Each card has a left column (terms) and right column (slots/definitions).
   Student drags a term onto a slot. Graded like MC (adds to answeredCount/correctCount).
   ================================================ */
var MATCH_REGISTRY = {}; // keyed by probIdx: { pairs, slots:{defIdx->termIdx}, termOrder:[ti,...], answered }

function buildMatchCard(prob, i) {
  var pairs = prob.pairs; // [{term, definition}, ...] already in display order from buildMatchProblem
  MATCH_REGISTRY[i] = { pairs: pairs, slots: {}, termOrder: pairs.map(function(_,ti){ return ti; }), answered: false };

  // Left column: term chips (one per pair, in shuffled display order)
  var termItems = pairs.map(function(pair, ti) {
    return '<div class="match-item" id="mterm_' + i + '_' + ti + '" ' +
      'draggable="true" ' +
      'ondragstart="matchDragStart(' + i + ',' + ti + ',this)" ' +
      'ontouchstart="matchTouchStart(event,' + i + ',' + ti + ',\'term\')" ' +
      'style="touch-action:none">' + pair.term + '</div>';
  }).join('');

  // Right column: definition slots (one per pair, same index order as pairs)
  var slotItems = pairs.map(function(pair, di) {
    return '<div class="match-slot" id="mslot_' + i + '_' + di + '" ' +
      'ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ' +

/* ── helpers ── */
function matchTermEl(probIdx, termIdx) { return document.getElementById('mterm_' + probIdx + '_' + termIdx); }
function matchSlotEl(probIdx, defIdx)  { return document.getElementById('mslot_' + probIdx + '_' + defIdx); }

/* Place termIdx into slot defIdx: move the DOM chip, hide left-column item */
function matchPlace(probIdx, defIdx, termIdx) {
  var reg = MATCH_REGISTRY[probIdx];
  if (!reg || reg.answered) return;
  var pair = reg.pairs[termIdx];

  // If this term was already placed somewhere else, vacate that slot first
  Object.keys(reg.slots).forEach(function(k) {
    if (reg.slots[k] === termIdx) { matchVacate(probIdx, parseInt(k, 10), false); }
  });

  // If this slot already had a term, return it to the left column
  if (reg.slots[defIdx] !== undefined) { matchVacate(probIdx, defIdx, true); }

  // Register
  reg.slots[defIdx] = termIdx;

  // Hide original left-column chip
  var termEl = matchTermEl(probIdx, termIdx);
  if (termEl) { termEl.style.visibility = 'hidden'; termEl.style.pointerEvents = 'none'; termEl.style.outline = ''; }

  // Render chip inside the slot (replacing just the empty-slot look)
  var slotEl = matchSlotEl(probIdx, defIdx);
  if (!slotEl) return;
  slotEl.classList.add('filled');
  // Remove any previous placed chip
  var prev = slotEl.querySelector('.slot-placed-chip');
  if (prev) prev.remove();
  var chip = document.createElement('div');
  chip.className = 'slot-placed-chip';
  chip.draggable = true;
  chip.dataset.termIdx = termIdx;
  chip.textContent = pair.term;
  // Drag from slot back into drag flow
  chip.addEventListener('dragstart', function(e) {
    _matchDragProbIdx = probIdx; _matchDragIdx = termIdx;
    chip.classList.add('dragging');
    setTimeout(function() { chip.classList.remove('dragging'); }, 0);
  });
  // Click/tap to return to left column
  chip.addEventListener('click', function() { matchReturn(probIdx, defIdx); });
  chip.addEventListener('touchstart', function(ev) {
    ev.preventDefault();
    matchTouchStart(ev, probIdx, termIdx, 'slot', defIdx);
  }, { passive: false });
  slotEl.appendChild(chip);
}

/* Vacate slot defIdx: remove chip from slot, restore left-column item */
function matchVacate(probIdx, defIdx, restoreLeft) {
  var reg = MATCH_REGISTRY[probIdx];
  var termIdx = reg.slots[defIdx];
  if (termIdx === undefined) return;
  delete reg.slots[defIdx];
  var slotEl = matchSlotEl(probIdx, defIdx);
  if (slotEl) {
    slotEl.classList.remove('filled');
    var chip = slotEl.querySelector('.slot-placed-chip');
    if (chip) chip.remove();
  }
  if (restoreLeft) {
    var termEl = matchTermEl(probIdx, termIdx);
    if (termEl) { termEl.style.visibility = ''; termEl.style.pointerEvents = ''; }
  }
}

/* Return term from slot to left column (click on placed chip) */
function matchReturn(probIdx, defIdx) {
  var reg = MATCH_REGISTRY[probIdx];
  if (!reg || reg.answered) return;
  matchVacate(probIdx, defIdx, true);
  _touchSelected = null;
}

/* ── Drag-and-drop ── */
var _matchDragIdx = null, _matchDragProbIdx = null;
function matchDragStart(probIdx, termIdx, el) {
  _matchDragProbIdx = probIdx; _matchDragIdx = termIdx;
  el.classList.add('dragging');
  setTimeout(function() { el.classList.remove('dragging'); }, 0);
}
function matchDrop(probIdx, defIdx, slotEl) {
  slotEl.classList.remove('drag-over');
  if (_matchDragProbIdx !== probIdx || _matchDragIdx === null) return;
  matchPlace(probIdx, defIdx, _matchDragIdx);
  _matchDragIdx = null; _matchDragProbIdx = null;
}

/* ── Touch (tap-to-select, tap-to-place, tap-placed-to-return) ── */
var _touchSelected = null; // { probIdx, termIdx }
function matchTouchStart(ev, probIdx, termIdx, source, slotDefIdx) {
  ev.preventDefault();
  var reg = MATCH_REGISTRY[probIdx];
  if (!reg || reg.answered) return;

  // Tapped a placed chip in a slot → return it
  if (source === 'slot') {
    matchReturn(probIdx, slotDefIdx);
    _touchSelected = null;
    return;
  }

  // source === 'term': left-column chip tapped
  // If same item already selected → deselect
  if (_touchSelected && _touchSelected.probIdx === probIdx && _touchSelected.termIdx === termIdx) {
    var prevEl = matchTermEl(probIdx, termIdx);
    if (prevEl) prevEl.style.outline = '';
    _touchSelected = null;
    return;
  }
  // Deselect any previous selection
  if (_touchSelected) {
    var pEl = matchTermEl(_touchSelected.probIdx, _touchSelected.termIdx);
    if (pEl) pEl.style.outline = '';
  }
  // Only selectable if the term hasn't been placed yet
  var termEl = matchTermEl(probIdx, termIdx);
  if (!termEl || termEl.style.visibility === 'hidden') return; // already placed
  _touchSelected = { probIdx: probIdx, termIdx: termIdx };
  termEl.style.outline = '2.5px solid var(--gold)';

  // Attach one-shot tap listener to all slots of this card
  document.querySelectorAll('#mslots_' + probIdx + ' .match-slot').forEach(function(slot, di) {
    slot.onclick = function() {
      if (!_touchSelected || _touchSelected.probIdx !== probIdx) { slot.onclick = null; return; }
      var ti = _touchSelected.termIdx;
      var tEl = matchTermEl(probIdx, ti);
      if (tEl) tEl.style.outline = '';
      _touchSelected = null;
      matchPlace(probIdx, di, ti);
      // Clear all slot onclick handlers for this card
      document.querySelectorAll('#mslots_' + probIdx + ' .match-slot').forEach(function(s) { s.onclick = null; });
    };
  });
}

function checkMatch(probIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var reg = MATCH_REGISTRY[probIdx];
  if (!reg) return;
  var total = reg.pairs.length;
  var correct = 0;
  reg.pairs.forEach(function(pair, defIdx) {
    var slotEl = matchSlotEl(probIdx, defIdx);
    var assignedTermIdx = reg.slots[defIdx];
    var isOk = (assignedTermIdx !== undefined && reg.pairs[assignedTermIdx].term === pair.term);
    if (slotEl) {
      slotEl.classList.remove('filled', 'slot-ok', 'slot-bad');
      slotEl.classList.add(isOk ? 'slot-ok' : 'slot-bad');
      // Color the placed chip too
      var chip = slotEl.querySelector('.slot-placed-chip');
      if (chip) chip.classList.add(isOk ? 'match-ok' : 'match-bad');
    }
    if (isOk) correct++;
  });
  reg.answered = true;
  var allCorrect = correct === total;
  prob.studentChoice = allCorrect ? 0 : 1;
  prob.correctIdx = 0;
  document.getElementById('mchk_' + probIdx).disabled = true;
  var fb = document.getElementById('mfb_' + probIdx);
  if (fb) {
    fb.innerHTML = correct + '/' + total + ' ' + (LANG==='es'?'correctas':'correct') +
      ' — ' + (allCorrect
        ? '<strong style="color:var(--ok)">' + (LANG==='es'?'✓ ¡Perfecto! ':'✓ Perfect! ') + prob.explanation + '</strong>'
        : '<span style="color:var(--bad)">✗ ' + prob.explanation + '</span>');
  }
  document.getElementById('pc' + probIdx).classList.add(allCorrect ? 'ok' : 'bad');
  if (allCorrect) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

function shuffleOptsArr(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp; }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

function buildProblemFromBank(bank, rng, titleEs, titleEn) {
  var item = pickVariant(bank, rng);
  var es = LANG === 'es';
  var correct = es ? item.correct : item.correctEn;
  var wrongs = es ? item.wrongs : item.wrongsEn;
  var sh = shuffleOptsArr([correct].concat(wrongs), correct, rng);
  return {
    title: es ? titleEs : titleEn,
    questionText: es ? item.es : item.en,
    options: sh.opts, correctIdx: sh.correctIdx,
    hint: es ? item.hint : item.hintEn,
    explanation: es ? item.exp : item.expEn,
    showWork: false   // Bio conceptual questions — no drawing needed
  };
}

function buildMatchProblem(pairs, rng, title, question, hint, explanation) {
  return {
    title: title,
    questionText: question,
    hint: hint,
    explanation: explanation,
    pairs: shuffle(pairs, rng),
    isMatch: true,
    options: ['Correcto', 'Incorrecto'],
    correctIdx: 0,
    studentChoice: null,
    pendingChoice: null,
    showWork: false
  };
}
