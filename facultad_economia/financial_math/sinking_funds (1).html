<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinking Funds — Financial Mathematics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:         #18181a;
  --surface:    #242420;
  --surface2:   #2e2e28;
  --border:     #3a3830;
  --text:       #e8e4da;
  --text2:      #b0aa9e;
  --text3:      #7a7468;
  --shadow:     0 4px 20px rgba(0,0,0,.35);
  --green:      #6aaa5f;
  --green-dark: #8ecf82;
  --green-bg:   #1a281a;
  --gold:       #d4b86a;
  --gold-bg:    #241e0e;
  --ok:         #4a9a6f;
  --ok-bg:      rgba(74,154,111,.12);
  --bad:        #c05030;
  --bad-bg:     rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── MATH FRACTIONS ── */
.mf-outer { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; line-height:1.1; }
.mf-num   { border-bottom:1.5px solid var(--text); padding:0 .2em .1em; font-size:.92em; text-align:center; }
.mf-den   { padding:.1em .2em 0; font-size:.92em; text-align:center; }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface); }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── DRAG AND DROP ── */
.dd-zone { background:var(--surface2); border:2px dashed var(--border); border-radius:8px; padding:1rem; margin:1rem 0; }
.dd-chips { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:.75rem; }
.dd-chip { background:var(--green); color:#fff; border-radius:6px; padding:.3rem .75rem; font-family:'IBM Plex Mono',monospace; font-size:.82rem; cursor:grab; user-select:none; transition:opacity .15s, transform .1s; }
.dd-chip:active { cursor:grabbing; transform:scale(1.07); }
.dd-chip.used { opacity:.35; cursor:default; }
.dd-slot { border:2px dashed var(--border); border-radius:8px; padding:.55rem .75rem; min-height:44px; display:flex; align-items:center; justify-content:space-between; gap:.4rem; font-size:.82rem; transition:border-color .15s, background .15s; }
.dd-slot.drag-over { border-color:var(--green); background:var(--green-bg); }
.dd-slot.correct { border-color:var(--ok); background:var(--ok-bg); }
.dd-slot.wrong { border-color:var(--bad); background:var(--bad-bg); }
.dd-slot-label { font-size:.72rem; color:var(--text3); white-space:nowrap; }
.dd-slot-val { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--green-dark); font-weight:600; }
.dd-check-btn { background:var(--green); color:#fff; border:none; border-radius:7px; padding:.4rem 1rem; font-size:.82rem; cursor:pointer; margin-top:.75rem; }
.dd-reset-btn { background:none; border:1px solid var(--border); color:var(--text2); border-radius:7px; padding:.4rem .8rem; font-size:.82rem; cursor:pointer; margin-top:.75rem; margin-left:.5rem; }
.dd-feedback { font-size:.82rem; margin-top:.5rem; padding:.5rem .75rem; border-radius:7px; display:none; }

/* ── SINKING FUND TABLE ── */
.sf-table { width:100%; border-collapse:collapse; font-size:.82rem; margin-top:.7rem; }
.sf-table th { background:var(--green); color:#fff; padding:.45rem .6rem; text-align:center; font-weight:600; font-size:.74rem; }
.sf-table td { padding:.4rem .6rem; text-align:right; border-bottom:1px solid var(--border); }
.sf-table td:first-child { text-align:center; font-weight:600; }
.sf-table tr:last-child td { font-weight:700; background:var(--surface2); }
.sf-table tr:nth-child(even) td { background:var(--green-bg); }

/* ── CALCULATOR BOX ── */
.calc-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.1rem 1.2rem; }
.calc-row { display:flex; align-items:center; gap:.7rem; margin-bottom:.6rem; }
.calc-lbl { font-size:.8rem; color:var(--text3); min-width:130px; }
.calc-inp { flex:1; padding:.45rem .65rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface2); color:var(--text); font-family:inherit; font-size:.88rem; }
.calc-inp:focus { outline:none; border-color:var(--green); }
.calc-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:.55rem 1.1rem; font-size:.88rem; font-weight:600; cursor:pointer; margin-top:.3rem; transition:background .18s; }
.calc-btn:hover { background:var(--green-dark); }
.calc-result { margin-top:.65rem; font-size:.86rem; color:var(--text2); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .wcard { padding: 1.6rem 1.1rem; border-radius: 12px; }
  .wlogos img { height: 38px; }
  .wtitle { font-size: 1.35rem; }
  .htitle { display: none; }
  .hlogos img { height: 20px; }
  .hchip { font-size: .63rem; padding: .15rem .45rem; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .lbody { padding: 1.2rem .7rem 3rem; }
  .section h2 { font-size: 1.3rem; }
  .rules-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .pbody { padding: .75rem; }
  .pstmt { font-size: .84rem; }
  .mcopt { font-size: .83rem; padding: .58rem .7rem; }
  .dcanvas { height: 220px; }
  .ctoolbar { gap: .25rem; }
  .callout { padding: .8rem .9rem; }
  .rcard { overflow-x: auto; }
  .calc-lbl { min-width: 80px; }
  .sf-table { font-size: .75rem; }
  .dd-chip { font-size: .76rem; padding: .25rem .55rem; }
}
</style>
</head>

/* ── SEEDED RNG ── */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left), y: (src.clientY - r.top) };
  }
  function onDown(e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p.x; ly = p.y; ctx.beginPath(); ctx.moveTo(lx, ly); }
  function onMove(e) { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); lx = p.x; ly = p.y; saveSession(); }
  function onUp() { drawing = false; }
  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── ANSWER HANDLER ── */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

/* ── SINKING FUND CALCULATOR ── */
function buildSFCalc(containerId, prefix) {
  var FV  = parseFloat(document.getElementById(prefix + 'FV').value);
  var rAnn = parseFloat(document.getElementById(prefix + 'r').value);
  var n   = parseInt(document.getElementById(prefix + 'n').value);
  var freq = document.getElementById(prefix + 'freq').value;
  var res = document.getElementById(prefix + 'res');
  var tbl = document.getElementById(containerId);
  if (isNaN(FV) || isNaN(rAnn) || isNaN(n) || FV <= 0 || rAnn <= 0 || n <= 0) {
    res.style.display = 'block';
    res.innerHTML = '<span style="color:var(--bad)">⚠ Please enter valid positive numbers for all fields.</span>';
    tbl.innerHTML = '';
    return;
  }
  var periods, r;
  if (freq === 'monthly') { periods = n * 12; r = rAnn / 100 / 12; }
  else if (freq === 'quarterly') { periods = n * 4; r = rAnn / 100 / 4; }
  else { periods = n; r = rAnn / 100; }
  var pmt = FV * r / (Math.pow(1 + r, periods) - 1);
  res.style.display = 'block';
  res.innerHTML = '📊 Periodic deposit: <strong>$' + fmt(pmt) + '</strong>  |  Total deposited: <strong>$' + fmt(pmt * periods) + '</strong>  |  Total interest earned: <strong>$' + fmt(FV - pmt * periods) + '</strong>';
  var balance = 0;
  var rows = '<div style="overflow-x:auto;max-height:320px;overflow-y:auto;margin-top:.75rem"><table class="sf-table"><thead><tr>' +
    '<th>#</th><th>Deposit</th><th>Interest</th><th>Fund Balance</th>' +
    '</tr></thead><tbody>';
  var totalInt = 0;
  for (var k = 1; k <= periods; k++) {
    var interest = balance * r;
    balance = balance + interest + pmt;
    totalInt += interest;
    if (k === periods) balance = FV;
    rows += '<tr><td>' + k + '</td><td>$' + fmt(pmt) + '</td><td>$' + fmt(interest) + '</td><td>$' + fmt(balance) + '</td></tr>';
  }
  rows += '<tr><td>Σ</td><td>$' + fmt(pmt * periods) + '</td><td>$' + fmt(totalInt) + '</td><td>$' + fmt(FV) + '</td></tr>';
  rows += '</tbody></table></div>';
  tbl.innerHTML = rows;
}

      .replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
      .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,'')
      .replace(/\u2192/g,'->').replace(/\u2212/g,'-').replace(/\u00b2/g,'^2')
      .replace(/\u00b3/g,'^3').replace(/\u00d7/g,'x').replace(/\u00f7/g,'/')
      .replace(/\u2260/g,'!=').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=')
      .replace(/\u221a/g,'sqrt').replace(/\u03c0/g,'pi').replace(/\u2026/g,'...')
      .replace(/\s+/g,' ').trim();

  doc.setFillColor(pAR,pAG,pAB); doc.rect(0,28,PW,2,'F');
  doc.setFillColor(pBR,pBG,pBB); doc.rect(0,30,PW,34,'F');

/* ── DRAG AND DROP LOGIC ── */
var ddDragging = null;
function ddDragStart(chip) {
  if (chip.classList.contains('used')) return false;
  ddDragging = chip;
  chip.style.opacity = '0.5';
}
function ddDragEnd(chip) { chip.style.opacity = chip.classList.contains('used') ? '0.35' : '1'; }
function ddDragOver(ev, slot) { ev.preventDefault(); slot.classList.add('drag-over'); }
function ddDragLeave(slot) { slot.classList.remove('drag-over'); }
function ddDrop(ev, slot) {
  ev.preventDefault();
  slot.classList.remove('drag-over');
  if (!ddDragging || ddDragging.classList.contains('used')) return;
  if (slot.dataset.filled === '1') return;
  var existingChip = slot.querySelector('.dd-chip');
  if (existingChip) {
    existingChip.classList.remove('used');
    existingChip.style.opacity = '1';
    slot.innerHTML = '<span class="dd-slot-label">' + slot.dataset.label + '</span>';
    slot.dataset.filled = '0';
  }
  ddDragging.classList.add('used');
  slot.dataset.filled = '1';
  slot.dataset.placed = ddDragging.dataset.val;
  slot.innerHTML = '<span class="dd-slot-label">' + slot.dataset.label + '</span><span class="dd-slot-val">' + ddDragging.textContent + '</span>';
  ddDragging = null;
  slot.classList.remove('correct','wrong');
}
function ddCheck(zoneId, answers, feedbackId) {
  var zone = document.getElementById(zoneId);
  var slots = zone.querySelectorAll('.dd-slot');
  var allFilled = true;
  var allCorrect = true;
  slots.forEach(function(slot, idx) {
    if (slot.dataset.filled !== '1') { allFilled = false; return; }
    var placed = slot.dataset.placed;
    var correct = String(answers[idx]);
    if (placed === correct) {
      slot.classList.add('correct'); slot.classList.remove('wrong');
    } else {
      slot.classList.add('wrong'); slot.classList.remove('correct');
      allCorrect = false;
    }
  });
  var fb = document.getElementById(feedbackId);
  fb.style.display = 'block';
  if (!allFilled) {
    fb.style.background = 'var(--gold-bg)'; fb.style.color = 'var(--gold)';
    fb.textContent = '⚠️ Please fill all slots before checking.';
  } else if (allCorrect) {
    fb.style.background = 'var(--ok-bg)'; fb.style.color = 'var(--ok)';
    fb.textContent = '✓ Perfect! All values are correctly placed.';
  } else {
    fb.style.background = 'var(--bad-bg)'; fb.style.color = 'var(--bad)';
    fb.textContent = '✗ Some values are wrong. Review the calculations and try again.';
  }
}
function ddReset(zoneId, feedbackId) {
  var zone = document.getElementById(zoneId);
  zone.querySelectorAll('.dd-slot').forEach(function(slot) {
    slot.classList.remove('correct','wrong');
    slot.dataset.filled = '0';
    slot.dataset.placed = '';
    slot.innerHTML = '<span class="dd-slot-label">' + slot.dataset.label + '</span>';
  });
  zone.querySelectorAll('.dd-chip').forEach(function(chip) {
    chip.classList.remove('used');
    chip.style.opacity = '1';
  });
  var fb = document.getElementById(feedbackId);
  if (fb) fb.style.display = 'none';
}

/* ================================================
   BUILD LESSON
   ================================================ */
function buildLesson(rng) {
  var lb = document.getElementById('lessonBody');

  /* ──────────────────────────────────────────────
     SECTION 1: What is a Sinking Fund?
  ────────────────────────────────────────────── */
  var s1 = document.createElement('div');
  s1.className = 'section';
  s1.innerHTML =
    '<div class="stag">Concept 1 of 4</div>' +
    '<h2>What Is a Sinking Fund?</h2>' +
    '<p>Imagine a company that issued bonds and must repay $5,000,000 in 10 years, or a city that needs to replace a bridge in 20 years. Rather than scrambling for a lump sum at the deadline, they make <strong>regular deposits into a dedicated account</strong> that earns interest. By the target date, the accumulated savings exactly cover the obligation.</p>' +
    '<div class="callout"><strong>A sinking fund</strong> is a savings plan in which equal periodic deposits are made into an interest-bearing account so that the fund grows to a specified <em>future value</em> (target amount) at a predetermined date.<p></p></div>' +
    '<p>Sinking funds are the <strong>mirror image of amortization</strong>: in amortization you pay down a present debt with equal payments; in a sinking fund you build up a future sum with equal deposits. Both use the time value of money, but in opposite directions.</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Target (FV)</div><div class="rform">Future Value needed</div><div class="rnote">The amount the fund must reach (obligation, replacement cost, etc.)</div></div>' +
      '<div class="rcard"><div class="rname">Interest Rate (i)</div><div class="rform">i = <span class="mf-outer"><span class="mf-num">r</span><span class="mf-den">m</span></span></div><div class="rnote">Periodic rate; r = annual rate, m = compounding periods/year</div></div>' +
      '<div class="rcard"><div class="rname">Periods (n)</div><div class="rform">Total number of deposits</div><div class="rnote">e.g. 10 years × 12 = 120 monthly deposits</div></div>' +
      '<div class="rcard"><div class="rname">Deposit (D)</div><div class="rform">Constant per period</div><div class="rnote">Amount deposited each period to reach FV</div></div>' +
    '</div>' +
    '<p style="margin-top:.8rem"><strong>Common real-world uses:</strong> bond redemption funds, equipment replacement reserves, college savings accounts, and emergency capital funds.</p>';
  lb.appendChild(s1);

  /* ── SECTION 1 GUIDED EXAMPLE ── */
  var ex1 = document.createElement('div');
  ex1.className = 'section';
  ex1.innerHTML =
    '<div class="stag">Guided Example</div>' +
    '<h2>The Sinking Fund Deposit Formula</h2>' +
    '<p>A sinking fund is the <strong>future value of an ordinary annuity</strong>. We know the FV we need and solve for the periodic deposit D:</p>' +
    '<div class="callout">' +
      '<strong>D = FV · </strong>' +
      '<span class="mf-outer"><span class="mf-num">i</span><span class="mf-den">(1 + i)<sup>n</sup> − 1</span></span>' +
      '<p style="margin-top:.6rem;font-size:.85rem">Where FV = target amount, i = periodic interest rate, n = total number of deposits.</p>' +
    '</div>' +
    '<p>The denominator <span class="mf-outer"><span class="mf-num">(1+i)<sup>n</sup> − 1</span><span class="mf-den">i</span></span> is the <em>future value annuity factor</em> — it tells you what $1 deposited per period grows to in n periods at rate i.</p>' +
    '<p><strong>Example:</strong> A company must retire bonds worth <strong>$200,000</strong> in <strong>5 years</strong>. They open a sinking fund earning <strong>6% annual</strong>, compounded semi-annually. What is the required semi-annual deposit?</p>' +
    '<div class="gcrd" style="font-size:.87rem">' +
      '<div><strong>Step 1 — Identify values:</strong><br>FV = $200,000 &nbsp;|&nbsp; r = 6% / year &nbsp;|&nbsp; m = 2 (semi-annual) &nbsp;|&nbsp; t = 5 years</div>' +
      '<div style="margin-top:.65rem"><strong>Step 2 — Compute periodic rate and periods:</strong><br>i = <span class="mf-outer"><span class="mf-num">0.06</span><span class="mf-den">2</span></span> = <strong>0.03</strong> per period &nbsp;|&nbsp; n = 5 × 2 = <strong>10</strong> periods</div>' +
      '<div style="margin-top:.65rem"><strong>Step 3 — Apply formula:</strong><br>' +
        'D = 200,000 × <span class="mf-outer"><span class="mf-num">0.03</span><span class="mf-den">(1.03)<sup>10</sup> − 1</span></span>' +
        ' = 200,000 × <span class="mf-outer"><span class="mf-num">0.03</span><span class="mf-den">0.34392</span></span>' +
      '</div>' +
      '<div style="margin-top:.65rem"><strong>Step 4 — Result:</strong><br>D = 200,000 × 0.08723 ≈ <strong style="color:var(--green-dark)">$17,446.24 / semi-annual period</strong></div>' +
    '</div>' +
    '<p>Over 10 deposits the company pays 10 × $17,446.24 = $174,462.40 — meaning <strong>$25,537.60 comes from interest earned</strong> by the fund.</p>';
  lb.appendChild(ex1);

  /* ── PROBLEM 1: Basic Deposit Calculation ── */
  var FV1 = (Math.floor(rng() * 16) + 5) * 10000;   // 50k–200k
  var rAnn1 = (Math.floor(rng() * 6) + 4);           // 4–9%
  var t1 = Math.floor(rng() * 4) + 3;                // 3–6 years
  var mArr = [1,2,4,12];
  var mLbl = ['annual','semi-annual','quarterly','monthly'];
  var mIdx1 = Math.floor(rng() * 4);
  var m1 = mArr[mIdx1];
  var i1 = rAnn1 / 100 / m1;
  var n1 = t1 * m1;
  var D1exact = FV1 * i1 / (Math.pow(1+i1, n1) - 1);
  var D1 = Math.round(D1exact * 100) / 100;
  var w1a = Math.round(D1 * 1.09 * 100) / 100;
  var w1b = Math.round((FV1 / n1) * 100) / 100;   // naive trap (no interest)
  var w1c = Math.round(D1 * 0.88 * 100) / 100;
  var raw1 = [
    { txt: '$' + fmt(D1), correct: true },
    { txt: '$' + fmt(w1a), correct: false },
    { txt: '$' + fmt(w1b), correct: false },
    { txt: '$' + fmt(w1c), correct: false }
  ];
  var sh1 = shuffle(raw1, rng);
  var ci1 = sh1.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Sinking Fund Deposit',
    questionText: 'A business must accumulate <strong>$' + fmt(FV1,0) + '</strong> in <strong>' + t1 + ' years</strong> to replace equipment. They open a sinking fund earning <strong>' + rAnn1 + '% annual</strong> compounded ' + mLbl[mIdx1] + '. What is the required ' + mLbl[mIdx1] + ' deposit?',
    fn: 'D = FV &nbsp;·&nbsp; <span class="mf-outer"><span class="mf-num">i</span><span class="mf-den">(1+i)<sup>n</sup> − 1</span></span>',
    options: sh1.map(function(x){ return x.txt; }),
    correctIdx: ci1,
    hint: 'First find i = ' + rAnn1 + '% ÷ ' + m1 + ' = ' + fmt(i1*100,4) + '% per period, and n = ' + t1 + ' × ' + m1 + ' = ' + n1 + ' total deposits. Then apply the formula.',
    explanation: 'i = ' + fmt(i1*100,4) + '%, n = ' + n1 + ' periods. D = ' + fmt(FV1,0) + ' × <span class="mf-outer"><span class="mf-num">' + fmt(i1,6) + '</span><span class="mf-den">(1+' + fmt(i1,6) + ')<sup>' + n1 + '</sup> − 1</span></span> = <strong>$' + fmt(D1) + '</strong> per period.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ──────────────────────────────────────────────
     SECTION 2: The Sinking Fund Schedule
  ────────────────────────────────────────────── */
  var s2 = document.createElement('div');
  s2.className = 'section';
  // Build a small worked schedule (fixed example: $10,000 in 4 periods at 5% per period)
  var exFV = 10000, exI = 0.05, exN = 4;
  var exD = exFV * exI / (Math.pow(1+exI, exN) - 1);
  var exBal = 0;
  var exRows = '';
  for (var k = 0; k < 4; k++) {
    var exInt = Math.round(exBal * exI * 100) / 100;
    exBal = Math.round((exBal + exInt + exD) * 100) / 100;
    if (k === 3) exBal = exFV;
    exRows += '<tr><td>' + (k+1) + '</td><td>$' + fmt(exD) + '</td><td>$' + fmt(exInt) + '</td><td>$' + fmt(exBal) + '</td></tr>';
  }
  s2.innerHTML =
    '<div class="stag">Concept 2 of 4</div>' +
    '<h2>Building the Sinking Fund Schedule</h2>' +
    '<p>Just as an amortization table tracks how a loan balance decreases, a <strong>sinking fund schedule</strong> shows how the fund balance grows period by period. Each row records the deposit made, the interest earned on the existing balance, and the new total.</p>' +
    '<div class="callout"><strong>For each period k:</strong>' +
      '<br>• Interest<sub>k</sub> = Balance<sub>k−1</sub> × i' +
      '<br>• Balance<sub>k</sub> = Balance<sub>k−1</sub> + Interest<sub>k</sub> + D' +
      '<br>• Balance<sub>n</sub> = FV (by design)' +
    '</div>' +
    '<p><strong>Example — $10,000 fund at 5% per period, 4 deposits:</strong></p>' +
    '<p style="font-size:.82rem;color:var(--text3)">D = 10,000 × <span class="mf-outer" style="font-size:.82rem"><span class="mf-num">0.05</span><span class="mf-den">(1.05)<sup>4</sup> − 1</span></span> ≈ $2,320.12 / period</p>' +
    '<table class="sf-table">' +
      '<thead><tr><th>#</th><th>Deposit</th><th>Interest</th><th>Fund Balance</th></tr></thead>' +
      '<tbody>' + exRows + '</tbody>' +
    '</table>' +
    '<p style="margin-top:.7rem">Notice: interest earned grows each period because the fund balance is larger. Early periods earn almost no interest; later periods earn significantly more — the opposite of amortization.</p>';
  lb.appendChild(s2);

  /* ── PROBLEM 2: Interest earned in period k ── */
  var FV2 = (Math.floor(rng() * 10) + 5) * 10000;   // 50k–140k
  var rAnn2 = (Math.floor(rng() * 5) + 4);           // 4–8%
  var m2 = 2; // semi-annual
  var i2 = rAnn2 / 100 / m2;
  var t2 = Math.floor(rng() * 3) + 3;                // 3–5 years
  var n2 = t2 * m2;
  var D2 = FV2 * i2 / (Math.pow(1+i2, n2) - 1);
  var k2 = Math.floor(rng() * (n2 - 2)) + 2;         // period 2..n-1
  // Balance before period k2: B = D * [(1+i)^(k-1) - 1] / i
  var bal2 = D2 * (Math.pow(1+i2, k2-1) - 1) / i2;
  var int2k = bal2 * i2;
  var int2kR = Math.round(int2k * 100) / 100;
  var raw2 = [
    { txt: '$' + fmt(int2kR), correct: true },
    { txt: '$' + fmt(Math.round(int2k * 1.14 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(int2k * 0.82 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(D2 * 100)/100), correct: false }
  ];
  var sh2 = shuffle(raw2, rng);
  var ci2 = sh2.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Interest in Period k',
    questionText: 'A sinking fund is set up to accumulate <strong>$' + fmt(FV2,0) + '</strong> in <strong>' + t2 + ' years</strong> at <strong>' + rAnn2 + '% annual</strong> (semi-annual compounding). How much interest is earned <strong>during period ' + k2 + '</strong>?',
    fn: 'B<sub>k−1</sub> = D · <span class="mf-outer"><span class="mf-num">(1+i)<sup>k−1</sup> − 1</span><span class="mf-den">i</span></span> &nbsp;|&nbsp; Interest<sub>k</sub> = B<sub>k−1</sub> × i',
    options: sh2.map(function(x){ return x.txt; }),
    correctIdx: ci2,
    hint: 'First find D (the periodic deposit), then find the fund balance just before period ' + k2 + ' using the future value annuity formula with k−1 = ' + (k2-1) + ' periods. Multiply that balance by i = ' + fmt(i2*100,4) + '%.',
    explanation: 'D = $' + fmt(D2) + '. Balance before period ' + k2 + ' = $' + fmt(bal2) + '. Interest = $' + fmt(bal2) + ' × ' + fmt(i2,6) + ' = <strong>$' + fmt(int2kR) + '</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── DRAG AND DROP: Complete the Sinking Fund Schedule ── */
  // Generate a small fund: 5 periods, random FV and rate
  var FVdd = (Math.floor(rng() * 8) + 3) * 1000;   // 3,000–10,000
  var rAnndd = (Math.floor(rng() * 6) + 4);          // 4–9%
  var idd = rAnndd / 100;                             // annual compounding, 5 annual deposits
  var ndd = 5;
  var Ddd = FVdd * idd / (Math.pow(1+idd, ndd) - 1);
  // Compute all 5 rows
  var baldd = 0;
  var rowsdd = [];
  for (var kk = 0; kk < ndd; kk++) {
    var intdd = baldd * idd;
    baldd = baldd + intdd + Ddd;
    if (kk === ndd-1) baldd = FVdd;
    rowsdd.push({ interest: intdd, balance: baldd });
  }
  // Hide: row 1 interest, row 3 balance, row 4 interest, row 5 balance
  var t_int1dd  = Math.round(rowsdd[0].interest * 100) / 100;  // always 0 but included for structure
  var t_bal3dd  = Math.round(rowsdd[2].balance  * 100) / 100;
  var t_int4dd  = Math.round(rowsdd[3].interest * 100) / 100;
  var t_bal5dd  = FVdd;
  // Build chip set: 4 correct + 4 distractors
  var chipsdd = [
    { val: fmt(t_int1dd), label: '$' + fmt(t_int1dd) },
    { val: fmt(t_bal3dd), label: '$' + fmt(t_bal3dd) },
    { val: fmt(t_int4dd), label: '$' + fmt(t_int4dd) },
    { val: fmt(t_bal5dd), label: '$' + fmt(t_bal5dd) },
    { val: 'wx1', label: '$' + fmt(Math.round(Ddd * 0.45 * 100)/100) },
    { val: 'wx2', label: '$' + fmt(Math.round(t_bal3dd * 1.08 * 100)/100) },
    { val: 'wx3', label: '$' + fmt(Math.round(t_int4dd * 1.15 * 100)/100) },
    { val: 'wx4', label: '$' + fmt(Math.round(t_bal5dd * 0.91 * 100)/100) }
  ];
  chipsdd = shuffle(chipsdd, rng);

  var ddSec = document.createElement('div');
  ddSec.className = 'section';
  var ddHtml =
    '<div class="stag">Interactive Activity</div>' +
    '<h2>Drag &amp; Drop: Complete the Schedule</h2>' +
    '<p>Below is a partial sinking fund schedule for a <strong>$' + fmt(FVdd,0) + ' target</strong> at <strong>' + rAnndd + '% annual</strong> (annual compounding, 5 deposits). Four cells are hidden (shown in gold). <strong>Drag the correct value</strong> from the chips below into each empty slot.</p>' +
    '<div class="dd-zone" id="sfddzone">' +
      '<div class="dd-chips" id="sfdchips">' +
        chipsdd.map(function(c) {
          return '<div class="dd-chip" draggable="true" data-val="' + c.val + '" ' +
            'ondragstart="ddDragStart(this)" ondragend="ddDragEnd(this)">' + c.label + '</div>';
        }).join('') +
      '</div>' +
      '<div style="overflow-x:auto"><table class="sf-table" style="min-width:380px">' +
        '<thead><tr><th>#</th><th>Deposit</th><th>Interest</th><th>Fund Balance</th></tr></thead>' +
        '<tbody>' +
          // Row 1: hide interest
          '<tr><td>1</td><td>$' + fmt(Ddd) + '</td>' +
            '<td><div class="dd-slot" id="sfslot_int1" data-label="Interest₁" data-filled="0" data-placed="" ' +
              'ondragover="ddDragOver(event,this)" ondragleave="ddDragLeave(this)" ondrop="ddDrop(event,this)">' +
              '<span class="dd-slot-label" style="color:var(--gold)">Drop here</span></div></td>' +
            '<td>$' + fmt(rowsdd[0].balance) + '</td></tr>' +
          // Row 2: fully shown
          '<tr><td>2</td><td>$' + fmt(Ddd) + '</td>' +
            '<td>$' + fmt(rowsdd[1].interest) + '</td>' +
            '<td>$' + fmt(rowsdd[1].balance) + '</td></tr>' +
          // Row 3: hide balance
          '<tr><td>3</td><td>$' + fmt(Ddd) + '</td>' +
            '<td>$' + fmt(rowsdd[2].interest) + '</td>' +
            '<td><div class="dd-slot" id="sfslot_bal3" data-label="Balance₃" data-filled="0" data-placed="" ' +
              'ondragover="ddDragOver(event,this)" ondragleave="ddDragLeave(this)" ondrop="ddDrop(event,this)">' +
              '<span class="dd-slot-label" style="color:var(--gold)">Drop here</span></div></td></tr>' +
          // Row 4: hide interest
          '<tr><td>4</td><td>$' + fmt(Ddd) + '</td>' +
            '<td><div class="dd-slot" id="sfslot_int4" data-label="Interest₄" data-filled="0" data-placed="" ' +
              'ondragover="ddDragOver(event,this)" ondragleave="ddDragLeave(this)" ondrop="ddDrop(event,this)">' +
              '<span class="dd-slot-label" style="color:var(--gold)">Drop here</span></div></td>' +
            '<td>$' + fmt(rowsdd[3].balance) + '</td></tr>' +
          // Row 5: hide balance
          '<tr><td>5</td><td>$' + fmt(Ddd) + '</td>' +
            '<td>$' + fmt(rowsdd[4].interest) + '</td>' +
            '<td><div class="dd-slot" id="sfslot_bal5" data-label="Balance₅" data-filled="0" data-placed="" ' +
              'ondragover="ddDragOver(event,this)" ondragleave="ddDragLeave(this)" ondrop="ddDrop(event,this)">' +
              '<span class="dd-slot-label" style="color:var(--gold)">Drop here</span></div></td></tr>' +
        '</tbody>' +
      '</table></div>' +
      '<button class="dd-check-btn" onclick="ddCheck(\'sfddzone\',[' +
        '\'' + fmt(t_int1dd) + '\',\'' + fmt(t_bal3dd) + '\',\'' + fmt(t_int4dd) + '\',\'' + fmt(t_bal5dd) + '\'' +
      '],\'sfddfb\')">✓ Check My Answers</button>' +
      '<button class="dd-reset-btn" onclick="ddReset(\'sfddzone\',\'sfddfb\')">↺ Reset</button>' +
      '<div class="dd-feedback" id="sfddfb"></div>' +
    '</div>' +
    '<p style="font-size:.8rem;color:var(--text3);margin-top:.5rem">On mobile: tap a chip to place it in the next available slot.</p>';
  ddSec.innerHTML = ddHtml;
  lb.appendChild(ddSec);

  // Mobile tap-to-place fallback
  setTimeout(function() {
    var zone = document.getElementById('sfddzone');
    if (!zone) return;
    zone.querySelectorAll('.dd-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        if (chip.classList.contains('used')) return;
        ddDragging = chip;
        var slots = zone.querySelectorAll('.dd-slot[data-filled="0"]');
        if (slots.length === 0) return;
        ddDrop({ preventDefault: function(){} }, slots[0]);
      });
    });
  }, 100);

  /* ──────────────────────────────────────────────
     SECTION 3: Fund Balance at Any Point + Interactive Calculator
  ────────────────────────────────────────────── */
  var s3 = document.createElement('div');
  s3.className = 'section';
  s3.innerHTML =
    '<div class="stag">Concept 3 of 4</div>' +
    '<h2>Fund Balance at Any Point in Time</h2>' +
    '<p>After k deposits, the accumulated fund balance is simply the <strong>future value of an ordinary annuity</strong> for k periods:</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Balance after k deposits</div><div class="rform">B<sub>k</sub> = D · <span class="mf-outer" style="font-size:.78rem"><span class="mf-num">(1+i)<sup>k</sup> − 1</span><span class="mf-den">i</span></span></div><div class="rnote">FV of k equal deposits at rate i</div></div>' +
      '<div class="rcard"><div class="rname">Remaining deposits needed</div><div class="rform">n − k deposits left</div><div class="rnote">Each still worth D; fund will still reach FV</div></div>' +
    '</div>' +
    '<div class="callout"><p><strong>Verification:</strong> At k = n, B<sub>n</sub> = D · <span class="mf-outer" style="font-size:.85rem"><span class="mf-num">(1+i)<sup>n</sup> − 1</span><span class="mf-den">i</span></span> = FV. This is guaranteed by how D was computed.</p></div>' +
    '<p><strong>Example:</strong> On a $50,000 sinking fund at 8% annual (quarterly) over 4 years, after <strong>10 deposits</strong>, the balance is:</p>' +
    '<div class="gcrd" style="font-size:.87rem">' +
      '<div>i = <span class="mf-outer"><span class="mf-num">0.08</span><span class="mf-den">4</span></span> = 0.02 &nbsp;|&nbsp; n = 16 &nbsp;|&nbsp; D = $2,776.00</div>' +
      '<div style="margin-top:.5rem">B<sub>10</sub> = 2,776 × <span class="mf-outer"><span class="mf-num">(1.02)<sup>10</sup> − 1</span><span class="mf-den">0.02</span></span> ≈ 2,776 × 10.950 ≈ <strong style="color:var(--green-dark)">$30,396.20</strong></div>' +
    '</div>';
  lb.appendChild(s3);

  /* ── INTERACTIVE SINKING FUND CALCULATOR ── */
  var calcSec = document.createElement('div');
  calcSec.className = 'section';
  calcSec.innerHTML =
    '<div class="stag">Interactive Tool</div>' +
    '<h2>Sinking Fund Schedule Generator</h2>' +
    '<p>Enter any target parameters below to instantly generate the full deposit schedule. Use this to verify your hand calculations.</p>' +
    '<div class="calc-box">' +
      '<div class="calc-row"><span class="calc-lbl">Target FV ($)</span><input class="calc-inp" id="sfcFV" type="number" value="50000" min="1"></div>' +
      '<div class="calc-row"><span class="calc-lbl">Annual Rate (%)</span><input class="calc-inp" id="sfcr" type="number" value="8" step="0.1" min="0.01"></div>' +
      '<div class="calc-row"><span class="calc-lbl">Term (years)</span><input class="calc-inp" id="sfcn" type="number" value="4" min="1" max="30"></div>' +
      '<div class="calc-row"><span class="calc-lbl">Frequency</span>' +
        '<select id="sfcfreq" class="calc-inp" style="width:130px">' +
          '<option value="monthly">Monthly</option>' +
          '<option value="quarterly" selected>Quarterly</option>' +
          '<option value="semiannual">Semi-annual</option>' +
          '<option value="annual">Annual</option>' +
        '</select>' +
      '</div>' +
      '<button class="calc-btn" onclick="buildSFCalcCustom()">▶ Generate Schedule</button>' +
      '<div class="calc-result" id="sfcres"></div>' +
      '<div id="sfctbl"></div>' +
    '</div>';
  lb.appendChild(calcSec);

  /* PROBLEM 3: Balance after k deposits */
  var FV3 = (Math.floor(rng() * 15) + 10) * 10000;  // 100k–240k
  var rAnn3 = (Math.floor(rng() * 5) + 5);           // 5–9%
  var m3 = 4; // quarterly
  var i3 = rAnn3 / 100 / m3;
  var t3 = Math.floor(rng() * 3) + 3;                // 3–5 years
  var n3 = t3 * m3;
  var D3 = FV3 * i3 / (Math.pow(1+i3, n3) - 1);
  var k3 = Math.floor(rng() * (n3 / 2)) + Math.floor(n3 / 4);  // 25–75% through
  var bal3 = D3 * (Math.pow(1+i3, k3) - 1) / i3;
  var bal3R = Math.round(bal3 * 100) / 100;
  var raw3 = [
    { txt: '$' + fmt(bal3R), correct: true },
    { txt: '$' + fmt(Math.round(bal3 * 1.11 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(D3 * k3 * 100)/100), correct: false },  // trap: ignore interest
    { txt: '$' + fmt(Math.round(bal3 * 0.87 * 100)/100), correct: false }
  ];
  var sh3 = shuffle(raw3, rng);
  var ci3 = sh3.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Fund Balance after k Deposits',
    questionText: 'A sinking fund targets <strong>$' + fmt(FV3,0) + '</strong> in <strong>' + t3 + ' years</strong> at <strong>' + rAnn3 + '% annual</strong> (quarterly compounding). After making <strong>' + k3 + ' deposits</strong>, what is the accumulated balance?',
    fn: 'B<sub>k</sub> = D × <span class="mf-outer"><span class="mf-num">(1+i)<sup>k</sup> − 1</span><span class="mf-den">i</span></span>',
    options: sh3.map(function(x){ return x.txt; }),
    correctIdx: ci3,
    hint: 'D = $' + fmt(D3) + '. Use the future value annuity formula with k = ' + k3 + ' and i = ' + fmt(i3*100,4) + '% per quarter.',
    explanation: 'D = $' + fmt(D3) + ', i = ' + fmt(i3,6) + '. B<sub>' + k3 + '</sub> = ' + fmt(D3) + ' × <span class="mf-outer"><span class="mf-num">(1+' + fmt(i3,4) + ')<sup>' + k3 + '</sup> − 1</span><span class="mf-den">' + fmt(i3,4) + '</span></span> = <strong>$' + fmt(bal3R) + '</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ──────────────────────────────────────────────
     SECTION 4: Total Contributions vs. Interest + Comparing Plans
  ────────────────────────────────────────────── */
  var s4 = document.createElement('div');
  s4.className = 'section';
  s4.innerHTML =
    '<div class="stag">Concept 4 of 4</div>' +
    '<h2>Total Contributions, Interest Earned &amp; Comparing Plans</h2>' +
    '<p>A key metric is understanding how much of the target comes from your own deposits versus interest earned by the fund:</p>' +
    '<div class="callout"><strong>Total deposited = D × n</strong><br><strong>Interest earned = FV − (D × n)</strong><p style="margin-top:.4rem">The higher the interest rate or the longer the term, the larger the share provided by interest — meaning smaller deposits for the same goal.</p></div>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Higher Rate</div><div class="rform">Smaller D, more interest</div><div class="rnote">Fund grows faster — you deposit less for the same FV</div></div>' +
      '<div class="rcard"><div class="rname">Longer Term</div><div class="rform">Smaller D, more interest</div><div class="rnote">More compounding periods amplify the effect</div></div>' +
      '<div class="rcard"><div class="rname">More Frequent</div><div class="rform">Smaller each deposit</div><div class="rnote">Monthly vs annual: total interest earned is slightly higher</div></div>' +
    '</div>' +
    '<div class="callout"><p><strong>Key insight:</strong> Starting a sinking fund early dramatically reduces required deposits. Waiting 5 fewer years to begin can more than double the deposit amount needed to reach the same goal.</p></div>';
  lb.appendChild(s4);

  /* ──────────────────────────────────────────────
     FINAL ASSESSMENT HEADER
  ────────────────────────────────────────────── */
  var finalHdr = document.createElement('div');
  finalHdr.className = 'section';
  finalHdr.innerHTML =
    '<div class="stag">Final Assessment</div>' +
    '<h2>Practice Problems</h2>' +
    '<p>Apply everything you have learned. Show your work in the drawing or typing area before selecting an answer.</p>';
  lb.appendChild(finalHdr);

  /* ── PROBLEM 4: Interest earned total ── */
  var FV4 = (Math.floor(rng() * 20) + 10) * 10000;  // 100k–290k
  var rAnn4 = (Math.floor(rng() * 6) + 4);           // 4–9%
  var mIdx4 = Math.floor(rng() * 3);                 // annual, semi, quarterly
  var mArr4 = [1,2,4]; var mLbl4 = ['annual','semi-annual','quarterly'];
  var m4 = mArr4[mIdx4];
  var i4 = rAnn4 / 100 / m4;
  var t4 = Math.floor(rng() * 5) + 4;               // 4–8 years
  var n4 = t4 * m4;
  var D4 = FV4 * i4 / (Math.pow(1+i4, n4) - 1);
  var totalInt4 = Math.round((FV4 - D4 * n4) * 100) / 100;
  var raw4 = [
    { txt: '$' + fmt(totalInt4), correct: true },
    { txt: '$' + fmt(Math.round(totalInt4 * 1.18 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(totalInt4 * 0.75 * 100)/100), correct: false },
    { txt: '$' + fmt(Math.round(D4 * n4 * 100)/100), correct: false }  // trap: total deposited
  ];
  var sh4 = shuffle(raw4, rng);
  var ci4 = sh4.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Total Interest Earned',
    questionText: 'A sinking fund is set up to accumulate <strong>$' + fmt(FV4,0) + '</strong> in <strong>' + t4 + ' years</strong> at <strong>' + rAnn4 + '% annual</strong> (' + mLbl4[mIdx4] + ' compounding). How much of the final amount came from <strong>interest earned</strong> (not from deposits)?',
    fn: 'Interest earned = FV − D × n',
    options: sh4.map(function(x){ return x.txt; }),
    correctIdx: ci4,
    hint: 'Find D = $' + fmt(D4) + '. Total deposited = D × n = $' + fmt(D4) + ' × ' + n4 + ' = $' + fmt(D4 * n4) + '. Subtract from FV.',
    explanation: 'D = $' + fmt(D4) + '. Total deposited = $' + fmt(D4 * n4) + '. Interest earned = $' + fmt(FV4,0) + ' − $' + fmt(D4 * n4) + ' = <strong>$' + fmt(totalInt4) + '</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 5: Comparing two sinking fund plans ── */
  var FV5 = (Math.floor(rng() * 10) + 15) * 10000; // 150k–240k
  var rA5 = (Math.floor(rng() * 3) + 5);  // Plan A: 5–7%
  var rB5 = rA5 + 2;                       // Plan B: 2% higher
  var tA5 = 10, tB5 = 10;
  var mA5 = 12, mB5 = 12; // both monthly
  var iA5 = rA5/100/mA5; var nA5 = tA5*mA5;
  var iB5 = rB5/100/mB5; var nB5 = tB5*mB5;
  var DA5 = FV5 * iA5 / (Math.pow(1+iA5,nA5)-1);
  var DB5 = FV5 * iB5 / (Math.pow(1+iB5,nB5)-1);
  var intA5 = FV5 - DA5*nA5;
  var intB5 = FV5 - DB5*nB5;
  var cheaperStr5 = DA5 > DB5 ? 'B' : 'A';
  var cheaperLbl5 = cheaperStr5 === 'A' ? 'Plan A (' + rA5 + '%, D=$' + fmt(DA5) + ')' : 'Plan B (' + rB5 + '%, D=$' + fmt(DB5) + ')';
  var opts5 = [
    { txt: 'Plan A (' + rA5 + '%) — monthly deposit $' + fmt(DA5), correct: cheaperStr5 === 'A' },
    { txt: 'Plan B (' + rB5 + '%) — monthly deposit $' + fmt(DB5), correct: cheaperStr5 === 'B' },
    { txt: 'Both plans require the same total deposits', correct: false },
    { txt: 'Plan A — it has a lower rate so deposits are smaller', correct: false }
  ];
  var sh5 = shuffle(opts5, rng);
  var ci5 = sh5.findIndex(function(x){ return x.correct; });
  if (ci5 < 0) { ci5 = 1; sh5[1].correct = true; }
  problems.push({
    title: 'Comparing Sinking Fund Plans',
    questionText: 'You need to accumulate <strong>$' + fmt(FV5,0) + '</strong> in <strong>10 years</strong> (monthly compounding). Which plan requires a <strong>smaller monthly deposit</strong>?<br><strong>Plan A:</strong> ' + rA5 + '% annual<br><strong>Plan B:</strong> ' + rB5 + '% annual',
    fn: 'D = FV &nbsp;·&nbsp; <span class="mf-outer"><span class="mf-num">i</span><span class="mf-den">(1+i)<sup>n</sup> − 1</span></span>',
    options: sh5.map(function(x){ return x.txt; }),
    correctIdx: ci5,
    hint: 'A higher interest rate means the fund grows faster, so you need to deposit less each period to reach the same FV. Compute both deposits and compare.',
    explanation: 'Plan A deposit = $' + fmt(DA5) + '. Plan B deposit = $' + fmt(DB5) + '. <strong>' + cheaperLbl5 + ' requires smaller deposits</strong> because a higher rate means the fund earns more interest, reducing the burden on you.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 6: Find n given a maximum deposit ── */
  var FV6 = (Math.floor(rng() * 8) + 4) * 10000;   // 40k–110k
  var rAnn6 = (Math.floor(rng() * 4) + 5);           // 5–8%
  var m6 = 12; // monthly
  var i6 = rAnn6 / 100 / m6;
  var n6true = (Math.floor(rng() * 4) + 3) * 12;    // 36, 48, 60, or 72
  var D6 = Math.round(FV6 * i6 / (Math.pow(1+i6, n6true) - 1) * 100) / 100;
  // n = ln(1 + FV·i/D) / ln(1+i)
  var nCalc6 = Math.log(1 + FV6 * i6 / D6) / Math.log(1 + i6);
  var nRound6 = Math.round(nCalc6);
  var raw6 = [
    { txt: nRound6 + ' months', correct: true },
    { txt: (nRound6 + 12) + ' months', correct: false },
    { txt: (nRound6 - 12) + ' months', correct: false },
    { txt: Math.round(FV6 / D6) + ' months (no interest)', correct: false }
  ];
  var sh6 = shuffle(raw6, rng);
  var ci6 = sh6.findIndex(function(x){ return x.correct; });
  problems.push({
    title: 'Find the Required Term',
    questionText: 'You want to save <strong>$' + fmt(FV6,0) + '</strong> and can afford to deposit <strong>$' + fmt(D6) + '/month</strong> into a fund earning <strong>' + rAnn6 + '% annual</strong> (monthly compounding). How many months will it take to reach your goal?',
    fn: 'n = <span class="mf-outer"><span class="mf-num">ln(1 + FV · i / D)</span><span class="mf-den">ln(1 + i)</span></span>',
    options: sh6.map(function(x){ return x.txt; }),
    correctIdx: ci6,
    hint: 'Rearrange FV = D · [(1+i)^n − 1] / i to isolate n. Use n = ln(1 + FV·i/D) / ln(1+i), where i = ' + fmt(i6,6) + '.',
    explanation: 'i = ' + fmt(i6,6) + '. n = <span class="mf-outer"><span class="mf-num">ln(1 + ' + fmt(FV6,0) + ' × ' + fmt(i6,6) + ' / ' + fmt(D6) + ')</span><span class="mf-den">ln(1 + ' + fmt(i6,6) + ')</span></span> = <strong>' + nRound6 + ' months</strong>.',
    studentChoice: null, pendingChoice: null
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

} // end buildLesson

/* ── SF Calc wrapper ── */
function buildSFCalcCustom() {
  var FV  = parseFloat(document.getElementById('sfcFV').value);
  var rAnn = parseFloat(document.getElementById('sfcr').value);
  var n   = parseInt(document.getElementById('sfcn').value);
  var freq = document.getElementById('sfcfreq').value;
  var res = document.getElementById('sfcres');
  var tbl = document.getElementById('sfctbl');
  if (isNaN(FV) || isNaN(rAnn) || isNaN(n) || FV <= 0 || rAnn <= 0 || n <= 0) {
    res.style.display = 'block';
    res.innerHTML = '<span style="color:var(--bad)">⚠ Please enter valid positive numbers.</span>';
    tbl.innerHTML = '';
    return;
  }
  var periods, r;
  if (freq === 'monthly') { periods = n * 12; r = rAnn / 100 / 12; }
  else if (freq === 'quarterly') { periods = n * 4; r = rAnn / 100 / 4; }
  else if (freq === 'semiannual') { periods = n * 2; r = rAnn / 100 / 2; }
  else { periods = n; r = rAnn / 100; }
  var pmt = FV * r / (Math.pow(1 + r, periods) - 1);
  var balance = 0;
  var totalInt = 0;
  res.style.display = 'block';
  res.innerHTML = '📊 Periodic deposit: <strong>$' + fmt(pmt) + '</strong>  ·  Total deposited: <strong>$' + fmt(pmt * periods) + '</strong>  ·  Interest earned: <strong>$' + fmt(FV - pmt * periods) + '</strong>';
  var rows = '<div style="overflow-x:auto;max-height:320px;overflow-y:auto;margin-top:.75rem">' +
    '<table class="sf-table"><thead><tr><th>#</th><th>Deposit</th><th>Interest</th><th>Fund Balance</th></tr></thead><tbody>';
  for (var k = 1; k <= periods; k++) {
    var interest = balance * r;
    balance = balance + interest + pmt;
    totalInt += interest;
    if (k === periods) balance = FV;
    rows += '<tr><td>' + k + '</td><td>$' + fmt(pmt) + '</td><td>$' + fmt(interest) + '</td><td>$' + fmt(balance) + '</td></tr>';
  }
  rows += '<tr><td>Σ</td><td>$' + fmt(pmt * periods) + '</td><td>$' + fmt(totalInt) + '</td><td>$' + fmt(FV) + '</td></tr>';
  rows += '</tbody></table></div>';
  tbl.innerHTML = rows;
}
</script>
</body>
</html>
